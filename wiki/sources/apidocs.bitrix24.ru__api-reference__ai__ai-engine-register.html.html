            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zwflnp51\"&gt;ai_admin&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;REST-метод для добавления пользовательского сервиса. Метод регистрирует &lt;strong&gt;engine&lt;/strong&gt;, при повторном вызове обновляет его. Это не совсем место встройки, так как &lt;strong&gt;endpoint&lt;/strong&gt; партнера должен следовать четким форматам.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;С версии&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;name&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l3a70s12\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Осмысленное и короткое название, которое будет появляться в интерфейсе пользователя.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;code&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kfgbfgz4\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Уникальный код engine&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;category&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-71lixmhs\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Может быть либо text (генерация текста), либо image (генерация картинок), либо audio (распознавание текста).&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;completions_url&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6d4ou51m\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;endpoint для обработки пользовательского запроса.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;settings&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xvvvq8ao\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Тип AI (см. описание ниже). Необязательный.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.800&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;Метод в случае успеха вернёт ID добавленного &lt;strong&gt;engine&lt;/strong&gt;.&lt;/p&gt;\n&lt;h2 id=\"tip-ai\"&gt;&lt;a href=\"api-reference/ai/ai-engine-register.html#tip-ai\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Тип AI&lt;/span&gt;&lt;/a&gt;Тип AI&lt;/h2&gt;\n&lt;p&gt;Массив параметров:&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;С версии&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;code_alias&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-paysgz7v\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Тип AI. Доступны значения: ChatGPT (Open AI), GigaChat (Сбер), YandexGPT (Яндекс) (по умолчанию ChatGPT).&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;model_context_type&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xfnccdbg\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Тип подсчета контекста. Доступны значения: token - токены, symbol - символы. По умолчанию token.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;model_context_limit&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cb5mkxyp\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Объем контекста (по умолчанию 16К). Перед отправкой вам запроса пользователя, проверяется лимит контекста согласно типу подсчета.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/ai/ai-engine-register.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-689kw9ry\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"ai1er0uv\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt;\n{\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n\t\t&lt;span class=\"hljs-string\"&gt;'ai.engine.register'&lt;/span&gt;,\n\t\t{\n\t\t\t&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Ivanov GPT'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;code&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'ivanov_gpt'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;category&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;completions_url&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'https://antonds.ru/ai/aul/completions/'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;settings&lt;/span&gt;: {\n\t\t\t\t&lt;span class=\"hljs-attr\"&gt;code_alias&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'ChatGPT'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-attr\"&gt;model_context_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'token'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-attr\"&gt;model_context_limit&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;16&lt;/span&gt;*&lt;span class=\"hljs-number\"&gt;1024&lt;/span&gt;,\n\t\t\t},\n\t\t}\n\t);\n\t\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; result = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt;;\n\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;info&lt;/span&gt;(result);\n}\n&lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt;( error )\n{\n\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(error);\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"268\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-268\" attributeName=\"visibility 'token'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'model_context_limit'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;16&lt;/span&gt; * &lt;span class=\"hljs-number\"&gt;1024&lt;/span&gt;,\n                ],\n            ]\n        );\n\n    &lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$response&lt;/span&gt;\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getResponseData&lt;/span&gt;()\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getResult&lt;/span&gt;();\n\n    &lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'Success: '&lt;/span&gt; . &lt;span class=\"hljs-title function_ invoke__\"&gt;print_r&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;, &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;);\n    &lt;span class=\"hljs-comment\"&gt;// Нужная вам логика обработки данных&lt;/span&gt;\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;processData&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;);\n\n} &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (&lt;span class=\"hljs-built_in\"&gt;Throwable&lt;/span&gt; &lt;span class=\"hljs-variable\"&gt;$e&lt;/span&gt;) {\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;error_log&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$e&lt;/span&gt;-&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;());\n    &lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'Error registering AI engine: '&lt;/span&gt; . &lt;span class=\"hljs-variable\"&gt;$e&lt;/span&gt;-&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;();\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"271\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-271\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-271\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-271.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"m135pbcv\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"BX24.js\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs javascript\"&gt;&lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'ai.engine.register'&lt;/span&gt;,\n    {\n        &lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Ivanov GPT'&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;code&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'ivanov_gpt'&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;category&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;completions_url&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'https://antonds.ru/ai/aul/completions/'&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;settings&lt;/span&gt;: {\n            &lt;span class=\"hljs-attr\"&gt;code_alias&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'ChatGPT'&lt;/span&gt;,\n            &lt;span class=\"hljs-attr\"&gt;model_context_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'token'&lt;/span&gt;,\n            &lt;span class=\"hljs-attr\"&gt;model_context_limit&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;16&lt;/span&gt;*&lt;span class=\"hljs-number\"&gt;1024&lt;/span&gt;,\n        },\n    },\n    &lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;result&lt;/span&gt;)\n    {\n        &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;())\n        {\n            &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;());\n        }\n        &lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n        {\n            &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;info&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;data&lt;/span&gt;());\n        }\n    }\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"274\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-274\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-274\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-274.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"endpoint\"&gt;&lt;a href=\"api-reference/ai/ai-engine-register.html#endpoint\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Endpoint&lt;/span&gt;&lt;/a&gt;Endpoint&lt;/h2&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Внимание!&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;В скрипте все в едином потоке кода, это для примера. В режиме &lt;strong&gt;production&lt;/strong&gt; необходимо вынести строчки кода в отдельную часть.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/examples/endpoint.zip\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Шаблон&lt;/a&gt; для создания пользовательского endpoint можно использовать для кастомизации собственного сервиса.&lt;/p&gt;\n&lt;h2 id=\"vazhnye-momenty\"&gt;&lt;a href=\"api-reference/ai/ai-engine-register.html#vazhnye-momenty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Важные моменты:&lt;/span&gt;&lt;/a&gt;Важные моменты:&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;Скрипт должен принять запрос, отработать его быстро, принять и добавить в свою внутреннюю очередь.&lt;/li&gt;\n&lt;li&gt;Сервис с типом \"image\" должен отправлять асинхронные запросы.&lt;/li&gt;\n&lt;li&gt;Уметь возвращать различные статусы ответа (есть в примере):&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;200 — обычный переход по ссылке;&lt;/li&gt;\n&lt;li&gt;202 — если вы приняли запрос и добавили в очередь;&lt;/li&gt;\n&lt;li&gt;503 — если сервис недоступен.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Ответ ожидается в течение определенного времени, потом колбек становится невалидным.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Внимание!&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Помимо кода ответа, в случае успешной генерации, обработчик должен обязательно возвращать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1ji1v6ha\"&gt;json_encode(['result' =&amp;gt; 'OK'])&lt;/code&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Когда вы работаете с категорией провайдера &lt;strong&gt;audio&lt;/strong&gt;, в ключе &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xxzljt5e\"&gt;prompt&lt;/code&gt; вы получаете массив, который включает в себя следующие элементы:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;file&lt;/strong&gt;: Ссылка на файл. Важно отметить, что файл может быть без расширения.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;fields&lt;/strong&gt;: Вспомогательный внутренний массив, который содержит:\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;type&lt;/strong&gt;: Content-type файла, что особенно важно, если файл без расширения (например, \"audio/ogg\").&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;prompt&lt;/strong&gt;: Вспомогательный промпт для аудио-файла, который может содержать ключевую информацию для помощи в распознавании файла, например, название вашей компании.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;В ответе провайдеру уходят так же дополнительные поля:&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Поля&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;С версии&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;auth&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Данные по авторизации,&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.600.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;payload_raw&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сырое значение промпта (при использовании Copilot там будет символьный код использованного промпта)&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.600.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;payload_provider&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Символьный код провайдера препромпта (при использовании Copilot там будет prompt).&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.600.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;payload_prompt_text&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Если &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l7at8184\"&gt;payload_provider = prompt&lt;/code&gt;, будет содержаться сырая инструкция препромпта. Это не обработанный препромпт для самостоятельного анализа. Подробнее в документации по &lt;a href=\"api-reference/ai\"&gt;промптам&lt;/a&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;payload_markers&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив дополнительных маркеров от пользователя (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-werklgsx\"&gt;original_message&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2vux3axh\"&gt;user_message&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1p2io08i\"&gt;language&lt;/code&gt;), использованный при формировании промпта. Подробнее в документации по &lt;a href=\"api-reference/ai\"&gt;промптам&lt;/a&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;payload_role&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Роль (инструкция), использованная при формировании промпта. В GPT-подобных системах вы должны отправлять эту роль как системную в массиве сообщений.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;context&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив предшествующих сообщений в хронологическом порядке. Например, список комментариев к посту. Первым в таком списке контекста считается авторское сообщение (сам пост). Важно: Объем контекста, отправляемого вашему провайдеру, зависит от указанного вами объема провайдера и типа подсчета (подробнее в документации по провайдеру). По умолчанию метод подсчета \"токены\", объем 16K. Отправлять контекст непосредственной нейронке вы должны только если передан параметр collect_context, равный true (1). В остальных случаях он передается как доп.информация на ваше усмотрение.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;23.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;max_tokens&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Максимальное число лексем. Параметр контролирует длину вывода. Необязательный.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;temperature&lt;/strong&gt;&lt;sup&gt;*&lt;/sup&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Температура. Параметр контролирует случайность вывода (низкие значения делают вывод более сфокусированным и детерминированным). Обязательный.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;* - Обязательные параметры&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пример&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Допустим, к вам приходит (помимо прочей информации) три массива данных.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;prompt - содержит текущий запрос, это просто текст;&lt;/li&gt;\n&lt;li&gt;payload_role - некий текст, содержащий инструкции;&lt;/li&gt;\n&lt;li&gt;context - массив (допустим, тоже не пустой).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;В этом случае, результирующий массив мы получаем как:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"role\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"system\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"content\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"$payload_role\"&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n        &lt;span class=\"hljs-comment\"&gt;// весь массив context, или его часть, если вы хотите сэкономить запрос&lt;/span&gt;\n        &lt;span class=\"hljs-comment\"&gt;// но помните, что он идет в хронологическом порядке (снизу самые последние сообщения)&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"role\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"user\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"content\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"$prompt\"&lt;/span&gt; &lt;span class=\"hljs-comment\"&gt;// это текущий запрос, и он НЕ входит в контекст&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"602\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-602\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-602\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-602.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Тип AI","href":"api-reference/ai/ai-
