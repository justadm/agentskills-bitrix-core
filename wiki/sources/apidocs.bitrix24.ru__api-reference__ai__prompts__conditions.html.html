            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;В препромпте, почти как в программировании, можно использовать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h74r7cdo\"&gt;if&lt;/code&gt; условия и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2j6usvsx\"&gt;switch&lt;/code&gt; ветвления.&lt;/p&gt;\n&lt;h2 id=\"usloviya\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#usloviya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Условия&lt;/span&gt;&lt;/a&gt;Условия&lt;/h2&gt;\n&lt;p&gt;Сразу начнём с примера:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (engine.&lt;span class=\"hljs-property\"&gt;code&lt;/span&gt; = &lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;)\n\tГовори от имени робота.\n@&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n\tГовори от имени человека.\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"19\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-19\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-19\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-19.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В результате, в зависимости от выбранного провайдера на портале, итоговый препромпт будет отличаться.&lt;/p&gt;\n&lt;p&gt;Что можно писать в условии &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-waffgrjb\"&gt;@if ()&lt;/code&gt;? Посмотрим ниже. Регистр и лишние пробелы значения не имеют.&lt;/p&gt;\n&lt;h2 id=\"sistemnye-polya\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#sistemnye-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Системные поля&lt;/span&gt;&lt;/a&gt;Системные поля&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xonvlpp6\"&gt;engine.code&lt;/code&gt; — код провайдера (ChatGPT, GigaChat, YandexGPT, &lt;i class=\"yfm yfm-term_title\" term-key=\":ThirdParty\" role=\"button\" aria-describedby=\":ThirdParty_element\" tabindex=\"0\" id=\"lwld46ak\"&gt;ThirdParty&lt;/i&gt;)&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vbtkxo4t\"&gt;engine.category&lt;/code&gt; — может принимать значения text или image. Но на текущий момент препромпты CoPilot работают только для текстов&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kkad8720\"&gt;context.module&lt;/code&gt; — модуль, который вызывает CoPilot. Например, можно как-то иначе дополнить препромпт, если запрос идет для модуля CRM&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Пример условия по системному полю был в начале страницы. Приведём ещё один:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (engine.&lt;span class=\"hljs-property\"&gt;code&lt;/span&gt; = &lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;)\n\tНе забывай, что ты &lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"49\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-49\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-49\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-49.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"proverka-na-pustotu\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#proverka-na-pustotu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Проверка на пустоту&lt;/span&gt;&lt;/a&gt;Проверка на пустоту&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (author.&lt;span class=\"hljs-property\"&gt;name&lt;/span&gt; = &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;)\n\tговори от имени анонимуса\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"53\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-53\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-53\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-53.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"otricanie\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#otricanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Отрицание&lt;/span&gt;&lt;/a&gt;Отрицание&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (engine.&lt;span class=\"hljs-property\"&gt;code&lt;/span&gt; != &lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;)\n\t{context_messages}\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"57\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-57\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-57\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-57.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"rabota-s-bazovymi-markerami\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#rabota-s-bazovymi-markerami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с базовыми маркерами&lt;/span&gt;&lt;/a&gt;Работа с базовыми маркерами&lt;/h2&gt;\n&lt;p&gt;Это &lt;a href=\"api-reference/ai/prompts/markers.html\"&gt;базовые маркеры&lt;/a&gt;, а также предустановленные разработчиком маркеры. Но в силу того, что в них содержится пользовательский контент, использовать их имеет смысл только для проверки на непустоту.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (marker.&lt;span class=\"hljs-property\"&gt;original_message&lt;/span&gt; != &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;)\n\tпохвали за {original_message}\n@&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n\tпохвали за {user_message}\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"64\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-64\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-64\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-64.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;С другой стороны через проверку маркера вы можете опираться на какой-то системный предустановленный маркер, который всегда устанавливается разработчиком при наступлении определенных условий.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (marker.&lt;span class=\"hljs-property\"&gt;role&lt;/span&gt; = vip)\n\tпиши очень важно\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"68\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-68\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-68\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-68.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"rabota-s-markerami-rezultata\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#rabota-s-markerami-rezultata\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с маркерами результата&lt;/span&gt;&lt;/a&gt;Работа с маркерами результата&lt;/h2&gt;\n&lt;p&gt;Информацию о маркерах результата вы найдёте на странице документации о &lt;a href=\"api-reference/ai/prompts/markers.html\"&gt;маркерах&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Как применять их в условиях? По логике вещей, использовать вы их можете только в задачах проверки на пустоту. Например:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (current_result0 != &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;)\n\tЭто не первое уточнение пользователя, будь внимательнее, пожалуйста!\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"78\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-78\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-78\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-78.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Важное уточнение — проверять доступность маркера нужно только для вашей логики. Запись такого вида:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (current_result0 != &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;)\n\t{current_result0}\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"82\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-82\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-82\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-82.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;бессмысленна, так как если маркера нет, то он и так вырежется из текста автоматически.&lt;/p&gt;\n&lt;h2 id=\"funkcii-vnutri-if-uslovij\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#funkcii-vnutri-if-uslovij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Функции внутри if-условий&lt;/span&gt;&lt;/a&gt;Функции внутри if-условий&lt;/h2&gt;\n&lt;p&gt;Внутри условия if-выражения можно использовать функции.&lt;br /&gt;\nПока что поддерживается только определение длины &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p8w5cr6v\"&gt;length()&lt;/code&gt;. Внутрь этой функции, в принципе, можно передать любой маркер, в том числе пользовательский.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-title function_\"&gt;length&lt;/span&gt;(marker.&lt;span class=\"hljs-property\"&gt;user_message&lt;/span&gt;) &amp;lt; &lt;span class=\"hljs-number\"&gt;10&lt;/span&gt;)\n\tИтоговый ответ должен быть очень лаконичным.\n@&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n\tПиши как Толстой.\n@endif\n{user_message}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"92\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-92\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-92\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-92.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"funkcii-settery\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#funkcii-settery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Функции сеттеры&lt;/span&gt;&lt;/a&gt;Функции сеттеры&lt;/h2&gt;\n&lt;p&gt;Внутри промптов можно устанавливать температуру и токены. Причем разные, в зависимости от &lt;i class=\"yfm yfm-term_title\" term-key=\":условия\" role=\"button\" aria-describedby=\":условия_element\" tabindex=\"0\" id=\"vlxk1fry\"&gt;условий&lt;/i&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s2flk49p\"&gt;@setTemperature()&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cvgrhxit\"&gt;@setTokens()&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Дополним пример из предыдущего раздела про функции, использовав сеттеры:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-title function_\"&gt;length&lt;/span&gt; ( marker.&lt;span class=\"hljs-property\"&gt;user_message&lt;/span&gt; ) &amp;lt; &lt;span class=\"hljs-number\"&gt;10&lt;/span&gt;)\n\tИтоговый ответ должен быть очень лаконичным.\n\t@&lt;span class=\"hljs-title function_\"&gt;setTemperature&lt;/span&gt;(&lt;span class=\"hljs-number\"&gt;0.12&lt;/span&gt;)\n\t@&lt;span class=\"hljs-title function_\"&gt;setTokens&lt;/span&gt;(&lt;span class=\"hljs-number\"&gt;200&lt;/span&gt;)\n@&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n\tПиши как Толстой.\n\t@&lt;span class=\"hljs-title function_\"&gt;setTemperature&lt;/span&gt;(&lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;)\n\t@&lt;span class=\"hljs-title function_\"&gt;setTokens&lt;/span&gt;(&lt;span class=\"hljs-number\"&gt;1200&lt;/span&gt;)\n@endif\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"114\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-114\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-114\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-114.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"vetvlenie\"&gt;&lt;a href=\"api-reference/ai/prompts/conditions.html#vetvlenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ветвление&lt;/span&gt;&lt;/a&gt;Ветвление&lt;/h2&gt;\n&lt;p&gt;Это известный в программировании &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fzwpeo9s\"&gt;switch&lt;/code&gt;. Придет на помощь, когда у вас есть разные блоки промпта, но каждый из них выполняется строго в определенном порядке. Хороший пример, когда у вас разный текст промпта для разных провайдеров. Давайте на этом примере и рассмотрим.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;switch&lt;/span&gt; (engine.&lt;span class=\"hljs-property\"&gt;code&lt;/span&gt;)\n@&lt;span class=\"hljs-keyword\"&gt;case&lt;/span&gt;(&lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;)\n\t**инструкции для &lt;span class=\"hljs-variable constant_\"&gt;GPT&lt;/span&gt;**\n@&lt;span class=\"hljs-keyword\"&gt;default&lt;/span&gt;\n\t**инструкции для остальных провайдеров**\n@endswitch\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"121\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-121\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-121\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-121.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Что можно вставлять в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7j9gqjx4\"&gt;switch&lt;/code&gt;? Все то же, что и в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pjwxnkep\"&gt;if&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Условие ветвления имеет наивысший приоритет, а это значит, что внутри case-блоков могут содержаться в том числе if-выражения. Блоков ветвления может быть несколько, хотя это уже снизит читабельность.&lt;/p&gt;\n&lt;p&gt;Пример совместного использования switch и if:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;@&lt;span class=\"hljs-keyword\"&gt;switch&lt;/span&gt; (engine.&lt;span class=\"hljs-property\"&gt;code&lt;/span&gt;)\n@&lt;span class=\"hljs-keyword\"&gt;case&lt;/span&gt;(&lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;)\n\tты поросенок \n\t@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(author.&lt;span class=\"hljs-property\"&gt;personalgender&lt;/span&gt; = m) розового цвета @&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt; синего цвета @endif\n@&lt;span class=\"hljs-keyword\"&gt;default&lt;/span&gt;\n\tты волк\n@endswitch\n@&lt;span class=\"hljs-keyword\"&gt;switch&lt;/span&gt; (engine.&lt;span class=\"hljs-property\"&gt;code&lt;/span&gt;)\n@&lt;span class=\"hljs-keyword\"&gt;case&lt;/span&gt;(&lt;span class=\"hljs-title class_\"&gt;ChatGPT&lt;/span&gt;)\n\tc Плутона\n@&lt;span class=\"hljs-keyword\"&gt;default&lt;/span&gt;\n\t@&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(author.&lt;span class=\"hljs-property\"&gt;personalgender&lt;/span&gt; = m) с Марса @&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt; с Венеры @endif\n@endswitch\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"131\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-131\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-131\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-131.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;dfn class=\"yfm yfm-term_dfn\" id=\":ThirdParty_element\" role=\"dialog\"&gt;&lt;p&gt;ThirdParty — «третья сторона». Т.е. здесь может быть код стороннего провайдера, разработанного партнером.&lt;/p&gt;\n&lt;/dfn&gt;&lt;dfn class=\"yfm yfm-term_dfn\" id=\":условия_element\" role=\"dialog\"&gt;&lt;p&gt;Это могут быть как if-условия, так и switch ветвления.&lt;/p&gt;\n&lt;/dfn&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Условия","href":"api-reference/ai/prompts/conditions.html#usloviya","level":2},{"title":"Системные поля","href":"api-reference/ai/prompts/conditions.html#sistemnye-polya","level":2},{"title":"Проверка на пустоту","href":"api-reference/ai/prompts/conditions.html#proverka-na-pustotu","level":2},{"title":"Отрицание","href":"api-reference/ai/prompts/conditions.html#otricanie","level":2},{"title":"Работа с базовыми маркерами","href":"api-reference/ai/prompts/conditions.html#rabota-s-bazovymi-markerami","level":2},{"title":"Работа с маркерами результата","href":"api-reference/ai/prompts/conditions.html#rabota-s-markerami-rezultata","level":2},{"title":"Функции внутри if-условий","href":"api-reference/ai/prompts/conditions.html#funkcii-vnutri-if-uslovij","level":2},{"title":"Функции сеттеры","href":"api-reference/ai/prompts/conditions.html#funkcii-settery","level":2},{"title":"Ветвление","href":"api-reference/ai/prompts/conditions.html#vetvlenie","level":2}],"title":"Условия в промптах"},"router":{"pathname":"api-reference/ai/prompts/conditions","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
