            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Несмотря на то, что нейросети достаточно умные создания, с ними надо уметь правильно общаться. Рядовой пользователь не может (и по сути не должен) знать как это делается. Помогают в таком общении так называемые препромпты.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;strong&gt;Препромпты&lt;/strong&gt; — тексты, которые идут в дополнение к пользовательскому запросу.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Правильная расстановка акцентов в таком препромпте подсказывает нейросети, что именно ей надо сделать, даже если сам пользователь не очень корректно составил свою мысль. Другой, более жизненный, пример — пользователь просто жмет кнопку «перевести», а мы под капотом должны составить препромпт для корректного перевода.&lt;/p&gt;\n&lt;p&gt;В этом разделе документации мы расскажем, что такое препромпты, как их писать и регистрировать через REST.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/ai/prompts/ai-prompt-register.html\"&gt;ai.prompt.register&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет промпт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/ai/prompts/ai-prompt-unregister.html\"&gt;ai.prompt.unregister&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет промпт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"О промптах для CoPilot"},"router":{"pathname":"api-reference/ai/prompts/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
