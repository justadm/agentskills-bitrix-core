        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Бизнес-процессы могут создавать задания для участников, чтобы получить от них дополнительную информацию. Например, через задание можно согласовать документ в бухгалтерии, утвердить отпуск у руководителя или запросить договор у юриста. Пользователи видят свои задания в Битрикс24 и получают уведомления.&lt;/p&gt;\n&lt;p&gt;Существует четыре типа заданий:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Утверждение документа&lt;/li&gt;\n&lt;li&gt;Ознакомление с документом&lt;/li&gt;\n&lt;li&gt;Запрос дополнительной информации&lt;/li&gt;\n&lt;li&gt;Запрос дополнительной информации с отклонением&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/bizproc/bizproc-task/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/7451037/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Задания бизнес-процессов&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"vypolnit-zadanie\"&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/index.html#vypolnit-zadanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Выполнить задание&lt;/span&gt;&lt;/a&gt;Выполнить задание&lt;/h2&gt;\n&lt;p&gt;Выполнить задание бизнес-процесса по его идентификатору можно методом &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-complete.html\"&gt;bizproc.task.complete&lt;/a&gt;. Для получения идентификатора задания &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ow0b7sjm\"&gt;TASK_ID&lt;/code&gt; используется метод &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;bizproc.task.list&lt;/a&gt;. Выполнять можно только свои задания.&lt;/p&gt;\n&lt;p&gt;Задания с запросом дополнительной информации содержат поля, которые пользователь должен заполнить. Чтобы выполнить такое задание, передайте в объекте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d1sanzij\"&gt;FIELDS&lt;/code&gt; значения полей в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2slbmzm4\"&gt;{\"field_1\": \"value_1\", ... , \"field_N\": \"value_N\"}&lt;/code&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e81y47mu\"&gt;field_N&lt;/code&gt; — символьный идентификатор поля задания&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eu9tzivd\"&gt;value_N&lt;/code&gt; — значение поля&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Какие поля нужно заполнить, можно узнать из ответа метода &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;bizproc.task.list&lt;/a&gt; Объект &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c8efm7sh\"&gt;\"PARAMETERS\": \"Fields\"&lt;/code&gt; содержит описания всех полей задания.&lt;/p&gt;\n&lt;h2 id=\"delegirovat-zadanie\"&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/index.html#delegirovat-zadanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Делегировать задание&lt;/span&gt;&lt;/a&gt;Делегировать задание&lt;/h2&gt;\n&lt;p&gt;Задание можно делегировать другому сотруднику методом &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-delegate.html\"&gt;bizproc.task.delegate&lt;/a&gt;. Для этого укажите в методе идентификатор задания &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h92dhfoc\"&gt;TASK_IDS&lt;/code&gt; и идентификаторы пользователей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;текущего исполнителя &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m6pd31fg\"&gt;FROM_USER_ID&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;нового исполнителя &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vs21pg80\"&gt;TO_USER_ID&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Получить идентификатор задания можно методом &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;bizproc.task.list&lt;/a&gt;, а идентификатор пользователя — методом &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ancostil\"&gt;bizproc&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;bizproc.task.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список заданий бизнес-процессов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-complete.html\"&gt;bizproc.task.complete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Выполняет задание бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-delegate.html\"&gt;bizproc.task.delegate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Делегирует задание бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Выполнить задание","href":"api-reference/bizproc/bizproc-task/index.html#vypolnit-zadanie","level":2},{"title":"Делегировать задание","href":"api-reference/bizproc/bizproc-task/index.html#delegirovat-zadanie","level":2},{"title":"Обзор методов","href":"api-reference/bizproc/bizproc-task/index.html#all-methods","level":2}],"title":"Задания бизнес-процессов: обзор методов"},"router":{"pathname":"api-reference/bizproc/bizproc-task/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
