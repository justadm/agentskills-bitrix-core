        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/bizproc/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Бизнес-процессы в Битрикс24 представляют собой low-code инструмент, который позволяет автоматизировать повседневные задачи без необходимости глубоких знаний в программировании. Пользователи могут легко настроить различные операции, используя уже готовые к использованию действия.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/bizproc/_images/sequence_templ3_sm.png\" alt=\"Дизайнер бизнес-процессов\" title=\"Дизайнер бизнес-процессов\" /&gt;&lt;/p&gt;\n&lt;p&gt;Вы найдете эти автоматизированные процессы и сможете запустить их прямо из таких разделов, как &lt;a href=\"api-reference/log/index.html\"&gt;Лента новостей&lt;/a&gt;, &lt;a href=\"api-reference/crm/index.html\"&gt;CRM&lt;/a&gt;, &lt;a href=\"api-reference/disk/index.html\"&gt;Диск&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html\"&gt;Смарт-процессы&lt;/a&gt; и &lt;a href=\"api-reference/lists/index.html\"&gt;Универсальные списки&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы глубже понять работу бизнес-процессов, смотрите &lt;a href=\"https://helpdesk.bitrix24.ru/open/3092117/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;видео-курс&lt;/a&gt;, который подробно объясняет их функционал как для пользователей, так и для администраторов.&lt;/p&gt;\n&lt;p&gt;Бизнес-процессы могут автоматически запускаться при наступлении определенных событий (например, при добавлении новой сделки в CRM) или по инициативе пользователя (как процесс согласования отпуска через Ленту новостей).&lt;/p&gt;\n&lt;p&gt;Кроме бизнес-процессов, в Битрикс24 доступны &lt;a href=\"https://helpdesk.bitrix24.ru/open/16547618/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;роботы&lt;/a&gt; — это ещё более простой способ автоматизации, особенно удобный для обычных пользователей. Роботы активно применяют в CRM и управлении задачами.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/bizproc/_images/robots.png\" alt=\"Настройка роботов\" title=\"Настройка роботов\" /&gt;&lt;/p&gt;\n&lt;h2 id=\"vostrebovannye-scenarii-s-ispolzovaniem-rest-api\"&gt;&lt;a href=\"api-reference/bizproc/index.html#vostrebovannye-scenarii-s-ispolzovaniem-rest-api\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Востребованные сценарии с использованием REST API&lt;/span&gt;&lt;/a&gt;Востребованные сценарии с использованием REST API&lt;/h2&gt;\n&lt;p&gt;С помощью соответствующих методов вы сможете:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Добавлять в Битрикс24 готовые отраслевые &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;шаблоны бизнес-процессов&lt;/a&gt;, принятых в определенных сферах бизнеса или определенных типах компаний&lt;/li&gt;\n&lt;li&gt;Предлагать свои сценарии автоматического &lt;a href=\"api-reference/bizproc/bizproc-workflow-start.html\"&gt;запуска бизнес-процессов&lt;/a&gt; (например, формирование объяснительной записки в случае серьёзного нарушения срока проекта и т.д.)&lt;/li&gt;\n&lt;li&gt;Предлагать запуск бизнес-процессов в своих &lt;a href=\"api-reference/widgets/index.html\"&gt;виджетах&lt;/a&gt;, если стандартные интерфейсы не предлагают пользователю такой возможности&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Вы можете расширить возможности пользовательской автоматизации Битрикс24, добавив в Битрикс24 свои &lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-add.html\"&gt;действия бизнес-процессов&lt;/a&gt; и &lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-add.html\"&gt;роботов&lt;/a&gt;, которые смогут:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Отправлять документы во внешние системы&lt;/li&gt;\n&lt;li&gt;Оформлять или модифицировать заказы во внешнем интернет-магазине&lt;/li&gt;\n&lt;li&gt;Передавать в Битрикс24 данные из внешних систем&lt;/li&gt;\n&lt;li&gt;Запускать готовые внешние процессы (например, подключать специального внешнего чатбота к диалогу с клиентом, когда сделка перешла в стадию согласования доставки)&lt;/li&gt;\n&lt;li&gt;Передавать данные об оплате во внешнюю сквозную аналитику&lt;/li&gt;\n&lt;li&gt;Выполнять законченный бизнес сценарий (например, формировать сложный счёт или собирать данные из всех сделок одного клиента и возвращать сумму для дальнейшего использования)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Рекомендации&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;Добавляйте именно роботов вместо действий бизнес-процессов, поскольку каждый зарегистрированный робот также может быть использован и в качестве действия бизнес-процесса. Кроме того, ваши роботы будут доступны в &lt;a href=\"https://helpdesk.bitrix24.ru/open/13281632/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Умных сценариях&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Если вы хотите отправлять какие-то изменения во внешнюю систему при смене статусов сделок или лидов, лучше &lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-add.html\"&gt;зарегистрировать робота&lt;/a&gt;, которого пользователь сам разместит на нужной ему стадии, вместо перехвата события на &lt;a href=\"api-reference/crm/deals/events/on-crm-deal-add.html\"&gt;изменение сделки&lt;/a&gt; или &lt;a href=\"api-reference/crm/leads/events/on-crm-lead-add.html\"&gt;лида&lt;/a&gt;. Это избавит вас от необходимости делать интерфейс настройки соответствия стадий лидов и сделок со статусами или событиями внешней системы и значительно упростит разработку&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"osobennosti-funkcionala-biznes-processov\"&gt;&lt;a href=\"api-reference/bizproc/index.html#osobennosti-funkcionala-biznes-processov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности функционала бизнес-процессов&lt;/span&gt;&lt;/a&gt;Особенности функционала бизнес-процессов&lt;/h2&gt;\n&lt;p&gt;Важно понимать терминологию и взаимосвязи между объектами, реализующими функционал бизнес-процессов.&lt;/p&gt;\n&lt;h3 id=\"shablon-biznes-processa\"&gt;&lt;a href=\"api-reference/bizproc/index.html#shablon-biznes-processa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаблон бизнес-процесса&lt;/span&gt;&lt;/a&gt;Шаблон бизнес-процесса&lt;/h3&gt;\n&lt;p&gt;Это, собственно, логическая схема, алгоритм, реализующий нужную бизнес-логику с помощью отдельных действий и операций, доступных в дизайнере бизнес-процессов.&lt;/p&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;Шаблон&lt;/a&gt; всегда привязан к некому &lt;strong&gt;базовому объекту&lt;/strong&gt;, данными которого он будет оперировать. Например, шаблон может быть привязан к сделкам CRM. В этом случае, базовым объектом будет являться конкретная сделка, для которой будет запущен бизнес-процесс.&lt;/p&gt;\n&lt;p&gt;Привязка к базовому объекту также определяет контекст запуска бизнес-процесса: скажем, нельзя запустить бизнес-процесс для лида, на основе шаблона, сделанного для сделки.&lt;/p&gt;\n&lt;p&gt;Объектами могут выступать лиды, контакты, компании, счета и коммерческие предложения в CRM, элементы пользовательских типов объектов (смарт-процессы), файлы Битрикс24 Диск и другие.&lt;/p&gt;\n&lt;p&gt;У шаблона бизнес-процесса могут быть входные параметры, которые должен будет заполнить пользователь (или ваш программный код) при запуске бизнес-процесса на основе выбранного шаблона.&lt;/p&gt;\n&lt;p&gt;Помимо входных параметров можно также использовать внутренние переменные. Разработчик шаблона должен добавить их в настройках шаблона.&lt;/p&gt;\n&lt;p&gt;Важно понимать, что, говоря о входных параметрых и переменных, мы говорим об «описаниях». Но реальные значения у параметров и переменных возникают только в случае запуска реального бизнес-процесса.&lt;/p&gt;\n&lt;h3 id=\"biznes-processy\"&gt;&lt;a href=\"api-reference/bizproc/index.html#biznes-processy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Бизнес-процессы&lt;/span&gt;&lt;/a&gt;Бизнес-процессы&lt;/h3&gt;\n&lt;p&gt;Бизнес-процесс — это, фактически, «живой» экземпляр, создаваемый из шаблона в момент &lt;a href=\"api-reference/bizproc/bizproc-workflow-start.html\"&gt;запуска&lt;/a&gt; для конкретного базового объекта. Очевидно, что несколько бизнес-процессов могут быть запущены параллельно для разных базовых объектов.&lt;/p&gt;\n&lt;p&gt;Когда бизнес-процесс запущен, то для него создаётся копия шаблона бизнес-процесса, которая остаётся неизменной до завершения бизнес-процесса. Если в течение выполнения бизнес-процесса пользователь будет вносить изменения в шаблон, это никак не отразится на логике уже запущенного бизнес-процесса.&lt;/p&gt;\n&lt;p&gt;Значения входных параметров и внутренних переменных точно также имеют свои конкретные значения для каждого отдельного бизнес-процесса и меняются только для него.&lt;/p&gt;\n&lt;h3 id=\"zadaniya-biznes-processov\"&gt;&lt;a href=\"api-reference/bizproc/index.html#zadaniya-biznes-processov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Задания бизнес-процессов&lt;/span&gt;&lt;/a&gt;Задания бизнес-процессов&lt;/h3&gt;\n&lt;p&gt;Во время выполнения бизнес-процесс может использовать особые действия — задания для участников бизнес-процесса, когда для логики бизнес-процесса требуется получить от пользователя какую-то дополнительную информацию, например, согласовать документ, загрузить какой-то файл и так далее.&lt;/p&gt;\n&lt;p&gt;Такие действия порождают &lt;strong&gt;задания бизнес-процессов&lt;/strong&gt;. Пользователи, которые получили задания, видят соответствующую информацию в Битрикс24, а также получают нотификации. &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;Текущие задания&lt;/a&gt; для пользователя можно также получить с помощью соответствующего метода REST API для автоматической обработки.&lt;/p&gt;\n&lt;h3 id=\"dejstviya-biznes-processov\"&gt;&lt;a href=\"api-reference/bizproc/index.html#dejstviya-biznes-processov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Действия бизнес-процессов&lt;/span&gt;&lt;/a&gt;Действия бизнес-процессов&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Действия&lt;/strong&gt; бизнес-процесса, это «кубики», из которых строится шаблон бизнес-процесса. Как правило, такие они представляют собой обособленные атомарные операции вроде «Создать задачу», «Сформировать счет», «Изменить значение поля документа» и так далее.&lt;/p&gt;\n&lt;p&gt;Действия бизнес-процессов могут иметь входные параметры, которые пользователь сможет задать в дизайнере бизнес-процессов во время разработки нужного шаблона.&lt;/p&gt;\n&lt;p&gt;Кроме того, действия могут возвращать результирующие данные «обратно» в бизнес-процесс. Эти данные проектировщик бизнес-процесса сможет использовать в качестве входных параметров для последующих действий.&lt;/p&gt;\n&lt;p&gt;С помощью REST API можно &lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-add.html\"&gt;добавлять свои действия&lt;/a&gt; бизнес-процессов в Битрикс24.&lt;/p&gt;\n&lt;h3 id=\"roboty\"&gt;&lt;a href=\"api-reference/bizproc/index.html#roboty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Роботы&lt;/span&gt;&lt;/a&gt;Роботы&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Роботы&lt;/strong&gt; представляют собой объекты, аналогичные действиям бизнес-процессов с той лишь разницей, что в основном они используются не в дизайнере бизнес-процессов, а в специальных интерфейсах CRM и задач.&lt;/p&gt;\n&lt;p&gt;Роботы так же могут иметь входные параметры, значения которых будет задавать пользователь, настраивающих роботов в воронках лидов, сделок или в умных сценариях. И также могут возвращать значения для использования в качестве входных параметров последующих роботов.&lt;/p&gt;\n&lt;p&gt;С помощью REST API можно &lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-add.html\"&gt;добавлять своих роботов&lt;/a&gt; в Битрикс24. Мы рекомендуем добавлять роботов вместо действий бизнес-процессов, поскольку роботы могут быть использованы внутри дизайнера бизнес-процессов, а значит, вы добавите свой функционал и в настройки роботов, и в дизайнер бизнес-процессов сразу.&lt;/p&gt;\n&lt;h2 id=\"rekomenduemaya-posledovatelnost-izucheniya\"&gt;&lt;a href=\"api-reference/bizproc/index.html#rekomenduemaya-posledovatelnost-izucheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Рекомендуемая последовательность изучения&lt;/span&gt;&lt;/a&gt;Рекомендуемая последовательность изучения&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Добавьте &lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-add.html\"&gt;своего робота&lt;/a&gt; в Битрикс24&lt;/li&gt;\n&lt;li&gt;Научитесь &lt;a href=\"api-reference/bizproc/bizproc-workflow-start.html\"&gt;запускать готовый бизнес-процесс&lt;/a&gt; или &lt;a href=\"api-reference/bizproc/bizproc-workflow-kill.html\"&gt;останавливать&lt;/a&gt; уже запущенный&lt;/li&gt;\n&lt;li&gt;Узнайте, как &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;добавлять свой шаблон&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Узнайте, как получить список текущих &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;заданий бизнес-процесса&lt;/a&gt;, автоматически их &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-complete.html\"&gt;завершать&lt;/a&gt; за пользователя и &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-delegate.html\"&gt;делегировать&lt;/a&gt; другому пользователю&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/bizproc/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-workflow-start.html\"&gt;bizproc.workflow.start&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запускает новый бизнес-процесс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-workflow-instances.html\"&gt;bizproc.workflow.instances&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список запущенных бизнес-процессов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-workflow-kill.html\"&gt;bizproc.workflow.kill&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет запущенный бизнес-процесс вместе со всеми данными процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-workflow-terminate.html\"&gt;bizproc.workflow.terminate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прерывает выполнение бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"shablony-biznes-processov\"&gt;&lt;a href=\"api-reference/bizproc/index.html#shablony-biznes-processov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаблоны бизнес-процессов&lt;/span&gt;&lt;/a&gt;Шаблоны бизнес-процессов&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;bizproc.workflow.template.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый шаблон бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html\"&gt;bizproc.workflow.template.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующий шаблон бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-delete.html\"&gt;bizproc.workflow.template.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет шаблон бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-list.html\"&gt;bizproc.workflow.template.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список шаблонов бизнес-процессов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"zadaniya-biznes-processov1\"&gt;&lt;a href=\"api-reference/bizproc/index.html#zadaniya-biznes-processov1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Задания бизнес-процессов&lt;/span&gt;&lt;/a&gt;Задания бизнес-процессов&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;bizproc.task.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список заданий бизнес-процессов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-complete.html\"&gt;bizproc.task.complete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Выполняет задание бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-delegate.html\"&gt;bizproc.task.delegate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Делегирует задание бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"roboty-prilozhenij\"&gt;&lt;a href=\"api-reference/bizproc/index.html#roboty-prilozhenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Роботы приложений&lt;/span&gt;&lt;/a&gt;Роботы приложений&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-add.html\"&gt;bizproc.robot.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Регистрирует нового робота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-update.html\"&gt;bizproc.robot.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля уже добавленного робота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-list.html\"&gt;bizproc.robot.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список роботов, зарегистрированных приложением&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-robot-delete.html\"&gt;bizproc.robot.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет зарегистрированного робота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-robot/bizproc-event-send.html\"&gt;bizproc.event.send&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает действию выходные параметры, заданные в описании действия&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"dejstviya-prilozhenij\"&gt;&lt;a href=\"api-reference/bizproc/index.html#dejstviya-prilozhenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Действия приложений&lt;/span&gt;&lt;/a&gt;Действия приложений&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-add.html\"&gt;bizproc.activity.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новое действие для использования в бизнес-процессах&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-update.html\"&gt;bizproc.activity.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля уже добавленного действия&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-list.html\"&gt;bizproc.activity.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список установленных приложением действий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-log.html\"&gt;bizproc.activity.log&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Записывает информацию в лог бизнес-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/bizproc-activity/bizproc-activity-delete.html\"&gt;bizproc.activity.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет установленное приложением действие&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Востребованные сценарии с использованием REST API","href":"api-reference/bizproc/index.html#vostrebovannye-scenarii-s-ispolzovaniem-rest-api","level":2},{"title":"Особенности функционала бизнес-процессов","href":"api-reference/bizproc/index.html#osobennosti-funkcionala-biznes-processov","level":2,"items":[{"title":"Шаблон бизнес-процесса","href":"api-reference/bizproc/index.html#shablon-biznes-processa","level":3},{"title":"Бизнес-процессы","href":"api-reference/bizproc/index.html#biznes-processy","level":3},{"title":"Задания бизнес-процессов","href":"api-reference/bizproc/index.html#zadaniya-biznes-processov","level":3},{"title":"Действия бизнес-процессов","href":"api-reference/bizproc/index.html#dejstviya-biznes-processov","level":3},{"title":"Роботы","href":"api-reference/bizproc/index.html#roboty","level":3}]},{"title":"Рекомендуемая последовательность изучения","href":"api-reference/bizproc/index.html#rekomenduemaya-posledovatelnost-izucheniya","level":2},{"title":"Обзор методов","href":"api-reference/bizproc/index.html#all-methods","level":2,"items":[{"title":"Шаблоны бизнес-процессов","href":"api-reference/bizproc/index.html#shablony-biznes-processov","level":3},{"title":"Задания бизнес-процессов","href":"api-reference/bizproc/index.html#zadaniya-biznes-processov1","level":3},{"title":"Роботы приложений","href":"api-reference/bizpro
