            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fqvthywe\"&gt;bizproc&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод обновляет шаблон бизнес-процесса.&lt;/p&gt;\n&lt;p&gt;С его помощью можно обновить шаблоны, которые были созданы методом &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;bizproc.workflow.template.add&lt;/a&gt;. Эти шаблоны привязаны к приложению и могут быть обновлены только в контексте того же &lt;a href=\"settings/app-installation/index.html\"&gt;приложения&lt;/a&gt;, которым они были созданы.&lt;/p&gt;\n&lt;h2 id=\"parametry-metoda\"&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html#parametry-metoda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры метода&lt;/span&gt;&lt;/a&gt;Параметры метода&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t6a8mll4\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ID&lt;/strong&gt;*&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hrt70571\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор шаблона, который нужно обновить&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;FIELDS&lt;/strong&gt;*&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p0ju5tol\"&gt;object&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Объект с &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html#parametr-fields\"&gt;полями&lt;/a&gt; шаблона бизнес-процесса.&lt;/p&gt;\n&lt;p&gt;Обновить можно поля: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bi9za8ox\"&gt;NAME&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wpp3vp4d\"&gt;DESCRIPTION&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xrb9ij5g\"&gt;TEMPLATE_DATA&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c58w74rp\"&gt;AUTO_EXECUTE&lt;/code&gt;. При попытке обновить &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-list.html#fields\"&gt;другие поля&lt;/a&gt; шаблона, ошибок не возникнет, но эти поля обновлены не будут&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"parametr-fields\"&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html#parametr-fields\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметр FIELDS&lt;/span&gt;&lt;/a&gt;Параметр FIELDS&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fwznbogq\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;NA е&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0035wgv7\"&gt;ACCESS_DENIED&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Application context required&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Токен доступа не из приложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5sekqc8u\"&gt;ACCESS_DENIED&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Access denied!&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Метод запустил не администратор&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-byi5u15v\"&gt;ERROR_TEMPLATE_VALIDATION_FAILURE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;No fields to update.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не указаны поля для обновления&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8cvh1vlw\"&gt;ERROR_TEMPLATE_NOT_FOUND&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Workflow template not found.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не найден шаблон с заданным &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n6x96u8q\"&gt;ID&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7r0x6w1o\"&gt;ERROR_TEMPLATE_NOT_OWNER&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;You can update ONLY templates created by current application&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Данный шаблон нельзя редактировать через это приложение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zvok690d\"&gt;ERROR_TEMPLATE_VALIDATION_FAILURE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Empty template name!&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Указано пустое название шаблона&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-umfua5eo\"&gt;ERROR_TEMPLATE_VALIDATION_FAILURE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Incorrect field AUTO_EXECUTE!&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Указан неверный код автозапуска&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2v6cusux\"&gt;ERROR_TEMPLATE_VALIDATION_FAILURE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Incorrect field TEMPLATE_DATA!&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Указаны неверные данные шаблона&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"statusy-i-kody-sistemnyh-oshibok\"&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html#statusy-i-kody-sistemnyh-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Статусы и коды системных ошибок&lt;/span&gt;&lt;/a&gt;Статусы и коды системных ошибок&lt;/h3&gt;\n&lt;p&gt;HTTP-статус: &lt;strong&gt;20х&lt;/strong&gt;, &lt;strong&gt;40x&lt;/strong&gt;, &lt;strong&gt;50x&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Описанные ниже ошибки могут возникнуть при вызове любого метода&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Статус&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Код&lt;/strong&gt;&lt;br /&gt;\n&lt;strong&gt;Текст ошибки&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9vlf3bo2\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y4ieobmq\"&gt;INTERNAL_SERVER_ERROR&lt;/code&gt;&lt;br /&gt;\nInternal server error&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-37sis7le\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-drmo6hvl\"&gt;ERROR_UNEXPECTED_ANSWER&lt;/code&gt;&lt;br /&gt;\nServer returned an unexpected response&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j8k64uyu\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7rnecg58\"&gt;QUERY_LIMIT_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nToo many requests&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышен &lt;a href=\"/limits.html\"&gt;лимит на интенсивность запросов&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qyc3d8r2\"&gt;405&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vygwyiil\"&gt;ERROR_BATCH_METHOD_NOT_ALLOWED&lt;/code&gt;&lt;br /&gt;\nMethod is not allowed for batch usage&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текущий метод не разрешен для вызове с помощью &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jm88oldt\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nmdyzxv4\"&gt;ERROR_BATCH_LENGTH_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nMax batch length exceeded&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышена максимальная длина параметров, переданных в метод &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-18ae605s\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gr7xih8a\"&gt;NO_AUTH_FOUND&lt;/code&gt;&lt;br /&gt;\nWrong authorization data&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Неверный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;код вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ypb82848\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1tmjfrco\"&gt;INVALID_REQUEST&lt;/code&gt;&lt;br /&gt;\nHttps required&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Для вызовов методов требуется использовать протокол HTTPS&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-282rn502\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bxzcl2nk\"&gt;OVERLOAD_LIMIT&lt;/code&gt;&lt;br /&gt;\nREST API is blocked due to overload&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API заблокирован из-за перегрузки. Это ручная индивидуальная блокировка, для снятия необходимо обращаться в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w0wsl4ih\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rtp9pej5\"&gt;ACCESS_DENIED&lt;/code&gt;&lt;br /&gt;\nREST API is available only on commercial plans&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API доступен только на коммерческих планах&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8vlizgsb\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j6t5nz38\"&gt;INVALID_CREDENTIALS&lt;/code&gt;&lt;br /&gt;\nInvalid request credentials&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;У пользователя, с чьим &lt;a href=\"/settings/oauth/index.html\"&gt;access-токеном&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхуком&lt;/a&gt; был вызван метод, не хватает прав&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wwzde8ls\"&gt;404&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3z7nu4k5\"&gt;ERROR_MANIFEST_IS_NOT_AVAILABLE&lt;/code&gt;&lt;br /&gt;\nManifest is not available&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Манифест недоступен&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eu00hk8a\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h61mfby3\"&gt;insufficient_scope&lt;/code&gt;&lt;br /&gt;\nThe request requires higher privileges than provided by the webhook token&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запрос требует более высоких привилегий, чем предоставляет токен &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0xqscaud\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6c1v7oyw\"&gt;expired_token&lt;/code&gt;&lt;br /&gt;\nThe access token provided has expired&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Предоставленный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; доступа истек&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1pqpvq30\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8hi0s5b7\"&gt;user_access_error&lt;/code&gt;&lt;br /&gt;\nThe user does not have access to the application&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь не имеет доступа к приложению. Это означает, что приложение установлено, но администратор портала разрешил доступ к этому приложению только конкретным пользователям&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-661hsaoh\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k7e3kfzq\"&gt;PORTAL_DELETED&lt;/code&gt;&lt;br /&gt;\nPortal was deleted&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Публичная часть сайта закрыта. Чтобы открыть публичную часть сайта на коробочной установке отключите опцию «Временное закрытие публичной части сайта». Путь к настройке: &lt;em&gt;Рабочий стол &amp;gt; Настройки &amp;gt; Настройки продукта &amp;gt; Настройки модулей &amp;gt; Главный модуль &amp;gt; Временное закрытие публичной части сайта&lt;/em&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/bizproc/template/index.html\"&gt;Шаблоны бизнес-процессов: обзор методов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;Добавить шаблон бизнес-процесса bizproc.workflow.template.add&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-list.html\"&gt;Получить список шаблонов bizproc.workflow.template.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-delete.html\"&gt;Удалить шаблон бизнес-процесса bizproc.workflow.template.delete&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Параметры метода","href":"api-reference/bizproc/template/bizproc-workflow-template-update.html#parametry-metoda","level":2,"items":[{"title":"Параметр FIELDS","href":"api-reference/bizproc/template/bizproc-workflow-template-update.html#parametr-fields","level":3}]},{"title":"Примеры  кода","href":"api-reference/bizproc/template/bizproc-workflow-template-update.html#primery-koda","level":2},{"title":"Обработка ответа","href":"api-reference/bizproc/template/bizproc-workflow-template-update.html#obrabotka-otveta","level":2,"items":[{"title":"Возвращаемые данные","href":"api-reference/bizproc/template/bizproc-workflow-template-update.html#vozvrashaemye-dannye","level":3}]},{"title":"Обработка ошибок","href":"api-reference/bizproc/template/bizproc-workflow-template-update.html#obrabotka-oshibok","level":2,"items":[{"title":"Возможные коды ошибок","href":"api-reference/bizproc/temp
