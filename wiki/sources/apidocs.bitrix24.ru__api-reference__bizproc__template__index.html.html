        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Шаблон бизнес-процесса — это логическая схема. Она реализует бизнес-логику с помощью действий и операций в дизайнере бизнес-процессов.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/bizproc/template/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/21918154/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать шаблон последовательного бизнес-процесса&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22478438/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как настроить параметры шаблона&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"dobavit-shablon-biznes-processa\"&gt;&lt;a href=\"api-reference/bizproc/template/index.html#dobavit-shablon-biznes-processa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Добавить шаблон бизнес-процесса&lt;/span&gt;&lt;/a&gt;Добавить шаблон бизнес-процесса&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;bizproc.workflow.template.add&lt;/a&gt; добавляет шаблон в Битрикс24 из файла с расширением &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lwx0ucsa\"&gt;.bpt&lt;/code&gt;. Чтобы получить файл, настройте шаблон бизнес-процесса и экспортируйте его.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/bizproc/template/_images/export-bp-template.png\" alt=\"Экспорт шаблона\" /&gt;&lt;/p&gt;\n&lt;p&gt;Полученный файл можно использовать как шаблон в нужном Битрикс24.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22955798/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Дизайнер бизнес-процессов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/5435897/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Экспорт и импорт шаблонов бизнес-процессов&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kontekst-prilozheniya\"&gt;&lt;a href=\"api-reference/bizproc/template/index.html#kontekst-prilozheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Контекст приложения&lt;/span&gt;&lt;/a&gt;Контекст приложения&lt;/h2&gt;\n&lt;p&gt;Система привязывает новый шаблон к &lt;a href=\"settings/app-installation/index.html\"&gt;приложению&lt;/a&gt;. Обновить или удалить шаблоны, созданные методом &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;bizproc.workflow.template.add&lt;/a&gt;, можно только в контексте того приложения, которым они были созданы.&lt;/p&gt;\n&lt;h2 id=\"svyaz-shablona-s-dokumentom\"&gt;&lt;a href=\"api-reference/bizproc/template/index.html#svyaz-shablona-s-dokumentom\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь шаблона с документом&lt;/span&gt;&lt;/a&gt;Связь шаблона с документом&lt;/h2&gt;\n&lt;p&gt;Каждый шаблон связан с базовым объектом, данными которого он управляет. Например, шаблон может быть связан с CRM-сделками. В этом случае базовым объектом будет конкретная сделка, для которой запускается бизнес-процесс.&lt;/p&gt;\n&lt;p&gt;Связь с базовым объектом определяет контекст запуска: нельзя запустить процесс для лида, используя шаблон для сделки.&lt;/p&gt;\n&lt;p&gt;Шаблон связан с документом через параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9bfd6iis\"&gt;DOCUMENT_TYPE&lt;/code&gt;, который представляет собой массив из трех элементов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;идентификатор модуля&lt;/li&gt;\n&lt;li&gt;тип объекта&lt;/li&gt;\n&lt;li&gt;тип документа&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-00hdobmu\"&gt;['crm', 'CCrmDocumentLead', 'LEAD']&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Значения в массиве взаимосвязаны. Если первый элемент — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ix7vb67x\"&gt;'crm'&lt;/code&gt;, остальные должны соответствовать CRM. Важно следить за правильностью значений.&lt;/p&gt;\n&lt;h3 id=\"vozmozhnye-znacheniya\"&gt;&lt;a href=\"api-reference/bizproc/template/index.html#vozmozhnye-znacheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возможные значения&lt;/span&gt;&lt;/a&gt;Возможные значения&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Идентификатор модуля.&lt;/strong&gt; Указывает область применения шаблона бизнес-процесса.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yw5sv5ln\"&gt;crm&lt;/code&gt; — CRM&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2e4bkkh0\"&gt;lists&lt;/code&gt; — Универсальные списки&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h1ogy1m1\"&gt;disk&lt;/code&gt; — Битрикс24 Диск&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Идентификатор объекта.&lt;/strong&gt; Объект в рамках указанного модуля. Например, для CRM объектом может быть лид или сделка.&lt;/p&gt;\n&lt;p&gt;CRM&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-93ihkfj1\"&gt;CCrmDocumentLead&lt;/code&gt; — лиды&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k0jvsmuz\"&gt;CCrmDocumentContact&lt;/code&gt; — контакты&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o0yz1526\"&gt;CCrmDocumentCompany&lt;/code&gt; — компании&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0pmhvs5f\"&gt;CCrmDocumentDeal&lt;/code&gt; — сделки&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-azfje1hc\"&gt;Bitrix\\Crm\\Integration\\BizProc\\Document\\Quote&lt;/code&gt; — коммерческие предложения&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tg4abrkg\"&gt;Bitrix\\Crm\\Integration\\BizProc\\Document\\SmartInvoice&lt;/code&gt; — счета&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s9dt08qh\"&gt;Bitrix\\Crm\\Integration\\BizProc\\Document\\Dynamic&lt;/code&gt; — смарт-процессы&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Списки&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u295irrf\"&gt;BizprocDocument&lt;/code&gt; — процессы в ленте новостей&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8yhyfknu\"&gt;Bitrix\\Lists\\BizprocDocumentLists&lt;/code&gt; — списки в группах&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Диск&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2nlhqbgi\"&gt;Bitrix\\Disk\\BizProcDocument&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Тип документа.&lt;/strong&gt; Привязка к конкретному документу указанного объекта.&lt;/p&gt;\n&lt;p&gt;CRM&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jw9dpbt8\"&gt;LEAD&lt;/code&gt; — лиды&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-za6qjq3r\"&gt;CONTACT&lt;/code&gt; — контакты&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u47djf2n\"&gt;COMPANY&lt;/code&gt; — компании&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l0169c3b\"&gt;DEAL&lt;/code&gt; — сделки&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q87ye1c2\"&gt;QUOTE&lt;/code&gt; — коммерческие предложения&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8ogn5dnf\"&gt;SMART_INVOICE&lt;/code&gt; — счета&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jnjrgd35\"&gt;DYNAMIC_XXX&lt;/code&gt; — смарт-процессы, где XXX — идентификатор смарт-процесса&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Универсальные списки&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qcxqp5k9\"&gt;iblock_XXX&lt;/code&gt; — информационный блок, где XXX — идентификатор информационного блока&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Диск&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gu3qex7n\"&gt;STORAGE_XXX&lt;/code&gt; — хранилище диска, где XXX — идентификатор хранилища&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"poluchit-spisok-shablonov\"&gt;&lt;a href=\"api-reference/bizproc/template/index.html#poluchit-spisok-shablonov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Получить список шаблонов&lt;/span&gt;&lt;/a&gt;Получить список шаблонов&lt;/h2&gt;\n&lt;p&gt;Для получения списка всех шаблонов портала используется метод &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-list.html\"&gt;bizproc.workflow.template.list&lt;/a&gt;. Чтобы получить список шаблонов приложения, укажите в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-msio287o\"&gt;FILTER&lt;/code&gt; поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-91pof6ba\"&gt;SYSTEM_CODE&lt;/code&gt; и символьный код приложения, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xt8salkg\"&gt;\"SYSTEM_CODE\": \"rest_app_5\"&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/bizproc/template/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-82gih8ye\"&gt;bizproc&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-add.html\"&gt;bizproc.workflow.template.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавить шаблон бизнес-процесса из файла&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-update.html\"&gt;bizproc.workflow.template.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновить шаблон&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-list.html\"&gt;bizproc.workflow.template.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список шаблонов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-delete.html\"&gt;bizproc.workflow.template.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить шаблон&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Добавить шаблон бизнес-процесса","href":"api-reference/bizproc/template/index.html#dobavit-shablon-biznes-processa","level":2},{"title":"Контекст приложения","href":"api-reference/bizproc/template/index.html#kontekst-prilozheniya","level":2},{"title":"Связь шаблона с документом","href":"api-reference/bizproc/template/index.html#svyaz-shablona-s-dokumentom","level":2,"items":[{"title":"Возможные значения","href":"api-reference/bizproc/template/index.html#vozmozhnye-znacheniya","level":3}]},{"title":"Получить список шаблонов","href":"api-reference/bizproc/template/index.html#poluchit-spisok-shablonov","level":2},{"title":"Обзор методов","href":"api-reference/bizproc/template/index.html#all-methods","level":2}],"title":"Шаблоны бизнес-процессов: обзор методов"},"router":{"pathname":"api-reference/bizproc/template/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
