        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;К бронированию ресурса можно добавить клиента: контакт или компанию. На телефонный номер клиента отправляются сообщения о записи: подтверждение, напоминания, запрос обратной связи.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/booking/booking/client/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/booking/booking/client/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Бронирование.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a0c0wdmk\"&gt;ID&lt;/code&gt; брони в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t2ts7562\"&gt;bookingId&lt;/code&gt; методов &lt;a href=\"api-reference/booking/booking/client/index.html\"&gt;booking.v1.booking.client.*&lt;/a&gt;, чтобы добавить или заменить клиента. Получить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3a3fcht1\"&gt;ID&lt;/code&gt; брони можно методами &lt;a href=\"api-reference/booking/booking/booking-v1-booking-add.html\"&gt;создания&lt;/a&gt; или &lt;a href=\"api-reference/booking/booking/booking-v1-booking-list.html\"&gt;фильтрации&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Контакт.&lt;/strong&gt; Чтобы прикрепить к брони контакт, передайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fjc656nm\"&gt;ID&lt;/code&gt; контакта в методе &lt;a href=\"api-reference/booking/booking/client/booking-v1-booking-client-set\"&gt;booking.v1.booking.client.set&lt;/a&gt;. Получить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bqrmejyi\"&gt;ID&lt;/code&gt; контакта можно методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-myvjlbs4\"&gt;entityTypeId = 3&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Компания.&lt;/strong&gt; Чтобы прикрепить к брони компанию, передайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-er0xc18a\"&gt;ID&lt;/code&gt; компании в методе &lt;a href=\"api-reference/booking/booking/client/booking-v1-booking-client-set\"&gt;booking.v1.booking.client.set&lt;/a&gt;. Получить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3fqznjho\"&gt;ID&lt;/code&gt; компании можно методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g8u5och6\"&gt;entityTypeId = 4&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Если клиент новый, предварительно добавьте его в CRM методом &lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;crm.item.add&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iry78p63\"&gt;entityTypeId = 3&lt;/code&gt; для контакта или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-koo06grk\"&gt;entityTypeId = 4&lt;/code&gt; для компании.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/booking/booking/client/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n9fffm3s\"&gt;booking&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/client/booking-v1-booking-client-list.html\"&gt;booking.v1.booking.client.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает контакт и компанию, привязанные к бронированию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/client/booking-v1-booking-client-set.html\"&gt;booking.v1.booking.client.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет контакт или компанию к бронированию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/client/booking-v1-booking-client-unset.html\"&gt;booking.v1.booking.client.unset&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет контакт или компанию из бронирования&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь с другими объектами","href":"api-reference/booking/booking/client/index.html#svyaz-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/booking/booking/client/index.html#all-methods","level":2}],"title":"Клиент в бронировании: обзор методов"},"rout
