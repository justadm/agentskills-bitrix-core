        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Методы бронирования позволяют:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;эффективно использовать ресурсы, перенося клиентов между листом ожидания и бронированием&lt;/li&gt;\n&lt;li&gt;синхронизировать расписание с внешними системами&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/booking/booking/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/23661964/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как записать клиента на услугу&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-bronirovaniya-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/booking/booking/index.html#svyaz-bronirovaniya-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь бронирования  с другими объектами&lt;/span&gt;&lt;/a&gt;Связь бронирования  с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Лист ожидания.&lt;/strong&gt; Передавайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3t1k41z2\"&gt;id&lt;/code&gt; записи из листа ожидания в параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rg62bbyh\"&gt;waitListId&lt;/code&gt; метода &lt;a href=\"api-reference/booking/booking/booking-v1-booking-createfromwaitlist.html\"&gt;booking.v1.booking.createfromwaitlist&lt;/a&gt;, чтобы перенести запись клиента в бронирование на конкретное время.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ресурс.&lt;/strong&gt; Передавайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-54p0rre8\"&gt;id&lt;/code&gt; &lt;a href=\"api-reference/booking/resource/index.html\"&gt;ресурсов&lt;/a&gt;, которые хотите забронировать, в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tid8xp7l\"&gt;resourceIds&lt;/code&gt; методов &lt;a href=\"api-reference/booking/booking/index.html\"&gt;booking.v1.booking.*&lt;/a&gt;. В одной брони может  быть несколько ресурсов с совпадающим временем. Например, можно забронировать одновременно услугу водителя и автомобиль.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Клиент.&lt;/strong&gt; К брони можно прикрепить &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контакт&lt;/a&gt; или &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компанию&lt;/a&gt; из CRM. Передавайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u9t3fiec\"&gt;id&lt;/code&gt; контакта или компании в методах &lt;a href=\"api-reference/booking/booking/client/index.html\"&gt;booking.v1.booking.client.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Сделка.&lt;/strong&gt; К брони можно прикрепить &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделку&lt;/a&gt; CRM. Передавайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4xqx8xy6\"&gt;id&lt;/code&gt; сделки в методах &lt;a href=\"api-reference/booking/booking/external-data/index.html\"&gt;booking.v1.booking.externalData.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/booking/booking/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rtngzcgl\"&gt;booking&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/booking-v1-booking-add.html\"&gt;booking.v1.booking.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет бронирование&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/booking-v1-booking-createfromwaitlist.html\"&gt;booking.v1.booking.createfromwaitlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает бронирование из листа ожидания&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/booking-v1-booking-delete.html\"&gt;booking.v1.booking.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет бронирование&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/booking-v1-booking-get.html\"&gt;booking.v1.booking.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о бронировании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/booking-v1-booking-list.html\"&gt;booking.v1.booking.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список бронирований&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/booking/booking-v1-booking-update.html\"&gt;booking.v1.booking.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет бронирование&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js
