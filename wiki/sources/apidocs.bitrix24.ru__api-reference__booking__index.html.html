            {"data":{"leading":false,"html":"&lt;p&gt;Онлайн-запись — это инструмент для автоматизации бронирования ресурсов: помещений, оборудования, услуг специалистов и так далее. Вы можете переносить клиентов между листом ожидания и бронированием, управлять загруженностью, синхронизировать ресурсы с внешними системами.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/booking/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/23712054/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Онлайн-запись: начало работы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;У онлайн-записи есть три группы методов: ресурсы, лист ожидания, бронирование. Методы связаны между собой:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;ресурсы определяют, что можно забронировать&lt;/li&gt;\n&lt;li&gt;лист ожидания обрабатывает перегрузку&lt;/li&gt;\n&lt;li&gt;методы бронирования фиксируют занятость&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;В коробочных Битрикс24 методы можно использовать с &lt;a href=\"settings/cloud-and-on-premise/on-premise/versions.html\"&gt;версии модуля&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dth0lrz9\"&gt;booking 25.300.0&lt;/code&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"nastrojka-resursov\"&gt;&lt;a href=\"api-reference/booking/index.html#nastrojka-resursov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Настройка ресурсов&lt;/span&gt;&lt;/a&gt;Настройка ресурсов&lt;/h2&gt;\n&lt;p&gt;Ресурсы – это объекты, которые можно забронировать: помещения, техника, услуги. Методы этой группы позволяют:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;создавать, изменять и удалять ресурсы — &lt;a href=\"api-reference/booking/resource/index.html\"&gt;booking.v1.resource.*&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;настраивать типы ресурсов, например, «комната», «автомобиль», «специалист» — &lt;a href=\"api-reference/booking/resource/resource-type/index.html\"&gt;booking.v1.resourceType.*&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;настраивать доступность ресурса по времени — &lt;a href=\"api-reference/booking/resource/slots/index.html\"&gt;booking.v1.resource.slots.*&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"rabota-s-listom-ozhidaniya\"&gt;&lt;a href=\"api-reference/booking/index.html#rabota-s-listom-ozhidaniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с листом ожидания&lt;/span&gt;&lt;/a&gt;Работа с листом ожидания&lt;/h2&gt;\n&lt;p&gt;Используйте лист ожидания, когда нужный ресурс временно недоступен. Методы этой группы позволяют:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;добавлять, изменять и удалять записи  в листе ожидания — &lt;a href=\"api-reference/booking/waitlist/index.html\"&gt;booking.v1.waitlist.*&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;переносить запись из брони в лист ожидания — &lt;a href=\"api-reference/booking/waitlist/booking-v1-waitlist-createfrombooking.html\"&gt;booking.v1.waitlist.createfrombooking&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;управлять связями записей в листе ожидания с клиентами CRM — &lt;a href=\"api-reference/booking/waitlist/client/index.html\"&gt;booking.v1.waitlist.client.*&lt;/a&gt; и другими объектами — &lt;a href=\"api-reference/booking/waitlist/external-data/index.html\"&gt;booking.v1.waitList.externalData.*&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"bronirovanie-resursov\"&gt;&lt;a href=\"api-reference/booking/index.html#bronirovanie-resursov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Бронирование ресурсов&lt;/span&gt;&lt;/a&gt;Бронирование ресурсов&lt;/h2&gt;\n&lt;p&gt;Бронирование — это подтвержденная запись на ресурс. Методы этой группы позволяют:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;создавать, изменять и отменять бронирования — &lt;a href=\"api-reference/booking/booking/index.html\"&gt;booking.v1.booking.*&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;создавать бронь из записи в лист ожидания — &lt;a href=\"api-reference/booking/booking/booking-v1-booking-createfromwaitlist.html\"&gt;booking.v1.booking.createfromwaitlist&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;управлять связями брони с клиентами CRM — &lt;a href=\"api-reference/booking/booking/client/index.html\"&gt;booking.v1.booking.client.*&lt;/a&gt; и другими объектами — &lt;a href=\"api-reference/booking/booking/external-data/index.html\"&gt;booking.v1.booking.externalData.*&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/booking/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q53wuv2j\"&gt;booking&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"resurs\"&gt;&lt;a href=\"api-reference/booking/index.html#resurs\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ресурс&lt;/span&gt;&lt;/a&gt;Ресурс&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/booking-v1-resource-add.html\"&gt;booking.v1.resource.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/booking-v1-resource-delete.html\"&gt;booking.v1.resource.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/booking-v1-resource-get.html\"&gt;booking.v1.resource.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/booking-v1-resource-list.html\"&gt;booking.v1.resource.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список ресурсов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/booking-v1-resource-update.html\"&gt;booking.v1.resource.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\"tip-resursa\"&gt;&lt;a href=\"api-reference/booking/index.html#tip-resursa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Тип ресурса&lt;/span&gt;&lt;/a&gt;Тип ресурса&lt;/h4&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-add.html\"&gt;booking.v1.resourceType.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-delete.html\"&gt;booking.v1.resourceType.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-get.html\"&gt;booking.v1.resourceType.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-list.html\"&gt;booking.v1.resourceType.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список типов ресурсов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-update.html\"&gt;booking.v1.resourceType.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\"vremennye-sloty-dlya-resursov\"&gt;&lt;a href=\"api-reference/booking/index.html#vremennye-sloty-dlya-resursov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Временные слоты для ресурсов&lt;/span&gt;&lt;/a&gt;Временные слоты для ресурсов&lt;/h4&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/slots/booking-v1-resource-slots-list.html\"&gt;booking.v1.resource.slots.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает настройку слотов для ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/slots/booking-v1-resource-slots-set.html\"&gt;booking.v1.resource.slots.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает слоты для ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&
