            {"data":{"leading":false,"html":"&lt;p&gt;Типы ресурсов нужны для категоризации объектов бронирования. Например, тип Переговорные объединяет комнаты для встреч, тип Chery — автомобили определенной марки.&lt;/p&gt;\n&lt;p&gt;С помощью типов ресурсов можно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;группировать похожие объекты,&lt;/li&gt;\n&lt;li&gt;настраивать шаблоны уведомлений для клиентов,&lt;/li&gt;\n&lt;li&gt;фильтровать бронирования.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/booking/resource/resource-type/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-tipov-resursov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/booking/resource/resource-type/index.html#svyaz-tipov-resursov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь типов ресурсов  с другими объектами&lt;/span&gt;&lt;/a&gt;Связь типов ресурсов  с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Ресурс.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bhjiasdn\"&gt;id&lt;/code&gt; типа ресурса в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b9w6xtsc\"&gt;typeId&lt;/code&gt; методов &lt;a href=\"api-reference/booking/resource/index.html\"&gt;booking.v1.resource.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"osobennosti-raboty-s-tipami-resursov\"&gt;&lt;a href=\"api-reference/booking/resource/resource-type/index.html#osobennosti-raboty-s-tipami-resursov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности работы с типами ресурсов&lt;/span&gt;&lt;/a&gt;Особенности работы с типами ресурсов&lt;/h2&gt;\n&lt;p&gt;Создать типы ресурсов можно через интерфейс Битрикс24 или методом &lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-add.html\"&gt;booking.v1.resourceType.add&lt;/a&gt;. Изменить и удалить — только методами &lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-update.html\"&gt;booking.v1.resourceType.update&lt;/a&gt; и &lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-delete.html\"&gt;booking.v1.resourceType.delete&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/booking/resource/resource-type/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-havu6lvu\"&gt;booking&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-add.html\"&gt;booking.v1.resourceType.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-update.html\"&gt;booking.v1.resourceType.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-get.html\"&gt;booking.v1.resourceType.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-list.html\"&gt;booking.v1.resourceType.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список типов ресурсов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/resource-type/booking-v1-resourcetype-delete.html\"&gt;booking.v1.resourceType.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет тип ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь типов ресурсов  с другими объектами","href":"api-reference/booking/resource/resource-type/index.html#svyaz-tipov-resursov-s-drugimi-obuektami","level":2},{"title":"Особенности работы с типами ресурсов","href":"api-reference/booking/resource/resource-type/index.html#osobennosti-raboty-s-tipami-resursov","level":2},{"title":"Обзор методов","href":"api-reference/booking/resource/resource-type/index.html#all-methods","level":2}],"title":"Типы ресурсов: обзор методов"},"router":{"pathname":"api-reference/booking/resource/resource-type/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
