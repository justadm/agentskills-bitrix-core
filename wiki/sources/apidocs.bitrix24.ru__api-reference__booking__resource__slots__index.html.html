        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Слоты — это промежутки времени, в которые можно забронировать ресурс.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/booking/resource/slots/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-slotov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/booking/resource/slots/index.html#svyaz-slotov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь слотов  с другими объектами&lt;/span&gt;&lt;/a&gt;Связь слотов  с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Ресурс.&lt;/strong&gt; Чтобы задать промежутки времени для бронирования, укажите  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f681d044\"&gt;id&lt;/code&gt; ресурса в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lds4afe5\"&gt;resourceId&lt;/code&gt; метода &lt;a href=\"api-reference/booking/resource/slots/booking-v1-resource-slots-set.html\"&gt;booking.v1.resource.slots.set&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"osobennosti-slotov\"&gt;&lt;a href=\"api-reference/booking/resource/slots/index.html#osobennosti-slotov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности слотов&lt;/span&gt;&lt;/a&gt;Особенности слотов&lt;/h2&gt;\n&lt;p&gt;У слотов есть три временных параметра: период доступности ресурса &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rzbx33c7\"&gt;from&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-toklvg3i\"&gt;to&lt;/code&gt;, длительность записи &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vpnldpu5\"&gt;slotSize&lt;/code&gt;. Временные параметры принимают и возвращают значение в минутах. Расчет времени производите от начала суток 0:00. Для перевода часов в минуты используйте формулу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2bnki977\"&gt;часы × 60 = минуты&lt;/code&gt;, 14:00  = 14 × 60 = 840 минут:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-09k4ym09\"&gt;from: 540&lt;/code&gt; — время для брони доступно с 9:00,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n5z7zpl0\"&gt;to: 1080&lt;/code&gt; — время для брони доступно до 18:00,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zysrwyru\"&gt;slotSize: 60&lt;/code&gt; — длительность записи 1 час.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/booking/resource/slots/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-aqqpxhh5\"&gt;booking&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/slots/booking-v1-resource-slots-set.html\"&gt;booking.v1.resource.slots.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает слоты для ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/slots/booking-v1-resource-slots-list.html\"&gt;booking.v1.resource.slots.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает настройку слотов для ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/booking/resource/slots/booking-v1-resource-slots-unset.html\"&gt;booking.v1.resource.slots.unset&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет слоты для ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь слотов  с другими объектами","href":"api-reference/booking/resource/slots/index.html#svyaz-slotov-s-drugimi-obuektami","level":2},{"title":"Особенности слотов","href":"api-reference/booking/resource/slots/index.html#osobennosti-slotov","level":2},{"title":"Обзор методов","href":"api-reference/booking/resource/slots/index.html#all-methods","level":2}],"title":"Слоты: обзор методов"},"router":{"pathname":"api-reference/booking/resource/slots/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
