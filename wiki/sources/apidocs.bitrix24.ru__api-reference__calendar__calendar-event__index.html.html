        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;События календаря — это запланированные дела или встречи. Они содержат информацию о дате, времени, месте проведения и участниках события. События помогают пользователям управлять расписанием, напоминают о предстоящих делах и встречах.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/calendar/calendar-event/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/5257065/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;как создать событие в календаре&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-sobytiya-kalendarya-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/calendar/calendar-event/index.html#svyaz-sobytiya-kalendarya-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь события календаря с другими объектами&lt;/span&gt;&lt;/a&gt;Связь события календаря с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Событие имеет привязку к пользователю по идентификатору владельца календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hj2unknn\"&gt;ownerId&lt;/code&gt; для типа календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2mfk6g16\"&gt;user&lt;/code&gt;. Если событие — встреча с участниками &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xni9713u\"&gt;is_meeting = 'Y'&lt;/code&gt;, то оно дополнительно привязано к организатору события &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-shhn14eq\"&gt;host&lt;/code&gt; и участникам &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zfkpx2gr\"&gt;attendees&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Событие имеет привязку к группе по идентификатору владельца календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v6jp8sje\"&gt;ownerId&lt;/code&gt; для типа календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jhlevjfs\"&gt;group&lt;/code&gt;. Идентификатор можно получить методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Объекты CRM.&lt;/strong&gt; К событию можно привязать объекты CRM: компании, контакты, лиды и сделки. Чтобы привязать объекты, перечислите их идентификаторы с &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;префиксами&lt;/a&gt; в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pks0pdoi\"&gt;crm_fields&lt;/code&gt;. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qitlzskg\"&gt;C_3&lt;/code&gt; для контакта с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o2pyu60k\"&gt;id = 3&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;создания нового элемента CRM&lt;/a&gt; или методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;получения списка элементов&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17525000/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Календарь Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"spisok-sobytij\"&gt;&lt;a href=\"api-reference/calendar/calendar-event/index.html#spisok-sobytij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Список событий&lt;/span&gt;&lt;/a&gt;Список событий&lt;/h2&gt;\n&lt;p&gt;Получить список событий календаря можно двумя методами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-get.html\"&gt;calendar.event.get&lt;/a&gt; — возвращает список любых событий, прошедших и будущих, за указанный период&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-get-nearest.html\"&gt;calendar.event.get.nearest&lt;/a&gt; — возвращает список только будущих событий за указанное количество дней&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"uchastie-polzovatelya-v-sobytii\"&gt;&lt;a href=\"api-reference/calendar/calendar-event/index.html#uchastie-polzovatelya-v-sobytii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Участие пользователя в событии&lt;/span&gt;&lt;/a&gt;Участие пользователя в событии&lt;/h2&gt;\n&lt;p&gt;Пользователь решает, участвовать в событии или нет. Решение фиксируется в статусе участия и может иметь значение:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xr3r4sw0\"&gt;Y&lt;/code&gt; — согласен&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sbltaugp\"&gt;N&lt;/code&gt; — отказался&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gpsu4r06\"&gt;Q&lt;/code&gt; — приглашен, но еще не ответил&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Узнать статус участия текущего пользователя в событии можно методом &lt;a href=\"api-reference/calendar/calendar-event/calendar-meeting-status-get.html\"&gt;calendar.meeting.status.get&lt;/a&gt;. Установить статус — методом &lt;a href=\"api-reference/calendar/calendar-event/calendar-meeting-status-set.html\"&gt;calendar.meeting.status.set&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/calendar/calendar-event/calendar-accessibility-get.html\"&gt;calendar.accessibility.get&lt;/a&gt; получает занятость пользователей из списка.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/calendar/calendar-event/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pfyuwlt5\"&gt;calendar&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-3dn0c6uh\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"cs0te2uu\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-add.html\"&gt;calendar.event.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавить событие&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-update.html\"&gt;calendar.event.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновить событие&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-get-by-id.html\"&gt;calendar.event.getById&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить событие по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dh33scus\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-get.html\"&gt;calendar.event.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список событий календаря&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-get-nearest.html\"&gt;calendar.event.getNearest&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список будущих событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-event-delete.html\"&gt;calendar.event.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить событие&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-meeting-status-get.html\"&gt;calendar.meeting.status.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить статус участия текущего пользователя в событии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-meeting-status-set.html\"&gt;calendar.meeting.status.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Установить статус участия в событии для текущего пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/calendar-accessibility-get.html\"&gt;calendar.accessibility.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить занятость пользователей из списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"u9try4se\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/events/on-calendar-entry-add.html\"&gt;OnCalendarEntryAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/events/on-calendar-entry-update.html\"&gt;OnCalendarEntryUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-event/events/on-calendar-entry-delete.html\"&gt;OnCalendarEntryDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Связь события календаря с другими объектами","href":"api-reference/calendar/calendar-event/index.html#svyaz-sobytiya-kalendarya-s-drugimi-obuektami","level":2},{"title":"Список событий","href":"api-reference/calendar/calendar-event/index.html#spisok-sobytij","level":2},{"title":"Участие пользователя в событии","href":"api-reference/calendar/calendar-event/index.html#uchastie-polzovatelya-v-sobytii","level":2},{"title":"Обзор методов и событий","href":"api-reference/calendar/calendar-event/index.html#all-methods","level":2}],"title":"События календаря: обзор методов"},"router":{"pathname":"api-reference/calendar/calendar-event/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
