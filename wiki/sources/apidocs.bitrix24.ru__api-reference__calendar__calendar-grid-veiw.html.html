            {"data":{"leading":false,"html":"&lt;p&gt;В календарь можно встроить приложение. В верхней части календаря в списке видов отображения есть место для встройки &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vg7zi9ln\"&gt;CALENDAR_GRIDVIEW&lt;/code&gt;, куда можно добавить свой пункт.&lt;/p&gt;\n&lt;p&gt;Подробнее о виджете — в статье &lt;a href=\"api-reference/widgets/calendar.html\"&gt;Виджет в календаре&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-privyazat-prilozhenie-k-kalendaryu\"&gt;&lt;a href=\"api-reference/calendar/calendar-grid-veiw.html#kak-privyazat-prilozhenie-k-kalendaryu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как привязать приложение к календарю&lt;/span&gt;&lt;/a&gt;Как привязать приложение к календарю&lt;/h2&gt;\n&lt;p&gt;Исспользуйте метод &lt;a href=\"api-reference/widgets/placement-bind.html\"&gt;placement.bind&lt;/a&gt;, чтобы связать приложение с календарем. Параметры &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-np3vknbf\"&gt;PLACEMENT&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r6jn3z48\"&gt;HANDLER&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w3t4l81w\"&gt;TITLE&lt;/code&gt; определяют, где и как будет отображаться ваше приложение.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-w5fh133h\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"kk5owvfa\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt;\n{\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n\t\t&lt;span class=\"hljs-string\"&gt;'placement.bind'&lt;/span&gt;,\n\t\t{\n\t\t\t&lt;span class=\"hljs-attr\"&gt;PLACEMENT&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'CALENDAR_GRIDVIEW'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;HANDLER&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'http://your_site/handler.php'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;TITLE&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Custom tab'&lt;/span&gt;\n\t\t}\n\t);\n\t\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; result = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt;;\n\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(result);\n}\n&lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt;( error )\n{\n\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Error:'&lt;/span&gt;, error);\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"25\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19 itle function_ invoke__\"&gt;getResponseData&lt;/span&gt;()\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getResult&lt;/span&gt;();\n\n    &lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'Success: '&lt;/span&gt; . &lt;span class=\"hljs-title function_ invoke__\"&gt;print_r&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;, &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;);\n\n} &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (&lt;span class=\"hljs-built_in\"&gt;Throwable&lt;/span&gt; &lt;span class=\"hljs-variable\"&gt;$e&lt;/span&gt;) {\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;error_log&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$e&lt;/span&gt;-&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;());\n    &lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'Error binding placement: '&lt;/span&gt; . &lt;span class=\"hljs-variable\"&gt;$e&lt;/span&gt;-&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;();\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"28\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-28\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-28\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-28.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"j210b5y2\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"BX24.js\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'placement.bind'&lt;/span&gt;,\n    {\n        &lt;span class=\"hljs-attr\"&gt;PLACEMENT&lt;/span&gt;:&lt;span class=\"hljs-string\"&gt;'CALENDAR_GRIDVIEW'&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;HANDLER&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'http://your_site/handler.php'&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;TITLE&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Custom tab'&lt;/span&gt;\n    },\n    &lt;span class=\"hljs-function\"&gt;(&lt;span class=\"hljs-params\"&gt;result&lt;/span&gt;) =&amp;gt;&lt;/span&gt; {&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(result)}\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"31\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-31\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-31\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-31.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;p&gt;Если в приложении вывести все параметры, которые передаются в запросе к приложению:&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-0mbhtxa3\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"php-crest\" data-diplodoc-key=\"php%20crest\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;PHP CRest&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"v1xolc3h\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"PHP CRest\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"&amp;lt;pre&amp;gt;\"&lt;/span&gt;;\n&lt;span class=\"hljs-title function_ invoke__\"&gt;print_r&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;);\n&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"&amp;lt;/pre&amp;gt;\"&lt;/span&gt;;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"44\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-44\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-44\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-44.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;p&gt;Можно увидеть, что передаются определенные параметры, например диапазон дат, который отображается в календаре:&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-zme6ca0c\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"php-crest-1\" data-diplodoc-key=\"php%20crest\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;PHP CRest&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"ohmm0gzn\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"PHP CRest\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;[PLACEMENT_OPTIONS] =&amp;gt; {\n    &lt;span class=\"hljs-string\"&gt;\"viewRangeFrom\"&lt;/span&gt;:&lt;span class=\"hljs-string\"&gt;\"2018-09-30\"&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;\"viewRangeTo\"&lt;/span&gt;:&lt;span class=\"hljs-string\"&gt;\"2018-11-04\"&lt;/span&gt;\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"57\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation
