            {"data":{"leading":false,"html":"&lt;p&gt;Календарь  помогает пользователям планировать встречи, задачи и мероприятия. Управлять календарями можно с помощью группы методов &lt;a href=\"api-reference/calendar/index.html#base\"&gt;calendar.section.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;События календаря — это запланированные дела или встречи. Для создания, изменения, получения или удаления событий используется группа методов &lt;a href=\"api-reference/calendar/calendar-event/index.html\"&gt;calendar.event.*&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/calendar/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17525000/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;календарь Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-kalendarya-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/calendar/index.html#svyaz-kalendarya-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь календаря с другими объектами&lt;/span&gt;&lt;/a&gt;Связь календаря с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Календарь имеет привязку к пользователю по идентификатору владельца календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7cnlmt1w\"&gt;ownerId&lt;/code&gt; для типа календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c0vumgte\"&gt;user&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Календарь имеет привязку к группе по идентификатору владельца календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-arg26cls\"&gt;ownerId&lt;/code&gt; для типа календаря &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i4sp4rnl\"&gt;group&lt;/code&gt;. Идентификатор можно получить методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"nastrojki-kalendarya\"&gt;&lt;a href=\"api-reference/calendar/index.html#nastrojki-kalendarya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Настройки календаря&lt;/span&gt;&lt;/a&gt;Настройки календаря&lt;/h2&gt;\n&lt;p&gt;В основных настройках календаря указывается рабочий график компании, выходные и праздничные дни. Получить настройки можно методом &lt;a href=\"api-reference/calendar/calendar-settings-get.html\"&gt;calendar.settings.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;В пользовательских настройках сотрудник может указать персональные особенности, например, часовой пояс или показ номеров недель. Получить пользовательские настройки можно методом &lt;a href=\"api-reference/calendar/calendar-user-settings-get.html\"&gt;calendar.user.settings.get&lt;/a&gt;, установить — методом &lt;a href=\"api-reference/calendar/calendar-user-settings-set.html\"&gt;calendar.user.settings.set.&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/7397539/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Настройки календаря&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"bronirovanie-resursov\"&gt;&lt;a href=\"api-reference/calendar/index.html#bronirovanie-resursov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Бронирование ресурсов&lt;/span&gt;&lt;/a&gt;Бронирование ресурсов&lt;/h2&gt;\n&lt;p&gt;В Битрикс24 бронирование ресурсов осуществляется через пользовательское поле CRM типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ww2fm4jd\"&gt;resourcebooking&lt;/code&gt;. Такое поле можно создать в карточках &lt;a href=\"api-reference/crm/leads/userfield/index.html\"&gt;лида&lt;/a&gt; и &lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html\"&gt;сделки&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Отслеживать занятость ресурсов можно в Календаре CRM. Технически ресурс — это секция календаря, а бронирование — это событие календаря.&lt;/p&gt;\n&lt;p&gt;Управляет ресурсами группа методов &lt;a href=\"api-reference/calendar/resource/index.html\"&gt;calendar.resource.*.&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18260410/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Настраиваем бронирование ресурсов в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/calendar/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;Виджеты&lt;/strong&gt;&lt;/h2&gt;\n&lt;p&gt;В календарь можно встроить приложение. В списке видов отображения календаря есть место для встройки &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z9j5fcmt\"&gt;CALENDAR_GRIDVIEW&lt;/code&gt;, куда можно добавить &lt;a href=\"api-reference/widgets/calendar.html\"&gt;свой пункт&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/calendar/calendar-grid-veiw.html\"&gt;Как встроить приложение в календарь CALENDAR_GRIDVIEW&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/calendar/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nt5n9xxg\"&gt;calendar&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"base\"&gt;&lt;a href=\"api-reference/calendar/index.html#base\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-emzf2gei\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"d4rotvo9\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-section-add.html\"&gt;calendar.section.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавить новый календарь&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-section-update.html\"&gt;calendar.section.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновить календарь&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-section-get.html\"&gt;calendar.section.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список календарей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-section-delete.html\"&gt;calendar.section.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить календарь&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-settings-get.html\"&gt;calendar.settings.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить основные настройки календаря&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-user-settings-get.html\"&gt;calendar.user.settings.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить пользовательские настройки календаря&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/calendar-user-settings-set.html\"&gt;calendar.user.settings.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Установить пользовательские настройки календаря&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"b7nyqu7h\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/events/on-calendar-section-add.html\"&gt;OnCalendarSectionAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении секции календаря или ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/events/on-calendar-section-update.html\"&gt;OnCalendarSectionUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении секции календаря или ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/events/on-calendar-section-delete.html\"&gt;OnCalendarSectionDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении секции календаря или ресурса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"sobytiya-kalendarya\"&gt;&lt;a href=\"api-reference/calendar/index.html#sobytiya-kalendarya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;События календаря&lt;/span&gt;&lt;/a&gt;События календаря&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-q7boeysa\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"
