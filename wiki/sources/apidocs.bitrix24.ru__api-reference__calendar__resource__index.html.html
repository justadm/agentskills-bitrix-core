            {"data":{"leading":false,"html":"&lt;p&gt;Бронирование ресурсов — это возможность предоставлять услуги на определенное время. Ресурс — это то, что бронируют клиенты, например, автомобиль, переговорная комната или дорожка для боулинга.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/calendar/resource/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/18260410/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;настраиваем бронирование ресурсов в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-rabotaet-bronirovanie-resursov\"&gt;&lt;a href=\"api-reference/calendar/resource/index.html#kak-rabotaet-bronirovanie-resursov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работает бронирование ресурсов&lt;/span&gt;&lt;/a&gt;Как работает бронирование ресурсов&lt;/h2&gt;\n&lt;p&gt;В Битрикс24 бронирование ресурсов осуществляется через пользовательское поле CRM типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ej0q156f\"&gt;resourcebooking&lt;/code&gt;. Такое поле можно создать в карточках лида и сделки.&lt;/p&gt;\n&lt;p&gt;Отслеживать занятость ресурсов можно в Календаре CRM. Технически ресурс — это секция календаря, а бронирование — это событие календаря.&lt;/p&gt;\n&lt;p&gt;Добавляет новый ресурс метод &lt;a href=\"api-reference/calendar/resource/calendar-resource-add.html\"&gt;calendar.resource.add&lt;/a&gt;. Ресурс появится только в системе. Привязать его к пользовательскому полю объекта CRM можно только через карточку объекта в режиме редактирования поля.&lt;/p&gt;\n&lt;p&gt;Получить бронирования ресурсов можно методом &lt;a href=\"api-reference/calendar/resource/calendar-resource-booking-list.html\"&gt;calendar.resource.booking.list&lt;/a&gt;. Бронирование имеет набор полей, аналогичный полям события календаря. Некоторые поля остаются пустыми, так как они неактуальны для бронирования.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18797220/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как работать в режиме просмотра Календарь в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-resursa-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/calendar/resource/index.html#svyaz-resursa-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь ресурса с другими объектами&lt;/span&gt;&lt;/a&gt;Связь ресурса с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Ресурс связан с пользователем через идентификатор в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2cplhvqb\"&gt;CREATED_BY&lt;/code&gt;. Система автоматически устанавливает идентификатор пользователя, который создал ресурс.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользовательские поля CRM.&lt;/strong&gt; Бронирования ресурсов в сделках и лидах привязаны к пользовательским полям типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lyokchsg\"&gt;resourcebooking&lt;/code&gt;. Получить идентификаторы бронирований можно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;универсальными методами — &lt;a href=\"api-reference/crm/universal/crm-item-get.html\"&gt;crm.item.get&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;методами для лидов — &lt;a href=\"api-reference/crm/leads/crm-lead-get.html\"&gt;crm.lead.get&lt;/a&gt;, &lt;a href=\"api-reference/crm/leads/crm-lead-list.html\"&gt;crm.lead.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;методами для сделок — &lt;a href=\"api-reference/crm/deals/crm-deal-get.html\"&gt;crm.deal.get&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/crm-deal-list.html\"&gt;crm.deal.list&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Узнать какие пользовательские поля имеют тип resourcebooking можно методом получения списка полей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;для лидов — &lt;a href=\"api-reference/crm/leads/userfield/crm-lead-userfield-list.html\"&gt;crm.lead.userfield.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;для сделок — &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-list.html\"&gt;crm.deal.userfield.list&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/calendar/resource/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mxi3aptk\"&gt;calendar&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/resource/calendar-resource-add.html\"&gt;calendar.resource.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавить ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/resource/calendar-resource-update.html\"&gt;calendar.resource.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновить ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/resource/calendar-resource-list.html\"&gt;calendar.resource.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список ресурсов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/resource/calendar-resource-booking-list.html\"&gt;calendar.resource.booking.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить бронирования ресурсов по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/calendar/resource/calendar-resource-delete.html\"&gt;calendar.resource.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить ресурс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как работает бронирование ресурсов","href":"api-reference/calendar/resource/index.html#kak-rabotaet-bronirovanie-resursov","level":2},{"title":"Связь ресурса с другими объектами","href":"api-reference/calendar/resource/index.html#svyaz-resursa-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/calendar/resource/index.html#all-methods","level":2}],"title":"Бронирование ресурсов: обзор методов"},"router":{"pathname":"api-reference/calendar/resource/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"lo
