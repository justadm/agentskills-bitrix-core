        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kh7xtx85\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: пользователь с правом «Просмотр каталога товаров»&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hgkbix63\"&gt;catalog.document.list&lt;/code&gt; возвращает постраничный список документов складского учета. По умолчанию к запросу добавляются фильтры, ограничивающие выборку доступными типами документов и правами текущего пользователя.&lt;/p&gt;\n&lt;h2 id=\"parametry-metoda\"&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-list.html#parametry-metoda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры метода&lt;/span&gt;&lt;/a&gt;Параметры метода&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d8lncqls\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;select&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zrya50gr\"&gt;array&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив со списком полей &lt;a href=\"api-reference/catalog/data-types.html#catalog_document\"&gt;catalog_document&lt;/a&gt;, которые необходимо выбрать.&lt;/p&gt;\n&lt;p&gt;Если массив не передан или передан пустой массив, то будут выбраны все доступные поля документа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;filter&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p2bpros9\"&gt;object&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Объект для фильтрации выбранных документов в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zmwz0gye\"&gt;{\"field_1\": \"value_1\", ..., \"field_N\": \"value_N\"}&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Возможные значения для &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-foe47o8m\"&gt;field&lt;/code&gt; соответствуют полям объекта &lt;a href=\"api-reference/catalog/data-types.html#catalog_document\"&gt;catalog_document&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Ключу можно задать дополнительный префикс, уточняющий поведение фильтра. Возможные значения префикса:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pwpo07qq\"&gt;&amp;gt;=&lt;/code&gt; — больше либо равно&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bzbtdx2r\"&gt;&amp;gt;&lt;/code&gt; — больше&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ywsn3z6k\"&gt;&amp;lt;=&lt;/code&gt; — меньше либо равно&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nbagtl94\"&gt;&amp;lt;&lt;/code&gt; — меньше&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0o47q06p\"&gt;=&lt;/code&gt; — точное совпадение&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dw3orlvp\"&gt;!=&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l1noohve\"&gt;!&lt;/code&gt; — не равно&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7mz0vx2u\"&gt;@&lt;/code&gt; — IN, в качестве значения передается массив&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vmy5vwt9\"&gt;!@&lt;/code&gt; — NOT IN, в качестве значения передается массив&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d730r3ed\"&gt;%&lt;/code&gt; — LIKE, поиск по подстроке. Символ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v386a4du\"&gt;%&lt;/code&gt; в значении фильтра передавать не нужно. Поиск ищет подстроку в любой позиции строки&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gokggkd9\"&gt;=%&lt;/code&gt; — LIKE, поиск по подстроке. Символ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vj8yvuuu\"&gt;%&lt;/code&gt; нужно передавать в значении. Примеры:\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o6botqyf\"&gt;\"мол%\"&lt;/code&gt; — ищет значения, начинающиеся с «мол»&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j5fdpi7c\"&gt;\"%мол\"&lt;/code&gt; — ищет значения, заканчивающиеся на «мол»&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r70bf6zb\"&gt;\"%мол%\"&lt;/code&gt; — ищет значения, где «мол» может быть в любой позиции&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mmn7rsn4\"&gt;!%&lt;/code&gt; — NOT LIKE, поиск по подстроке. Символ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-74kvbc07\"&gt;%&lt;/code&gt; в значении фильтра передавать не нужно. Поиск идет с обеих сторон&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-at3cq09p\"&gt;!=%&lt;/code&gt; — NOT LIKE, поиск по подстроке. Символ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3dm6nebx\"&gt;%&lt;/code&gt; нужно передавать в значении. Примеры:\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9xakoi6n\"&gt;\"мол%\"&lt;/code&gt; — ищет значения, не начинающиеся с «мол»&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q6ic2kfm\"&gt;\"%мол\"&lt;/code&gt; — ищет значения, не заканчивающиеся на «мол»&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gbjjc1op\"&gt;\"%мол%\"&lt;/code&gt; — ищет значения, где подстроки «мол» нет в любой позиции&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1vlw6e0l\"&gt;=&lt;/code&gt; — равно, точное совпадение, используется по умолчанию&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1i5v289k\"&gt;!=&lt;/code&gt; — не равно&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l9h78f0v\"&gt;!&lt;/code&gt; — не равно&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;order&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3zesxgub\"&gt;object&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Объект для сортировки выбранных документов в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7t7xtd2i\"&gt;{\"field_1\": \"order_1\", ... \"field_N\": \"order_N\"}&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Возможные значения для &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b698va3n\"&gt;field&lt;/code&gt; соответствуют полям объекта &lt;a href=\"api-reference/catalog/data-types.html#catalog_document\"&gt;catalog_document&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Возможные значения для &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-792dv7gp\"&gt;order&lt;/code&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f3gx82k8\"&gt;asc&lt;/code&gt; — в порядке возрастания&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1pw953a5\"&gt;desc&lt;/code&gt; — в порядке убывания&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;По умолчанию документы упорядочены по возрастанию &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f64xba93\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;start&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bwz0vr3t\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Параметр используется для управления постраничной навигацией.&lt;/p&gt;\n&lt;p&gt;Размер страницы — 50 записей.&lt;/p&gt;\n&lt;p&gt;Чтобы выбрать вторую страницу результатов, передайте значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f5cg0hml\"&gt;50&lt;/code&gt;. Чтобы выбрать третью страницу результатов — значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k5c56mb1\"&gt;100&lt;/code&gt; и так далее.&lt;/p&gt;\n&lt;p&gt;Формула расчета значения параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mw4p3y9y\"&gt;start&lt;/code&gt;:&lt;/p&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qoti64a8\"&gt;start = (N-1) * 50&lt;/code&gt;, где &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vqcnempo\"&gt;N&lt;/code&gt; — номер нужной страницы.&lt;br /&gt;\nИли передавайте значение из ключа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d4n72tv1\"&gt;next&lt;/code&gt; ответа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"primery-koda\"&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-list.html#primery-koda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры кода&lt;/span&gt;&lt;/a&gt;Примеры кода&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-1hoy6n97\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"curl-webhook\" data-diplodoc-key=\"curl%20(webhook)\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;cURL (Webhook)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-oauth\" data-diplodoc-key=\"curl%20(oauth)\" t;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"obrabotka-oshibok\"&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-list.html#obrabotka-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обработка ошибок&lt;/span&gt;&lt;/a&gt;Обработка ошибок&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x8gs11h4\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;error&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eifoftwr\"&gt;string&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Строковый код ошибки. Может состоять из цифр, латинских букв и знака подчеркивания&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;error_description&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x8wa7v62\"&gt;error_description&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текстовое описание ошибки. Описание не предназначено для показа конечному пользователю в необработанном виде&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;p&gt;HTTP-код: &lt;strong&gt;400&lt;/strong&gt;&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"error\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"0\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"error_description\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Недостаточно прав для сохранения документа\"&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"415\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-415\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-415\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-415.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h3 id=\"vozmozhnye-kody-oshibok\"&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-list.html#vozmozhnye-kody-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возможные коды ошибок&lt;/span&gt;&lt;/a&gt;Возможные коды ошибок&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Код&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Значение&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bti6chsh\"&gt;0&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Недостаточно прав для сохранения документа&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;У пользователя нет права на просмотр&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"statusy-i-kody-sistemnyh-oshibok\"&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-list.html#statusy-i-kody-sistemnyh-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Статусы и коды системных ошибок&lt;/span&gt;&lt;/a&gt;Статусы и коды системных ошибок&lt;/h3&gt;\n&lt;p&gt;HTTP-статус: &lt;strong&gt;20х&lt;/strong&gt;, &lt;strong&gt;40x&lt;/strong&gt;, &lt;strong&gt;50x&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Описанные ниже ошибки могут возникнуть при вызове любого метода&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Статус&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Код&lt;/strong&gt;&lt;br /&gt;\n&lt;strong&gt;Текст ошибки&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rvfo1qss\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s5q32671\"&gt;INTERNAL_SERVER_ERROR&lt;/code&gt;&lt;br /&gt;\nInternal server error&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2i43y3mg\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w78vr209\"&gt;ERROR_UNEXPECTED_ANSWER&lt;/code&gt;&lt;br /&gt;\nServer returned an unexpected response&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-frelp38f\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tyfq8efm\"&gt;QUERY_LIMIT_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nToo many requests&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышен &lt;a href=\"/limits.html\"&gt;лимит на интенсивность запросов&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-49wuivxk\"&gt;405&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7x83frmv\"&gt;ERROR_BATCH_METHOD_NOT_ALLOWED&lt;/code&gt;&lt;br /&gt;\nMethod is not allowed for batch usage&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текущий метод не разрешен для вызове с помощью &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-onc186w5\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k6e67jbl\"&gt;ERROR_BATCH_LENGTH_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nMax batch length exceeded&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышена максимальная длина параметров, переданных в метод &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e0hn2vz4\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s8z7dgfk\"&gt;NO_AUTH_FOUND&lt;/code&gt;&lt;br /&gt;\nWrong authorization data&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Неверный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;код вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2al5v7v5\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vxdrj4t8\"&gt;INVALID_REQUEST&lt;/code&gt;&lt;br /&gt;\nHttps required&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Для вызовов методов требуется использовать протокол HTTPS&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6bzjfg2o\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xnj75pme\"&gt;OVERLOAD_LIMIT&lt;/code&gt;&lt;br /&gt;\nREST API is blocked due to overload&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API заблокирован из-за перегрузки. Это ручная индивидуальная блокировка, для снятия необходимо обращаться в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hpjfnr82\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cf8wb8um\"&gt;ACCESS_DENIED&lt;/code&gt;&lt;br /&gt;\nREST API is available only on commercial plans&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API доступен только на коммерческих планах&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g5z6reer\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-imi7u1b5\"&gt;INVALID_CREDENTIALS&lt;/code&gt;&lt;br /&gt;\nInvalid request credentials&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;У пользователя, с чьим &lt;a href=\"/settings/oauth/index.html\"&gt;access-токеном&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхуком&lt;/a&gt; был вызван метод, не хватает прав&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1u8j7tdu\"&gt;404&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lb2497jg\"&gt;ERROR_MANIFEST_IS_NOT_AVAILABLE&lt;/code&gt;&lt;br /&gt;\nManifest is not available&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Манифест недоступен&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fx9ejb2j\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lkwi4clo\"&gt;insufficient_scope&lt;/code&gt;&lt;br /&gt;\nThe request requires higher privileges than provided by the webhook token&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запрос требует более высоких привилегий, чем предоставляет токен &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3hgtzjpb\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-svln9w55\"&gt;expired_token&lt;/code&gt;&lt;br /&gt;\nThe access token provided has expired&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Предоставленный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; доступа истек&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t6pt2zpm\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vs9s6ufo\"&gt;user_access_error&lt;/code&gt;&lt;br /&gt;\nThe user does not have access to the application&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь не имеет доступа к приложению. Это означает, что приложение установлено, но администратор портала разрешил доступ к этому приложению только конкретным пользователям&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s5n41r73\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-snttfg7z\"&gt;PORTAL_DELETED&lt;/code&gt;&lt;br /&gt;\nPortal was deleted&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Публичная часть сайта закрыта. Чтобы открыть публичную часть сайта на коробочной установке отключите опцию «Временное закрытие публичной части сайта». Путь к настройке: &lt;em&gt;Рабочий стол &amp;gt; Настройки &amp;gt; Настройки продукта &amp;gt; Настройки модулей &amp;gt; Главный модуль &amp;gt; Временное закрытие публичной части сайта&lt;/em&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-list.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/document/catalog-document-update.html\"&gt;Изменить документ складского учета catalog.document.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/document/document-element/catalog-document-element-list.html\"&gt;Получить список товаров в документах складского учета catalog.document.element.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/documentcontractor/catalog-documentcontractor-list.html\"&gt;Получить список привязок поставщиков к документам catalog.documentcontractor.list&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.c
