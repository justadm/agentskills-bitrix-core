        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-841zvw4l\"&gt;catalog.document.element.*&lt;/code&gt; добавляют, изменяют или удаляют товарные позиции в документах складского учета. Можно указать количество и закупочную цену товара, склад поступления или списания.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/document/document-element/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/document/document-element/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Документы складского учета.&lt;/strong&gt; Укажите идентификатор документа в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n15bzmnv\"&gt;docId&lt;/code&gt;, чтобы оформить:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;приход товара на склад,&lt;/li&gt;\n&lt;li&gt;оприходование товара,&lt;/li&gt;\n&lt;li&gt;перемещение товара между складами,&lt;/li&gt;\n&lt;li&gt;возврат товара,&lt;/li&gt;\n&lt;li&gt;списание товара со склада.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы получить идентификатор документа, используйте метод &lt;a href=\"api-reference/catalog/document/catalog-document-list.html\"&gt;catalog.document.list&lt;/a&gt;. Внести изменения в перечень товарных позиций можно только в документ, который еще не проведен.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары каталога.&lt;/strong&gt; Укажите идентификатор простого товара или вариации в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bcxs45b9\"&gt;elementId&lt;/code&gt;.&lt;br /&gt;\nУслуги в складском учете не поддерживаются.&lt;/p&gt;\n&lt;p&gt;Чтобы получить идентификаторы товаров, используйте методы:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/catalog-product-list.html\"&gt;catalog.product.list&lt;/a&gt; для простых товаров,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-list.html\"&gt;catalog.product.offer.list&lt;/a&gt; для вариаций.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Склады.&lt;/strong&gt; Укажите идентификатор склада поступления в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l7zp87fe\"&gt;storeTo&lt;/code&gt; или склада списания в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zrkaig75\"&gt;storeFrom&lt;/code&gt;. Выбирайте поле в зависимости от типа документа складского учета:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;приход — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hp4gx3ab\"&gt;storeTo&lt;/code&gt;,&lt;/li&gt;\n&lt;li&gt;оприходование — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xdh0poo3\"&gt;storeTo&lt;/code&gt;,&lt;/li&gt;\n&lt;li&gt;перемещение — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bi43h0uo\"&gt;storeTo&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bpby25oe\"&gt;storeFrom&lt;/code&gt;,&lt;/li&gt;\n&lt;li&gt;возврат — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vd69iotg\"&gt;storeFrom&lt;/code&gt;,&lt;/li&gt;\n&lt;li&gt;списание — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kso2rwsx\"&gt;storeFrom&lt;/code&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы получить идентификаторы складов, используйте метод &lt;a href=\"api-reference/catalog/store/catalog-store-list.html\"&gt;catalog.store.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/document/document-element/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lw84xv1s\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/document/document-element/catalog-document-element-add.html\"&gt;catalog.document.element.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет товарную позицию в документ складского учета&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/document/document-element/catalog-document-element-update.html\"&gt;catalog.document.element.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет существующую товарную позицию в документе складского учета&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/document/document-element/catalog-document-element-list.html\"&gt;catalog.document.element.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает товарные позиции документов по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/document/document-element/catalog-document-element-delete.html\"&gt;catalog.document.element.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет товарную позицию из документа до проведения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/document/document-element/catalog-document-element-get-fields.html\"&gt;catalog.document.element.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей товара из документа складского учета&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь с другими объектами","href":"api-reference/catalog/document/document-element/index.html#svyaz-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/catalog/document/document-element/index.html#all-methods","level":2}],"title":"Товары в документе складского учета: обзор методов"},"router":{"pathname":"api-reference/catalog/document/document-element/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
