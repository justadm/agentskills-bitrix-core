            {"data":{"leading":false,"html":"&lt;p&gt;Товар может иметь одну или несколько цен. Для каждой цены указываются:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;валюта: российский рубль, доллар США, евро,&lt;/li&gt;\n&lt;li&gt;тип: розничная, оптовая, партнерская.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Это позволяет настраивать ценообразование в зависимости от типа клиента, региона или условий сотрудничества.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/price/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/16342446/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Право на изменение цены продажи товара в ĸаталоге&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-cen-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/price/index.html#svyaz-cen-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь цен с другими объектами&lt;/span&gt;&lt;/a&gt;Связь цен с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Тип цены.&lt;/strong&gt; Каждая цена принадлежит к определенному типу цен. Задать и изменить тип цены можно с помощью методов &lt;a href=\"api-reference/catalog/price-type/index.html\"&gt;catalog.priceType.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Валюта.&lt;/strong&gt; Цена указывается в выбранной валюте. Работать с валютами можно через методы &lt;a href=\"api-reference/crm/currency/index.html\"&gt;crm.currency.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Наценка.&lt;/strong&gt; Она влияет на формирование цены. Получить наценку позволяет метод &lt;a href=\"api-reference/catalog/extra/catalog-extra-get.html\"&gt;catalog.extra.get&lt;/a&gt;. Использование наценки доступно только в Битрикс24 с активной опцией расширенного управления ценами, устаревший параметр.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товар.&lt;/strong&gt; Цена всегда привязана к товару. Создать и отредактировать товар можно с помощью групп методов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/index.html\"&gt;catalog.product.*&lt;/a&gt; — для простых товаров&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/index.html\"&gt;catalog.product.service.*&lt;/a&gt; — для услуг&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/index.html\"&gt;catalog.product.sku.*&lt;/a&gt; — для головных товаров с вариациями&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/index.html\"&gt;catalog.product.offer.*&lt;/a&gt; — для вариаций товаров&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/6987305/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Валюты в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/11657084/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать новый товар в каталоге&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/16560760/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Услуги в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/11657102/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Работа с вариациями товара&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/price/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6va5898a\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-7fnhb4ns\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"ici7eiq5\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-add.html\"&gt;catalog.price.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет цену товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-update.html\"&gt;catalog.price.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет цену товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-modify.html\"&gt;catalog.price.modify&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет коллекцию цен товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-get-fields.html\"&gt;catalog.price.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля цен товаров&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-list.html\"&gt;catalog.price.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список цен товаров по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-get.html\"&gt;catalog.price.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей цены товара по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/catalog-price-delete.html\"&gt;catalog.price.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет цену товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"eplpic5r\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/events/catalog-price-on-add.html\"&gt;CATALOG.PRICE.ON.ADD&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении цены&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/events/catalog-price-on-update.html\"&gt;CATALOG.PRICE.ON.UPDATE&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновлении цены&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/price/events/catalog-price-on-delete.html\"&gt;CATALOG.PRICE.ON.DELETE&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении цены&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Связь цен с другими объектами","href":"api-reference/catalog/price/index.html#svyaz-cen-s-drugimi-obuektami","level":2},{"title":"Обзор методов и событий","href":"api-reference/catalog/price/index.html#all-methods","level":2}],"title":"Цены в Торговом каталоге: обзор методов"},"router":{"pathname":"api-reference/catalog/price/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
