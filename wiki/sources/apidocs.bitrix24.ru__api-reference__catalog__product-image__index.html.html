        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В товары и вариации можно добавлять разные типы изображений:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-69zcerwg\"&gt;DETAIL_PICTURE&lt;/code&gt; — детальное изображение, поле доступно в старой карточке товара,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z6lj75jd\"&gt;PREVIEW_PICTURE&lt;/code&gt; — изображение для анонса, поле доступно в старой карточке товара,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9zwxeswo\"&gt;MORE_PHOTO&lt;/code&gt; — дополнительные изображения.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"kak-dobavit-izobrazhenie-v-sozdannyj-tovar\"&gt;&lt;a href=\"api-reference/catalog/product-image/index.html#kak-dobavit-izobrazhenie-v-sozdannyj-tovar\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как добавить изображение в созданный товар&lt;/span&gt;&lt;/a&gt;Как добавить изображение в созданный товар&lt;/h2&gt;\n&lt;p&gt;Чтобы добавить или заменить изображение созданного товара, воспользуйтесь методами &lt;a href=\"api-reference/catalog/product-image/index.html#all-methods\"&gt;catalog.productImage.*&lt;/a&gt;. Укажите тип изображения и передайте в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ole7tlso\"&gt;fileContent&lt;/code&gt; массив из двух элементов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;название файла изображения с его расширением,&lt;/li&gt;\n&lt;li&gt;файл в кодировке base64.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если не указать тип изображения, оно будет сохранено как дополнительное изображение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oekuwbqa\"&gt;MORE_PHOTO&lt;/code&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/product-image/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-dobavit-izobrazhenie-pri-sozdanii-tovara\"&gt;&lt;a href=\"api-reference/catalog/product-image/index.html#kak-dobavit-izobrazhenie-pri-sozdanii-tovara\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как добавить изображение при создании товара&lt;/span&gt;&lt;/a&gt;Как добавить изображение при создании товара&lt;/h2&gt;\n&lt;p&gt;Используйте метод &lt;a href=\"api-reference/catalog/product/catalog-product-add.html\"&gt;catalog.product.add&lt;/a&gt; и передайте в параметры &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-siwg7i8o\"&gt;previewPicture&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-85uzf0y4\"&gt;detailPicture&lt;/code&gt; объект в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dj73nvnm\"&gt;{fileData: [value1, value2]}&lt;/code&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l4m7z3xn\"&gt;value1&lt;/code&gt; — название файла изображения с его расширением,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8j5dq6ru\"&gt;value2&lt;/code&gt; — файл в кодировке base64.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Как загрузить файлы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-izobrazhenij-tovarov-i-variacij-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/product-image/index.html#svyaz-izobrazhenij-tovarov-i-variacij-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь изображений товаров и вариаций с другими объектами&lt;/span&gt;&lt;/a&gt;Связь изображений товаров и вариаций с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Укажите идентификатор товара, для которого хотите добавить изображение. Список идентификаторов можно получить методами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/catalog-product-list.html\"&gt;catalog.product.list&lt;/a&gt; — для простых товаров&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-list.html\"&gt;catalog.product.service.list&lt;/a&gt; — для услуг&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-list.html\"&gt;catalog.product.sku.list&lt;/a&gt; — для головных товаров у товаров с вариациями&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-list.html\"&gt;catalog.product.offer.list&lt;/a&gt; — для вариаций товаров&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/product-image/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wq6h8b4s\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-image/catalog-product-image-add.html\"&gt;catalog.productImage.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет изображение в товар или вариацию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-image/catalog-product-image-get.html\"&gt;catalog.productImage.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает информацию о конкретном изображении товара или вариации&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-image/catalog-product-image-list.html\"&gt;catalog.productImage.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список изображений товара или вариации&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-image/catalog-product-image-delete.html\"&gt;catalog.productImage.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет изображение из товара или вариации&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-image/catalog-product-image-get-fields.html\"&gt;catalog.productImage.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля изображения товара или вариации&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как добавить изображение в созданный товар","href":"api-reference/catalog/product-image/index.html#kak-dobavit-izobrazhenie-v-sozdannyj-tovar","level":2},{"title":"Как добавить изображение при создании товара","href":"api-reference/catalog/product-image/index.html#kak-dobavit-izobrazhenie-pri-sozdanii-tovara","level":2},{"title":"Связь изображений товаров и вариаций с другими объектами","href":"api-reference/catalog/product-image/index.html#svyaz-izobrazhenij-tovarov-i-variacij-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/catalog/product-image/index.html#all-methods","level":2}],"title":"Изображения товаров и вариаций в Торговом каталоге: обзор методов"},"router":{"pathname":"api-reference/catalog/product-image/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
