        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;У товаров и вариаций есть свойства: цвет, размер, материал, бренд и другие. Они помогают покупателям находить и выбирать товары на сайте.&lt;/p&gt;\n&lt;p&gt;В Битрикс24 свойства можно настроить.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Сделать общими для всех товаров. Такие свойства доступны для всех товаров в каталоге, например, свойство «Бренд» можно указать во всех товарах.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Привязать к разделам товаров. Например, свойство «Материал» может быть доступно только для раздела «Одежда», а свойство «Диагональ» — только для раздела «Телевизоры».&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/product-property/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/13274510/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Свойства товаров и вариаций&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tipy-svojstv\"&gt;&lt;a href=\"api-reference/catalog/product-property/index.html#tipy-svojstv\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы свойств&lt;/span&gt;&lt;/a&gt;Типы свойств&lt;/h2&gt;\n&lt;p&gt;Для каждого свойства задается тип: Строка, Список, Число, Привязка к сотруднику и другие. Полный перечень типов свойств описан в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g41e0sto\"&gt;fields&lt;/code&gt; метода &lt;a href=\"api-reference/catalog/product-property/catalog-product-property-add.html\"&gt;catalog.productProperty.add&lt;/a&gt;. Для работы со значениями свойств типа Список можно использовать методы &lt;a href=\"api-reference/catalog/product-property-enum/index.html\"&gt;catalog.productPropertyEnum.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тип задается при создании свойства, и изменить его нельзя.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-svojstv-tovarov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/product-property/index.html#svyaz-svojstv-tovarov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь свойств товаров с другими объектами&lt;/span&gt;&lt;/a&gt;Связь свойств товаров с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Торговый каталог.&lt;/strong&gt; Свойства товаров должны быть привязаны к конкретному торговому каталогу. Получить идентификаторы доступных торговых каталогов можно с помощью метода &lt;a href=\"api-reference/catalog/catalog/catalog-catalog-list.html\"&gt;catalog.catalog.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Валюты.&lt;/strong&gt; В свойстве типа Деньги указывают число и валюту. Работать с валютами можно через методы &lt;a href=\"api-reference/crm/currency/index.html\"&gt;crm.currency.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. В свойстве товара или вариации можно задать привязку к сотруднику. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Свойство типа Привязка к элементам CRM связывает товары с объектами CRM: &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидами&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделками&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессами&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контактами&lt;/a&gt; и &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компаниями&lt;/a&gt;. В товарах это свойство отображается в виде ссылки на объект CRM.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Универсальные списки&lt;/strong&gt;. Товары можно связать с элементами списков через свойство Привязка к элементам в виде списка. Работать со списками можно с помощью методов &lt;a href=\"api-reference/lists/index.html\"&gt;list.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файлы.&lt;/strong&gt; Свойство типа Файл позволяет загружать и хранить файлы в товаре. Файлы не получают идентификаторы в модуле Диск, поэтому методы Диска не применимы. Подробнее читайте в статье &lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Как загрузить файлы&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/5488473/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Свойства товаров&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/product-property/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mwftakso\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-property/catalog-product-property-add.html\"&gt;catalog.productProperty.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет свойство товаров или вариаций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-property/catalog-product-property-delete.html\"&gt;catalog.productProperty.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет свойство товаров или вариаций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-property/catalog-product-property-get.html\"&gt;catalog.productProperty.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей свойства товаров или вариаций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-property/catalog-product-property-get-fields.html\"&gt;catalog.productProperty.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля свойства товаров или вариаций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-property/catalog-product-property-list.html\"&gt;catalog.productProperty.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список свойств товаров или вариаций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product-property/catalog-product-property-update.html\"&gt;catalog.productProperty.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля свойства товаров или вариаций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"
