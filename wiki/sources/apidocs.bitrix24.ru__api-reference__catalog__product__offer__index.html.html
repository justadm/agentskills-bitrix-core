            {"data":{"leading":false,"html":"&lt;p&gt;Вариации — это разные исполнения одного товара, которые отличаются цветом, размером. У каждой вариации своя цена, изображение и количество на складе.&lt;/p&gt;\n&lt;p&gt;Вариация привязана к головному товару. Он содержит общую информацию: название, описание, категорию.&lt;/p&gt;\n&lt;p&gt;Чтобы работать с головными товарами, используйте методы &lt;a href=\"api-reference/catalog/product/sku/index.html\"&gt;catalog.product.sku.*&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/product/offer/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/11657102/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Работа с вариациями товара&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-variacij-tovara-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/product/offer/index.html#svyaz-variacij-tovara-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь вариаций товара с другими объектами&lt;/span&gt;&lt;/a&gt;Связь вариаций товара с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Торговый каталог.&lt;/strong&gt; Вариация товара всегда привязана к конкретному торговому каталогу. Получить идентификаторы доступных торговых каталогов можно с помощью метода &lt;a href=\"api-reference/catalog/catalog/catalog-catalog-list.html\"&gt;catalog.catalog.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Разделы торгового каталога.&lt;/strong&gt; Вариации товара распределены по разделам. Чтобы создать и управлять разделами, используйте группу методов &lt;a href=\"api-reference/catalog/section/index.html\"&gt;catalog.section.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Изображения.&lt;/strong&gt; Вариации товара могут содержать изображения: для анонса, детальное, дополнительное. Чтобы добавить изображения, используйте методы &lt;a href=\"api-reference/catalog/product-image/index.html\"&gt;catalog.productImage.*&lt;/a&gt;, чтобы скачать — метод &lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-download.html\"&gt;catalog.product.offer.download&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Единицы измерения.&lt;/strong&gt; Для вариации товара указывают единицу измерения: штука, килограмм или метр. Добавить или изменить единицу измерения можно с помощью методов &lt;a href=\"api-reference/catalog/measure/index.html\"&gt;catalog.measure.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;НДС.&lt;/strong&gt; Ставку НДС можно задать для каждой вариации отдельно. Работать со ставками можно через методы &lt;a href=\"api-reference/catalog/vat/index.html\"&gt;catalog.vat.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. В каждой вариации хранятся идентификаторы пользователей, которые ее создали или изменили. Информацию о пользователе можно получить с помощью методов &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Свойства товаров и вариаций.&lt;/strong&gt; Вариации имеют свойства, которые отличают их друг от друга. Это могут быть цвет, размер или материал. Работать со свойствами можно с помощью методов &lt;a href=\"api-reference/catalog/product-property/index.html\"&gt;catalog.productProperty.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Типы цен.&lt;/strong&gt; Типы цен позволяют управлять различными ценовыми категориями. У одного товара может быть несколько цен: оптовая, розничная, партнерская. Для управления типами цен используйте методы &lt;a href=\"api-reference/catalog/price-type/index.html\"&gt;catalog.priceType.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Цена.&lt;/strong&gt; Укажите цену товара с помощью методов &lt;a href=\"api-reference/catalog/price/index.html\"&gt;catalog.price.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Валюты.&lt;/strong&gt; Для цены товара выбирают валюту. Работать с валютами можно через методы &lt;a href=\"api-reference/crm/currency/index.html\"&gt;crm.currency.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Складской учет.&lt;/strong&gt; Если включен складской учет, указывать доступное количество вариации товара не нужно. Значения будут установлены автоматически из документов складского учета. Для работы с документами используйте методы &lt;a href=\"api-reference/catalog/document/index.html\"&gt;catalog.document.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Вариацию можно добавить в список товаров &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лида&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделки&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;счета&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процесса&lt;/a&gt; и &lt;a href=\"api-reference/crm/quote/index.html\"&gt;предложения&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Корзина заказа&lt;/strong&gt;. Вариацию товара можно добавить, изменить или удалить из корзины с помощью группы методов &lt;a href=\"api-reference/sale/basket-item/index.html\"&gt;sale.basketitem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/product/offer/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ij4bdwwr\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-add.html\"&gt;catalog.product.offer.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет вариацию товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-update.html\"&gt;catalog.product.offer.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля вариации товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-get.html\"&gt;catalog.product.offer.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей вариации товара по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-list.html\"&gt;catalog.product.offer.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список вариаций товара по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-download.html\"&gt;catalog.product.offer.download&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Скачивает файлы вариации товара по переданным параметрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-delete.html\"&gt;catalog.product.offer.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет вариацию товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-get-fields-by-filter.html\"&gt;catalog.product.offer.getFieldsByFilter&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля вариации товара по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь вариаций товара с другими объектами","href":"api-reference/catalog/product/offer/index.html#svyaz-variacij-tovara-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/catalog/product/offer/index.html#all-methods","level":2}],"title":"Вариации товара: обзор методов"},"router":{"pathname":"api-reference/catalog/product/offer/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
