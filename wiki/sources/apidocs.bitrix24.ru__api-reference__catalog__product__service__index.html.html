            {"data":{"leading":false,"html":"&lt;p&gt;Услуги — это нематериальные товары: консультации, работы или действия. Они могут использоваться в объектах CRM и быть связаны с физическими товарами.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/product/service/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/16560760/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Услуги в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-uslug-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/product/service/index.html#svyaz-uslug-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь услуг с другими объектами&lt;/span&gt;&lt;/a&gt;Связь услуг с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Торговый каталог.&lt;/strong&gt; Услуга должна быть привязана к конкретному торговому каталогу. Получить идентификаторы доступных торговых каталогов можно с помощью метода &lt;a href=\"api-reference/catalog/catalog/catalog-catalog-list.html\"&gt;catalog.catalog.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Разделы торгового каталога.&lt;/strong&gt; Услуги обычно распределены по разделам. Чтобы создать и управлять разделами, используйте группу методов &lt;a href=\"api-reference/catalog/section/index.html\"&gt;catalog.section.* &lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Изображения.&lt;/strong&gt; Услуга может содержать изображения: для анонса, детальное, дополнительное. Чтобы добавить изображения, используйте методы &lt;a href=\"api-reference/catalog/product-image/index.html\"&gt;catalog.productImage.*&lt;/a&gt;, чтобы скачать — метод &lt;a href=\"api-reference/catalog/product/service/catalog-product-service-download.html\"&gt;catalog.product.service.download&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Единицы измерения.&lt;/strong&gt; Для услуги выбирают единицу измерения, например, часы для консультаций. Добавить или изменить единицу измерения можно с помощью методов &lt;a href=\"api-reference/catalog/measure/index.html\"&gt;catalog.measure.* &lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;НДС.&lt;/strong&gt; Ставку НДС можно задать для каждой услуги отдельно. Работать со ставками можно через методы &lt;a href=\"api-reference/catalog/vat/index.html\"&gt;catalog.vat.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. В каждой услуге хранятся идентификаторы пользователей, которые ее создали и изменили. Информацию о пользователе можно получить с помощью методов &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Свойства товаров и вариаций.&lt;/strong&gt; Услуги имеют свойства, которые отличают их друг от друга. Это могут быть тип услуги, срок выполнения или статус услуги. Работать со свойствами можно с помощью методов &lt;a href=\"api-reference/catalog/product-property/index.html\"&gt;catalog.productProperty.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Услуги связаны с CRM следующим образом:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;услугу можно добавить в список товаров &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лида&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделки&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;счета&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процесса&lt;/a&gt; и &lt;a href=\"api-reference/crm/quote/index.html\"&gt;предложения&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/index.html\"&gt;лиды&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделки&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессы&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;счета&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контакты&lt;/a&gt; и &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компании&lt;/a&gt; можно указать в услугах с помощью свойства типа «Привязка к элементам CRM».&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Корзина заказа&lt;/strong&gt;. Услугу можно добавить, изменить или удалить из корзины с помощью группы методов &lt;a href=\"api-reference/sale/basket-item/index.html\"&gt;sale.basketitem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/product/service/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4jb6wghr\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-add.html\"&gt;catalog.product.service.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет услугу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-update.html\"&gt;catalog.product.service.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля услуги&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-get.html\"&gt;catalog.product.service.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей услуги по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-list.html\"&gt;catalog.product.service.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список услуг по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-download.html\"&gt;catalog.product.service.download&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Скачивает файлы услуги по переданным параметрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-delete.html\"&gt;catalog.product.service.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет услугу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-get-fields-by-filter.html\"&gt;catalog.product.service.getFieldsByFilter&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля услуги по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь услуг с другими объектами","href":"api-reference/catalog/product/service/index.html#svyaz-uslug-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/catalog/product/service/index.html#all-methods","level":2}],"title":"Услуги: обзор методов"},"router":{"pathname":"api-reference/catalog/product/service/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
