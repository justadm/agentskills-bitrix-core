        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Головной товар — это товар с вариациями. Например, футболка — головной товар, а синяя футболка M и белая футболка L — его вариации. Головной товар не является товарной единицей. Он объединяет вариации и хранит общую информацию: название, описание, категорию. Цена, валюта, НДС, единица измерения, количество на складе указываются отдельно в каждой вариации.&lt;/p&gt;\n&lt;p&gt;Отличия головного товара от простого товара:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;головной товар нельзя купить — нужно выбрать одну из его вариаций. Для работы с вариациями используйте группу методов &lt;a href=\"api-reference/catalog/product/offer/index.html\"&gt;catalog.product.offer.*&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;простой товар — единичный товар без вариаций. Его можно сразу добавить в корзину и купить. Для работы с простыми товарами используйте группу методов &lt;a href=\"api-reference/catalog/product/index.html\"&gt;catalog.product.*&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/product/sku/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/11657084/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать новый товар в каталоге&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-golovnyh-tovarov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/product/sku/index.html#svyaz-golovnyh-tovarov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь головных товаров с другими объектами&lt;/span&gt;&lt;/a&gt;Связь головных товаров с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Торговый каталог.&lt;/strong&gt; Товар должен быть привязан к конкретному торговому каталогу. Получить идентификаторы доступных торговых каталогов можно с помощью метода &lt;a href=\"api-reference/catalog/catalog/catalog-catalog-list.html\"&gt;catalog.catalog.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Разделы торгового каталога.&lt;/strong&gt; Головные товары обычно распределены по разделам. Чтобы создать и управлять разделами, используйте группу методов &lt;a href=\"api-reference/catalog/section/index.html\"&gt;catalog.section.* &lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Изображения.&lt;/strong&gt; Головной товар может содержать изображения: для анонса, детальное, дополнительное. Чтобы добавить изображения, используйте методы &lt;a href=\"api-reference/catalog/product-image/index.html\"&gt;catalog.productImage.*&lt;/a&gt;, чтобы скачать — метод &lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-download.html\"&gt;catalog.product.sku.download&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. В каждом товаре хранятся идентификаторы пользователей, которые его создали и изменили. Информацию о пользователе можно получить с помощью методов &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Свойства товаров и вариаций.&lt;/strong&gt; Головные товары могут иметь дополнительные свойства: производитель, сезон или материал. Работать со свойствами можно с помощью методов &lt;a href=\"api-reference/catalog/product-property/index.html\"&gt;catalog.productProperty.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; В головных товарах можно указать &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лиды&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделки&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессы&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;счета&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контакты&lt;/a&gt; и &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компании&lt;/a&gt; с помощью свойства типа «Привязка к элементам CRM».&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/product/sku/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cer25ona\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-add.html\"&gt;catalog.product.sku.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет головной товар в торговый каталог&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-update.html\"&gt;catalog.product.sku.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля головного товара&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-get.html\"&gt;catalog.product.sku.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей головного товара по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-list.html\"&gt;catalog.product.sku.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список головных товаров по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-download.html\"&gt;catalog.product.sku.download&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Скачивает файлы головного товара по переданным параметрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-delete.html\"&gt;catalog.product.sku.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет головной товар&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-get-fields-by-filter.html\"&gt;catalog.product.sku.getFieldsByFilter&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля головного товара по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь головных товаров с другими объектами","href":"api-reference/catalog/product/sku/index.html#svyaz-golovnyh-tovarov-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/catalog/product/sku/index.html#all-methods","level":2}],"title":"Головные товары: обзор методов"},"router":{"pathname":"api-reference/catalog/product/sku/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
