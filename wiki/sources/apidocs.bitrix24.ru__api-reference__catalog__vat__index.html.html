        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Ставку НДС можно задать для всего каталога или для конкретного товара. Приоритет отдается ставке НДС товара. Ставка каталога применяется, если ставка товара не задана.&lt;/p&gt;\n&lt;p&gt;Если у товара или каталога есть ставка НДС, общие налоги CRM к ним не применяются.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/catalog/vat/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/15955806\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Налоги и НДС в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-stavok-nds-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/catalog/vat/index.html#svyaz-stavok-nds-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь ставок НДС с другими объектами&lt;/span&gt;&lt;/a&gt;Связь ставок НДС с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Торговый каталог.&lt;/strong&gt; Узнайте, какая ставка НДС установлена для торгового каталога, с помощью метода &lt;a href=\"api-reference/catalog/catalog/catalog-catalog-get.html\"&gt;catalog.catalog.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Укажите НДС товара, используя следующие группы методов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/index.html\"&gt;catalog.product.*&lt;/a&gt; — для простых товаров&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/service/index.html\"&gt;catalog.product.service.*&lt;/a&gt; — для услуг&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/sku/index.html\"&gt;catalog.product.sku.*&lt;/a&gt; — для головных товаров у товаров с вариациями&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/offer/index.html\"&gt;catalog.product.offer.*&lt;/a&gt; — для вариаций товаров&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/catalog/vat/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-voltqdz2\"&gt;catalog&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/vat/catalog-vat-add.html\"&gt;catalog.vat.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет ставку НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/vat/catalog-vat-update.html\"&gt;catalog.vat.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет ставку НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/vat/catalog-vat-get.html\"&gt;catalog.vat.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей ставки НДС по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/vat/catalog-vat-list.html\"&gt;catalog.vat.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список ставок НДС по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/vat/catalog-vat-delete.html\"&gt;catalog.vat.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет ставку НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/catalog/vat/catalog-vat-get-fields.html\"&gt;catalog.vat.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля ставки НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь ставок НДС с другими объектами","href":"api-reference/catalog/vat/index.html#svyaz-stavok-nds-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/catalog/vat/index.html#all-methods","level":2}],"title":"Ставки НДС в Торговом каталоге: обзор методов"},"router":{"pathname":"api-reference/catalog/vat/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
