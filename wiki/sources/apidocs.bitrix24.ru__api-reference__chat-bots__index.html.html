            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Бот-платформа Битрикс24 — новый формат приложений, основанных на чатах в веб-мессенджере.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chat-bots/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"chto-takoe-chat-boty-i-chto-oni-mogut-delat\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#chto-takoe-chat-boty-i-chto-oni-mogut-delat\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что такое чат-боты и что они могут делать?&lt;/span&gt;&lt;/a&gt;Что такое чат-боты и что они могут делать?&lt;/h2&gt;\n&lt;p&gt;Что такое чат-боты, зачем они нужны и зачем вообще заниматься их разработкой?&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;strong&gt;Чат-бот&lt;/strong&gt; — это виртуальный собеседник, программа, которая создана для имитации поведения человека при общении с одним или несколькими собеседниками.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;В большей степени, этот тренд формируется сейчас за рубежом — существует огромное количество ботов для Slack или Telegram, решающих самые разные задачи — от поиска авиабилетов до управления небольшими командами разработчиков. И чтобы получить все это богатство, пользователям даже не нужно выходить из предпочитаемого мессенджера.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Что могут делать чат-боты?&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Замена рутины&lt;/strong&gt; — позволяет выполнять определенные функции, не привлекая людей, а работа будет выполнена моментально и безупречно;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Поиск и агрегация&lt;/strong&gt; новостей, аналитики, данных (Data-Driven Collaboration), данные доступны в месте принятия решений — мессенджерах и всем участникам, которым они нужны;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;E-commerce&lt;/strong&gt; — для спонтанных покупок без долгого поиска, mobile ecommerce + visual search + chatbots, для общения с клиентами;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Первая линия&lt;/strong&gt; работы с клиентами, помощники, консультанты, типовые вопросы, телефония;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Just for Fun&lt;/strong&gt; — просто для развлечения.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"bot-platforma-bitriks24\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#bot-platforma-bitriks24\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Бот-платформа Битрикс24&lt;/span&gt;&lt;/a&gt;Бот-платформа Битрикс24&lt;/h2&gt;\n&lt;p&gt;А в &lt;em&gt;Битрикс24&lt;/em&gt; чаты (как индивидуальные, так и групповые) — это часть намного более сложной экосистемы, один из основных каналов коммуникации пользователей, полностью интегрированный с другими бизнес-инструментами. И в этом контексте использование чат-ботов открывает значительно более интересные перспективы для бизнес-пользователей, поскольку &lt;em&gt;Битрикс24&lt;/em&gt; (в браузере, десктоп- и мобильном приложениях) уже сейчас — основное рабочее место для большого количества компаний.&lt;/p&gt;\n&lt;p&gt;Очень просто написать чат-бота, который, например, будет сообщать в чат нужным пользователям срочную информацию о показателях внутренней учетной системы, интегрированной с &lt;em&gt;Битрикс24&lt;/em&gt;. Можно написать чат-бота, который будет помогать курьерам удобно обрабатывать заказы на основании сделок &lt;em&gt;CRM Битрикс24&lt;/em&gt; на мобильном устройстве прямо в мессенджере — и не придется писать для них отдельное мобильное приложение.&lt;/p&gt;\n&lt;p&gt;Разработка чат-бота в &lt;em&gt;Битрикс24&lt;/em&gt; — это очень перспективный вариант быстрой и удобной автоматизации специфических бизнес-процессов. Удобной, поскольку, как мы уже выяснили, получение информации и управление через мессенджер — это то, что сейчас предпочитает массовый пользователь. А быстрой — потому что разработка чат-бота для &lt;em&gt;Битрикс24&lt;/em&gt; это довольно простой процесс.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Для более четкого понимания, что могут делать чат-боты на платформе &lt;em&gt;Битрикс24&lt;/em&gt;, можно посмотреть видео-примеры возможностей уже готовых чат-ботов &lt;a href=\"api-reference/chat-bots/index.html#opportunities\"&gt;ниже&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Существует ограничение на создание чат-ботов в рамках rest-приложений: не более 5 на одно приложение.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"opportunities\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#opportunities\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возможности чат-бота&lt;/span&gt;&lt;/a&gt;Возможности чат-бота&lt;/h2&gt;\n&lt;p&gt;Чат-бот:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;это специальный пользователь в системе, с которым можно коммуницировать в чате, но под ним никто не может авторизоваться;&lt;/li&gt;\n&lt;li&gt;поддерживает обработку slash-команд;&lt;/li&gt;\n&lt;li&gt;позволяет использовать свои клавиатуры для ответов, превратив простой чат в терминал.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"slash-komandy\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#slash-komandy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Slash-команды&lt;/span&gt;&lt;/a&gt;Slash-команды&lt;/h3&gt;\n&lt;p&gt;Slash-команды позволяют быстро создавать запросы для вывода или получения какой-либо информации, форматировать сообщения.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chat-bots/_images/command1_sm.png\" alt=\"Пример команды\" /&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Подробнее о работе с командами можно прочитать &lt;a href=\"api-reference/chat-bots/commands/index.html\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"klaviatury\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#klaviatury\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Клавиатуры&lt;/span&gt;&lt;/a&gt;Клавиатуры&lt;/h3&gt;\n&lt;p&gt;Возможности &lt;i class=\"yfm yfm-term_title\" term-key=\":keyboard\" role=\"button\" aria-describedby=\":keyboard_element\" tabindex=\"0\" id=\"nguqb4r5\"&gt;клавиатур&lt;/i&gt; довольно широкие.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;EchoBot&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Постраничная навигация, кнопки при вызове команды «Помощь»&lt;/p&gt;\n &lt;iframe width=\"720\" height=\"405\" src=\"https://rutube.ru/play/embed/6df697f3139fdad5bfbf4953ef1f83a5/\" frameborder=\"0\" allow=\"clipboard-write; autoplay\"&gt;&lt;/iframe&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Марта&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Просто напишите марте «Поиграй со мной!». Клавиатура используется как игровое поле:&lt;/p&gt;\n &lt;iframe width=\"720\" height=\"405\" src=\"https://rutube.ru/play/embed/282c08597e37aaf9ad9828c935400c72/\" frameborder=\"0\" allow=\"clipboard-write; autoplay\"&gt;&lt;/iframe&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Giphy&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Кнопка &lt;strong&gt;Еще&lt;/strong&gt; позволяет без повторного введения поискового слова просматривать другие картинки на эту же тему:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chat-bots/_images/keyboard2.png\" alt=\"Еще картинки\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Подробнее о работе с клавиатурами можно прочитать &lt;a href=\"api-reference/chats/messages/keyboards.html\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"chaty\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#chaty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Чаты&lt;/span&gt;&lt;/a&gt;Чаты&lt;/h3&gt;\n&lt;p&gt;Чат-боты могут общаться в чате почти как живые люди. Также они могут напоминать о различных событиях (о текущих задачах, встречах) или давать справочную информацию. Кроме того, что чат-боты могут писать в чаты, они могут еще создавать такие чаты и автоматически приглашать туда людей, например для обсуждения какой либо задачи.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chat-bots/_images/features_chat1_sm.png\" alt=\"Чаты\" /&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Подробнее о работе с чатами можно прочитать &lt;a href=\"api-reference/chats/index.html\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"uvedomleniya\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#uvedomleniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Уведомления&lt;/span&gt;&lt;/a&gt;Уведомления&lt;/h3&gt;\n&lt;p&gt;Уведомления от чат-бота могут быть полезны и информативны. Они могут состоять из нескольких блоков различной информации из внешних систем.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chat-bots/_images/attach1.png\" alt=\"Уведомления\" /&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Подробнее о работе с уведомлениями можно прочитать &lt;a href=\"api-reference/chats/notifications/index.html\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"zhiznennyj-cikl-chat-bota\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#zhiznennyj-cikl-chat-bota\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Жизненный цикл чат-бота&lt;/span&gt;&lt;/a&gt;Жизненный цикл чат-бота&lt;/h2&gt;\n&lt;p&gt;Чат-бот публикует свои сообщения в чат через Rest API, получает ответы и команды пользователя через &lt;a href=\"api-reference/events/index.html\"&gt;События Rest API&lt;/a&gt; (POST запрос).&lt;/p&gt;\n&lt;p&gt;Схема жизни чат-бота выглядит так:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chat-bots/_images/bot_life1_sm.png\" alt=\"Схема жизни чат-бота\" /&gt;&lt;/p&gt;\n&lt;h2 id=\"sozdanie-svoego-prilozheniya\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#sozdanie-svoego-prilozheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Создание своего приложения&lt;/span&gt;&lt;/a&gt;Создание своего приложения&lt;/h2&gt;\n&lt;p&gt;Основное, что нам надо понимать про чат-боты — это то, что их логика обычно строится на реагировании на некие действия пользователя и системы.&lt;/p&gt;\n&lt;p&gt;И у нас есть 6 событий, которые полностью покрывают необходимый спектр реакций:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/common/events/on-app-install.html\"&gt;ONAPPINSTALL&lt;/a&gt; — событие на установку приложения с чат-ботом.&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/common/events/on-app-update.html\"&gt;ONAPPUPDATE&lt;/a&gt; — событие на обновление приложения.&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/chats/events/on-imbot-join-chat.html\"&gt;ONIMJOINCHAT&lt;/a&gt; — событие после приглашения чат-бота «к разговору», т.е. либо при вызове его пользователем в индивидуальном чате, либо при подключении его к групповому чату.&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/events/on-imbot-message-add.html\"&gt;ONIMBOTMESSAGEADD&lt;/a&gt; — событие после отправки сообщения от пользователя к чат-боту (в групповом чате, при явном упоминании бота).&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/commands/events/on-im-command-add.html\"&gt;ONIMCOMMANDADD&lt;/a&gt; — событие после отправки команды от пользователя к чат-боту (в персональной переписке с ним, или в групповом чате (если команда глобальная, то он может не участвовать в чате)).&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/events/on-imbot-delete.html\"&gt;ONIMBOTDELETE&lt;/a&gt; — событие после удаления приложения. Событие вызывается параллельно с &lt;a href=\"api-reference/common/events/on-app-uninstall.html\"&gt;OnAppUninstall&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Иными словами, мы должны написать обработчики указанных событий, чтобы реализовать простую логику:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Зарегистрировать чат-бота на портале пользователя при установке.&lt;/li&gt;\n&lt;li&gt;Вывести приветствие-справку от имени чат-бота в момент приглашения его в чат.&lt;/li&gt;\n&lt;li&gt;Научиться анализировать текст сообщения от пользователя и что-то отправлять в ответ, причем под анализом подразумевается простой «разбор командной строки», а не лексический разбор естественного языка.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;И для этого у нас есть набор простых методов, добавленных в REST API. Нам для старта потребуются только два:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/imbot-register.html\"&gt;imbot.register&lt;/a&gt; – регистрация чат-бота.&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/imbot-message-add.html\"&gt;imbot.message.add&lt;/a&gt; – отправка сообщения от чат-бота.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Очевидно, что в обработчике события &lt;a href=\"api-reference/common/events/on-app-install.html\"&gt;ONAPPINSTALL&lt;/a&gt; мы вызовем метод &lt;a href=\"api-reference/chat-bots/imbot-register.html\"&gt;imbot.register&lt;/a&gt; для того, чтобы добавить чат-бота на текущий портал, а затем в событии &lt;a href=\"api-reference/chat-bots/chats/events/on-imbot-join-chat.html\"&gt;ONIMJOINCHAT&lt;/a&gt; воспользуемся методом &lt;a href=\"api-reference/chat-bots/messages/imbot-message-add.html\"&gt;imbot.message.add&lt;/a&gt; для вывода справки о функционале чат-бота, и в обработчике &lt;a href=\"api-reference/chat-bots/messages/events/on-imbot-message-add.html\"&gt;ONIMBOTMESSAGEADD&lt;/a&gt; будем отвечать пользователю при помощи того же &lt;a href=\"api-reference/chat-bots/messages/imbot-message-add.html\"&gt;imbot.message.add&lt;/a&gt;. Ничего сложного, согласитесь?&lt;/p&gt;\n&lt;p&gt;А также вам не придется реализовывать в приложении полноценный OAuth 2.0, поскольку параметры, необходимые для авторизации, приходят в обработчики в массиве &lt;strong&gt;$_REQUEST&lt;/strong&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Полный список методов и событий &lt;strong&gt;Bot API&lt;/strong&gt; можно посмотреть &lt;a href=\"api-reference/chat-bots/index.html#all-methods\"&gt;ниже&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vozmozhnye-tipy-chat-botov-bitriks24\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#vozmozhnye-tipy-chat-botov-bitriks24\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возможные типы чат-ботов Битрикс24&lt;/span&gt;&lt;/a&gt;Возможные типы чат-ботов Битрикс24&lt;/h2&gt;\n&lt;p&gt;Для более четкого понимания, что могут делать чат-боты на платформе &lt;em&gt;Битрикс24&lt;/em&gt;, приведем видео-примеры возможностей уже готовых чат-ботов. Типы чат-ботов приведены условно, вы можете создать чат-бота, который может сочетать 2 или 3 типа.&lt;/p&gt;\n&lt;iframe width=\"720\" height=\"405\" src=\"https://rutube.ru/play/embed/08ba27116ef2e6b1165341d470b4e384/\" frameborder=\"0\" allow=\"clipboard-write; autoplay\"&gt;&lt;/iframe&gt;\n&lt;h3 id=\"lichnyj-pomoshnik\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#lichnyj-pomoshnik\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Личный помощник&lt;/span&gt;&lt;/a&gt;Личный помощник&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Марта&lt;/strong&gt; («1С-Битрикс») — ваш личный помощник. Она помогает искать ответы на вопросы, напоминает о встречах, с ней можно поиграть в «Крестики-нолики», и она готова просто поговорить.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"spravochnaya-sistema\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#spravochnaya-sistema\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Справочная система&lt;/span&gt;&lt;/a&gt;Справочная система&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Реквизиты контрагента&lt;/strong&gt; («1С-Битрикс») — ищет по базе ФНС и выдает необходимую информацию.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Поиск24&lt;/strong&gt; (студия «G-Tech») — ваш личный поисковый робот. Ищет в Яндексе и выводит 5 самых точных ответов.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"dlya-specialnyh-zadach\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#dlya-specialnyh-zadach\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Для специальных задач&lt;/span&gt;&lt;/a&gt;Для специальных задач&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Support Bot&lt;/strong&gt; («1С-Битрикс») — внутренний чат-бот для быстрого доступа к тикет-системе «Битрикс24».&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"rabota-s-servisami\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#rabota-s-servisami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с сервисами&lt;/span&gt;&lt;/a&gt;Работа с сервисами&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;OCR Bot&lt;/strong&gt; (First Open Systems) — распознает сканы любых документов и сохраняет их в RTF.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Переводчик&lt;/strong&gt; (PWEB) — помогает переводить тексты с одного языка на другой. Поддерживает перевод на 63 языка.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ЗаМКАДыш&lt;/strong&gt; (ИА «Инсайд») — осуществляет поиск расстояния от МКАД до необходимого адреса. Поиск расстояния рассчитывается как по прямой, так и по автодорогам.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"rabota-s-otkrytymi-liniyami\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#rabota-s-otkrytymi-liniyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с открытыми линиями&lt;/span&gt;&lt;/a&gt;Работа с открытыми линиями&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Чат-бот для Открытых линий&lt;/strong&gt; («1С-Битрикс») сможет выступить помощником при первом контакте с пользователем или помогать вам посреди диалога.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"dlya-razvlechenij\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#dlya-razvlechenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Для развлечений&lt;/span&gt;&lt;/a&gt;Для развлечений&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Андрейка&lt;/strong&gt; (PWEB) — мастер на анекдоты. Поддерживает диалог анекдотами и смешными цитатами.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Giphy&lt;/strong&gt; («1С-Битрикс») — поиск по большой библиотеке анимированных GIF-файлов, что позволяет легко найти необходимое изображение и поделиться им с коллегами.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"smotrite-takzhe\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#smotrite-takzhe\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Смотрите также&lt;/span&gt;&lt;/a&gt;Смотрите также&lt;/h2&gt;\n&lt;p&gt;Полный список чат-ботов для платформы &lt;em&gt;Битрикс24&lt;/em&gt; можно увидеть в &lt;a href=\"https://www.bitrix24.ru/apps/?category=chat_bots\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;одноименном разделе&lt;/a&gt; &lt;em&gt;Магазина приложений Битрикс24&lt;/em&gt;.&lt;/p&gt;\n&lt;p&gt;Готовые примеры кода для обработчиков чат-ботов доступны в репозитории &lt;a href=\"https://github.com/bitrix24com/bots\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;GitHub&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-eryyrhhi\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"ddvxlha1\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/im-revision-get.html\"&gt;im.revision.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает информацию о ревизиях API&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/imbot-register.html\"&gt;imbot.register&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Регистрирует нового чат-бота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/imbot-unregister.html\"&gt;imbot.unregister&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет зарегистрированного бота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/imbot-update.html\"&gt;imbot.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет данные чат-бота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/imbot-bot-list.html\"&gt;imbot.bot.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список доступных чат-ботов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"zjniv43q\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/events/on-imbot-delete.html\"&gt;ONIMBOTDELETE&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении чат-бота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"chaty1\"&gt;&lt;a href=\"api-reference/chat-bots/index.html#chaty1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Чаты&lt;/span&gt;&lt;/a&gt;Чаты&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-y2ajrrjt\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы-1\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события-1\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"eh7jqxrf\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-add.html\"&gt;imbot.chat.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый чат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-get.html\"&gt;imbot.chat.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает информацию о чате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-leave.html\"&gt;imbot.chat.leave&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Выполняет выход чат-бота из указанного чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-set-manager.html\"&gt;imbot.chat.setManager&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Назначает или снимает права администратора у участника чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\".//chats/imbot-chat-send-typing.md\"&gt;imbot.chat.sendTyping&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет индикатор набора текста в чат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-update-avatar.html\"&gt;imbot.chat.updateAvatar&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет аватар чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-update-color.html\"&gt;imbot.chat.updateColor&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет цвет чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-update-title.html\"&gt;imbot.chat.updateTitle&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет название чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-user-add.html\"&gt;imbot.chat.user.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет пользователя в чат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-user-list.html\"&gt;imbot.chat.user.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список пользователей в чате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chat-bots/chats/imbot-chat-user-delete.html\"&gt;imbot.chat.user.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет пользователя из чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a hre
