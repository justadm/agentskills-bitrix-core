            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vzaimodejstvie-s-pomoshyu-php\"&gt;&lt;a href=\"api-reference/chat-bots/send-command.html#vzaimodejstvie-s-pomoshyu-php\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Взаимодействие с помощью PHP&lt;/span&gt;&lt;/a&gt;Взаимодействие с помощью PHP&lt;/h2&gt;\n&lt;p&gt;В рамках нашего курса мы взаимодействуем c Битрикс24 с помощью &lt;strong&gt;PHP&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;Все примеры указаны с использованием функций &lt;strong&gt;restCommand&lt;/strong&gt;:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Введите строку поиска\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"19\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-19\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-19\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-19.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;где:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Первый параметр&lt;/strong&gt; – это название API (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-29obamnn\"&gt;imbot.message.add&lt;/code&gt;);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Второй параметр&lt;/strong&gt; – это передаваемые данные в API (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b68wuz5h\"&gt;Array(...)&lt;/code&gt;);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Третий параметр&lt;/strong&gt; – это данные для авторизации запроса (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hgxp5t6j\"&gt;$_REQUEST[\"auth\"]&lt;/code&gt;).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"funkciya\"&gt;&lt;a href=\"api-reference/chat-bots/send-command.html#funkciya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Функция &lt;/span&gt;&lt;/a&gt;Функция &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1e6ksrx4\"&gt;restCommand&lt;/code&gt;&lt;/h3&gt;\n&lt;p&gt;Функция &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l1cl0ivu\"&gt;restCommand&lt;/code&gt; отправляет REST запрос к Битрикс24:&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Эта функция используется в качестве примера. Вы можете использовать свою функцию, основанную на &lt;a href=\"settings/how-to-call-rest-api/general-principles.html\"&gt;протоколе взаимодействия&lt;/a&gt;, или javascript-метод &lt;a href=\"sdk/bx24-js-sdk/how-to-call-rest-methods/bx24-call-method.html\"&gt;BX24.callMethod&lt;/a&gt;, или партнерскую разработку &lt;a href=\"https://github.com/mesilov/bitrix24-php-sdk\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;bitrix24-php-sdk&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"funkciya-restcommand\"&gt;&lt;a href=\"api-reference/chat-bots/send-command.html#funkciya-restcommand\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Функция restCommand&lt;/span&gt;&lt;/a&gt;Функция restCommand&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-comment\"&gt;/**\n* Send rest query to Bitrix24.\n*\n* &lt;span class=\"hljs-doctag\"&gt;@param&lt;/span&gt; $method - Rest method, ex: methods\n* &lt;span class=\"hljs-doctag\"&gt;@param&lt;/span&gt; array $params - Method params, ex: Array()\n* &lt;span class=\"hljs-doctag\"&gt;@param&lt;/span&gt; array $auth - Authorize data, ex: Array('domain' =&amp;gt; 'https://test.bitrix24.com', 'access_token' =&amp;gt; '7inpwszbuu8vnwr5jmabqa467rqur7u6')\n* &lt;span class=\"hljs-doctag\"&gt;@param&lt;/span&gt; boolean $authRefresh - If authorize is expired, refresh token\n* &lt;span class=\"hljs-doctag\"&gt;@return&lt;/span&gt; mixed\n*/&lt;/span&gt;\n&lt;span class=\"hljs-function\"&gt;&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title\"&gt;restCommand&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;span class=\"hljs-variable\"&gt;$method&lt;/span&gt;, &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt; &lt;span class=\"hljs-variable\"&gt;$params&lt;/span&gt; = Array(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;), &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt; &lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt; = Array(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;), &lt;span class=\"hljs-variable\"&gt;$authRefresh&lt;/span&gt; = &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;&lt;/span&gt;)\n&lt;/span&gt;{\n&lt;span class=\"hljs-variable\"&gt;$queryUrl&lt;/span&gt; = &lt;span class=\"hljs-string\"&gt;\"https://\"&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"domain\"&lt;/span&gt;].&lt;span class=\"hljs-string\"&gt;\"/rest/\"&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$method&lt;/span&gt;;\n&lt;span class=\"hljs-variable\"&gt;$queryData&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;http_build_query&lt;/span&gt;(&lt;span class=\"hljs-title function_ invoke__\"&gt;array_merge&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$params&lt;/span&gt;, &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"access_token\"&lt;/span&gt;])));\n\n&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;curl_init&lt;/span&gt;();\n\n&lt;span class=\"hljs-title function_ invoke__\"&gt;curl_setopt_array&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt;, &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n     CURLOPT_POST =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n     CURLOPT_HEADER =&amp;gt; &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;,\n     CURLOPT_RETURNTRANSFER =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n     CURLOPT_SSL_VERIFYPEER =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n     CURLOPT_URL =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$queryUrl&lt;/span&gt;,\n     CURLOPT_POSTFIELDS =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$queryData&lt;/span&gt;,\n));\n\n&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;curl_exec&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt;);\n&lt;span class=\"hljs-title function_ invoke__\"&gt;curl_close&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt;);\n\n&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;json_decode&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;, &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;);\n\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-variable\"&gt;$authRefresh&lt;/span&gt; &amp;amp;&amp;amp; &lt;span class=\"hljs-keyword\"&gt;isset&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'error'&lt;/span&gt;]) &amp;amp;&amp;amp; &lt;span class=\"hljs-title function_ invoke__\"&gt;in_array&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'error'&lt;/span&gt;], &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'expired_token'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'invalid_token'&lt;/span&gt;)))\n{\n     &lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;restAuth&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;);\n     &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;)\n     {\n         &lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$method&lt;/span&gt;, &lt;span class=\"hljs-variable\"&gt;$params&lt;/span&gt;, &lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;, &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;);\n     }\n}\n\n&lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt; &lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;;\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"59\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-59\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-59\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-59.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"funkciya-restauth\"&gt;&lt;a href=\"api-reference/chat-bots/send-command.html#funkciya-restauth\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Функция restAuth&lt;/span&gt;&lt;/a&gt;Функция restAuth&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-comment\"&gt;/**\n* Get new authorize data if you authorize is expire.\n*\n* &lt;span class=\"hljs-doctag\"&gt;@param&lt;/span&gt; array $auth - Authorize data, ex: Array('domain' =&amp;gt; 'https://test.bitrix24.com', 'access_token' =&amp;gt; '7inpwszbuu8vnwr5jmabqa467rqur7u6')\n* &lt;span class=\"hljs-doctag\"&gt;@return&lt;/span&gt; bool|mixed\n*/&lt;/span&gt;\n&lt;span class=\"hljs-function\"&gt;&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title\"&gt;restAuth&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;&lt;/span&gt;)\n&lt;/span&gt;{\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (!CLIENT_ID || !CLIENT_SECRET)\n     &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt; &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;;\n\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(!&lt;span class=\"hljs-keyword\"&gt;isset&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'refresh_token'&lt;/span&gt;]) || !&lt;span class=\"hljs-keyword\"&gt;isset&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'scope'&lt;/span&gt;]) || !&lt;span class=\"hljs-keyword\"&gt;isset&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'domain'&lt;/span&gt;]))\n     &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt; &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;;\n\n&lt;span class=\"hljs-variable\"&gt;$queryUrl&lt;/span&gt; = &lt;span class=\"hljs-string\"&gt;'https://'&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'domain'&lt;/span&gt;].&lt;span class=\"hljs-string\"&gt;'/oauth/token/'&lt;/span&gt;;\n&lt;span class=\"hljs-variable\"&gt;$queryData&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;http_build_query&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$queryParams&lt;/span&gt; = &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n     &lt;span class=\"hljs-string\"&gt;'grant_type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'refresh_token'&lt;/span&gt;,\n     &lt;span class=\"hljs-string\"&gt;'client_id'&lt;/span&gt; =&amp;gt; CLIENT_ID,\n     &lt;span class=\"hljs-string\"&gt;'client_secret'&lt;/span&gt; =&amp;gt; CLIENT_SECRET,\n     &lt;span class=\"hljs-string\"&gt;'refresh_token'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'refresh_token'&lt;/span&gt;],\n     &lt;span class=\"hljs-string\"&gt;'scope'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$auth&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'scope'&lt;/span&gt;],\n));\n\n&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;curl_init&lt;/span&gt;();\n\n&lt;span class=\"hljs-title function_ invoke__\"&gt;curl_setopt_array&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt;, &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n     CURLOPT_HEADER =&amp;gt; &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;,\n     CURLOPT_RETURNTRANSFER =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n     CURLOPT_URL =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$queryUrl&lt;/span&gt;.&lt;span class=\"hljs-string\"&gt;'?'&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$queryData&lt;/span&gt;,\n));\n\n&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;curl_exec&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt;);\n&lt;span class=\"hljs-title function_ invoke__\"&gt;curl_close&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$curl&lt;/span&gt;);\n\n&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;json_decode&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;, &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;);\n\n&lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt; &lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;;\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"63\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-63\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-63\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-63.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Взаимодействие с помощью PHP","href":"api-reference/chat-bots/send-command.html#vzaimodejstvie-s-pomoshyu-php","level":2,"items":[{"title":"Функция restCommand","href":"api-reference/chat-bots/send-command.html#funkciya","level":3}]},{"title":"Функция restCommand","href":"api-reference/chat-bots/send-command.html#funkciya-restcommand","level":2},{"title":"Функция restAuth","href":"api-reference/chat-bots/send-command.html#funkciya-restauth","level":2}],"title":
