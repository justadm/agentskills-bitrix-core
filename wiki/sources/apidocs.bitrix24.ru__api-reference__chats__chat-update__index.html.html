        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;После создания чата можно назначить другого владельца или изменить оформление. Кто может менять оформление, зависит от настроек чата:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;все участники,&lt;/li&gt;\n&lt;li&gt;владелец и администраторы чата,&lt;/li&gt;\n&lt;li&gt;только владелец.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/chat-update/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-metodov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/chat-update/index.html#svyaz-metodov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь методов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь методов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Чат.&lt;/strong&gt; Чтобы изменить параметры чата, передайте в метод идентификатор чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v7wjem80\"&gt;CHAT_ID&lt;/code&gt;. Получить идентификатор чата можно методом:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/im-chat-add.html\"&gt;создания чата&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/im-chat-get.html\"&gt;получения идентификатора чата&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/im-recent-list.html\"&gt;получения списка чатов&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/im-recent-get.html\"&gt;получения сокращенного списка последних чатов&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Чтобы сменить владельца чата, укажите его идентификатор в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z7x1o8a8\"&gt;USER_ID&lt;/code&gt;. Получить идентификатор пользователя можно методом &lt;a href=\"api-reference/user/user-get.html\"&gt;получения списка пользователей&lt;/a&gt; или методом &lt;a href=\"api-reference/chats/chat-users/im-chat-user-list.html\"&gt;получения списка участников чата&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"smenit-vladelca-chata\"&gt;&lt;a href=\"api-reference/chats/chat-update/index.html#smenit-vladelca-chata\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Сменить владельца чата&lt;/span&gt;&lt;/a&gt;Сменить владельца чата&lt;/h2&gt;\n&lt;p&gt;Владельца чата можно сменить методом &lt;a href=\"api-reference/chats/chat-update/im-chat-set-owner.html\"&gt;im.chat.setOwner&lt;/a&gt;. Новый владелец получит полные права доступа к чату.&lt;/p&gt;\n&lt;p&gt;Использовать метод может только текущий владелец чата.&lt;/p&gt;\n&lt;h2 id=\"obnovit-ikonku\"&gt;&lt;a href=\"api-reference/chats/chat-update/index.html#obnovit-ikonku\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обновить иконку&lt;/span&gt;&lt;/a&gt;Обновить иконку&lt;/h2&gt;\n&lt;p&gt;Иконку чата можно обновить с помощью метода &lt;a href=\"api-reference/chats/chat-update/im-chat-update-avatar.html\"&gt;im.chat.updateAvatar&lt;/a&gt;. Передайте изображение в параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3ek8769e\"&gt;AVATAR&lt;/code&gt; в виде строки &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cqotf946\"&gt;base64&lt;/code&gt;, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-syfv2rtk\"&gt;'AVATAR': 'iVBOKLSR…Rw0K==’&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;После обновления в чат придет системное сообщение: &lt;em&gt;Иван Иванов изменил иконку чата.&lt;/em&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Как загрузить файлы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"smenit-cvet\"&gt;&lt;a href=\"api-reference/chats/chat-update/index.html#smenit-cvet\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Сменить цвет&lt;/span&gt;&lt;/a&gt;Сменить цвет&lt;/h2&gt;\n&lt;p&gt;По умолчанию система выбирает цвет чата случайно. Цвет отображается, если нет иконки.&lt;/p&gt;\n&lt;p&gt;Сменить цвет можно методом &lt;a href=\"api-reference/chats/chat-update/im-chat-update-color.html\"&gt;im.chat.updateColor&lt;/a&gt;. В параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bd2ei0ob\"&gt;COLOR&lt;/code&gt; передайте название цвета из списка поддерживаемых цветов. После изменения в чат придет системное сообщение: &lt;em&gt;Иван Иванов изменил цвет чата на «Мятный».&lt;/em&gt;&lt;/p&gt;\n&lt;h2 id=\"smenit-nazvanie\"&gt;&lt;a href=\"api-reference/chats/chat-update/index.html#smenit-nazvanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Сменить название&lt;/span&gt;&lt;/a&gt;Сменить название&lt;/h2&gt;\n&lt;p&gt;Изменить название чата можно методом &lt;a href=\"api-reference/chats/chat-update/im-chat-update-title.html\"&gt;im.chat.updateTitle&lt;/a&gt;. После изменения в чат придет системное сообщение: &lt;em&gt;Иван Иванов изменил название чата на «Новое название чата».&lt;/em&gt;&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/chat-update/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l5snqx8q\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-update/im-chat-set-owner.html\"&gt;im.chat.setOwner&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Меняет владельца чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-update/im-chat-update-avatar.html\"&gt;im.chat.updateAvatar&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Меняет иконку чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-update/im-chat-update-color.html\"&gt;im.chat.updateColor&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Меняет цвет чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-update/im-chat-update-title.html\"&gt;im.chat.updateTitle&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Меняет название чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь методов с другими объектами","href":"api-reference/chats/chat-update/index.html#svyaz-metodov-s-drugimi-obuektami","level":2},{"title":"Сменить владельца чата","href":"api-reference/chats/chat-update/index.html#smenit-
