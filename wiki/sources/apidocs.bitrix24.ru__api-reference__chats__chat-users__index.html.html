            {"data":{"leading":false,"html":"&lt;p&gt;Групповые чаты помогают общаться нескольким пользователям одновременно. Управляйте участниками чата с помощью группы методов im.chat.user.* и дополнительных методов &lt;a href=\"api-reference/chats/chat-users/im-dialog-users-list.html\"&gt;im.dialog.users.list&lt;/a&gt;, &lt;a href=\"api-reference/chats/chat-users/im-chat-leave.html\"&gt;im.chat.leave&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/chat-users/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-uchastnikov-chata-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/chat-users/index.html#svyaz-uchastnikov-chata-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь участников чата с другими объектами&lt;/span&gt;&lt;/a&gt;Связь участников чата с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Для добавления участников в чат передайте список их идентификаторов в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-51qu9qln\"&gt;USERS&lt;/code&gt;. Чтобы исключить участника, укажите его идентификатор в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fzmlbzap\"&gt;USER_ID&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат.&lt;/strong&gt; Пользователи привязываются к чату по идентификатору чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3jbak1vy\"&gt;CHAT_ID&lt;/code&gt; . Получить идентификатор чата можно методом &lt;a href=\"api-reference/chats/im-chat-add.html\"&gt;создания чата&lt;/a&gt; или &lt;a href=\"api-reference/chats/im-chat-get.html\"&gt;получения идентификатора чата&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"dobavit-uchastnikov\"&gt;&lt;a href=\"api-reference/chats/chat-users/index.html#dobavit-uchastnikov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Добавить участников&lt;/span&gt;&lt;/a&gt;Добавить участников&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/chat-users/im-chat-user-add.html\"&gt;im.chat.user.add&lt;/a&gt; добавляет пользователей в чат. По умолчанию новые пользователи не видят историю переписки. Настроить доступ новому участнику к истории можно параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cmokgl44\"&gt;HIDE_HISTORY&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"poluchit-spisok-uchastnikov\"&gt;&lt;a href=\"api-reference/chats/chat-users/index.html#poluchit-spisok-uchastnikov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Получить список участников&lt;/span&gt;&lt;/a&gt;Получить список участников&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/chat-users/im-chat-user-list.html\"&gt;im.chat.user.list&lt;/a&gt; получает список идентификаторов участников чата.&lt;/p&gt;\n&lt;p&gt;Для получения подробной информации о каждом пользователе используйте метод &lt;a href=\"api-reference/chats/chat-users/im-dialog-users-list.html\"&gt;im.dialog.users.list&lt;/a&gt;. Он поддерживает постраничное отображение для работы с большими списками. Из списка можно исключить системных пользователей или оставить только определенные типы.&lt;/p&gt;\n&lt;h2 id=\"isklyuchit-uchastnikov\"&gt;&lt;a href=\"api-reference/chats/chat-users/index.html#isklyuchit-uchastnikov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Исключить участников&lt;/span&gt;&lt;/a&gt;Исключить участников&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/chat-users/im-chat-user-delete.html\"&gt;im.chat.user.delete&lt;/a&gt; исключает участников из чата. Чтобы покинуть чат текущим пользователем, используйте метод &lt;a href=\"api-reference/chats/chat-users/im-chat-leave.html\"&gt;im.chat.leave&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/chat-users/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ytufivsv\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-users/im-chat-user-add.html\"&gt;im.chat.user.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пригласить участников в чат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-users/im-chat-user-list.html\"&gt;im.chat.user.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить идентификаторы участников чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-users/im-dialog-users-list.html\"&gt;im.dialog.users.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список участников&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-users/im-chat-user-delete.html\"&gt;im.chat.user.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Исключить участников из чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/chat-users/im-chat-leave.html\"&gt;im.chat.leave&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Покинуть чат текущим пользователем&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь участников чата с другими объектами","href":"api-reference/chats/chat-users/index.html#svyaz-uchastnikov-chata-s-drugimi-obuektami","level":2},{"title":"Добавить участников","href":"api-reference/chats/chat-users/index.html#dobavit-uchastnikov","level":2},{"title":"Получить список участников","href":"api-reference/chats/chat-users/index.html#poluchit-spisok-uchastnikov","level":2},{"title":"Исключить участников","href":"api-reference/chats/chat-users/index.html#isklyuchit-uchastnikov","level":2},{"title":"Обзор методов","href":"api-reference/chats/chat-users/index.html#all-methods","level":2}],"title":"Участники чата: обзор методов"},"router":{"pathname":"api-reference/chats/chat-users/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
