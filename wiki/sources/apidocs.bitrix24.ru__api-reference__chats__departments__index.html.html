        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g2rc4s81\"&gt;im.department.*&lt;/code&gt; получают информацию о пользователях подразделений из структуры компании. Работают только для сотрудников компании.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/departments/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-metodov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/departments/index.html#svyaz-metodov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь методов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь методов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Подразделение.&lt;/strong&gt; Методы получают информацию о пользователях по идентификатору департамента &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xfli5dfh\"&gt;ID&lt;/code&gt;. Получить идентификатор департамента можно методом &lt;a href=\"api-reference/departments/department-get.html\"&gt;получения списка подразделений&lt;/a&gt; или методом &lt;a href=\"api-reference/chats/search/im-search-department-list.html\"&gt;поиска подразделений по названию&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"poluchit-dannye-o-podrazdelenii\"&gt;&lt;a href=\"api-reference/chats/departments/index.html#poluchit-dannye-o-podrazdelenii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Получить данные о подразделении&lt;/span&gt;&lt;/a&gt;Получить данные о подразделении&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/departments/im-department-get.html\"&gt;im.department.get&lt;/a&gt; получает название подразделения и идентификатор руководителя. С помощью параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-01tds2am\"&gt;USER_DATA = 'Y'&lt;/code&gt; в ответ можно добавить данные о руководителе подразделения.&lt;/p&gt;\n&lt;h2 id=\"poluchit-spisok-polzovatelej\"&gt;&lt;a href=\"api-reference/chats/departments/index.html#poluchit-spisok-polzovatelej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Получить список пользователей&lt;/span&gt;&lt;/a&gt;Получить список пользователей&lt;/h2&gt;\n&lt;p&gt;Получить списки идентификаторов пользователей можно методами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/departments/im-department-managers-get.html\"&gt;im.department.managers.get&lt;/a&gt; — руководители указанных подразделений,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/departments/im-department-employees-get.html\"&gt;im.department.employees.get&lt;/a&gt; — сотрудники указанных подразделений,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/departments/im-department-colleagues-list.html\"&gt;im.department.colleagues.list&lt;/a&gt; — список коллег текущего пользователя. Для руководителя метод вернет список подчиненных и всех руководителей.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;C помощью параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tve8s4lj\"&gt;USER_DATA = 'Y'&lt;/code&gt; можно получить подробные данные по каждому сотруднику.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/departments/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4xbbdmk4\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой интранет-пользователь, кроме ботов&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/departments/im-department-get.html\"&gt;im.department.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о подразделении&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/departments/im-department-managers-get.html\"&gt;im.department.managers.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список руководителей подразделений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/departments/im-department-employees-get.html\"&gt;im.department.employees.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список сотрудников подразделений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/departments/im-department-colleagues-list.html\"&gt;im.department.colleagues.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список коллег текущего пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь методов с другими объектами","href":"api-reference/chats/departments/index.html#svyaz-metodov-s-drugimi-obuektami","level":2},{"title":"Получить данные о подразделении","href":"api-refer
