        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Для работы с файлами используйте группу методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ekprmh2z\"&gt;im.disk.*&lt;/code&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/files/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-metodov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/files/index.html#svyaz-metodov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь методов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь методов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Чат.&lt;/strong&gt; Работа с файлами выполняется по идентификатору чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pxg718pt\"&gt;CHAT_ID&lt;/code&gt;. Получить идентификатор можно методом создания чата &lt;a href=\"api-reference/chats/im-chat-add.html\"&gt;im.chat.add&lt;/a&gt; или получения идентификатора чата &lt;a href=\"api-reference/chats/im-chat-get.html\"&gt;im.chat.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файлы Диска.&lt;/strong&gt; Методы работают с файлами Диска по идентификатору файла в параметрах &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f9aogni2\"&gt;FILE_ID&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fz9vmgqq\"&gt;UPLOAD_ID&lt;/code&gt;. Получить идентификатор файла можно методом получения списка файлов &lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren&lt;/a&gt; или методом загрузки файла &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"dobavit-fajl-v-chat\"&gt;&lt;a href=\"api-reference/chats/files/index.html#dobavit-fajl-v-chat\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Добавить файл в чат&lt;/span&gt;&lt;/a&gt;Добавить файл в чат&lt;/h2&gt;\n&lt;p&gt;Чтобы добавить файл в чат, используйте метод &lt;a href=\"api-reference/chats/files/im-disk-file-commit\"&gt;im.disk.file.commit&lt;/a&gt;. Укажите идентификатор чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i0zdcx54\"&gt;CHAT_ID&lt;/code&gt; и один из параметров идентификатора файла: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e9cqwf7d\"&gt;UPLOAD_ID&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-azrt8urx\"&gt;FILE_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Добавить несколько файлов можно с помощью массива, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xmtbfo0h\"&gt;FILE_ID: [4837, 4839, 4841]&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"sohranit-fajl-na-svoj-disk\"&gt;&lt;a href=\"api-reference/chats/files/index.html#sohranit-fajl-na-svoj-disk\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Сохранить файл на свой диск&lt;/span&gt;&lt;/a&gt;Сохранить файл на свой диск&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/files/im-disk-file-save.html\"&gt;im.disk.file.save&lt;/a&gt; позволяет сохранить файл из чата на личный диск в папку &lt;em&gt;Сохраненные файлы&lt;/em&gt;. Если папки нет, система создаст ее.&lt;/p&gt;\n&lt;h2 id=\"udalit-fajl\"&gt;&lt;a href=\"api-reference/chats/files/index.html#udalit-fajl\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Удалить файл&lt;/span&gt;&lt;/a&gt;Удалить файл&lt;/h2&gt;\n&lt;p&gt;Когда файл больше не нужен, его можно удалить из папки чата с помощью метода &lt;a href=\"api-reference/chats/files/im-disk-file-delete\"&gt;im.disk.file.delete&lt;/a&gt;. В чате вместо файла отобразится текст &lt;em&gt;Сообщение удалено&lt;/em&gt;.&lt;/p&gt;\n&lt;h2 id=\"poluchit-papku-hraneniya-fajlov-chata\"&gt;&lt;a href=\"api-reference/chats/files/index.html#poluchit-papku-hraneniya-fajlov-chata\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Получить папку хранения файлов чата&lt;/span&gt;&lt;/a&gt;Получить папку хранения файлов чата&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/files/im-disk-folder-get\"&gt;im.disk.folder.get&lt;/a&gt; получает идентификатор папки, в которой хранятся файлы чата. Идентификатор можно использовать в методах Диска, например:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;загрузить файл в папку чата методом &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;посмотреть список файлов папки методом &lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/files/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lf9h0sjk\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: участник чата&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/files/im-disk-file-commit.html\"&gt;im.disk.file.commit&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет файл в чат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/files/im-disk-file-save.html\"&gt;im.disk.file.save&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сохраняет файл на свой диск&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/files/im-disk-file-delete.html\"&gt;im.disk.file.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет файл из папки чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/files/im-disk-folder-get.html\"&gt;im.disk.folder.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает папку хранения файлов чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь методов с другими объектами","href":"api-reference/chats/files/index.html#svyaz-metodov-s-drugimi-obuektami","level":2},{"title":"Добавить файл в чат","href":"api-reference/chats/files/index.html#dobavit-fajl-v-chat","level":2},{"title":"Сохранить файл на свой диск","href":"api-reference/chats/files/index.html#sohranit-fajl-na-svoj-disk","level":2},{"title":"Удалить файл","href":"api-reference/chats/files/index.html#udalit-fajl","level":2},{"title":"Получить папку хранения файлов чата","href":"api-reference/chats/files/index.html#poluchit-papku-hraneniya-fajlov-chata","level":2},{"title":"Обзор методов","href":"api-reference/chats/files/index.html#all-methods","level":2}],"title":"Файлы в чатах: обзор методов"},"router":{"pathname":"api-reference/chats/files/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
