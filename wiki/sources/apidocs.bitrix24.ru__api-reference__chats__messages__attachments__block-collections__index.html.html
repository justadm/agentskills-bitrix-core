        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Блоки определяют структуру и внешний вид вложения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gwb4s8ph\"&gt;ATTACH&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"tipy-blokov\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#tipy-blokov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы блоков&lt;/span&gt;&lt;/a&gt;Типы блоков&lt;/h2&gt;\n&lt;h3 id=\"blok-polzovatelya-user\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-polzovatelya-user\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок пользователя (USER)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/user.html\"&gt;Блок пользователя (USER)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Показывает карточку пользователя внутри вложения: имя, аватар и ссылку на профиль или внешний ресурс.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/user.png\" alt=\"Блок пользователя\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"blok-so-ssylkami-link\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-so-ssylkami-link\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок со ссылками (LINK)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/links.html\"&gt;Блок со ссылками (LINK)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Добавляет кликабельную ссылку с подписью. Подходит для перехода к задаче, документу, сделке или внешней странице.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/link.png\" alt=\"Блок со ссылками\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"blok-s-tekstom-message\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-tekstom-message\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок с текстом (MESSAGE)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/text.html\"&gt;Блок с текстом (MESSAGE)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Выводит текстовый фрагмент вложения. Используется для заголовков, пояснений, комментариев и основного контента.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/text.png\" alt=\"Блок с текстом\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"blok-s-razdelitelem-delimiter\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-razdelitelem-delimiter\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок с разделителем (DELIMITER)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/delimiter.html\"&gt;Блок с разделителем (DELIMITER)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Добавляет визуальный разделитель между частями вложения. Помогает отделить смысловые блоки в длинной карточке.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/delimiter.png\" alt=\"Блок с разделителем\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"blok-dlya-postroeniya-strok-i-kolonok-grid\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-dlya-postroeniya-strok-i-kolonok-grid\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок для построения строк и колонок (GRID)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/grid.html\"&gt;Блок для построения строк и колонок (GRID)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Формирует табличную структуру из пар «название-значение». Подходит для карточек со свойствами и параметрами.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/grid.html#блочное-представление\"&gt;Блочное представление (BLOCK)&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/grid.png\" alt=\"Блочное построение\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/grid.html#строчное-представление\"&gt;Строчное представление (LINE)&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/line_grid.png\" alt=\"Строчное построение\" /&gt;&lt;/p&gt;\n&lt;p&gt;В мобильной версии блоки выводятся друг под другом:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/line_grid_mob.jpg\" alt=\"Строчное построение (mobile)\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/grid.html#представление-в-виде-двух-колонок\"&gt;Представление в виде двух колонок (ROW)&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/block_grid3.png\" alt=\"Построение в виде двух колонок\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\"blok-s-izobrazheniyami-image\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-izobrazheniyami-image\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок с изображениями (IMAGE)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/images.html\"&gt;Блок с изображениями (IMAGE)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Показывает одно или несколько изображений во вложении.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/images.png\" alt=\"Блок с изображениями\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"blok-s-fajlami-file\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-fajlami-file\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Блок с файлами (FILE)&lt;/span&gt;&lt;/a&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/files.html\"&gt;Блок с файлами (FILE)&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Добавляет файл с названием и ссылкой на скачивание или открытие.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/block-collections/_images/files.png\" alt=\"Блок с файлами\" /&gt;&lt;/p&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/block-collections/index.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/attachments/index.html\"&gt;Вложения в сообщениях ATTACH&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/attachments/constructor.html\"&gt;Конструктор вложений ATTACH&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Типы блоков","href":"api-reference/chats/messages/attachments/block-collections/index.html#tipy-blokov","level":2,"items":[{"title":"Блок пользователя (USER)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-polzovatelya-user","level":3},{"title":"Блок со ссылками (LINK)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-so-ssylkami-link","level":3},{"title":"Блок с текстом (MESSAGE)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-tekstom-message","level":3},{"title":"Блок с разделителем (DELIMITER)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-razdelitelem-delimiter","level":3},{"title":"Блок для построения строк и колонок (GRID)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-dlya-postroeniya-strok-i-kolonok-grid","level":3},{"title":"Блок с изображениями (IMAGE)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-izobrazheniyami-image","level":3},{"title":"Блок с файлами (FILE)","href":"api-reference/chats/messages/attachments/block-collections/index.html#blok-s-fajlami-file","level":3}]},{"title":"Продолжите изучение","href":"api-reference/chats/messages/attachments/block-collections/index.html#prodolzhite-izuchenie","level":2}],"title":"Коллекция блоков ATTACH"},"router":{"pathname":"api-reference/chats/messages/attachments/block-collections/index","depth":6,"base":"../../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
