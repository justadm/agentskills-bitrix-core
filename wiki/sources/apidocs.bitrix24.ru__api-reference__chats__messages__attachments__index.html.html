            {"data":{"leading":false,"html":"&lt;p&gt;Вложения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-96f1bdyd\"&gt;ATTACH&lt;/code&gt; позволяют добавлять в сообщения структурированный контент: текстовые блоки, ссылки, изображения, файлы, разделители и таблицы.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/attachments/_images/attach1.png\" alt=\"Вложения\" /&gt;&lt;/p&gt;\n&lt;p&gt;Методы, которые поддерживают работу с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4usu02ei\"&gt;ATTACH&lt;/code&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/im-message-add.html\"&gt;im.message.add&lt;/a&gt; — отправить сообщение в чат&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/im-message-update.html\"&gt;im.message.update&lt;/a&gt; — изменить отправленное сообщение&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/notifications/im-notify.html\"&gt;im.notify&lt;/a&gt; — отправить уведомление&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-personal-add.html\"&gt;im.notify.personal.add&lt;/a&gt; — отправить персональное уведомление&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-system-add.html\"&gt;im.notify.system.add&lt;/a&gt; — отправить системное уведомление&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/imbot-message-add.html\"&gt;imbot.message.add&lt;/a&gt; — отправить сообщение от имени чат-бота&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/imbot-message-update.html\"&gt;imbot.message.update&lt;/a&gt; — изменить сообщение чат-бота&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/commands/imbot-command-answer.html\"&gt;imbot.command.answer&lt;/a&gt; — отправить ответ чат-бота на команду&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"formaty-obuekta-attach\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/index.html#formaty-obuekta-attach\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Форматы объекта ATTACH&lt;/span&gt;&lt;/a&gt;Форматы объекта ATTACH&lt;/h2&gt;\n&lt;p&gt;Вы можете передать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k8e3w8oy\"&gt;ATTACH&lt;/code&gt; в одном из двух форматов:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Полная форма: объект с метаданными вложения и массивом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gssbejom\"&gt;BLOCKS&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Краткая форма: массив блоков без обертки&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\"polnaya-forma-attach\"&gt;&lt;a href=\"api-reference/chats/messages/attachments/index.html#polnaya-forma-attach\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Полная форма ATTACH&lt;/span&gt;&lt;/a&gt;Полная форма ATTACH&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-ylukoyh8\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"7aj5q3r9\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-attr\"&gt;ATTACH&lt;/span&gt;: {\n    &lt;span class=\"hljs-attr\"&gt;ID&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n    &lt;span class=\"hljs-attr\"&gt;COLOR_TOKEN&lt;/span&gt;: &lt;span class=\"hljs- ;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор вложения внутри сообщения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;COLOR_TOKEN&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v77y3pgo\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Цветовая схема вложения. Допустимые значения: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zvtqykm5\"&gt;primary&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-klzrxisp\"&gt;secondary&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jjtu6q6m\"&gt;alert&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-llsr13jn\"&gt;base&lt;/code&gt;. По умолчанию: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hyjbcgfs\"&gt;base&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;COLOR&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nu2vqpna\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Явный HEX-цвет вложения. Используется для совместимости со старыми сценариями и в некоторых типах уведомлений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;BLOCKS&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ctnwjdmq\"&gt;array&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив блоков содержимого
