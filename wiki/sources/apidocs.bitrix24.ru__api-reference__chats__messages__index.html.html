            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Сообщение можно форматировать, добавлять полужирный шрифт, перечеркивать и вставлять цитаты. В уроке приводятся команды пользователя, внешний вид и REST API для форматирования сообщений чата.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/messages/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kody-formatirovaniya\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#kody-formatirovaniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Коды форматирования&lt;/span&gt;&lt;/a&gt;Коды форматирования&lt;/h2&gt;\n&lt;p&gt;Если в чат отправить данное сообщение:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs markdown\"&gt;[B]полужирный[/B] текст\n[U]подчеркнутый[/U] текст\n[I]наклонный[/I] текст\n[S]перечеркнутый[/S] текст\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"24\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-24\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-24\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-24.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;То оно отобразится таким образом:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/bbcode1.png\" alt=\"Результат форматирования\" /&gt;&lt;/p&gt;\n&lt;p&gt;Форматирование с помощью rest-api:&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;В примере используется функция &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e63pwdjc\"&gt;restCommand&lt;/code&gt;. Это метод отправки данных в &lt;em&gt;Битрикс24&lt;/em&gt;. Другой пример использования метода вы найдёте в примере &lt;a href=\"https://dev.1c-bitrix.ru/~b24bots\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;ЭхоБота&lt;/a&gt;. Вы можете использовать для вызова метода свою функцию, javascript-метод &lt;a href=\"sdk/bx24-js-sdk/how-to-call-rest-methods/bx24-call-method.html\"&gt;BX24.callMethod&lt;/a&gt; или &lt;a href=\"https://github.com/mesilov/bitrix24-php-sdk\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;bitrix24-php-sdk&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"полужирный текст\n            подчеркнутый текст\n            наклонный текст текст\n            перечеркнутый текст\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"47\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-47\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-47\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-47.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"perenos-stroki\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#perenos-stroki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Перенос строки&lt;/span&gt;&lt;/a&gt;Перенос строки&lt;/h2&gt;\n&lt;p&gt;Перенос строки осуществляется добавлением в текст символов:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs markdown\"&gt;[BR]\n\\# BR \\# (без пробелов)\n\\n\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"54\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-54\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-54\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-54.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Любой из этих кодов, сформирует перенос строки:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/br1.png\" alt=\"Результат переноса\" /&gt;&lt;/p&gt;\n&lt;p&gt;Перенос строки с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Первая строка\n            Вторая строка\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"64\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-64\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-64\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-64.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"citirovanie\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#citirovanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Цитирование&lt;/span&gt;&lt;/a&gt;Цитирование&lt;/h2&gt;\n&lt;p&gt;Цитирование текста можно сделать двумя способами:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs markdown\"&gt;&amp;gt;&amp;gt;первая строка цитаты\n&lt;span class=\"hljs-section\"&gt;&amp;gt;&amp;gt;вторая строка цитаты\n------------------------------------------------------&lt;/span&gt;\nДмитрий Власов08.04.2016 13:06:49\n&lt;span class=\"hljs-section\"&gt;Привет всем\n------------------------------------------------------&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"71\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-71\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-71\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-71.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Вид цитирования будет немного отличаться - во втором случае будет указан автор и время написания цитаты:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/quote1.png\" alt=\"Результат цитаты\" /&gt;&lt;/p&gt;\n&lt;p&gt;Цитирование с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"&amp;gt;&amp;gt;первая строка цитаты\n            &amp;gt;&amp;gt;вторая строка цитаты\n            ------------------------------------------------------\n            Дмитрий Власов08.04.2016 13:06:49\n            Привет всем\n            ------------------------------------------------------\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"81\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-81\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-81\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-81.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"ssylki\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#ssylki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ссылки&lt;/span&gt;&lt;/a&gt;Ссылки&lt;/h2&gt;\n&lt;p&gt;Любая ссылка в тексте автоматически станет кликабельной. Если по адресу ссылки есть «богатое форматирование», то ссылка автоматически его подхватит:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/link1.png\" alt=\"Результат ссылки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Ссылки с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"http://bitrix24.ru\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"94\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-94\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-94\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-94.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;«Богатое форматирование» можно отключить, передав ключ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8a8xiw8q\"&gt;'URL_PREVIEW' =&amp;gt; 'N'&lt;/code&gt; при создании сообщения:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"http://bitrix24.ru\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"URL_PREVIEW\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"N\"&lt;/span&gt;\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"103\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-103\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-103\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-103.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Если вы отправите ссылку на картинку &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nej6qxv3\"&gt;https://files.shelenkov.com/bitrix/images/mantis.jpg&lt;/code&gt; (окончание ссылки должно быть .png, .jpg, .gif), то она автоматически преобразуется в изображение:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/link2.png\" alt=\"Результат ссылки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Вы можете сформировать ссылку самостоятельно через код &lt;strong&gt;URL&lt;/strong&gt; - &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lja8nqz4\"&gt;[URL=http://bitrix24.ru]Ссылка на Битрикс24[/URL]&lt;/code&gt;:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/link3.png\" alt=\"Результат ссылки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Формирование ссылки с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"[URL=http://bitrix24.ru]Ссылка на Битрикс24[/URL]\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"121\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-121\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-121\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-121.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;По аналогии с кодом &lt;strong&gt;URL&lt;/strong&gt;, есть специальные коды на ссылки внутри мессенджера.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vzqdoy50\"&gt;[USER=5]Марта[/USER]&lt;/code&gt; - ссылка на пользователя.&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pn95pgoo\"&gt;[CALL=84012334455]позвонить[/CALL]&lt;/code&gt; - кнопка для осуществления звонка через &lt;em&gt;Битрикс24&lt;/em&gt;.&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q9o2p455\"&gt;[CHAT=12]ссылка на чат[/CHAT]&lt;/code&gt; - ссылка на чат.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/link4.png\" alt=\"Результат ссылки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Форматирование специальных кодов с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"[USER=5]Марта[/USER]\n            [CALL=84012334455]позвонить[/CALL]\n            [CHAT=12]ссылка на чат[/CHAT]\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"148\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-148\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-148\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-148.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"otstupy\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#otstupy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Отступы&lt;/span&gt;&lt;/a&gt;Отступы&lt;/h2&gt;\n&lt;p&gt;Чтобы сделать отступы в сообщении, укажите символ табуляции:&lt;/p&gt;\n&lt;p&gt;[send=текст]название кнопки[/send] - мгновенная отправка текста боту.&lt;/p&gt;\n&lt;p&gt;Отступы с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"\n            Отступ\n                Отступ\n                    Отступ\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"161\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-161\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-161\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-161.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"aktivnye-ssylki-komandy\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#aktivnye-ssylki-komandy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Активные ссылки (команды)&lt;/span&gt;&lt;/a&gt;Активные ссылки (команды)&lt;/h2&gt;\n&lt;p&gt;Если вы хотите, чтобы по клику на ссылку пользователь отправил какой-то текст, используйте тег &lt;strong&gt;SEND&lt;/strong&gt;:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs markdown\"&gt;[send=текст]название кнопки[/send] - мгновенная отправка текста боту.\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"168\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-168\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-168\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-168.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;С помощью такого тега, вы сможете заставить пользователя отправить команду вашего бота, но существует более предпочтительный способ - &lt;a href=\"api-reference/chats/messages\"&gt;Набираемые клавиатуры&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/command1.png\" alt=\"Результат ссылки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Активные ссылки (команды) с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"[send=текст]название кнопки[/send] - мгновенная отправка текста боту\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"178\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-178\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-178\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-178.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Если необходимо, чтобы пользователь что-то дописал к команде, используйте код &lt;strong&gt;PUT&lt;/strong&gt;:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs markdown\"&gt;[put=/search]Введите строку поиска[/put]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"182\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-182\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-182\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-182.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Отправка команды бота с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Введите строку поиска\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"186\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-186\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-186\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-186.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"ikonki\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#ikonki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Иконки&lt;/span&gt;&lt;/a&gt;Иконки&lt;/h2&gt;\n&lt;p&gt;Добавление своей иконки в сообщение производится отправкой кода:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs markdown\"&gt;[icon=http://files.shelenkov.com/images/unicorn.png size=30 title=Единорог]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"193\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-193\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-193\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-193.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Иконка отобразится таким образом:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/messages/_images/unicorn.png\" alt=\"Результат ссылки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Также после этого иконка будет добавлена в набор смайлов Бизнес-чата. Удалить иконку из набора можно, нажав правой кнопкой мыши на иконке в наборе и выбрав &lt;strong&gt;Удалить&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;Обязательным свойством является указание пути до картинки (без пробелов).&lt;/p&gt;\n&lt;p&gt;Доступны дополнительные атрибуты:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;title&lt;/strong&gt; - заголовок;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;height&lt;/strong&gt; - высота;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;width&lt;/strong&gt; - ширина;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;size&lt;/strong&gt; - высота и ширина.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для наилучшего отображения на всех устройствах, размер иконки должен быть в два раза больше, чем указан в параметрах отображения.&lt;/p&gt;\n&lt;p&gt;Добавление своей иконки с помощью rest-api:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'PARAMS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'DIALOG_ID'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"[icon=http://files.shelenkov.com/images/unicorn.png size=30 title=Единорог]\"&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"237\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-237\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-237\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-237.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Как использовать вложения расширенного формата внутри сообщения подробнее читайте &lt;a href=\"api-reference/chats/messages/attachments/index.html\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/messages/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-dialog-messages-get.html\"&gt;im.dialog.messages.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список последних сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-dialog-messages-search.html\"&gt;im.dialog.messages.search&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ищет сообщения в чате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-dialog-read.html\"&gt;im.dialog.read&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает признак «прочитано» у сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-dialog-unread.html\"&gt;im.dialog.unread&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает признак «не прочитано» у сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-dialog-writing.html\"&gt;im.dialog.writing&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет признак «Пользователь пишет»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-add.html\"&gt;im.message.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет сообщение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-command.html\"&gt;im.message.command&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Выполняет команду бота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-delete.html\"&gt;im.message.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет сообщение чат-бота&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-like.html\"&gt;im.message.like&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет статус «Мне нравится» у сообщения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-share.html\"&gt;im.message.share&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает объект на основании сообщения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-update.html\"&gt;im.message.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет отправленное сообщение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Коды форматирования","href":"api-reference/chats/messages/index.html#kody-formatirovaniya","level":2},{"title":"Перенос строки","href":"api-reference/chats/messages/index.html#perenos-stroki","level":2},{"title":"Цитирование","href":"api-reference/chats/messages/index.html#citirovanie","level":2},{"title":"Ссылки","href":"api-reference/chats/messages/index.html#ssylki","level":2},{"title":"Отступы","href":"api-reference/chats/messages/index.html#otstupy","level":2},{"title":"Активные ссылки (команды)","href":"api-reference/chats/messages/index.html#aktivnye-ssylki-komandy","level":2},{"title":"Иконки","href":"api-reference/chats/messages/index.html#ikonki","level":2},{"title":"Обзор методов","href":"api-reference/chats/messages/index.html#all-methods","level":2}],"title":"Форматирование"},"router":{"pathname":"api-reference/chats/messages/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
