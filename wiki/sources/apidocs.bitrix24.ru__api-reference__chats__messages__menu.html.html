            {"data":{"leading":false,"html":"&lt;p&gt;Контекстное меню — это набор действий в сообщении. Вы можете добавить свои пункты в контекстное меню, чтобы открывать ссылки или отправлять команды боту.&lt;/p&gt;\n&lt;p&gt;Методы, которые поддерживают работу с контекстным меню:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/imbot-message-add.html\"&gt;imbot.message.add&lt;/a&gt; — отправить сообщение от имени чат-бота&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/imbot-message-update.html\"&gt;imbot.message.update&lt;/a&gt; — изменить отправленное сообщение чат-бота&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/commands/imbot-command-answer.html\"&gt;imbot.command.answer&lt;/a&gt; — отправить ответ на команду чат-бота&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/im-message-add.html\"&gt;im.message.add&lt;/a&gt; — отправить сообщение в чат&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/im-message-update.html\"&gt;im.message.update&lt;/a&gt; — изменить отправленное сообщение&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"kak-dobavit-punkt-v-kontekstnoe-menyu\"&gt;&lt;a href=\"api-reference/chats/messages/menu.html#kak-dobavit-punkt-v-kontekstnoe-menyu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как добавить пункт в контекстное меню&lt;/span&gt;&lt;/a&gt;Как добавить пункт в контекстное меню&lt;/h2&gt;\n&lt;p&gt;Чтобы добавить пункт в контекстное меню, при создании или обновлении сообщения передайте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-90v75gt1\"&gt;MENU&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7so2y9ah\"&gt;MENU&lt;/code&gt; можно передавать:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;строкой JSON&lt;/li&gt;\n&lt;li&gt;объектом с корневым ключом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3lerg5um\"&gt;ITEMS&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;массивом пунктов без обертки&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kfqut6h3\"&gt;MENU&lt;/code&gt; нет ключа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nwb05qat\"&gt;ITEMS&lt;/code&gt;, сервер автоматически считает, что передан сокращенный формат, и оборачивает массив в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pgvrjkki\"&gt;ITEMS&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-87tipjr0\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"полный-формат-с-ключом-items\" data-diplodoc-key=\"%d0%9f%d0%be%d0%bb%d0%bd%d1%8b%d0%b9%20%d1%84%d0%be%d1%80%d0%bc%d0%b0%d1%82%20%d1%81%20%d0%ba%d0%bb%d1%8e%d1%87%d0%be%d0%bc%20items\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Полный формат с ключом ITEMS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"сокращенный-формат\" data-diplodoc-key=\"%d0%a1%d0%be%d0%ba%d1%80%d0%b0%d1%89%d0%b5%d0%bd%d0%bd%d1%8b%d0%b9%20%d1%84%d0%be%d1%80%d0%bc%d0%b0%d1%82\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;Сокращенный формат&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"m9t5ujtl\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Полный формат с ключом ITEMS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"MENU\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"ITEMS\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;\"TEXT\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Открыть сайт\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;\"LINK\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"https://example.com\"&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"72\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-72\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-72\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-72.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"caja21re\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"Сокращенный формат\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"MENU\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;\"TEXT\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Открыть сайт\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;\"LINK\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"https://example.com\"&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"75\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-75\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-75\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-75.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"polya-punkta-menyu\"&gt;&lt;a href=\"api-reference/chats/messages/menu.html#polya-punkta-menyu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поля пункта меню&lt;/span&gt;&lt;/a&gt;Поля пункта меню&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-smzxt2te\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;TEXT&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1dyo4iwo\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текст пункта меню.&lt;/p&gt;\n&lt;p&gt;Для пунктов меню обязательно указывать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ib4xq9or\"&gt;TEXT&lt;/code&gt; и одно поле действия — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dacosdj9\"&gt;LINK&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7zmpezx3\"&gt;COMMAND&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uv8320zm\"&gt;ACTION + ACTION_VALUE&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7m68xmj6\"&gt;APP_ID&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LINK&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oytcw9dv\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ссылка пункта меню. Допустимы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f30cbfg4\"&gt;http/https&lt;/code&gt; и относительный путь &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h57vxmlz\"&gt;/...&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;COMMAND&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o5rbup3t\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Команда для бота.&lt;/p&gt;\n&lt;p&gt;Подробнее об обработке команд чат-ботом читайте &lt;a href=\"api-reference/chats/messages/menu.html#command-processing\"&gt;ниже&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;COMMAND_PARAMS&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gtqlktho\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Параметры команды. Передавайте вместе с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bddcaqxr\"&gt;COMMAND&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;APP_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xpp9uy1s\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор приложения для чата.&lt;/p&gt;\n&lt;p&gt;Устаревший сценарий. Чтобы открыть приложение из чата, используйте встройки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;APP_PARAMS&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8xeyisw5\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Параметры запуска приложения для чата. Передавайте вместе с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yqp37kjv\"&gt;APP_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Устаревший сценарий. Чтобы открыть приложение из чата, используйте встройки&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;На текущий момент вариант с параметрами &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mhy66znm\"&gt;APP_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lzgdvt5o\"&gt;APP_PARAMS&lt;/code&gt; используется в чатах &lt;a href=\"api-reference/imopenlines/openlines/index.html\"&gt;Открытых линий&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ACTION&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0jo2jtcp\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Действие:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qlavjjfn\"&gt;PUT&lt;/code&gt; — вставить текст в поле ввода&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i86w0txc\"&gt;SEND&lt;/code&gt; — отправить текст&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-15r4o90j\"&gt;COPY&lt;/code&gt; — копировать текст в буфер обмена&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nh0ltldu\"&gt;CALL&lt;/code&gt; — позвонить&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gqwe8utg\"&gt;DIALOG&lt;/code&gt; — открыть чат&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Доступно начиная с &lt;a href=\"api-reference/chats/im-revision-get.html\"&gt;ревизии REST API IM&lt;/a&gt; 28&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ACTION_VALUE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mtgsng85\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Значение для &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-14bi3mkg\"&gt;ACTION&lt;/code&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g7zpt0bc\"&gt;PUT&lt;/code&gt; — текст, который будет вставлен в поле ввода&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8wsi642i\"&gt;SEND&lt;/code&gt; — текст, который будет отправлен&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-834x9632\"&gt;COPY&lt;/code&gt; — текст, который будет скопирован в буфер обмена&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fcpu7h07\"&gt;CALL&lt;/code&gt; — номер телефона в международном формате&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0df8adcx\"&gt;DIALOG&lt;/code&gt; — идентификатор чата в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jdjn7a2p\"&gt;chatXXX&lt;/code&gt; для группового чата и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pwl917uz\"&gt;ID&lt;/code&gt; пользователя для личного чата&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Доступно начиная с &lt;a href=\"api-reference/chats/im-revision-get.html\"&gt;ревизии REST API IM&lt;/a&gt; 28&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;CONTEXT&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q029krnk\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Контекст отображения.&lt;/p&gt;\n&lt;p&gt;Допустимые значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hc31c6k4\"&gt;MOBILE&lt;/code&gt; — показывать только на мобильном устройстве&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bf4492pw\"&gt;DESKTOP&lt;/code&gt; — показывать только в десктопной версии&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tqpgvlzn\"&gt;ALL&lt;/code&gt; — показывать везде&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;По умолчанию — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e1y8xtz3\"&gt;ALL&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;DISABLED&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kblt17yc\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Активность пункта меню.&lt;/p&gt;\n&lt;p&gt;Допустимые значения: /im-message-update.html\"&gt;im.message.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/messages/imbot-message-update.html\"&gt;imbot.message.update&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы отключить показ дополнительных пунктов меню, передайте:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j52l9wuy\"&gt;MENU: 'N'&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;пустое значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xm06brey\"&gt;MENU&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"command-processing\"&gt;&lt;a href=\"api-reference/chats/messages/menu.html#command-processing\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обработка команд чат-ботом&lt;/span&gt;&lt;/a&gt;Обработка команд чат-ботом&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Чтобы команда отрабатывала в меню, зарегистрируйте ее через метод &lt;a href=\"api-reference/chat-bots/commands/imbot-command-register.html\"&gt;imbot.command.register&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;В пункте меню укажите следующие ключи:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;\"COMMAND\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"example\"&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// команда, которая будет отправлена чат-боту&lt;/span&gt;\n&lt;span class=\"hljs-string\"&gt;\"COMMAND_PARAMS\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"example\"&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// параметры для команды&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"427\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-427\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-427\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-427.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Нажатие на пункт меню сформирует событие &lt;a href=\"api-reference/chat-bots/commands/events/on-im-command-add.html\"&gt;ONIMCOMMANDADD&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Внутри события в массиве &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-azuqnvc3\"&gt;data[COMMAND]&lt;/code&gt; будут переданы данные о вызванном событии. Значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2wuvm5gu\"&gt;COMMAND_CONTEXT&lt;/code&gt; покажет в каком контексте была вызвана команда:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gy12xbi6\"&gt;TEXTAREA&lt;/code&gt; — команда введена вручную&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n3cmd62b\"&gt;KEYBOARD&lt;/code&gt; — команда вызвана кнопкой&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-31kqj0gz\"&gt;MENU&lt;/code&gt; — команда вызвана из контекстного меню&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt
