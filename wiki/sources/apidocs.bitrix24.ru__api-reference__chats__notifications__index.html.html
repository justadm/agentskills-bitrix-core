        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Уведомление в чате — сообщение с информацией от системы или пользователя. Управляет уведомлениями группа методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dnl1z6jh\"&gt;im.notify.*&lt;/code&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/notifications/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/18985244/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;уведомления в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-uvedomlenij-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#svyaz-uvedomlenij-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь уведомлений с другими объектами&lt;/span&gt;&lt;/a&gt;Связь уведомлений с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Уведомление отправляется пользователю по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yy5digda\"&gt;USER_ID&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"otpravit-uvedomlenie\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#otpravit-uvedomlenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Отправить уведомление&lt;/span&gt;&lt;/a&gt;Отправить уведомление&lt;/h2&gt;\n&lt;p&gt;В мессенджер можно отправить сообщение с информацией, которое отобразится в списке уведомлений.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Универсальный метод.&lt;/strong&gt; Метод &lt;a href=\"api-reference/chats/notifications/im-notify.html\"&gt;im.notify&lt;/a&gt; отправляет персональное или системное уведомление через параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-by2keony\"&gt;TYPE&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Персональное уведомление.&lt;/strong&gt; Сотрудник получит уведомление от имени пользователя, который запустил метод. Отправляет персональное уведомление метод &lt;a href=\"api-reference/chats/notifications/im-notify-personal-add.html\"&gt;im.notify.personal.add&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Системное уведомление.&lt;/strong&gt; Отправляет уведомление от системы метод &lt;a href=\"api-reference/chats/notifications/im-notify-system-add.html\"&gt;im.notify.system.add&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Каждое уведомление можно связать с уникальным тегом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ktgfy2ge\"&gt;TAG&lt;/code&gt;. Если отправить новое уведомление с тем же тегом, система удалит предыдущее уведомление.&lt;/p&gt;\n&lt;p&gt;Все методы отправки возвращают идентификатор уведомления, который можно использовать в других методах.&lt;/p&gt;\n&lt;h2 id=\"poluchit-uvedomleniya\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#poluchit-uvedomleniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Получить уведомления&lt;/span&gt;&lt;/a&gt;Получить уведомления&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-get.html\"&gt;im.notify.get&lt;/a&gt; возвращает текущие уведомления с пагинацией.&lt;/p&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-schema-get.html\"&gt;im.notify.schema.get&lt;/a&gt; возвращает доступные типы уведомлений по модулям.&lt;/p&gt;\n&lt;h2 id=\"prochitat-uvedomleniya\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#prochitat-uvedomleniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Прочитать уведомления&lt;/span&gt;&lt;/a&gt;Прочитать уведомления&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-read-list.html\"&gt;im.notify.read.list&lt;/a&gt; управляет меткой Прочитано для списка уведомлений, кроме типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dralif94\"&gt;CONFIRM&lt;/code&gt; c кнопками подтверждения. С помощью параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xnf06lbd\"&gt;ACTION&lt;/code&gt; можно отметить уведомления как прочитанные &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k8uzliit\"&gt;Y&lt;/code&gt; или непрочитанные &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hl7ttccv\"&gt;N&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-read.html\"&gt;im.notify.read&lt;/a&gt; прочитывает одно уведомление или все уведомления после указанного. Параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tzw3qmb5\"&gt;ONLY_CURRENT&lt;/code&gt; задает область применения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h6d81s6h\"&gt;Y&lt;/code&gt; — метка Прочитано установится только для указанного уведомления,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gz1kjqsz\"&gt;N&lt;/code&gt; или отсутствие параметра — для всех уведомлений с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dyi3ecti\"&gt;ID&lt;/code&gt; равным и больше указанного.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-read-all.html\"&gt;im.notify.read.all&lt;/a&gt; отмечает прочитанными все уведомления текущего пользователя.&lt;/p&gt;\n&lt;h2 id=\"udalit-uvedomlenie\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#udalit-uvedomlenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Удалить уведомление&lt;/span&gt;&lt;/a&gt;Удалить уведомление&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-delete.html\"&gt;im.notify.delete&lt;/a&gt; удаляет уведомление по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wyabf16g\"&gt;ID&lt;/code&gt; или по тегам &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9knp5nge\"&gt;TAG&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wmcffj2e\"&gt;SUB_TAG&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"otvetit-na-uvedomlenie\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#otvetit-na-uvedomlenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ответить на уведомление&lt;/span&gt;&lt;/a&gt;Ответить на уведомление&lt;/h2&gt;\n&lt;p&gt;Ответить на уведомление, которое поддерживает быстрый ответ, можно с помощью метода &lt;a href=\"api-reference/chats/notifications/im-notify-answer.html\"&gt;im.notify.answer&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Взаимодействовать с кнопками в уведомлении можно методом &lt;a href=\"api-reference/chats/notifications/im-notify-confirm.html\"&gt;im.notify.confirm&lt;/a&gt;. В параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8msbeqn2\"&gt;NOTIFY_VALUE&lt;/code&gt; нужно передать значение кнопки. Например, для уведомления о приглашении на встречу кнопка Принять имеет значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2cfpdpkm\"&gt;Y&lt;/code&gt; и кнопка Отказаться — значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8c76mlmu\"&gt;N&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"poisk-po-istorii-uvedomlenij\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#poisk-po-istorii-uvedomlenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поиск по истории уведомлений&lt;/span&gt;&lt;/a&gt;Поиск по истории уведомлений&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/notifications/im-notify-history-search.html\"&gt;im.notify.history.search&lt;/a&gt; выполняет поиск по истории уведомлений с фильтрами по тексту, типу, дате и групповому тегу&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/notifications/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-14rp0s5a\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify.html\"&gt;im.notify&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет уведомление&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-personal-add.html\"&gt;im.notify.personal.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет персональное уведомление&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-system-add.html\"&gt;im.notify.system.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет системное уведомление&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-get.html\"&gt;im.notify.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает уведомления пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-schema-get.html\"&gt;im.notify.schema.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает схему типов уведомлений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-read-list.html\"&gt;im.notify.read.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прочитывает список уведомлений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-read.html\"&gt;im.notify.read&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прочитывает уведомление или возвращает его в непрочитанные&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-read-all.html\"&gt;im.notify.read.all&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прочитывает все уведомления&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-answer.html\"&gt;im.notify.answer&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отвечает на уведомление, которое поддерживает быстрый ответ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-confirm.html\"&gt;im.notify.confirm&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Взаимодействует с кнопками уведомлений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-delete.html\"&gt;im.notify.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет уведомления&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/notifications/im-notify-history-search.html\"&gt;im.notify.history.search&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Выполняет поиск по истории уведомлений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь уведомлений с другими объектами","href":"api-reference/chats/notifications/index.html#svyaz-uvedomlenij-s-drugimi-obuektami","level":2},{"title":"Отправить уведомление","href":"api-reference/chats/notifications/index.html#otpravit-uvedomlenie","level":2},{"title":"Получить уведомления","href":"api-reference/chats/notifications/index.html#poluchit-uvedomleniya","level":2},{"title":"Прочитать уведомления","href":"api-reference/chats/notifications/index.html#prochitat-uvedomleniya","level":2},{"title":"Удалить уведомление","href":"api-reference/chats/notifications/index.html#udalit-uvedomlenie","level":2},{"title":"Ответить на уведомление","href":"api-reference/chats/notifications/index.html#otvetit-na-uvedomlenie","level":2},{"title":"Поиск по истории уведомлений","href":"api-reference/chats/notifications/index.html#poisk-po-istorii-uvedomlenij","level":2},{"title":"Обзор методов","href":"api-reference/chats/notifications/index.html#all-methods","level":2}],"title":"Уведомления в чатах: обзор методов"},"router":{"pathname":"api-reference/chats/notifications/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
