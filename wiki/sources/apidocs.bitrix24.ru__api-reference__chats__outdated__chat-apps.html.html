        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Описанный в данной главе формат встраивания в чат приложений на текущий момент работает корректно, однако для Нового чата нужно встраивать приложения в формате &lt;a href=\"api-reference/widgets/im/index.html\"&gt;Rest Placement&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"tipy-prilozhenij\"&gt;&lt;a href=\"api-reference/chats/outdated/chat-apps.html#tipy-prilozhenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы приложений&lt;/span&gt;&lt;/a&gt;Типы приложений&lt;/h2&gt;\n&lt;p&gt;Разработчики имеют возможность встраиваться в Мессенджер, добавив свою иконку в панель ввода текста:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/im_apps1.png\" alt=\"Приложения для чата\" /&gt;&lt;/p&gt;\n&lt;p&gt;Если приложение не загрузит картинку, будет выведена служебная иконка &lt;strong&gt;Приложения для чата&lt;/strong&gt;. По клику на иконку будет показан ее текстовый вариант.&lt;/p&gt;\n&lt;p&gt;Приложение для чата бывает двух типов — &lt;strong&gt;JS команда&lt;/strong&gt; или &lt;strong&gt;IFRAME приложение&lt;/strong&gt;.&lt;/p&gt;\n&lt;h3 id=\"js-komanda\"&gt;&lt;a href=\"api-reference/chats/outdated/chat-apps.html#js-komanda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;JS команда&lt;/span&gt;&lt;/a&gt;JS команда&lt;/h3&gt;\n&lt;p&gt;При нажатии на иконку вставляется команда для чат-бота в поле ввода либо отправяется команда в чат, либо начинается телефонный звонок, либо открывается открытая линия поддержки.&lt;/p&gt;\n&lt;p&gt;С помощью этого формата разработчики в своих чат-ботах могут сделать кнопку для связи с ними.&lt;/p&gt;\n&lt;p&gt;Пример такой команды для чат-бота Марта — иконка для игры в крестики нолики:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/im_apps2.png\" alt=\"JS команда\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"iframe-prilozhenie\"&gt;&lt;a href=\"api-reference/chats/outdated/chat-apps.html#iframe-prilozhenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;IFRAME-приложение&lt;/span&gt;&lt;/a&gt;IFRAME-приложение&lt;/h3&gt;\n&lt;p&gt;Это улучшенный формат. При нажатии на иконку будет открыто IFRAME-приложение, в котором разработчик сможет реализовать любые функции. Приложение может взаимодействовать с чатом c помощью JS-команд:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;для вставки сообщения в поле ввода&lt;/li&gt;\n&lt;li&gt;для отправки сообщения от лица пользователя&lt;/li&gt;\n&lt;li&gt;для закрытия диалога&lt;/li&gt;\n&lt;li&gt;открытия чата технической поддержки (консультант ОЛ)&lt;/li&gt;\n&lt;li&gt;совершения звонка&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Пример такой реализации вы можете увидеть на примере чат-бота GIphy:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/im_apps3.png\" alt=\"IFRAME приложение\" /&gt;&lt;/p&gt;\n&lt;p&gt;Прочувствуйте разницу — раньше вы писали команду в виде сообщения, и Giphy выдавал вам случайную картинку по теме. Теперь вы видите то, что отправляете.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Обратите внимание, иконки умеют понимать контекст, а это значит, что приложение может отображаться только в тех чатах, в которых вам это требуется.&lt;/p&gt;\n&lt;p&gt;Например, для связи с техподдержкой приложение правильнее будет разместить в контексте вашего чат-бота, ведь в других чатах она будет лишней. Либо вы можете сделать специальное приложение для открытых линий — оно должно показываться только в контексте открытых линий.&lt;/p&gt;\n&lt;p&gt;Доступные контексты: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wz41gi2p\"&gt;all&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6knep6gq\"&gt;chat&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r7shsjze\"&gt;bot&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q8e3b6rq\"&gt;lines&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wzrx4a90\"&gt;user&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zwbicv6r\"&gt;call&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;К каждому контексту можно добавить постфикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kczvjnf1\"&gt;-admin&lt;/code&gt; — тогда иконка будет показана в нужном контексте только администраторам.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kontekstnye-prilozheniya\"&gt;&lt;a href=\"api-reference/chats/outdated/chat-apps.html#kontekstnye-prilozheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Контекстные приложения&lt;/span&gt;&lt;/a&gt;Контекстные приложения&lt;/h2&gt;\n&lt;p&gt;Контекстные приложения созданы для того, чтобы помогать взаимодействовать пользователю с чат-ботом в рамках конкретного диалога (сообщения).&lt;/p&gt;\n&lt;p&gt;Например, клиент пишет в открытую линию, чат-бот для открытых линий анализирует сообщение и подготавливает варианты ответа. Чтобы не мешать операторам работать и не показывать ему весь поток информации, мы аккуратно формируем кнопку, по нажатию на которую откроется IFRAME-приложение.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/im_apps4.png\" alt=\"Контекстные приложения\" /&gt;&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Типы приложений","href":"api-reference/chats/outdated/chat-apps.html#tipy-prilozhenij","level":2,"items":[{"title":"JS команда","href":"api-reference/chats/outdated/chat-apps.html#js-komanda","level":3},{"title":"IFRAME-приложение","href":"api-reference/chats/outdated/chat-apps.html#iframe-prilozhenie","level":3}]},{"title":"Контекстные приложения","href":"api-reference/chats/outdated/chat-apps.html#kontekstnye-prilozheniya","level":2}],"title":"О приложениях для чата"},"router":{"pathname":"api-reference/chats/outdated/chat-apps","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
