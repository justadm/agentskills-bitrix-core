        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;О том, что такое контекст-приложения, можно прочитать &lt;a href=\"api-reference/chats/outdated/chat-apps.html#контекстные-приложения\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Для работы с контекстом выполните несколько действий:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/outdated/create-app/index.html\"&gt;Зарегистрируйте приложение&lt;/a&gt;. Вы можете зарегистрировать скрытое приложение, чтобы оно не отображалось на панели ввода текста&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Отправьте (или обновите) любое сообщение &lt;a href=\"api-reference/chats/messages/keyboards.html\"&gt;с прикрепленной клавиатурой&lt;/a&gt; или &lt;a href=\"api-reference/chats/messages/menu.html\"&gt;с меню&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;В параметрах кнопки клавиатуры или пункта меню необходимо передайте идентификатор приложения&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/chats/outdated/context.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;В примере используется функция &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g9xb6ipc\"&gt;restCommand&lt;/code&gt;. Это метод отправки данных в &lt;em&gt;Битрикс24&lt;/em&gt;. Другой пример использования метода вы найдёте в примере &lt;a href=\"https://dev.1c-bitrix.ru/~b24bots\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;ЭхоБота&lt;/a&gt;. Вы можете использовать для вызова метода свою функцию, javascript-метод &lt;a href=\"sdk/bx24-js-sdk/how-to-call-rest-methods/bx24-call-method.html\"&gt;BX24.callMethod&lt;/a&gt; или &lt;a href=\"https://github.com/mesilov/bitrix24-php-sdk\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;bitrix24-php-sdk&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-yy4adhtg\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;PHP&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"44qyd3dl\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;restCommand&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'imbot.message.add'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"DIALOG_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"BOT_ID\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;17&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"MESSAGE\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Hello! My name is EchoBot :)\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"KEYBOARD\"&lt;/span&gt; =&amp;gt; [\n            {\n                &lt;span class=\"hljs-string\"&gt;\"TEXT\"&lt;/span&gt;:&lt;span class=\"hljs-string\"&gt;\"Open App\"&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;\"APP_ID\"&lt;/span&gt;:&lt;span class=\"hljs-number\"&gt;11&lt;/span&gt;\n            }\n        ],\n        &lt;span class=\"hljs-string\"&gt;\"MENU\"&lt;/span&gt; =&amp;gt; [\n            {\n                &lt;span class=\"hljs-string\"&gt;\"TEXT\"&lt;/span&gt;:&lt;span class=\"hljs-string\"&gt;\"Open App\"&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;\"APP_ID\"&lt;/span&gt;:&lt;span class=\"hljs-number\"&gt;11&lt;/span&gt;\n            }\n        ]\n    ),\n    &lt;span class=\"hljs-variable\"&gt;$_REQUEST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;\"auth\"&lt;/span&gt;]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"46\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-46\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-46\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-46.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Кроме &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fmr5lfrg\"&gt;APP_ID&lt;/code&gt;, вы можете передать любую строку в параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-305otmrv\"&gt;APP_PARAMS&lt;/code&gt;. При открытии вашего IFRAME данные будут переданы параметру &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-psjahi5a\"&gt;BUTTON_PARAMS&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Правила разработки IFRAME-обработчика и ограничения представлены &lt;a href=\"api-reference/chats/outdated/iframe.html\"&gt;в документации&lt;/a&gt;. При создании сообщения вы можете использовать один из двух вариантов — &lt;a href=\"api-reference/chats/messages/keyboards.html\"&gt;клавиатура (KEYBOARD)&lt;/a&gt; или &lt;a href=\"api-reference/chats/messages/menu.html\"&gt;контекстное меню (MENU)&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Примеры","href":"api-reference/chats/outdated/context.html#primery","level":2}],"title":"Контекстные приложения"},"router":{"pathname":"api-reference/chats/outdated/context","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
