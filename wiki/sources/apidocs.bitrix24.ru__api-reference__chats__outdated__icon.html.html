        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;При создании иконки &lt;strong&gt;Приложения для чата&lt;/strong&gt; следуйте следующим правилам:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Иконка должна быть в формате .PNG и иметь прозрачный фон&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/icon_template1.png\" alt=\"Иконка на прозрачном фоне\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Размер холста: 108х66 px, левая часть используется для неактивной иконки, вторая — для отображения активной&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/icon_template2.png\" alt=\"Размер холста\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Основная часть иконки должна быть не более 45х32 px и обязательно отцентрирована по середине каждой части&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/icon_template3.png\" alt=\"Основная часть иконки\" /&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Основной цвет неактивной иконки — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-buvejr08\"&gt;#b3b7bc&lt;/code&gt;, активной — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7wplghmu\"&gt;#2fc7f7&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/color.png\" alt=\"Основной цвет иконки\" /&gt;&lt;/p&gt;\n&lt;p&gt;Чтобы упростить процесс создания иконок, мы предоставляем несколько шаблонов. Вы можете скачать их и использовать в своей работе.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/icon_template4.png\" alt=\"textarea_icon_f\" /&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/icon_template5.png\" alt=\"marta_icon\" /&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/icon_template6.png\" alt=\"textarea_icon\" /&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"https://dev.1c-bitrix.ru/images/chat_bot/im_app/textarea_icon_f.psd\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;textarea_icon_f.psd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"https://dev.1c-bitrix.ru/images/chat_bot/im_app/marta_icon.psd\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;marta_icon.psd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"https://dev.1c-bitrix.ru/images/chat_bot/im_app/textarea_icon.psd\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;textarea_icon.psd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Для загрузки картинки при регистрации или обновлении приложения необходимо передавать ключ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ze40x9ht\"&gt;ICON_FILE&lt;/code&gt;. Значение этого ключа должно быть base64 от вашей картинки&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;'ICON_FILE'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_ invoke__\"&gt;base64_encode&lt;/span&gt;(\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;file_get_contents&lt;/span&gt;(\n        &lt;span class=\"hljs-keyword\"&gt;__DIR__&lt;/span&gt;.&lt;span class=\"hljs-string\"&gt;'/icon_button.png'&lt;/span&gt;\n    )\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"81\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-81\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-81\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-81.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Если вы не создадите иконку для приложения, оно будет сгруппировано в служебную кнопку:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/im_apps1.png\" alt=\"Служебная кнопка\" /&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Создать иконку Приложения для чата"},"router":{"pathname":"api-reference/chats/outdated/icon","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
