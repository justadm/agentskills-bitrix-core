            {"data":{"leading":false,"html":"&lt;p&gt;После регистрации приложения для чата необходимо сделать &lt;strong&gt;IFRAME-обработчик&lt;/strong&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Несмотря на то, что при регистрации вы задаете размеры окна, приложение может уменьшить их в соответствии с фактически доступными размерами. Рекомендуется разрабатывать приложение так, чтобы оно вписывалось в минимальные размеры и могло адаптироваться к увеличению и уменьшению. Это особенно важно для мобильных устройств.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"dannye-na-stranice\"&gt;&lt;a href=\"api-reference/chats/outdated/iframe.html#dannye-na-stranice\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Данные на странице&lt;/span&gt;&lt;/a&gt;Данные на странице&lt;/h2&gt;\n&lt;p&gt;Страница будет открыта со следующими данными:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;\n(\n    [BOT_ID] =&amp;gt; &lt;span class=\"hljs-number\"&gt;17&lt;/span&gt;\n    [BOT_CODE] =&amp;gt; echoBot\n    [APP_ID] =&amp;gt; &lt;span class=\"hljs-number\"&gt;11&lt;/span&gt;\n    [APP_CODE] =&amp;gt; echoFrame\n    [DOMAIN] =&amp;gt; &lt;span class=\"hljs-attr\"&gt;https&lt;/span&gt;://test.bitrix24.ru\n    [DOMAIN_HASH] =&amp;gt; &lt;span class=\"hljs-number\"&gt;0e9&lt;/span&gt;c40cee01d6f182e9261b38b30b5c3\n    [USER_ID] =&amp;gt; &lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;\n    [USER_HASH] =&amp;gt; &lt;span class=\"hljs-number\"&gt;7e23&lt;/span&gt;ac8b6f6c7044076301c7f81cd745\n    [DIALOG_ID] =&amp;gt; &lt;span class=\"hljs-number\"&gt;950&lt;/span&gt;\n    [CONTEXT] =&amp;gt; textarea\n    [LANG] =&amp;gt; ru\n    [IS_CHROME] =&amp;gt; Y\n    [MESSAGE_ID] =&amp;gt; &lt;span class=\"hljs-number\"&gt;12333&lt;/span&gt;\n    [BUTTON_PARAMS] =&amp;gt; test\n    [DIALOG_ENTITY_ID] =&amp;gt; telegrambot|&lt;span class=\"hljs-number\"&gt;8&lt;/span&gt;|&lt;span class=\"hljs-number\"&gt;173633217&lt;/span&gt;|&lt;span class=\"hljs-number\"&gt;569&lt;/span&gt;\n    [DIALOG_ENTITY_DATA_1] =&amp;gt; Y|LEAD|&lt;span class=\"hljs-number\"&gt;56&lt;/span&gt;|N|N|&lt;span class=\"hljs-number\"&gt;1765&lt;/span&gt;\n    [DIALOG_CONTEXT] =&amp;gt; lines\n\n)\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"19\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-19\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-19\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-19.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h3 id=\"parametry\"&gt;&lt;a href=\"api-reference/chats/outdated/iframe.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y09wsp8n\"&gt;BOT_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y8v1i6m0\"&gt;BOT_CODE&lt;/code&gt; — данные о чат-боте, под которым запущено приложение&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yw88glc7\"&gt;APP_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-44v4tfs6\"&gt;APP_CODE&lt;/code&gt; — данные приложении для чата запущенного приложения&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ft09g813\"&gt;DOMAIN&lt;/code&gt; — адрес портала, с которого запустили приложение&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5gtxz252\"&gt;DOMAIN_HASH&lt;/code&gt; — это поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mq583kcy\"&gt;HASH&lt;/code&gt;, переданное при регистрации иконки. Используются для отсечения неавторизованных запросов&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hbo2ae3j\"&gt;USER_ID&lt;/code&gt; — идентификатор пользователя&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nxrs5h93\"&gt;USER_HASH&lt;/code&gt; — хеш-строка для валидации корректности запросов на портале клиента&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-53pjxbej\"&gt;DIALOG_ID&lt;/code&gt; — идентификатор запущенного диалога у пользователя в момент открытия фрейма&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ock6bjuz\"&gt;CONTEXT&lt;/code&gt; — это контекст вызова диалога, может быть &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-prtagk9v\"&gt;textarea&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iy75iezy\"&gt;button&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4qqwecs6\"&gt;LANG&lt;/code&gt; — текущий язык интерфейса клиента&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vklkge8h\"&gt;IS_CHROME&lt;/code&gt; — запущен ли данный фрейм в браузере Google Chrome или нет&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-maofkmlj\"&gt;DIALOG_CONTEXT&lt;/code&gt; — &lt;strong&gt;данный параметр пока недоступен&lt;/strong&gt;. Может быть &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uewql8qu\"&gt;all&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4pfzk8pk\"&gt;chat&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0v2s84sy\"&gt;bot&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ozh73ymg\"&gt;lines&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pgu8df4f\"&gt;user&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m0o2duv8\"&gt;call&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vsurfbdo\"&gt;DIALOG_ENTITY_ID&lt;/code&gt; — дополнительные данные о чате (&lt;strong&gt;данный параметр пока недоступен&lt;/strong&gt;). Для Открытых линий данные разделены |. Значение полей для Открытых линий: 1 — канал, через который пользователь написал, 2 — идентификатор ОЛ, 3 и 4 — служебные данные (параметр пока недоступен)&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7kg4wjv7\"&gt;DIALOG_ENTITY_DATA_1&lt;/code&gt; — дополнительные данные о чате (&lt;strong&gt;данный параметр пока недоступен&lt;/strong&gt;). Для Открытых линий данные разделены |. Значение полей для Открытых линий: 1 — сохранен в CRM, 2 — тип сущности CRM, 3 — идентификатор сущности CRM, 4 и 5 — служебные данные, 6 — идентификатор сессии открытой линии&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если фрейм запущен в режиме контекста:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sje46vf2\"&gt;MESSAGE_ID&lt;/code&gt; — идентификатор сообщения&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hvnjqwsl\"&gt;BUTTON_PARAMS&lt;/code&gt; — параметр кнопки, заданный при отправке&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"vzaimodejstvie-s-roditelskim-oknom-s-messendzherom\"&gt;&lt;a href=\"api-reference/chats/outdated/iframe.html#vzaimodejstvie-s-roditelskim-oknom-s-messendzherom\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Взаимодействие с родительским окном (с мессенджером)&lt;/span&gt;&lt;/a&gt;Взаимодействие с родительским окном (с мессенджером)&lt;/h2&gt;\n&lt;p&gt;Необходимо сделать функции взаимодействия с основным окном, инициализацией и отправкой данных.&lt;/p&gt;\n&lt;h3 id=\"primery-realizacii\"&gt;&lt;a href=\"api-reference/chats/outdated/iframe.html#primery-realizacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры реализации&lt;/span&gt;&lt;/a&gt;Примеры реализации&lt;/h3&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&amp;lt;script type=&lt;span class=\"hljs-string\"&gt;\"text/javascript\"&lt;/span&gt;&amp;gt;\n&lt;span class=\"hljs-comment\"&gt;// функция инициализации коммуникации с основным окном&lt;/span&gt;\n&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title function_\"&gt;frameCommunicationInit&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;)\n{\n     &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (!&lt;span class=\"hljs-variable language_\"&gt;window&lt;/span&gt;.&lt;span class=\"hljs-property\"&gt;frameCommunication&lt;/span&gt;)\n     {\n         &lt;span class=\"hljs-variable language_\"&gt;window&lt;/span&gt;.&lt;span class=\"hljs-property\"&gt;frameCommunication&lt;/span&gt; = {&lt;span class=\"hljs-attr\"&gt;timeout&lt;/span&gt;: {}};\n     }\n     &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(&lt;span class=\"hljs-keyword\"&gt;typeof&lt;/span&gt; &lt;span class=\"hljs-variable language_\"&gt;window&lt;/span&gt;.&lt;span class=\"hljs-property\"&gt;postMessage&lt;/span&gt; === &lt;span class=\"hljs-string\"&gt;'function'&lt;/span&gt;)\n     {\n         &lt;span class=\"hljs-variable language_\"&gt;window&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;addEventListener&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'message'&lt;/span&gt;, &lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;event&lt;/span&gt;){\n            &lt;span class=\"hljs-keyword\"&gt;var&lt;/span&gt; data = {};\n            &lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; { data = &lt;span class=\"hljs-title class_\"&gt;JSON&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;parse&lt;/span&gt;(event.&lt;span class=\"hljs-property\"&gt;data&lt;/span&gt;); } &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (err){}\n\n            &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (data.&lt;span class=\"hljs-property\"&gt;action&lt;/span&gt; == &lt;span class=\"hljs-string\"&gt;'init'&lt;/span&gt;)\n            {\n             frameCommunication.&lt;span class=\"hljs-property\"&gt;uniqueLoadId&lt;/span&gt; = data.&lt;span class=\"hljs-property\"&gt;uniqueLoadId&lt;/span&gt;;\n             frameCommunication.&lt;span class=\"hljs-property\"&gt;postMessageSource&lt;/span&gt; = event.&lt;span class=\"hljs-property\"&gt;source&lt;/span&gt;;\n             frameCommunication.&lt;span class=\"hljs-property\"&gt;postMessageOrigin&lt;/span&gt; = event.&lt;span class=\"hljs-property\"&gt;origin&lt;/span&gt;;\n            }\n         });\n     }\n}\n\n&lt;span class=\"hljs-comment\"&gt;// функция отправки данных в основное окно&lt;/span&gt;\n&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title function_\"&gt;frameCommunicationSend&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;data&lt;/span&gt;)\n{\n     data[&lt;span class=\"hljs-string\"&gt;'uniqueLoadId'&lt;/span&gt;] = frameCommunication.&lt;span class=\"hljs-property\"&gt;uniqueLoadId&lt;/span&gt;;\n     &lt;span class=\"hljs-keyword\"&gt;var&lt;/span&gt; encodedData = &lt;span class=\"hljs-title class_\"&gt;JSON&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;stringify&lt;/span&gt;(data);\n     &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (!frameCommunication.&lt;span class=\"hljs-property\"&gt;postMessageOrigin&lt;/span&gt;)\n     {\n         &lt;span class=\"hljs-built_in\"&gt;clearTimeout&lt;/span&gt;(frameCommunication.&lt;span class=\"hljs-property\"&gt;timeout&lt;/span&gt;[encodedData]);\n         frameCommunication.&lt;span class=\"hljs-property\"&gt;timeout&lt;/span&gt;[encodedData] = &lt;span class=\"hljs-built_in\"&gt;setTimeout&lt;/span&gt;(&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;){\n            &lt;span class=\"hljs-title function_\"&gt;frameCommunicationSend&lt;/span&gt;(data);\n         }, &lt;span class=\"hljs-number\"&gt;10&lt;/span&gt;);\n         &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;;\n     }\n    \n     &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(&lt;span class=\"hljs-keyword\"&gt;typeof&lt;/span&gt; &lt;span class=\"hljs-variable language_\"&gt;window&lt;/span&gt;.&lt;span class=\"hljs-property\"&gt;postMessage&lt;/span&gt; === &lt;span class=\"hljs-string\"&gt;'function'&lt;/span&gt;)\n     {\n         &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(frameCommunication.&lt;span class=\"hljs-property\"&gt;postMessageSource&lt;/span&gt;)\n         {\n            frameCommunication.&lt;span class=\"hljs-property\"&gt;postMessageSource&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;postMessage&lt;/span&gt;(\n             encodedData,\n             frameCommunication.&lt;span class=\"hljs-property\"&gt;postMessageOrigin&lt;/span&gt;\n            );\n         }\n     }\n}\n&lt;span class=\"hljs-title function_\"&gt;frameCommunicationInit&lt;/span&gt;();\n&amp;lt;/script&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"114\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-114\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-114\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-114.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;После этого доступны следующие функции:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Команда отправки текста от лица пользователя:&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1uwsclcj\"&gt;frameCommunicationSend({'action': 'send', 'message': 'Send message'})&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Команда вставки текста в поле ввода:&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-emwd04h2\"&gt;frameCommunicationSend({'action': 'put', 'message': 'Put message'})&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Команда начала звонка:&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h0z711f5\"&gt;frameCommunicationSend({'action': 'call', 'number': '123456'})&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Команда открытия диалога с вашей открытой линией:&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oh6tt4r5\"&gt;frameCommunicationSend({'action': 'support', 'code': '6a4cdbcf753addac1a573ea64be826ca'})&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Команда закрытия фрейма:&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7d96ib1s\"&gt;frameCommunicationSend({'action': 'close'})&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\"api-reference/chats/outdated/_images/iframe1.png\" alt=\"Изображение\" /&gt;&lt;/p&gt;\n&lt;h2 id=\"registraciya-i-bezopasnost\"&gt;&lt;a href=\"api-reference/chats/outdated/iframe.html#registraciya-i-bezopasnost\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Регистрация и безопасность&lt;/span&gt;&lt;/a&gt;Регистрация и безопасность&lt;/h2&gt;\n&lt;p&gt;Вы можете не проверять входящие запросы, но мы &lt;strong&gt;настоятельно рекомендуем это делать&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;На основе входящих данных вы можете реализовать &lt;strong&gt;необходимые проверки&lt;/strong&gt;:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Рекомендуем проверять REFERER на совпадение с указанным доменом&lt;/li&gt;\n&lt;li&gt;Рекомендуем проверять домен и хеш от него&lt;/li&gt;\n&lt;li&gt;Рекомендуем проверять пользователя и хеш от него&lt;/li&gt;\n&lt;li&gt;Используйте уникальный HASH для каждой новой регистрации&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;В сочетании всех этих факторов вы сможете сделать достаточно безопасное приложение.&lt;/p&gt;\n&lt;p&gt;При регистрации команды, вы должны указать HASH-строку, которой будут подписываться домен и пользователь:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-variable\"&gt;$hash&lt;/span&gt; = &lt;span class=\"hljs-string\"&gt;'0e9c40cee01d6f182e9261b38b30b5c3'&lt;/span&gt;; &lt;span class=\"hljs-comment\"&gt;// hash, указанный при регистрации приложения&lt;/span&gt;\n\n&lt;span class=\"hljs-variable\"&gt;$check&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;parse_url&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_GET&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'DOMAIN'&lt;/span&gt;]);\n\n&lt;span class=\"hljs-comment\"&gt;// проверка на валидность указанного домена&lt;/span&gt;\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-variable\"&gt;$_GET&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'DOMAIN_HASH'&lt;/span&gt;] == &lt;span class=\"hljs-title function_ invoke__\"&gt;md5&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$check&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'host'&lt;/span&gt;].&lt;span class=\"hljs-variable\"&gt;$hash&lt;/span&gt;))\n{\n&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'OK'&lt;/span&gt;;\n}\n\n&lt;span class=\"hljs-comment\"&gt;// проверка на валидность указанного пользователя&lt;/span&gt;\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-variable\"&gt;$_GET&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'USER_HASH'&lt;/span&gt;] == &lt;span class=\"hljs-title function_ invoke__\"&gt;md5&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_GET&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'USER_ID'&lt;/span&gt;].&lt;span class=\"hljs-variable\"&gt;$hash&lt;/span&gt;))\n{\n&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'OK'&lt;/span&gt;;\n}\n\n&lt;span class=\"hljs-comment\"&gt;// проверка на REFERER&lt;/span&gt;\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-title function_ invoke__\"&gt;strpos&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_SERVER&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'HTTP_REFERER'&lt;/span&gt;], &lt;span class=\"hljs-variable\"&gt;$_GET&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'DOMAIN'&lt;/span&gt;])!== &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;)\n{\n&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'OK'&lt;/span&gt;;\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"185\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-185\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-185\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-185.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Работа в таком режиме подробно рассмотрена в демо-примере, который вы можете скачать &lt;a href=\"https://dev.1c-bitrix.ru/images/chat_bot/im_app/iframe.zip\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;здесь&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Данные на странице","href":"api-reference/chats/outdated/iframe.html#dannye-na-stranice","level":2,"items":[{"title":"Параметры","href":"api-reference/chats/outdated/iframe.html#parametry","level":3}]},{"title":"Взаимодействие с родительским окном (с мессенджером)","href":"api-reference/chats/outdated/iframe.html#vzaimodejstvie-s-roditelskim-oknom-s-messendzherom","level":2,"items":[{"title":"Примеры реализации","href":"api-reference/chats/outdated/iframe.html#primery-realizacii","level":3}]},{"title":"Регистрация и безопасность","href":"api-reference/chats/outdated/iframe.html#registraciya-i-bezopasnost","level":2}],"title":"Cоздать IFRAME-обработчик"},"router":{"pathname":"api-reference/chats/outdated/iframe","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
