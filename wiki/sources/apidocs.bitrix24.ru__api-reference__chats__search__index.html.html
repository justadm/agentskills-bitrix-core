        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;С помощью поиска можно найти групповые чаты, подразделения и сотрудников. Управляет поиском группа методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6y2z7h9d\"&gt;im.search.*&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Все методы текущей версии чата поддерживают стандартную постраничную навигацию. Настраивать выборку можно параметрами смещения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rrt2j4yc\"&gt;OFFSET&lt;/code&gt; и лимита &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h5po8mvg\"&gt;LIMIT&lt;/code&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/search/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/21912520/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Чаты в Битрикс24: интерфейс и возможности&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"najti-chat-po-nazvaniyu\"&gt;&lt;a href=\"api-reference/chats/search/index.html#najti-chat-po-nazvaniyu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Найти чат по названию&lt;/span&gt;&lt;/a&gt;Найти чат по названию&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/search/im-search-chat-list.html\"&gt;im.search.chat.list&lt;/a&gt; ищет групповые чаты по названию и участникам. Поиск выполняется по подстроке:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в заголовке чата,&lt;/li&gt;\n&lt;li&gt;имени и фамилии участников.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"najti-podrazdeleniya\"&gt;&lt;a href=\"api-reference/chats/search/index.html#najti-podrazdeleniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Найти подразделения&lt;/span&gt;&lt;/a&gt;Найти подразделения&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/search/im-search-department-list.html\"&gt;im.search.department.list&lt;/a&gt; ищет подразделения компании по их полному названию. С помощью параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-up89mhh9\"&gt;USER_DATA=Y&lt;/code&gt; в ответ можно добавить данные о руководителе подразделения.&lt;/p&gt;\n&lt;h2 id=\"najti-sotrudnikov\"&gt;&lt;a href=\"api-reference/chats/search/index.html#najti-sotrudnikov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Найти сотрудников&lt;/span&gt;&lt;/a&gt;Найти сотрудников&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/search/im-search-user-list.html\"&gt;im.search.user.list&lt;/a&gt; ищет сотрудников по имени, фамилии, должности и подразделению.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/search/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o0z460yk\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/search/im-search-chat-list.html\"&gt;im.search.chat.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ищет чаты по названиям&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/search/im-search-department-list.html\"&gt;im.search.department.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ищет подразделения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/search/im-search-user-list.html\"&gt;im.search.user.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ищет пользователей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"metody-dlya-predydushej-versii-chata\"&gt;&lt;a href=\"api-reference/chats/search/index.html#metody-dlya-predydushej-versii-chata\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Методы для предыдущей версии чата&lt;/span&gt;&lt;/a&gt;Методы для предыдущей версии чата&lt;/h3&gt;\n&lt;p&gt;Методы разработаны для предыдущей версии чата. В текущей версии чата М1 они работают, но результаты не отображаются в интерфейсе.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19071750/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Чат: новый мессенджер&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/search/im-search-last-add.html\"&gt;im.search.last.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет поиск в историю&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/search/im-search-last-get.html\"&gt;im.search.last.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает историю поиска&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/search/im-search-last-delete.html\"&gt;im.search.last.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет поиск из истории&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Найти чат по названию","href":"api-reference/chats/search/index.html#najti-chat-po-nazvaniyu","level":2},{"title":"Найти подразделения","href":"api-reference/chats/search/index.html#najti-podrazdeleniya","level":2},{"title":"Найти сотрудников","href":"api-reference/chats/search/index.html#najti-sotrudnikov","level":2},{"title":"Обзор методов","href":"api-reference/chats/search/index.html#all-methods","level":2,"items":[{"title":"Методы для предыдущей версии чата","href":"api-reference/chats/search/index.html#metody-dlya-predydushej-versii-chata","level":3}]}],"title":"Поиск в чатах: обзор методов"},"router":{"pathname":"api-reference/chats/search/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
