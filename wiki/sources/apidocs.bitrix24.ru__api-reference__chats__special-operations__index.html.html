        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Специальные операции помогают управлять чатами: отмечать сообщения как прочитанные, закреплять чаты, отключать уведомления или удалять диалоги из списка последних чатов.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/special-operations/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/21912520/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Чаты в Битрикс24: интерфейс и возможности&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-specialnyh-operacij-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/special-operations/index.html#svyaz-specialnyh-operacij-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь специальных операций с другими объектами&lt;/span&gt;&lt;/a&gt;Связь специальных операций с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Чат.&lt;/strong&gt; Специальные операции с чатами выполняются по идентификатору чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ui4irr8s\"&gt;DIALOG_ID&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5dcpej2x\"&gt;CHAT_ID&lt;/code&gt;. Получить идентификатор чата можно методом создания чата &lt;a href=\"api-reference/chats/im-chat-add.html\"&gt;im.chat.add&lt;/a&gt; или получения идентификатора чата &lt;a href=\"api-reference/chats/im-chat-get.html\"&gt;im.chat.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"zakrepit-chat\"&gt;&lt;a href=\"api-reference/chats/special-operations/index.html#zakrepit-chat\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Закрепить чат&lt;/span&gt;&lt;/a&gt;Закрепить чат&lt;/h2&gt;\n&lt;p&gt;Чтобы не потерять важный чат, закрепите его в начале списка. Закрепить или открепить чат можно методом &lt;a href=\"api-reference/chats/special-operations/im-recent-pin.html\"&gt;im.recent.pin&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"prochitat-chat\"&gt;&lt;a href=\"api-reference/chats/special-operations/index.html#prochitat-chat\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Прочитать чат&lt;/span&gt;&lt;/a&gt;Прочитать чат&lt;/h2&gt;\n&lt;p&gt;Если вы хотите вернуться к прочитанному сообщению позже, используйте метку «Посмотреть позже». Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eqckqs61\"&gt;im.recent.unread&lt;/code&gt; управляет этой меткой:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5rx9eqo1\"&gt;ACTION&lt;/code&gt; со значением &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zvi1df6w\"&gt;Y&lt;/code&gt; устанавливает метку «Посмотреть позже»&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kngqeb18\"&gt;ACTION&lt;/code&gt; со значением &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-viesiesd\"&gt;N&lt;/code&gt; отмечает все сообщения прочитанными и снимает метку&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/special-operations/im-dialog-read-all.html\"&gt;im.dialog.read.all&lt;/a&gt; устанавливает метки «Прочитано» для всех диалогов.&lt;/p&gt;\n&lt;h2 id=\"otklyuchit-uvedomleniya-chata\"&gt;&lt;a href=\"api-reference/chats/special-operations/index.html#otklyuchit-uvedomleniya-chata\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Отключить уведомления чата&lt;/span&gt;&lt;/a&gt;Отключить уведомления чата&lt;/h2&gt;\n&lt;p&gt;В групповых чатах, где не требуется оперативно реагировать на сообщения, можно отключить уведомления. Метод &lt;a href=\"api-reference/chats/special-operations/im-chat-mute.html\"&gt;im.chat.mute&lt;/a&gt; позволяет отключить или включить уведомления.&lt;/p&gt;\n&lt;h2 id=\"udalit-chat-iz-spiska-poslednih\"&gt;&lt;a href=\"api-reference/chats/special-operations/index.html#udalit-chat-iz-spiska-poslednih\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Удалить чат из списка последних&lt;/span&gt;&lt;/a&gt;Удалить чат из списка последних&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/special-operations/im-recent-hide.html\"&gt;im.recent.hide&lt;/a&gt; удаляет диалог из списка последних чатов.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/special-operations/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sembc6zo\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/special-operations/im-recent-pin.html\"&gt;im.recent.pin&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Закрепляет чат вверху списка чатов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/special-operations/im-recent-unread.html\"&gt;im.recent.unread&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает или снимает признак «прочитано» у чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/special-operations/im-dialog-read-all.html\"&gt;im.dialog.read.all&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает признак «прочитано» для всех чатов пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/special-operations/im-chat-mute.html\"&gt;im.chat.mute&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отключает уведомления от чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/special-operations/im-recent-hide.html\"&gt;im.recent.hide&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет чат из списка последних&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь специальных операций с другими объектами","href":"api-reference/chats/special-operations/index.html#svyaz-specialnyh-operacij-s-drugimi-obuektami","level":2},{"title":"Закрепить чат","href":"api-reference/chats/special-operations/index.html#zakrepit-chat","level":2},{"title":"Прочитать чат","href":"api-reference/chats/special-operations/index.html#prochitat-chat","level":2},{"title":"Отключить уведомления чата","href":"api-reference/chats/special-operations/index.html#otklyuchit-uvedomleniya-chata","level":2},{"title":"Удалить чат из списка последних","href":"api-reference/chats/special-operations/index.html#udalit-chat-iz-spiska-poslednih","level":2},{"title":"Обзор методов","href":"api-reference/chats/special-operations/index.html#all-methods","level":2}],"title":"Специальные операции в чатах: обзор методов"},"router":{"pathname":"api-reference/chats/special-operations/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
