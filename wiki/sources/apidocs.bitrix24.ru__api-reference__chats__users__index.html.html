        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Для работы с пользователями в чатах используйте группу методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-csd6bzfs\"&gt;im.user.*&lt;/code&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/chats/users/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-metodov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/chats/users/index.html#svyaz-metodov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь методов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь методов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Методы получают информацию о пользователях по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-syspwp3z\"&gt;ID&lt;/code&gt;. Узнать идентификаторы пользователей чата можно с помощью метода &lt;a href=\"api-reference/chats/chat-users/im-chat-user-list.html\"&gt;im.chat.user.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"informaciya-o-polzovatelyah\"&gt;&lt;a href=\"api-reference/chats/users/index.html#informaciya-o-polzovatelyah\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Информация о пользователях&lt;/span&gt;&lt;/a&gt;Информация о пользователях&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/users/im-user-get.html\"&gt;im.user.get&lt;/a&gt; получает информацию о текущем пользователе или конкретном пользователе, если заполнить параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-evjzmvjr\"&gt;ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Получить информацию о нескольких пользователях можно методом &lt;a href=\"api-reference/chats/users/im-user-list-get.html\"&gt;im.user.list.get&lt;/a&gt;. В параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-npzxlpvo\"&gt;ID&lt;/code&gt; передайте массив с идентификаторами пользователей, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cpjhylcj\"&gt;ID: [3,5,7]&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"status-polzovatelya-v-chatah\"&gt;&lt;a href=\"api-reference/chats/users/index.html#status-polzovatelya-v-chatah\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Статус пользователя в чатах&lt;/span&gt;&lt;/a&gt;Статус пользователя в чатах&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/chats/users/im-user-status-set.html\"&gt;im.user.status.set&lt;/a&gt; устанавливает статус пользователя в чате:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s9eyfhxb\"&gt;online&lt;/code&gt; — пользователь получает все уведомления,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-900az62m\"&gt;dnd&lt;/code&gt; — режим «Не беспокоить», пользователь не получает уведомления о новых сообщениях.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Узнать статус можно методом &lt;a href=\"api-reference/chats/users/im-user-status-get.html\"&gt;im.user.status.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Методы работают только для текущего пользователя.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18985244/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Уведомления в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/chats/users/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jh3l0oqs\"&gt;im&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/users/im-user-get.html\"&gt;im.user.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает данные о пользователе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/users/im-user-list-get.html\"&gt;im.user.list.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает данные о списке пользователей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/users/im-user-status-set.html\"&gt;im.user.status.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает статус пользователя в чате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/users/im-user-status-get.html\"&gt;im.user.status.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию об установленном статусе пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"metody-dlya-predydushej-versii-chata\"&gt;&lt;a href=\"api-reference/chats/users/index.html#metody-dlya-predydushej-versii-chata\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Методы для предыдущей версии чата&lt;/span&gt;&lt;/a&gt;Методы для предыдущей версии чата&lt;/h3&gt;\n&lt;p&gt;Методы разработаны для предыдущей версии чата. В текущей версии чата М1 они работают, но результаты не отображаются в интерфейсе.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19071750/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Чат: новый мессенджер&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/users/im-user-status-idle-start.html\"&gt;im.user.status.idle.start&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает автоматический статус &lt;em&gt;Отошел&lt;/em&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/users/im-user-status-idle-end.html\"&gt;im.user.status.idle.end&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отключает автоматический статус &lt;em&gt;Отошел&lt;/em&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь методов с другими объектами","href":"api-reference/chats/users/index.html#svyaz-metodov-s-drugimi-obuektami","level":2},{"title":"Информация о пользователях","href":"api-reference/chats/users/index.html#informaciya-o-polzovatelyah","level":2},{"title":"Статус пользователя в чатах","href":"api-reference/chats/users/index.html#status-polzovatelya-v-chatah","level":2},{"title":"Обзор методов","href":"api-reference/chats/users/index.html#all-methods","level":2,"items":[{"title":"Методы для предыдущей версии чата","href":"api-reference/chats/users/index.html#metody-dlya-predydushej-versii-chata","level":3}]}],"title":"Пользователи в чатах: обзор методов"},"router":{"pathname":"api-reference/chats/users/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
