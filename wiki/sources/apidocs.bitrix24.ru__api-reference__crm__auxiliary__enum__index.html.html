        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Методы перечислений возвращают информацию о значениях типов: тип адреса, тип дела, тип объекта и другие.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/auxiliary/enum/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-rabotat-s-metodami-perechislenij\"&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/index.html#kak-rabotat-s-metodami-perechislenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работать с методами перечислений&lt;/span&gt;&lt;/a&gt;Как работать с методами перечислений&lt;/h2&gt;\n&lt;p&gt;Определите, какие данные вам нужны, и выберите метод перечисления. Например, вам надо получить все юридические адреса контакта:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;используйте метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-address-type.html\"&gt;crm.enum.addresstype&lt;/a&gt;, чтобы узнать идентификатор типа для юридического адреса&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;используйте полученный идентификатор в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ghx04k5u\"&gt;TYPE_ID&lt;/code&gt; фильтра в методе &lt;a href=\"api-reference/crm/requisites/addresses/crm-address-list.html\"&gt;crm.address.list&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"svyaz-metodov-perechislenij-s-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/index.html#svyaz-metodov-perechislenij-s-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь методов перечислений с объектами CRM&lt;/span&gt;&lt;/a&gt;Связь методов перечислений с объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Объект CRM.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt; возвращает идентификаторы типов объектов. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dcbjug9t\"&gt;ID&lt;/code&gt; типа объекта используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fnjo7eji\"&gt;entityTypeId&lt;/code&gt; методов &lt;a href=\"api-reference/crm/universal/index.html\"&gt;crm.item.*&lt;/a&gt;, &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/tasks/how-to-connect-task-to-spa.html\"&gt;Как прикрепить задачу к смарт-процессу&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;strong&gt;Заказ.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-get-order-owner-types.html\"&gt;crm.enum.getorderownertypes&lt;/a&gt; возвращает типы объектов, к которым можно добавить связь с заказом. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y25muzak\"&gt;id&lt;/code&gt; типа объекта используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g6bnsa6k\"&gt;ownerTypeId&lt;/code&gt; методов &lt;a href=\"api-reference/crm/universal/order-entity/crm-order-entity-add.html\"&gt;crm.orderentity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Тип описания.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-content-type.html\"&gt;crm.enum.contenttype&lt;/a&gt; возвращает типы описаний. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1zqaynhp\"&gt;ID&lt;/code&gt; типа описания используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-luq1l20y\"&gt;DESCRIPTION_TYPE&lt;/code&gt; методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Дело.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-type.html\"&gt;crm.enum.activitytype&lt;/a&gt; возвращает типы дел. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8uzklkk6\"&gt;ID&lt;/code&gt; типа дела используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1xcxim0v\"&gt;TYPE_ID&lt;/code&gt; методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Статус.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-status.html\"&gt;crm.enum.activitystatus&lt;/a&gt; возвращает типы статусов дел. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-afr0qmbm\"&gt;ID&lt;/code&gt; статуса дела используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ogpn58ek\"&gt;STATUS&lt;/code&gt; методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Приоритет.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-priority.html\"&gt;crm.enum.activitypriority&lt;/a&gt; возвращает типы приоритета дел. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w9i80b65\"&gt;ID&lt;/code&gt; приоритета используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bclna6sb\"&gt;PRIORITY&lt;/code&gt; методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Направление.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-direction.html\"&gt;crm.enum.activitydirection&lt;/a&gt; возвращает типы направлений дел. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-04bpnwff\"&gt;ID&lt;/code&gt; направления используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x7tzj334\"&gt;DIRECTION&lt;/code&gt; методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-send-email.html\"&gt;Как отправить e-mail клиенту&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;strong&gt;Уведомление.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-notify-type.html\"&gt;crm.enum.activitynotifytype&lt;/a&gt; возвращает типы уведомлений для дел. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uoaltkt3\"&gt;ID&lt;/code&gt; типа уведомления используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y6zvqj30\"&gt;NOTIFY_TYPE&lt;/code&gt; методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Адрес.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-address-type.html\"&gt;crm.enum.addresstype&lt;/a&gt; возвращает типы адресов. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-08khyhiu\"&gt;ID&lt;/code&gt; типа адреса используйте в значении параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h6akomvv\"&gt;TYPE_ID&lt;/code&gt;  методов &lt;a href=\"api-reference/crm/requisites/addresses/index.html\"&gt;crm.address.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-get-lists/how-to-get-address.html\"&gt;Как получить адрес клиента из CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;strong&gt;Режим работы CRM.&lt;/strong&gt; Метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-settings-mode.html\"&gt;crm.enum.settings.mode&lt;/a&gt; возвращает тип CRM. Используйте метод для расшифровки значения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qwgxslvn\"&gt;ID&lt;/code&gt; типа, которое возвращает метод &lt;a href=\"api-reference/crm/crm-settings-mode-get.html\"&gt;crm.settings.mode.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y14382u2\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-fields.html\"&gt;crm.enum.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей элементов перечислений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает типы объектов в CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-get-order-owner-types.html\"&gt;crm.enum.getorderownertypes&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает идентификаторы типов объектов, к которым доступна привязка заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-address-type.html\"&gt;crm.enum.addresstype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает типы адресов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-settings-mode.html\"&gt;crm.enum.settings.mode&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание режимов работы CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-type.html\"&gt;crm.enum.activitytype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Типы дел»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-priority.html\"&gt;crm.enum.activitypriority&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Приоритеты дел»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-content-type.html\"&gt;crm.enum.contenttype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Тип описания»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-direction.html\"&gt;crm.enum.activitydirection&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Направление активности», для писем и звонков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-notify-type.html\"&gt;crm.enum.activitynotifytype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Тип уведомления о начале активности», для встреч и звонков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-status.html\"&gt;crm.enum.activitystatus&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Статус»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как работать с методами перечислений","href":"api-reference/crm/auxiliary/enum/index.html#kak-rabotat-s-metodami-perechislenij","level":2},{"title":"Связь методов перечислений с объектами CRM","href":"api-reference/crm/auxiliary/enum/index.html#svyaz-metodov-perechislenij-s-obuektami-crm","level":2},{"title":"Обзор методов","href":"api-reference/crm/auxiliary/enum/index.html#all-methods","level":2}],"title":"Перечисления: обзор методов"},"router":{"pathname":"api-reference/crm/auxiliary/enum/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
