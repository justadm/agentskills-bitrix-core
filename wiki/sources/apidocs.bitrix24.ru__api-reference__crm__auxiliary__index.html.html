        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;К вспомогательным группам методов относятся множественные поля, перечисления и ставки НДС.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/auxiliary/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"mnozhestvennye-polya\"&gt;&lt;a href=\"api-reference/crm/auxiliary/index.html#mnozhestvennye-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Множественные поля&lt;/span&gt;&lt;/a&gt;Множественные поля&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/crm/auxiliary/multifield/crm-multifield-fields.html\"&gt;crm.multifield.fields&lt;/a&gt; возвращает информацию о структуре множественных полей, таких как номер телефона или e-mail. Чтобы заполнить поле значением &lt;a href=\"api-reference/crm/data-types.html#crm_multifield\"&gt;с типом&lt;/a&gt;, передавайте данные по той структуре, которую вернул метод.&lt;br /&gt;\nПример передачи данных для заполнения номера телефона с типом мобильный:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-attr\"&gt;PHONE&lt;/span&gt;: [\n            { \n                &lt;span class=\"hljs-attr\"&gt;VALUE&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"555888\"&lt;/span&gt;,\n                &lt;span class=\"hljs-attr\"&gt;VALUE_TYPE&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"MOBILE\"&lt;/span&gt;,\n            },\n        ] ,\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"14\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-14\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-14\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-14.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-edit-crm-objects/how-to-change-email-or-phone.html\"&gt;Как изменить номера телефонов и e-mail на примере контакта&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/leads/crm-lead-add.html\"&gt;Создать новый лид crm.lead.add&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"perechisleniya\"&gt;&lt;a href=\"api-reference/crm/auxiliary/index.html#perechisleniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Перечисления&lt;/span&gt;&lt;/a&gt;Перечисления&lt;/h2&gt;\n&lt;p&gt;Группа методов перечислений &lt;a href=\"api-reference/crm/auxiliary/enum/index.html\"&gt;crm.enum.*&lt;/a&gt; возвращает информацию о названии и идентификаторе объектов CRM. Например метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt; возвращает идентификаторы смарт-процессов, а метод &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-address-type.html\"&gt;crm.enum.addresstype&lt;/a&gt; — идентификаторы типов адресов: юридический, физический, адрес доставки.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-comment-to-spa.html\"&gt;Как добавить комментарий в таймлайн смарт-процесса&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-get-lists/how-to-get-address.html\"&gt;Как получить адрес клиента из CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"stavki-nds\"&gt;&lt;a href=\"api-reference/crm/auxiliary/index.html#stavki-nds\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ставки НДС&lt;/span&gt;&lt;/a&gt;Ставки НДС&lt;/h2&gt;\n&lt;p&gt;Группа методов &lt;a href=\"api-reference/catalog/vat/index.html\"&gt;catalog.vat.*&lt;/a&gt; управляет ставками НДС. Методы позволяют &lt;a href=\"api-reference/catalog/vat/catalog-vat-add.html\"&gt;создавать&lt;/a&gt;, &lt;a href=\"api-reference/catalog/vat/catalog-vat-delete.html\"&gt;удалять&lt;/a&gt;, &lt;a href=\"api-reference/catalog/vat/catalog-vat-update.html\"&gt;изменять&lt;/a&gt; и &lt;a href=\"api-reference/catalog/vat/catalog-vat-list.html\"&gt;получать&lt;/a&gt; значения ставок.&lt;/p&gt;\n&lt;p&gt;Чтобы задать НДС товара в сделке или другом объекте CRM, используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m4ahhtz2\"&gt;taxRate&lt;/code&gt; группы методов  &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы задать НДС товара или услуги в торговом каталоге, используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j9asc8ov\"&gt;vatId&lt;/code&gt; групп методов &lt;a href=\"api-reference/catalog/product/index.html\"&gt;catalog.product.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/auxiliary/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uhp9paiz\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"mnozhestvennye-polya1\"&gt;&lt;a href=\"api-reference/crm/auxiliary/index.html#mnozhestvennye-polya1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Множественные поля&lt;/span&gt;&lt;/a&gt;Множественные поля&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/multifield/crm-multifield-fields.html\"&gt;crm.multifield.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание множественных полей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"perechisleniya1\"&gt;&lt;a href=\"api-reference/crm/auxiliary/index.html#perechisleniya1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Перечисления&lt;/span&gt;&lt;/a&gt;Перечисления&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-fields.html\"&gt;crm.enum.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей перечисления&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает типы объектов в CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-get-order-owner-types.html\"&gt;crm.enum.getorderownertypes&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает идентификаторы типов объектов, к которым доступна привязка заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-address-type.html\"&gt;crm.enum.addresstype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает типы адресов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-settings-mode.html\"&gt;crm.enum.settings.mode&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание режимов работы CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-type.html\"&gt;crm.enum.activitytype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Типы дел»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-priority.html\"&gt;crm.enum.activitypriority&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Приоритеты дел»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-direction.html\"&gt;crm.enum.activitydirection&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Направление активности», для писем и звонков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-notify-type.html\"&gt;crm.enum.activitynotifytype&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Тип уведомления о начале активности», для встреч и звонков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-status.html\"&gt;crm.enum.activitystatus&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы перечисления «Статус»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-content-type.html\"&gt;crm.enum.contenttype&lt;/a&gt; Возвращает элементы перечисления «Тип описания»&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Множественные поля","href":"api-reference/crm/auxiliary/index.html#mnozhestvennye-polya","level":2},{"title":"Перечисления","href":"api-reference/crm/auxiliary/index.html#perechisleniya","level":2},{"title":"Ставки НДС","href":"api-reference/crm/auxiliary/index.html#stavki-nds","level":2},{"title":"Обзор методов","href":"api-reference/crm/auxiliary/index.html#all-methods","level":2,"items":[{"title":"Множественные поля","href":"api-reference/crm/auxiliary/index.html#mnozhestvennye-polya1","level":3},{"title":"Перечисления","href":"api-reference/crm/auxiliary/index.html#perechisleniya1","level":3}]}],"title":"Обзор вспомогательных методов"},"router":{"pathname":"api-reference/crm/auxiliary/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
