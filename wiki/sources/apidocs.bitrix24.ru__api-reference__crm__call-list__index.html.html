            {"data":{"leading":false,"html":"&lt;p&gt;Список обзвона — это дело CRM, из которого можно позвонить нескольким клиентам подряд. Сотрудник работает с одним делом, в котором собраны выбранные контакты или компании. Результаты обзвона автоматически сохранятся в карточках клиентов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в прикрепленном деле звонка и комментарии к нему,&lt;/li&gt;\n&lt;li&gt;заполненной CRM-форме и полях карточки,&lt;/li&gt;\n&lt;li&gt;созданной из обзвона сделке или счете.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/call-list/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/24945678/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Обзвон в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/crm/call-list/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Контакт&lt;/strong&gt;. Для обзвона нескольких контактов укажите массив из &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-52t3exzr\"&gt;ID&lt;/code&gt; контактов в методе &lt;a href=\"api-reference/crm/call-list/crm-calllist-add.html\"&gt;создания&lt;/a&gt; или &lt;a href=\"api-reference/crm/call-list/crm-calllist-update.html\"&gt;изменения&lt;/a&gt; обзвона. Получить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dmo55i6r\"&gt;ID&lt;/code&gt; контактов можно методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z4jyzejs\"&gt;entityTypeId = 3&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Компания&lt;/strong&gt;. Для обзвона нескольких компаний укажите массив из &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o1woczxg\"&gt;ID&lt;/code&gt; компаний в методе &lt;a href=\"api-reference/crm/call-list/crm-calllist-add.html\"&gt;создания&lt;/a&gt; или &lt;a href=\"api-reference/crm/call-list/crm-calllist-update.html\"&gt;изменения&lt;/a&gt; обзвона. Получить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a4ah3zwz\"&gt;ID&lt;/code&gt; компаний можно методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9b0vng2q\"&gt;entityTypeId = 4&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM-форма&lt;/strong&gt;. Во время звонка сотрудник может заполнять информацию о клиенте в прикрепленной к обзвону CRM-форме. После завершения звонка форма будет доступна в карточке клиента, информация из формы будет сохранена в полях карточки. Чтобы прикрепить форму к обзвону, укажите ее &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m6pxtxfa\"&gt;ID&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/call-list/crm-calllist-add.html\"&gt;создания&lt;/a&gt; или &lt;a href=\"api-reference/crm/call-list/crm-calllist-update.html\"&gt;изменения&lt;/a&gt; обзвона. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rscm27ab\"&gt;ID&lt;/code&gt; формы можно найти в списке форм Битрикс24 &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wxevo1au\"&gt;https://your-domain.ru/crm/webform/&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Справочник&lt;/strong&gt;. Статус звонка в карточка обзвона — это элемент &lt;a href=\"api-reference/crm/status/index.html\"&gt;справочника&lt;/a&gt;. Чтобы изменить статусы обзвона, используйте методы справочников &lt;a href=\"api-reference/crm/status/index.html\"&gt;crm.status.*&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0tpjd4d1\"&gt;ENTITY_ID = CALL_LIST&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. Лист обзвона имеет привязку к пользователю по числовому идентификатору в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3js8s1pe\"&gt;createdBy&lt;/code&gt; — кем создан. Получить данные пользователя по идентификатору можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-udalit-spisok-obzvona\"&gt;&lt;a href=\"api-reference/crm/call-list/index.html#kak-udalit-spisok-obzvona\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как удалить список обзвона&lt;/span&gt;&lt;/a&gt;Как удалить список обзвона&lt;/h2&gt;\n&lt;p&gt;Среди методов списка обзвона нет метода удаления. Удалить список обзвона можно через удаление дела методом &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-delete.html\"&gt;crm.activity.delete&lt;/a&gt;.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Используйте метод &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-list.html\"&gt;crm.activity.list&lt;/a&gt; с фильтром по названию дела &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x5jb0ojp\"&gt;SUBJECT&lt;/code&gt;. В значении поля укажите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-utzyy74k\"&gt;Обзвон #ID&lt;/code&gt;. На место &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zx4uz33n\"&gt;ID&lt;/code&gt; подставьте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7jwyvpiv\"&gt;ID&lt;/code&gt; обзвона, полученное методами &lt;a href=\"api-reference/crm/call-list/crm-calllist-add\"&gt;crm.calllist.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/call-list/crm-calllist-list\"&gt;crm.calllist.list&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Передайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o3ycl81s\"&gt;ID&lt;/code&gt; дела из результата в метод удаления &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-delete.html\"&gt;crm.activity.delete&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-swfzpz1x\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php-crest\" data-diplodoc-key=\"php%20crest\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP CRest&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"a0zakuya\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-comment\"&gt;// callListMethod: Получает все данные сразу. Используйте только для небольших выборок (&amp;lt; 1000 элементов) из-за высокой нагрузки на память.&lt;/span&gt;\n\n&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callListMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'crm.activity.list'&lt;/span&gt;,\n    {\n      &lt;span class=\"hljs-attr\"&gt;filter&lt;/span&gt;: {\n        &lt;span class=\"hljs-string\"&gt;\"SUBJECT\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Обзвон #13\"&lt;/span&gt;,\n      },\n      &lt;span class=\"hljs-attr\"&gt;select&lt;/span&gt;: [&lt;span class=\"hljs-string\"&gt;\"ID\"&lt;/span&gt;]\n    }\n  )\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; deals = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;() || []\n\n  &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (deals.&lt;span class=\"hljs-property\"&gt;length&lt;/span&gt; === &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;) {\n    &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Дел с названием 'Обзвон #13' не найдено.\"&lt;/span&gt;);\n    &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt;;\n  }\n\n  &lt;span class=\"hljs-keyword\"&gt;let&lt;/span&gt; dealId = deals[&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;].&lt;span class=\"hljs-property\"&gt;ID&lt;/span&gt;;\n\n  &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'crm.activity.delete'&lt;/span&gt;,\n    {\n      &lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: dealId,\n    }\n  )\n  &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Дело ID \"&lt;/span&gt; + dealId + &lt;span class=\"hljs-string\"&gt;\" успешно удалено.\"&lt;/span&gt;);\n} &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (error) {\n  &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Request failed'&lt;/span&gt;, error)\n}\n\n&lt;span class=\"hljs-comment\"&gt;// fetchListMethod: Выбирает данные по частям с помощью итератора. Используйте для больших объемов данных для эффективного потребления памяти.&lt;/span&gt;\n\n&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; generator = $b24.&lt;span class=\"hljs-title function_\"&gt;fetchListMethod&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'crm.activity.list'&lt;/span&gt;, {\n    &lt;span class=\"hljs-attr\"&gt;filter&lt;/span&gt;: {\n      &lt;span class=\"hljs-string\"&gt;\"SUBJECT\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Обзвон #13\"&lt;/span&gt;,\n    },\n    &lt;span class=\"hljs-attr\"&gt;select&lt;/span&gt;: [&lt;span class=\"hljs-string\"&gt;\"ID\"&lt;/span&gt;]\n  }, &lt;span class=\"hljs-string\"&gt;'ID'&lt;/span&gt;)\n\n  &lt;span class=\"hljs-keyword\"&gt;for&lt;/span&gt; &lt;span class=\"hljs-title function_\"&gt;await&lt;/span&gt; (&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; page &lt;span class=\"hljs-keyword\"&gt;of&lt;/span&gt; generator) {\n    &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (page.&lt;span class=\"hljs-property\"&gt;length&lt;/span&gt; === &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;) {\n      &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Дел с названием 'Обзвон #13' не найдено.\"&lt;/span&gt;);\n      &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt;;\n    }\n\n    &lt;span class=\"hljs-keyword\"&gt;let&lt;/span&gt; dealId = page[&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;].&lt;span class=\"hljs-property\"&gt;ID&lt;/span&gt;;\n\n    &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n      &lt;span class=\"hljs-string\"&gt;'crm.activity.delete'&lt;/span&gt;,\n      {\n        &lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: dealId,\n      }\n    )\n    &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Дело ID \"&lt;/span&gt; + dealId + &lt;span class=\"hljs-string\"&gt;\" успешно удалено.\"&lt;/span&gt;);\n  }\n} &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (error) {\n  &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Request failed'&lt;/span&gt;, error)\n}\n\n&lt;span class=\"hljs-comment\"&gt;// callMethod: Ручное управление постраничной навигацией через параметр start. Используйте для точного контроля над пакетами запросов. Для больших данных менее эффективен, чем fetchListMethod.&lt;/span&gt;\n\n&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'crm.activity.list'&lt;/span&gt;, {\n    &lt;span class=\"hljs-attr\"&gt;filter&lt;/span&gt;: {\n      &lt;span class=\"hljs-string\"&gt;\"SUBJECT\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Обзвон #13\"&lt;/span&gt;,\n    },\n    &lt;span class=\"hljs-attr\"&gt;select&lt;/span&gt;: [&lt;span class=\"hljs-string\"&gt;\"ID\"&lt;/span&gt;]\n  }, &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;)\n\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; deals = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt; || []\n\n  &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (deals.&lt;span class=\"hljs-property\"&gt;length&lt;/span&gt; === &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;) {\n    &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Дел с названием 'Обзвон #13' не найдено.\"&lt;/span&gt;);\n    &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt;;\n  }\n\n  &lt;span class=\"hljs-keyword\"&gt;let&lt;/span&gt; dealId = deals[&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;].&lt;span class=\"hljs-property\"&gt;ID&lt;/span&gt;;\n\n  &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'crm.activity.delete'&lt;/span&gt;,\n    {\n      &lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: dealId,\n    }\n  )\n  &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Дело ID \"&lt;/span&gt; + dealId + &lt;span class=\"hljs-string\"&gt;\" успешно удалено.\"&lt;/span&gt;);\n} &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (error) {\n  &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Request failed'&lt;/span&gt;, error)\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"83\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-83\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-83\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-83.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"v9l7rsi2\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n    &lt;span class=\"hljs-variable\"&gt;$response&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$b24Service&lt;/span&gt;\n        -&amp;gt;core\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;call&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'crm.activity.list'&lt;/span&gt;,\n            [\n                &lt;span class=\"hljs-string\"&gt;'filter'&lt;/span&gt; =&amp;gt; [\n                    &lt;span class=\"hljs-string\"&gt;'SUBJECT'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Обзвон #13'&lt;/span&gt;,\n                ],\n                &lt;span class=\"hljs-string\"&gt;'select'&lt;/span&gt; =&amp;gt; [&lt;span class=\"hljs-string\"&gt;'ID'&lt;/span&gt;]\n            ]\n        );\n\n    &lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$response&lt;/span&gt;\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getResponseData&lt;/span&gt;()\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;getResult&lt;/span&gt;();\n\n    &lt;spa
