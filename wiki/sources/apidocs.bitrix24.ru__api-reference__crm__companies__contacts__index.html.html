        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;При помощи группы методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2uohpx0y\"&gt;crm.company.contact.*&lt;/code&gt; можно управлять связями контактов с компанией: устанавливать или удалять связь для контакта или для группы контактов.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/companies/contacts/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/2501159\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Связь между сделками, контактами и компаниями&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"chto-daet-svyaz-mezhdu-kompaniej-i-kontaktami\"&gt;&lt;a href=\"api-reference/crm/companies/contacts/index.html#chto-daet-svyaz-mezhdu-kompaniej-i-kontaktami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что дает связь между компанией и контактами&lt;/span&gt;&lt;/a&gt;Что дает связь между компанией и контактами&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;Когда вы выбираете компанию в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qcrlterx\"&gt;Клиент&lt;/code&gt; сделок, смарт-процессов, все связанные с ней контакты подтягиваются в поле автоматически.&lt;/li&gt;\n&lt;li&gt;В карточке компании отображается информация о связанных контактах: имя, номер телефона, e-mail, должность.&lt;/li&gt;\n&lt;li&gt;Из карточки компании можно позвонить или написать письмо без перехода в карточку контакта.&lt;/li&gt;\n&lt;li&gt;При &lt;a href=\"api-reference/crm/document-generator/index.html\"&gt;генерации документов по шаблону&lt;/a&gt; можно использовать символьные коды, которые будут автоматически подставлять данные связанных контактов в документ.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/companies/contacts/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vze52zsv\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/contacts/crm-company-contact-add.html\"&gt;crm.company.contact.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет контакт к указанной компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/contacts/crm-company-contact-delete.html\"&gt;crm.company.contact.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет контакт из указанной компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/contacts/crm-company-contact-fields.html\"&gt;crm.company.contact.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей для связи компания-контакт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/contacts/crm-company-contact-items-delete.html\"&gt;crm.company.contact.items.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Очищает набор контактов, связанных с указанной компанией&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/contacts/crm-company-contact-items-get.html\"&gt;crm.company.contact.items.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает набор контактов, связанных с указанной компанией&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/contacts/crm-company-contact-items-set.html\"&gt;crm.company.contact.items.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает набор контактов, связанных с указанной компанией&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Что дает связь между компанией и контактами","href":"api-reference/crm/companies/contacts/index.html#chto-daet-svyaz-mezhdu-kompaniej-i-kontaktami","level":2},{"title":"Обзор методов","href":"api-reference/crm/companies/contacts/index.html#all-methods","level":2}],"title":"Контакты компаний: обзор методов"},"router":{"pathname":"api-reference/crm/companies/contacts/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
