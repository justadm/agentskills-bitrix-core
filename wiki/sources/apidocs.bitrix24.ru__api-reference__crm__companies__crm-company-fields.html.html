\" tabindex=\"0\" id=\"inline-code-id-t9c4b7o2\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Фактический адрес. Устарел, используется для совместимости. Для работы с адресом используйте &lt;a href=\"api-reference/crm/requisites/index.html\"&gt;реквизиты&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Устаревшие адресные поля:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p5aj912h\"&gt;ADDRESS_2&lt;/code&gt; — адрес (стр. 2)&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8x21kjyx\"&gt;ADDRESS_CITY&lt;/code&gt; — город&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x9s3pes3\"&gt;ADDRESS_POSTAL_CODE&lt;/code&gt; — почтовый индекс&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tlkdywtj\"&gt;ADDRESS_REGION&lt;/code&gt; — район&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ecah5cbt\"&gt;ADDRESS_PROVINCE&lt;/code&gt; — область&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-shrqp1pl\"&gt;ADDRESS_COUNTRY&lt;/code&gt; — страна&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jdlnxn70\"&gt;ADDRESS_COUNTRY_CODE&lt;/code&gt; — код страны&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-efgry4af\"&gt;ADDRESS_LOC_ADDR_ID&lt;/code&gt; — идентификатор адреса местоположения&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-98c6iwjv\"&gt;ADDRESS_LEGAL&lt;/code&gt; — юридический адрес&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jvw7djxr\"&gt;REG_ADDRESS&lt;/code&gt; — юридический адрес&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eiu0rwol\"&gt;REG_ADDRESS_2&lt;/code&gt; — юридический адрес (стр. 2)&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ea10vrcy\"&gt;REG_ADDRESS_CITY&lt;/code&gt; — юридический адрес город&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-prw49njk\"&gt;REG_ADDRESS_POSTAL_CODE&lt;/code&gt; — юридический адрес почтовый индекс&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nenptv10\"&gt;REG_ADDRESS_REGION&lt;/code&gt; — юридический адрес район&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-boqq9gqu\"&gt;REG_ADDRESS_PROVINCE&lt;/code&gt; — юридический адрес область&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-em1g8qbr\"&gt;REG_ADDRESS_COUNTRY&lt;/code&gt; — юридический адрес страна&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ouc7zgco\"&gt;REG_ADDRESS_COUNTRY_CODE&lt;/code&gt; — юридический адрес код страны&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bqg3ltvi\"&gt;REG_ADDRESS_LOC_ADDR_ID&lt;/code&gt; — юридический адрес идентификатор адреса местоположения&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;BANKING_DETAILS&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bbvx5qw6\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Банковские реквизиты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;INDUSTRY&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5wne9os1\"&gt;crm_status&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сфера деятельности. Значения можно получить методом &lt;a href=\"api-reference/crm/status/crm-status-list.html\"&gt;crm.status.list&lt;/a&gt; с фильтром по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7kupwdrw\"&gt;ENTITY_ID=INDUSTRY&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;EMPLOYEES&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-orsiam5u\"&gt;crm_status&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Количество сотрудников. Значения можно получить методом &lt;a href=\"api-reference/crm/status/crm-status-list.html\"&gt;crm.status.list&lt;/a&gt; с фильтром по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ithvikrj\"&gt;ENTITY_ID=EMPLOYEES&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;CURRENCY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e7s0jky8\"&gt;crm_currency&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Валюта&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;REVENUE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-07nfrcn0\"&gt;double&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Годовой оборот&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;OPENED&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iaotekxo\"&gt;char&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Доступна ли компания для всех. Возможные значения: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-22t534f2\"&gt;Y&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lxw0205b\"&gt;N&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;COMMENTS&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x7xtu6br\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Комментарий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;HAS_PHONE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0sd95pdl\"&gt;char&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Задан телефон&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;HAS_EMAIL&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8dj8xc22\"&gt;char&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Задан e-mail&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;HAS_IMOL&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0drnrts9\"&gt;char&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Задана открытая линия&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;IS_MY_COMPANY&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8obxchrp\"&gt;char&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Признак «Моя компания». Возможные значения: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0xwutdt4\"&gt;Y&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-npqq1yxq\"&gt;N&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ASSIGNED_BY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q7q3a9pu\"&gt;user&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ответственный&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;CREATED_BY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-64p6uiss\"&gt;user&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Кем создана&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;MODIFY_BY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w0ip5qyi\"&gt;user&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Кем изменена&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;DATE_CREATE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qbndamzi\"&gt;datetime&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дата создания&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;DATE_MODIFY&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-enhi2v2o\"&gt;datetime&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дата изменения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;CONTACT_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5v58msrn\"&gt;crm_contact&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Контакт. Множественное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LEAD_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w11pywhp\"&gt;crm_lead&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор лида, связанного с компанией&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ORIGINATOR_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h6rdeaw9\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор источника данных. Используется только для привязки к внешнему источнику&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ORIGIN_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zei59751\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор элемента в источнике данных. Используется только для привязки к внешнему источнику&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ORIGIN_VERSION&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eogrutlj\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Оригинальная версия. Используется для защиты данных от случайного перетирания внешней системой&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UTM_SOURCE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ocylj008\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Рекламная система. Yandex-Direct, Google-Adwords и другие&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UTM_MEDIUM&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-55uo1hrm\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Тип трафика. Возможные значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3c301wiw\"&gt;CPC&lt;/code&gt; — объявления&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mlytwxpf\"&gt;CPM&lt;/code&gt; — баннеры&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UTM_CAMPAIGN&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3xk1ga1s\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обозначение рекламной кампании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UTM_CONTENT&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hada332k\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Содержание кампании. Например, для контекстных объявлений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UTM_TERM&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-883ha8gv\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Условие поиска кампании. Например, ключевые слова контекстной рекламы&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;PARENT_ID_...&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Поля связей.&lt;/p&gt;\n&lt;p&gt;Если на портале есть смарт-процессы, связанные с компаниями, для каждого такого смарт-процесса существует поле, хранящее связь между этим смарт-процессом и компанией. Само поле хранит идентификатор элемента такого смарт-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LAST_ACTIVITY_TIME&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-747leebk\"&gt;datetime&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Последняя активность&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LAST_ACTIVITY_BY&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n5fil1av\"&gt;user&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Автор последней активности в таймлайне&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LAST_COMMUNICATION_TIME&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-essjsq5q\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дата последней коммуникации&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;PHONE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3t3kywxv\"&gt;crm_multifield&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Телефон. Множественное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;EMAIL&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-siyvw714\"&gt;crm_multifield&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;E-mail. Множественное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;WEB&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o9yq738s\"&gt;crm_multifield&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сайт. Множественное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;IM&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7labc3cg\"&gt;crm_multifield&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Мессенджер. Множественное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LINK&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-essksctd\"&gt;crm_multifield&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;LINK. Множественное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UF_...&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользовательские поля. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i4zqvc16\"&gt;UF_CRM_25534736&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;В зависимости от настроек портала у компаний может быть набор пользовательских полей определенных типов.&lt;/p&gt;\n&lt;p&gt;Добавить пользовательское поле в компанию можно с помощью метода &lt;a href=\"api-reference/crm/companies/userfields/crm-company-userfield-add.html\"&gt;crm.company.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;time&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html#time\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wmhs7a7z\"&gt;time&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Информация о времени выполнения запроса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"obrabotka-oshibok\"&gt;&lt;a href=\"api-reference/crm/companies/crm-company-fields.html#obrabotka-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обработка ошибок&lt;/span&gt;&lt;/a&gt;Обработка ошибок&lt;/h2&gt;\n&lt;p&gt;HTTP-статус: &lt;strong&gt;400&lt;/strong&gt;&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"error\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"error_description\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Access denied.\"&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"725\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-725\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-725\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-725.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s93g1zgc\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;error&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nwpktuca\"&gt;string&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Строковый код ошибки. Может состоять из цифр, латинских букв и знака подчеркивания&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;error_description&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-moys4vh2\"&gt;error_description&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текстовое описание ошибки. Описание не предназначено для показа конечному пользователю в необработанном виде&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;h3 id=\"vozmozhnye-kody-oshibok\"&gt;&lt;a href=\"api-reference/crm/companies/crm-company-fields.html#vozmozhnye-kody-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возможные коды ошибок&lt;/span&gt;&lt;/a&gt;Возможные коды ошибок&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Код&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Значение&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wx3t2u9y\"&gt;-&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2zr2z7pz\"&gt;Access denied&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;У пользователя нет прав на «Чтение» компаний&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"statusy-i-kody-sistemnyh-oshibok\"&gt;&lt;a href=\"api-reference/crm/companies/crm-company-fields.html#statusy-i-kody-sistemnyh-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Статусы и коды системных ошибок&lt;/span&gt;&lt;/a&gt;Статусы и коды системных ошибок&lt;/h3&gt;\n&lt;p&gt;HTTP-статус: &lt;strong&gt;20х&lt;/strong&gt;, &lt;strong&gt;40x&lt;/strong&gt;, &lt;strong&gt;50x&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Описанные ниже ошибки могут возникнуть при вызове любого метода&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Статус&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Код&lt;/strong&gt;&lt;br /&gt;\n&lt;strong&gt;Текст ошибки&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vamxv3va\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g37adqpr\"&gt;INTERNAL_SERVER_ERROR&lt;/code&gt;&lt;br /&gt;\nInternal server error&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2ajfebrt\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wuzrbnss\"&gt;ERROR_UNEXPECTED_ANSWER&lt;/code&gt;&lt;br /&gt;\nServer returned an unexpected response&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w3pskeju\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wpv83naq\"&gt;QUERY_LIMIT_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nToo many requests&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышен &lt;a href=\"/limits.html\"&gt;лимит на интенсивность запросов&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jzs07zsa\"&gt;405&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ip5mcjib\"&gt;ERROR_BATCH_METHOD_NOT_ALLOWED&lt;/code&gt;&lt;br /&gt;\nMethod is not allowed for batch usage&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текущий метод не разрешен для вызове с помощью &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jdlcldu0\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gx9qa23g\"&gt;ERROR_BATCH_LENGTH_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nMax batch length exceeded&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышена максимальная длина параметров, переданных в метод &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ba9qdst3\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-elmjs9sq\"&gt;NO_AUTH_FOUND&lt;/code&gt;&lt;br /&gt;\nWrong authorization data&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Неверный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;код вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7dx7b3xp\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mjo210qk\"&gt;INVALID_REQUEST&lt;/code&gt;&lt;br /&gt;\nHttps required&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Для вызовов методов требуется использовать протокол HTTPS&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nklb91gb\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h6r3y3ox\"&gt;OVERLOAD_LIMIT&lt;/code&gt;&lt;br /&gt;\nREST API is blocked due to overload&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API заблокирован из-за перегрузки. Это ручная индивидуальная блокировка, для снятия необходимо обращаться в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y1xat1a4\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rkqo6db1\"&gt;ACCESS_DENIED&lt;/code&gt;&lt;br /&gt;\nREST API is available only on commercial plans&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API доступен только на коммерческих планах&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4rqcn6ti\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kqj0wx5g\"&gt;INVALID_CREDENTIALS&lt;/code&gt;&lt;br /&gt;\nInvalid request credentials&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;У пользователя, с чьим &lt;a href=\"/settings/oauth/index.html\"&gt;access-токеном&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхуком&lt;/a&gt; был вызван метод, не хватает прав&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ovwdrhot\"&gt;404&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n9uv836r\"&gt;ERROR_MANIFEST_IS_NOT_AVAILABLE&lt;/code&gt;&lt;br /&gt;\nManifest is not available&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Манифест недоступен&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cufstk85\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-led37gd3\"&gt;insufficient_scope&lt;/code&gt;&lt;br /&gt;\nThe request requires higher privileges than provided by the webhook token&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запрос требует более высоких привилегий, чем предоставляет токен &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c2iodpdp\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1vv0583s\"&gt;expired_token&lt;/code&gt;&lt;br /&gt;\nThe access token provided has expired&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Предоставленный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; доступа истек&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ilg5xaqf\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eg1kr08l\"&gt;user_access_error&lt;/code&gt;&lt;br /&gt;\nThe user does not have access to the application&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь не имеет доступа к приложению. Это означает, что приложение установлено, но администратор портала разрешил доступ к этому приложению только конкретным пользователям&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7tzbqvmj\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-aevn6xco\"&gt;PORTAL_DELETED&lt;/code&gt;&lt;br /&gt;\nPortal was deleted&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Публичная часть сайта закрыта. Чтобы открыть публичную часть сайта на коробочной установке отключите опцию «Временное закрытие публичной части сайта». Путь к настройке: &lt;em&gt;Рабочий стол &amp;gt; Настройки &amp;gt; Настройки продукта &amp;gt; Настройки модулей &amp;gt; Главный модуль &amp;gt; Временное закрытие публичной части сайта&lt;/em&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/crm/companies/crm-company-fields.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/crm-company-add.html\"&gt;Создать новую компанию crm.company.add&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/crm-company-get.html\"&gt;Получить информацию о компании crm.company.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/crm-company-list.html\"&gt;Получить список компаний по фильтру crm.company.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/crm-company-update.html\"&gt;Обновить существующую компанию crm.company.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/crm-company-delete.html\"&gt;Удалить компанию crm.company.delete&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Параметры метода","href":"api-reference/crm/companies/crm-company-fields.html#parametry-metoda","level":2},{"title":"Примеры кода","href":"api-reference/crm/companies/crm-company-fields.html#primery-koda","level":2},{"title":"Обработка ответа","href":"api-reference/crm/companies/crm-company-fields.html#obrabotka-otveta","level":2,"items":[{"title":"Возвращаемые данные","href":"api-reference/crm/companies/crm-company-fields.html#vozvrashaemye-dannye","level":3}]},{"title":"Обработка ошибок","href":"api-reference/crm/companies/crm-company-fields.html#obrabotka-oshibok","level":2,"items":[{"title":"Возможные коды ошибок","href":"api-reference/crm/companies/crm-company-fields.html#vozmozhnye-kody-oshibok","level":3},{"title":"Статусы и коды системных ошибок","href":"api-reference/crm/companies/crm-company-fields.html#statusy-i-kody-sistemnyh-oshibok","level":3}]},{"title":"Продолжите изучение","href":"api-reference/crm/companies/crm-company-fields.html#prodolzhite-izuchenie","level":2}],"title":"Получить описание полей компании crm.company.fields"},"router":{"pathname":"api-reference/crm/companies/crm-company-fields","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
