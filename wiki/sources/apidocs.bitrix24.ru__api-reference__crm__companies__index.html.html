            {"data":{"leading":false,"html":"&lt;p&gt;Компания — объект CRM, в котором хранятся данные клиентов  — юридических лиц. В карточке компании находятся:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;телефоны, электронные адреса, идентификаторы мессенджеров  в специальном формате. Они позволяют связываться с клиентом напрямую из Битрикс.&lt;/li&gt;\n&lt;li&gt;данные реквизитов, с которыми формируются счета, договоры и любые другие виды печатных документов по шаблонам.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/companies/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/5493389/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;компании в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-kompanii-s-drugimi-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/companies/index.html#svyaz-kompanii-s-drugimi-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь компании с другими объектами CRM&lt;/span&gt;&lt;/a&gt;Связь компании с другими объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Сделка, лид, смарт-процесс.&lt;/strong&gt; У любого объекта CRM, в котором доступно стандартное поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9lrhoeah\"&gt;Клиент&lt;/code&gt;,  есть связь с компанией. Изменение связи регулируется через группы методов &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделок&lt;/a&gt;, &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидов&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессов&lt;/a&gt;, поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mu29g70k\"&gt;COMPANY_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Контакт.&lt;/strong&gt; К одной компании может быть привязано несколько контактов. Для управления этой связью используется группа методов &lt;a href=\"api-reference/crm/companies/contacts/index.html\"&gt;crm.company.contact.*&lt;/a&gt;. Когда вы выбираете компанию в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-83o64ad1\"&gt;Клиент&lt;/code&gt; сделок, смарт-процессов, все связанные с ней контакты подтягиваются в поле автоматически.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Реквизиты.&lt;/strong&gt; Сами реквизиты это отдельный объект, для их создания или изменения используются методы группы &lt;a href=\"api-reference/crm/requisites/index.html\"&gt;crm.requisite.*&lt;/a&gt; и &lt;a href=\"api-reference/crm/requisites/addresses/index.html\"&gt;crm.address.*&lt;/a&gt;. В карточке компании они выводятся в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4s7buytc\"&gt;Реквизиты&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/2501159/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Связь между сделками, контактами и компаниями&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/requisites/links/index.html\"&gt;Связи реквизитов с объектами CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/11706682/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Изменения в работе с адресами и реквизитами в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kartochka-kompanii\"&gt;&lt;a href=\"api-reference/crm/companies/index.html#kartochka-kompanii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка компании&lt;/span&gt;&lt;/a&gt;Карточка компании&lt;/h2&gt;\n&lt;p&gt;Основное рабочее пространство в компании — это вкладка Общее ее карточки. Она состоит из двух частей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;левая, в ней располагаются поля с информацией. Если системных полей недостаточно, вы можете создать собственные пользовательские поля. Они позволяют хранить информацию в различных форматах данных: строка, число, ссылка, адрес и другие. Для создания, изменения, получения или удаления пользовательских полей компаний используется группа методов &lt;a href=\"api-reference/crm/companies/userfields/index.html\"&gt;crm.company.userfield.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;правая, в ней располагается таймлайн контакта.  В нем можно создавать, редактировать, фильтровать, удалять дела CRM — группа методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;, и записи таймлайна — группа методов &lt;a href=\"api-reference/crm/timeline/index.html\"&gt;crm.timeline.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Параметрами карточки компании можно управлять через группу методов &lt;a href=\"api-reference/crm/companies/custom-form/index.html\"&gt;crm.company.details.configuration.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22804914/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Карточка CRM: возможности и настройки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18478840/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Системные поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23960160/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Таймлайн в элементе CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/companies/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В карточку компании можно встроить приложение. Благодаря встраиванию можно будет использовать приложение и не покидать карточку компании.&lt;/p&gt;\n&lt;p&gt;Есть два сценария встройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Использовать специальные &lt;a href=\"api-reference/widgets/crm/index.html\"&gt;места встраивания&lt;/a&gt;. Например, через создание своей вкладки&lt;/li&gt;\n&lt;li&gt;Создать &lt;a href=\"tutorials/crm/crm-widgets/widget-as-field-in-lead-page.html\"&gt;пользовательское поле&lt;/a&gt;, в которое будет загружается интерфейс вашего приложения&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/crm-widgets/widget-as-detail-tab.html\"&gt;Встроить виджет в карточку CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/companies/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x35qxubx\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"osnovnye\"&gt;&lt;a href=\"api-reference/crm/companies/index.html#osnovnye\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-6maiozzi\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"ejj0ulqb\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/crm-company-add.html\"&gt;crm.company.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую компанию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/crm-company-update.html\"&gt;crm.company.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующую компанию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/crm-company-get.html\"&gt;crm.company.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает компанию по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/crm-company-list.html\"&gt;crm.company.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список компаний по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/crm-company-delete.html\"&gt;crm.company.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет компанию и все связанные с ней объекты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/crm-company-fields.html\"&gt;crm.company.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"pga2ckjb\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/events/on-crm-company-add.html\"&gt;onCrmCompanyAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;при создании компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/events/on-crm-company-update.html\"&gt;onCrmCompanyUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;при обновлении компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/events/on-crm-company-delete.html\"&gt;onCrmCompanyDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;при удалении компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"polzovatelskie-polya\"&gt;&lt;a href=\"api-reference/crm/companies/index.html#polzovatelskie-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пользовательские поля&lt;/span&gt;&lt;/a&gt;Пользовательские поля&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-zhef9063\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы-1\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события-1\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"wi0yzyn8\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/userfields/crm-company-userfield-add.html\"&gt;crm.company.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создаёт новое пользовательское поле для компаний&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/userfields/crm-company-userfield-update.html\"&gt;crm.company.userfield.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующее пользовательское поле компаний&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/companies/userfields/crm-company-userfield-get.html\"&gt;crm.company.userfield.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает пользовательское поле компаний по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt
