        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Валюта в CRM помогает работать с клиентами из разных стран. Например, основная валюта, в которой компания ведет расчеты, — рубли. В сделку менеджер добавляет товары с ценой в рублях, а клиент платит в удобной ему валюте — тенге. Менеджеру достаточно изменить валюту сделки в карточке — Битрикс автоматически посчитает стоимость товаров в тенге по заданному в настройках курсу.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/currency/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/6987305/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;валюты в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-valyuty-s-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/currency/index.html#svyaz-valyuty-s-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь валюты с объектами CRM&lt;/span&gt;&lt;/a&gt;Связь валюты с объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Стоимость товарной позиции можно указать через &lt;a href=\"api-reference/catalog/price/index.html\"&gt;методы цен&lt;/a&gt;. Поля всех типов цен составные — сумма и валюта изменяются отдельно. Для указания или изменения валюты используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o1ktcpk6\"&gt;currency&lt;/code&gt;, передавайте в него идентификатор валюты в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jjo6fale\"&gt;RUB&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Стандартное поле «Сумма и валюта».&lt;/strong&gt; Поле показывает сумму товаров и валюту в &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделках&lt;/a&gt;, &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидах&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;счетах&lt;/a&gt;, &lt;a href=\"api-reference/crm/quote/index.html\"&gt;предложениях&lt;/a&gt;,  &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессах&lt;/a&gt;. Поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r6f4rdyr\"&gt;Сумма и валюта&lt;/code&gt; — составное, сумма и валюта изменяются отдельно. Для указания или изменения валюты используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hqgvwrpt\"&gt;CURRENCY_ID&lt;/code&gt;, передавайте в него идентификатор валюты в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6xuuj7vh\"&gt;RUB&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользовательское поле типа «Деньги».&lt;/strong&gt; Для указания или изменения значения валюты  передавайте в поле сумму и код валюты в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9nqubhee\"&gt;100|RUB&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"bazovaya-valyuta\"&gt;&lt;a href=\"api-reference/crm/currency/index.html#bazovaya-valyuta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Базовая валюта&lt;/span&gt;&lt;/a&gt;Базовая валюта&lt;/h2&gt;\n&lt;p&gt;Базовая валюта — валюта, в которой компания ведет расчеты.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Если создать или изменить элемент CRM, не передававя код валюты, — базовая валюта устанавливается автоматически&lt;/li&gt;\n&lt;li&gt;Если изменить валюту в поле, стоимость будет пересчитана по курсу базовой валюты&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы узнать базовую валюту, используйте метод &lt;a href=\"api-reference/crm/currency/crm-currency-base-get.html\"&gt;crm.currency.base.get&lt;/a&gt;. Изменить базовую валюту — метод &lt;a href=\"api-reference/crm/currency/crm-currency-base-set.html\"&gt;crm.currency.base.set&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kurs-valyuty\"&gt;&lt;a href=\"api-reference/crm/currency/index.html#kurs-valyuty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Курс валюты&lt;/span&gt;&lt;/a&gt;Курс валюты&lt;/h2&gt;\n&lt;p&gt;Курс любой валюты в Битрикс рассчитывается по отношению к базовой валюте.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Когда вы изменяете базовую валюту, соотношение курсов автоматически не пересчитывается.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Чтобы изменить курс валюты к базовой, используйте метод изменения валюты — &lt;a href=\"api-reference/crm/currency/crm-currency-update.html\"&gt;crm.currency.update&lt;/a&gt;. Соотношение устанавливайте в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ut9we8ib\"&gt;AMOUNT&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"lokalizaciya-valyuty\"&gt;&lt;a href=\"api-reference/crm/currency/index.html#lokalizaciya-valyuty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Локализация валюты&lt;/span&gt;&lt;/a&gt;Локализация валюты&lt;/h2&gt;\n&lt;p&gt;Локализация валют — это правила написания чисел и расположения знака валюты на разных языках.&lt;/p&gt;\n&lt;p&gt;Для изменения или удаления настроек локализации валюты используйте группу методов &lt;a href=\"api-reference/crm/currency/localizations/index.html\"&gt;crm.currency.localizations.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/currency/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-79abrwga\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-0hfewjod\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"5hxd6hv6\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-add.html\"&gt;crm.currency.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую валюту&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-update.html\"&gt;crm.currency.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующую валюту&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-get.html\"&gt;crm.currency.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает валюту по символьному идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-list.html\"&gt;crm.currency.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список валют&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-delete.html\"&gt;crm.currency.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет валюту&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-fields.html\"&gt;crm.currency.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей валюты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-base-get.html\"&gt;crm.currency.base.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает символьный идентификатор базовой валюты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/crm-currency-base-set.html\"&gt;crm.currency.base.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Меняет базовую валюту&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"45g6as7n\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/events/on-crm-currency-add.html\"&gt;onCrmCurrencyAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании валюты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/events/on-crm-currency-update.html\"&gt;onCrmCurrencyUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновлении валюты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/events/on-crm-currency-delete.html\"&gt;onCrmCurrencyDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении валюты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Связь валюты с объектами CRM","href":"api-reference/crm/currency/index.html#svyaz-valyuty-s-obuektami-crm","level":2},{"title":"Базовая валюта","href":"api-reference/crm/currency/index.html#bazovaya-valyuta","level":2},{"title":"Курс валюты","href":"api-reference/crm/currency/index.html#kurs-valyuty","level":2},{"title":"Локализация валюты","href":"api-reference/crm/currency/index.html#lokalizaciya-valyuty","level":2},{"title":"Обзор методов","href":"api-reference/crm/currency/index.html#all-methods","level":2}],"title":"Валюты в CRM: обзор методов"},"router":{"pathname":"api-reference/crm/currency/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
