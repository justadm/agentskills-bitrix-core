        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Локализация валют — это правила написания чисел и расположения знака валюты на разных языках.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/currency/localizations/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/6987305/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;валюты в Битрикс24&lt;/a&gt;, &lt;a href=\"api-reference/crm/data-types.html#crm_currency_localization\"&gt;структура локализации&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"ispolzovanie-lokalizacii\"&gt;&lt;a href=\"api-reference/crm/currency/localizations/index.html#ispolzovanie-lokalizacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Использование локализации&lt;/span&gt;&lt;/a&gt;Использование локализации&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Битрикс24.&lt;/strong&gt; Вывод валюты зависит от языка интерфейса Битрикс в аккаунте сотрудника. В интерфейсе на русском языке сумма выводится в формате &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9kyu1rg0\"&gt;12 345,67 ₽&lt;/code&gt;,  на английском — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3n00nhxq\"&gt;₽ 12,345.67&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Битрикс24.Сайты.&lt;/strong&gt; В настройках сайта можно выбрать язык стандартных фраз для блоков конструктора. Язык сайта влияет на формат вывода цен в блоках магазина.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17302258/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как переключить язык интерфейса в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/6527585/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Настройки сайтов и страниц&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/currency/localizations/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9887ndpd\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/localizations/crm-currency-localizations-get.html\"&gt;crm.currency.localizations.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает существующие локализации валюты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/localizations/crm-currency-localizations-set.html\"&gt;crm.currency.localizations.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет локализации для валюты или добавляет, если локализация для указанного языка не существует&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/localizations/crm-currency-localizations-delete.html\"&gt;crm.currency.localizations.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет локализации валюты для указанных языков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/currency/localizations/crm-currency-localizations-fields.html\"&gt;crm.currency.localizations.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля локализации валюты, то есть настроек зависящих от языка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Использование локализации","href":"api-reference/crm/currency/localizations/index.html#ispolzovanie-lokalizacii","level":2},{"title":"Обзор методов и событий","href":"api-reference/crm/currency/localizations/index.html#all-methods","level":2}],"title":"Локализации валют в CRM: обзор методов"},"router":{"pathname":"api-reference/crm/currency/localizations/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
