        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;При помощи группы методов crm.deal.contact.* можно устанавливать или удалять связь контактов со сделкой. Используйте методы crm.deal.contact.* для работы с одним контактом, методы crm.deal.contact.items.* для работы с группой контактов.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/deals/contacts/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/2501159\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Связь между сделками, контактами и компаниями&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"chto-daet-svyaz-mezhdu-sdelkoj-i-kontaktami\"&gt;&lt;a href=\"api-reference/crm/deals/contacts/index.html#chto-daet-svyaz-mezhdu-sdelkoj-i-kontaktami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что дает связь между сделкой и контактами&lt;/span&gt;&lt;/a&gt;Что дает связь между сделкой и контактами&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;В карточке сделки отображается информация о связанных контактах: имя, номер а телефона, e-mail, должность.&lt;/li&gt;\n&lt;li&gt;Из карточки сделки можно позвонить или написать письмо без перехода в карточку контакта.&lt;/li&gt;\n&lt;li&gt;Коммуникация с клиентом: письма, звонки, чаты открытых линий будут храниться в карточке контакта и в карточке сделки. К закрытым сделкам коммуникации не прикрепляются.&lt;/li&gt;\n&lt;li&gt;CoPilot в CRM обрабатывает звонки клиентов из карточки сделки: расшифровывает записи, составляет резюме разговора, заполняет поля в карточке CRM&lt;/li&gt;\n&lt;li&gt;При &lt;a href=\"api-reference/crm/document-generator/index.html\"&gt;генерации документов по шаблону&lt;/a&gt; можно использовать символьные коды, которые автоматически подставят данные связанных контактов в документ.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18799442/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;CoPilot в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/deals/contacts/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mi9pca93\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-add.html\"&gt;crm.deal.contact.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет контакт к сделке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-delete.html\"&gt;crm.deal.contact.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет контакт из указанной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-fields.html\"&gt;crm.deal.contact.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля связи сделка-контакт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-items-get.html\"&gt;crm.deal.contact.items.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает набор контактов, связанных со сделкой&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-items-set.html\"&gt;crm.deal.contact.items.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет несколько контактов к сделке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-items-delete.html\"&gt;crm.deal.contact.items.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет набор контактов, связанных с указанной сделкой&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Что дает связь между сделкой и контактами","href":"api-reference/crm/deals/contacts/index.html#chto-daet-svyaz-mezhdu-sdelkoj-i-kontaktami","level":2},{"title":"Обзор методов","href":"api-reference/crm/deals/contacts/index.html#all-methods","level":2}],"title":"Связь сделки с контактами: обзор методов"},"router":{"pathname":"api-reference/crm/deals/contacts/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
