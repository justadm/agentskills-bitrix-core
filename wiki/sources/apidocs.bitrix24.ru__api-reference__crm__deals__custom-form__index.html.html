            {"data":{"leading":false,"html":"&lt;p&gt;Группа методов crm.deal.details.configuration.* управляет настройками карточки для двух представлений:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;«Общий вид» — вид карточки для всех сотрудников&lt;/li&gt;\n&lt;li&gt;«Мой вид» — личная настройка карточки сотрудника&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для каждого вида карточки можно настроить секции, внутри секции — перечень полей. Например создать секцию «Информация об оплате» и вывести в ней поля «Сумма и валюта» и «Аванс». Для полей, которые не относятся к платежной информации, создать другую секцию.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/deals/custom-form/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17914816/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Представления CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-kartochki-sdelki-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/crm/deals/custom-form/index.html#svyaz-kartochki-sdelki-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь карточки сделки с другими объектами&lt;/span&gt;&lt;/a&gt;Связь карточки сделки с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Идентификатор пользователя &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xxg4dnvm\"&gt;userId&lt;/code&gt; используется при установке личных настроек карточки. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Поля сделки.&lt;/strong&gt; Идентификаторы полей используются при установке видимых полей в секции карточки. Получить идентификаторы системных и пользовательских полей сделки можно с помощью метода &lt;a href=\"api-reference/crm/deals/crm-deal-fields.html\"&gt;crm.deal.fields&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Воронки сделок.&lt;/strong&gt; Для разных воронок сделок можно настраивать свой вид карточки. Для воронки «Продажи» создать вид карточки со одними секциями и полями. Для воронки «Сервисное обслуживание» — с другими.&lt;/p&gt;\n&lt;p&gt;Для переключения между настройками карточек разных воронок используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i790xp8a\"&gt;dealCategoryId&lt;/code&gt; — ID воронки сделки.&lt;/p&gt;\n&lt;p&gt;Чтобы получить ID воронок сделок используйте метод &lt;a href=\"api-reference/crm/universal/category/crm-category-list.html\"&gt;crm.category.list&lt;/a&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4zw7tmf1\"&gt;entityTypeId: 2&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"universalnye-metody-dlya-upravleniya-kartochkami\"&gt;&lt;a href=\"api-reference/crm/deals/custom-form/index.html#universalnye-metody-dlya-upravleniya-kartochkami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Универсальные методы для управления карточками&lt;/span&gt;&lt;/a&gt;Универсальные методы для управления карточками&lt;/h2&gt;\n&lt;p&gt;Наравне с методами crm.deal.details.configuration.* для настройки карточки сделки можно использовать группу универсальных методов &lt;a href=\"api-reference/crm/universal/item-details-configuration/index.html\"&gt;crm.item.details.configuration.*&lt;/a&gt;. Возможности методов одинаковые, отличие может быть во времени выполнения запроса.&lt;/p&gt;\n&lt;p&gt;Универсальные методы &lt;a href=\"api-reference/crm/universal/item-details-configuration/index.html\"&gt;crm.item.details.configuration.*&lt;/a&gt; имеют дополнительный параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t7qj8m0i\"&gt;entityTypeId&lt;/code&gt; — ID типа объекта. Параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oqloo6ev\"&gt;entityTypeId&lt;/code&gt; позволяет применять универсальные методы к любому объекту CRM. Для управления карточкой сделки через универсальный метод передавайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8lwqh4vx\"&gt;entityTypeId: 2&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/deals/custom-form/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ry90qb1h\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/custom-form/crm-deal-details-configuration-get.html\"&gt;crm.deal.details.configuration.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает настройки карточки сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/custom-form/crm-deal-details-configuration-reset.html\"&gt;crm.deal.details.configuration.reset&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сбрасывает настроек карточки сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/custom-form/crm-deal-details-configuration-set.html\"&gt;crm.deal.details.configuration.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Позволяет установить настройки карточки сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/custom-form/crm-deal-details-configuration-force-common-scope-for-all.html\"&gt;crm.deal.details.configuration.forceCommonScopeForAll&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Принудительно устанавливает общую карточку сделок для всех пользователей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь карточки сделки с другими объектами","href":"api-reference/crm/deals/custom-form/index.html#svyaz-kartochki-sdelki-s-drugimi-obuektami","level":2},{"title":"Универсальные методы для управления карточками","href":"api-reference/crm/deals/custom-form/index.html#universalnye-metody-dlya-upravleniya-kartochkami","level":2},{"title":"Обзор методов","href":"api-reference/crm/deals/custom-form/index.html#all-methods","level":2}],"title":"Управление карточками сделок: обзор методов"},"router":{"pathname":"api-reference/crm/deals/custom-form/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
