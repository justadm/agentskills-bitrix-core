        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;События дают возможность приложениям реагировать на изменения практически в реальном времени: получать уведомления о создании, обновлении, удалении и перемещении сделок.&lt;/p&gt;\n&lt;p&gt;Подробно работа с событиями описана в статье &lt;a href=\"api-reference/events/index.html\"&gt;Концепция и преимущества обработки событий&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/deals/events/index.html#all-events\"&gt;все события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-poluchat-sobytiya\"&gt;&lt;a href=\"api-reference/crm/deals/events/index.html#kak-poluchat-sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как получать события&lt;/span&gt;&lt;/a&gt;Как получать события&lt;/h2&gt;\n&lt;p&gt;Подписаться на события &lt;a href=\"api-reference/crm/deals/events/on-crm-deal-add.html\"&gt;onCrmDealAdd&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/events/on-crm-deal-update.html\"&gt;onCrmDealUpdate&lt;/a&gt; и &lt;a href=\"api-reference/crm/deals/events/on-crm-deal-delete.html\"&gt;onCrmDealDelete&lt;/a&gt; можно через:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"local-integrations/local-webhooks.html\"&gt;исходящий вебхук&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"settings/app-installation/index.html\"&gt;приложение&lt;/a&gt; и метод &lt;a href=\"api-reference/events/event-bind.html\"&gt;event.bind&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Подписаться на событие &lt;a href=\"api-reference/crm/deals/events/on-crm-deal-move-to-category.html\"&gt;onCrmDealMoveToCategory&lt;/a&gt; можно только через &lt;a href=\"settings/app-installation/index.html\"&gt;приложение&lt;/a&gt; и метод &lt;a href=\"api-reference/events/event-bind.html\"&gt;event.bind&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Пример кода обработчика для события описан в статье &lt;a href=\"api-reference/events/test-handler.html\"&gt;Как проверить свой обработчик для обработки событий Битрикс24&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"dostupnost-serverov-dlya-otpravki-i-polucheniya-sobytij\"&gt;&lt;a href=\"api-reference/crm/deals/events/index.html#dostupnost-serverov-dlya-otpravki-i-polucheniya-sobytij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Доступность серверов для отправки и получения событий&lt;/span&gt;&lt;/a&gt;Доступность серверов для отправки и получения событий&lt;/h2&gt;\n&lt;p&gt;Сервер обработчика события должен быть доступен извне. Для настройки доступности сервера обработчика и приложения используйте статью &lt;a href=\"/settings/cloud-and-on-premise/network-access.html\"&gt;Необходимые сетевые доступы&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Для облачного Битрикс24 дополнительная настройка не требуется. Для коробочного Битрикс24 на сервере или хостинге настройте доступность по статье &lt;a href=\"/settings/cloud-and-on-premise/network-access.html\"&gt;Необходимые сетевые доступы&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-events\"&gt;&lt;a href=\"api-reference/crm/deals/events/index.html#all-events\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор событий&lt;/span&gt;&lt;/a&gt;Обзор событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2l1h47s2\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может подписаться: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-add.html\"&gt;onCrmDealAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании сделки вручную или методом &lt;a href=\"api-reference/crm/deals/crm-deal-add.html\"&gt;crm.deal.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-update.html\"&gt;onCrmDealUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении сделки вручную или методом &lt;a href=\"api-reference/crm/deals/crm-deal-update.html\"&gt;crm.deal.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-delete.html\"&gt;onCrmDealDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении сделки вручную или методом &lt;a href=\"api-reference/crm/deals/crm-deal-delete.html\"&gt;crm.deal.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-move-to-category.html\"&gt;onCrmDealMoveToCategory&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении воронки сделки вручную или методом &lt;a href=\"api-reference/crm/universal/crm-item-update.html\"&gt;crm.item.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как получать события","href":"api-reference/crm/deals/events/index.html#kak-poluchat-sobytiya","level":2},{"title":"Доступность серверов для отправки и получения событий","href":"api-reference/crm/deals/events/index.html#dostupnost-serverov-dlya-otpravki-i-polucheniya-sobytij","level":2},{"title":"Обзор событий","href":"ap
