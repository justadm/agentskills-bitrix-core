            {"data":{"leading":false,"html":"&lt;p&gt;Сделка — один из ключевых объектов CRM, в ней:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;можно управлять процессом продажи товара или услуги, включая отслеживание этапов и прием онлайн-платежей&lt;/li&gt;\n&lt;li&gt;ведется диалог с клиентом: звонки, письма, чаты открытых линий&lt;/li&gt;\n&lt;li&gt;вы можете просмотреть историю работы: дела, записи таймлайна&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/deals/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/5493461/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;сделки в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-sdelok-s-drugimi-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#svyaz-sdelok-s-drugimi-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь сделок  с другими объектами CRM&lt;/span&gt;&lt;/a&gt;Связь сделок  с другими объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Клиент.&lt;/strong&gt; Поле в карточке сделки, состоящее из связанных с ней компании и контактов. Все дела звонков, писем, чатов с контактом или компанией будут сохранены в карточке активной сделки. Компания в поле одна, обращение к ней происходит напрямую через поле сделки &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p98g5bzd\"&gt;COMPANY_ID&lt;/code&gt;. Контактов может быть указано несколько, взаимодействие с ними ведется через отдельную группу методов &lt;a href=\"api-reference/crm/deals/contacts/index.html\"&gt;crm.deal.contact.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Добавление, изменение, удаление товарных позиций в сделках возможно через группу методов &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Оплаты.&lt;/strong&gt; Добавление, изменение, удаление документов оплаты в сделках возможно через группу методов &lt;a href=\"api-reference/crm/universal/payment/index.html\"&gt;crm.item.payment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/2501159/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Связь между сделками, контактами и компаниями&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13216242/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как добавить товары в сделки, лиды и предложения&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18225080/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как принимать оплату от клиентов и работать с чеками в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"voronki-i-stadii-sdelok\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#voronki-i-stadii-sdelok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Воронки и стадии сделок&lt;/span&gt;&lt;/a&gt;Воронки и стадии сделок&lt;/h2&gt;\n&lt;p&gt;Для сделок можно создавать различные воронки продаж и управлять ими через группу методов &lt;a href=\"api-reference/crm/universal/category/index.html\"&gt;crm.category.*&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wcumln2o\"&gt;entityTypeId&lt;/code&gt; сделки = &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mm95lyzz\"&gt;2&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;В каждой воронке будут свои стадии. Ими можно управлять  через группу методов справочников CRM — &lt;a href=\"api-reference/crm/status/index.html\"&gt;crm.status.*&lt;/a&gt;. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n10hkksy\"&gt;ENTITY_ID&lt;/code&gt; статусов сделок оригинальный у каждого направления — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gjdqdmoj\"&gt;DEAL_STAGE_xx&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Получить историю движения сделки по стадиям можно через метод &lt;a href=\"api-reference/crm/crm-stage-history-list.html\"&gt;crm.stagehistory.list&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/20732764/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Воронки продаж: как в CRM разделить работу по отделам&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"kak-izmenit-voronku-sdelki\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#kak-izmenit-voronku-sdelki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как изменить воронку сделки&lt;/span&gt;&lt;/a&gt;Как изменить воронку сделки&lt;/h3&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/crm/deals/crm-deal-update.html\"&gt;crm.deal.update&lt;/a&gt; может изменить только стадию сделки внутри текущей воронки. Если передать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qaeoocet\"&gt;STAGE_ID&lt;/code&gt;, который не принадлежит текущей воронке, ничего не изменится.&lt;/p&gt;\n&lt;p&gt;Чтобы переместить сделку на стадию в другую воронку, используйте метод &lt;a href=\"api-reference/crm/universal/crm-item-update.html\"&gt;crm.item.update&lt;/a&gt; с параметрами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y9bz8tom\"&gt;entityTypeId&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g8kn4s9s\"&gt;2&lt;/code&gt; для сделки,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b8lwl7xr\"&gt;id&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hpn2piv5\"&gt;id&lt;/code&gt; сделки, которую перемещаете,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-206ay41g\"&gt;categoryId&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r0ddvthd\"&gt;id&lt;/code&gt; воронки, куда перемещаете сделку. Получить можно методом &lt;a href=\"api-reference/crm/universal/category/crm-category-list.html\"&gt;crm.category.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ssu268ho\"&gt;stageId&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hptn0gmk\"&gt;id&lt;/code&gt; стадии в новой воронке. Получить можно методом &lt;a href=\"api-reference/crm/status/crm-status-list.html\"&gt;crm.status.list&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-nfh8q3uj\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"curl-webhook\" data-diplodoc-key=\"curl%20(webhook)\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;cURL (Webhook)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-oauth\" data-diplodoc-key=\"curl%20(oauth)\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;cURL (OAuth)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js t;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"llzixd1r\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt;\n{\n    &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'crm.item.update'&lt;/span&gt;,\n        {\n            &lt;span class=\"hljs-attr\"&gt;entityTypeId&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;,\n            &lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;233&lt;/span&gt;,\n            &lt;span class=\"hljs-attr\"&gt;fields&lt;/span&gt;: {\n                &lt;span class=\"hljs-attr\"&gt;STAGE_ID&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'EXECUTING'&lt;/span&gt;,\n                &lt;span class=\"hljs-attr\"&gt;categoryId&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;\n            }\n        }\n    );\n    \n    &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; result = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt;;\n    &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Updated item with ID:'&lt;/span&gt;, result);\n    \n    &lt;span class=\"hljs-title function_\"&gt;processResult&lt;/span&gt;(result);\n}\n&lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt;( error )\n{\n    &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Error:'&lt;/span&gt;, error);\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard- _\"&gt;error&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;())\n            : &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;info&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;data&lt;/span&gt;());\n    }\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"155\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-155\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-155\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-155.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"c2ucln4n\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"PHP CRest\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-keyword\"&gt;require_once&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'crest.php'&lt;/span&gt;);\n\n&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title class_\"&gt;CRest&lt;/span&gt;::&lt;span class=\"hljs-title function_ invoke__\"&gt;call&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'crm.item.update'&lt;/span&gt;,\n    [\n        &lt;span class=\"hljs-string\"&gt;'entityTypeId'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'id'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;233&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'fields'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'STAGE_ID'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'EXECUTING'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'categoryId'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;\n        ]\n    ]\n);\n\n&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'&amp;lt;PRE&amp;gt;'&lt;/span&gt;;\n&lt;span class=\"hljs-title function_ invoke__\"&gt;print_r&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt;);\n&lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'&amp;lt;/PRE&amp;gt;'&lt;/span&gt;;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"158\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-158\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-158\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-158.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"kartochka-sdelki\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#kartochka-sdelki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка сделки&lt;/span&gt;&lt;/a&gt;Карточка сделки&lt;/h2&gt;\n&lt;p&gt;Основное рабочее пространство в сделке — это вкладка Общее ее карточки. Она состоит из двух частей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;левая, в ней располагаются поля с информацией. Если системных полей недостаточно, вы можете создать собственные пользовательские поля. Они позволяют хранить информацию в различных форматах данных: строка, число, ссылка, адрес и другие . Для создания, изменения, получения или удаления пользовательских полей сделок используется группа методов &lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html\"&gt;crm.deal.userfield.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;правая, в ней располагается таймлайн сделки. В нем можно создавать, редактировать, фильтровать, удалять дела CRM — группа методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;, и записи таймлайна — группа методов &lt;a href=\"api-reference/crm/timeline/index.html\"&gt;crm.timeline.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Параметрами карточки сделки можно управлять в зависимости от воронки через группу методов &lt;a href=\"api-reference/crm/deals/custom-form/index.html\"&gt;crm.deal.details.configuration.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22804914/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Карточка CRM: возможности и настройки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18478840/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Системные поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23960160/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Таймлайн в элементе CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В карточку сделки можно встроить приложение. Благодаря встраиванию можно будет использовать  приложение и не покидать карточку сделки.&lt;/p&gt;\n&lt;p&gt;Есть два сценария встройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Использовать специальные &lt;a href=\"api-reference/widgets/crm/index.html\"&gt;места встраивания&lt;/a&gt;. Например, через создание своей вкладки&lt;/li&gt;\n&lt;li&gt;Создать &lt;a href=\"tutorials/crm/crm-widgets/widget-as-field-in-lead-page.html\"&gt;пользовательское поле&lt;/a&gt;, в которое будет загружается интерфейс вашего приложения&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/crm-widgets/widget-as-detail-tab.html\"&gt;Встроить виджет в карточку CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"regulyarnye-sdelki\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#regulyarnye-sdelki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Регулярные сделки&lt;/span&gt;&lt;/a&gt;Регулярные сделки&lt;/h2&gt;\n&lt;p&gt;Автоматическое создание однотипных &lt;a href=\"https://helpdesk.bitrix24.ru/open/18453980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;регулярных сделок&lt;/a&gt; по шаблонам. Для управлениям шаблонами используется группа методов &lt;a href=\"api-reference/crm/deals/recurring-deals/index.html\"&gt;crm.deal.recurring.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h8em82ou\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"osnovnye\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#osnovnye\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-2onccnqf\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"01dw2wyy\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-add.html\"&gt;crm.deal.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую сделку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-update.html\"&gt;crm.deal.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет сделку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-get.html\"&gt;crm.deal.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает сделку по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-list.html\"&gt;crm.deal.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список сделок по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-delete.html\"&gt;crm.deal.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет сделку и все связанные с ней объекты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-fields.html\"&gt;crm.deal.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-productrows-set.html\"&gt;crm.deal.productrows.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет товары в сделку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/crm-deal-productrows-get.html\"&gt;crm.deal.productrows.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает товары сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"25xsjp7v\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-add.html\"&gt;onCrmDealAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-update.html\"&gt;onCrmDealUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-delete.html\"&gt;onCrmDealDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/events/on-crm-deal-move-to-category.html\"&gt;onCrmDealMoveToCategory&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении воронки сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"regulyarnye-sdelki1\"&gt;&lt;a href=\"api-reference/crm/deals/index.html#regulyarnye-sdelki1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Регулярные сделки&lt;/span&gt;&lt;/a&gt;Регулярные сделки&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-rm8y2vt4\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы-1\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события-1\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"g2bj3b3o\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-add.html\"&gt;crm.deal.recurring.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую регулярную сделку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-fields.html\"&gt;crm.deal.recurring.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список полей шаблона регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-expose.html\"&gt;crm.deal.recurring.expose&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую сделку из шаблона&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-update.html\"&gt;crm.deal.recurring.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет существующие настройки для шаблона регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-get.html\"&gt;crm.deal.recurring.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает поля настройки шаблона регулярной сделки по Id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-list.html\"&gt;crm.deal.recurring.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список настроек шаблонов регулярных сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-delete.html\"&gt;crm.deal.recurring.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет существующие настройки для шаблона регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"7vkdt35s\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-add.html\"&gt;onCrmDealRecurringAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании новой регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-update.html\"&gt;onCrmDealRecurringUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-delete.html\"&gt;onCrmDealRecurringDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-expose.html\"&gt;onCrmDe
