        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Регулярные сделки —  это сделки, которые создаются по шаблону. Для регулярных сделок можно настроить период и количество повторений. Они будут автоматически создаваться в выбранной воронке продаж.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/deals/recurring-deals/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/18453980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Регулярные сделки: что это и как использовать&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-regulyarnyh-sdelok-s-drugimi-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/index.html#svyaz-regulyarnyh-sdelok-s-drugimi-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь регулярных сделок с другими объектами CRM&lt;/span&gt;&lt;/a&gt;Связь регулярных сделок с другими объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Сделки.&lt;/strong&gt; Чтобы создать новый шаблон используйте метод &lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-add.html\"&gt;crm.deal.recurring.add&lt;/a&gt;. В параметр метода &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xmq838bd\"&gt;DEAL_ID&lt;/code&gt; передавайте ID существующей сделки. Значения полей этой сделки будут сохранены в шаблоне.&lt;/p&gt;\n&lt;p&gt;Чтобы посмотреть сделку, на основе которой создан шаблон, выполните метод &lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-list.html\"&gt;crm.deal.recurring.list&lt;/a&gt;. В результате вы получите значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yy1oo7ca\"&gt;BASED_ID&lt;/code&gt;. Полученное значение передайте в параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5ftqvsla\"&gt;id&lt;/code&gt; метода &lt;a href=\"api-reference/crm/deals/crm-deal-get.html\"&gt;crm.deal.get&lt;/a&gt;. Если шаблон создан в разделе регулярных сделок Битрикс24, параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zd99wbi0\"&gt;BASED_ID&lt;/code&gt; будет пустым.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Воронки.&lt;/strong&gt; Для сделок можно создавать воронки продаж и управлять ими через группу методов &lt;a href=\"api-reference/crm/universal/category/index.html\"&gt;crm.category.*&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xplvg74z\"&gt;entityTypeId&lt;/code&gt; сделки = &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ob1tmpiv\"&gt;2&lt;/code&gt;. Чтобы создать регулярную сделку в нужной воронке, передайте ID воронки в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h30efabe\"&gt;CATEGORY_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Если в шаблоне сделки есть товарные позиции, новая регулярная сделка будет создана с ними. Чтобы изменить товарные позиции в шаблоне, используйте методы группы &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;. В качестве &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4cuqu4l1\"&gt;ownerId&lt;/code&gt; сделки передавайте значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n7hvf5h3\"&gt;DEAL_ID&lt;/code&gt; из результата метода &lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-list.html\"&gt;crm.deal.recurring.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Клиенты.&lt;/strong&gt; Если в шаблоне сделки выбраны компания и контакты, новая регулярная сделка будет создана с ними. Чтобы изменить компанию в шаблоне, используйте метод &lt;a href=\"api-reference/crm/deals/crm-deal-update.html\"&gt;crm.deal.update&lt;/a&gt;, чтобы изменить контакты — методы группы &lt;a href=\"api-reference/crm/deals/contacts/crm-deal-contact-add.html\"&gt;crm.deal.contact.*&lt;/a&gt;. В качестве &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1vy227g6\"&gt;id&lt;/code&gt; сделки передавайте значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7bpi6xd3\"&gt;DEAL_ID&lt;/code&gt; из результата метода &lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-list.html\"&gt;crm.deal.recurring.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s9tgd0lr\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-ihywdmgj\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"xc4065ul\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-add.html\"&gt;crm.deal.recurring.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый шаблон регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-fields.html\"&gt;crm.deal.recurring.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список полей шаблона регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-expose.html\"&gt;crm.deal.recurring.expose&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую сделку по шаблону&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-update.html\"&gt;crm.deal.recurring.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет настройки шаблона регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-get.html\"&gt;crm.deal.recurring.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает настройки шаблона регулярной сделки по Id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-list.html\"&gt;crm.deal.recurring.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список шаблонов регулярных сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/crm-deal-recurring-delete.html\"&gt;crm.deal.recurring.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет шаблон регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"nqmwsufq\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-add.html\"&gt;onCrmDealRecurringAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании новой регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-update.html\"&gt;onCrmDealRecurringUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-delete.html\"&gt;onCrmDealRecurringDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/recurring-deals/events/on-crm-deal-recurring-expose.html\"&gt;onCrmDealRecurringExpose&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании новой сделки из регулярной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"n
