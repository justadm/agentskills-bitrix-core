        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Пользовательские поля хранят информацию о сделке в различных форматах данных: строка, число, ссылка, адрес и другие.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tipy-polzovatelskih-polej\"&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html#tipy-polzovatelskih-polej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы пользовательских полей&lt;/span&gt;&lt;/a&gt;Типы пользовательских полей&lt;/h2&gt;\n&lt;p&gt;Используйте метод &lt;a href=\"api-reference/crm/universal/user-defined-fields/crm-userfield-types.html\"&gt;crm.userfield.types&lt;/a&gt; для получения доступных типов пользовательских полей. Метод вернет ID и название типов полей.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs\"&gt;    (\n        [ID] =&amp;gt; double    \n        [title] =&amp;gt; Число\n    )\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"17\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-17\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-17\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-17.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Используйте метод &lt;a href=\"api-reference/crm/universal/user-defined-fields/crm-userfield-fields.html\"&gt;crm.userfield.fields&lt;/a&gt; для получения списка характеристик пользовательских полей. Метод вернет коды характеристик с их типом и названием.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs\"&gt;    [MANDATORY] =&amp;gt; Array\n                (\n                    [type] =&amp;gt; char\n                    [title] =&amp;gt; Обязательное\n                )\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"21\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-21\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-21\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-21.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"nastrojki-polzovatelskih-polej\"&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html#nastrojki-polzovatelskih-polej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Настройки пользовательских полей&lt;/span&gt;&lt;/a&gt;Настройки пользовательских полей&lt;/h2&gt;\n&lt;p&gt;Используйте метод &lt;a href=\"api-reference/crm/universal/user-defined-fields/crm-userfield-settings-fields.html\"&gt;crm.userfield.settings.fields&lt;/a&gt;, чтобы получить список доступных настроек. Метод вернет поддерживаемые настройки для запрошенного типа поля.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs\"&gt;    [DEFAULT_VALUE] =&amp;gt; Array\n            (\n                [type] =&amp;gt; double\n                [title] =&amp;gt; Значение по умолчанию\n            )\n    [PRECISION] =&amp;gt; Array\n            (\n                [type] =&amp;gt; int\n                [title] =&amp;gt; Точность\n            )\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"28\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-28\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-28\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-28.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"oshibki-pri-rabote-s-polzovatelskimi-polyami\"&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html#oshibki-pri-rabote-s-polzovatelskimi-polyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ошибки при работе с пользовательскими полями&lt;/span&gt;&lt;/a&gt;Ошибки при работе с пользовательскими полями&lt;/h2&gt;\n&lt;p&gt;При создании или удалении пользовательских полей запрос может прерваться с ошибкой &lt;a href=\"error-codes.html\"&gt;INTERNAL_SERVER_ERROR&lt;/a&gt;. Это внутренняя ошибка сервера. Причину ошибки можно найти в логах сервера на момент выполнения запроса:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;В облачном Битрикс24 напишите обращение в &lt;a href=\"bitrix-support.html\"&gt;техническую поддержку&lt;/a&gt; чтобы получить детали ошибки.&lt;/li&gt;\n&lt;li&gt;В коробочном Битрикс24 запросите лог ошибок сервера у администратора сервера или администратора хостинга. После напишите в &lt;a href=\"bitrix-support.html\"&gt;техническую поддержку&lt;/a&gt; и приложите лог для анализа.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"chastye-prichiny-servernyh-oshibok\"&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html#chastye-prichiny-servernyh-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Частые причины серверных ошибок&lt;/span&gt;&lt;/a&gt;Частые причины серверных ошибок&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Для сделок можно создать 1016 пользовательских полей — это ограничение архитектуры базы данных. Если в Битрикс24 уже есть 1016 полей для сделок, при попытке создать новое поле метод &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-add.html\"&gt;crm.deal.userfield.add&lt;/a&gt; вернет ошибку &lt;a href=\"error-codes.html\"&gt;INTERNAL_SERVER_ERROR&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Проверить количество пользовательских полей сделок можно методом &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-list.html\"&gt;crm.deal.userfield.list&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;На серверах есть ограничение для времени выполнения одного запроса — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lqdxmiim\"&gt;max_execution_time&lt;/code&gt;. Стандартное время — 60 секунд. Если запрос выполняется дольше, он прерывается с ошибкой &lt;a href=\"error-codes.html\"&gt;INTERNAL_SERVER_ERROR&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Время &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-add.html\"&gt;создания&lt;/a&gt; или &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-delete.html\"&gt;удаления&lt;/a&gt; пользовательского поля сделок зависит от количества сделок. Когда поле создается, оно добавляется во все карточки сделок. Когда поле удаляется, оно удаляется из всех карточек. Чем меньше сделок в вашем Битрикс24, тем быстрее создаются и удаляются поля.&lt;/p&gt;\n&lt;p&gt;Чтобы проверить количество сделок в Битрикс24 используйте метод &lt;a href=\"api-reference/crm/deals/crm-deal-list.html\"&gt;crm.deal.list&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iz652wem\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-d7rr23rt\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"6b2ghskx\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-add.html\"&gt;crm.deal.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новое пользовательское поле для сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-update.html\"&gt;crm.deal.userfield.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет существующее пользовательское поле сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-get.html\"&gt;crm.deal.userfield.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает пользовательское поле сделок по Id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-list.html\"&gt;crm.deal.userfield.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает списка пользовательских полей сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-delete.html\"&gt;crm.deal.userfield.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет пользовательское поле сделок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"9zbvhi7w\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/events/on-crm-deal-user-field-add.html\"&gt;onCrmDealUserFieldAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении пользовательского поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/events/on-crm-deal-user-field-update.html\"&gt;onCrmDealUserFieldUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении пользовательского поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/events/on-crm-deal-user-field-delete.html\"&gt;onCrmDealUserFieldDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении пользовательского поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/deals/user-defined-fields/events/on-crm-deal-user-field-set-enum-values.html\"&gt;onCrmDealUserFieldSetEnumValues&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении набора значений для пользовательского поля списочного типа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Типы пользовательских полей","href":"api-reference/crm/deals/user-defined-fields/index.html#tipy-polzovatelskih-polej","level":2},{"title":"Настройки пользовательских полей","href":"api-reference/crm/deals/user-defined-fields/index.html#nastrojki-polzovatelskih-polej","level":2},{"title":"Ошибки при работе с пользовательскими полями","href":"api-reference/crm/deals/user-defined-fields/index.html#oshibki-pri-rabote-s-polzovatelskimi-polyami","level":2,"items":[{"title":"Частые причины серверных ошибок","href":"api-reference/crm/deals/user-defined-fields/index.html#chastye-prichiny-servernyh-oshibok","level":3}]},{"title":"Обзор методов","href":"api-reference/crm/deals/user-defined-fields/index.html#all-methods","level":2}],"title":"Пользовательские поля сделок: обзор методов"},"router":{"pathname":"api-reference/crm/deals/user-defined-fields/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
