        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qwmhyq64\"&gt;crm.documentgenerator&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5z9o4qfv\"&gt;crm.documentgenerator.document.add&lt;/code&gt; создаёт новый документ на основании шаблона и данных из соответствующей сущности. В &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xub7bhvn\"&gt;values&lt;/code&gt; можно передать массив дополнительных значений полей.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;templateId&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;ID шаблона.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;entityTypeId&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;ID типа сущности CRM.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;entityId&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;ID сущности.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;values&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дополнительные значения полей.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;stampsEnabled&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;1 (поставить), 0 (убрать) печати и подписи.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"otvet-v-sluchae-uspeha\"&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-add.html#otvet-v-sluchae-uspeha\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ответ в случае успеха&lt;/span&gt;&lt;/a&gt;Ответ в случае успеха&lt;/h2&gt;\n&lt;p&gt;В случае успешного выполнения в результате придёт структура, аналогичная методу &lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-get.html\"&gt;crm.documentgenerator.document.get()&lt;/a&gt; на новом документе.&lt;/p&gt;\n&lt;h3 id=\"pochemu-v-rezultate-crmdocumentgeneratordocumentadd-net-ssylki-na-pdf\"&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-add.html#pochemu-v-rezultate-crmdocumentgeneratordocumentadd-net-ssylki-na-pdf\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Почему в результате crm.documentgenerator.document.add нет ссылки на pdf&lt;/span&gt;&lt;/a&gt;Почему в результате &lt;strong&gt;crm.documentgenerator.document.add&lt;/strong&gt; нет ссылки на &lt;strong&gt;pdf&lt;/strong&gt;&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Конвертация в &lt;strong&gt;pdf&lt;/strong&gt; – операция асинхронная. На момент окончания генерации документа еще нет &lt;strong&gt;pdf&lt;/strong&gt;-файла. Минимальное время конвертации – 8 секунд.&lt;/li&gt;\n&lt;li&gt;Если для документа очень нужен &lt;strong&gt;pdf&lt;/strong&gt;, то сейчас единственный вариант – сделать повторный запрос &lt;strong&gt;crm.documentgenerator.document.get&lt;/strong&gt; через 20-30 секунд, чтобы считать ссылку на &lt;strong&gt;pdf&lt;/strong&gt;. Если она там не появилась – попробовать повторить.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"smotrite-takzhe\"&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-add.html#smotrite-takzhe\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Смотрите также&lt;/span&gt;&lt;/a&gt;Смотрите также&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/document-generator/examples/index.html\"&gt;Примеры генерации документа&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://dev.1c-bitrix.ru/upload/doc_gen_04_10_2019.pdf\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Презентация по генератору документов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/7622241/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Шаблоны документов&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-add.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-generate-documents.html\"&gt;Как добавить шаблон и создать документ на его основе&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Ответ в случае успеха","href":"api-reference/crm/document-generator/documents/crm-document-generator-document-add.html#otvet-v-sluchae-uspeha",
