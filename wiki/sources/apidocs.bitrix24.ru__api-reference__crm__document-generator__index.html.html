        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Права&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;strong&gt;Scope&lt;/strong&gt;: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wsyl005k\"&gt;crm.documentgenerator&lt;/code&gt;&lt;/a&gt; | &lt;strong&gt;Кто может выполнять метод&lt;/strong&gt;: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3v19wye0\"&gt;любой пользователь&lt;/code&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/document-generator/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;REST-методы CRM для документов реализованы через аякс-контроллеры. При этом сами контроллеры и их экшны реализованы в модуле &lt;a href=\"api-reference/crm/document-generator/index.html\"&gt;Генератор документов&lt;/a&gt;, а в модуле CRM только обвязка для них. Эта обвязка преобразует входные и выходные параметры в соответствии с новым стандартом REST, а также учитывая особенности модуля CRM.&lt;/p&gt;\n&lt;p&gt;При работе с методами документов через скоуп CRM есть возможность работать только с шаблонами / документами, привязанными к модулю CRM.&lt;/p&gt;\n&lt;h2 id=\"osobennosti-peredavaemyh-znachenij\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#osobennosti-peredavaemyh-znachenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности передаваемых значений&lt;/span&gt;&lt;/a&gt;Особенности передаваемых значений&lt;/h2&gt;\n&lt;h3 id=\"provajdery\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#provajdery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Провайдеры&lt;/span&gt;&lt;/a&gt;Провайдеры&lt;/h3&gt;\n&lt;p&gt;Модуль &lt;strong&gt;Генератор документов&lt;/strong&gt; в качестве идентификатора провайдера данных использует полное наименование класса. Т.к. в модуле CRM используется именованные / числовые идентификаторы для идентификации сущностей, в RESTе для документов был использован аналогичный синтаксис. Если входной параметр называется &lt;em&gt;entityTypeId&lt;/em&gt;, то он принимает числовой индекс сущностей CRM. На данный момент есть следующие идентификаторы:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;1 - лид&lt;/li&gt;\n&lt;li&gt;2 - сделка&lt;/li&gt;\n&lt;li&gt;3 - контакт&lt;/li&gt;\n&lt;li&gt;4 - компания&lt;/li&gt;\n&lt;li&gt;5 - счет&lt;/li&gt;\n&lt;li&gt;7 - предложение&lt;/li&gt;\n&lt;li&gt;14 - заказ&lt;/li&gt;\n&lt;li&gt;31 - новые счета&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Также предусмотрена возможность использования смарт-процессов: их &lt;em&gt;entityTypeId&lt;/em&gt; также поддерживаются в Генераторе документов.&lt;/p&gt;\n&lt;h3 id=\"filtraciya-po-napravleniyam-sdelok\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#filtraciya-po-napravleniyam-sdelok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Фильтрация по направлениям сделок&lt;/span&gt;&lt;/a&gt;Фильтрация по направлениям сделок&lt;/h3&gt;\n&lt;p&gt;Методы REST не учитывают настройку привязки шаблона к провайдерам. Т.е. если был отправлен запрос на генерацию документа по шаблону с провайдером, к которому этот шаблон не привязан, ошибки не будет. Отсюда же следует, что не учитывается привязка шаблона к определенному направлению сделок. Если вы хотите указать сделку в качестве провайдера, всегда указывается только числовой идентификатор (2).&lt;/p&gt;\n&lt;h3 id=\"spisok-regionov\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#spisok-regionov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Список регионов&lt;/span&gt;&lt;/a&gt;Список регионов&lt;/h3&gt;\n&lt;p&gt;Каждый шаблон привязан к определенной стране. Список стран фиксирован и на данный момент состоит из:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;ru - Россия&lt;/li&gt;\n&lt;li&gt;by - Беларусь&lt;/li&gt;\n&lt;li&gt;kz - Казахстан&lt;/li&gt;\n&lt;li&gt;ua - Украина&lt;/li&gt;\n&lt;li&gt;br - Бразилия&lt;/li&gt;\n&lt;li&gt;mx - Мексика&lt;/li&gt;\n&lt;li&gt;de - Германия&lt;/li&gt;\n&lt;li&gt;uk - Великобритания&lt;/li&gt;\n&lt;li&gt;pl - Польша&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Управление регионами осуществляется в разделе &lt;a href=\"api-reference/document-generator/region/index.html\"&gt;documentgenerator&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;h3 id=\"dokumenty\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#dokumenty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Документы&lt;/span&gt;&lt;/a&gt;Документы&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-get-fields.html\"&gt;crm.documentgenerator.document.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Поля документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-add.html\"&gt;crm.documentgenerator.document.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создание нового документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-update.html\"&gt;crm.documentgenerator.document.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменение документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-get.html\"&gt;crm.documentgenerator.document.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получение информации о документе по Id.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-list.html\"&gt;crm.documentgenerator.document.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получение списка документов.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-enable-public-url.html\"&gt;crm.documentgenerator.document.enablepublicurl&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Включение и выключение публичной ссылки на документ.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-upload.html\"&gt;crm.documentgenerator.document.upload&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Загрузка сформированного документа и прикрепление его к указанной сущности.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/documents/crm-document-generator-document-delete.html\"&gt;crm.documentgenerator.document.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаление документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"numerator\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#numerator\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Нумератор&lt;/span&gt;&lt;/a&gt;Нумератор&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/numerator/crm-document-generator-numerator-add.html\"&gt;crm.documentgenerator.numerator.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавление нового нумератора.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/numerator/crm-document-generator-numerator-update.html\"&gt;crm.documentgenerator.numerator.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменение существующего нумератора.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/numerator/crm-document-generator-numerator-get.html\"&gt;crm.documentgenerator.numerator.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получение информацию о нумераторе по Id.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/numerator/crm-document-generator-numerator-list.html\"&gt;crm.documentgenerator.numerator.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получение списка нумераторов.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/numerator/crm-document-generator-numerator-delete.html\"&gt;crm.documentgenerator.numerator.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаление нумератора.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"shablony-dokumentov\"&gt;&lt;a href=\"api-reference/crm/document-generator/index.html#shablony-dokumentov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаблоны документов&lt;/span&gt;&lt;/a&gt;Шаблоны документов&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-get-fields.html\"&gt;crm.documentgenerator.template.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Поля шаблона документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-add.html\"&gt;crm.documentgenerator.template.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавление нового шаблона.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-update.html\"&gt;crm.documentgenerator.template.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменение существующего шаблона документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-get.html\"&gt;crm.documentgenerator.template.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получение информации о шаблоне документа по Id.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-list.html\"&gt;crm.documentgenerator.template.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получение списка шаблонов документов.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-delete.html\"&gt;crm.documentgenerator.template.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаление шаблона документа.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Особенности передаваемых значений","href":"api-reference/crm/document-generator/index.html#osobennosti-peredavaemyh-znachenij","level":2,"items":[{"title":"Провайдеры","href":"api-reference/crm/document-generator/index.html#provajdery","level":3},{"title":"Фильтрация по направлениям сделок","href":"api-reference/crm/document-generator/index.html#filtraciya-po-napravleniyam-sdelok","level":3},{"title":"Список регионов","href":"api-reference/crm/document-generator/index.html#spisok-regionov","level":3}]},{"title":"Обзор методов","href":"api-reference/crm/document-generator/index.html#all-methods","level":2,"items":[{"title":"Документы","href":"api-reference/crm/document-generator/index.html#dokumenty","level":3},{"title":"Нумератор","href":"api-reference/crm/document-generator/index.html#numerator","level":3},{"title":"Шаблоны документов","href":"api-reference/crm/document-generator/index.html#shablony-dokumentov","level":3}]}],"title":"Генера
