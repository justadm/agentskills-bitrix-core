        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;При работе с большой базой клиентов некоторые элементы CRM, такие как лиды, контакты или компании, могут повторяться. Первый звонок клиента создает контакт с именем и номером телефона. Письмо от этого же клиента создает новый контакт, с именем и e-mail адресом  — это дубликат.  Дубликаты контактов можно объединть.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/duplicates/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/10649014/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;поиск и обработка дубликатов в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"nastrojka-poiska-dublikatov-v-crm\"&gt;&lt;a href=\"api-reference/crm/duplicates/index.html#nastrojka-poiska-dublikatov-v-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Настройка поиска дубликатов в CRM&lt;/span&gt;&lt;/a&gt;Настройка поиска дубликатов в CRM&lt;/h2&gt;\n&lt;p&gt;В интерфейсе Битрикс24 поиск дубликатов доступен для трех объектов CRM: лиды, контакты, компании.&lt;/p&gt;\n&lt;p&gt;При запуске поиска сотрудник может выбрать, на основании каких полей будут отбираться дубликаты:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Лиды&lt;/strong&gt; — Ф.И.О., название компании, телефон, e-mail&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Контакты&lt;/strong&gt; — Ф.И.О., телефон, e-mail, ИНН, ОГРНИП и расчетный счет&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Компании&lt;/strong&gt; — название компании, телефон, e-mail, ИНН, ОГРН и расчетный счет&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;С помощью REST-методов можно расширить настройки поиска дубликатов в Битрикс24, добавив к ним дополнительные поля, в том числе пользовательские. Дополнительные поля в настройках поиска появятся в интерфейсе у всех сотрудников.&lt;/p&gt;\n&lt;p&gt;Чтобы получить перечень стандартных и пользовательских полей, по которым можно искать дубликаты, выполните метод &lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-fields.html\"&gt;crm.duplicate.volatileType.fields&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы получить перечень нестандартных полей, по которым поиск уже работает, выполните метод &lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-list.html\"&gt;crm.duplicate.volatileType.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Добавить поле к поиску дубликатов можно через метод &lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-register.html\"&gt;crm.duplicate.volatileType.register&lt;/a&gt;, удалить поле из поиска — &lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-unregister.html\"&gt;crm.duplicate.volatileType.unregister&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"poisk-dublikatov-cherez-rest\"&gt;&lt;a href=\"api-reference/crm/duplicates/index.html#poisk-dublikatov-cherez-rest\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поиск дубликатов через REST&lt;/span&gt;&lt;/a&gt;Поиск дубликатов через REST&lt;/h2&gt;\n&lt;p&gt;Для поиска дубликатов через приложение или вебхук используйте метод &lt;a href=\"api-reference/crm/duplicates/crm-duplicate-find-by-comm.html\"&gt;crm.duplicate.findbycomm&lt;/a&gt;. Метод позволяет искать дубликаты только по email-адресу и номеру телефона.&lt;/p&gt;\n&lt;p&gt;Метод crm.duplicate.findbycomm можно использовать для выбора элемента CRM. Например, у вас есть &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;дело c типом письмо&lt;/a&gt;, поступившее с почты test@bitrix.com. Чтобы сохранить в CRM это письмо и не создать дубликат, необходимо проверить, есть ли в базе клиентов лид, контакт или компания с таким e-mail. Один и тот же e-mail может быть записан у контакта и у связанной с ним компании. Выполнив запрос crm.duplicate.findbycomm, вы получите ID обоих элементов с указанием их типов и сможете выбрать, в контакт или компанию лучше прикрепить ваше письмо.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Туториал по работе с методом&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-get-lists/search-by-phone-and-email.html\"&gt;Как искать в CRM по телефону и e-mail&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"obuedinenie-dublikatov\"&gt;&lt;a href=\"api-reference/crm/duplicates/index.html#obuedinenie-dublikatov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Объединение дубликатов&lt;/span&gt;&lt;/a&gt;Объединение дубликатов&lt;/h2&gt;\n&lt;p&gt;Для объединения дубликатов используйте метод &lt;a href=\"api-reference/crm/duplicates/crm-entity-merge-batch.html\"&gt;crm.entity.mergeBatch&lt;/a&gt;. Метод позволяет объединить несколько элементов одного типа. Можно объединить два лида, но нельзя объединить лид с контактом.&lt;/p&gt;\n&lt;p&gt;Полное автоматическое объединение доступно в нескольких случаях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Элементы идентичны друг другу&lt;/li&gt;\n&lt;li&gt;Элементы не идентичны, но разница в значениях полей не требует ручной обработки. Например, в одном элементе поле заполнено, а в другом это же поле пустое — будет сохранено значение из заполненного поля&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если автоматически объединить выбранные элементы невозможно из-за конфликта данных, причин может быть несколько:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в элементах есть заполненные поля c отличными значениями друг от друга. Проверить значения всех полей можно методом get, например для проверки полей лидов используйте метод &lt;a href=\"api-reference/crm/leads/crm-lead-get.html\"&gt;crm.lead.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;у пользователя, с аккаунта которого выполняется запрос на объединение, нет доступа к одному или нескольким полям&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23204032/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как ограничить видимость пользовательских полей в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/duplicates/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0tnwnn9z\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь с правом на изменение и удаление элементов CRM&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"poisk-i-obuedinenie-dublikatov\"&gt;&lt;a href=\"api-reference/crm/duplicates/index.html#poisk-i-obuedinenie-dublikatov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поиск и объединение дубликатов&lt;/span&gt;&lt;/a&gt;Поиск и объединение дубликатов&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/duplicates/crm-duplicate-find-by-comm.html\"&gt;crm.duplicate.findbycomm&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список дубликатов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/duplicates/crm-entity-merge-batch.html\"&gt;crm.entity.mergeBatch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Объединяет дубликаты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"nastrojka-poiska-dublikatov\"&gt;&lt;a href=\"api-reference/crm/duplicates/index.html#nastrojka-poiska-dublikatov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Настройка поиска дубликатов&lt;/span&gt;&lt;/a&gt;Настройка поиска дубликатов&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-fields.html\"&gt;crm.duplicate.volatileType.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список полей, по которым можно искать дубликаты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-list.html\"&gt;crm.duplicate.volatileType.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список нестандартных полей, участвующих в поиске дубликатов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-register.html\"&gt;crm.duplicate.volatileType.register&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет поле в поиск дубликатов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/duplicates/volatile-type/crm-duplicate-volatile-type-unregister.html\"&gt;crm.duplicate.volatileType.unregister&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет поле из поиска дубликатов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Настройка поиска дубликатов в CRM","href":"api-reference/crm/duplicates/index.html#nastrojka-poiska-dublikatov-v-crm","level":2},{"title":"Поиск дубликатов через REST","href":"api-reference/crm/duplicates/index.html#poisk-dublikatov-cherez-rest","level":2},{"title":"Объединение дубликатов","href":"api-reference/crm/duplicates/index.html#obuedinenie-dublikatov","level":2},{"title":"Обзор методов","href":"api-reference/crm/duplicates/index.html#all-methods","level":2,"items":[{"title":"Поиск и объединение дубликатов","href":"api-reference/crm/duplicates/index.html#poisk-i-obuedinenie-dublikatov","level":3},{"title":"Настройка поиска дубликатов","href":"api-reference/crm/duplicates/index.html#nastrojka-poiska-dublikatov","level":3}]}],"title":"Поиск и обработка дубликатов в CRM: обзор методов"},"router":{"pathname":"api-reference/crm/duplicates/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
