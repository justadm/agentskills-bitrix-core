        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;При помощи группы методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fg6fk1li\"&gt;crm.lead.contact.*&lt;/code&gt; можно устанавливать или удалять связь контактов с лидом. Лид, связанный с контактом, становится повторным.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/leads/management-communication/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17728730/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Поле «Клиент» в карточке CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"osobennosti-povtornyh-lidov\"&gt;&lt;a href=\"api-reference/crm/leads/management-communication/index.html#osobennosti-povtornyh-lidov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности  повторных лидов&lt;/span&gt;&lt;/a&gt;Особенности  повторных лидов&lt;/h2&gt;\n&lt;p&gt;Повторный лид — это обращение клиента, который уже есть в базе клиентов компании. У повторных лидов скрыты поля контактных данных: «Телефон», «Почта», «Адрес», «Реквизиты».  Конвертировать повторный лид можно только в сделку. При новом обращении от известного клиента будет автоматически создан повторный лид, связанный с карточкой клиента, если в CRM включен режим работы с повторными лидами.&lt;/p&gt;\n&lt;p&gt;Методы &lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-add.html\"&gt;crm.lead.contact.add&lt;/a&gt; и &lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-items-set.html\"&gt;crm.lead.contact.items.set&lt;/a&gt; добавляют связь лида с одним или несколькими контактами. При создании такой связи лид автоматически становится повторным.&lt;/p&gt;\n&lt;p&gt;Чтобы вернуть возможность конвертации лида в контакт, удалите связь с контактами методами &lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-delete.html\"&gt;crm.lead.contact.delete&lt;/a&gt;, если контакт один, и &lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-items-delete.html\"&gt;crm.lead.contact.items.delete&lt;/a&gt;, если контактов несколько. При удалении связи лид перестанет быть повторным.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17707848/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Повторные лиды и сделки&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"chto-daet-svyaz-mezhdu-lidom-i-kontaktami\"&gt;&lt;a href=\"api-reference/crm/leads/management-communication/index.html#chto-daet-svyaz-mezhdu-lidom-i-kontaktami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что дает связь между лидом и контактами&lt;/span&gt;&lt;/a&gt;Что дает связь между лидом и контактами&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;В карточке лида отображается информация о связанных контактах: имя, номер телефона, e-mail, должность.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Из карточки лида можно позвонить или написать письмо без перехода в карточку контакта.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Коммуникация с клиентом: письма, звонки, чаты открытых линий будут храниться в карточке контакта и в карточке лида. К закрытым лидам коммуникации не прикрепляются.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;CoPilot в CRM обрабатывает звонки клиентов из карточки лида: расшифровывает записи, составляет резюме разговора, заполняет поля в карточке CRM.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;При &lt;a href=\"api-reference/crm/document-generator/index\"&gt;генерации документов по шаблону&lt;/a&gt; можно использовать символьные коды, которые автоматически подставят данные связанных контактов в документ.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18799442/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;CoPilot в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/leads/management-communication/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i0tv7yr5\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-add.html\"&gt;crm.lead.contact.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет привязку контакта к указанному лиду&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-delete.html\"&gt;crm.lead.contact.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет привязку контакта к указанному лиду&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-items-get.html\"&gt;crm.lead.contact.items.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список связанных с лидом контактов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-items-set.html\"&gt;crm.lead.contact.items.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прикрепляет список контактов к указанному лиду&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-items-delete.html\"&gt;crm.lead.contact.items.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет список контактов у лида&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/leads/management-communication/crm-lead-contact-fields.html\"&gt;crm.lead.contact.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает описание полей для связи лид-контакт, используемых методами семейства &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-duoj1r82\"&gt;crm.lead.contact.*&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Особенности  повторных лидов","href":"api-reference/crm/leads/management-communication/index.html#osobennosti-povtornyh-lidov","level":2},{"title":"Что дает связь между лидом и контактами","href":"api-reference/crm/leads/management-communication/index.html#chto-daet-svyaz-mezhdu-lidom-i-kontaktami","level":2},{"title":"Обзор методов","href":"api-reference/crm/leads/management-communication/index.html#all-methods","level":2}],"title":"Связь лида с контактами: обзор методов"},"router":{"pathname":"api-reference/crm/leads/management-communication/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
