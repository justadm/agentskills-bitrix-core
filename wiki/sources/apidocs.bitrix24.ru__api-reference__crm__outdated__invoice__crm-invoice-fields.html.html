gt;\n&lt;p&gt;Идентификатор фото ответственного&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Только для чтения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;RESPONSIBLE_SECOND_NAME&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n4724omj\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отчество ответственного&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Только для чтения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;RESPONSIBLE_WORK_POSITION&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fznhh7wb\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Должность ответственного&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Только для чтения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;STATUS_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oke0msz8\"&gt;crm_status&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор статуса&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор справочника \"INVOICE_STATUS\"&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;TAX_VALUE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dfpf5b1a\"&gt;double&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сумма налога&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Только для чтения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UF_COMPANY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s2ygl5fj\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Указывается, если плательщик \"Юридическое лицо\"&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UF_CONTACT_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3m5zkhgu\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор контакта&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Указывается, если плательщик \"Физическое лицо\", либо в качестве контактного лица компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UF_MYCOMPANY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w5fni1gw\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор своей компании&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Указывается в качестве компании с реквизитами счёта (привязка к реквизитам устанавливается отдельно)&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UF_DEAL_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fguxafna\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор связанной сделки&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;USER_DESCRIPTION&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1tv0kpcd\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Комментарий&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;PR_LOCATION&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fhl7ge76\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор местоположения&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обязательное, если используется режим налога на документ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;INVOICE_PROPERTIES&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1cllbmpv\"&gt;array&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Список свойств&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Если клиент - компания, могут быть указаны ключи (все значения типа string):&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;COMPANY&lt;/strong&gt; - Название компании;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;COMPANY_ADR&lt;/strong&gt; - Адрес;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CONTACT_PERSON&lt;/strong&gt; - Контактное лицо;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;EMAIL&lt;/strong&gt; - E-mail;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;PHONE&lt;/strong&gt; - Телефон;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;INN&lt;/strong&gt; - ИНН;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;KPP&lt;/strong&gt; - КПП.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если клиент - контакт:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;FIO&lt;/strong&gt; - Ф.И.О.;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ADDRESS&lt;/strong&gt; - Адрес;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;EMAIL&lt;/strong&gt; - E-mail;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;PHONE&lt;/strong&gt; - Телефон.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;PRODUCT_ROWS&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-239aw10d\"&gt;array&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Список товарных позиций&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Поля товарной позиции:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;ID&lt;/strong&gt; - Идентификатор (integer), для новой записи указывать 0;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;PRICE&lt;/strong&gt; - Цена (double);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DISCOUNT_PRICE&lt;/strong&gt; - Скидка на единицу товара (double);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;PRODUCT_ID&lt;/strong&gt; - Идентификатор товара в каталоге (integer), 0 - если не из каталога;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;PRODUCT_NAME&lt;/strong&gt; - Наименование товарной позиции (string);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;VAT_RATE&lt;/strong&gt; - Коэффициент ставки НДС (double);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;VAT_INCLUDED&lt;/strong&gt; - НДС включён в цену ('Y' или 'N') (char);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;MEASURE_CODE&lt;/strong&gt; - Код единицы измерения (integer);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;MEASURE_NAME&lt;/strong&gt; - Условное обозначение единицы измерения (string);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CATALOG_XML_ID&lt;/strong&gt; - Внешний код каталога (string), только для чтения;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;PRODUCT_XML_ID&lt;/strong&gt; - Внешний код товарной позиции (string), совпадает с внешним кодом товара, если он из каталога. Только для чтения.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;QUANTITY&lt;/strong&gt; - Количество.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Примеры кода","href":"api-reference/crm/outdated/invoice/crm-invoice-fields.html#primery-koda","level":2,"items":[{"title":"Возвращаемые данные","href":"api-reference/crm/outdated/invoice/crm-invoice-fields.html#vozvrashaemye-dannye","level":3}]}],"title":"Получить поля счета и входящих в него товаров crm.invoice.fields"},"router":{"pathname":"api-reference/crm/outdated/invoice/crm-invoice-fields","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
