        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ht6b0bs4\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Метод устарел. Рекомендуется использовать  &lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lbod0pkp\"&gt;Универсальные методы для счетов&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Метод cоздает новое пользовательское поле для счетов.&lt;/p&gt;\n&lt;p&gt;Системное ограничение на название поля - 20 знаков. К названию пользовательского поля всегда добавляется префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p7igt366\"&gt;UF_CRM_&lt;/code&gt;, то есть реальная длина названия - 13 знаков.&lt;/p&gt;\n&lt;h2 id=\"parametry-metoda\"&gt;&lt;a href=\"api-reference/crm/outdated/invoice/crm-invoice-user-field-add.html#parametry-metoda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры метода&lt;/span&gt;&lt;/a&gt;Параметры метода&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m9jfs2bt\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;fields&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Набор полей - массив вида &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3t9yi4cp\"&gt;array(\"поле\"=&amp;gt;\"значение\"[, ...])&lt;/code&gt;, содержащий описание пользовательского поля. Полное описание полей можно получить вызовом метода &lt;a href=\"api-reference/crm/universal/user-defined-fields/crm-userfield-fields.html\"&gt;crm.userfield.fields&lt;/a&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LIST&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Содержит набор значений списка для пользовательских полей типа Список. Указывается при создании/обновлении поля. Каждое значение представляет собой массив с полями:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;VALUE&lt;/strong&gt; -  значение элемента списка. Поле является обязательным в случае, когда создается новый элемент.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;SORT&lt;/strong&gt; - сортировка.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DEF&lt;/strong&gt; - если равно Y, то элемент списка является значением по-умолчанию. Для множественного поля допустимо несколько DEF=Y. Для не множественного, дефолтным будет считаться первое.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;XML_ID&lt;/strong&gt; - внешний код значения. Параметр учитывается только при обновлении уже существующих значений элемента списка.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ID&lt;/strong&gt; - идентификатор значения. Если он указан, то считается что это обновление существующего значения элемента списка, а не создание нового. Имеет смысл только при вызове методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-os8z2fyv\"&gt;*.userfield.update&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DEL&lt;/strong&gt; - если равно Y, то существующий элемент списка будет удален. Применяется, если заполнен параметр ID.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"primery-koda\"&gt;&lt;a href=\"api-reference/crm/outdated/invoice/crm-invoice-user-field-add.html#primery-koda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры кода&lt;/span&gt;&lt;/a&gt;Примеры кода&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-n3b1fq42\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"curl-webhook\" data-diplodoc-key=\"curl%20(webhook)\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;cURL (Webhook)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-oauth\" data-diplodoc-key=\"curl%20(oauth)\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;cURL (OAuth)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php-crest\" data-diplodoc-key=\"php%20crest\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP CRest&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"722i6wqp\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"cURL (Webhook)\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs mation=\"133\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-133\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-133\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-133.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"85x9bt0q\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-comment\"&gt;// callListMethod: Получает все данные сразу. Используйте только для небольших выборок (&amp;lt; 1000 элементов) из-за высокой нагрузки на память.&lt;/span&gt;\n\n&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callListMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'crm.paysystem.list'&lt;/span&gt;,\n    {\n      &lt;span class=\"hljs-attr\"&gt;order&lt;/span&gt;: {&lt;span class=\"hljs-string\"&gt;\"SORT\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"ASC\"&lt;/span&gt;},\n      &lt;span class=\"hljs-attr\"&gt;filter&lt;/span&gt;: {\n        &lt;span class=\"hljs-string\"&gt;\"%NAME\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Предложение\"&lt;/span&gt;,\n      }\n    },\n    &lt;span class=\"hljs-function\"&gt;(&lt;span cla or&lt;/span&gt; &lt;span class=\"hljs-title function_\"&gt;await&lt;/span&gt; (&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; page &lt;span class=\"hljs-keyword\"&gt;of&lt;/span&gt; generator) {\n    &lt;span class=\"hljs-keyword\"&gt;for&lt;/span&gt; (&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; entity &lt;span class=\"hljs-keyword\"&gt;of&lt;/span&gt; page) { &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Entity:'&lt;/span&gt;, entity) }\n  }\n} &lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt; (error) {\n  &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Request failed'&lt;/span&gt;, error)\n}\n\n&lt;span class=\"hljs-comment\"&gt;// callMethod: Ручное управление постраничной навигацией через параметр start. Используйте для точного контроля над пакетами запросов. Для больших данных менее эффективен, чем fetchListMethod.&lt;/span&gt;\n\n&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'crm.paysystem.list'&lt;/span&gt;, {\n    &lt;span class=\"hljs-attr\"&gt;order&lt;/span&gt;: {&lt;span class=\"hljs-string\"&gt;\"SORT\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"ASC\"&lt;/span&gt;},\n    &lt;span class=\"hljs-attr\"&gt;filter&lt;/span&gt;: {\n      &lt;span class=\"hljs-string\"&gt;\"%NAME\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Предложение\"&lt;/span&gt;,\n    }\n  }, &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;)\n  &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; result = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=
