        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Настройка ставки НДС для товаров или товарных позиций позволяет автоматизировать:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;расчет итоговой стоимости продукта или услуги&lt;/li&gt;\n&lt;li&gt;передачу данных в документы&lt;/li&gt;\n&lt;li&gt;интеграцию с платежными системами&lt;/li&gt;\n&lt;li&gt;обмен данными с кассами&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/outdated/vat/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/15955806\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Налоги и НДС в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Развитие методов остановлено&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ylymups5\"&gt;crm.vat.*&lt;/code&gt; продолжают работать, но у них есть более актуальный аналог &lt;a href=\"api-reference/catalog/vat/index.html\"&gt;catalog.vat.*&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-stavok-nds-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/crm/outdated/vat/index.html#svyaz-stavok-nds-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь ставок НДС с другими объектами&lt;/span&gt;&lt;/a&gt;Связь ставок НДС с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Товарные позиции&lt;/strong&gt; — это товары или услуги, которые указаны в сделке или другом объекте CRM. Товарные позиции могут отсутствовать в торговом каталоге. Изменение ставки НДС для товара в одной сделке не влияет на ставку аналогичного товара в другом элементе. Чтобы задать НДС для товарной позиции в сделке или другом объекте CRM, используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xk1nq72q\"&gt;taxRate&lt;/code&gt; группы методов &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары и услуги&lt;/strong&gt; — это продукты компании с фиксированными условиями продажи, сохраненные в торговом каталоге. При выборе товара из каталога в сделке или другом объекте CRM он автоматически будет добавлен со ставкой, указанной в каталоге. Чтобы задать НДС товара или услуги в торговом каталоге, используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jzn51frl\"&gt;vatId&lt;/code&gt; групп методов &lt;a href=\"api-reference/catalog/product/index.html\"&gt;catalog.product.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/outdated/vat/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-by4ndfch\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/outdated/vat/crm-vat-add.html\"&gt;crm.vat.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую ставку НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/outdated/vat/crm-vat-delete.html\"&gt;crm.vat.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет ставку НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/outdated/vat/crm-vat-get.html\"&gt;crm.vat.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает ставку НДС по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/outdated/vat/crm-vat-fields.html\"&gt;crm.vat.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей ставки НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/outdated/vat/crm-vat-list.html\"&gt;crm.vat.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список ставок НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/outdated/vat/crm-vat-update.html\"&gt;crm.vat.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующую ставку НДС&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь ставок НДС с другими объектами","href":"api-reference/crm/outdated/vat/index.html#svyaz-stavok-nds-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/crm/outdated/vat/index.html#all-methods","level":2}],"title":"Ставки НДС: обзор методов"},"router":{"pathname":"api-reference/crm/outdated/vat/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
