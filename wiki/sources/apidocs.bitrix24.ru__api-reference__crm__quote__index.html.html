            {"data":{"leading":false,"html":"&lt;p&gt;Коммерческое предложение — объект CRM, в котором можно формировать печатные документы и отправлять их клиенту перед сделкой.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/quote/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17614102/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;коммерческие предложения в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-predlozhenij-s-drugimi-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/quote/index.html#svyaz-predlozhenij-s-drugimi-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь предложений с другими объектами CRM&lt;/span&gt;&lt;/a&gt;Связь предложений с другими объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Сделка.&lt;/strong&gt; Коммерческое предложение может быть создано на основании сделки и наоборот. Связь устанавливается в поле предложения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gnoo47ah\"&gt;DEAL_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt;  Добавление, изменение, удаление товарных позиций в предложениях возможно через группу методов &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Реквизиты.&lt;/strong&gt; Реквизиты покупателя подтягиваются в форму предложения из связанных с ним контакта или компании. Реквизиты продавца подтягиваются из поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zavrn26c\"&gt;MYCOMPANY_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Клиент.&lt;/strong&gt; Поле в карточке коммерческого предложения, состоящее из связанных с ним компании и контактов. Компания в поле одна, обращение к ней происходит напрямую через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ym10g8l0\"&gt;COMPANY_ID&lt;/code&gt;. Контактов может быть указано несколько, изменение их производится через массив данных в множественном поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-msxmbhjn\"&gt;CONTACT_IDS&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13216242/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как добавить товары в сделки, лиды и предложения&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/15987420/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как использовать реквизиты вашей компании&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kartochka-predlozheniya\"&gt;&lt;a href=\"api-reference/crm/quote/index.html#kartochka-predlozheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка предложения&lt;/span&gt;&lt;/a&gt;Карточка предложения&lt;/h2&gt;\n&lt;p&gt;Основное рабочее пространство в предложении — это вкладка Общее его карточки. Она состоит из двух частей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;левая, в ней располагаются поля с информацией. Если системных полей недостаточно, вы можете создать собственные пользовательские поля. Они позволяют хранить информацию в различных форматах данных: строка, число, ссылка, адрес и другие. Для создания, изменения, получения или удаления пользовательских полей предложений используется группа методов &lt;a href=\"api-reference/crm/quote/user-field/index.html\"&gt;crm.quote.userfield.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;правая, в ней располагается таймлайн предложения. В нем можно создавать, редактировать, фильтровать, удалять дела CRM — группа методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;, и записи таймлайна — группа методов &lt;a href=\"api-reference/crm/timeline/index.html\"&gt;crm.timeline.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22804914/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Карточка CRM: возможности и настройки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18478840/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Системные поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23960160/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Таймлайн в элементе CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/quote/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В карточку коммерческого предложения можно встроить приложение. Благодаря встраиванию можно будет использовать приложение и не покидать карточку предложения.&lt;/p&gt;\n&lt;p&gt;Есть два сценария встройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Использовать специальные &lt;a href=\"api-reference/widgets/crm/index.html\"&gt;места встраивания&lt;/a&gt;. Например, через создание своей вкладки&lt;/li&gt;\n&lt;li&gt;Создать &lt;a href=\"tutorials/crm/crm-widgets/widget-as-field-in-lead-page.html\"&gt;пользовательское поле&lt;/a&gt;, в которое будет загружается контент вашего приложения&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/crm-widgets/widget-as-detail-tab.html\"&gt;Встроить виджет в карточку CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/quote/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fti2a9v1\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"osnovnye\"&gt;&lt;a href=\"api-reference/crm/quote/index.html#osnovnye\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-cc7eqbn2\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"16vyuy8w\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-add.html\"&gt;crm.quote.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новое коммерческое предложение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-update.html\"&gt;crm.quote.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет существующее предложение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-get.html\"&gt;crm.quote.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает коммерческое предложение по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-list.html\"&gt;crm.quote.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список предложений по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-delete.html\"&gt;crm.quote.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет предложение и все связанные с ним объекты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-fields.html\"&gt;crm.quote.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей коммерческого предложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-product-rows-get.html\"&gt;crm.quote.productrows.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает товарные позиции предложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/crm-quote-product-rows-set.html\"&gt;crm.quote.productrows.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает (создаёт или обновляет) товарные позиции предложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"3xhfv587\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/events/on-crm-quote-add.html\"&gt;onCrmQuoteAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании предложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/events/on-crm-quote-update.html\"&gt;onCrmQuoteUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновлении предложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/events/on-crm-quote-delete.html\"&gt;onCrmQuoteDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении предложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"polzovatelskie-polya\"&gt;&lt;a href=\"api-reference/crm/quote/index.html#polzovatelskie-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пользователськие поля&lt;/span&gt;&lt;/a&gt;Пользователськие поля&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-xrxm54zp\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы-1\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события-1\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"k3fmxyyu\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/user-field/crm-quote-user-field-add.html\"&gt;crm.quote.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новое пользовательское поле для предложений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/user-field/crm-quote-user-field-update.html\"&gt;crm.quote.userfield.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующее пользовательское поле предложений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/user-field/crm-quote-user-field-get.html\"&gt;crm.quote.userfield.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает пользовательское поле предложений по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/quote/user-field/crm-quote-user-field-list.html\"&gt;crm.quote.userfield.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список пользовательских полей предложений по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt
