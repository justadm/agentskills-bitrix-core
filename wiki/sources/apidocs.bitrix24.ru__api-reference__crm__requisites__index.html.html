            {"data":{"leading":false,"html":"&lt;p&gt;Реквизиты —  отдельные объекты CRM, в которых хранятся данные, используемые при заключении сделок: ИНН, КПП, ОГРН, банковские реквизиты, адреса. Все, что необходимо в шаблонах документов.&lt;/p&gt;\n&lt;p&gt;Поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y7an0rbj\"&gt;Реквизиты&lt;/code&gt; доступно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в контактах, компаниях — в них хранятся данные покупателей&lt;/li&gt;\n&lt;li&gt;в ваших компаниях — в них хранятся данные вашей компании, выступающей в роли продавца. Данный тип компании находится в отдельном разделе в настройках CRM&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/requisites/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/15989720\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;реквизиты вашей компании в Битрикс24&lt;/a&gt;, &lt;a href=\"https://helpdesk.bitrix24.ru/open/1930547/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;автоматическое заполнение реквизитов по ИНН&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-rekvizitov-s-drugimi-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/requisites/index.html#svyaz-rekvizitov-s-drugimi-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь реквизитов с другими объектами CRM&lt;/span&gt;&lt;/a&gt;Связь реквизитов с другими объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Контакт.&lt;/strong&gt; Шаблон реквизитов по умолчанию — Физлицо.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Компания.&lt;/strong&gt; Шаблон реквизитов по умолчанию — Организация.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Моя компания.&lt;/strong&gt; Реквизиты компании, выбранной как основной продавец, автоматически подставляются во все документы.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Адрес.&lt;/strong&gt; Отдельный объект, доступный через стандартное поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vbim9q8p\"&gt;Адрес&lt;/code&gt;.  Адреса могут быть привязаны только к Реквизитам или Лидам. Для работы с адресами используйте группу методов &lt;a href=\"api-reference/crm/requisites/addresses/index.html\"&gt;crm.address.*&lt;/a&gt; ,  ID реквизита передается в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-53h4lkri\"&gt;ENTITY_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Документы.&lt;/strong&gt; Любые печатные формы: счета, акты, договоры и другие, которые формируются через генератор документов.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/requisites/links/index.html\"&gt;Связи реквизитов с объектами CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/11706682/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Изменения в работе с адресами и реквизитами в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19098306/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Документы в CRM: как создать и отправить за пару минут&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"shablony-rekvizitov\"&gt;&lt;a href=\"api-reference/crm/requisites/index.html#shablony-rekvizitov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаблоны реквизитов&lt;/span&gt;&lt;/a&gt;Шаблоны реквизитов&lt;/h2&gt;\n&lt;p&gt;Любой реквизит контакта или компании создается в рамках шаблонов. Шаблон состоит из набора полей, характерных для того или иного типа юридических и физических лиц:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;шаблон Организация состоит из полей юридических лиц типа ООО: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hm54nekz\"&gt;ОГРН&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-529nu3ly\"&gt;ОКТМО&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;шаблон ИП состоит из других полей: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qovma9hq\"&gt;ОГРНИП&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c3mcx6xg\"&gt;ОКВЭД&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Добавлять, изменять и удалять шаблоны реквизитов можно через группу методов &lt;a href=\"api-reference/crm/requisites/presets/index.html\"&gt;crm.requisite.preset.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Управлять перечнем полей определенного шаблона — &lt;a href=\"api-reference/crm/requisites/presets/fields/index.html\"&gt;crm.requisite.preset.field.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Создавать и изменять пользовательские поля, которые можно будет использовать в шаблоне — &lt;a href=\"api-reference/crm/requisites/user-fields/index.html\"&gt;crm.requisite.userfield.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/7385595/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Шаблоны реквизитов&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/requisites/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-au7xbqsb\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"osnovnye\"&gt;&lt;a href=\"api-reference/crm/requisites/index.html#osnovnye\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-1kziggtj\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"aekf78ob\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/universal/crm-requisite-add.html\"&gt;crm.requisite.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый реквизит&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/universal/crm-requisite-update.html\"&gt;crm.requisite.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующий реквизит&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/universal/crm-requisite-get.html\"&gt;crm.requisite.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает реквизит по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/universal/crm-requisite-list.html\"&gt;crm.requisite.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список реквизитов по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/universal/crm-requisite-delete.html\"&gt;crm.requisite.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет реквизит и все связанные с ним объекты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/universal/crm-requisite-fields.html\"&gt;crm.requisite.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей реквизита&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"ni7gpd8v\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/events/on-crm-requisite-add.html\"&gt;onCrmRequisiteAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении реквизита&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/events/on-crm-requisite-update.html\"&gt;onCrmRequisiteUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении реквизита&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/events/on-crm-requisite-delete.html\"&gt;onC
