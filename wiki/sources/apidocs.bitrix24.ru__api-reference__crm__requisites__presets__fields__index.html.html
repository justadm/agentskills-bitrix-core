        <title>Работа с настраиваемыми полями шаблона реквизитов | REST API Битрикс24 и приложения для Маркет</title>

        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uacly1zh\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Настраиваемые поля — поля, которые можно добавлять или удалять из шаблона.&lt;/p&gt;\n&lt;p&gt;В форме редактирования реквизитов, кроме служебных полей, которые есть в любом реквизите (например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zzj1p9kp\"&gt;Название&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-arogrdlg\"&gt;Комментарий&lt;/code&gt;), есть другие (такие как &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iso0jo1w\"&gt;ИНН&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qrqz16nz\"&gt;КПП&lt;/code&gt;), которые являются настраиваемыми. Методы этого раздела предназначены для управления списком таких полей для конкретного шаблона.&lt;/p&gt;\n&lt;p&gt;Настраиваемые поля можно разделить на две категории: предустановленные и пользовательские.&lt;/p&gt;\n&lt;p&gt;Набор предустановленных полей является фиксированным для каждой поддерживаемой страны. Любое такое поле можно добавить в шаблон, относящийся к соответствующей стране, если его еще нет в шаблоне. Предустановленные поля имеют префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3tj3ghcq\"&gt;RQ_&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Пользовательские поля добавляются либо пользователем, либо через соответствующие &lt;a href=\"api-reference/crm/requisites/user-fields/index.html\"&gt;REST-методы&lt;/a&gt;. Созданное пользовательское поле можно добавить в шаблон. Пользовательские поля могут добавляться в шаблоны любых поддерживаемых стран. Пользовательские поля имеют префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-66ywfez0\"&gt;UF_&lt;/code&gt;. Если пользовательское поле используется в шаблонах разных стран, необходимо убедиться, что оно имеет для них одинаковый смысл и название в интерфейсе.&lt;/p&gt;\n&lt;p&gt;Поле &lt;strong&gt;FIELD_NAME&lt;/strong&gt; фактически является ссылкой на существующее поле, предустановленное либо пользовательское.&lt;/p&gt;\n&lt;h2 id=\"polya,-opisyvayushie-nastraivaemoe-pole-shablona-rekvizitov\"&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/index.html#polya,-opisyvayushie-nastraivaemoe-pole-shablona-rekvizitov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поля, описывающие настраиваемое поле шаблона реквизитов&lt;/span&gt;&lt;/a&gt;Поля, описывающие настраиваемое поле шаблона реквизитов&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uuhk0kvc\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Чтение&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Запись&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Обязательное&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pkqlx7m6\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор поля. Создается автоматически и уникален в рамках шаблона&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Нет&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Нет&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;FIELD_NAME&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rbryqze9\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Название поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;FIELD_TITLE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-17wuac3l\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Альтернативное название поля для реквизита.&lt;/p&gt;\n&lt;p&gt;Альтернативное название отображается в различных формах для заполнения реквизитов. В зависимости от конкретной формы альтернативное название может использоваться или нет&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Нет&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;SORT&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z4eeg6ig\"&gt;integer&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сортировка. Порядок в списке полей шаблона&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Нет&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;IN_SHORT_LIST&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1w0905wu\"&gt;char&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Показывать в кратком списке. Устаревшее поле, сейчас не используется. Оставлено для обратной совместимости. Может принимать значения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nmvj7zoy\"&gt;Y&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m15z8l5r\"&gt;N&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Да&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Нет&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;Используйте метод &lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-fields.html\"&gt;crm.requisite.preset.field.fields&lt;/a&gt;, чтобы получить формальное описание полей.&lt;/p&gt;\n&lt;h2 id=\"obzor-metodov\"&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/index.html#obzor-metodov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-add.html\"&gt;crm.requisite.preset.field.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет настраиваемое поле в шаблон реквизитов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-update.html\"&gt;crm.requisite.preset.field.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет настраиваемое поле в шаблоне реквизитов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-available-to-add.html\"&gt;crm.requisite.preset.field.availabletoadd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля, доступные для добавления в указанный шаблон реквизитов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-get.html\"&gt;crm.requisite.preset.field.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание настраиваемого поля шаблона реквизитов по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-list.html\"&gt;crm.requisite.preset.field.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список всех настраиваемых полей для определенного шаблона реквизитов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-delete.html\"&gt;crm.requisite.preset.field.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет настраиваемое поле из шаблона реквизитов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/requisites/presets/fields/crm-requisite-preset-field-fields.html\"&gt;crm.requisite.preset.field.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает формально описание полей, описывающих настаиваемое поле шаблона реквизитов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Поля, описывающие настраиваемое поле шаблона реквизитов","href":"api-reference/crm/requisites/presets/fields/index.html#polya,-opisyvayushie-nastraivaemoe-pole-shablona-rekvizitov","level":2},{"title":"Обзор методов","href":"api-reference/crm/requisites/presets/fields/index.html#obzor-metodov","level":2}],"title":"Работа с настраиваемыми полями шаблона реквизитов"},"router":{"pathname":"api-reference/crm/requisites/presets/fields/index","depth":6,"base":"../../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
