        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В карточках элементов CRM есть два вида полей типа «список»:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;пользовательские поля  — их можно создавать, изменять значения списка, удалять через методы crm.xx.userfield.*. Например, для создания пользовательского поля типа список в сделках используйте &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-add.html\"&gt;crm.deal.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;системные поля  — предустановленны, их нельзя создать или удалить. В системных списочных полях можно изменять только значения списка. Перечень значений системных полей типа «список» называется справочником в CRM&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/status/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/21600612/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;справочники в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"spisok-spravochnikov\"&gt;&lt;a href=\"api-reference/crm/status/index.html#spisok-spravochnikov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Список справочников&lt;/span&gt;&lt;/a&gt;Список справочников&lt;/h2&gt;\n&lt;p&gt;Чтобы изменить справочник, в методах группы crm.status.* укажите параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-99fp68av\"&gt;ENTITY_ID&lt;/code&gt;. Если значение указано неверно, будет изменен другой справочник.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Стадии.&lt;/strong&gt; Справочник с этапами работы с клиентами, которые отображаются в канбане CRM. У каждого объекта CRM свой код справочника стадий:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/deals/index.html\"&gt;Сделки&lt;/a&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v44eu1r1\"&gt;DEAL_STAGE&lt;/code&gt; для основного направления сделок и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-28wfyy39\"&gt;DEAL_STAGE_xx&lt;/code&gt;  для дополнительного, xx — это ID направления&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/leads/index.html\"&gt;Лиды&lt;/a&gt; —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uw1fi99n\"&gt;STATUS&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;Счета&lt;/a&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2nuwvhjn\"&gt;SMART_INVOICE_STAGE_xx&lt;/code&gt;, xx —  значение ID направления счетов&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/quote/index.html\"&gt;Предложения&lt;/a&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9ry3czsh\"&gt;QUOTE_STATUS&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17572968/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Документы&lt;/a&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1fylmj3e\"&gt;SMART_DOCUMENT_STAGE_xx&lt;/code&gt;, xx — значение ID направления документов&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/index.html\"&gt;Смарт-процессы&lt;/a&gt; —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xvitrdtp\"&gt;DYNAMIC_xx_STAGE_xx&lt;/code&gt;, первый xx — это ID смарт-процесса, второй xx — это ID направления&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы получить ID направления на конкретном Битрикс24, используйте метод &lt;a href=\"api-reference/crm/status/crm-status-entity-types.html\"&gt;crm.status.entity.types&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Источники.&lt;/strong&gt; Справочник со значениями системного поля Источник — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y9ez4jl1\"&gt;SOURCE&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Тип контакта и компании.&lt;/strong&gt; Справочники со значениями системных полей Тип контакта —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y5xi0h6w\"&gt;CONTACT_TYPE&lt;/code&gt;, Тип компании — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rykba251\"&gt;COMPANY_TYPE&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Количество сотрудников.&lt;/strong&gt; Справочник со значениями системного поля Количество сотрудников в карточке компании —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4mn4svza\"&gt;EMPLOYEES&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Сфера деятельности клиентов.&lt;/strong&gt; Справочник со значениями системного поля Сфера деятельности в карточке компании —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z5lt7347\"&gt;INDUSTRY&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Тип сделки.&lt;/strong&gt; Справочник со значениями системного поля Тип сделки в карточке сделки —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5u4tqvyx\"&gt;DEAL_TYPE&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Обращения.&lt;/strong&gt; Справочник со значениями системного поля Обращение в карточке лида и контакта —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2mj6j7fa\"&gt;HONORIFIC&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Статусы обзвона.&lt;/strong&gt; Справочник со значениями Статуса звонка в карточка обзвона —  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k0yizkgd\"&gt;CALL_LIST&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-ispolzovat-znacheniya-spravochnika\"&gt;&lt;a href=\"api-reference/crm/status/index.html#kak-ispolzovat-znacheniya-spravochnika\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как использовать значения справочника&lt;/span&gt;&lt;/a&gt;Как использовать значения справочника&lt;/h2&gt;\n&lt;p&gt;У любого значения списка в справочниках есть:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;название &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9r7vr8qo\"&gt;NAME&lt;/code&gt; — отображается в карточке элемента CRM&lt;/li&gt;\n&lt;li&gt;статус &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bsfzxwnd\"&gt;STATUS_ID&lt;/code&gt; — используется в методах создания и изменения элементов&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Методом &lt;a href=\"api-reference/crm/deals/crm-deal-update.html\"&gt;crm.deal.update&lt;/a&gt; можно изменить значения полей &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r7qeh00d\"&gt;Стадия сделки&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-brw2rjhu\"&gt;STAGE_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mpc4kbos\"&gt;Источник&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0ip9q4ny\"&gt;SOURCE_ID&lt;/code&gt;. Оба поля — это системные списочные поля.&lt;/p&gt;\n&lt;p&gt;Для того чтобы в карточке CRM отображалось название стадии или источника, в методе важно передавать не &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-30ezm9xh\"&gt;NAME&lt;/code&gt; значения, а его  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2dk79slb\"&gt;STATUS_ID&lt;/code&gt;. Для стадии «Новая заявка» это может быть &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nxcoeel2\"&gt;C1:NEW&lt;/code&gt;, а для источника  «звонок» — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hwn1ud1y\"&gt;CALL&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/status/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qiweor18\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-add.html\"&gt;crm.status.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый элемент в указанном справочнике&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-delete.html\"&gt;crm.status.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет элемент справочника&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-entity-items.html\"&gt;crm.status.entity.items&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элементы справочника по его символьному идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-entity-types.html\"&gt;crm.status.entity.types&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание типов справочников&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-fields.html\"&gt;crm.status.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей справочника&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-get.html\"&gt;crm.status.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элемент справочника по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-list.html\"&gt;crm.status.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список элементов справочника по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/status/crm-status-update.html\"&gt;crm.status.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующий элемент справочника&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Список справочников","href":"api-reference/crm/status/index.html#spisok-spravochnikov","level":2},{"title":"Как использовать значения справочника","href":"api-reference/crm/status/index.html#kak-ispolzovat-znacheniya-spravochnika","level":2},{"title":"Обзор методов и событий","href":"api-reference/crm/status/index.html#all-methods","level":2}],"title":"Справочники в CRM: обзор методов"},"router":{"pathname":"api-reference/crm/status/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
