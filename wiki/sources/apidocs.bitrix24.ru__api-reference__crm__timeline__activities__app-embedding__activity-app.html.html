            {"data":{"leading":false,"html":"&lt;p&gt;Приложения могут создавать дела с провайдером специального типа. У такого дела будет соответствующая &lt;i class=\"yfm yfm-term_title\" term-key=\":icon\" role=\"button\" aria-describedby=\":icon_element\" tabindex=\"0\" id=\"iqcta21j\"&gt;иконка&lt;/i&gt; в таймлайн. По клиику на дело откроется приложение в слайдере с опциями в &lt;a href=\"api-reference/widgets/crm/detail-activity.html#placement_options\"&gt;PLACEMENT_OPTIONS&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Изменять/удалять дела с провайдером специального типа можно только в контексте приложения, которым дело создано. При обновлении такого дела методом &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-update.html\"&gt;crm.activity.update&lt;/a&gt; через вебхук будет ошибка: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z3vhtzxy\"&gt;Access denied! Application context required&lt;/code&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/app-embedding/activity-app.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2zwscuyn\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;PROVIDER_ID&lt;/strong&gt;*&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4insixt2\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор провайдера. Для специального типа значение должно быть равно &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iosjdn5a\"&gt;REST_APP&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;PROVIDER_TYPE_ID&lt;/strong&gt;*&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-knjeal3m\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор типа дела. В случае использования провайдера &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mzaymwfo\"&gt;REST_APP&lt;/code&gt; разработчик может указывать произвольные идентификаторы типа в зависимости от своих задач&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"primer-prilozheniya\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/app-embedding/activity-app.html#primer-prilozheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример приложения&lt;/span&gt;&lt;/a&gt;Пример приложения&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-aqg7l1s6\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;PHP&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"1po9iyed\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-meta\"&gt;&amp;lt;?php&lt;/span&gt;\n&lt;span class=\"hljs-title function_ invoke__\"&gt;header&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Content-Type: text/html; charset=UTF-8'&lt;/span&gt;);\n&lt;span class=\"hljs-meta\"&gt;?&amp;gt;&lt;/span&gt;\n&amp;lt;!DOCTYPE html&amp;gt;\n&amp;lt;html&amp;gt;\n&amp;lt;head&amp;gt;\n    &amp;lt;meta charset=&lt;span class=\"hljs-string\"&gt;\"UTF-8\"&lt;/span&gt;&amp;gt;\n    &amp;lt;title&amp;gt;&amp;lt;/title&amp;gt;\n    &amp;lt;style type=&lt;span class=\"hljs-string\"&gt;\"text/css\"&lt;/span&gt;&amp;gt;\n\n    &amp;lt;/style&amp;gt;\n&amp;lt;/head&amp;gt;\n&amp;lt;body style=&lt;span class=\"hljs-string\"&gt;\"display: none\"&lt;/span&gt;&amp;gt;\n&amp;lt;script src=&lt;span class=\"hljs-string\"&gt;\"//api.bitrix24.tech/api/v1/\"&lt;/span&gt;&amp;gt;&amp;lt;/script&amp;gt;\n\n&lt;span class=\"hljs-meta\"&gt;&amp;lt;?&lt;/span&gt;&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (&lt;span class=\"hljs-keyword\"&gt;isset&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_POST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'PLACEMENT'&lt;/span&gt;]) &amp;amp;&amp;amp; !&lt;span class=\"hljs-keyword\"&gt;empty&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_POST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'PLACEMENT_OPTIONS'&lt;/span&gt;])):\n    &lt;span class=\"hljs-variable\"&gt;$opt&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;json_decode&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$_POST&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'PLACEMENT_OPTIONS'&lt;/span&gt;], &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;);\n&lt;span class=\"hljs-meta\"&gt;?&amp;gt;&lt;/span&gt;\n&amp;lt;p&amp;gt;Activity ID: &lt;span class=\"hljs-meta\"&gt;&amp;lt;?=&lt;/span&gt; (&lt;span class=\"hljs-keyword\"&gt;int&lt;/span&gt;)&lt;span class=\"hljs-variable\"&gt;$opt&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'activity_id'&lt;/span&gt;]&lt;span class=\"hljs-meta\"&gt;?&amp;gt;&lt;/span&gt;&amp;lt;/p&amp;gt;\n&amp;lt;button onclick=&lt;span class=\"hljs-string\"&gt;\"updateActivity(&amp;lt;?= (int)&lt;span class=\"hljs-subst\"&gt;$opt&lt;/span&gt;['activity_id']?&amp;gt;);\"&lt;/span&gt;&amp;gt;Update &lt;span class=\"hljs-title function_ invoke__\"&gt;activity&lt;/span&gt; (set &lt;span class=\"hljs-keyword\"&gt;new&lt;/span&gt; description + completed)&amp;lt;/button&amp;gt;\n&amp;lt;p&amp;gt;&amp;lt;button onclick=&lt;span class=\"hljs-string\"&gt;\"deleteActivity(&amp;lt;?= (int)&lt;span class=\"hljs-subst\"&gt;$opt&lt;/span&gt;['activity_id']?&amp;gt;);\"&lt;/span&gt;&amp;gt;Delete activity&amp;lt;/button&amp;gt;\n&lt;span class=\"hljs-meta\"&gt;&amp;lt;?&lt;/span&gt;&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;:&lt;span class=\"hljs-meta\"&gt;?&amp;gt;&lt;/span&gt;\n&amp;lt;button onclick=&lt;span class=\"hljs-string\"&gt;\"selectCRMEntity();\"&lt;/span&gt;&amp;gt;Select LEAD&amp;lt;/button&amp;gt;\n&amp;lt;span id=&lt;span class=\"hljs-string\"&gt;\"selected-entity\"&lt;/span&gt;&amp;gt;&amp;lt;/span&amp;gt;\n&amp;lt;p&amp;gt;\n&amp;lt;button onclick=&lt;span class=\"hljs-string\"&gt;\"addActivity();\"&lt;/span&gt;&amp;gt;Add activity&amp;lt;/button&amp;gt;\n&lt;span class=\"hljs-meta\"&gt;&amp;lt;?&lt;/span&gt;&lt;span class=\"hljs-keyword\"&gt;endif&lt;/span&gt;;&lt;span class=\"hljs-meta\"&gt;?&amp;gt;&lt;/span&gt;\n&amp;lt;script type=&lt;span class=\"hljs-string\"&gt;\"text/javascript\"&lt;/span&gt;&amp;gt;\n    BX24.&lt;span class=\"hljs-title function_ invoke__\"&gt;init&lt;/span&gt;(function()\n    {\n        document.body.style.display = &lt;span class=\"hljs-string\"&gt;''&lt;/span&gt;;\n    });\n\n    &lt;span class=\"hljs-keyword\"&gt;var&lt;/span&gt; selectedEntityId = &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;;\n\n    &lt;span class=\"hljs-function\"&gt;&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title\"&gt;addActivity&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;)\n    &lt;/span&gt;{\n\n        &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (!selectedEntityId)\n        {\n            &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Lead not selected'&lt;/span&gt;);\n            &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt;;\n        }\n        BX24.&lt;span class=\"hljs-title function_ invoke__\"&gt;callMethod&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'crm.activity.add'&lt;/span&gt;,\n            {\n                &lt;span class=\"hljs-attr\"&gt;fields&lt;/span&gt;:\n                    {\n                        &lt;span class=\"hljs-string\"&gt;\"OWNER_TYPE_ID\"&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n                        &lt;span class=\"hljs-string\"&gt;\"OWNER_ID\"&lt;/span&gt;: selectedEntityId,\n                        &lt;span class=\"hljs-string\"&gt;\"PROVIDER_ID\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'REST_APP'&lt;/span&gt;,\n                        &lt;span class=\"hljs-string\"&gt;\"PROVIDER_TYPE_ID\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'LINK'&lt;/span&gt;,\n                        &lt;span class=\"hljs-string\"&gt;\"SUBJECT\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Новое дело\"&lt;/span&gt;,\n                        &lt;span class=\"hljs-string\"&gt;\"COMPLETED\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"N\"&lt;/span&gt;,\n                        &lt;span class=\"hljs-string\"&gt;\"RESPONSIBLE_ID\"&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n                        &lt;span class=\"hljs-string\"&gt;\"DESCRIPTION\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Описание нового дела\"&lt;/span&gt;\n                    }\n            },\n            function(result)\n            {\n                &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(result.&lt;span class=\"hljs-title function_ invoke__\"&gt;error&lt;/span&gt;())\n                    &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Error: \"&lt;/span&gt; + result.&lt;span class=\"hljs-title function_ invoke__\"&gt;error&lt;/span&gt;());\n                &lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n                {\n                    &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Success: \"&lt;/span&gt; + result.&lt;span class=\"hljs-title function_ invoke__\"&gt;data&lt;/span&gt;());\n                }\n            }\n        );\n    }\n    &lt;span class=\"hljs-function\"&gt;&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title\"&gt;updateActivity&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;id&lt;/span&gt;)\n    &lt;/span&gt;{\n        BX24.&lt;span class=\"hljs-title function_ invoke__\"&gt;callMethod&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'crm.activity.update'&lt;/span&gt;,\n            {\n                &lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: id,\n                &lt;span class=\"hljs-attr\"&gt;fields&lt;/span&gt;:\n                    {\n                        &lt;span class=\"hljs-attr\"&gt;COMPLETED&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Y'&lt;/span&gt;,\n                        &lt;span class=\"hljs-attr\"&gt;SUBJECT&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Дело выполнено!\"&lt;/span&gt;,\n                        &lt;span class=\"hljs-attr\"&gt;DESCRIPTION&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Описание нового дела (выполнено)\"&lt;/span&gt;\n                    }\n            },\n            function(result)\n            {\n                &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(result.&lt;span class=\"hljs-title function_ invoke__\"&gt;error&lt;/span&gt;())\n                    &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Error: \"&lt;/span&gt; + result.&lt;span class=\"hljs-title function_ invoke__\"&gt;error&lt;/span&gt;());\n                &lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n                {\n                    &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Success: \"&lt;/span&gt; + result.&lt;span class=\"hljs-title function_ invoke__\"&gt;data&lt;/span&gt;());\n                }\n            }\n        );\n    }\n\n    &lt;span class=\"hljs-function\"&gt;&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title\"&gt;deleteActivity&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;id&lt;/span&gt;)\n    &lt;/span&gt;{\n        BX24.&lt;span class=\"hljs-title function_ invoke__\"&gt;callMethod&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'crm.activity.delete'&lt;/span&gt;,\n            {\n                &lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: id\n            },\n            function(result)\n            {\n                &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(result.&lt;span class=\"hljs-title function_ invoke__\"&gt;error&lt;/span&gt;())\n                    &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Error: \"&lt;/span&gt; + result.&lt;span class=\"hljs-title function_ invoke__\"&gt;error&lt;/span&gt;());\n                &lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n                {\n                    &lt;span class=\"hljs-title function_ invoke__\"&gt;alert&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"Success: \"&lt;/span&gt; + result.&lt;span class=\"hljs-title function_ invoke__\"&gt;data&lt;/span&gt;());\n                }\n            }\n        );\n    }\n\n    &lt;span class=\"hljs-function\"&gt;&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt; &lt;span class=\"hljs-title\"&gt;selectCRMEntity&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;)\n    &lt;/span&gt;{\n        document.&lt;span class=\"hljs-title function_ invoke__\"&gt;getElementById&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'selected-entity'&lt;/span&gt;).textContent = &lt;span class=\"hljs-string\"&gt;''&lt;/span&gt;;\n        BX24.&lt;span class=\"hljs-title function_ invoke__\"&gt;selectCRM&lt;/span&gt;({\n            &lt;span class=\"hljs-attr\"&gt;entityType&lt;/span&gt;: [&lt;span class=\"hljs-string\"&gt;'lead'&lt;/span&gt;]\n        }, function(selected)\n        {\n            &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (selected[&lt;span class=\"hljs-string\"&gt;'lead'&lt;/span&gt;] &amp;amp;&amp;amp; selected[&lt;span class=\"hljs-string\"&gt;'lead'&lt;/span&gt;][&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;])\n            {\n                document.&lt;span class=\"hljs-title function_ invoke__\"&gt;getElementById&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'selected-entity'&lt;/span&gt;).textContent = selected[&lt;span class=\"hljs-string\"&gt;'lead'&lt;/span&gt;][&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'title'&lt;/span&gt;];\n                &lt;span class=\"hljs-keyword\"&gt;var&lt;/span&gt;    id = selected[&lt;span class=\"hljs-string\"&gt;'lead'&lt;/span&gt;][&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'id'&lt;/span&gt;];\n\n                selectedEntityId = id.&lt;span class=\"hljs-title function_ invoke__\"&gt;substring&lt;/span&gt;(&lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;);\n\n                console.&lt;span class=\"hljs-title function_ invoke__\"&gt;log&lt;/span&gt;(selectedEntityId);\n            }\n        })\n    }\n&amp;lt;/script&amp;gt;\n&amp;lt;/body&amp;gt;\n&amp;lt;/html&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"72\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-72\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-72\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-72.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;dfn class=\"yfm yfm-term_dfn\" id=\":icon_element\" role=\"dialog\"&gt;&lt;p&gt;&lt;img src=\"api-reference/crm/timeline/activities/app-embedding/_images/activity_application.png\" alt=\"иконка\" /&gt;&lt;/p&gt;\n&lt;/dfn&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Параметры","href":"api-reference/crm/timeline/activities/app-embedding/activity-app.html#parametry","level":2},{"title":"Пример приложения","href":"api-reference/crm/timeline/activities/app-embedding/activity-app.html#primer-prilozheniya","level":2}],"title":"Как создать дело из приложения"},"router":{"pathname":
