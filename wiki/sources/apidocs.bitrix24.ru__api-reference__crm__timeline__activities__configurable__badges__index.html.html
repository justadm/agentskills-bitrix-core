        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w617y96r\"&gt;Бейдж&lt;/code&gt; — это значок на карточке элемента в канбане. Бейдж помогает выделить элементы, которые требуют внимания. Если к элементу добавлено несколько бейджей, будет показан последний добавленный.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/crm/timeline/activities/configurable/badges/_images/badge.png\" alt=\"Последний бейдж\" /&gt;&lt;/p&gt;\n&lt;p&gt;Бейджи можно добавить для &lt;a href=\"api-reference/crm/timeline/activities/configurable/index.html\"&gt;конфигурируемого дела&lt;/a&gt; в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-18quvp8g\"&gt;badgeCode&lt;/code&gt;. Бейдж будет показываться на канбане объекта, к которому привязано дело, до тех пор, пока дело не будет закрыто.&lt;/p&gt;\n&lt;h2 id=\"polya-zapisi-o-bejdzhe\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/index.html#polya-zapisi-o-bejdzhe\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поля записи о бейдже&lt;/span&gt;&lt;/a&gt;Поля записи о бейдже&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Поле&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;code&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e1gk5o3y\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Код бейджа, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wdpy9zx0\"&gt;missedCall&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;title&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0v3rywx2\"&gt;string&lt;/code&gt;|&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jnnf9z8x\"&gt;array&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Заголовок бейджа. Может быть строкой или массивом строк для разных языков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;value&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ks4odwok\"&gt;string&lt;/code&gt;|&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bpxeswuq\"&gt;array&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Заголовок бейджа. Может быть строкой или массивом строк для разных языков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;type&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gd1vrxam\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/index.html#tip-bejdzha\"&gt;Тип бейджа&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;Если &lt;strong&gt;title&lt;/strong&gt; или &lt;strong&gt;value&lt;/strong&gt; содержит массив, то ключами в них должны быть коды языков, а значениями текст на этих языках, например:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"ru\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Внимание\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"en\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Alarm\"&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"84\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-84\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-84\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-84.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Если перевод для текущего языка не найден, то будет использован английский. Если английский перевод не найден, то будет использован первый элемент массива.&lt;/p&gt;\n&lt;h2 id=\"tip-bejdzha\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/index.html#tip-bejdzha\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Тип бейджа&lt;/span&gt;&lt;/a&gt;Тип бейджа&lt;/h2&gt;\n&lt;p&gt;В Битрикс24 есть несколько стандартных бейджей для разных сценариев. Тип бейджа может принимать следующие значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;success&lt;/strong&gt; — Зеленый фон&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;failure&lt;/strong&gt; — Красный фон&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;warning&lt;/strong&gt; — Желтый фон&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;primary&lt;/strong&gt; — Голубой фон&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;secondary&lt;/strong&gt; — Серый фон&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\"api-reference/crm/timeline/activities/configurable/badges/_images/badge_colors.png\" alt=\"Варианты бейджей\" /&gt;&lt;/p&gt;\n&lt;h1&gt;Обзор методов&lt;/h1&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pneyhv56\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/crm-activity-badge-add.html\"&gt;crm.activity.badge.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый бейдж&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/crm-activity-badge-get.html\"&gt;crm.activity.badge.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о бейдже&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/crm-activity-badge-list.html\"&gt;crm.activity.badge.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список бейджей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/crm-activity-badge-delete.html\"&gt;crm.activity.badge.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет бейдж по коду&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"dopolnitelno\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/index.html#dopolnitelno\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Дополнительно&lt;/span&gt;&lt;/a&gt;Дополнительно&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/crm-activity-configurable-add.html\"&gt;Добавить конфигурируемое дело crm.activity.configurable.add&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/crm-activity-configurable-update.html\"&gt;Обновить конфигурируемое дело crm.activity.configurable.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/crm-activity-configurable-get.html\"&gt;Получить конфигурируемое дело по id crm.activity.configurable.get&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Поля записи о бейдже","href":"api-reference/crm/timeline/activities/configurable/badges/index.html#polya-zapisi-o-bejdzhe","level":2},{"title":"Тип бейджа","href":"api-reference/crm/timeline/activities/configurable/badges/index.html#tip-bejdzha","level":2},{"title":"Дополнительно","href":"api-reference/crm/timeline/activities/configurable/badges/index.html#dopolnitelno","level":2}],"title":"О бейджах конфигурируемых дел"},"router":{"pathname":"api-reference/crm/timeline/activities/configurable/badges/index","depth":7,"base":"../../../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
