            {"data":{"leading":false,"html":"&lt;p&gt;Доступные типы полей для конфигурации &lt;a href=\"api-reference/crm/timeline/activities/types/index.html\"&gt;своих типов дел&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"textwithtranslation\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/field-types.html#textwithtranslation\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;textWithTranslation&lt;/span&gt;&lt;/a&gt;textWithTranslation&lt;/h2&gt;\n&lt;p&gt;Текст с поддержкой переводов.&lt;/p&gt;\n&lt;p&gt;Поля с типом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-alkgfmn9\"&gt;textWithTranslation&lt;/code&gt; поддерживают мультиязычность. В простом варианте достаточно передать в них строку. Эта строка и будет использована как значение.&lt;/p&gt;\n&lt;p&gt;Если требуется поддержка разных языков интерфейса, в качестве значения поля можно передать не пустой массив, где ключами будет код языка, а значением текст на этом языке, например:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"ru\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Сохранить\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"en\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Save\"&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"15\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-15\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-15\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-15.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Если перевод для текущего языка не найден, будет использован английский. Если перевод на английском не найден, будет использован первый элемент массива.&lt;/p&gt;\n&lt;h2 id=\"scope\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/field-types.html#scope\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Scope&lt;/span&gt;&lt;/a&gt;Scope&lt;/h2&gt;\n&lt;p&gt;Область видимости. Где показывать блок.&lt;/p&gt;\n&lt;p&gt;Некоторые блоки записи таймлайна имеют параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-malw0dwj\"&gt;scope&lt;/code&gt;. Если он заполнен, то видимость соответствующего блока будет ограничена только конкретным типом устройства.&lt;/p&gt;\n&lt;p&gt;Возможные значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Не заполнено&lt;/strong&gt; - блок будет показан везде&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;web&lt;/strong&gt; - блок будет показан только в браузере&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;mobile&lt;/strong&gt; - блок будет показан только в мобильном приложении&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;",
