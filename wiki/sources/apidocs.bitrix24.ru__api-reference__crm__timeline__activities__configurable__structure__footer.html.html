            {"data":{"leading":false,"html":"&lt;p&gt;Нижняя часть &lt;a href=\"api-reference/crm/timeline/activities/configurable/index.html\"&gt;записи таймлайна&lt;/a&gt; с блоком действий &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mqcudjth\"&gt;FooterDto&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"parametry-obuekta\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/footer.html#parametry-obuekta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры объекта &lt;/span&gt;&lt;/a&gt;Параметры объекта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3oc2h7v8\"&gt;FooterDto&lt;/code&gt;&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Поле&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;buttons&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/footer.html#footerbuttondto\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-00uil32f\"&gt;FooterButtonDto&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив объектов, описывающих кнопки действий. Допускается не более двух кнопок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;menu&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/footer.html#footermenudto\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-96wlyrot\"&gt;FooterMenuDto&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Нижнее меню&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"footerbuttondto\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/footer.html#footerbuttondto\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;FooterButtonDto&lt;/span&gt;&lt;/a&gt;FooterButtonDto&lt;/h2&gt;\n&lt;p&gt;Кнопка в нижней части записи таймлайна.&lt;/p&gt;\n&lt;h3 id=\"parametry-obuekta1\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/footer.html#parametry-obuekta1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры объекта &lt;/span&gt;&lt;/a&gt;Параметры объекта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4vcqeb4p\"&gt;FooterButtonDto&lt;/code&gt;&lt;/h3&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Поле&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;title&lt;sup&gt;*&lt;/sup&gt;&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/field-types.html#textwithtranslation\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q9s7g4zv\"&gt;textWithTranslation&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текст кнопки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;type&lt;sup&gt;*&lt;/sup&gt;&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0d8i9ojg\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Тип кнопки. Определяет ее внешний ви Параметры объекта &lt;/span&gt;&lt;/a&gt;Параметры объекта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mlje0zpy\"&gt;FooterMenuDto&lt;/code&gt;&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Поле&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;showPinItem&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r93xqrkc\"&gt;boolean&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Показ пункта меню \"Закрепить\". Пункт меню не будет показан, если его добавить в невыполненное дело. По-умолчанию &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-csnzm5tf\"&gt;true&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;showPostponeItem&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c9vfghpw\"&gt;boolean&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Показ пункта меню \"Отложить\". Пункт меню не будет показан, если его добавить во входящее дело, в дело без дедлайна, либо в выполненное дело. По-умолчанию &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-stv7fh9i\"&gt;true&lt;/code&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;showDeleteItem&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/crm/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cvf9juo0\"&gt;boolean&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\
