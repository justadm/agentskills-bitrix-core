            {"data":{"leading":false,"html":"&lt;p&gt;В CRM дела используются для любых задач, связанных с клиентами: звонки, встречи, согласование документов.&lt;/p&gt;\n&lt;p&gt;Дела делятся на входящие и запланированные:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Входящие — дела, поступившие от клиента, например письмо, звонок или чат. Для таких дел важно верно указать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-28rk5wmp\"&gt;DIRECTION&lt;/code&gt; =  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rspffpx5\"&gt;1&lt;/code&gt;, чтобы сработал счетчик входящих дел CRM&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Запланированные — дела, которые создают сотрудники, например задачи или универсальные дела. В них можно указать срок выполнения, добавить связи с элементами CRM, с календарем, пригласить коллег, прикрепить файлы&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/timeline/activities/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/21623188/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;дела в CRM&lt;/a&gt;, &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-direction.html\"&gt;Направление активности&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyazi-del-s-drugimi-elementami-crm\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#svyazi-del-s-drugimi-elementami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связи дел с другими элементами CRM&lt;/span&gt;&lt;/a&gt;Связи дел с другими элементами CRM&lt;/h2&gt;\n&lt;p&gt;Дела, связанные с элементами CRM, хранятся в таймлайне карточки элемента. Если у дела есть связь с несколькими элементами — например, письмо может быть привязано и к сделке и к контакту — оно будет храниться в таймлайнах всех связанных элементов.&lt;/p&gt;\n&lt;p&gt;Связи между делами и элементами CRM можно добавлять и удалять методами группы &lt;a href=\"api-reference/crm/timeline/activities/binding/index.html\"&gt;crm.activity.binding.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"sistemnye-dela\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#sistemnye-dela\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Системные дела&lt;/span&gt;&lt;/a&gt;Системные дела&lt;/h2&gt;\n&lt;p&gt;Системные дела CRM создает автоматически:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;дело звонка создает подключенная в Битрикс телефония. Для завершения звонка используйте метод &lt;a href=\"api-reference/telephony/telephony-external-call-finish.html\"&gt;telephony.externalcall.finish&lt;/a&gt;. Метод завершает звонок, создает дело в карточке элемента, и возвращает ID созданного дела в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w65k5654\"&gt;CRM_ACTIVITY_ID&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;дело письма создает почта. Когда на подключенный в Битрикс24 адрес приходит письмо от клиента, CRM проверяет, существует ли в базе клиент с e-mail из письма. По результатам проверки будет создано дело в карточке найденного элемента или новый клиент, в карточке которого появится дело&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы создать, изменить или удалить системное дело используйте группу методов &lt;a href=\"api-reference/crm/timeline/activities/activity-base/index.html\"&gt;crm.activity.*&lt;/a&gt;. При создании системного дела указывайте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0588gcb1\"&gt;TYPE_ID&lt;/code&gt;, например для дела письма &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c3a9f1je\"&gt;TYPE_ID&lt;/code&gt; = &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ygfj3m19\"&gt;2&lt;/code&gt; . Для получения значений других типов дел используйте метод &lt;a href=\"api-reference/crm/auxiliary/enum/outdated/crm-enum-activity-type.html\"&gt;crm.enum.activitytype&lt;/a&gt;.&lt;/p&gt;\n&lt;h3 id=\"polzovatelskie-tipy-del\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#polzovatelskie-tipy-del\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пользовательские типы дел&lt;/span&gt;&lt;/a&gt;Пользовательские типы дел&lt;/h3&gt;\n&lt;p&gt;Приложения могут регистрировать пользовательские типы дел: загрузить собственную иконку и указать название типа. Например, можно создать свой тип дел с иконкой и названием вашего приложения.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Зарегистрировать тип дела — используйте методы группы &lt;a href=\"api-reference/crm/timeline/activities/types/index.html\"&gt;crm.activity.type.*&lt;/a&gt;. При создании типа необходимо задать его кодовое обозначение в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ehj1w1uy\"&gt;TYPE_ID&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Создать дело с типом приложения — используйте группу методов системных дел &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-add.html\"&gt;crm.activity.add&lt;/a&gt;. При создании дела укажите кодовое обозначение пользовательского типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-17q0txy9\"&gt;TYPE_ID&lt;/code&gt;, зарегистрированного для типа дел, в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pexrd0rz\"&gt;PROVIDER_TYPE_ID&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Методы &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-delete.html\"&gt;crm.activity.delete&lt;/a&gt; (удаляет дело) и &lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-list.html\"&gt;crm.activity.list&lt;/a&gt; (получает список дел) общие для всех видов дел CRM.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"universalnye-dela\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#universalnye-dela\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Универсальные дела&lt;/span&gt;&lt;/a&gt;Универсальные дела&lt;/h2&gt;\n&lt;p&gt;Универсальные дела — это тип дел с расширенными настройками. В карточке универсального дела можно синхронизировать дело с календарем, выбрать место встречи с клиентом, добавить коллег, выбрать клиента из элемента CRM, разделить дела по цветам, выбрать переговорную. Расширенные настройки доступны сотруднику на стороне Битрикс24.&lt;/p&gt;\n&lt;p&gt;Для создания универсального используйте метод &lt;a href=\"api-reference/crm/timeline/activities/todo/crm-activity-todo-add.html\"&gt;crm.activity.todo.add&lt;/a&gt;. Для изменения крайнего срока дела — метод &lt;a href=\"api-reference/crm/timeline/activities/todo/crm-activity-todo-update-deadline.html\"&gt;crm.activity.todo.updateDeadline&lt;/a&gt;, для изменения описания дела — &lt;a href=\"api-reference/crm/timeline/activities/todo/crm-activity-todo-update-description.html\"&gt;crm.activity.todo.updateDescription&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/21064046/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Универсальное дело в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"konfiguriruemye-dela\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#konfiguriruemye-dela\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Конфигурируемые дела&lt;/span&gt;&lt;/a&gt;Конфигурируемые дела&lt;/h2&gt;\n&lt;p&gt;Конфигурируемые дела — это тип дел, создать который можно только из приложения.  Для этого типа можно настроить внешний вид карточки дела и ее функционал:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/layout.html\"&gt;Структура конфигурируемого дела&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/badges/index.html\"&gt;Бейджи кофигурируемого дела&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы создать или изменить конфигурируемое дело, используйте группу методов &lt;a href=\"api-reference/crm/timeline/activities/configurable/crm-activity-configurable-add.html\"&gt;crm.activity.configurable.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В дела можно встраивать приложения. Для встроек используют специальные места, в делах доступно одно — &lt;a href=\"api-reference/widgets/crm/activity-timeline-menu.html\"&gt;Пункт контекстного меню дела в карточке элемента&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-259z3jaw\"&gt;CRM_XXX_ACTIVITY_TIMELINE_MENU&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Благодаря встройке можно будет использовать приложение, не покидая карточку элемента. Приложение будет открываться на той странице, которую вы укажете при регистрации встройки.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/app-embedding/activity-app.html\"&gt;Создать дела из приложений&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"dopolnitelnye-vozmozhnosti\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#dopolnitelnye-vozmozhnosti\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Дополнительные возможности&lt;/span&gt;&lt;/a&gt;Дополнительные возможности&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Текстовые заметки&lt;/strong&gt; можно добавлять к делам и удалять их. Используйте группу методов &lt;a href=\"api-reference/crm/timeline/note/index.html\"&gt;crm.timeline.note.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Контентные блоки&lt;/strong&gt; можно добавлять к делам и удалять их. Используйте группу методов &lt;a href=\"api-reference/crm/timeline/activities/layout-blocks/index.html\"&gt;crm.activity.layout.blocks.*&lt;/a&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/body.html#contentblockdto\"&gt;Доступные контентные блоки&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-inhz766r\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"obshie-metody-i-sobytiya\"&gt;&lt;a href=\"api-reference/crm/timeline/activities/index.html#obshie-metody-i-sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Общие методы и события&lt;/span&gt;&lt;/a&gt;Общие методы и события&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-l97jcxqc\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"6gmijwh5\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-add.html\"&gt;crm.activity.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новое дело&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-update.html\"&gt;crm.activity.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет дело&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-get.html\"&gt;crm.activity.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает дело по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-list.html\"&gt;crm.activity.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список дел всех типов по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-delete.html\"&gt;crm.activity.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет любой тип дел&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-fields.html\"&gt;crm.activity.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей дел&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/activity-base/crm-activity-communication-fields.html\"&gt;crm.activity.communication.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей коммуникации&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"nzuiq1wl\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/events/on-crm-activity-add.html\"&gt;onCrmActivityAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании дела&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/activities/events/on-crm-activity-update.html\"&gt;onCrmActivityUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновлении дела&lt;/p&gt;\n&lt;/td&gt
