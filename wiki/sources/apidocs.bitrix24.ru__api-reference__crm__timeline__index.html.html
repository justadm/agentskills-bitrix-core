            {"data":{"leading":false,"html":"&lt;p&gt;Таймлайн — это основное рабочее пространство в карточке элемента CRM. В нем фиксируется:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;системная информация о работе с элементом: смена стадии,  оплата, создание элементов на основании текущего&lt;/li&gt;\n&lt;li&gt;пользовательская информация: дела CRM (задачи, письма, звонки) и записи таймлайна (комментарии, сгенерированные по шаблону документы, лог-записи приложений)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/timeline/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/23960160/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;таймлайн в Битрикс24&lt;/a&gt;, &lt;a href=\"https://helpdesk.bitrix24.ru/open/21064046/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;универсальное дело в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"dela\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#dela\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Дела&lt;/span&gt;&lt;/a&gt;Дела&lt;/h2&gt;\n&lt;p&gt;Дела в CRM делятся на входящие и запланированные:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Входящие — дела, поступившие от клиента, например письмо или звонок. Для таких дел важно верно указать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a554ul6c\"&gt;DIRECTION&lt;/code&gt; = &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tnzyqom9\"&gt;1&lt;/code&gt;, чтобы сработал счетчик входящих дел CRM&lt;/li&gt;\n&lt;li&gt;Запланированные — дела, которые создают сотрудники, например задачи или универсальные дела&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Подробнее о делах и методах управления ими — в статье &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;Дела в CRM: обзор методов&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"tajmlajn\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#tajmlajn\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Таймлайн&lt;/span&gt;&lt;/a&gt;Таймлайн&lt;/h2&gt;\n&lt;p&gt;Записи таймлайна делятся на два типа:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Комментарии. Добавлять, удалять, изменять, получать комментарии можно через группу методов &lt;a href=\"api-reference/crm/timeline/comments/index.html\"&gt;crm.timeline.comment.*&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Лог-записи. Добавлять, удалять, изменять, получать лог-записи можно через группу методов &lt;a href=\"api-reference/crm/timeline/logmessage/index.html\"&gt;crm.timeline.logmessage.*&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Управлять связями записей таймлайна с элементами CRM можно методами группы &lt;a href=\"api-reference/crm/timeline/bindings/index.html\"&gt;crm.timeline.bindings.*.&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В дела и записи таймлайна можно встроить приложение. Благодаря встройке можно будет использовать приложение и не покидать карточку CRM. Для встраивания используют специальные места, в таймлайне их два:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/detail-activity.html\"&gt;Кнопка над таймлайном карточки элемента&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oncewd2y\"&gt;CRM_XXX_DETAIL_ACTIVITY&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q31xe7w9\"&gt;CRM_DYNAMIC_XXX_DETAIL_ACTIVITY&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/activity-timeline-menu.html\"&gt;Пункт контекстного меню дела в карточке элемента&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nn3aev7u\"&gt;CRM_XXX_ACTIVITY_TIMELINE_MENU&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/app-embedding/activity-app.html\"&gt;Создать дела из приложений&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"dopolnitelnye-vozmozhnosti\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#dopolnitelnye-vozmozhnosti\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Дополнительные возможности&lt;/span&gt;&lt;/a&gt;Дополнительные возможности&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Текстовые заметки&lt;/strong&gt; можно добавлять к делам и комментариям таймлайна и  удалять их. Используйте группу методов &lt;a href=\"api-reference/crm/timeline/note/index.html\"&gt;crm.timeline.note.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Контентные блоки&lt;/strong&gt; можно добавлять к комментариям таймлайна и удалять их. Используйте группу методов &lt;a href=\"api-reference/crm/timeline/layout-blocks/index.html\"&gt;crm.timeline.layout.blocks.*&lt;/a&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/configurable/structure/body.html#contentblockdto\"&gt;Доступные контентные блоки&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vqaj3xxe\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"kommentarii-tajmlajna\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#kommentarii-tajmlajna\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Комментарии таймлайна&lt;/span&gt;&lt;/a&gt;Комментарии таймлайна&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-uetrg727\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"ahvgwpdn\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/crm-timeline-comment-add.html\"&gt;crm.timeline.comment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый комментарий в таймлайн&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/crm-timeline-comment-update.html\"&gt;crm.timeline.comment.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет комментарий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/crm-timeline-comment-get.html\"&gt;crm.timeline.comment.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о комментарии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/crm-timeline-comment-list.html\"&gt;crm.timeline.comment.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список всех комментариев для элемента CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/crm-timeline-comment-delete.html\"&gt;crm.timeline.comment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет комментарий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/crm-timeline-comment-fields.html\"&gt;crm.timeline.comment.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список полей комментария таймлайна&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"k7gpkt1k\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/events/on-Crm-Timeline-Comment-Add.html\"&gt;onCrmTimelineCommentAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При созданиии нового комментария в таймлайн&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/events/on-Crm-Timeline-Comment-Update.html\"&gt;onCrmTimelineCommentUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновление комментария в таймлайн&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/comments/events/on-Crm-Timeline-Comment-Delete.html\"&gt;onCrmTimelineCommentDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении комментария в таймлайн&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"zametki-k-zapisi-tajmlajna\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#zametki-k-zapisi-tajmlajna\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Заметки к записи таймлайна&lt;/span&gt;&lt;/a&gt;Заметки к записи таймлайна&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/note/crm-timeline-note-get.html\"&gt;crm.timeline.note.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о заметке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/note/crm-timeline-note-save.html\"&gt;crm.timeline.note.save&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сохраняет заметку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/note/crm-timeline-note-delete.html\"&gt;crm.timeline.note.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет заметку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"upravlenie-svyazyami-zapisi-tajmlajna\"&gt;&lt;a href=\"api-reference/crm/timeline/index.html#upravlenie-svyazyami-zapisi-tajmlajna\" class=\"yfm-anchor\" aria-hidden=\"true\"
