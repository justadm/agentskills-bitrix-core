            {"data":{"leading":false,"html":"&lt;p&gt;Методы для работы с дополнительным контентными блоками в таймлайне:&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/crm-timeline-layout-blocks-set.html\"&gt;crm.timeline.layout.blocks.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Устанавливает набор дополнительных контентных блоков в запись таймлайна&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/crm-timeline-layout-blocks-get.html\"&gt;crm.timeline.layout.blocks.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает установленный приложением набор дополнительных контентных блоков для записи таймлайна&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/crm-timeline-layout-blocks-delete.html\"&gt;crm.timeline.layout.blocks.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет установленный приложением набор дополнительных контентных блоков для записи таймлайна&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"udalenie-zapisej-tajmlajna\"&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/index.html#udalenie-zapisej-tajmlajna\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Удаление записей таймлайна&lt;/span&gt;&lt;/a&gt;Удаление записей таймлайна&lt;/h2&gt;\n&lt;p&gt;При удалении записи таймлайна, будут безвозвратно удалены и наборы дополнительных контентных блоков, добавленные приложениями.&lt;/p&gt;\n&lt;h2 id=\"udalenie-prilozheniya\"&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/index.html#udalenie-prilozheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Удаление Приложения&lt;/span&gt;&lt;/a&gt;Удаление Приложения&lt;/h2&gt;\n&lt;p&gt;При удалении Приложения, будут безвозвратно удалены все наборы дополнительных контентных блоков, добавленные им в записи таймлайна.&lt;/p&gt;\n&lt;h2 id=\"smotrite-takzhe\"&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/index.html#smotrite-takzhe\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Смотрите также&lt;/span&gt;&lt;/a&gt;Смотрите также&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/layout-blocks/content-blocks-test-app.html\"&gt;Пример тестового Приложения&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/timeline/activities/layout-blocks/index.html\"&gt;Методы для работы с наборами дополнительных контентных блоков для дел&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Удаление записей таймлайна","href":"api-reference/crm/timeline/layout-blocks/index.html#udalenie-zapisej-tajmlajna","level":2},{"title":"Удаление Приложения","href":"api-reference/crm/timeline/layout-blocks/index.html#udalenie-prilozheniya","level":2},{"title":"Смотрите также","href":"api-reference/crm/timeline/layout-blocks/index.html#smotrite-takzhe","level":2}],"title":"Дополнительные контентные блоки"},"router":{"pathname":"api-reference/crm/timeline/layout-blocks/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
