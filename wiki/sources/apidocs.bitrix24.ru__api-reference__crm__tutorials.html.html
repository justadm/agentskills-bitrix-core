            {"data":{"leading":false,"html":"&lt;p&gt;Как быстро связать форму на своем сайте с CRM? Как автоматически создавать сделки с товарными позициями? Как, создавая лид из своего источника, «прокинуть» в Битрикс информацию для сквозной аналитики?&lt;/p&gt;\n&lt;p&gt;В этом разделе вы найдете готовые примеры для решения типовых задач, связанных с CRM.&lt;/p&gt;\n&lt;h2 id=\"kak-sozdavat-lidy,-sdelki-i-drugie-obuekty-crms\"&gt;&lt;a href=\"api-reference/crm/tutorials.html#kak-sozdavat-lidy,-sdelki-i-drugie-obuekty-crms\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как создавать лиды, сделки и другие объекты CRMS&lt;/span&gt;&lt;/a&gt;Как создавать лиды, сделки и другие объекты CRMS&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-lead.html\"&gt;Добавить лид через веб-форму&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-lead-with-files.html\"&gt;Добавить лид с файлами через веб-форму&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-objects-with-crm-mode.html\"&gt;Добавить дело в новый лид или сделку в зависимости от режима CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-send-email.html\"&gt;Как отправить письмо клиенту от имени сотрудника&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-repeat-lead.html\"&gt;Добавить повторный лид&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-contact.html\"&gt;Добавить контакт через веб-форму&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-contact-with-requisite.html\"&gt;Добавить контакт с реквизитами через веб-форму&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-company.html\"&gt;Добавить компанию через веб-ф
