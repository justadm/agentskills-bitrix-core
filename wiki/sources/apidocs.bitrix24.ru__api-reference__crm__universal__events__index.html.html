            {"data":{"leading":false,"html":"&lt;p&gt;Есть три типа события — на добавление, изменение и удаление элемента смарт-процесса.&lt;/p&gt;\n&lt;p&gt;События срабатывают при действиях над элементами ВСЕХ смарт-процессов. Фильтровать по нужному типу придется уже на стороне обработки события.&lt;/p&gt;\n&lt;p&gt;В списке доступных событий будет следующий набор:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;onCrmDynamicItemAdd&lt;/strong&gt; — добавление элемента любого смарт-процесса&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;onCrmDynamicItemUpdate&lt;/strong&gt; — изменение элемента любого смарт-процесса&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;onCrmDynamicItemDelete&lt;/strong&gt; — удаление элемента любого смарт-процесса&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Существует теоретическая возможность подписаться на события элементов конкретного смарт-процесса. Имена таких событий выглядят как &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rwpsuqbs\"&gt;onCrmDynamicItemAdd_{entityTypeId}&lt;/code&gt;. В интерфейсе создания вебхуков они не выводятся, но могут работать при подписке через приложения.&lt;/p&gt;\n&lt;p&gt;Событиями &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-thp4nt4r\"&gt;onCrmDynamicItemAdd&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h4s2umna\"&gt;onCrmDynamicItemUpdate&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ciaas7yh\"&gt;onCrmDynamicItemDelete&lt;/code&gt; необходимо пользоваться лишь для &lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html\"&gt;Пользовательских типов CRM&lt;/a&gt; и Счетов, поскольку данные события не вызываются для системных типов CRM.&lt;/p&gt;\n&lt;p&gt;Подробнее о том, какие события можно использовать для Лидов, Сделок и так далее, описано в детальной странице события.&lt;/p&gt;\n&lt;h2 id=\"sobytiya\"&gt;&lt;a href=\"api-reference/crm/universal/events/index.html#sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;События&lt;/span&gt;&lt;/a&gt;События&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-add.html\"&gt;Событие на создание объекта CRM пользовательского типа onCrmDynamicItemAdd&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-update.html\"&gt;Событие на обновление объекта CRM пользовательского типа onCrmDynamicItemUpdate&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-delete.html\"&gt;Событие на удаление объекта CRM пользовательского типа onCrmDynamicItemDelete&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"События","href":"api-reference/crm/universal/events/index.html#sobytiya","level":2}],"title":"Обзор событий объектов CRM"},"router":{"pathname":"api-reference/crm/universal/events/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
