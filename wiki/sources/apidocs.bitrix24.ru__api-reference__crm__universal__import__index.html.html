        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zmyimli6\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь с правом «импорта» элемента объекта CRM&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Импорт поддерживает все основные &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;сущности CRM&lt;/a&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/leads/index.html\"&gt;Лиды&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/deals/index.html\"&gt;Сделки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/contacts/index.html\"&gt;Контакты&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/index.html\"&gt;Компании&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/quote/index.html\"&gt;Коммерческие предложения&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;Cчета&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html\"&gt;Смарт-процессы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для импорта доступны два метода:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/import/crm-item-import.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4ux6d1iy\"&gt;crm.item.import&lt;/code&gt;&lt;/a&gt; — импорт одной записи&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/import/crm-item-batch-import.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-il2pvmef\"&gt;crm.item.batchImport&lt;/code&gt;&lt;/a&gt; — групповой импорт записей&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Добавление элементов через импорт, в отличие от добавления через &lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i48nttxs\"&gt;crm.*.add&lt;/code&gt;&lt;/a&gt;, имеет следующие особенности:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Проверка прав производится на импорт, а не на добавление элементов.&lt;/li&gt;\n&lt;li&gt;Роботы и бизнес-процессы не будут запущены на добавленном элементе.&lt;/li&gt;\n&lt;li&gt;При выполнении под администратором портала, есть возможность установить значения некоторых системных полей:&lt;/li&gt;\n&lt;/ul&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Поле&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;createdTime&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дата и время создания записи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;updatedTime&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дата и время обновления записи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;movedTime&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дата и время изменения стадии, если объект поддерживает стадии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;createdBy&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь, создавший запись&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;updatedBy&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь, изменивший запись&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;movedBy&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь, изменивший стадию, если объект поддерживает стадии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;На значения этих полей накладываются некоторые ограничения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Требуется монотонное возрастание значения поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u7upb57d\"&gt;createdTime&lt;/code&gt;. То есть нельзя будет создавать записи с датой создания меньшей, чем у какой-либо из уже существующих записей.&lt;/li&gt;\n&lt;li&gt;Значения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8cjxevg2\"&gt;createdTime&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q9zffuex\"&gt;updatedTime&lt;/code&gt; не могут быть в будущем.&lt;/li&gt;\n&lt;li&gt;Время &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-utydx9eh\"&gt;updatedTime&lt;/code&gt; не может быть меньше &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cqupkc0v\"&gt;createdTime&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;Время &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kyymrk98\"&gt;movedTime&lt;/code&gt; должно быть в диапазоне между &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p61da2aa\"&gt;createdTime&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gjs04ob5\"&gt;updatedTime&lt;/code&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Импорт данных в CRM"},"router":{"pathname":"api-reference/crm/universal/import/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
        </script>
