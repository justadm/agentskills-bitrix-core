    <body class="g-root g-root_theme_light">

        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-42my3uqs\"&gt;crm.item.*&lt;/code&gt; предоставляют возможности для управления различными сущностями CRM, такими как лиды, сделки, контакты, компании, счета, предложения и элементы смарт-процессов.&lt;br /&gt;\nОни позволяют получать поля, добавлять, обновлять, удалять и получать списки элементов.&lt;/p&gt;\n&lt;h2 id=\"osobennosti-raboty-s-nazvaniyami-polej\"&gt;&lt;a href=\"api-reference/crm/universal/index.html#osobennosti-raboty-s-nazvaniyami-polej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности работы с названиями полей&lt;/span&gt;&lt;/a&gt;Особенности работы с названиями полей&lt;/h2&gt;\n&lt;p&gt;В базе данных имена полей элементов хранятся в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1uegs35q\"&gt;UPPER_CASE&lt;/code&gt; формате. Но при работе через REST мы преобразуем их в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7u3wzvaw\"&gt;camelCase&lt;/code&gt;. Например, поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8e58nlm8\"&gt;ASSIGNED_BY_ID&lt;/code&gt; преобразуется в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-os9t7gl5\"&gt;assignedById&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Имена пользовательских полей, помимо символа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zk1frhys\"&gt;_&lt;/code&gt; и букв, могут содержать цифры. Обычно они идут раздельно, например, поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ck2pfex2\"&gt;UF_CRM_10_5186744711&lt;/code&gt; преобразуется в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-plcgdc0k\"&gt;ufCrm10_5186744711&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы код выглядел более читаемым, подчеркивания между цифрами остаются, а остальные — убираются.&lt;/p&gt;\n&lt;p&gt;Проблемы начинаются, когда буквы и цифры в поле идут вперемешку. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9ejjzsuw\"&gt;UF_CRM_10_DIGIT10&lt;/code&gt; преобразуется в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8veln29a\"&gt;ufCrm10Digit10&lt;/code&gt;. При обратном преобразовании нет никакой возможности определить, исходное поле называлось &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2epzukmq\"&gt;UF_CRM_10_DIGIT10&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ow2tqx4n\"&gt;UF_CRM_10_DIGIT_10&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы разрешить подобные конфликты, с версии &lt;strong&gt;CRM 21.1800.0&lt;/strong&gt; был внедрен механизм предварительного анализа названий полей, и если в них обнаружены конфликты, то название поля не преобразуется в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-380dio1g\"&gt;camelCase&lt;/code&gt;, а остается как есть.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;UPPER_CASE&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;camelCase&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j4yfi60e\"&gt;UF_CRM_3_DIGIT&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lbyukg2c\"&gt;ufCrm3Digit&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-snj6zjhv\"&gt;UF_CRM_3_DIGIT10&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tdwh2pjz\"&gt;ufCrm_3_DIGIT10&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4ag6yuqa\"&gt;UF_CRM_3_DIGIT_10&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n5vqe3k4\"&gt;ufCrm_3_DIGIT_10&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-75w8h9zh\"&gt;UF_CRM_3_1747309727&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-608df5hw\"&gt;ufCrm3_1747309727&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ggy8f2mq\"&gt;UF_CRM_1747309879&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r07ftrhv\"&gt;ufCrm_1747309879&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;С версии &lt;strong&gt;CRM 25.0.0&lt;/strong&gt; в методы crm.item.* добавлен параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u7noql9q\"&gt;useOriginalUfNames&lt;/code&gt; для управления форматом имен пользовательских полей в запросе и ответе:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xfc1qtc6\"&gt;Y&lt;/code&gt; — оригинальные имена пользовательских полей, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bfe485ku\"&gt;UF_CRM_2_1639669411830&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-isazf3b8\"&gt;N&lt;/code&gt; — имена пользовательских полей в camelCase, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xymhkodm\"&gt;ufCrm2_1639669411830&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;По умолчанию имена пользовательских полей передаются и возвращаются в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c3478ylk\"&gt;camelCase&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"privyazka-k-rekvizitam\"&gt;&lt;a href=\"api-reference/crm/universal/index.html#privyazka-k-rekvizitam\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Привязка к реквизитам&lt;/span&gt;&lt;/a&gt;Привязка к реквизитам&lt;/h2&gt;\n&lt;p&gt;Для управления привязкой реквизитов можно воспользоваться методами &lt;a href=\"api-reference/crm/requisites/links/index.html\"&gt;crm.requisite.link.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"s-versii-crm-218000\"&gt;&lt;a href=\"api-reference/crm/universal/index.html#s-versii-crm-218000\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;С версии crm 21.800.0&lt;/span&gt;&lt;/a&gt;С версии crm 21.800.0&lt;/h2&gt;\n&lt;p&gt;Появляется поддержка полей-родителей при работе с элементами CRM.&lt;/p&gt;\n&lt;p&gt;Каждое поле имеет код &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gtvylx6u\"&gt;parentId + {parentEntityTypeId}&lt;/code&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-szlf1c2p\"&gt;fields&lt;/code&gt; в списке полей будет отдавать информацию о полях с родителями.&lt;/li&gt;\n&lt;li&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z67xbmae\"&gt;get&lt;/code&gt; будут отдавать значения полей родителей.&lt;/li&gt;\n&lt;li&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-242t92ds\"&gt;list&lt;/code&gt; будет фильтровать, сортировать и добавлять в выборку значения полей родителей&lt;/li&gt;\n&lt;li&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ahicrle0\"&gt;add&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o51qhy6i\"&gt;update&lt;/code&gt; будут поддерживать изменения значений этих полей.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"rest-metody\"&gt;&lt;a href=\"api-reference/crm/universal/index.html#rest-metody\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;REST методы&lt;/span&gt;&lt;/a&gt;REST методы&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/crm-item-fields.html\"&gt;Получить поля элемента crm.item.fields&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;Создать новый элемент CRM crm.item.add&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/crm-item-update.html\"&gt;Обновить элемент crm.item.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/crm-item-delete.html\"&gt;Удалить элемент crm.item.delete&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;Получить список элементов crm.item.list&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"sobytiya-nad-elementami-smart-processov\"&gt;&lt;a href=\"api-reference/crm/universal/index.html#sobytiya-nad-elementami-smart-processov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;События над элементами смарт-процессов&lt;/span&gt;&lt;/a&gt;События над элементами смарт-процессов&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-add.html\"&gt;Событие на создание объекта CRM пользовательского типа onCrmDynamicItemAdd&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-update.html\"&gt;Событие на обновление объекта CRM пользовательского типа onCrmDynamicItemUpdate&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-delete.html\"&gt;Событие на удаление объекта CRM пользовательского типа onCrmDynamicItemDelete&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/crm/universal/index.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-user-field-to-spa.html\"&gt;Как создать пользовательское поле в смарт-процессе&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Особенности работы с названиями полей","href":"api-reference/crm/universal/index.html#osobennosti-raboty-s-nazvaniyami-polej","level":2},{"title":"Привязка к реквизитам","href":"api-reference/crm/universal/index.html#privyazka-k-rekvizitam","level":2},{"title":"С версии crm 21.800.0","href":"api-reference/crm/universal/index.html#s-versii-crm-218000","level":2},{"title":"REST методы","href":"api-reference/crm/universal/index.html#rest-metody","level":2},{"title":"События над элементами смарт-процессов","href":"api-reference/crm/universal/index.html#sobytiya-nad-elementami-smart-processov","level":2},{"title":"Продолжите изучение","href":"api-reference/crm/universal/index.html#prodolzhite-izuchenie","level":2}],"title":"Универсальные методы для основных элементов"},"router":{"pathname":"api-reference/crm/universal/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
