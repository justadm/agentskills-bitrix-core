            {"data":{"leading":false,"html":"&lt;p&gt;Счет — это финальный этап сделки. Он создается, когда все обсуждения завершены, а условия договора согласованы. Для одной сделки можно создать несколько счетов для разных товаров и услуг.&lt;/p&gt;\n&lt;p&gt;Счет можно сформировать по шаблону и отправить клиенту в виде документа. В карточке счета вы можете:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Управлять процессом продажи товара или услуги&lt;/li&gt;\n&lt;li&gt;Отслеживать этапы работы со счетом&lt;/li&gt;\n&lt;li&gt;Принимать онлайн-платежи&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/universal/invoice.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/14795982/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Новые счета в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-schetov-s-drugimi-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#svyaz-schetov-s-drugimi-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь счетов с другими объектами CRM&lt;/span&gt;&lt;/a&gt;Связь счетов с другими объектами CRM&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Сделка.&lt;/strong&gt; Передавайте ID сделки в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qj0dal3x\"&gt;parentId2&lt;/code&gt;, чтобы новый счет был связан со сделкой.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Предложение.&lt;/strong&gt; Передавайте ID предложения в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ym3p732q\"&gt;parentId7&lt;/code&gt;, чтобы новый счет был связан с предложением.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Клиент.&lt;/strong&gt; Поле в карточке счета, состоящее из связанных с ним компании и контактов. Все дела звонков, писем, чатов с контактом или компанией будут сохранены в карточке счета. Компания в поле одна, обращение к ней происходит через поле счета &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pyh34xvk\"&gt;companyId&lt;/code&gt;. Контактов может быть указано несколько, взаимодействие с ними ведется через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p2i90mwr\"&gt;contactIds&lt;/code&gt;, передавайте в поле массив с ID контактов.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Добавление, изменение, удаление товарных позиций в счетах возможно через группу методов &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Оплаты.&lt;/strong&gt; Добавление, изменение, удаление документов оплаты в счетах возможно через группу методов &lt;a href=\"api-reference/crm/universal/payment/index.html\"&gt;crm.item.payment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Реквизиты вашей компании.&lt;/strong&gt; Укажите ID вашей компании в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ynpelr3z\"&gt;mycompanyId&lt;/code&gt;, чтобы ее реквизиты автоматически использовались в документах. Получить ID вашей компании можно методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; для объекта компаний с фильтром по полю &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-038az4uq\"&gt;isMyCompany&lt;/code&gt;.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs JavaScript\"&gt;&lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'crm.item.list'&lt;/span&gt;,\n        {\n            &lt;span class=\"hljs-attr\"&gt;entityTypeId&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;4&lt;/span&gt;,\n            &lt;span class=\"hljs-attr\"&gt;filter&lt;/span&gt;: {\n                &lt;span class=\"hljs-string\"&gt;\"isMyCompany\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Y\"&lt;/span&gt;,\n            },\n        },\n        &lt;span class=\"hljs-function\"&gt;(&lt;span class=\"hljs-params\"&gt;result&lt;/span&gt;) =&amp;gt;&lt;/span&gt; {\n            &lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;())\n            {\n                &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;());\n                &lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt;;\n            }\n            &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;info&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;data&lt;/span&gt;());\n        },\n    );\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"52\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-52\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-52\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-52.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18225080/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как принимать оплату от клиентов и работать с чеками в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13216242/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как добавить товары в сделки, лиды и предложения&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/15987420/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как использовать реквизиты вашей компании&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kartochka-scheta\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#kartochka-scheta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка счета&lt;/span&gt;&lt;/a&gt;Карточка счета&lt;/h2&gt;\n&lt;p&gt;Основное рабочее пространство в счетах — это вкладка Общее карточки. Она состоит из двух частей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;левая, в ней располагаются поля с информацией. Если системных полей недостаточно, вы можете создать собственные пользовательские поля. Они позволяют хранить информацию в различных форматах данных: строка, число, ссылка, адрес и другие. Для создания, изменения, получения или удаления пользовательских полей счетов используйте группу методов &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;правая, в ней располагается таймлайн счета. В нем можно создавать, редактировать, фильтровать, удалять дела CRM — группа методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;, и записи таймлайна — группа методов &lt;a href=\"api-reference/crm/timeline/index.html\"&gt;crm.timeline.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Параметрами карточки счета можно управлять через группу методов &lt;a href=\"api-reference/crm/universal/item-details-configuration/index.html\"&gt;crm.item.details.configuration.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22804914/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Карточка CRM: возможности и настройки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18478840/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Системные поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23960160/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Таймлайн в элементе CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В карточку счета можно встроить приложение. Благодаря встраиванию можно будет использовать приложение и не покидать карточку счета.&lt;/p&gt;\n&lt;p&gt;Есть два сценария встройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Использовать специальные &lt;a href=\"api-reference/widgets/crm/index.html\"&gt;места встраивания&lt;/a&gt;. Например, через создание своей вкладки&lt;/li&gt;\n&lt;li&gt;Создать &lt;a href=\"tutorials/crm/crm-widgets/widget-as-field-in-lead-page.html\"&gt;пользовательское поле&lt;/a&gt;, в которое будет загружается интерфейс вашего приложения&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"mesta-vstraivaniya-novyh-schetov\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#mesta-vstraivaniya-novyh-schetov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Места встраивания новых счетов&lt;/span&gt;&lt;/a&gt;Места встраивания новых счетов&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/detail-tab.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g3pxwb3d\"&gt;CRM_SMART_INVOICE_DETAIL_TAB&lt;/code&gt;&lt;/a&gt; — вкладка в детальной карточке элемента CRM&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/detail-activity.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cyva2kol\"&gt;CRM_SMART_INVOICE_DETAIL_ACTIVITY&lt;/code&gt;&lt;/a&gt; — кнопка над таймлайном карточки элемента&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/detail-toolbar.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-an0s5hw2\"&gt;CRM_SMART_INVOICE_DETAIL_TOOLBAR&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню верхней кнопки карточки&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/document-generator-button.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i06jdtk6\"&gt;CRM_SMART_INVOICE_DOCUMENTGENERATOR_BUTTON&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню генератора документов&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/index.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uc1i393w\"&gt;CRM_SMART_INVOICE_LIST_MENU&lt;/code&gt;&lt;/a&gt; — пункт контекстного меню в списке элементов&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/list-toolbar.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j426py0d\"&gt;CRM_SMART_INVOICE_LIST_TOOLBAR&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню над списком элементов&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/activity-timeline-menu.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f7ibr8te\"&gt;CRM_SMART_INVOICE_TIMELINE_MENU&lt;/code&gt;&lt;/a&gt; — пункт контекстного меню дела в карточке элемента&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/robot-designer-toolbar.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2d1gwhvp\"&gt;CRM_SMART_INVOICE_ROBOT_DESIGNER_TOOLBAR&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню верхней кнопки дизайнера роботов&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/crm-widgets/widget-as-detail-tab.html\"&gt;Встроить виджет в карточку CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-87z0his8\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"osnovnye\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#osnovnye\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h3&gt;\n&lt;p&gt;Идентификатор объекта CRM &lt;strong&gt;entityTypeId&lt;/strong&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4414830q\"&gt;31&lt;/code&gt;&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-0ej7ewir\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"yvst9m9r\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;crm.item.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый элемент CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-update.html\"&gt;crm.item.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет элемент&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-get.html\"&gt;crm.item.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элемент по Id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список элементов по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-delete.html\"&gt;crm.item.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет элемент&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-fields.html\"&gt;crm.item.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля элемента&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"vlsurz7d\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-add.html\"&gt;onCrmDynamicItemAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании объекта CRM пользовательского типа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-delete.html\"&gt;onCrmDynamicItemDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении объекта CRM пользовательского типа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/events/on-crm-dynamic-item-update.html\"&gt;onCrmDynamicItemUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении объекта CRM пользовательского типа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"polzovatelskie-polya\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#polzovatelskie-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пользовательские поля&lt;/span&gt;&lt;/a&gt;Пользовательские поля&lt;/h3&gt;\n&lt;p&gt;Идентификатор объекта CRM &lt;strong&gt;entityId&lt;/strong&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wm895koy\"&gt;CRM_SMART_INVOICE&lt;/code&gt;&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-update.html\"&gt;userfieldconfig.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет настройки поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-get.html\"&gt;userfieldconfig.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает настройки пользовательского поля по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-get-types.html\"&gt;userfieldconfig.getTypes&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает набор доступных типов пользовательских полей для модуля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-list.html\"&gt;userfieldconfig.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список настроек пользовательских полей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-delete.html\"&gt;userfieldconfig.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"tovarnye-pozicii\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#tovarnye-pozicii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Товарные позиции&lt;/span&gt;&lt;/a&gt;Товарные позиции&lt;/h3&gt;\n&lt;p&gt;Идентификатор объекта CRM &lt;strong&gt;ownerType&lt;/strong&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2og8rnge\"&gt;SI&lt;/code&gt;&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-add.html\"&gt;crm.item.productrow.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет товарную позицию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-update.html\"&gt;crm.item.productrow.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет товарную позицию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-get.html\"&gt;crm.item.productrow.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о товарной позиции по id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-set.html\"&gt;crm.item.productrow.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Привязывает товарную позицию к объекту CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-list.html\"&gt;crm.item.productrow.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список товарных позиций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-get-available-for-payment.html\"&gt;crm.item.productrow.getAvailableForPayment&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список неоплаченных товаров&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-update.html\"&gt;crm.item.productrow.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет товарную позицию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-fields.html\"&gt;crm.item.productrow.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список полей товарных позиций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"oplaty\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#oplaty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Оплаты&lt;/span&gt;&lt;/a&gt;Оплаты&lt;/h3&gt;\n&lt;p&gt;Идентификатор объекта CRM &lt;strong&gt;entityTypeId&lt;/strong&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d15hi6bt\"&gt;31&lt;/code&gt;&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-add.html\"&gt;crm.item.payment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает оплату для объекта CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-update.html\"&gt;crm.item.payment.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет набор полей оплаты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-get.html\"&gt;crm.item.payment.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает краткую информацию об оплате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-list.html\"&gt;crm.item.payment.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список оплат конкретного объекта CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-delete.html\"&gt;crm.item.payment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет оплату&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-pay.html\"&gt;crm.item.payment.pay&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет статус оплаты на «Оплачено»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/crm-item-payment-unpay.html\"&gt;crm.item.payment.unpay&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет статус оплаты на «Не оплачено»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\"tovarnye-pozicii-v-oplate\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#tovarnye-pozicii-v-oplate\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Товарные позиции в оплате&lt;/span&gt;&lt;/a&gt;Товарные позиции в оплате&lt;/h4&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/products-in-payment/crm-item-payment-product-add.html\"&gt;crm.item.payment.product.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет товарную позицию в оплату&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/products-in-payment/crm-item-payment-product-list.html\"&gt;crm.item.payment.product.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список товарных позиций в оплате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/products-in-payment/crm-item-payment-product-delete.html\"&gt;crm.item.payment.product.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет товарную позицию из оплаты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/payment/products-in-payment/crm-item-payment-product-set-quantity.html\"&gt;crm.item.payment.product.setQuantity&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет количество товара в товарной позиции оплаты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h4 id=\"dostavka-v-oplate\"&gt;&lt;a href=\"api-reference/crm/universal/invoice.html#dostavka-v-oplate\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&
