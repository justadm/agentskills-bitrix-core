        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;h2 id=\"opisanie\"&gt;&lt;a href=\"api-reference/crm/universal/product-rows/index.html#opisanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Описание&lt;/span&gt;&lt;/a&gt;Описание&lt;/h2&gt;\n&lt;p&gt;REST-методы из семейства &lt;strong&gt;crm.item.productrow.*&lt;/strong&gt; позволяют работать с товарными позициями, привязанными к различным объектам CRM. Методы универсальны и поддерживают любой тип владельца, кроме старых счетов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;лиды&lt;/li&gt;\n&lt;li&gt;сделки&lt;/li&gt;\n&lt;li&gt;контакты&lt;/li&gt;\n&lt;li&gt;компании&lt;/li&gt;\n&lt;li&gt;коммерческие предложения&lt;/li&gt;\n&lt;li&gt;новые счета&lt;/li&gt;\n&lt;li&gt;смарт-процессы&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"prava-dostupa\"&gt;&lt;a href=\"api-reference/crm/universal/product-rows/index.html#prava-dostupa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Права доступа&lt;/span&gt;&lt;/a&gt;Права доступа&lt;/h2&gt;\n&lt;p&gt;При обращении к методам REST учитываются права доступа пользователя, от которого осуществляется вызов методов. Товарные позиции не являются самостоятельной сущностью CRM и всегда привязаны к какому-либо объекту CRM, выступающему как их владелец. Поэтому при всех операциях проверяются права пользователя на доступ и управление объектом-владельцем (предложением, смарт-процессом и т.п.). Например, если у пользователя нет доступа к чтению какого-либо элемента, то и прочитать его товарные позиции он не сможет.&lt;/p&gt;\n&lt;h2 id=\"avtomaticheskie-dejstviya-posle-lyubogo-izmeneniya\"&gt;&lt;a href=\"api-reference/crm/universal/product-rows/index.html#avtomaticheskie-dejstviya-posle-lyubogo-izmeneniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Автоматические действия после любого изменения&lt;/span&gt;&lt;/a&gt;Автоматические действия после любого изменения&lt;/h2&gt;\n&lt;p&gt;После любого изменения, вносимого в товарные позиции, будут выполнены все стандартные проверки и процедуры, происходящие при изменении объекта CRM, в том числе пересчет суммы и запуск роботов после сохранения. Это относится ко всем методам, создающим/изменяющим товарные позиции: &lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-add.html\"&gt;crm.item.productrow.add&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-update.html\"&gt;crm.item.productrow.update&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-set.html\"&gt;crm.item.productrow.set&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"obzor-metodov\"&gt;&lt;a href=\"api-reference/crm/universal/product-rows/index.html#obzor-metodov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jmdlwi00\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-add.html\"&gt;crm.item.productrow.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет товарную позицию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-update.html\"&gt;crm.item.productrow.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет товарную позицию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-get.html\"&gt;crm.item.productrow.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о товарной позиции по id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-set.html\"&gt;crm.item.productrow.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Привязывает товарную позицию к объекту CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-list.html\"&gt;crm.item.productrow.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список товарных позиций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-get-available-for-payment.html\"&gt;crm.item.productrow.getAvailableForPayment&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список неоплаченных товаров&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-delete.html\"&gt;crm.item.productrow.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет товарную позицию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/product-rows/crm-item-productrow-fields.html\"&gt;crm.item.productrow.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список полей товарных позиций&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Описание","href":"api-reference/crm/universal/product-rows/index.html#opisanie","level":2},{"title":"Права доступа","href":"api-reference/crm/universal/product-rows/index.html#prava-dostupa","level":2},{"title":"Автоматические действия после любого изменения","href":"api-reference/crm/universal/product-rows/index.html#avtomaticheskie-dejstviya-posle-lyubogo-izmeneniya","level":2},{"title":"Обзор методов","href":"api-reference/crm/universal/product-rows/index.html#obzor-metodov","level":2}],"title":"Товарные позиции"},"router":{"pathname":"api-reference/crm/universal/product-rows/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
