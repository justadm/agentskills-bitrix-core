        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В CRM можно создавать поля двух типов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;стандартные: число, строка, дата, адрес, ссылка, файл и так далее,&lt;/li&gt;\n&lt;li&gt;пользовательские: встройки приложений внутри карточки CRM.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;С помощью полей пользовательского типа можно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;выводить в карточке CRM данные, которым не подходят стандартные типы полей. Фактически данные будут храниться в базе приложения в нужном формате, а встройка будет показывать их внутри поля.&lt;/li&gt;\n&lt;li&gt;создавать элементы интерфейса в карточках CRM. Например, выводить внутри поля кнопки для управления приложением.&lt;/li&gt;\n&lt;li&gt;интегрировать внешние сервисы в карточку CRM. Например, выводить в поле динамическую информацию. При каждом открытии карточки поле будет совершать запрос к обработчику приложения и автоматически подгружать свежие данные.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Работа с пользовательскими полями&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-s-obuektami-crm\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#svyaz-s-obuektami-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с объектами CRM&lt;/span&gt;&lt;/a&gt;Связь с объектами CRM&lt;/h2&gt;\n&lt;p&gt;Пользовательские типы полей можно добавлять в карточки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделок&lt;/a&gt; — используйте методы &lt;a href=\"api-reference/crm/deals/user-defined-fields/crm-deal-userfield-add.html\"&gt;crm.deal.userfield.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидов&lt;/a&gt; — &lt;a href=\"api-reference/crm/leads/userfield/crm-lead-userfield-add.html\"&gt;crm.lead.userfield.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контактов&lt;/a&gt; — &lt;a href=\"api-reference/crm/contacts/userfield/crm-contact-userfield-add.html\"&gt;crm.contact.userfield.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/companies/index.html\"&gt;компаний&lt;/a&gt; — &lt;a href=\"api-reference/crm/companies/userfields/crm-company-userfield-add.html\"&gt;crm.company.userfield.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/invoice.html\"&gt;новых счетов&lt;/a&gt; — &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/quote/index.html\"&gt;коммерческих предложений&lt;/a&gt; — &lt;a href=\"api-reference/crm/quote/user-field/crm-quote-user-field-add.html\"&gt;crm.quote.userfield.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессов&lt;/a&gt; — &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html\"&gt;userfieldconfig.add&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;В поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-65508c37\"&gt;USER_TYPE_ID&lt;/code&gt; передавайте значение по форме &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cv83rook\"&gt;rest_#ID_приложения#_#USER_TYPE_ID#&lt;/code&gt;. Например, для приложения с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bkc5ed27\"&gt;ID: 123&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3ex2vyyj\"&gt;USER_TYPE_ID: userfield1&lt;/code&gt; значение будет &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xog474rs\"&gt;rest_123_test_userfield1&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы получить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n2oy41tj\"&gt;ID&lt;/code&gt; приложения, используйте метод &lt;a href=\"api-reference/common/system/app-info.html\"&gt;app.info&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"oshibki-pri-rabote-s-polzovatelskimi-tipami-polej\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#oshibki-pri-rabote-s-polzovatelskimi-tipami-polej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ошибки при работе с пользовательскими типами полей&lt;/span&gt;&lt;/a&gt;Ошибки при работе с пользовательскими типами полей&lt;/h2&gt;\n&lt;h3 id=\"oshibka-400-pri-sozdanii-polya\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#oshibka-400-pri-sozdanii-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ошибка 400 при создании поля&lt;/span&gt;&lt;/a&gt;Ошибка 400 при создании поля&lt;/h3&gt;\n&lt;p&gt;При создании поля с пользовательским типом можно получить ошибку &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0uezbjiw\"&gt;Error! 400: ERROR_CORE: Указан неверный пользовательский тип. (400)&lt;/code&gt;.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Выполните метод &lt;a href=\"api-reference/widgets/user-field/userfieldtype-list.html\"&gt;userfieldtype.list&lt;/a&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Если метод вернул тип поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qei0y5of\"&gt;USER_TYPE_ID&lt;/code&gt;,  переходите к пункту 2.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если нужный тип поля не найден, зарегистрируйте новый тип методом &lt;a href=\"api-reference/widgets/user-field/userfieldtype-add.html\"&gt;userfieldtype.add&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Выполните метод &lt;a href=\"api-reference/common/system/app-info.html\"&gt;app.info&lt;/a&gt;. Метод проверит корректность установки приложения.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Если метод вернул &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yczf50r5\"&gt;INSTALLED = true&lt;/code&gt;, приложение установлено корректно.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если метод вернул &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ljjbsie2\"&gt;INSTALLED = false&lt;/code&gt;, выполните на странице приложения метод &lt;a href=\"sdk/bx24-js-sdk/system-functions/bx24-install-finish.html\"&gt;BX24.installFinish&lt;/a&gt;. Метод завершит установку приложения с интерфейсом.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs javascript\"&gt;&lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;init&lt;/span&gt;(&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;){\n    &lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;installFinish&lt;/span&gt;();\n});\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"135\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-135\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-135\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-135.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\"oshibka-50x-pri-zagruzke-polya\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#oshibka-50x-pri-zagruzke-polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ошибка 50x при загрузке поля&lt;/span&gt;&lt;/a&gt;Ошибка 50x при загрузке поля&lt;/h3&gt;\n&lt;p&gt;Если поле создалось без ошибок, но контент в нем не загружается:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Проверьте URL обработчика &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1wof9jf4\"&gt;HANDLER&lt;/code&gt;, указанный при регистрации поля, методом &lt;a href=\"api-reference/widgets/user-field/userfieldtype-list.html\"&gt;userfieldtype.list&lt;/a&gt;. Чтобы изменить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6nb4y9xb\"&gt;HANDLER&lt;/code&gt;, используйте метод &lt;a href=\"api-reference/widgets/user-field/userfieldtype-update.html\"&gt;userfieldtype.update&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Убедитесь, что обработчик доступен из интернета:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;не используйте локальные адреса: localhost, 192.168.* и другие адреса, доступные только из локальной сети,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;проверьте доступность обработчика с помощью публичных сервисов «доступности сайта».&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Проверьте:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;корректность SSL-сертификата, если используется HTTPS,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;отсутствие блокировок в .htaccess или firewall на сервере обработчика,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;возвращаемые HTTP-коды, должен быть 200 OK.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"obshie-rekomendacii\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#obshie-rekomendacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Общие рекомендации&lt;/span&gt;&lt;/a&gt;Общие рекомендации&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Используйте HTTPS-протокол для обработчиков, иначе браузеры могут блокировать загрузку контента приложения.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Давайте понятные названия для типов полей: учитывайте назначение поля и связь с приложением. Тип поля нельзя переименовать после создания — только удалить и зарегистрировать заново.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"tutorials/crm/crm-widgets/widget-as-field-in-lead-page\"&gt;Встроить виджет в лид в виде пользовательского свойства&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/index\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-fields/userfield-type.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-imr0l2er\"&gt;placement, crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/user-field/userfieldtype-add.html\"&gt;userfieldtype.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Регистрирует новый тип пользовательского поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/user-field/userfieldtype-update.html\"&gt;userfieldtype.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет параметры существующего типа поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/user-field/userfieldtype-list.html\"&gt;userfieldtype.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список зарегистрированных типов полей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/user-field/userfieldtype-delete.html\"&gt;userfieldtype.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет зарегистрированный тип поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь с объектами CRM","href":"api-reference/crm/universal/user-defined-fields/userfield-type.html#svyaz-s-obuektami-crm","level":2},{"title":"Ошибки при работе с пользовательскими типами полей","href":"api-reference/crm/universal/user-defined-fields/userfield-type.html#oshibki-pri-rabote-s-polzovatelskimi-tipami-polej","level":2,"items":[{"title":"Ошибка 400 при создании поля","href":"api-reference/crm/universal/user-defined-fields/userfield-type.html#oshibka-400-pri-sozdanii-polya","level":3},{"title":"Ошибка 50x при загрузке поля","href":"api-reference/crm/universal/user-defined-fields/userfield-type.html#oshibka-50x-pri-zagruzke-polya","level":3}]},{"title":"Общие рекомендации","href":"api-reference/crm/universal/user-defined-fields/userfield-type.html#obshie-rekomendacii","level":2},{"title":"Обзор методов","href":"api-reference/crm/universal/user-defined-fields/userfield-type.html#all-methods","level":2}],"title":"Пользовательские типы полей в CRM"},"router":{"pathname":"api-reference/crm/universal/user-defined-fields/userfield-type","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
