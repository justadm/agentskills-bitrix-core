            {"data":{"leading":false,"html":"&lt;p&gt;Смарт-процесс — это универсальный объект CRM, который можно настроить с учетом потребностей компании. Для каждого смарт-процесса Битрикс24 создает отдельный раздел в CRM. В разделе можно настроить воронки и стадии, роботов, поля, связи с другими объектами Битрикс24.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/18913880/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Смарт-процессы в CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"poryadok-raboty-so-smart-processom\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#poryadok-raboty-so-smart-processom\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Порядок работы со смарт-процессом&lt;/span&gt;&lt;/a&gt;Порядок работы со смарт-процессом&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;Создайте и настройте смарт-процесс — методы &lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html\"&gt;crm.type.*&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Настройте воронки и стадии — &lt;a href=\"api-reference/crm/universal/category/index.html\"&gt;crm.category.*&lt;/a&gt; для воронок и &lt;a href=\"api-reference/crm/status/index.html\"&gt;crm.status.*&lt;/a&gt; для стадий.&lt;/li&gt;\n&lt;li&gt;Добавьте пользовательские поля — &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/index.html\"&gt;userfieldconfig.*&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Настройте вид карточки элемента — &lt;a href=\"api-reference/crm/universal/item-details-configuration/index.html\"&gt;crm.item.details.configuration.*&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Создайте первые элементы внутри смарт-процесса — &lt;a href=\"api-reference/crm/universal/index.html\"&gt;crm.item.*&lt;/a&gt;.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Смарт-процесс можно перенести из раздела CRM в раздел Автоматизация через &lt;a href=\"api-reference/crm/automated-solution/index.html\"&gt;цифровые рабочие места&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Объекты CRM.&lt;/strong&gt; Смарт-процесс можно &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html#relations\"&gt;связать&lt;/a&gt; с лидами, сделками и другими объектами CRM. Связанный объект будет доступен через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xy1ccfrp\"&gt;parentId{ID}&lt;/code&gt;, где &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8i4zunka\"&gt;{ID}&lt;/code&gt; — числовой идентификатор объекта CRM.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Клиент.&lt;/strong&gt; Поле в карточке смарт-процесса, которое состоит из связанных с ним компании и контактов. Компания в поле одна, изменяйте связанную компанию через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-guiki9jm\"&gt;companyId&lt;/code&gt;. Контактов в поле «Клиент» может быть несколько. Взаимодействие с контактами ведется через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-65hgtr8r\"&gt;contactIds&lt;/code&gt; — передавайте в поле массив с ID контактов. Включите поле опцией &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p3hbmp16\"&gt;isClientEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Реквизиты вашей компании.&lt;/strong&gt; Укажите ID вашей компании в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kd8leik6\"&gt;mycompanyId&lt;/code&gt;, чтобы ее реквизиты автоматически использовались в документах. Получить ID вашей компании можно методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; для объекта компаний с фильтром по полю &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eel9aiq6\"&gt;isMyCompany&lt;/code&gt;. Включите поле опцией &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b1rmddlw\"&gt;isMycompanyEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Чтобы добавить, изменить или удалить товарные позиции в смарт-процессе используйте методы &lt;a href=\"api-reference/crm/universal/product-rows/index.html\"&gt;crm.item.productrow.*&lt;/a&gt;. Включите вкладку с товарами и поле «Сумма и валюта» опцией &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-toa4j7we\"&gt;isLinkWithProductsEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователи.&lt;/strong&gt; Смарт-процесс имеет привязку к пользователям по числовым идентификаторам в полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4h3dz6zs\"&gt;createdBy&lt;/code&gt; — кем создан,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6lsc0v7s\"&gt;updatedBy&lt;/code&gt; — кем обновлен,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-16ysvio4\"&gt;movedBy&lt;/code&gt; — кто изменил стадию,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uhdvvmim\"&gt;assignedById&lt;/code&gt; — ответственный за элемент,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0405tdyf\"&gt;observers&lt;/code&gt; — наблюдатели. Включите поле опцией &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4bfj5jct\"&gt;isObserversEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Получить идентификатор и данные пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Документы.&lt;/strong&gt; Чтобы создать документ по шаблону, загрузить новый шаблон для смарт-процесса или настроить нумератор для документов, используйте методы &lt;a href=\"api-reference/crm/document-generator/index.html\"&gt;crm.documentgenerator.*&lt;/a&gt;. Включите работу с документами в смарт-процессе опцией &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lg4nqyoh\"&gt;isDocumentsEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Задачи.&lt;/strong&gt; Элементы смарт-процесса можно привязывать к задачам. Для работы с задачами используйте методы &lt;a href=\"api-reference/tasks/index.html\"&gt;tasks.task.*&lt;/a&gt;. Чтобы возможность связи была доступна, включите и настройте опцию &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-faonqh3w\"&gt;isUseInUserfieldEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;События календаря.&lt;/strong&gt; Элементы смарт-процесса можно привязывать к событиям календаря. Для работы с календарем используйте методы &lt;a href=\"api-reference/calendar/calendar-event/index.html\"&gt;calendar.event.*&lt;/a&gt;. Чтобы возможность связи была доступна, включите и настройте опцию &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9hxf5ecz\"&gt;isUseInUserfieldEnabled&lt;/code&gt; в методе &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/tasks/how-to-connect-task-to-spa.html\"&gt;Как прикрепить задачу к смарт-процессу&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-user-field-to-spa.html\"&gt;Как создать пользовательское поле в смарт-процессе&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-comment-to-spa.html\"&gt;Как добавить комментарий в таймлайн смарт-процесса&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-category-to-spa.html\"&gt;Как создать новую воронку со стадиями в смарт-процессе&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kartochka-elementa-smart-processa\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#kartochka-elementa-smart-processa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка элемента смарт-процесса&lt;/span&gt;&lt;/a&gt;Карточка элемента смарт-процесса&lt;/h2&gt;\n&lt;p&gt;Основное рабочее пространство в смарт-процессе — вкладка «Общее» карточки. Она состоит из двух частей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;левая, в ней располагаются поля с информацией. Если системных полей недостаточно, можно создать собственные пользовательские поля. Поля позволяют хранить информацию в различных форматах данных: строка, число, ссылка, адрес и другие. Для создания, изменения, получения или удаления пользовательских полей смарт-процесса используйте группу методов &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/index.html\"&gt;userfieldconfig.*&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;правая, в ней располагается таймлайн смарт-процесса. В нем можно создавать, редактировать, фильтровать, удалять дела CRM — группа методов &lt;a href=\"api-reference/crm/timeline/activities/index\"&gt;crm.activity.*&lt;/a&gt;, и записи таймлайна — группа методов &lt;a href=\"api-reference/crm/timeline/index\"&gt;crm.timeline.*&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Параметрами карточки смарт-процесса можно управлять через группу методов &lt;a href=\"api-reference/crm/universal/item-details-configuration/index.html\"&gt;crm.item.details.configuration.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22804914/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Карточка CRM: возможности и настройки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18478840/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Системные поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22048980/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пользовательские поля в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23960160/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Таймлайн в элементе CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В карточку смарт-процесса можно встроить приложение. Благодаря встраиванию можно будет использовать приложение и не покидать карточку элемента.&lt;/p&gt;\n&lt;p&gt;Есть два сценария встройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;использовать специальные &lt;a href=\"api-reference/widgets/crm/index.html\"&gt;места встраивания&lt;/a&gt;. Например, через создание своей вкладки.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;создать &lt;a href=\"tutorials/crm/crm-widgets/widget-as-field-in-lead-page.html\"&gt;пользовательское поле&lt;/a&gt;, в котором будет загружаться интерфейс вашего приложения.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"mesta-vstraivaniya-smart-processov\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#mesta-vstraivaniya-smart-processov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Места встраивания смарт-процессов&lt;/span&gt;&lt;/a&gt;Места встраивания смарт-процессов&lt;/h3&gt;\n&lt;p&gt;Вместо &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cdj4c6yj\"&gt;XXX&lt;/code&gt; укажите числовой идентификатор конкретного смарт-процесса, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h9tptdkj\"&gt;CRM_DYNAMIC_183_DOCUMENTGENERATOR_BUTTON&lt;/code&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/detail-tab.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-psvh2u7g\"&gt;CRM_DYNAMIC_XXX_DETAIL_TAB&lt;/code&gt;&lt;/a&gt; — вкладка в детальной карточке элемента CRM&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/detail-activity.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tqwxer9x\"&gt;CRM_DYNAMIC_XXX_DETAIL_ACTIVITY&lt;/code&gt;&lt;/a&gt; — кнопка над таймлайном карточки элемента&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/detail-toolbar.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pdap5lds\"&gt;CRM_DYNAMIC_XXX_DETAIL_TOOLBAR&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню верхней кнопки карточки&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/document-generator-button.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-497e8mrm\"&gt;CRM_DYNAMIC_XXX_DOCUMENTGENERATOR_BUTTON&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню генератора документов&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/index.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7djmofnz\"&gt;CRM_DYNAMIC_XXX_LIST_MENU&lt;/code&gt;&lt;/a&gt; — пункт контекстного меню в списке элементов&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/list-toolbar.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-loo62etd\"&gt;CRM_DYNAMIC_XXX_LIST_TOOLBAR&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню над списком элементов&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/activity-timeline-menu.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qej28dnz\"&gt;CRM_DYNAMIC_XXX_ACTIVITY_TIMELINE_MENU&lt;/code&gt;&lt;/a&gt; — пункт контекстного меню дела в карточке элемента&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/crm/robot-designer-toolbar.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v4jlj1h8\"&gt;CRM_DYNAMIC_XXX_ROBOT_DESIGNER_TOOLBAR&lt;/code&gt;&lt;/a&gt; — пункт выпадающего меню верхней кнопки дизайнера роботов&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/crm-widgets/widget-as-detail-tab.html\"&gt;Встроить виджет в карточку CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"id\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#id\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Идентификаторы смарт-процессов&lt;/span&gt;&lt;/a&gt;Идентификаторы смарт-процессов&lt;/h2&gt;\n&lt;p&gt;У каждого смарт-процесса есть четыре типа идентификаторов. Используйте идентификаторы, чтобы применить метод к определенному смарт-процессу.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Числовой идентификатор типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h31dudyt\"&gt;130&lt;/code&gt;. Получить можно методом &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-spkmomwz\"&gt;ID&lt;/code&gt; или &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-list.html\"&gt;crm.type.list&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fy1dn38a\"&gt;entityTypeId&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Символьный код типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i2i53vu5\"&gt;DYNAMIC_130&lt;/code&gt; — &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3my7zuwn\"&gt;SYMBOL_CODE&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Краткий символьный код типа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fwoch8th\"&gt;T82&lt;/code&gt; — &lt;a href=\"api-reference/crm/auxiliary/enum/crm-enum-owner-type.html\"&gt;crm.enum.ownertype&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dohah9xp\"&gt;SYMBOL_CODE_SHORT&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Тип объекта пользовательского поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e6dqj39a\"&gt;CRM_13&lt;/code&gt; — &lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-list.html\"&gt;crm.type.list&lt;/a&gt;. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gtfs2pst\"&gt;id&lt;/code&gt; из результата метода подставьте в формулу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-neqqsweu\"&gt;CRM_ + {ID}&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dfaok5p0\"&gt;crm&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"smart-processy\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#smart-processy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Смарт-процессы&lt;/span&gt;&lt;/a&gt;Смарт-процессы&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-cinhjga9\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"dfj8hojw\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-add.html\"&gt;crm.type.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый смарт-процесс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-update.html\"&gt;crm.type.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет смарт-процесс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-get.html\"&gt;crm.type.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает смарт-процесс по id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-get-by-entity-type-id.html\"&gt;crm.type.getByEntityTypeId&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает смарт-процесс по entityTypeId&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-list.html\"&gt;crm.type.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список смарт-процессов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-delete.html\"&gt;crm.type.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет смарт-процесс&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/crm-type-fields.html\"&gt;crm.type.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля смарт-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"usvp96xh\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/events/type/on-crm-type-add.html\"&gt;onCrmTypeAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При создании смарт-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/events/type/on-crm-type-update.html\"&gt;onCrmTypeUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновлении смарт-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/events/type/on-crm-type-delete.html\"&gt;onCrmTypeDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении смарт-процесса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"elementy\"&gt;&lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#elementy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Элементы&lt;/span&gt;&lt;/a&gt;Элементы&lt;/h3&gt;\n&lt;p&gt;Идентификатор объекта CRM &lt;strong&gt;entityTypeId&lt;/strong&gt; — &lt;a href=\"api-reference/crm/universal/user-defined-object-types/index.html#id\"&gt;числовой идентификатор типа&lt;/a&gt;, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1nv83kzo\"&gt;128&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-ebqynsoc\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы-1\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события-1\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"qe02ukqj\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;crm.item.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый элемент&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-update.html\"&gt;crm.item.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет элемент&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-get.html\"&gt;crm.item.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элемент по Id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список элементов по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&
