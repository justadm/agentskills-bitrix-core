            {"data":{"leading":false,"html":"&lt;p&gt;Принадлежность поля к конкретной сущности определяется значением поля &lt;strong&gt;entityId&lt;/strong&gt;. Ниже приведены идентификаторы для разных сущностей:&lt;/p&gt;\n&lt;h2 id=\"crm\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/entity-id.html#crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;CRM&lt;/span&gt;&lt;/a&gt;CRM&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Лид – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xy2rexhd\"&gt;CRM_LEAD&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Контакт – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t3miuvgd\"&gt;CRM_CONTACT&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Компания – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q1mdnir7\"&gt;CRM_COMPANY&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Сделка – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s9egppxg\"&gt;CRM_DEAL&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Предложение – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-68q9kekz\"&gt;CRM_QUOTE&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Счет – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-754n0pyu\"&gt;CRM_INVOICE&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Смарт-процесс – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u2ofxw85\"&gt;CRM_ + {ID}&lt;/code&gt;, где ID - это идентификатор смарт-процесса (не идентификатор типа)&lt;/li&gt;\n&lt;li&gt;Новые счета – &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jpdiebcs\"&gt;CRM_SMART_INVOICE&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"rpa\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/entity-id.html#r
