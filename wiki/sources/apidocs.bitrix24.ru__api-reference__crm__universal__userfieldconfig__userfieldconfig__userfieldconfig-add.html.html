        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k8wzd2ze\"&gt;userfieldconfig, scope модуля&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"opisanie\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#opisanie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Описание&lt;/span&gt;&lt;/a&gt;Описание&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs http\"&gt;userfieldconfig.add({moduleId: string, field: {}})\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"21\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-21\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-21\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-21.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Метод добавит новое пользовательского поле.&lt;/p&gt;\n&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;moduleId&lt;sup&gt;*&lt;/sup&gt;&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Строковый идентификатор модуля.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;field&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Список с полями настройки нового поля:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/entity-id.html\"&gt;entityId&lt;sup&gt;*&lt;/sup&gt;&lt;/a&gt; - строковый идентификатор сущности.&lt;/li&gt;\n&lt;li&gt;fieldName&lt;sup&gt;*&lt;/sup&gt; - код поля. Должен быть сформирован по шаблону &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jlco6q4s\"&gt;UF_ + {идентификатор сущности} + _ + {произвольная строка в UPPER_CASE}&lt;/code&gt;. Код поля не может быть больше 50 символов.&lt;/li&gt;\n&lt;li&gt;userTypeId&lt;sup&gt;*&lt;/sup&gt; - строковый идентификатор &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-get-types.html\"&gt;типа поля&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;xmlId - внешний идентификатор.&lt;/li&gt;\n&lt;li&gt;sort - индекс сортировки.&lt;/li&gt;\n&lt;li&gt;multiple - флаг множественности (N или Y), по умолчанию N. Этот флаг можно указать только при создании поля.&lt;/li&gt;\n&lt;li&gt;mandatory - флаг обязательности (N или Y), по умолчанию N.&lt;/li&gt;\n&lt;li&gt;showFilter - флаг показа поля в фильтре (N или Y), по умолчанию N.&lt;/li&gt;\n&lt;li&gt;editInList - флаг разрешения редактирования поля в списке (N или Y), по умолчанию Y.&lt;/li&gt;\n&lt;li&gt;isSearchable - флаг наличия значения поля &lt;i class=\"yfm yfm-term_title\" term-key=\":ключ_индекс\" role=\"button\" aria-describedby=\":ключ_индекс_element\" tabindex=\"0\" id=\"r2c2m88q\"&gt;в полнотекстовом индексе&lt;/i&gt; (N или Y), по умолчанию N.&lt;/li&gt;\n&lt;li&gt;settings - список с дополнительными настройками поля.&lt;/li&gt;\n&lt;li&gt;editFormLabel - список с языкозависимыми названиями поля, где ключ - идентификатор языка, а значение - фраза.&lt;/li&gt;\n&lt;li&gt;enum - массив с вариантами значений для свойств типа \"список\":\n&lt;ul&gt;\n&lt;li&gt;value&lt;sup&gt;*&lt;/sup&gt; - значение варианта&lt;/li&gt;\n&lt;li&gt;def - флаг значения по умолчанию (N или Y), по умолчанию N. Только один может быть вариантом по умолчанию&lt;/li&gt;\n&lt;li&gt;sort - индекс сортировки. Если не задан, генерируется автоматически на основе порядка передачи вариантов значений&lt;/li&gt;\n&lt;li&gt;xmlId - внешний идентификатор варианта&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;pre&gt;&lt;code&gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;h2 id=\"vozvrashaemoe-znachenie-i-primer\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#vozvrashaemoe-znachenie-i-primer\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возвращаемое значение и пример&lt;/span&gt;&lt;/a&gt;Возвращаемое значение и пример&lt;/h2&gt;\n&lt;h3 id=\"vozvrashaemoe-znachenie\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#vozvrashaemoe-znachenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возвращаемое значение&lt;/span&gt;&lt;/a&gt;Возвращаемое значение&lt;/h3&gt;\n&lt;p&gt;Метод вернет такие же данные, как метод &lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-get.html\"&gt;userfieldconfig.get&lt;/a&gt; на только что созданном поле.&lt;/p&gt;\n&lt;h3 id=\"primery\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h3&gt;\n&lt;p&gt;Пример простого запроса. Этого запроса достаточно для создания поля типа \"строка\".&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"moduleId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"rpa\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"field\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"entityId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"RPA_1\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"fieldName\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"UF_RPA_1_NEW_REST_STRING\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"userTypeId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"string\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"185\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-185\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-185\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-185.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Создание поля типа \"список\"&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"moduleId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"rpa\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"field\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"entityId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"RPA_1\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"fieldName\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"UF_RPA_1_NEW_REST_STRING\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"userTypeId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"enumeration\"&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"189\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-189\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-189\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-189.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-user-field-to-spa.html\"&gt;Как создать пользовательское поле в смарт-процессе&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-precision-to-user-field.html\"&gt;Как настроить округление для пользовательского поля типа «Число»&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;dfn class=\"yfm yfm-term_dfn\" id=\":ключ_индекс_element\" role=\"dialog\"&gt;&lt;p&gt;Добавляйте в поиск только нужные поля. На построение индекса уходит время при изменении каждого значения поля, что может существенно замедлить работы при большом количестве таких полей.&lt;/p&gt;\n&lt;/dfn&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Описание","href":"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#opisanie","level":2},{"title":"Параметры","href":"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#parametry","level":2},{"title":"Возвращаемое значение и пример","href":"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#vozvrashaemoe-znachenie-i-primer","level":2,"items":[{"title":"Возвращаемое значение","href":"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-add.html#vozvrashaemoe-znachenie","level":3},{"title":"Примеры","href":"api-ref
