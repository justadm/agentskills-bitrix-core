        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zn1p3b12\"&gt;userfieldconfig, scope модуля&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs http\"&gt;userfieldconfig.update({moduleId: string, id: number, field: {}})\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"18\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-18\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-18\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-18.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Метод изменяет значение поля.&lt;/p&gt;\n&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-update.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;moduleId&lt;sup&gt;*&lt;/sup&gt;&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Строковый идентификатор модуля.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;id&lt;sup&gt;*&lt;/sup&gt;&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор настроек поля.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;field&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Список с полями настройки нового поля. Аналогично методу userfieldconfig.add, но:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;fieldName&lt;/strong&gt; - не может быть изменен&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;userTypeId&lt;/strong&gt; - не может быть изменен&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;entityId&lt;/strong&gt; - не может быть изменен&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;editInList&lt;/strong&gt; - не может быть изменен&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;multiple&lt;/strong&gt; - не может быть изменен&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;showInList&lt;/strong&gt; - не может быть изменен&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;isSearchable&lt;/strong&gt; - изменение этого флага не вызовет автоматическое перестроение поискового индекса. Перестроение происходит при изменении сущностей, к которым привязаны поля&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;enum&lt;/strong&gt; - полный список всех вариантов значений для свойства типа \"список\". Чтобы это поле учитывалось, в fields должен присутствовать &lt;strong&gt;userTypeId&lt;/strong&gt;\n&lt;ul&gt;\n&lt;li&gt;id - идентификатор варианта. Должен присутствовать, если надо обновить вариант&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Будьте внимательны при работе с вариантами значений для списков.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vozvrashaemoe-znachenie-i-primer\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-update.html#vozvrashaemoe-znachenie-i-primer\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Возвращаемое значение и пример&lt;/span&gt;&lt;/a&gt;Возвращаемое значение и пример&lt;/h2&gt;\n&lt;p&gt;Метод вернет такие же данные, как метод userfieldconfig.get на измененном поле.&lt;/p&gt;\n&lt;h3 id=\"primery\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-update.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h3&gt;\n&lt;p&gt;Обновление флагов и языковых фраз, без изменения вариантов значений&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"moduleId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"rpa\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;170&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"field\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"mandatory\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Y\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"editFormLabel\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"ru\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Новое название поля\"&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;    \n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"165\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-165\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-165\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-165.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Пример удаление всех вариантов значений.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"moduleId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"rpa\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;170&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"field\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"userTypeId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"enumeration\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"enum\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;&lt;span class=\"hljs-string\"&gt;\"\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;    \n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"169\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-169\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-169\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-169.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Пример частичного обновления вариантов значений.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"moduleId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"rpa\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;170&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"field\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"userTypeId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"enumeration\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"enum\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;29&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"value\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Старое значение\"&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;30&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"value\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Обновленное значение\"&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"value\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Новое значение\"&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;    \n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"173\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-173\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-173\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-173.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В этом примере:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Вариант значения с id=29 останется без изменений&lt;/li&gt;\n&lt;li&gt;У варианта с id=30 поменяется значение&lt;/li&gt;\n&lt;li&gt;Добавится новый вариант \"Новое значение\"&lt;/li&gt;\n&lt;li&gt;Все остальные варианты будут удалены. Если передавать в запросе только id варианта без значения value — вариант будет удален&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/crm/universal/userfieldconfig/userfieldconfig/userfieldconfig-update.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/crm/how-to-add-crm-objects/how-to-add-precision-to-user-field.html\"&gt;Как настроить округление для пользовательского поля типа «Число»&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_a
