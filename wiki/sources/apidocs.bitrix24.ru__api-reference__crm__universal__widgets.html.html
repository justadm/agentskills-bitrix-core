            {"data":{"leading":false,"html":"&lt;p&gt;Виджеты позволяют встраивать собственный функционал прямо в интерфейс Битрикс24. Мы уже описывали этот механизм в разделе &lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;В отличие от обычных мест для встройки виджетов (например, в сделках), в случае пользовательских типов объектов CRM нужно учитывать, что эти места становятся доступными только после добавления в Битрикс24 конкретных пользовательских типов.&lt;/p&gt;\n&lt;p&gt;Идентификаторы этих типов используются в символьных кодах мест встройки виджетов. Предположим, что в Битрикс24 добавлен пользовательских тип «Поставщики» и идентификатор этого пользовательскиого типа объектов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oiu0e9fr\"&gt;131&lt;/code&gt;. В этом случае нам для встройки виджетов будут доступны следующие места:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;закладка в детальной карточке элемента по коду &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dxzfg0b5\"&gt;CRM_SMART_131_DETAIL_TAB&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;кнопка &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cgdeprq4\"&gt;timeline&lt;/code&gt; в карточке элемента по коду &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-oex424vv\"&gt;CRM_SMART_131_DETAIL_ACTIVITY&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"vidzhety-crm\"&gt;&lt;a href=\"api-reference/crm/universal/widgets.html#vidzhety-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты CRM&lt;/span&gt;&lt;/a&gt;Виджеты CRM&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/index.html\"&gt;Пункт контекстного меню в списке элементов CRM_XXX_LIST_MENU, CRM_DYNAMIC_XXX_LIST_MENU&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/list-toolbar.html\"&gt;Пункт выпадающего меню над списком элементов CRM_XXX_LIST_TOOLBAR, CRM_DYNAMIC_XXX_LIST_TOOLBAR&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/detail-tab.html\"&gt;Вкладка в детальной карточке элемента CRM CRM_XXX_DETAIL_TAB, CRM_DYNAMIC_XXX_DETAIL_TAB&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/detail-activity.html\"&gt;Кнопка над таймлайном карточки элемента CRM_XXX_DETAIL_ACTIVITY, CRM_DYNAMIC_XXX_DETAIL_ACTIVITY&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/detail-toolbar.html\"&gt;Пункт выпадающего меню верхней кнопки карточки элемента CRM_XXX_DETAIL_TOOLBAR, CRM_DYNAMIC_XXX_DETAIL_TOOLBAR&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/activity-timeline-menu.html\"&gt;Пункт контекстного меню дела в карточке элемента CRM_XXX_ACTIVITY_TIMELINE_MENU, CRM_DYNAMIC_XXX_ACTIVITY_TIMELINE_MENU&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/document-generator-button.html\"&gt;Пункт выпадающего меню генератора документов CRM_XXX_DOCUMENTGENERATOR_BUTTON&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/robot-designer-toolbar.html\"&gt;Пункт выпадающего меню верхней кнопки дизайнера роботов CRM_XXX_ROBOT_DESIGNER_TOOLBAR&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/funnels-toolbar.html\"&gt;Пункт выпадающего меню в туннелях продаж CRM_FUNNELS_TOOLBAR&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/analytics-menu.html\"&gt;Пункт левого меню CRM-аналитики CRM_ANALYTICS_MENU&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/crm/analytics-toolbar.html\"&gt;Пункт выпадающего меню верхней кнопки CRM-аналитики CRM_ANALYTICS_TOOLBAR&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Виджеты CRM","href":"api-reference/crm/universal/widgets.html#vidzhety-crm","level":2}],"title":"Виджеты, встраиваемые в интерфейс объектов пользовательских типов CRM"},"router":{"pathname":"api-reference/crm/universal/widgets","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
