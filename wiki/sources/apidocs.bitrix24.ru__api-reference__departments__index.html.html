            {"data":{"leading":false,"html":"&lt;p&gt;Структура компании показывает иерархию подразделений, из которых состоит организация. В каждом подразделении указаны руководители, заместители и подчиненные.&lt;/p&gt;\n&lt;p&gt;Технически структура компании — это информационный блок, а подразделения — разделы инфоблока. Получить перечень подразделений можно методом &lt;a href=\"api-reference/departments/department-get.html\"&gt;department.get&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/departments/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/23039004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Структура компании&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-podrazdelenij-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/departments/index.html#svyaz-podrazdelenij-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь подразделений с другими объектами&lt;/span&gt;&lt;/a&gt;Связь подразделений с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. Руководители связаны с подразделениями числовым идентификатором в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4go2yxgw\"&gt;UF_HEAD&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"dejstviya-s-podrazdeleniyami\"&gt;&lt;a href=\"api-reference/departments/index.html#dejstviya-s-podrazdeleniyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Действия с подразделениями&lt;/span&gt;&lt;/a&gt;Действия с подразделениями&lt;/h2&gt;\n&lt;p&gt;Подразделения компании можно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;создать с помощью метода &lt;a href=\"api-reference/departments/department-add.html\"&gt;department.add&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;изменить, в том числе и переместить, методом &lt;a href=\"api-reference/departments/department-update.html\"&gt;department.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;удалить методом &lt;a href=\"api-reference/departments/department-delete.html\"&gt;department.delete&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/23238334/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать и изменить отдел в структуре компании&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/departments/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dkzohyxt\"&gt;department&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/departments/department-add.html\"&gt;department.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создать подразделение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/departments/department-update.html\"&gt;department.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменить подразделение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/departments/department-get.html\"&gt;department.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список подразделений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/departments/department-fields.html\"&gt;department.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить справочник полей подразделения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/departments/department-delete.html\"&gt;department.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить подразделение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь подразделений с другими объектами","href":"api-reference/departments/index.html#svyaz-podrazdelenij-s-drugimi-obuektami","level":2},{"title":"Действия с подразделениями","href":"api-reference/departments/index.html#dejstviya-s-podrazdeleniyami","level":2},{"title":"Обзор методов","href":"api-reference/departments/index.html#all-methods","level":2}],"title":"Структура компании: обзор методов"},"router":{"pathname":"api-reference/departments/index","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
