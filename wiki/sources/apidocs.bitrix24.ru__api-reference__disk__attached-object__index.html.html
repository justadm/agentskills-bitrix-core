        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Прикрепленный файл связывает документ из Диска с другими объектами Битрикс24. Эта связь обеспечивает доступ к файлу из разных модулей системы.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/disk/attached-object/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"osobennosti-raboty-s-prikreplennymi-fajlami\"&gt;&lt;a href=\"api-reference/disk/attached-object/index.html#osobennosti-raboty-s-prikreplennymi-fajlami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности работы с прикрепленными файлами&lt;/span&gt;&lt;/a&gt;Особенности работы с прикрепленными файлами&lt;/h2&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2w0ds6j7\"&gt;disk.attachedObject.get&lt;/code&gt; работает с записью о прикреплении файла к конкретному объекту, а не с самим файлом. Представьте, что у вас есть файл &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a3p1oj9k\"&gt;report.docx&lt;/code&gt; на Диске. Когда вы прикрепляете его к задаче и к комментарию в ленте, создаются две разные записи о прикреплении с разными идентификаторами, но обе ссылаются на один и тот же файл.&lt;/p&gt;\n&lt;p&gt;Для получения идентификатора связи необходимо использовать методы, которые возвращают прикрепленные файлы в рамках конкретных объектов. Например, при работе с задачами идентификатор связи можно получить через метод &lt;a href=\"api-reference/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/disk/attached-object/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Файлы можно прикрепить к делам и коммерческим предложениям. За работу с делами отвечает группа методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;, за работу с предложениями — &lt;a href=\"api-reference/crm/quote/index.html\"&gt;crm.quote.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Бизнес-процессы.&lt;/strong&gt; Можно запустить для документов общего диска. Управление бизнес-процессами выполняется методами &lt;a href=\"api-reference/bizproc/index.html\"&gt;bizproc.workflow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Задачи.&lt;/strong&gt; Файлы прикрепляются к описанию задачи. Все участники задачи могут просматривать, редактировать и скачивать прикрепленные файлы. Работать с задачами необходимо через методы группы &lt;a href=\"api-reference/tasks/index.html\"&gt;tasks.task.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Календарь.&lt;/strong&gt; Файлы добавляются к событию и становятся доступными всем участникам. Получить информацию о событии можно с помощью методов &lt;a href=\"api-reference/calendar/index.html\"&gt;calendar.event.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Лента новостей.&lt;/strong&gt; Файлы прикрепляются к сообщениям и комментариям. Метод &lt;a href=\"api-reference/log/log-blogpost-get.html\"&gt;log.blogpost.get&lt;/a&gt; возвращает список сообщений, а метод &lt;a href=\"api-reference/log/blogcomment/log-blogcomment-user-get.html\"&gt;log.blogcomment.user.get&lt;/a&gt; — список комментариев.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Почта.&lt;/strong&gt; Вложения из писем сохраняются на Диске. С письмами можно работать только через интерфейс Битрикс24. Если письмо сохранено в CRM, то с вложениями можно взаимодействовать методами &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt; через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vt76b4eu\"&gt;FILES&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Универсальные списки.&lt;/strong&gt; Элементы списка связаны с Диском через &lt;a href=\"api-reference/lists/fields/index.html\"&gt;поле&lt;/a&gt; типа Файл (Диск). Получить параметры элемента можно с помощью метода &lt;a href=\"api-reference/lists/elements/lists-element-get.html\"&gt;lists.element.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чаты.&lt;/strong&gt; Пользователи могут обмениваться документами, фото, видео и аудио. Файлы можно просматривать и скачивать, а документы — редактировать без скачивания. Прикрепленные файлы доступны всем участникам чата. Метод &lt;a href=\"api-reference/chats/messages/im-dialog-messages-get.html\"&gt;im.dialog.messages.get&lt;/a&gt; возвращает список последних сообщений.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-szk2vrda\"&gt;disk&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: пользователь с правом «Чтение» для нужного файла&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/attached-object/disk-attached-object-get.html\"&gt;disk.attachedObject.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает информацию о прикрепленном файле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js
