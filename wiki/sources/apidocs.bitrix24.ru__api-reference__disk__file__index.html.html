            {"data":{"leading":false,"html":"&lt;p&gt;На Диске можно хранить текстовые документы, таблицы, презентации, изображения и другую информацию. Пользователи могут загружать, редактировать, копировать файлы и настраивать права доступа к ним.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/disk/file/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-upravlyat-fajlami\"&gt;&lt;a href=\"api-reference/disk/file/index.html#kak-upravlyat-fajlami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как управлять файлами&lt;/span&gt;&lt;/a&gt;Как управлять файлами&lt;/h2&gt;\n&lt;p&gt;Новый файл нужно загружать методом &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt; в папку по ее идентификатору.&lt;/p&gt;\n&lt;p&gt;Вы можете изменить расположение файлов в структуре Диска: переместить с помощью метода &lt;a href=\"api-reference/disk/file/disk-file-move-to.html\"&gt;disk.file.moveto&lt;/a&gt; или скопировать в другие папки методом &lt;a href=\"api-reference/disk/file/disk-file-copy-to.html\"&gt;disk.file.copyto&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Получить значения полей файла можно методом &lt;a href=\"api-reference/disk/file/disk-file-get.html\"&gt;disk.file.get&lt;/a&gt;. Например, чтобы узнать, перемещен файл в корзину или нет.&lt;/p&gt;\n&lt;p&gt;Изменить название файла позволяет метод &lt;a href=\"api-reference/disk/file/disk-file-rename.html\"&gt;disk.file.rename&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/20338924/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Документы Онлайн: начало работы&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19629424/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как работать с документами на диске Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/20962214/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как заблокировать документ на диске&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"versii-fajlov\"&gt;&lt;a href=\"api-reference/disk/file/index.html#versii-fajlov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Версии файлов&lt;/span&gt;&lt;/a&gt;Версии файлов&lt;/h2&gt;\n&lt;p&gt;Список версий файла можно получить с помощью метода &lt;a href=\"api-reference/disk/file/disk-file-get-versions.html\"&gt;disk.file.getVersions&lt;/a&gt;. Метод использует идентификатор файла в качестве параметра.&lt;/p&gt;\n&lt;p&gt;Чтобы получить информацию о версии, используйте метод &lt;a href=\"api-reference/disk/version/disk-version-get.html\"&gt;disk.version.get&lt;/a&gt;. Метод принимает параметр с идентификатором версии, а не файла.&lt;/p&gt;\n&lt;p&gt;Инструменты Диска позволяют восстановить нужную версию файла. Это выполняется с помощью метода &lt;a href=\"api-reference/disk/file/disk-file-restore-from-version.html\"&gt;disk.file.restoreFromVersion&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Новую версию файла можно загрузить методом &lt;a href=\"api-reference/disk/file/disk-file-upload-version.html\"&gt;disk.file.uploadversion&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18869612/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Сколько хранятся версии документа на Диске&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"dostup-vneshnemu-polzovatelyu\"&gt;&lt;a href=\"api-reference/disk/file/index.html#dostup-vneshnemu-polzovatelyu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Доступ внешнему пользователю&lt;/span&gt;&lt;/a&gt;Доступ внешнему пользователю&lt;/h2&gt;\n&lt;p&gt;Чтобы предоставить доступ к файлу внешнему пользователю, нужно создать публичную ссылку. Это позволит поделиться файлом с людьми, не имеющими доступа к Битрикс24. Публичную ссылку для файла можно получить методом &lt;a href=\"api-reference/disk/file/disk-file-get-external-link.html\"&gt;disk.file.getExternalLink&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19096030/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как использовать публичные и внутренние ссылки на файлы в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-udalit-fajly\"&gt;&lt;a href=\"api-reference/disk/file/index.html#kak-udalit-fajly\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как удалить файлы&lt;/span&gt;&lt;/a&gt;Как удалить файлы&lt;/h2&gt;\n&lt;p&gt;Файлы можно переместить в корзину методом &lt;a href=\"api-reference/disk/file/disk-file-mark-deleted.html\"&gt;disk.file.markdeleted&lt;/a&gt;. Удаленные файлы можно восстановить с помощью метода &lt;a href=\"api-reference/disk/file/disk-file-restore.html\"&gt;disk.file.restore&lt;/a&gt; в течение 30 дней.&lt;/p&gt;\n&lt;p&gt;Чтобы полностью удалить файл без возможности восстановления, нужно использовать метод &lt;a href=\"api-reference/disk/file/disk-file-delete.html\"&gt;disk.file.delete&lt;/a&gt;. Он уничтожит файл навсегда.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19312292/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Корзина на диске в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/disk/file/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hiddw8dc\"&gt;disk&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-get-fields.html\"&gt;disk.file.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей файла&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-get.html\"&gt;disk.file.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает файл по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-rename.html\"&gt;disk.file.rename&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переименовывает файл&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-copy-to.html\"&gt;disk.file.copyto&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Копирует файл в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-move-to.html\"&gt;disk.file.moveto&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает файл в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-delete.html\"&gt;disk.file.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет файл навсегда&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-mark-deleted.html\"&gt;disk.file.markdeleted&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает файл в корзину&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-restore.html\"&gt;disk.file.restore&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Восстанавливает файл из корзины&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-upload-version.html\"&gt;disk.file.uploadversion&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Загружает новую версию файла&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-get-versions.html\"&gt;disk.file.getVersions&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список версий файла&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-restore-from-version.html\"&gt;disk.file.restoreFromVersion&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Восстанавливает файл из конкретной версии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/file/disk-file-get-external-link.html\"&gt;disk.file.getExternalLink&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает публичную ссылку на файл&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как управлять файлами","href":"api-reference/disk/file/index.html#kak-upravlyat-fajlami","level":2},{"title":"Версии файлов","href":"api-reference/disk/file/index.html#versii-fajlov","level":2},{"title":"Доступ внешнему пользователю","href":"api-reference/disk/file/index.html#dostup-vneshnemu-polzovatelyu","level":2},{"title":"Как удалить файлы","href":"api-reference/disk/file/index.html#kak-udalit-fajly","level":2},{"title":"Обзор методов","href":"api-reference/disk/file/index.html#all-methods","level":2}],"title":"Файлы Диска: обзор методов"},"router":{"pathname":"api-reference/disk/file/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
