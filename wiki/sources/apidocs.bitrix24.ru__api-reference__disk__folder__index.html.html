            {"data":{"leading":false,"html":"&lt;p&gt;Папки в Битрикс24 Диск позволяют создавать логическую структуру для хранения файлов, например по типам документов, дате или клиентам. Это облегчает поиск и доступ к нужной информации.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/disk/folder/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"struktura-papok\"&gt;&lt;a href=\"api-reference/disk/folder/index.html#struktura-papok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Структура папок&lt;/span&gt;&lt;/a&gt;Структура папок&lt;/h2&gt;\n&lt;p&gt;Папки на Диске организованы иерархически. Каждая папка может содержать вложенные папки и файлы. Список файлов и подпапок можно получить с помощью метода &lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Новую папку можно создать с помощью метода &lt;a href=\"api-reference/disk/folder/disk-folder-add-subfolder.html\"&gt;disk.folder.addsubfolder&lt;/a&gt;, а файл загрузить методом &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Родительские и дочерние папки связаны через параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tmuwoclp\"&gt;PARENT_ID&lt;/code&gt;. Получить его можно методом &lt;a href=\"api-reference/disk/folder/disk-folder-get.html\"&gt;disk.folder.get&lt;/a&gt;. Помимо &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bq63m2b7\"&gt;PARENT_ID&lt;/code&gt;, метод вернет все параметры папки по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-aydg85sx\"&gt;id&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"operacii-s-papkami\"&gt;&lt;a href=\"api-reference/disk/folder/index.html#operacii-s-papkami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Операции с папками&lt;/span&gt;&lt;/a&gt;Операции с папками&lt;/h2&gt;\n&lt;p&gt;С папками Диска можно выполнить следующие операции:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;назначить права доступа методом &lt;a href=\"api-reference/disk/folder/disk-folder-share-to-user.html\"&gt;disk.folder.sharetouser&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;переместить по структуре с помощью метода &lt;a href=\"api-reference/disk/folder/disk-folder-move-to.html\"&gt;disk.folder.moveto&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;скопировать в другие папки Диска методом &lt;a href=\"api-reference/disk/folder/disk-folder-copy-to.html\"&gt;disk.folder.copyto&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;изменить название методом &lt;a href=\"api-reference/disk/folder/disk-folder-rename.html\"&gt;disk.folder.rename&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"dostup-vneshnemu-polzovatelyu\"&gt;&lt;a href=\"api-reference/disk/folder/index.html#dostup-vneshnemu-polzovatelyu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Доступ внешнему пользователю&lt;/span&gt;&lt;/a&gt;Доступ внешнему пользователю&lt;/h2&gt;\n&lt;p&gt;Чтобы предоставить доступ внешнему пользователю к папке, нужно создать публичную ссылку. Это позволит поделиться содержимым папки с людьми, не имеющими доступа к Битрикс24. Публичную ссылку для папки можно получить методом &lt;a href=\"api-reference/disk/folder/disk-folder-get-external-link.html\"&gt;disk.folder.getexternallink&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-udalit-papki\"&gt;&lt;a href=\"api-reference/disk/folder/index.html#kak-udalit-papki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как удалить папки&lt;/span&gt;&lt;/a&gt;Как удалить папки&lt;/h2&gt;\n&lt;p&gt;Папки можно переместить в корзину методом &lt;a href=\"api-reference/disk/folder/disk-folder-mark-deleted.html\"&gt;disk.folder.markdeleted&lt;/a&gt;. Удаленные папки можно восстановить с помощью метода &lt;a href=\"api-reference/disk/folder/disk-folder-restore.html\"&gt;disk.folder.restore&lt;/a&gt; в течение 30 дней.&lt;/p&gt;\n&lt;p&gt;Чтобы полностью удалить папку без возможности восстановления, нужно использовать метод &lt;a href=\"api-reference/disk/folder/disk-folder-delete-tree.html\"&gt;disk.folder.deletetree&lt;/a&gt;. Он уничтожит папку со всеми вложенными папками и файлами навсегда.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19312292/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Корзина на диске в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/disk/folder/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xrv3ukyj\"&gt;disk&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-fields.html\"&gt;disk.folder.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей папки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get.html\"&gt;disk.folder.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает папку по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список файлов и папок, которые находятся в папке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-add-subfolder.html\"&gt;disk.folder.addsubfolder&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает дочернюю папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-share-to-user.html\"&gt;disk.folder.sharetouser&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Назначает права доступа на папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-copy-to.html\"&gt;disk.folder.copyto&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Копирует папку в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-move-to.html\"&gt;disk.folder.moveto&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает папку в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-rename.html\"&gt;disk.folder.rename&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переименовывает папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-delete-tree.html\"&gt;disk.folder.deletetree&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет папку и все ее содержимое навсегда&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-mark-deleted.html\"&gt;disk.folder.markdeleted&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает папку в корзину&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-restore.html\"&gt;disk.folder.restore&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Восстанавливает папку из корзины&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Загружает новый файл в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-external-link.html\"&gt;disk.folder.getexternallink&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает публичную ссылку на папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Структура папок","href":"api-reference/disk/folder/index.html#struktura-papok","level":2},{"title":"Операции с папками","href":"api-reference/disk/folder/index.html#operacii-s-papkami","level":2},{"title":"Доступ внешнему пользователю","href":"api-reference/disk/folder/index.html#dostup-vneshnemu-polzovatelyu","level":2},{"title":"Как удалить папки","href":"api-reference/disk/folder/index.html#kak-udalit-papki","level":2},{"title":"Обзор методов","href":"api-reference/disk/folder/index.html#all-methods","level":2}],"title":"Папки Диска: обзор ме
