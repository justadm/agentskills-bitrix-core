            {"data":{"leading":false,"html":"&lt;p&gt;Диск — это инструмент для работы с файлами. Он позволяет:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;хранить документы компании и личные файлы&lt;/li&gt;\n&lt;li&gt;загружать, редактировать документы и просматривать историю изменений&lt;/li&gt;\n&lt;li&gt;настраивать права доступа к файлам и папкам&lt;/li&gt;\n&lt;li&gt;делиться файлами через публичные ссылки с внешними пользователями&lt;/li&gt;\n&lt;li&gt;синхронизировать файлы с компьютером&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Диск интегрирован с Задачами, Чатами, CRM, Рабочими группами и другими инструментами Битрикс24. Это упрощает работу за счет быстрого доступа к файлам, совместной работы над ними и автоматизации документооборота.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/disk/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/20811344/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Диск&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"hranilisha-diska\"&gt;&lt;a href=\"api-reference/disk/index.html#hranilisha-diska\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Хранилища Диска&lt;/span&gt;&lt;/a&gt;Хранилища Диска&lt;/h2&gt;\n&lt;p&gt;Есть три вида хранилищ:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;личные хранилища пользователей&lt;/li&gt;\n&lt;li&gt;общее хранилище компании&lt;/li&gt;\n&lt;li&gt;хранилища рабочих групп&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Хранилищами можно управлять с помощью группы методов &lt;a href=\"api-reference/disk/storage/index.html\"&gt;disk.storage.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18634620/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Что хранится на Моем диске в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19228208/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Общий диск в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"rabota-s-papkami-i-fajlami\"&gt;&lt;a href=\"api-reference/disk/index.html#rabota-s-papkami-i-fajlami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с папками и файлами&lt;/span&gt;&lt;/a&gt;Работа с папками и файлами&lt;/h2&gt;\n&lt;p&gt;Папки и файлы можно создавать, перемещать, удалять, а также изменять права доступа  к ним. Для этого используйте группы методов &lt;a href=\"api-reference/disk/folder/index.html\"&gt;disk.folder.*&lt;/a&gt; и &lt;a href=\"api-reference/disk/file/index.html\"&gt;disk.file.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Узнать версию файла можно с помощью метода &lt;a href=\"api-reference/disk/version/disk-version-get.html\"&gt;disk.version.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/20338924/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Документы Онлайн: начало работы&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19492254/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Права доступа к Моему диску в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18869612/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Сколько хранятся версии документа на Диске&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"diskconnection\"&gt;&lt;a href=\"api-reference/disk/index.html#diskconnection\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь Диска с другими объектами&lt;/span&gt;&lt;/a&gt;Связь Диска с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Файлы можно прикрепить к делам и коммерческим предложениям. За работу с делами отвечает группа методов &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt;, за работу с предложениями — &lt;a href=\"api-reference/crm/quote/index.html\"&gt;crm.quote.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Бизнес-процессы.&lt;/strong&gt; Можно запустить для документов общего диска. Управление бизнес-процессами выполняется методами &lt;a href=\"api-reference/bizproc/index.html\"&gt;bizproc.workflow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Задачи.&lt;/strong&gt; Файлы прикрепляются к описанию задачи. Все участники задачи могут просматривать, редактировать и скачивать прикрепленные файлы. Работать с задачами необходимо через методы &lt;a href=\"api-reference/tasks/index.html\"&gt;tasks.task.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Календарь.&lt;/strong&gt; Файлы добавляются к событию и становятся доступными всем участникам. Создать и изменить событие можно с помощью методов &lt;a href=\"api-reference/calendar/index.html\"&gt;calendar.event.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Лента новостей.&lt;/strong&gt; Файлы прикрепляются к сообщениям и комментариям. Метод &lt;a href=\"api-reference/log/log-blogpost-add.html\"&gt;log.blogpost.add&lt;/a&gt; создает новое сообщение, а метод &lt;a href=\"api-reference/log/blogcomment/log-blogcomment-add.html\"&gt;log.blogcomment.add&lt;/a&gt; — новый комментарий.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Почта.&lt;/strong&gt; Вложения из писем сохраняются на Диске. С письмами можно работать только через интерфейс Битрикс24. Если письмо сохранено в CRM, то с вложениями можно взаимодействовать методами &lt;a href=\"api-reference/crm/timeline/activities/index.html\"&gt;crm.activity.*&lt;/a&gt; через поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i0o6e0qc\"&gt;FILES&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Рабочие группы и проекты.&lt;/strong&gt; Диск интегрирован &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;в рабочие группы и проекты&lt;/a&gt;, для каждого из них есть отдельное хранилище.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Универсальные списки.&lt;/strong&gt; Элементы списка связаны с Диском через &lt;a href=\"api-reference/lists/fields/index.html\"&gt;поле&lt;/a&gt; типа Файл (Диск). Создать и изменить элемент можно с помощью методов &lt;a href=\"api-reference/lists/elements/index.html\"&gt;lists.element.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чаты.&lt;/strong&gt; Пользователи могут обмениваться документами, фото, видео и аудио. Файлы можно просматривать и скачивать, а документы — редактировать в чате без скачивания. Прикрепленные файлы доступны всем участникам чата. Метод &lt;a href=\"api-reference/chats/messages/im-message-add.html\"&gt;im.message.add&lt;/a&gt; отправляет сообщение с файлом в чат.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/20703790/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Бизнес-процессы на диске в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/16697770/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Диск в группах и проектах&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19545084/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как загрузить файл из облачного хранилища в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19096030/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как использовать публичные и внутренние ссылки на файлы в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/disk/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6dy7po4a\"&gt;disk&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"versiya\"&gt;&lt;a href=\"api-reference/disk/index.html#versiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Версия&lt;/span&gt;&lt;/a&gt;Версия&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/version/disk-version-get.html\"&gt;disk.version.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает версию по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"papka\"&gt;&lt;a href=\"api-reference/disk/index.html#papka\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Папка&lt;/span&gt;&lt;/a&gt;Папка&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-fields.html\"&gt;disk.folder.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей папки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get.html\"&gt;disk.folder.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает папку по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список файлов и папок, которые находятся в папке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-add-subfolder.html\"&gt;disk.folder.addsubfolder&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает дочернюю папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-share-to-user.html\"&gt;disk.folder.sharetouser&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Назначает права доступа на папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-copy-to.html\"&gt;disk.folder.copyto&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Копирует папку в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-move-to.html\"&gt;disk.folder.moveto&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает папку в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-rename.html\"&gt;disk.folder.rename&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переименовывает папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-delete-tree.html\"&gt;disk.folder.deletetree&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет папку и все ее содержимое навсегда&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-mark-deleted.html\"&gt;disk.folder.markdeleted&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает папку в корзину&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-restore.html\"&gt;disk.folder.restore&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Восстанавливает папку из корзины&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Загружает новый файл в указанную папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-external-link.html\"&gt;disk.folder.getexternallink&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает публичную ссылку на папку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"prava-dostupa\"&gt;&lt;a href=\"api-reference/disk/index.html#prava-dostupa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Права доступа&lt;/span&gt;&lt;/a&gt;Права доступа&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/rights/disk-rights-get-tasks.html\"&gt;disk.rights.getTasks&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Позволяет получить список уровней доступов, которые можно использовать в назначении прав&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"prikreplennyj-fajl\"&gt;&lt;a hre
