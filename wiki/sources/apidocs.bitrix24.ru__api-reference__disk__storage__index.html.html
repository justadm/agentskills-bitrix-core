            {"data":{"leading":false,"html":"&lt;p&gt;Хранилище — это Диск в Битрикс24, где можно хранить документы и файлы, создавать папки и получать списки содержимого.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/disk/storage/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tipy-hranilish\"&gt;&lt;a href=\"api-reference/disk/storage/index.html#tipy-hranilish\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы хранилищ&lt;/span&gt;&lt;/a&gt;Типы хранилищ&lt;/h2&gt;\n&lt;p&gt;В Битрикс24 есть три типа хранилищ:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Мой диск — личное хранилище пользователя&lt;/li&gt;\n&lt;li&gt;Общий диск — хранилище компании&lt;/li&gt;\n&lt;li&gt;Диск группы — хранилище рабочей группы&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Получить список типов хранилищ можно методом &lt;a href=\"api-reference/disk/storage/disk-storage-get-types.html\"&gt;disk.storage.gettypes&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18634620/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Что хранится на Моем диске в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/19228208/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Общий диск в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-poluchit-opisanie-hranilisha\"&gt;&lt;a href=\"api-reference/disk/storage/index.html#kak-poluchit-opisanie-hranilisha\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как получить описание хранилища&lt;/span&gt;&lt;/a&gt;Как получить описание хранилища&lt;/h2&gt;\n&lt;p&gt;Для работы с хранилищем нужен его идентификатор.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Получите список доступных хранилищ методом &lt;a href=\"api-reference/disk/storage/disk-storage-get-list.html\"&gt;disk.storage.getlist&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Найдите в списке нужное хранилище и используйте его &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bw8y52lz\"&gt;ID&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;Получите параметры хранилища методом &lt;a href=\"api-reference/disk/storage/disk-storage-get.html\"&gt;disk.storage.get&lt;/a&gt;.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Описание всех полей хранилища возвращает метод &lt;a href=\"api-reference/disk/storage/disk-storage-get-fields.html\"&gt;disk.storage.getfields&lt;/a&gt;. Для работы с хранилищем приложения используйте метод &lt;a href=\"api-reference/disk/storage/disk-storage-get-for-app.html\"&gt;disk.storage.getforapp&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"rabota-s-soderzhimym-hranilisha\"&gt;&lt;a href=\"api-reference/disk/storage/index.html#rabota-s-soderzhimym-hranilisha\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с содержимым хранилища&lt;/span&gt;&lt;/a&gt;Работа с содержимым хранилища&lt;/h2&gt;\n&lt;p&gt;В корне хранилища можно выполнить следующие операции:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;получить список файлов и папок методом &lt;a href=\"api-reference/disk/storage/disk-storage-get-children.html\"&gt;disk.storage.getchildren&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;создать папку с помощью метода &lt;a href=\"api-reference/disk/storage/disk-storage-add-folder.html\"&gt;disk.storage.addfolder&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;загрузить файл методом &lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для работы с вложенными папками и файлами используйте методы &lt;a href=\"api-reference/disk/folder/index.html\"&gt;disk.folder.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-pereimenovat-hranilishe\"&gt;&lt;a href=\"api-reference/disk/storage/index.html#kak-pereimenovat-hranilishe\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как переименовать хранилище&lt;/span&gt;&lt;/a&gt;Как переименовать хранилище&lt;/h2&gt;\n&lt;p&gt;Переименовать можно только хранилище приложения — для этого используйте метод &lt;a href=\"api-reference/disk/storage/disk-storage-rename.html\"&gt;disk.storage.rename&lt;/a&gt;. Личные, общие и групповые хранилища переименовать нельзя.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/disk/storage/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y5dsw0zq\"&gt;disk&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-fields.html\"&gt;disk.storage.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание полей хранилища&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get.html\"&gt;disk.storage.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает хранилище по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-rename.html\"&gt;disk.storage.rename&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переименовывает хранилище приложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-list.html\"&gt;disk.storage.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список доступных хранилищ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-types.html\"&gt;disk.storage.gettypes&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список типов хранилищ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-add-folder.html\"&gt;disk.storage.addfolder&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает папку в корне хранилища&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-children.html\"&gt;disk.storage.getchildren&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список файлов и папок, которые находятся в корне хранилища&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Загружает новый файл в корень хранилища&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-for-app.html\"&gt;disk.storage.getforapp&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает описание хранилища приложения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Типы хранилищ","href":"api-reference/disk/storage/index.html#tipy-hranilish","level":2},{"title":"Как получить описание хранилища","href":"api-reference/disk/storage/index.html#kak-poluchit-opisanie-hranilisha","level":2},{"title":"Работа с содержимым хранилища","href":"api-reference/disk/storage/index.html#rabota-s-soderzhimym-hranilisha","level":2},{"title":"Как переименовать хранилище","href":"api-reference/disk/storage/index.html#kak-pereimenovat-hranilishe","level":2},{"title":"Обзор методов","href":"api-reference/disk/storage/index.html#all-methods","level":2}],"title":"Хранилища Диска: обзор методов"},"router":{"pathname":"api-reference/disk/storage/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
