        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Версия файла — это сохраненный снимок файла на определенный момент времени. При изменении файла система создает новую версию. Это позволяет отслеживать историю изменений и восстанавливать файлы до нужного состояния.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/disk/version/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/18869612/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Сколько хранятся версии документа на Диске&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"poryadok-raboty-s-versiyami-fajlov\"&gt;&lt;a href=\"api-reference/disk/version/index.html#poryadok-raboty-s-versiyami-fajlov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Порядок работы с версиями файлов&lt;/span&gt;&lt;/a&gt;Порядок работы с версиями файлов&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/disk/version/disk-version-get.html\"&gt;disk.version.get&lt;/a&gt; возвращает информацию о версии файла, включая ее размер, время создания, идентификатор пользователя, создавшего эту версию, а также временную ссылку для скачивания версии.&lt;/p&gt;\n&lt;p&gt;Чтобы получить данные о версии:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Запросите список версий файла методом &lt;a href=\"api-reference/disk/file/disk-file-get-versions.html\"&gt;disk.file.getVersions&lt;/a&gt;. В ответе вы получите массив с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pnfef6pw\"&gt;ID&lt;/code&gt; всех доступных версий.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Используйте нужный &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vdjic4cw\"&gt;ID&lt;/code&gt; как параметр в методе &lt;a href=\"api-reference/disk/version/disk-version-get.html\"&gt;disk.version.get&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/disk/version/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-32vjrnys\"&gt;disk&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: пользователь с правом «Чтение» для нужного файла&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/disk/version/disk-version-get.html\"&gt;disk.version.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает версию файла&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Порядок работы с версиями файлов","href":"api-reference/disk/version/index.html#poryadok-raboty-s-versiyami-fajlov","level":2},{"title":"Обзор методов","href":"api-reference/disk/version/index.html#all-methods","level":2}],"title":"Версия файла: обзор методов"},"router":{"pathname":"api-reference/disk/version/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled"
