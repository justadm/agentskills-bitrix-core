        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-av5kzrzc\"&gt;documentgenerator&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h05awnfv\"&gt;documentgenerator.document.add&lt;/code&gt; создает новый документ на основании шаблона.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;templateId&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;ID шаблона.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;value&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Внешний идентификатор. Параметр value нужен только для интерфейса приложения, как идентификатор внешнего источника. Это строковый параметр, в него можно передать полноценный внешний код. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-os6emjk3\"&gt;\"PARTNER_APP_10_BILL_133”&lt;/code&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;values&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Набор значений полей документа. В простом случае это одномерный массив, где ключ - название поля, а значение - строка для вставки в документ.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;stampsEnabled&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;1 (поставить), 0 (убрать) печати и подписи.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;fields&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Описание полей документа. Данный параметр - массив, где ключ - название поля, а значение - описание. Коды типов простых полей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;TYPE — тип поля;&lt;/li&gt;\n&lt;li&gt;FORMAT — формат;&lt;/li&gt;\n&lt;li&gt;PROVIDER — провайдер;&lt;/li&gt;\n&lt;li&gt;TITLE — заголовок;&lt;/li&gt;\n&lt;li&gt;IMAGE — изображение;&lt;/li&gt;\n&lt;li&gt;STAMP — печать / подпись;&lt;/li&gt;\n&lt;li&gt;DATE — дата / время;&lt;/li&gt;\n&lt;li&gt;NAME — имя;&lt;/li&gt;\n&lt;li&gt;PHONE — номер телефона.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-add.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;p&gt;Здесь можно посмотреть &lt;a href=\"api-reference/document-generator/examples/index.html\"&gt;примеры генерации документа&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"otvet-v-sluchae-uspeha\"&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-add.html#otvet-v-sluchae-uspeha\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ответ в случае успеха&lt;/span&gt;&lt;/a&gt;Ответ в случае успеха&lt;/h2&gt;\n&lt;p&gt;В случае успешного выполнения в результате придёт структура, аналогичная методу &lt;a href=\"api-reference/document-generator/document-generator-document-get.html\"&gt;documentgenerator.document.get()&lt;/a&gt; на новом документе.&lt;/p&gt;\n&lt;h2 id=\"pochemu-v-rezultate-documentadd-net-ssylki-na-pdf\"&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-add.html#pochemu-v-rezultate-documentadd-net-ssylki-na-pdf\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Почему в результате document.add нет ссылки на pdf&lt;/span&gt;&lt;/a&gt;Почему в результате document.add нет ссылки на pdf&lt;/h2&gt;\n&lt;p&gt;Конвертация в &lt;strong&gt;pdf&lt;/strong&gt; - операция асинхронная. На момент окончания генерации документа ещё нет pdf-файла.&lt;/p&gt;\n&lt;p&gt;Если для документа очень нужен pdf, то сейчас единственный вариант - сделать повторный запрос &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5lka7u62\"&gt;documentgenerator.document.get&lt;/code&gt; через 20-30 секунд, чтобы считать ссылку на pdf. Если она там не появилась - попробовать повторить.&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Примеры","href":"api-reference/document-generator/document-generator-document-add.html#primery","level":2},{"title":"Ответ в случае успеха","href":"api-reference/document-generator/document-generator-document-add.html#otvet-v-sluchae-uspeha","level":2},{"title":"Почему в результате document.add нет ссылки на pdf","href":"api-reference/document-generator/document-generator-document-add.html#pochemu-v-rezultate-documentadd-net-ssylki-na-pdf","level":2}],"title":"Создать новый документ на основании шаблона documentgenerator.document.add"},"router":{"pathname":"api-reference/document-generator/document-generator-document-add","dep
