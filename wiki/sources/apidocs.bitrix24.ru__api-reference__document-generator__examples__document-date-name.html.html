        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Описание модификаторов документов доступно на &lt;a href=\"https://helpdesk.bitrix24.ru/open/18175702/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;helpdesk&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Использование модификаторов для дат и имён через REST не обязательно - входные данные могут быть заранее отформатированы самим приложением. Тем не менее, это может быть удобно. Поэтому в REST есть возможность использовать модификаторы. Для этого необходимо передать соответствующий тип поля в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7ztbaduq\"&gt;fields&lt;/code&gt;. Также в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3xtb5m1g\"&gt;fields&lt;/code&gt; по ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-abjls6rv\"&gt;FORMAT&lt;/code&gt; можно передать формат по умолчанию. Если в самом шаблоне у этого поля будет указан модификатор - будет применен модификатор шаблона.&lt;/p&gt;\n&lt;h2 id=\"data\"&gt;&lt;a href=\"api-reference/document-generator/examples/document-date-name.html#data\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Дата&lt;/span&gt;&lt;/a&gt;Дата&lt;/h2&gt;\n&lt;p&gt;Чтобы модификаторы работали для полей типа дата, необходимо передать их в следующем виде:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lrrotil8\"&gt;values&lt;/code&gt; дата должна быть передана в формате atom (как во всех методах)&lt;/li&gt;\n&lt;li&gt;в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8hqt3pj6\"&gt;fields&lt;/code&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c06cije7\"&gt;TYPE&lt;/code&gt; = &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1skenpxh\"&gt;DATE&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;также в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tnjpkmzv\"&gt;fields&lt;/code&gt; по ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-202obd4g\"&gt;FORMAT['format']&lt;/code&gt; можно передать модификатор по умолчанию (также, как в шаблоне)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"imya\"&gt;&lt;a href=\"api-reference/document-generator/examples/document-date-name.html#imya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Имя&lt;/span&gt;&lt;/a&gt;Имя&lt;/h2&gt;\n&lt;p&gt;Чтобы модификаторы работали для полей типа имя необходимо передать их в следующем виде:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-myc3ku58\"&gt;values&lt;/code&gt; имя должно быть передано в виде массива&lt;/li&gt;\n&lt;/ul&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;[\n    &lt;span class=\"hljs-string\"&gt;'NAME'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Игорь'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// имя&lt;/span&gt;\n    &lt;span class=\"hljs-string\"&gt;'LAST_NAME'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Иванов'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// фамилия&lt;/span&gt;\n    &lt;span class=\"hljs-string\"&gt;'SECOND_NAME'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Петрович'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// отчество&lt;/span&gt;\n    &lt;span class=\"hljs-string\"&gt;'GENDER'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'M'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// пол&lt;/span&gt;\n]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"52\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-52\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-52\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-52.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;По ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6nxp0txh\"&gt;GENDER&lt;/code&gt; можно указать пол в явном виде (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3425bkn8\"&gt;M&lt;/code&gt; - мужской, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9ehiveij\"&gt;F&lt;/code&gt; - женский). Если пол не указан, то модуль попытается определить его по отчеству. Если отчество не указано - пол не будет определен и склонение не будет работать.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9u0vatfh\"&gt;fields&lt;/code&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v16b6f8q\"&gt;TYPE&lt;/code&gt; = &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ioref0p4\"&gt;NAME&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-omjkoghf\"&gt;fields&lt;/code&gt; по ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l0srl091\"&gt;FORMAT['format']&lt;/code&gt; можно передать формат по умолчанию&lt;/li&gt;\n&lt;li&gt;в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-auy9yiyi\"&gt;fields&lt;/code&gt; по ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c1n3rzj1\"&gt;FORMAT['case']&lt;/code&gt; можно передать падеж по умолчанию&lt;/li&gt;\n&lt;/ul&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-variable\"&gt;$data&lt;/span&gt; = [\n\t&lt;span class=\"hljs-string\"&gt;'templateId'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;203&lt;/span&gt;,\n\t&lt;span class=\"hljs-string\"&gt;'providerClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\Rest'&lt;/span&gt;,\n\t&lt;span class=\"hljs-string\"&gt;'value'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n\t&lt;span class=\"hljs-string\"&gt;'values'&lt;/span&gt; =&amp;gt; [\n\t\t&lt;span class=\"hljs-string\"&gt;'SomeDate'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'2018-10-10T14:30:18+02:00'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// значение передано в формате atom&lt;/span&gt;\n\t\t&lt;span class=\"hljs-string\"&gt;'SomeName'&lt;/span&gt; =&amp;gt; [ &lt;span class=\"hljs-comment\"&gt;// имя передано в виде массива&lt;/span&gt;\n\t\t\t&lt;span class=\"hljs-string\"&gt;'NAME'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Владислав'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-string\"&gt;'LAST_NAME'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Горелкин'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-string\"&gt;'GENDER'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'M'&lt;/span&gt;,\n\t\t],\n\t],\n\t&lt;span class=\"hljs-string\"&gt;'fields'&lt;/span&gt; =&amp;gt; [\n\t\t&lt;span class=\"hljs-string\"&gt;'SomeDate'&lt;/span&gt; =&amp;gt; [\n\t\t\t&lt;span class=\"hljs-string\"&gt;'TYPE'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'DATE'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-string\"&gt;'FORMAT'&lt;/span&gt; =&amp;gt; [\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'format'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'d f Y H:i'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// формат вывода&lt;/span&gt;\n\t\t\t],\n\t\t], &lt;span class=\"hljs-comment\"&gt;// тип поля - дата&lt;/span&gt;\n\t\t&lt;span class=\"hljs-string\"&gt;'SomeName'&lt;/span&gt; =&amp;gt; [\n\t\t\t&lt;span class=\"hljs-string\"&gt;'TYPE'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'NAME'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-string\"&gt;'FORMAT'&lt;/span&gt; =&amp;gt; [ &lt;span class=\"hljs-comment\"&gt;// здесь можно передать формат поля по умолчанию&lt;/span&gt;\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'case'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// код падежа&lt;/span&gt;\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'format'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'#NAME# #LAST_NAME#'&lt;/span&gt; &lt;span class=\"hljs-comment\"&gt;// формат вывода&lt;/span&gt;\n\t\t\t]\n\t\t], &lt;span class=\"hljs-comment\"&gt;// тип поля - имя&lt;/span&gt;\n\t]\n];\n&lt;span class=\"hljs-variable\"&gt;$url&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$webHookUrl&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$prefix&lt;/span&gt;.&lt;span class=\"hljs-string\"&gt;'.document.add/'&lt;/span&gt;;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"73\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-73\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-73\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-73.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Дата","href":"api-reference/document-generator/examples/document-date-name.html#data","level":2},{"title":"Имя","href":"api-reference/document-generator/examples/document-date-name.html#imya","level":2}],"title":"Генерация документа с модификаторами даты и имени"},"router":{"pathname":"api-reference/document-generator/examples/document-date-name","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":
