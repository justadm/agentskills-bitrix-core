            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Рассмотрим вариант, когда нам надо вставить картинки, печать, использовать модификатор для даты и имени, и заполнить таблицу несколькими значениями.&lt;/p&gt;\n&lt;p&gt;Чтобы в документ передать сложные данные, не только в строковом формате, необходимо правильно сформировать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zkjx6pc4\"&gt;fields&lt;/code&gt;. Для начала, заполним изображение и печать.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-variable\"&gt;$data&lt;/span&gt; = [\n    &lt;span class=\"hljs-string\"&gt;'templateId'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;203&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'providerClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\Rest'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'value'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'values'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'SomeDate'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'14.02.2018'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'SomeName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Горелкин Владислав'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'Stamp'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'http://myrestapp.com/upload/stamp.png'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// внешний путь к файлу печати&lt;/span&gt;\n        &lt;span class=\"hljs-string\"&gt;'Image'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'http://myrestapp.com/upload/image.jpg'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// внешний путь к файлу изображения&lt;/span&gt;\n    ],\n    &lt;span class=\"hljs-string\"&gt;'fields'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'Stamp'&lt;/span&gt; =&amp;gt; [&lt;span class=\"hljs-string\"&gt;'TYPE'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'STAMP'&lt;/span&gt;], &lt;span class=\"hljs-comment\"&gt;// тип поля - печать&lt;/span&gt;\n        &lt;span class=\"hljs-string\"&gt;'Image'&lt;/span&gt; =&amp;gt; [&lt;span class=\"hljs-string\"&gt;'TYPE'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'IMAGE'&lt;/span&gt;], &lt;span class=\"hljs-comment\"&gt;// тип поля - изображение&lt;/span&gt;\n    ]\n];\n&lt;span class=\"hljs-variable\"&gt;$url&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$webHookUrl&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$prefix&lt;/span&gt;.&lt;span class=\"hljs-string\"&gt;'.document.add/'&lt;/span&gt;;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"16\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-16\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-16\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-16.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В массиве &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e112ofp4\"&gt;fields&lt;/code&gt; можно указать тип поля, по ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eegg8kk3\"&gt;TYPE&lt;/code&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;для полей \"Изображение\" тип - &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s924f9za\"&gt;STAMP&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;для полей \"Печать или подпись\" тип - &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q74qf24n\"&gt;IMAGE&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;В массиве &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f5099sin\"&gt;values&lt;/code&gt; в качестве значений необходимо указать абсолютный путь к файлу. Файл будет скачан по этому адресу и вставлен в документ.&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Генерация документа с изображениями и печатями"},"router":{"pathname":"api-reference/document-generator/examples/document-images-seals","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
