            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Начиная с версии 18.7.200 модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rhnmbslc\"&gt;documentgenerator&lt;/code&gt; появилась возможность создавать документы с вложенными списками, т.е. когда одно из значений списка первого уровня - это ещё один список (&lt;strong&gt;Внимание:&lt;/strong&gt; работает только через REST и PHP API, через интерфейс такое не сделать).&lt;/p&gt;\n&lt;p&gt;Это может быть полезно, когда необходимо вставить несколько таблиц одинаковой структуры, но с разным количеством строк.&lt;/p&gt;\n&lt;p&gt;Основная идея заключается в том, что &lt;strong&gt;список первого уровня&lt;/strong&gt; должен в качестве значений отдавать &lt;strong&gt;названия полей&lt;/strong&gt; для внутренних списков. Все описания и значения полей должны быть переданы сразу. В массиве полей внешний список должен идти первым (т.к. поля обрабатываются в том же порядке, в котором они переданы в описании)&lt;/p&gt;\n&lt;p&gt;Этот способ можно использовать в схеме &lt;strong&gt;Таблица внутри повторяющихся блоков&lt;/strong&gt; или &lt;strong&gt;Повторяющиеся блоки внутри повторяющихся блоков&lt;/strong&gt;, но нельзя вставить таблицу внутри таблицы.&lt;/p&gt;\n&lt;h2 id=\"primer-dlya-shemy-tablica-vnutri-povtoryayushihsya-blokov\"&gt;&lt;a href=\"api-reference/document-generator/examples/document-table-complex.html#primer-dlya-shemy-tablica-vnutri-povtoryayushihsya-blokov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример для схемы Таблица внутри повторяющихся блоков&lt;/span&gt;&lt;/a&gt;Пример для схемы Таблица внут
