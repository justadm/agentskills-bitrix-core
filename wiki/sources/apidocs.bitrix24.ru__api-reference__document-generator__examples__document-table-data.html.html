            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;В нашем тестовом шаблоне есть таблица, куда надо вставить картинку, название и цену товара. Модификаторы для цен нельзя использовать в ресте генератора документов, поэтому цену придётся передавать в виде сформированной строки.&lt;/p&gt;\n&lt;p&gt;Ниже рабочий пример кода, после него подробности.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-variable\"&gt;$data&lt;/span&gt; = [\n\t&lt;span class=\"hljs-string\"&gt;'templateId'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;203&lt;/span&gt;,\n\t&lt;span class=\"hljs-string\"&gt;'providerClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'\\\\Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\Rest'&lt;/span&gt;,\n\t&lt;span class=\"hljs-string\"&gt;'value'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;,\n\t&lt;span class=\"hljs-string\"&gt;'values'&lt;/span&gt; =&amp;gt; [\n\t\t&lt;span class=\"hljs-string\"&gt;'Table'&lt;/span&gt; =&amp;gt; [\n\t\t\t[\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'Name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Item name 1'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'Price'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'$111.23'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'Image'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'http://myrestapp.com/upload/stamp.png'&lt;/span&gt;\n\t\t\t],\n\t\t\t[\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'Name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Item name 2'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'Price'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'$222.34'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'Image'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'http://myrestapp.com/upload/stamp.png'&lt;/span&gt;\n\t\t\t],\n\t\t],\n\t\t&lt;span class=\"hljs-string\"&gt;'TableItemName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Table.Item.Name'&lt;/span&gt;,\n\t\t&lt;span class=\"hljs-string\"&gt;'TableItemImage'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Table.Item.Image'&lt;/span&gt;,\n\t\t&lt;span class=\"hljs-string\"&gt;'TableItemPrice'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Table.Item.Price'&lt;/span&gt;,\n\t\t&lt;span class=\"hljs-string\"&gt;'TableIndex'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Table.INDEX'&lt;/span&gt;,\n\t],\n\t&lt;span class=\"hljs-string\"&gt;'fields'&lt;/span&gt; =&amp;gt; [\n\t\t&lt;span class=\"hljs-string\"&gt;'Table'&lt;/span&gt; =&amp;gt; [\n\t\t\t&lt;span class=\"hljs-string\"&gt;'PROVIDER'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\ArrayDataProvider'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-string\"&gt;'OPTIONS'&lt;/span&gt; =&amp;gt; [\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'ITEM_NAME'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Item'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'ITEM_PROVIDER'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\HashDataProvider'&lt;/span&gt;,\n\t\t\t],\n\t\t],\n\t\t&lt;span class=\"hljs-string\"&gt;'TableItemImage'&lt;/span&gt; =&amp;gt; [&lt;span class=\"hljs-string\"&gt;'TYPE'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'IMAGE'&lt;/span&gt;],\n\t],\n];\n&lt;span class=\"hljs-variable\"&gt;$url&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$webHookUrl&lt;/span&gt;.&lt;span class=\"hljs-variable\"&gt;$prefix&lt;/span&gt;.&lt;span class=\"hljs-string\"&gt;'.document.add/'&lt;/span&gt;;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"16\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-16\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-16\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-16.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Напоминаем, что в шаблон вставлена таблица, в таблице три поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-74as4aw2\"&gt;{TableItemName}&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-211y5usr\"&gt;{TableItemImage}&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3f9b767q\"&gt;{TableItemPrice}&lt;/code&gt;. Для начала посмотрим, как заполняется массив полей &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zp9zwsvp\"&gt;fields&lt;/code&gt;.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Передаем настройки поля Table. Такого поля в явном виде нет в шаблоне, но оно нам нужно, чтобы передать по этому ключу массив значений для таблицы.&lt;/li&gt;\n&lt;li&gt;Для этого поля нужно обязательно указать провайдера &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hqxcghu4\"&gt;fields['Table']['PROVIDER'] = 'Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\ArrayDataProvider'&lt;/code&gt;. Таким образом мы указываем, что по этому ключу придёт массив значений.&lt;/li&gt;\n&lt;li&gt;Надо заполнить массив настроек провайдера. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-otr89owj\"&gt;fields['Table']['OPTIONS']['ITEM_NAME'] = 'Item'&lt;/code&gt;. Здесь мы передали внутренний ключ, по которому провайдер будет обращаться к элементам массива.&lt;/li&gt;\n&lt;li&gt;Здесь указывается, что каждый элемент массива поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7r62goux\"&gt;Table&lt;/code&gt; по ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hczoyr35\"&gt;Item&lt;/code&gt; - это простой хеш.&lt;/li&gt;\n&lt;/ol&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;fields[&lt;span class=\"hljs-string\"&gt;'Table'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'OPTIONS'&lt;/span&gt;][&lt;span class=\"hljs-string\"&gt;'ITEM_PROVIDER'&lt;/span&gt;] = &lt;span class=\"hljs-string\"&gt;'Bitrix\\\\DocumentGenerator\\\\DataProvider\\\\HashDataProvider'&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"42\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-42\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-42\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-42.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;ol start=\"5\" style=\"--hier-list-start:4\"&gt;\n&lt;li&gt;Указываем, что поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xvlj2gtj\"&gt;TableItemImage&lt;/code&gt; является изображением - здесь всё как обычно.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Теперь про массив values.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;По ключу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5ilftsm1\"&gt;Table&lt;/code&gt; передаем простой массив (с индексными последовательными ключами). Каждый элемент массива - это ассоциативный массив, где ключ - это правая часть поля, за исключением &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fd4uoffh\"&gt;Table&lt;/code&gt; (название поля-массива) и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7sjtsblj\"&gt;Item&lt;/code&gt; (название внутреннего ключа).&lt;/li&gt;\n&lt;li&gt;В качестве значения для самих полей таблицы передаем цепочку получения значения из провайдера. Строится она как последовательные коды провайдеров, разделенные точкой. В нашем случае это будет &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-na8zaji0\"&gt;Table&lt;/code&gt; - название поля-массива, откуда получаются значения. Потом точка. Дальше &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ojwhh07i\"&gt;Item&lt;/code&gt; - название внутреннего ключа провайдера &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ijtxp141\"&gt;Table&lt;/code&gt;, по которому провайдер отдает элементы массива. Потом точка. Дальше идёт ключ внутреннего ассоциативного массива из элементов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6hpq8a36\"&gt;Table&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;У провайдера &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rngye24i\"&gt;ArrayDataProvider&lt;/code&gt; есть внутренняя переменная &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hsizlcc2\"&gt;INDEX&lt;/code&gt;, которая указывает на текущий номер элемента (начиная с 1). Чтобы в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wdtfdpb0\"&gt;{TableIndex}&lt;/code&gt; внутри таблицы подставился порядковый номер, было указано &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ttljkhwj\"&gt;values['TableIndex'] = 'Table.INDEX'&lt;/code&gt;.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Если указать в качестве значения поля обычную строку, то она вставится в таблицу как есть во все строки.&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Генерация документа с табличными данными"},"router":{"pathname":"api-reference/document-generator/examples/document-table-data","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
        </script>
