            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/document-generator/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;На данный момент есть &lt;strong&gt;два scope&lt;/strong&gt; для работы с генератором документов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ri9tt9gr\"&gt;crm.documentgenerator.*&lt;/code&gt;. Результаты работы этих методов отображаются в интерфейсе CRM;&lt;/li&gt;\n&lt;li&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5hptsee8\"&gt;documentgenerator.*&lt;/code&gt;. Результат работы этих методов доступен только на уровне REST.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Из методов одного scope нельзя получить доступ к данным другого:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Нельзя создать документ CRM с шаблоном для REST;&lt;/li&gt;\n&lt;li&gt;Нельзя использовать данные CRM при работе с методами documentgenerator.*.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Поддерживаются следующие &lt;strong&gt;типы полей&lt;/strong&gt; и их &lt;strong&gt;модификаторы&lt;/strong&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;IMAGE - изображения;&lt;/li&gt;\n&lt;li&gt;STAMP - печати и подписи;&lt;/li&gt;\n&lt;li&gt;DATE - даты;&lt;/li&gt;\n&lt;li&gt;NAME - имена.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Типы полей &lt;strong&gt;Деньги&lt;/strong&gt; и &lt;strong&gt;Адрес&lt;/strong&gt; реализованы внутри модуля &lt;em&gt;crm&lt;/em&gt;, поэтому использовать их в REST этого модуля не получится. Если надо вывести такие данные - придётся передавать их в уже сформированном виде.&lt;/p&gt;\n&lt;p&gt;Есть возможность использовать массивы для вставки в таблицы и повторяющиеся блоки.&lt;/p&gt;\n&lt;h2 id=\"otlichie-parametrov-metodov-raznyh-scope\"&gt;&lt;a href=\"api-reference/document-generator/index.html#otlichie-parametrov-metodov-raznyh-scope\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Отличие параметров методов разных scope&lt;/span&gt;&lt;/a&gt;Отличие параметров методов разных scope&lt;/h2&gt;\n&lt;p&gt;“Изнутри” методы идентичны. По факту методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4zutuua0\"&gt;crm.documentgenerator.*&lt;/code&gt; после пред-обработки параметров вызывают методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9k573nfj\"&gt;documentgenerator.*&lt;/code&gt;. Но есть ряд отличий:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;На вход методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hl6jk9bu\"&gt;crm.documentgenerator.*&lt;/code&gt; необходимо вместо имен провайдеров передавать &lt;strong&gt;ID&lt;/strong&gt; типа сущности CRM (параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7ov5iazo\"&gt;entityTypeId&lt;/code&gt;);&lt;/li&gt;\n&lt;li&gt;На вход методов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0o95pr5k\"&gt;crm.documentgenerator.*&lt;/code&gt; необходимо вместо параметра &lt;strong&gt;value&lt;/strong&gt; передавать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-30tf3at4\"&gt;entityId&lt;/code&gt; - &lt;strong&gt;ID&lt;/strong&gt; сущности CRM&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"shablony\"&gt;&lt;a href=\"api-reference/document-generator/index.html#shablony\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаблоны&lt;/span&gt;&lt;/a&gt;Шаблоны&lt;/h2&gt;\n&lt;p&gt;Все создаваемые этим api шаблоны и документы привязаны к модулю REST. Через scope &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5aldu57l\"&gt;documentgenerator&lt;/code&gt; нельзя обращаться к шаблонам и документам других модулей. Поэтому &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ixqkgi07\"&gt;moduleId&lt;/code&gt; в данных о шаблоне всегда будет &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yuq5xp5m\"&gt;rest&lt;/code&gt;. Даже если в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2sik04bu\"&gt;add&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mch8fbcg\"&gt;update&lt;/code&gt; указать другой модуль, он не будет изменён.&lt;/p&gt;\n&lt;p&gt;Для работы REST доступны только два провайдера:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-an8zrfux\"&gt;Bitrix\\DocumentGenerator\\DataProvider\\Rest&lt;/code&gt; - всегда должен быть указан в качестве провайдера для шаблона&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b1j97jvt\"&gt;Bitrix\\DocumentGenerator\\DataProvider\\HashDataProvider&lt;/code&gt; - используется для передачи данных в таблицы / повторяющиеся блоки&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Привязка шаблона к пользователю самими REST-методами никак не учитывается. Но её можно использовать на стороне приложения.&lt;/p&gt;\n&lt;h2 id=\"numeratory\"&gt;&lt;a href=\"api-reference/document-generator/index.html#numeratory\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Нумераторы&lt;/span&gt;&lt;/a&gt;Нумераторы&lt;/h2&gt;\n&lt;p&gt;Для работы с нумераторами есть методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zvsknafh\"&gt;documentgenerator.numerator.*&lt;/code&gt;, описанные &lt;a href=\"api-reference/document-generator/numerators/index.html\"&gt;тут&lt;/a&gt;. Следует учесть, что через данный скоуп есть возможность получить доступ ко всем нумераторам для документов. В том числе к тем, которые работают в CRM. Но через REST обновить / удалить можно только тот нумератор, который был создан через REST.&lt;/p&gt;\n&lt;h2 id=\"spisok-regionov\"&gt;&lt;a href=\"api-reference/document-generator/index.html#spisok-regionov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Список регионов&lt;/span&gt;&lt;/a&gt;Список регионов&lt;/h2&gt;\n&lt;p&gt;Каждый шаблон привязан к определенной стране. Список стран фиксирован и на данный момент состоит из:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;ru - Россия&lt;/li&gt;\n&lt;li&gt;by - Беларусь&lt;/li&gt;\n&lt;li&gt;kz - Казахстан&lt;/li&gt;\n&lt;li&gt;ua - Украина&lt;/li&gt;\n&lt;li&gt;br - Бразилия&lt;/li&gt;\n&lt;li&gt;mx - Мексика&lt;/li&gt;\n&lt;li&gt;de - Германия&lt;/li&gt;\n&lt;li&gt;uk - Великобритания&lt;/li&gt;\n&lt;li&gt;pl - Польша&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Начиная с версии documentgenerator 18.6.1 появилась возможность добавлять свои регионы. Для управления ими появился &lt;a href=\"api-reference/document-generator/region/index.html\"&gt;отдельный раздел&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"itogi\"&gt;&lt;a href=\"api-reference/document-generator/index.html#itogi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Итоги&lt;/span&gt;&lt;/a&gt;Итоги&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Что сделать можно?&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Создать документы на основе шаблонов в формате .docx файлов;&lt;/li&gt;\n&lt;li&gt;В шаблон можно вставить списки с произвольным количеством элементов через таблицы или повторяющиеся блоки;&lt;/li&gt;\n&lt;li&gt;В шаблон можно вставить изображения, в том числе из списков;&lt;/li&gt;\n&lt;li&gt;Вставить поля в виде html с частичным сохранением форматирования;&lt;/li&gt;\n&lt;li&gt;Создать документы, отправить их и отследить просмотр без участия пользователя (через роботов).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Что сделать нельзя?&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Вставить множественное значение поля типа «файл»;&lt;/li&gt;\n&lt;li&gt;Вставить таблицы и изображения из html;&lt;/li&gt;\n&lt;li&gt;Вставить векторные изображения;&lt;/li&gt;\n&lt;li&gt;Передача форматирование выполняется не полностью.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/document-generator/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;h3 id=\"dokumenty\"&gt;&lt;a href=\"api-reference/document-generator/index.html#dokumenty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Документы&lt;/span&gt;&lt;/a&gt;Документы&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-add.html\"&gt;documentgenerator.document.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новый документ на основании шаблона&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-delete.html\"&gt;documentgenerator.document.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет документ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-enable-public-url.html\"&gt;documentgenerator.document.enablepublicurl&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Включает/выключает публичную ссылку на документ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-get-fields.html\"&gt;documentgenerator.document.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список полей документов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-get.html\"&gt;documentgenerator.document.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает документ по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-list.html\"&gt;documentgenerator.document.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список документов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/document-generator-document-update.html\"&gt;documentgenerator.document.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет существующий документ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"numerator\"&gt;&lt;a href=\"api-reference/document-generator/index.html#numerator\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Нумератор&lt;/span&gt;&lt;/a&gt;Нумератор&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/numerators/document-generator-numerator-add.html\"&gt;documentgenerator.numerator.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет нумератор&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/numerators/document-generator-numerator-delete.html\"&gt;documentgenerator.numerator.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет нумератор&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/numerators/document-generator-numerator-get.html\"&gt;documentgenerator.numerator.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает нумератор по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/numerators/document-generator-numerator-list.html\"&gt;documentgenerator.numerator.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список нумераторов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/numerators/document-generator-numerator-update.html\"&gt;documentgenerator.numerator.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет нумератор&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"regiony\"&gt;&lt;a href=\"api-reference/document-generator/index.html#regiony\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Регионы&lt;/span&gt;&lt;/a&gt;Регионы&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/region/document-generator-region-get.html\"&gt;documentgenerator.region.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает информацию о регионе по его идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/region/document-generator-region-list.html\"&gt;documentgenerator.region.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список регионов, как установленных по умолчанию, так и пользовательских&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/region/document-generator-region-delete.html\"&gt;documentgenerator.region.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет регион&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/region/document-generator-region-add.html\"&gt;documentgenerator.region.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый регион&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/region/document-generator-region-update.html\"&gt;documentgenerator.region.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет существующую страну&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"roli\"&gt;&lt;a href=\"api-reference/document-generator/index.html#roli\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Роли&lt;/span&gt;&lt;/a&gt;Роли&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/role/document-generator-role-get.html\"&gt;documentgene
