        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-371n1nhi\"&gt;documentgenerator&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qjg3xey3\"&gt;documentgenerator.template.add&lt;/code&gt; добавляет новый шаблон.&lt;/p&gt;\n&lt;p&gt;Контент файла (параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tmwkf379\"&gt;file&lt;/code&gt;) можно передать двумя способами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;В POST-запросе закодированным в &lt;em&gt;base64&lt;/em&gt; (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mihi2kvv\"&gt;fields[file]&lt;/code&gt;);&lt;/li&gt;\n&lt;li&gt;Без кодировки в &lt;em&gt;multipart/form-data&lt;/em&gt; (просто &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-byg6txo1\"&gt;file&lt;/code&gt;);&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Т.к. интерфейс должен быть реализован самостоятельно, то настройки видимости (параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xasabhuk\"&gt;fields[users]&lt;/code&gt;) нужны только самому приложению. Аналогично индекс сортировки (параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f2ixl90i\"&gt;fields[sort]&lt;/code&gt;) и активность (параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5y5ndhx2\"&gt;fields[active]&lt;/code&gt;).&lt;/p&gt;\n&lt;p&gt;Все созданные через этот метод шаблоны привязаны к модулю rest и единственному провайдеру &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yi8jjy8h\"&gt;\\Bitrix\\DocumentGenerator\\DataProvider\\Rest&lt;/code&gt;.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;fields&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив полей шаблона.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"parametry-fields\"&gt;&lt;a href=\"api-reference/document-generator/templates/document-generator-template-add.html#parametry-fields\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры fields&lt;/span&gt;&lt;/a&gt;Параметры fields&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;name&lt;/strong&gt;&lt;sup&gt;*&lt;/sup&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Название шаблона.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;file&lt;/strong&gt;&lt;sup&gt;*&lt;/sup&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Контент файла, закодированный в &lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;base64&lt;/a&gt; (обязательное). Как альтернативу, контент файла можно передать в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9ndehhaw\"&gt;multipart / form-data&lt;/code&gt;. В этом случае его не надо кодировать в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-42z9z9vs\"&gt;base64&lt;/code&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;code&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Символьный код шаблона.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;numeratorId&lt;/strong&gt;&lt;sup&gt;*&lt;/sup&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор нумератора.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;region&lt;/strong&gt;&lt;sup&gt;*&lt;/sup&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Страна.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;users&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив видимости. По умолчанию пусто.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;active&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Y/N флаг активности. По умолчанию Y.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;withStamps&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Y/N ставить печати и подписи. По умолчанию N.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;sort&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Индекс сортировки.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;h2 id=\"primer\"&gt;&lt;a href=\"api-reference/document-generator/templates/document-generator-template-add.html#primer\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример&lt;/span&gt;&lt;/a&gt;Пример&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboa          &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-203\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-203\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-203.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h1&gt;Ответ в случае успеха&lt;/h1&gt;\n&lt;blockquote&gt;\n&lt;p&gt;200 OK&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Возвращает те же данные, что и при вызове &lt;a href=\"api-reference/document-generator/templates/document-generator-template-get.html\"&gt;documentgenerator.template.get()&lt;/a&gt; на новом шаблоне.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;[result] =&amp;gt; &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;\n    (\n        [template] =&amp;gt; &lt;span class=\"hljs-title function_ invoke__\"&gt;Array&lt;/span&gt;\n            (\n                [id] =&amp;gt; &lt;span class=\"hljs-number\"&gt;203&lt;/span&gt;\n                [name] =&amp;gt; Rest Template\n                [region] =&amp;gt; ru\n                [code] =&amp;gt;\n                [download] =&amp;gt; &lt;span class=\"hljs-attr\"&gt;http&lt;/span&gt;://mycrm.bitrix24.com/bitrix/services/main/ajax.php?action=documentgenerator.template.download&amp;amp;id=&lt;span class=\"hljs-number\"&gt;203&lt;/span&gt;&amp;amp;ts=&lt;span class=\"hljs-number\"&gt;1539173306&lt;/span&gt;\n                [active] =&amp;gt; Y\n                [moduleId] =&amp;gt; rest\n                [numeratorId] =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;\n                [withStamps] =&amp;gt; N\n
