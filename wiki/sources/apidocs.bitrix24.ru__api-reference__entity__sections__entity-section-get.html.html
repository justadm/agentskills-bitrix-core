            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ymouqkr3\"&gt;entity&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ufhyx3tl\"&gt;entity.section.get&lt;/code&gt; получает список разделов хранилища (секций инфоблока). Списочный метод.&lt;/p&gt;\n&lt;p&gt;Пользователь должен обладать хотя бы правами на чтение (&lt;strong&gt;R&lt;/strong&gt;) хранилища.&lt;/p&gt;\n&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/entity/sections/entity-section-get.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;ENTITY&lt;/strong&gt;&lt;sup&gt;*&lt;/sup&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vzn55drh\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обязательный. Строковой идентификатор хранилища.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;SORT&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tchco9b5\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив для сортировки, имеющий вид &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jjogxllo\"&gt;by1&lt;/code&gt;=&amp;gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-94qnjsrc\"&gt;order1&lt;/code&gt;[, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v5ucujod\"&gt;by2&lt;/code&gt;=&amp;gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sjzqihou\"&gt;order2&lt;/code&gt; [, ..]], где &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dsyvivtx\"&gt;by1, ...&lt;/code&gt; - поле сортировки, может принимать значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;ID&lt;/strong&gt; - код раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;SECTION&lt;/strong&gt; - код родительской раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;NAME&lt;/strong&gt; - название раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CODE&lt;/strong&gt; - символьный код раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ACTIVE&lt;/strong&gt; - активности раздела&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;LEFT_MARGIN&lt;/strong&gt; - левая граница;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DEPTH_LEVEL&lt;/strong&gt; - глубина вложенности (начинается с 1);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;SORT&lt;/strong&gt; - индекс сортировки;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CREATED&lt;/strong&gt; - по времени создания раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CREATED_BY&lt;/strong&gt; - по идентификатору создателя раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;MODIFIED_BY&lt;/strong&gt; - по идентификатору пользователя изменившего раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;TIMESTAMP_X&lt;/strong&gt; - по времени последнего изменения.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;em&gt;order1, ...&lt;/em&gt; - порядок сортировки, может принимать значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;ASC&lt;/strong&gt; - по возрастанию;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DESC&lt;/strong&gt; - по убыванию.&lt;br /&gt;\nЗначение по умолчанию &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1xb7n5gh\"&gt;Array(\"SORT\"=&amp;gt;\"ASC\")&lt;/code&gt; означает, что результат выборки будет отсортирован по возрастанию. Если задать пустой массив &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5cg0cxsv\"&gt;Array()&lt;/code&gt;, то результат отсортирован не будет.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;FILTER&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qsiwsglr\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив вида &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-awbn1cdh\"&gt;array(\"фильтруемое поле\"=&amp;gt;\"значение\" [, ...])&lt;/code&gt;. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-957mraut\"&gt;Фильтруемое поле&lt;/code&gt; может принимать значения:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;ACTIVE&lt;/strong&gt; - фильтр по активности (Y|N);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;NAME&lt;/strong&gt; - по названию (можно искать по шаблону [%_]);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CODE&lt;/strong&gt; - по символьному коду (по шаблону [%_]);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;SECTION_ID&lt;/strong&gt; - по коду раздела-родителя (если указать false, то будут возвращены корневые разделы);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DEPTH_LEVEL&lt;/strong&gt; - по уровню вложенности (начинается с 1);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;LEFT_MARGIN&lt;/strong&gt;, &lt;strong&gt;RIGHT_MARGIN&lt;/strong&gt; - по положению в дереве (используется, когда необходима выборка дерева подразделов);&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ID&lt;/strong&gt; - по коду раздела;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;TIMESTAMP_X&lt;/strong&gt; - по времени последнего изменения;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;DATE_CREATE&lt;/strong&gt; - по времени создания;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;MODIFIED_BY&lt;/strong&gt; - по коду пользователя изменившему раздел;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CREATED_BY&lt;/strong&gt; - по создателю;&lt;br /&gt;\nВсе фильтруемые поля могут содержать перед названием тип проверки фильтра. Необязательное. По умолчанию записи не фильтруются.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;start&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Порядковый номер элемента списка, начиная с которого необходимо возвращать следующие элементы при вызове текущего метода. Подробности в статье &lt;a href=\"settings/how-to-call-rest-api/list-methods-pecularities.html\"&gt;Особенности списочных методов&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/entity/sections/entity-section-get.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-81skig3i\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;div data-diplodoc-id=\"http\" data-diplodoc-key=\"http\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;HTTP&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"sd9z91ym\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt;\n{\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n\t\t&lt;span class=\"hljs-string\"&gt;'entity.section.get'&lt;/span&gt;,\n\t\t{\n\t\t\t&lt;span class=\"hljs-attr\"&gt;ENTITY&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'menu_new'&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;SORT&lt;/span&gt;: {\n\t\t\t\t&lt;span class=\"hljs-string\"&gt;'NAME'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'ASC'&lt;/span&gt;\n\t\t\t}\n\t\t}\n\t);\n\t\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; sections = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt;;\n}\n&lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt;( error )\n{\n\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Error:'&lt;/span&gt;, error);\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16
