        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/events/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;События в Битрикс24 — это уведомления об изменениях данных, например, о создании сделки или удалении товара. Когда приложение или вебхук подписывается на событие, система начинает генерировать для него эти уведомления. Чтобы получать события, настройте обработчик.&lt;/p&gt;\n&lt;p&gt;Обработчик события — это внешний URL-адрес, на который Битрикс24 отправляет POST-запрос с данными об изменении. Обработчик позволяет:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;синхронизировать данные с внешней системой,&lt;/li&gt;\n&lt;li&gt;запускать автоматические сценарии,&lt;/li&gt;\n&lt;li&gt;проверять данные по правилам бизнес-логики.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;URL обработчика должен быть доступен из внешней сети. Не используйте адреса на localhost или в локальной сети. Проверяйте доступность вашего URL с помощью публичных сервисов.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-rabotayut-sobytiya\"&gt;&lt;a href=\"api-reference/events/index.html#kak-rabotayut-sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работают события&lt;/span&gt;&lt;/a&gt;Как работают события&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;Приложение регистрирует обработчик для нужного события методом &lt;a href=\"api-reference/events/event-bind.html\"&gt;event.bind&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Пользователь совершает действие в Битрикс24, например, изменяет задачу.&lt;/li&gt;\n&lt;li&gt;Битрикс24 отправляет уведомление в приложение через сервер очередей.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;img src=\"api-reference/events/_images/how_events_work.png\" alt=\"Как работают события\" title=\"Как работают события\" /&gt;&lt;/p&gt;\n&lt;h3 id=\"osobennosti-raboty\"&gt;&lt;a href=\"api-reference/events/index.html#osobennosti-raboty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности работы&lt;/span&gt;&lt;/a&gt;Особенности работы&lt;/h3&gt;\n&lt;p&gt;События обрабатываются не напрямую. Сначала Битрикс24 ставит событие в очередь на специальном сервере. Оттуда на ваш обработчик отправляется POST-запрос. Из-за этого запрос может прийти с небольшой задержкой.&lt;/p&gt;\n&lt;p&gt;Сервер проверяет скорость ответа обработчика. Если обработчик отвечает медленно, сервер снижает частоту вызовов. Интервалы между запросами увеличиваются.&lt;/p&gt;\n&lt;p&gt;Актуальные &lt;a href=\"settings/cloud-and-on-premise/network-access.html\"&gt;адреса сервера очередей&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"chto-prihodit-v-obrabotchik\"&gt;&lt;a href=\"api-reference/events/index.html#chto-prihodit-v-obrabotchik\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что приходит в обработчик&lt;/span&gt;&lt;/a&gt;Что приходит в обработчик&lt;/h2&gt;\n&lt;p&gt;Система отправляет запрос с content-type &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-69cb9tdw\"&gt;application/x-www-form-urlencoded&lt;/code&gt;. Основные ключи:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8x3sihsw\"&gt;event&lt;/code&gt; — название события,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jsqjybaa\"&gt;ts&lt;/code&gt; — временная метка  в формате Unix timestamp,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8f1n2rq8\"&gt;data&lt;/code&gt; — данные события, например, идентификатор измененного элемента,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rmhircfm\"&gt;auth&lt;/code&gt; — параметры авторизации, включая &lt;a href=\"settings/oauth/index.html\"&gt;токены OAuth 2.0&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Пример запроса:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'event'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ONAPPINSTALL'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'VERSION'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'1'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'LANGUAGE_ID'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ru'&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-string\"&gt;'ts'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'1466439714'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'auth'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'access_token'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'s6p6eclrvim6da22ft9ch94ekreb52lv'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'expires_in'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'3600'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'scope'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'entity,im'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'domain'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'portal.bitrix24.com'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'server_endpoint'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'https://oauth.bitrix24.tech/rest/'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'status'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'F'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'client_endpoint'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'https://portal.bitrix24.com/rest/'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'member_id'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'a223c6b3710f85df22e9377d6c4f7553'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'refresh_token'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'4s386p3q0tr8dy89xvmt96234v3dljg8'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'application_token'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'51856fefc120afa4b628cc82d3935cce'&lt;/span&gt;,\n    ),\n)\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"101\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-101\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-101\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-101.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h3 id=\"tokeny-avtorizacii\"&gt;&lt;a href=\"api-reference/events/index.html#tokeny-avtorizacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Токены авторизации&lt;/span&gt;&lt;/a&gt;Токены авторизации&lt;/h3&gt;\n&lt;p&gt;Токены OAuth 2.0 в запросе привязаны к пользователю, который совершил действие. Если событие вызывается автоматически, например, роботом или бизнес-процессом, идентификатор пользователя будет равен &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m5jya8in\"&gt;0&lt;/code&gt;. В этом случае токены в обработчик не передаются.&lt;/p&gt;\n&lt;p&gt;Чтобы приложение всегда могло делать обратные вызовы к Битрикс24, сохраните токены пользователя, который установил приложение. Используйте эти токены для любых последующих запросов от имени приложения.&lt;/p&gt;\n&lt;h2 id=\"kak-podpisatsya-na-sobytie-cherez-vebhuk\"&gt;&lt;a href=\"api-reference/events/index.html#kak-podpisatsya-na-sobytie-cherez-vebhuk\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как подписаться на событие через вебхук&lt;/span&gt;&lt;/a&gt;Как подписаться на событие через вебхук&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;В Битрикс24 откройте раздел &lt;em&gt;Разработчикам&amp;gt;Другое&amp;gt;Исходящий вебхук&lt;/em&gt;.&lt;/li&gt;\n&lt;li&gt;Укажите URL обработчика.&lt;/li&gt;\n&lt;li&gt;Выберите одно или несколько событий из списка, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mlzj80l4\"&gt;OnCrmDealAdd&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;Сохраните вебхук. Поле Токен приложения сгенерируется автоматически.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Пример запроса:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"event\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"ONCRMDEALADD\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"event_handler_id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"975\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"data\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"FIELDS\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"ID\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"7405\"&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"ts\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"1766047124\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"auth\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"domain\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"portal.bitrix24.ru\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"client_endpoint\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"https://portal.bitrix24.ru/rest/\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"server_endpoint\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"https://oauth.bitrix24.tech/rest/\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"member_id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"d897063e1ce7c5eb9f04b9751eef5915\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"application_token\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"jvh9y1ulvt2m6k5or90v9mg8nn32ozas\"&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"139\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-139\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-139\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-139.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Обратите внимание, что в запросе от исходящего вебхука отсутствуют пользовательские токены OAuth 2.0.&lt;/p&gt;\n&lt;h2 id=\"ogranicheniya-sobytij\"&gt;&lt;a href=\"api-reference/events/index.html#ogranicheniya-sobytij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ограничения событий&lt;/span&gt;&lt;/a&gt;Ограничения событий&lt;/h2&gt;\n&lt;p&gt;У событий есть два основных ограничения:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Нельзя регулировать нагрузку&lt;/strong&gt;. При массовом изменении данных вы получите много вызовов подряд. Если в Битрикс24 одновременно изменили тысячу сделок, обработчик получит тысячу вызовов.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Повторных отправок нет&lt;/strong&gt;. Если ваш сервер не ответил или вернул ошибку, сервер очередей Битрикс24 зафиксирует сбой, но не отправит событие повторно.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Если важно обработать все события без потерь, используйте &lt;a href=\"api-reference/events/offline-events.html\"&gt;офлайн-события&lt;/a&gt;. Они позволяют получить события из очереди вручную.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/events/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-358u4byk\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"xf5da6o4\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-bind.html\"&gt;event.bind&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Регистрирует новый обработчик события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-get.html\"&gt;event.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список зарегистрированных обработчиков событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-offline-clear.html\"&gt;event.offline.clear&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Очищает записи в очереди офлайн-событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-offline-error.html\"&gt;event.offline.error&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Регистрирует ошибки обработки очереди офлайн-событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-offline-get.html\"&gt;event.offline.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список офлайн-событий с «очисткой»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-offline-list.html\"&gt;event.offline.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список офлайн-событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/event-unbind.html\"&gt;event.unbind&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отменяет зарегистрированный обработчик события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/events.html\"&gt;events&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список доступных событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"nyo5nk6n\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/events/on-offline-event.html\"&gt;onOfflineEvent&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении очереди офлайн-событий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/events/index.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/safe-event-handlers.html\"&gt;Безопасность в обработчиках&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/offline-events.html\"&gt;Офлайн-события&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"settings/cloud-and-on-premise/network-access.html\"&gt;Необходимые сетевые доступы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Как работают события","href":"api-reference/events/index.html#kak-rabotayut-sobytiya","level":2,"items":[{"title":"Особенности работы","href":"api-reference/events/index.html#osobennosti-raboty","level":3}]},{"title":"Что приходит в обработчик","href":"api-reference/events/index.html#chto-prihodit-v-obrabotchik","level":2,"items":[{"title":"Токены авторизации","href":"api-reference/events/index.html#tokeny-avtorizacii","level":3}]},{"title":"Как подписаться на событие через вебхук","href":"api-reference/events/index.html#kak-podpisatsya-na-sobytie-cherez-vebhuk","level":2},{"title":"Ограничения событий","href":"api-reference/events/index.html#ogranicheniya-sobytij","level":2},{"title":"Обзор методов и событий","href":"api-reference/events/index.html#all-methods","level":2},{"title":"Продолжите изучение","href":"api-reference/events/index.html#prodolzhite-izuchenie","level":2}],"title":"Обработчик событий"},"router":{"pathname":"api-reference/events/index","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
