        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Вы можете зарегистрировать обработчик офлайн-события при помощи того же метода &lt;a href=\"api-reference/events/event-bind.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fvenpjfu\"&gt;event.bind&lt;/code&gt;&lt;/a&gt;. Однако параметры будут слегка отличаться:&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mtyg9qos\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;event&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6rpglzp8\"&gt;string&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Название события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;event_type&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6n7fswo0\"&gt;string&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Должно быть &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6qe2qx1m\"&gt;offline&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;auth_connector&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eanqkk8u\"&gt;string&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Ключ источника. Позволяет &lt;a href=\"api-reference/events/offline-events.html#how-to-avoid-cycles\"&gt;исключать ложные срабатывания&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;options&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uclvf2kf\"&gt;array&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Дополнительные настройки для регистрируемого события. Возможные значения параметра зависят от конкретного события&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;Во-первых, нужно указать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k59u008j\"&gt;event_type&lt;/code&gt; равным &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7vqwfq7s\"&gt;offline&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;А во-вторых, больше не нужно указывать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uo6twsjr\"&gt;handler&lt;/code&gt;, поскольку теперь не Битрикс24 будет вызывать ваш обработчик, а приложение должно будет вызывать Битрикс24 для получения информации о произошедших событиях.&lt;/p&gt;\n&lt;h2 id=\"kak-rabotayut-oflajn-sobytiya\"&gt;&lt;a href=\"api-reference/events/offline-events.html#kak-rabotayut-oflajn-sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работают офлайн-события&lt;/span&gt;&lt;/a&gt;Как работают офлайн-события&lt;/h2&gt;\n&lt;p&gt;В отличие от обычных событий, офлайновые события не вызывают внешние обработчики приложения, а журналируют произошедшие изменения.&lt;/p&gt;\n&lt;p&gt;Приложение может получить данные этого журнала с помощью метода &lt;a href=\"api-reference/events/event-offline-list.html\"&gt;event.offline.list&lt;/a&gt; и метода &lt;a href=\"api-reference/events/event-offline-get.html\"&gt;event.offline.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;В случае нескольких изменений одного и того же объекта, например, редактирования одной сделки пользователем, в журнале будет содержаться только одна запись об этом. Запись будет помечена датой и временем самого последнего изменения.&lt;/p&gt;\n&lt;p&gt;И сколько бы раз мы не меняли одну и ту же сделку, это не будет добавлять новые офлайн-события друг за другом, а будет обновлять существующую информацию. Если одна и та же сделка будет обновлена 1000 раз, в офлайн-событиях будет находиться только одна запись о том, какая именно сделка была изменена.&lt;/p&gt;\n&lt;h2 id=\"zachem-nuzhny-oflajn-sobytiya\"&gt;&lt;a href=\"api-reference/events/offline-events.html#zachem-nuzhny-oflajn-sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Зачем нужны офлайн-события&lt;/span&gt;&lt;/a&gt;Зачем нужны офлайн-события&lt;/h2&gt;\n&lt;p&gt;Смысл в том, что офлайн-события используются в основном для задачи синхронизации данных Битрикс24 и внешней системы.&lt;/p&gt;\n&lt;p&gt;Такие задачи часто не требуют реакции в реальном времени. Для таких задач совершенно не нужно сразу реагировать на каждое изменение.&lt;/p&gt;\n&lt;p&gt;Важно, чтобы, обращаясь из вашего приложения к Битрикс24, вы точно знали о том, какие объекты Битрикс24 были изменены, или добавлены, или удалены с момента предыдущего обращения приложения к Битрикс24.&lt;/p&gt;\n&lt;p&gt;И даже если одна и та же сделка была изменена сотню раз, для синхронизации этой сделки с внешней системой достаточно взять только текущее актуальное состояние сделки на момент синхронизации.&lt;/p&gt;\n&lt;p&gt;Именно поэтому, Битрикс24 не записывает в журнал офлайн-событий все факты изменения одного и того же объекта. Это значительно упрощает вам разработку приложений.&lt;/p&gt;\n&lt;h2 id=\"kak-postroit-rabotu-s-oflajn-sobytiyami\"&gt;&lt;a href=\"api-reference/events/offline-events.html#kak-postroit-rabotu-s-oflajn-sobytiyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как построить работу с офлайн-событиями&lt;/span&gt;&lt;/a&gt;Как построить работу с офлайн-событиями&lt;/h2&gt;\n&lt;p&gt;&lt;img src=\"api-reference/events/_images/how_to_build_work_with_offline_events.png\" alt=\"Как построить работу с офлайн-событиями\" title=\"Как построить работу с офлайн-событиями\" /&gt;&lt;/p&gt;\n&lt;p&gt;С некоторой периодичностью, ваше приложение должно запрашивать список произошедших событий.&lt;/p&gt;\n&lt;p&gt;Далее, обычными методами REST API, приложение должно получать актуальную информацию об измененных объектах и передавать обновленные данные во внешнюю систему и т.д.&lt;/p&gt;\n&lt;p&gt;И самое важное — на последнем шаге, приложение должно сообщить Битрикс24 о том, что вот эти события были приложением обработаны и больше хранить информацию о них не нужно.&lt;/p&gt;\n&lt;p&gt;Ведь если этого не делать, то каждый очередной раз, обращаясь к списку офлайн-событий, вы будете получать все больше и больше накопленных событий.&lt;/p&gt;\n&lt;h3 id=\"metod-eventofflineget\"&gt;&lt;a href=\"api-reference/events/offline-events.html#metod-eventofflineget\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Метод event.offline.get&lt;/span&gt;&lt;/a&gt;Метод event.offline.get&lt;/h3&gt;\n&lt;p&gt;Используя &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5n2ne9md\"&gt;event.offline.get&lt;/code&gt; вы можете разобрать все накопившиеся события, забирая их пакетами по 50 штук.&lt;/p&gt;\n&lt;p&gt;При этом работа метода оптимизирована для использования в асинхронном режиме. Это значит, что каждый параллельный вызов &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zppwsa1y\"&gt;event.offline.get&lt;/code&gt; гарантировано получит свои события, не пересекающиеся с другими событиями, с какой бы интенсивностью вы эти данные не запрашивали.&lt;/p&gt;\n&lt;p&gt;При этом, каждое обращение к методу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n4o07z3m\"&gt;event.offline.get&lt;/code&gt; с параметрами по умолчанию, будет не только забирать очередные 50 записей журнала, но и удалять эти записи.&lt;/p&gt;\n&lt;p&gt;Следовательно, возможна ситуация, когда ваше приложение сделало запрос &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ctpnat55\"&gt;event.offline.get&lt;/code&gt;, но по каким-то причинам (из-за переполнения памяти, из-за сетевых проблем и т.д.) не обработало эти события. Однако на стороне Битрикс24 информация об этих событиях уже была удалена и восстановлению информация не подлежит.&lt;/p&gt;\n&lt;p&gt;Чтобы гарантировать обработку всех офлайн событий, можно вызывать метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9n393jor\"&gt;event.offline.get&lt;/code&gt; с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xwq2jxi8\"&gt;clear = 0&lt;/code&gt;. В этом случае, пакет отдаваемых событий не будет удаляться в Битрикс24. А будет помечен уникальным идентификатором &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d860esi7\"&gt;process_id&lt;/code&gt; и «спрятан».&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/events/_images/method_event_offline_get.png\" alt=\"Метод event.offline.get\" title=\"Метод event.offline.get\" /&gt;&lt;/p&gt;\n&lt;p&gt;Приложение, обработав полученные события, должно само сообщить Битрикс24, что эти события можно удалять.&lt;/p&gt;\n&lt;p&gt;Для этого приложение должно вызвать &lt;a href=\"api-reference/events/event-offline-clear.html\"&gt;метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fe6xfi66\"&gt;event.offline.clear&lt;/code&gt;&lt;/a&gt;, указав параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vmnhd5yf\"&gt;process_id&lt;/code&gt; — тот самый уникальный идентификатор, полученный при вызове метода  &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kt8mepc2\"&gt;event.offline.get&lt;/code&gt;, а также, опционально, указав параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2xnyc2e3\"&gt;message_id&lt;/code&gt; в виде массива идентификаторов конкретных событий, которые нужно удалить.&lt;/p&gt;\n&lt;h2 id=\"how-to-avoid-cycles\"&gt;&lt;a href=\"api-reference/events/offline-events.html#how-to-avoid-cycles\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как избегать замкнутых циклов обработки&lt;/span&gt;&lt;/a&gt;Как избегать замкнутых циклов обработки&lt;/h2&gt;\n&lt;p&gt;Представим ситуацию. Ваше приложение получает событие об изменении сделки.&lt;/p&gt;\n&lt;p&gt;Затем запрашивает актуальную информацию о сделке при помощи соответствующего метода REST API. А затем хочет изменить эту же сделку в Битрикс24 исходя из своей бизнес-логики. Для этого приложение обращается к методу &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-loekd1gr\"&gt;crm.deal.update&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/events/_images/how_to_avoid_cycles.png\" alt=\"Как избегать циклов\" title=\"Как избегать циклов\" /&gt;&lt;/p&gt;\n&lt;p&gt;В случае с обычными событиями, как только приложение вызвало метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-odooysbo\"&gt;crm.deal.update&lt;/code&gt;, Битрикс24 тут же отправляет событие &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0c0ezyxu\"&gt;ONCRMDEALUPDATE&lt;/code&gt; на обработчик, зарегистрированный приложением.&lt;/p&gt;\n&lt;p&gt;А значит, возникает замкнутый цикл, когда изменение сделки на стороне Битрикс24 вызывает обработчик в приложении, который изменяет данные сделки в Битрикс24, который вызывает обработчик в приложении, который… и т.д.&lt;/p&gt;\n&lt;p&gt;Обработка такой ситуации требует определенных условий в приложении.&lt;/p&gt;\n&lt;p&gt;В случае с офлайн событиями, подобного цикла можно избежать. Для этого, при регистрации обработчика офлайн-события, необходимо указать параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i6t1sas9\"&gt;auth_connector&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Это создает как бы отдельную очередь офлайн-событий, привязанных к некому каналу обмена данными между Битрикс24 и приложением.&lt;/p&gt;\n&lt;p&gt;Затем, нужно использовать этот же параметр, когда вы вызываете &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ovpjbod1\"&gt;crm.deal.update&lt;/code&gt;, если вы хотите изменить данные в Битрикс24, но чтобы это изменение не инициировало повторное офлайн-событие.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/events/_images/how_to_avoid_cycles_2.png\" alt=\"Как избегать циклов 2\" title=\"Как избегать циклов 2\" /&gt;&lt;/p&gt;\n&lt;p&gt;Вся схема с использованием параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lvl6rufr\"&gt;auth_connector&lt;/code&gt; предназначена, чтобы приложение, модифицируя данные, проинформировало Битрикс24: не надо сообщать мне об изменениях, которые я само же и инциировало.&lt;/p&gt;\n&lt;p&gt;Отсюда вывод – если вы используете механизм офлайн-событий в Битрикс24, все модифицирующие запросы из вашего приложения должны выполняться с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3iqz41sl\"&gt;auth_connector&lt;/code&gt;, чтобы избежать ненужных событий. Это сильно упростит вам жизнь.&lt;/p&gt;\n&lt;p&gt;Стоит лишь добавить, что данный параметр на текущий момент поддерживается в Битрикс24 на тарифе Pro и выше. Учитывайте это при разработке.&lt;/p&gt;\n&lt;h2 id=\"minusy-mehanizma-oflajn-sobytij\"&gt;&lt;a href=\"api-reference/events/offline-events.html#minusy-mehanizma-oflajn-sobytij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Минусы механизма офлайн-событий&lt;/span&gt;&lt;/a&gt;Минусы механизма офлайн-событий&lt;/h2&gt;\n&lt;p&gt;У механизма офлайн-событий есть свои преимущества, но вы должны понимать и минусы такого подхода.&lt;/p&gt;\n&lt;p&gt;Во-первых, в отличие от обычных событий, когда Битрикс24 сам вызывает ваши обработчики, в случае офлайн-событий вам придётся создавать какой-то механизм, который с заданной периодичностью будет обращаться к Битрикс24. Это особенно нетривиальная задача для &lt;a href=\"market/index.html\"&gt;тиражных приложений&lt;/a&gt;, которые могут быть установлены на сотнях и тысячах разных Битрикс24.&lt;/p&gt;\n&lt;p&gt;Во-вторых, поскольку для получения новых событий ваше приложение будет обращаться к Битрикс24 через REST API, то на эти вызовы накладываются обычные ограничения по интенсивности запросов в секунду и по совокупному времени выполнения запросов. Подробнее об ограничениях вы можете узнать из &lt;a href=\"limits.html\"&gt;соответствующей статьи&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Главный вывод состоит в том, что получение приложением офлайн-событий может потребовать больше времени, чем это происходило бы в случае обычных онлайн-событий.&lt;/p&gt;\n&lt;h2 id=\"hitrosti-ispolzovaniya-oflajn-sobytij\"&gt;&lt;a href=\"api-reference/events/offline-events.html#hitrosti-ispolzovaniya-oflajn-sobytij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;«Хитрости» использования офлайн-событий&lt;/span&gt;&lt;/a&gt;«Хитрости» использования офлайн-событий&lt;/h2&gt;\n&lt;p&gt;Однако, существует одна хитрая возможность, которая в некоторой степени объединяет преимущества онлайн- и офлайн-событий.&lt;/p&gt;\n&lt;p&gt;А именно, &lt;a href=\"api-reference/events/on-offline-event.html\"&gt;особое событие&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c72lyxqp\"&gt;ONOFFLINEEVENT&lt;/code&gt;. Подписавшись на него обычным образом, то есть, указав свой обработчик на стороне приложения, вы будете получать вызовы на этот обработчик в случае, если в очереди офлайн-событий появились новые записи.&lt;/p&gt;\n&lt;p&gt;В параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-961h1hto\"&gt;minTimeout&lt;/code&gt; можно указать таймаут в секундах. В этом случае ваш обработчик будет вызываться только, если прошло указанное количество секунд с момента предыдущего вызова.&lt;/p&gt;\n&lt;p&gt;Эта настройка очень удобна, если вы не хотите, чтобы ваше приложение получало сигнал слишком часто, когда офлайн-событий, возможно, накопилось слишком мало.&lt;/p&gt;\n&lt;p&gt;Таким образом, ваше приложение, с одной стороны, автоматически получает сигнал со стороны Битрикс24 о том, что пора бы забрать офлайн-события. Это значит, что вам не нужно придумывать схему с самостоятельным периодическим опросом Битрикс24.&lt;/p&gt;\n&lt;p&gt;А с другой стороны, сами события, которые вам интересны, вы сможете самостоятельно забрать из очереди офлайн-событий со всеми преимуществами этого механизма.&lt;/p&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/events/offline-events.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/events.html\"&gt;Получить список доступных событий events&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-bind.html\"&gt;Зарегистрировать новый обработчик события event.bind&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-get.html\"&gt;Получить список зарегистрированных обработчиков событий event.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-unbind.html\"&gt;Отменить зарегистрированный обработчик события event.unbind&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/safe-event-handlers.html\"&gt;Безопасность в обработчиках&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-list.html\"&gt;Получить список офлайн-событий event.offline.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-get.html\"&gt;Получить список офлайн-событий с «очисткой» event.offline.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-clear.html\"&gt;Очистить записи в очереди офлайн-событий event.offline.clear&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-error.html\"&gt;Зарегистрировать ошибки обработки очереди офлайн-событий event.offline.error&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/on-offline-event.html\"&gt;Событие изменения очереди onOfflineEvent&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как работают офлайн-события","href":"api-reference/events/offline-events.html#kak-rabotayut-oflajn-sobytiya","level":2},{"title":"Зачем нужны офлайн-события","href":"api-reference/events/offline-events.html#zachem-nuzhny-oflajn-sobytiya","level":2},{"title":"Как построить работу с офлайн-событиями","href":"api-reference/events/offline-events.html#kak-postroit-rabotu-s-oflajn-sobytiyami","level":2,"items":[{"title":"Метод event.offline.get","href":"api-reference/events/offline-events.html#metod-eventofflineget","level":3}]},{"title":"Как избегать замкнутых циклов обработки","href":"api-reference/events/offline-events.html#how-to-avoid-cycles","level":2},{"title":"Минусы механизма офлайн-событий","href":"api-reference/events/offline-events.html#minusy-mehanizma-oflajn-sobytij","level":2},{"title":"«Хитрости» использования офлайн-событий","href":"api-reference/events/offline-events.html#hitrosti-ispolzovaniya-oflajn-sobytij","level":2},{"title":"Продолжите изучение","href":"api-reference/events/offline-events.html#prodolzhite-izuchenie","level":2}],"title":"Особенности, преимущества и недостатки офлайн-событий"},"router":{"pathname":"api-reference/events/offline-events","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
