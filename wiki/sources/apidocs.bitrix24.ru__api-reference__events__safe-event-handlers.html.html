        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Разработчик приложения в обработчиках событий должен убедиться в том, что обработчик вызывается именно Битрикс24, а не злоумышленниками. Для этого Битрикс24 при вызове обработчиков передает дополнительный параметр &lt;strong&gt;application_token&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;В первый раз параметр передаётся в обработчик события &lt;a href=\"api-reference/common/events/on-app-install.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gy2283br\"&gt;OnAppInstall&lt;/code&gt;&lt;/a&gt; вместе с данными авторизации пользователя, установившего приложение. При помощи этих данных авторизации обработчик события &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rayzmue6\"&gt;OnAppInstall&lt;/code&gt; может удостовериться в актуальности полученного &lt;strong&gt;access_token&lt;/strong&gt; и затем запомнить application_token, чтобы в дальнейшем, в своих обработчиках других событий сверять получаемый application_token с сохраненным.&lt;/p&gt;\n&lt;p&gt;Особенно это актуально в обработчике события &lt;a href=\"api-reference/common/events/on-app-uninstall.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jujvxaqm\"&gt;OnAppUninstall&lt;/code&gt;&lt;/a&gt;, поскольку в него не передаются данные авторизации (приложение уже удалено на Битрикс24). Поэтому в случае с OnAppUninstall сверка application_token с сохраненным значением становится единственным способом удостовериться, что обработчик события вызван именно Битрикс24.&lt;/p&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/events/safe-event-handlers.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/events.html\"&gt;Получить список доступных событий events&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-bind.html\"&gt;Зарегистрировать новый обработчик события event.bind&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-get.html\"&gt;Получить список зарегистрированных обработчиков событий event.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-unbind.html\"&gt;Отменить зарегистрированный обработчик события event.unbind&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/offline-events.html\"&gt;Особенности, преимущества и недостатки офлайн-событий&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-list.html\"&gt;Получить список офлайн-событий event.offline.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-get.html\"&gt;Получить список офлайн-событий с «очисткой» event.offline.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-clear.html\"&gt;Очистить записи в очереди офлайн-событий event.offline.clear&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/event-offline-error.html\"&gt;Зарегистрировать ошибки обработки очереди офлайн-событий event.offline.error&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/events/on-offline-event.html\"&gt;Событие изменения очереди onOfflineEvent&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Продолжите изучение","href":"api-reference/events/safe-event-handlers.html#prodolzhite-izuchenie","level":2}],"title":"Безопасность в обработчиках"},"router":{"pathname":"api-reference/events/safe-event-handlers","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
