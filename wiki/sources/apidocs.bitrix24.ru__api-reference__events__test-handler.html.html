            {"data":{"leading":false,"html":"&lt;p&gt;После регистрирации обработчика ONAPPTEST вручную вызывается метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-txf98obr\"&gt;event.test&lt;/code&gt;. Это вызывает срабатывание указанного события и позволяет убедиться, что обработчик действительно в состоянии принимать данные о событиях.&lt;/p&gt;\n&lt;h2 id=\"shag-1\"&gt;&lt;a href=\"api-reference/events/test-handler.html#shag-1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 1&lt;/span&gt;&lt;/a&gt;Шаг 1&lt;/h2&gt;\n&lt;p&gt;Создайте файл handler.php на своём сервере. Убедитесь что он доступен из интернета. Рядом с файлом создайте папку \\log.&lt;/p&gt;\n&lt;p&gt;Код файла handler.php.&lt;/p&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-3wu632f2\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;PHP&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"cpspdbzy\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-meta\"&gt;&amp;lt;?&lt;/span&gt;\n&lt;span class=\"hljs-title function_ invoke__\"&gt;file_put_contents&lt;/span&gt;(\n    &lt;span class=\"hljs-keyword\"&gt;__DIR__&lt;/span&gt; . &lt;span class=\"hljs-string\"&gt;'/log/'&lt;/span&gt; . &lt;span class=\"hljs-title function_ invoke__\"&gt;time&lt;/span&gt;() . &lt;span class=\"hljs-string\"&gt;'.txt'&lt;/span&gt;,\n    &lt;span class=\"hljs-title function_ invoke__\"&gt;var_export&lt;/span&gt;(&lt;spa idden\" dur=\"1s\" begin=\"visibileAnimation-47.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"04i5azc1\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-meta\"&gt;&amp;lt;?&lt;/span&gt;\n&lt;span class=\"hljs-variable\"&gt;$eventBind&lt;/span&gt; = &lt;span class=\"hljs-title class_\"&gt;CRest&lt;/span&gt;::&lt;span class=\"hljs-title function_ invoke__\"&gt;call&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'event.bind'&lt;/span&gt;,\n    [\n        &lt;span class=\"hljs-string\"&gt;'event'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ONAPPTEST'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'handler'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'https://example.com/handler.php'&lt;/span&gt;\n    ]\n);\n&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$eventBind&lt;/span&gt;[&lt;span class=\"hljs-string\"&gt;'result'&lt;/span&gt;])\n{\n    &lt;span class=\"hljs-keyword\"&gt;echo&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;'event bind successful'&lt;/span&gt;;\n}\n&lt;span class=\"hljs-meta\"&gt;?&amp;gt;&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"50\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-50\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-50\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-50.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"shag-3\"&gt;&lt;a href=\"api-reference/events/test-handler.html#shag-3\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 3&lt;/span&gt;&lt;/a&gt;Шаг 3&lt;/h2&gt;\n&lt;p&gt;Заставьте событие сработать вызовом метода с произвольными данными.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-tcam1d5o\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"curl-oauth-1\" data-diplodoc-key=\"curl%20(oauth)\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;cURL (OAuth)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"js-1\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php-2\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"f27spwup\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"cURL (OAuth)\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs bash\"&gt;curl -X POST \\\n-H &lt;span class=\"hljs-string\"&gt;\"Content-Type: application/json\"&lt;/span&gt; \\\n-H &lt;span class=\"hljs-string\"&gt;\"Accept: application/json\"&lt;/span&gt; \\\n-d &lt;span class=\"hljs-string\"&gt;'{\"any\":\"data\",\"auth\":\"**put_access_token_here**\"}'&lt;/span&gt; \\\nhttps:
