            {"data":{"leading":false,"html":"&lt;p&gt;В Битрикс24 есть два типа файловых полей.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Файл.&lt;/strong&gt; Поле не связано с Диском, в него файлы загружаются напрямую через строку формата &lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Base64&lt;/a&gt;. После загрузки в поле хранится ID файла.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Файл (диск).&lt;/strong&gt; Поле связано с Диском, в поле хранится ID объекта диска. Поле не обрабатывает формат Base64. Для обновления файлов диска используйте методы &lt;a href=\"api-reference/disk/file/index.html\"&gt;disk.file.*&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"kak-obnovit-fajl\"&gt;&lt;a href=\"api-reference/files/how-to-update-files.html#kak-obnovit-fajl\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как обновить файл&lt;/span&gt;&lt;/a&gt;Как обновить файл&lt;/h2&gt;\n&lt;p&gt;Если поле не множественное, загрузите новый файл в поле методом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y7t3p4gf\"&gt;*.update&lt;/code&gt;. Используйте формат передачи данных &lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Base64&lt;/a&gt;. При загрузке нового файла старый файл удалится автоматически.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-2a2f7z5u\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"curl-webhook\" data-diplodoc-key=\"curl%20(webhook)\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;cURL (Webhook)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-oauth\" data-diplodoc-key=\"curl%20(oauth)\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;cURL (OAuth)&lt;/div&gt;\n&lt;div data-diplo lt;p&gt;Не рекомендуется использовать методы &lt;a href=\"api-reference/crm/deals/crm-deal-update.html\"&gt;crm.deal.update&lt;/a&gt;, &lt;a href=\"api-reference/crm/leads/crm-lead-update.html\"&gt;crm.lead.update&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/crm-contact-update.html\"&gt;crm.contact.update&lt;/a&gt;, &lt;a href=\"api-reference/crm/companies/crm-company-update.html\"&gt;crm.company.update&lt;/a&gt; для обновления файловых полей.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h4 id=\"1-poluchit-id-fajlov-v-pole\"&gt;&lt;a href=\"api-reference/files/how-to-update-files.html#1-poluchit-id-fajlov-v-pole\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;1. Получить ID файлов в поле&lt;/span&gt;&lt;/a&gt;1. Получить ID файлов в поле&lt;/h4&gt;\n&lt;p&gt;Перед обновлением поля получите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3ujl6g20\"&gt;ID&lt;/code&gt; текущих файлов, чтобы сохранить их. Можно использовать метод &lt;a href=\"api-reference/crm/universal/crm-item-get.html\"&gt;crm.item.get&lt;/a&gt;, он вернет все поля элемента, или метод &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;crm.item.list&lt;/a&gt; с выбором только нужного поля типа «файл» в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-efxq5tee\"&gt;select&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-oz60z7fe\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"curl-webhook-2\" data-diplodoc-key=\"curl%20(webhook)\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;cURL (Webhook)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-oauth-2\" data-diplodoc-key=\"curl%20(oauth)\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"f
