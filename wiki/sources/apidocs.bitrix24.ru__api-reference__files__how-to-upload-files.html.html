        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В Битрикс24 есть два типа файловых полей.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Файл.&lt;/strong&gt; Поле не связано с Диском, в него файлы загружаются напрямую, через строку формата Base64.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;Файл (диск).&lt;/strong&gt; Поле связано с Диском, в поле хранится ID объекта диска. Формат Bаse64 в поле не обрабатывается, поэтому сначала файл загружается на Диск Битрикс24 методами &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt; или &lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для загрузки файлов в Битрикс24 используйте стандарт кодирования Base64. Кодирование используется, когда нужно передать файл через текстовые протоколы, например HTTP.&lt;/p&gt;\n&lt;h2 id=\"kak-kodirovat-fajl-v-base64\"&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html#kak-kodirovat-fajl-v-base64\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как кодировать файл в Bаse64&lt;/span&gt;&lt;/a&gt;Как кодировать файл в Bаse64&lt;/h2&gt;\n&lt;p&gt;В JavaScript можно использовать встроенный объект &lt;a href=\"https://www.w3.org/TR/FileAPI/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;FileReader&lt;/a&gt;. Код считывает файл, который выбрал пользователь, и преобразует его в Bаse64.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs JavaScript\"&gt;&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; fileInput = &lt;span class=\"hljs-variable language_\"&gt;document&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;getElementById&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'fileInput'&lt;/span&gt;); &lt;span class=\"hljs-comment\"&gt;// Поле для выбора файла&lt;/span&gt;\n\nfileInput.&lt;span class=\"hljs-title function_\"&gt;addEventListener&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'change'&lt;/span&gt;, &lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;) {\n    &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; file = fileInput.&lt;span class=\"hljs-property\"&gt;files&lt;/span&gt;[&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;]; &lt;span class=\"hljs-comment\"&gt;// Получаем выбранный файл&lt;/span&gt;\n    &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; reader = &lt;span class=\"hljs-keyword\"&gt;new&lt;/span&gt; &lt;span class=\"hljs-title class_\"&gt;FileReader&lt;/span&gt;();\n\n    reader.&lt;span class=\"hljs-property\"&gt;onload&lt;/span&gt; = &lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;) {\n        &lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; base64 = reader.&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;split&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;','&lt;/span&gt;)[&lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;]; &lt;span class=\"hljs-comment\"&gt;// Получаем base64 без префикса&lt;/span&gt;\n        &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;(base64); &lt;span class=\"hljs-comment\"&gt;// Выводим результат&lt;/span&gt;\n    };\n\n    reader.&lt;span class=\"hljs-title function_\"&gt;readAsDataURL&lt;/span&gt;(file); &lt;span class=\"hljs-comment\"&gt;// Кодируем файл в base64&lt;/span&gt;\n});\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"24\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-24\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-24\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-24.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В PHP можно использовать функцию &lt;a href=\"https://www.php.net/manual/en/function.base64-encode.php\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;base64_encode&lt;/a&gt;. Код читает файл с диска и кодирует его в Bаse64.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs PHP\"&gt;&lt;span class=\"hljs-variable\"&gt;$filePath&lt;/span&gt; = &lt;span class=\"hljs-string\"&gt;'path/to/your/file.jpg'&lt;/span&gt;; &lt;span class=\"hljs-comment\"&gt;// Путь к файлу&lt;/span&gt;\n&lt;span class=\"hljs-variable\"&gt;$fileData&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;file_get_contents&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$filePath&lt;/span&gt;); &lt;span class=\"hljs-comment\"&gt;// Читаем файл&lt;/span&gt;\n&lt;span class=\"hljs-variable\"&gt;$base64&lt;/span&gt; = &lt;span class=\"hljs-title function_ invoke__\"&gt;base64_encode&lt;/span&gt;(&lt;span class=\"hljs-variable\"&gt;$fileData&lt;/span&gt;); &lt;span class=\"hljs-comment\"&gt;// Кодируем в base64&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"28\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-28\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-28\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-28.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В результате кодирования файла получим строку вида &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f5mq6eho\"&gt;YmFzZSDRgtC10YHRgg==&lt;/code&gt;. Чем больше размер файла, тем длиннее будет строка.&lt;/p&gt;\n&lt;h2 id=\"kak-peredat-stroku-s-base64-v-pole\"&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html#kak-peredat-stroku-s-base64-v-pole\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как передать строку с Bаse64 в поле&lt;/span&gt;&lt;/a&gt;Как передать строку с Bаse64 в поле&lt;/h2&gt;\n&lt;p&gt;В Битрикс24 есть 4 особенности загрузки файлов.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Передавайте строку с Bаse64 в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jnpl8kpc\"&gt;file&lt;/code&gt;, если используете методы:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/document-generator/templates/document-generator-template-add.html\"&gt;documentgenerator.template.add&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/crm/document-generator/templates/crm-document-generator-template-add.html\"&gt;crm.documentgenerator.template.add&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-mi16e7d0\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-oauth\" data-diplodoc-key=\"curl%20(oauth)\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;cURL (OAuth)&lt;/div&gt;\n&lt;div data-diplodoc-id=\"curl-webhook\" data-diplodoc-key=\"curl%20(webhook)\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;cURL (Webhook)&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"zov5j6ov\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs JavaScript\"&gt;&lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'documentgenerator.template.add'&lt;/span&gt;,\n    {\n        &lt;span class=\"hljs-attr\"&gt;fields&lt;/span&gt;: {\n            &lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Пример шаблона\"&lt;/span&gt;,\n            &lt;span class=\"hljs-attr\"&gt;file&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"base64_encoded_content_here\"&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;// Контент файла, закодированный в base64&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;code&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"example_template_code\"&lt;/span&gt;\n        }\n    }\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"71\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-71\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-71\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-71.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"h9b9tl5v\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-keyword\"&gt;require_once&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'crest.php'&lt;/span&gt;);\n\n&lt;span class=\"hljs-variable\"&gt;$result&lt;/span&gt; = &lt;span class=\"hljs-title class_\"&gt;CRest&lt;/span&gt;::&lt;span class=\"hljs-title function_ invoke__\"&gt;call&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'documentgenerator.template.add'&lt;/span&gt;,\n    [\n        &lt;span class=\"hljs-string\"&gt;'fields'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Пример шаблона'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'file'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'base64_encoded_content_here'&lt;/span&gt;, // Контент файла, закодированный в base64\n            &lt;span class=\"hljs-string\"&gt;'code'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'example_template_code'&lt;/span&gt; \n        ]\n    ]\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"74\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-74\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-74\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-74.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"umz4q3q8\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"cURL (OAuth)\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs bash\"&gt;curl -X POST \\\n-H &lt;span class=\"hljs-string\"&gt;\"Content-Type: application/json\"&lt;/span&gt; \\\n-H &lt;span class=\"hljs-string\"&gt;\"Accept: application/json\"&lt;/span&gt; \\\n-d &lt;span class=\"hljs-string\"&gt;'{\"fields\":{\"name\":\"Пример шаблона\",\"file\":\"base64_encoded_content_here\",\"code\":\"example_template_code\"},\"auth\":\"**put_access_token_here**\"}'&lt;/span&gt; \\\nhttps://**put_your_bitrix24_address**/rest/documentgenerator.template.add\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button c on-425.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"5sr8jfz3\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"cURL (Webhook)\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs bash\"&gt;curl -X POST \\\n-H &lt;span class=\"hljs-string\"&gt;\"Content-Type: application/json\"&lt;/span&gt; \\\n-H &lt;span class=\"hljs-string\"&gt;\"Accept: application/json\"&lt;/span&gt; \\\n-d &lt;span class=\"hljs-string\"&gt;'{\"fields\":{\"TITLE\":\"Пример лида\",\"UF_CRM_1711610801\":[{\"fileData\":[\"file1.png\",\"base64_1\"]},{\"fileData\":[\"file2.png\",\"base64_2\"]},{\"fileData\":[\"file3.png\",\"base64_3\"]}]}}'&lt;/span&gt; \\\nhttps://**put_your_bitrix24_address**/rest/**put_your_user_id_here**/**put_your_webhook_here**/crm.lead.add\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"428\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-428\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-428\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-428.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"ogranicheniya-pri-rabote-s-fajlami\"&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html#ogranicheniya-pri-rabote-s-fajlami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ограничения при работе с файлами&lt;/span&gt;&lt;/a&gt;Ограничения при работе с файлами&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Ограничение на длину GET-запроса — 2048 символов, это длина URL-адреса. Файлы, кодированные в Bаse64, часто превышают это значение. Для передачи больших файлов используйте POST-запрос.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Ограничение на размер POST-запроса в Битрикс24 — 2Гб. Файлы больше 2Гб обработаны не будут. Если в одном в запросе передается несколько файлов суммарно больше 2Гб — запрос прервется. Для загрузки нескольких файлов большого размера передавайте данные в отдельных запросах.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Ограничение на время выполнения запроса — 60 секунд для облачного Битрикс24. Запрос прервется по таймауту, если обработка занимает дольше 60 секунд. Проверить время выполнения запроса можно в объекте &lt;a href=\"api-reference/data-types.html#time\"&gt;time&lt;/a&gt; ответа на запрос, параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1lsg6mmj\"&gt;duration&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если при передаче файла, закодированного строку в Bаse64, метод выполняется в адресной строке GET-запросом или метод выполняется через curl — Bаse64 нужно дополнительно &lt;a href=\"settings/how-to-call-rest-api/data-encoding.html\"&gt;закодировать в urlencode&lt;/a&gt;, иначе файл не прочитается.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Как кодировать файл в Bаse64","href":"api-reference/files/how-to-upload-files.html#kak-kodirovat-fajl-v-base64","level":2},{"title":"Как передать строку с Bаse64 в поле","href":"api-reference/files/how-to-upload-files.html#kak-peredat-stroku-s-base64-v-pole","level":2},{"title":"Как загрузить файлы во множественное поле","href":"api-reference/files/how-to-upload-files.html#kak-zagruzit-fajly-vo-mnozhestvennoe-pole","level":2},{"title":"Ограничения при работе с файлами","href":"api-reference/files/how-to-upload-files.html#ogranicheniya-pri-rabote-s-fajlami","level":2}],"title":"Как загрузить файлы"},"router":{"pathname":"api-reference/files/how-to-upload-files","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
