        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hm3d2ymw\"&gt;imopenlines&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод отправляет сообщения в открытую линию. В параметрах метода используются значения внешней системы — это значения ID пользователя, ID чата, ссылки на чат и его названия в приложении, которое &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-register.html\"&gt;зарегистрировало&lt;/a&gt; коннектор.&lt;/p&gt;\n&lt;p&gt;Значения созданных ID чата и ID диалога открытой линии Битрикс будут возвращены в результате работы метода.&lt;/p&gt;\n&lt;h2 id=\"parametry-metoda\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-send-messages.html#parametry-metoda\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры метода&lt;/span&gt;&lt;/a&gt;Параметры метода&lt;/h2&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1semj0u4\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;CONNECTOR&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uiwgmlmz\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1rw0rbco\"&gt;ID&lt;/code&gt; коннектора, который был указан при регистрации обработчика&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;LINE&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xgpttaph\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cajkmcor\"&gt;ID&lt;/code&gt; открытой линии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;MESSAGES&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qfyxxe8d\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив сообщений. Каждое сообщение описывается отдельным массивом, включающим информацию о пользователе, сообщении и чате.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-comment\"&gt;//Массив описания пользователя&lt;/span&gt;\n        &lt;span class=\"hljs-string\"&gt;'user'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'id'&lt;/span&gt;,&lt;span class=\"hljs-comment\"&gt;//ID пользователя во внешней системе *&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'last_name'&lt;/span&gt;,&lt;span class=\"hljs-comment\"&gt;//Фамилия&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;,&lt;span class=\"hljs-comment\"&gt;//Имя&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'picture'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                &lt;span class=\"hljs-string\"&gt;'url'&lt;/span&gt;&lt;span class=\"hljs-comment\"&gt;//Ссылка на аватарку пользователя, доступную для портала&lt;/span&gt;\n            ),\n            &lt;span class=\"hljs-string\"&gt;'url'&lt;/span&gt;,&lt;span class=\"hljs-comment\"&gt;//Ссылка на профиль пользователя&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'sex'&lt;/span&gt;,&lt;span class=\"hljs-comment\"&gt;//Пол. Допустимо male и female&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'email'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//email&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'phone'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//телефон&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'skip_phone_validate'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Y'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//В значении 'Y' позволяет не применять валидацию &lt;/span&gt;\n                                            &lt;span class=\"hljs-comment\"&gt;//номера телефона пользователя. По умолчанию         &lt;/span&gt;\n        ),\n        &lt;span class=\"hljs-comment\"&gt;//Массив описания сообщения&lt;/span&gt;\n        &lt;span class=\"hljs-string\"&gt;'message'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'id'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//ID сообщения во внешней системе.*&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'date'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//Время сообщения в формате timestamp *&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'disable_crm'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Y'&lt;/span&gt; ,&lt;span class=\"hljs-comment\"&gt;//отключить чат трекер (CRM трекер)&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//Текст сообщения. Должен быть указан элемент text или files. &lt;/span&gt;\n                    &lt;span class=\"hljs-comment\"&gt;//Допустимое форматирование (BB коды) описаны &lt;/span&gt;\n                    &lt;span class=\"hljs-comment\"&gt;//здесь: https://apidocs.bitrix24.ru/api-reference/chats/messages/index.html&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'files'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-comment\"&gt;//Массив описаний файлов, где каждый файл описывается &lt;/span&gt;\n                             &lt;span class=\"hljs-comment\"&gt;//массивом, со ссылкой, которая доступна порталу&lt;/span&gt;\n                &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'url'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Cсылка на файл'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Имя файла'&lt;/span&gt;),\n                &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'url'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Cсылка на файл'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Имя файла'&lt;/span&gt;),\n                ...\n            )\n        ),\n        &lt;span class=\"hljs-comment\"&gt;//Массив описания чата&lt;/span&gt;\n        &lt;span class=\"hljs-string\"&gt;'chat'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'id'&lt;/span&gt;,&lt;span class=\"hljs-comment\"&gt;//ID чата во внешней системе *&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//Имя чата во внешней системе&lt;/span&gt;\n            &lt;span class=\"hljs-string\"&gt;'url'&lt;/span&gt;, &lt;span class=\"hljs-comment\"&gt;//Ссылка на чат во внешней системе&lt;/span&gt;\n        ),\n    ),\n    &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(...),\n);\n\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"78\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-78\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-78\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-78.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В массиве &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z4p82a9k\"&gt;user&lt;/code&gt; поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6x6zy1tq\"&gt;name&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n36mg7hj\"&gt;last_name&lt;/code&gt; могут содержать буквы, пробелы, дефисы и апострофы. Цифры и другие специальные символы использовать нельзя. Максимальная длина для &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0e7l39q9\"&gt;name&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g0gg6wd2\"&gt;last_name&lt;/code&gt; — 25 символов. Язык и регистр могут быть любыми.&lt;/p&gt;\n&lt;p&gt;Формат передаваемого файла не имеет ограничений. В чате вложение в сообщение может форматироваться как картинка для типов: jpe, jpg, jpeg, png, webp, gif, bmp.&lt;/p&gt;\n&lt;p&gt;Сообщения можно отправлять от имени менеджера, указав &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gt2sv2h2\"&gt;user_id&lt;/code&gt; в массиве message.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z8akhxt6\"&gt;skip_phone_validate&lt;/code&gt; из структуры пользователя рекомендуется применять только в исключительных случаях. Параметр — вынужденная мера для преодоления ограничений валидатора номеров телефонов.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"obrabotka-otveta\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-send-messages.html#obrabotka-otveta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обработка ответа&lt;/span&gt;&lt;/a&gt;Обработка ответа&lt;/h2&gt;\n&lt;p&gt;HTTP-статус: &lt;strong&gt;200&lt;/strong&gt;&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"SUCCESS\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-literal\"&gt;&lt;span class=\"hljs-keyword\"&gt;true&lt;/span&gt;&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"DATA\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"RESULT\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"user\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"1670\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"message\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"date\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"disable_crm\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"true\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"text\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"test message\"&lt;/span&gt;\n                &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"chat\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"name\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"test_chat\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"description\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Ссылка на исходный пост: example.com\"&lt;/span&gt;\n                &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"extra\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"skip_phone_validate\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"Y\"&lt;/span&gt;\n                &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"SUCCESS\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-literal\"&gt;&lt;span class=\"hljs-keyword\"&gt;true&lt;/span&gt;&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"session\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"ID\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"3267\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                    &lt;span class=\"hljs-attr\"&gt;\"CHAT_ID\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"9853\"&lt;/span&gt;\n                &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"108\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-108\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-108\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-108.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h3 id=\"vozvrashaemye-dannye\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-send-messages.html#vozvrashaemye-dannye\" class=\"yfm-anc e is denied for this method&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректный тип авторизации. Необходим тип oauth&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xgbobebp\"&gt;CONNECTOR&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Argument 'CONNECTOR' is null or empty&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не указан обязательный параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hbm127vg\"&gt;CONNECTOR&lt;/code&gt; в запросе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6ed1o8yr\"&gt;LINE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Argument 'LINE' is null or empty&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не указан обязательный параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hfc91bb7\"&gt;LINE&lt;/code&gt; в запросе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kcx3vukn\"&gt;MESSAGES&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Argument 'MESSAGES' is null or empty&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не указан обязательный параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d5h9fvqd\"&gt;MESSAGES&lt;/code&gt; в запросе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kveqmjiw\"&gt;MESSAGES&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;The value of an argument 'MESSAGES' must be of type array&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Значение параметра не является массивом.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-evgimc5o\"&gt;IMCONNECTOR_NO_CORRECT_PROVIDER&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не удалось найти подходящий провайдер для коннектора&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректное значение в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s7wi7rf0\"&gt;CONNECTOR&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5fl603by\"&gt;IMCONNECTOR_COULD_NOT_GET_PROVIDER_OBJECT&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не удалось получить объект провайдера&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректное значение в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u67ll8bq\"&gt;CONNECTOR&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2ysla706\"&gt;IMCONNECTOR_NOT_SPECIFIED_CORRECT_COMMAND&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не указана корректная команда&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Что-то невероятное. Это где-то ошибся разработчик&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-paahoptr\"&gt;IMCONNECTOR_NOT_SPECIFIED_CORRECT_CONNECTOR&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не указан коннектор&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректное значение в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9dfr7y0k\"&gt;CONNECTOR&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1l6aki1p\"&gt;NOT_ACTIVE_LINE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Линия c таким ID неактивна или не существует&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Линия на портале удалена или отключена&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lwwr4wfe\"&gt;PROVIDER_UNSUPPORTED_TYPE_INCOMING_MESSAGE&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Неподдерживаемый тип входящего сообщения от сервера&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректное значение в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1nccgpz3\"&gt;type_message&lt;/code&gt;, если он передан&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o0y45x3d\"&gt;IMCONNECTOR_NOT_ALL_THE_REQUIRED_DATA&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переданы не все необходимые данные&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пустое или не корректное значение в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ua82i54v\"&gt;user&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9uc2qdwr\"&gt;CONNECTOR_PROXY_NO_ADD_USER&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не удалось создать или получить пользователя системы, сопоставленного с пользователем удаленного мессенджера&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Для работы чата открытых линий необходимо на портал добавить специального технического пользователя с признаком, что это пользователь для мессенджер-коннектора, и под которым невозможно авторизоваться&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-opgxbpfr\"&gt;CONNECTOR_PROXY_NO_USER_IM&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Не получен id пользователя мессенджера&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректное значение поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qt39rm4t\"&gt;id&lt;/code&gt; в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ii426uu5\"&gt;user&lt;/code&gt;. Это следствие предыдущей ошибки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cbpj9kfe\"&gt;IMCONNECTOR_NOT_ALL_THE_REQUIRED_DATA&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переданы не все необходимые данные&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректное значение поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h75rs3kx\"&gt;text&lt;/code&gt; или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fenolxw3\"&gt;files&lt;/code&gt; в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9jpzozc1\"&gt;message&lt;/code&gt;. Не переданы какие-либо данные для отправки сообщения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-frrpzz2w\"&gt;100&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;The MESSAGES parameter must be an array of messages (arrays)&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Значение параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g5vr7d2h\"&gt;MESSAGES&lt;/code&gt; должно быть массивом сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1rjti6ae\"&gt;100&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;The incorrect structure of a message inside MESSAGES parameter.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Некорректная структура сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-send-messages.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/openlines/example-connector.html\"&gt;Как создать коннектор открытых линий для чата на сайте&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Параметры метода","href":"api-reference/imopenlines/imconnector/imconnector-send-messages.html#parametry-metoda","level":2},{"title":"Обработка ответа","href":"api-reference/imopenlines/imconnector/imconnector-send-messages.html#obrabotka-otveta","level":2,"items":[{"title":"Возвращаемые данные","href":"api-reference/imopenlines/imconnector/imconnector-send-messages.html#vozvrashaemye-dannye","level":3,"items":[{"title":"Объект RESULT","href":"api-reference/imopenlines/imconnector/imconnector-send-messages
