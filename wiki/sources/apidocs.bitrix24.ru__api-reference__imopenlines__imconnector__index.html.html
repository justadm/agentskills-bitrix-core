            {"data":{"leading":false,"html":"&lt;p&gt;Коннекторы открытых линий — это инструмент для интеграции внешних мессенджеров и социальных сетей с Битрикс24. Коннекторы позволяют:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;отвечать на сообщения клиентов из разных каналов в едином интерфейсе.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;подключать чат-ботов, чтобы автоматизировать общение с клиентами.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;анализировать статистику диалогов, чтобы оценить эффективность коммуникаций.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/imopenlines/imconnector/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/7872935/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Подключение каналов Контакт-центра&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-konnektorov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#svyaz-konnektorov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь коннекторов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь коннекторов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Открытые линии&lt;/strong&gt;. Собирают сообщения с коннекторов, управляют очередями и распределяют сообщения между сотрудниками. Работать с открытыми линиями следует с помощью группы методов &lt;a href=\"api-reference/imopenlines/openlines/index.html\"&gt;imopenlines.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM&lt;/strong&gt;. На основе сообщений можно автоматически создавать лиды и сделки методами &lt;a href=\"api-reference/crm/leads/crm-lead-add.html\"&gt;crm.lead.add&lt;/a&gt; и &lt;a href=\"api-reference/crm/deals/crm-deal-add.html\"&gt;crm.deal.add&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. Получить идентификатор пользователя позволяют методы &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат&lt;/strong&gt;. За переписку с пользователями отвечают методы &lt;a href=\"api-reference/chats/index.html\"&gt;im.chat.*&lt;/a&gt; и &lt;a href=\"api-reference/chats/messages/index.html\"&gt;im.message.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат-боты&lt;/strong&gt;. Настройка автоматических ответов и чат-ботов выполняется с помощью методов &lt;a href=\"api-reference/chat-bots/index.html\"&gt;imbot.*&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\"kak-podklyuchit-konnektor\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#kak-podklyuchit-konnektor\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как подключить коннектор&lt;/span&gt;&lt;/a&gt;Как подключить коннектор&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Зарегистрируйте коннектор с помощью метода &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-register.html\"&gt;imconnector.register&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Активируйте его методом &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-activate.html\"&gt;imconnector.activate&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Установите данные коннектора методом &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-connector-data-set.html\"&gt;imconnector.connector.data.set&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Проверьте статус коннектора методом &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-status.html\"&gt;imconnector.status&lt;/a&gt; и убедитесь, что он готов к работе.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"kak-rabotat-s-soobsheniyami\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#kak-rabotat-s-soobsheniyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работать с сообщениями&lt;/span&gt;&lt;/a&gt;Как работать с сообщениями&lt;/h2&gt;\n&lt;p&gt;Отправить сообщение можно методом &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-send-messages.html\"&gt;imconnector.send.messages&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Отправленные сообщения можно изменять методом &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-update-messages.html\"&gt;imconnector.update.messages&lt;/a&gt;. Метод изменяет параметры пользователя, сообщения и чата.&lt;/p&gt;\n&lt;p&gt;Удалить сообщения открытых линий можно методом &lt;a href=\"api-reference/imopenlines/imconnector/imconnector-delete-messages.html\"&gt;imconnector.delete.messages&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-dobavit-vidzhet-v-kontakt-centr\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#kak-dobavit-vidzhet-v-kontakt-centr\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как добавить виджет в Контакт-центр&lt;/span&gt;&lt;/a&gt;Как добавить виджет в Контакт-центр&lt;/h2&gt;\n&lt;p&gt;Чтобы добавить виджет коннектора в Контакт-центр, используйте код встройки &lt;a href=\"api-reference/widgets/contact-center.html\"&gt;CONTACT_CENTER&lt;/a&gt;. Этот код необходимо указать в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zy88iw5d\"&gt;PLACEMENT&lt;/code&gt; метода &lt;a href=\"api-reference/widgets/placement-bind.html\"&gt;placement.bind&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vatov4sl\"&gt;imopenlines&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользовательs&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9w5vht1u\"&gt;imconnector.*&lt;/code&gt; в текущей версии не поддерживают работу через вебхуки.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"konnektor\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#konnektor\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Коннектор&lt;/span&gt;&lt;/a&gt;Коннектор&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-nzfdvy1e\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"v7vf3evu\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-register.html\"&gt;imconnector.register&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Зарегистрировать коннектор&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-activate.html\"&gt;imconnector.activate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Активировать коннектор&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-status.html\"&gt;imconnector.status&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить статус коннектора&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-connector-data-set.html\"&gt;imconnector.connector.data.set&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменить настройки коннектора&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-list.html\"&gt;imconnector.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список коннекторов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-unregister.html\"&gt;imconnector.unregister&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отменить регистрацию коннектора&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"hutpudh0\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/events/on-im-connector-line-delete.html\"&gt;OnImConnectorLineDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении открытой линии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/events/on-im-connector-status-delete.html\"&gt;OnImConnectorStatusDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При отключении открытой линии&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"chaty-i-soobsheniya\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#chaty-i-soobsheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Чаты и сообщения&lt;/span&gt;&lt;/a&gt;Чаты и сообщения&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-qoeuhasu\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы-1\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события-1\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"jsvtsalf\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-send-messages.html\"&gt;imconnector.send.messages&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправить сообщения в Битрикс24&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/imconnector-update-messages.html\"&gt;imconnector.update.messages&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&g ании диалога&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/events/on-im-connector-dialog-finish.html\"&gt;OnImConnectorDialogFinish&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При закрытии диалога&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/events/index.html\"&gt;OnImConnectorMessageAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении нового сообщения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/events/on-im-connector-message-delete.html\"&gt;OnImConnectorMessageDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/imconnector/events/on-im-connector-message-update.html\"&gt;OnImConnectorMessageUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При изменении сообщений&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/imopenlines/imconnector/index.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/openlines/example-connector.html\"&gt;Как создать коннектор Открытых линий для онлайн-чата на сайте&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script"
