        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Чат-боты в открытых линиях помогают автоматизировать общение с клиентами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;автоматически отвечать на сообщения клиентов,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;перенаправлять диалоги на операторов,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;собирать данные о клиентах, например, имена и email.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-chat-botov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html#svyaz-chat-botov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь чат-ботов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь чат-ботов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. Получить идентификатор пользователя позволяют методы &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат&lt;/strong&gt;. Отправлять, изменять и удалять сообщения помогают методы &lt;a href=\"api-reference/chat-bots/messages/index.html\"&gt;imbot.message.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Открытые линии&lt;/strong&gt;. Чат-боты могут перевести разговор на другую линию с помощью &lt;a href=\"api-reference/imopenlines/openlines/chat-bots/imopenlines-bot-session-transfer.html\"&gt;imopenlines.bot.session.transfer&lt;/a&gt;. Работать с открытыми линиями следует с помощью группы методов &lt;a href=\"api-reference/imopenlines/openlines/index.html\"&gt;imopenlines.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/25004908/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать и настроить открытую линию&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-ispolzovat-chat-boty-v-otkrytyh-liniyah\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html#kak-ispolzovat-chat-boty-v-otkrytyh-liniyah\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как использовать чат-боты в открытых линиях&lt;/span&gt;&lt;/a&gt;Как использовать чат-боты в открытых линиях&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Зарегистрируйте чат-бот с помощью метода &lt;a href=\"api-reference/chat-bots/imbot-register.html\"&gt;im.bot.register&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Настройте автоматические ответы и сценарии.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Подключите чат-бот к открытым линиям.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1varj35g\"&gt;imopenlines&lt;/code&gt;&lt;/a&gt;, &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vcglrw3q\"&gt;imbot&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/imopenlines-bot-session-finish.html\"&gt;imopenlines.bot.session.finish&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Завершает диалог&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/imopenlines-bot-session-message-send.html\"&gt;imopenlines.bot.session.message.send&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет приветственное сообщение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/imopenlines-bot-session-operator.html\"&gt;imopenlines.bot.session.operator&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переключает диалог на свободного оператора&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/imopenlines-bot-session-transfer.html\"&gt;imopenlines.bot.session.transfer&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переключает диалог на оператора по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/chat-bots/open-lines-bot.html\"&gt;Пример создания чат-бота для Открытых линий&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style
