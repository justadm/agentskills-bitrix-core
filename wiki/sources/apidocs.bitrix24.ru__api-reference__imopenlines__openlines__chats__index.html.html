        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Чаты открытых линий — это пространство внутри Битрикс24 для общения с клиентами через внешние системы: онлайн-чат на сайте, мессенджеры и социальные сети. Они позволяют привязывать диалоги к карточкам CRM, в диалоги добавлять пользователей или чат-ботов.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/imopenlines/openlines/chats/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/25743776/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как работать с чатами в Открытых линиях&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-chatov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/index.html#svyaz-chatov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь чатов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь чатов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;CRM&lt;/strong&gt;. Каждый чат привязан к одному из четырех объектов CRM: &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидам&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделкам&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контактам&lt;/a&gt; или &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компаниям&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. В чат можно добавить пользователя. Получить идентификатор пользователя позволяют методы &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат-бот&lt;/strong&gt;. В чат можно добавить бота. Работать с ботами следует с помощью методов &lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html\"&gt;imopenlines.bot.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Для добавления бота в чат открытой линии он должен иметь скоуп &lt;a href=\"api-reference/scopes/permissions.html\"&gt;crm&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;strong&gt;Диалоги&lt;/strong&gt;. По идентификатору чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7oab7l12\"&gt;CHAT_ID&lt;/code&gt; можно получить историю переписки с помощью метода &lt;a href=\"api-reference/imopenlines/openlines/sessions/imopenlines-session-history-get.html\"&gt;imopenlines.session.history.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Открытые линии&lt;/strong&gt;. Добавлять, изменять и удалять открытые линии помогают методы &lt;a href=\"api-reference/imopenlines/openlines/index.html\"&gt;imopenlines.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Коннектор&lt;/strong&gt;. Чаты создаются через коннектор. Каналом связи может быть онлайн-чат, мессенджер или социальная сеть. Чтобы подключить коннектор или изменить настройки, используйте группу методов &lt;a href=\"api-reference/imopenlines/imconnector/index.html\"&gt;imconnector.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-rabotat-s-chatami\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/index.html#kak-rabotat-s-chatami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работать с чатами&lt;/span&gt;&lt;/a&gt;Как работать с чатами&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;С помощью &lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-get.html\"&gt;imopenlines.crm.chat.get&lt;/a&gt; получите список чатов, которые привязаны к объекту CRM.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Через &lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-get-last-id.html\"&gt;imopenlines.crm.chat.getLastId&lt;/a&gt; найдите последний активный чат.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;С помощью методов &lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-user-add.html\"&gt;imopenlines.crm.chat.user.add&lt;/a&gt; и &lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-user-delete.html\"&gt;imopenlines.crm.chat.user.delete&lt;/a&gt; добавьте или удалите участников чата.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Для отправки сообщения используйте метод &lt;a href=\"api-reference/imopenlines/openlines/messages/imopenlines-crm-message-add.html\"&gt;imopenlines.crm.message.add&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;В &lt;a href=\"api-reference/imopenlines/openlines/sessions/imopenlines-crm-lead-create.html\"&gt;imopenlines.crm.lead.create&lt;/a&gt; передайте идентификатор чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e04sjjdn\"&gt;CHAT_ID&lt;/code&gt; и создайте лид на основании диалога.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/25004908/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать и настроить открытую линию&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/7954623/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Контакт-центр&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-12ijk9u7\"&gt;imopenlines&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-get-last-id.html\"&gt;imopenlines.crm.chat.getLastId&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает идентификатор последнего чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-get.html\"&gt;imopenlines.crm.chat.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает чат для объекта CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-user-add.html\"&gt;imopenlines.crm.chat.user.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет пользователя к существующему чату&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-user-delete.html\"&gt;imopenlines.crm.chat.user.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет пользователя из чата&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headin
