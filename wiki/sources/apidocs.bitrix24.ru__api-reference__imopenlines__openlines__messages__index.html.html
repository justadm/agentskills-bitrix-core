        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Сообщения в чаты открытых линий могут отправлять сотрудники и чат-боты. Отправленные сообщения можно сохранять как шаблоны быстрых ответов и использовать повторно. Каждый чат открытых линий связан с объектом CRM.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/imopenlines/openlines/messages/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-soobshenij-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/messages/index.html#svyaz-soobshenij-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь сообщений с другими объектами&lt;/span&gt;&lt;/a&gt;Связь сообщений с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Сообщение чата привязано к одному из четырех объектов CRM: &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лиду&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделке&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контакту&lt;/a&gt; или &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компании&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Сотрудник отправляет сообщение в чат открытой линии. Получить идентификатор сотрудника позволяют методы &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат-бот.&lt;/strong&gt; Сообщение можно отправить от имени чат-бота. Работать с ботами следует с помощью методов &lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html\"&gt;imbot.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Диалоги.&lt;/strong&gt; По идентификатору чата &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sr83xokh\"&gt;CHAT_ID&lt;/code&gt; можно получить историю переписки с помощью метода &lt;a href=\"api-reference/imopenlines/openlines/sessions/imopenlines-session-history-get.html\"&gt;imopenlines.session.history.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Открытые линии.&lt;/strong&gt; Чтобы добавить, изменить и удалить линии, используйте методы &lt;a href=\"api-reference/imopenlines/openlines/index.html\"&gt;imopenlines.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Универсальные списки.&lt;/strong&gt; Идентификатор списка с быстрыми ответами &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uhb6z745\"&gt;QUICK_ANSWERS_IBLOCK_ID&lt;/code&gt; можно получить с помощью метода &lt;a href=\"api-reference/imopenlines/openlines/imopenlines-config-get.html\"&gt;imopenlines.config.get&lt;/a&gt;. Указать список при создании линии позволяет метод &lt;a href=\"api-reference/imopenlines/openlines/imopenlines-config-add.html\"&gt;imopenlines.config.add&lt;/a&gt;, при редактировании — метод &lt;a href=\"api-reference/imopenlines/openlines/imopenlines-config-update.html\"&gt;imopenlines.config.update&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/25839638/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Быстрые ответы в открытых линиях: как создать и настроить&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/25004908/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать и настроить открытую линию&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/7954623/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Контакт-центр&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-otpravit-soobshenie-iz-crm\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/messages/index.html#kak-otpravit-soobshenie-iz-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как отправить сообщение из CRM&lt;/span&gt;&lt;/a&gt;Как отправить сообщение из CRM&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;Найдите чат, который привязан к элементу CRM. Используйте метод &lt;a href=\"api-reference/imopenlines/openlines/chats/imopenlines-crm-chat-get.html\"&gt;imopenlines.crm.chat.get&lt;/a&gt; или &lt;a href=\"api-reference/imopenlines/openlines/sessions/imopenlines-dialog-get.html\"&gt;imopenlines.dialog.get&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Получите идентификатор сотрудника или чат-бота с помощью методов &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;, &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt; или &lt;a href=\"api-reference/chat-bots/imbot-bot-list.html\"&gt;imbot.bot.list&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Передайте данные в метод &lt;a href=\"api-reference/imopenlines/openlines/messages/imopenlines-crm-message-add.html\"&gt;imopenlines.crm.message.add&lt;/a&gt;, чтобы отправить сообщение.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"kak-sohranit-bystryj-otvet\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/messages/index.html#kak-sohranit-bystryj-otvet\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как сохранить быстрый ответ&lt;/span&gt;&lt;/a&gt;Как сохранить быстрый ответ&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;Получите историю чата методом &lt;a href=\"api-reference/imopenlines/openlines/sessions/imopenlines-session-history-get.html\"&gt;imopenlines.session.history.get&lt;/a&gt; и выберите сообщение, которое нужно сохранить.&lt;/li&gt;\n&lt;li&gt;Передайте идентификаторы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-668xikil\"&gt;CHAT_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l1xhd8yu\"&gt;MESSAGE_ID&lt;/code&gt; в метод &lt;a href=\"api-reference/imopenlines/openlines/messages/imopenlines-message-quick-save.html\"&gt;imopenlines.message.quick.save&lt;/a&gt;. Сообщение сохранится в списке быстрых ответов.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/imopenlines/openlines/messages/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cdqb482c\"&gt;imopenlines&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/messages/imopenlines-crm-message-add.html\"&gt;imopenlines.crm.message.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет сообщение в чат, который связан с элементом CRM&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/imopenlines/openlines/messages/imopenlines-message-quick-save.html\"&gt;imopenlines.message.quick.save&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Сохраняет сообщение в качестве быстрого ответа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь сообщений с другими объектами","href":"api-reference/imopenlines/openlines/messages/index.html#svyaz-soobshenij-s-drugimi-obuektami","level":2},{"title":"Как отправить сообщение из CRM","href":"api-reference/imopenlines/openlines/messages/index.html#kak-otpravit-soobshenie-iz-crm","level":2},{"title":"Как сохранить быстрый ответ","href":"api-reference/imopenlines/openlines/messages/index.html#kak-sohranit-bystryj-otvet","level":2},{"title":"Обзор методов","href":"api-reference/imopenlines/openlines/messages/index.html#all-methods","level":2}],"title":"Сообщения открытых линий: обзор методов"},"router":{"pathname":"api-reference/imopenlines/openlines/messages/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
