            {"data":{"leading":false,"html":"&lt;p&gt;Битрикс24 - это целый набор связанных бизнес инструментов. Глубокая интеграция между ними и единый REST API позволяет создавать максимально гибкие сценарии автоматизации.&lt;/p&gt;\n&lt;p&gt;Основные инструменты, доступные через REST API, можно разделить на следующие основные разделы:&lt;/p&gt;\n&lt;div class=\"mermaid\" data-content=\"%25%25%7Binit%3A%20%7B%20%22theme%22%3A%20%22forest%22%20%7D%20%7D%25%25%0Amindmap%0A((REST%20API))%0A%20%20%20%20%5B%D0%A3%D0%BF%D1%80%D0%B0%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B5%20%D0%B8%D0%BD%D1%84%D0%BE%D1%80%D0%BC%D0%B0%D1%86%D0%B8%D0%B5%D0%B9%5D%0A%20%20%20%20%20%20%20%20(%D0%94%D0%B8%D1%81%D0%BA24)%0A%20%20%20%20%20%20%20%20(%D0%A5%D1%80%D0%B0%D0%BD%D0%B8%D0%BB%D0%B8%D1%89%D0%B0%20%D0%BF%D1%80%D0%B8%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D0%B9)%0A%20%20%20%20%20%20%20%20(%D0%A1%D0%BC%D0%B0%D1%80%D1%82-%D0%BF%D1%80%D0%BE%D1%86%D0%B5%D1%81%D1%81%D1%8B)%0A%20%20%20%20%20%20%20%20(%D0%A3%D0%BD%D0%B8%D0%B2%D0%B5%D1%80%D1%81%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B5%20%D1%81%D0%BF%D0%B8%D1%81%D0%BA%D0%B8)%0A%20%20%20%20%5B%D0%9A%D0%BE%D0%BC%D0%BC%D1%83%D0%BD%D0%B8%D0%BA%D0%B0%D1%86%D0%B8%D0%B8%5D%0A%20%20%20%20%20%20%20%20(%D0%A2%D0%B5%D0%BB%D0%B5%D1%84%D0%BE%D0%BD%D0%B8%D1%8F)%0A%20%20%20%20%20%20%20%20(%D0%A7%D0%B0%D1%82%D1%8B)%0A%20%20%20%20%20%20%20%20(%D0%A7%D0%B0%D1%82%D0%B1%D0%BE%D1%82%D1%8B)%0A%20%20%20%20%20%20%20%20(SMS%2F%D0%A1%D0%BE%D0%BE%D0%B1%D1%89%D0%B5%D0%BD%D0%B8%D1%8F)%0A%20%20%20%20%20%20%20%20(%D0%9D%D0%BE%D1%82%D0%B8%D1%84%D0%B8%D0%BA%D0%B0%D1%86%D0%B8%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%9D%D0%BE%D0%B2%D0%BE%D1%81%D1%82%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%9E%D1%82%D0%BA%D1%80%D1%8B%D1%82%D1%8B%D0%B5%20%D0%BB%D0%B8%D0%BD%D0%B8%D0%B8)%0A%20%20%20%20%5B%D0%A3%D0%BF%D1%80%D0%B0%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B5%20%D0%BA%D0%BE%D0%BC%D0%BF%D0%B0%D0%BD%D0%B8%D0%B5%D0%B9%5D%0A%20%20%20%20%20%20%20%20(%D0%A1%D0%BE%D1%82%D1%80%D1%83%D0%B4%D0%BD%D0%B8%D0%BA%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%A3%D0%BF%D1%80%D0%B0%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B5%20%D1%80%D0%B0%D0%B1%D0%BE%D1%87%D0%B8%D0%BC%20%D0%B2%D1%80%D0%B5%D0%BC%D0%B5%D0%BD%D0%B5%D0%BC)%0A%20%20%20%20%20%20%20%20(%D0%A1%D1%82%D1%80%D1%83%D0%BA%D1%82%D1%83%D1%80%D0%B0%20%D0%BA%D0%BE%D0%BC%D0%BF%D0%B0%D0%BD%D0%B8%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%9F%D0%BE%D1%87%D1%82%D0%BE%D0%B2%D1%8B%D0%B5%20%D1%81%D0%B5%D1%80%D0%B2%D0%B8%D1%81%D1%8B)%0A%20%20%20%20%5B%D0%98%D1%81%D0%BF%D0%BE%D0%BB%D0%BD%D0%B8%D1%82%D0%B5%D0%BB%D1%8C%D1%81%D0%BA%D0%B0%D1%8F%20%D0%B4%D0%B8%D1%81%D1%86%D0%B8%D0%BF%D0%BB%D0%B8%D0%BD%D0%B0%5D%0A%20%20%20%20%20%20%20%20(%D0%9F%D1%80%D0%BE%D0%B5%D0%BA%D1%82%D1%8B)%0A%20%20%20%20%20%20%20%20(%D0%A1%D0%BA%D1%80%D0%B0%D0%BC)%0A%20%20%20%20%20%20%20%20(%D0%9A%D0%B0%D0%BB%D0%B5%D0%BD%D0%B4%D0%B0%D1%80%D1%8C)%0A%20%20%20%20%20%20%20%20(%D0%97%D0%B0%D0%B4%D0%B0%D1%87%D0%B8)%0A%20%20%20%20%5B%D0%9F%D1%80%D0%BE%D0%B4%D0%B0%D0%B6%D0%B8%5D%0A%20%20%20%20%20%20%20%20(CRM)%0A%20%20%20%20%20%20%20%20(%D0%A1%D0%BA%D0%BB%D0%B0%D0%B4%D1%81%D0%BA%D0%BE%D0%B9%20%D1%83%D1%87%D1%91%D1%82)%0A%20%20%20%20%20%20%20%20(%D0%9F%D0%BB%D0%B0%D1%82%D0%B5%D0%B6%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%94%D0%BE%D1%81%D1%82%D0%B0%D0%B2%D0%BA%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%9A%D0%B0%D1%81%D1%81%D1%8B)%0A%20%20%20%20%20%20%20%20(%D0%9E%D0%BD%D0%BB%D0%B0%D0%B9%D0%BD-%D0%BC%D0%B0%D0%B3%D0%B0%D0%B7%D0%B8%D0%BD%D1%8B)%0A%20%20%20%20%20%20%20%20(%D0%A1%D0%B0%D0%B9%D1%82%D1%8B%2F%D0%9B%D0%B5%D0%BD%D0%B4%D0%B8%D0%BD%D0%B3%D0%B8)%0A%20%20%20%20%20%20%20%20(%D0%93%D0%B5%D0%BD%D0%B5%D1%80%D0%B0%D1%82%D0%BE%D1%80%20%D0%B4%D0%BE%D0%BA%D1%83%D0%BC%D0%B5%D0%BD%D1%82%D0%BE%D0%B2)%0A\"&gt;&lt;/div&gt;&lt;p&gt;Понимая, какие потребности вам нужны для реализации необходимого сценария, вы сможете найти описание методов этих инструментов в документации.&lt;/p&gt;\n&lt;p&gt;Важно уметь использовать готовый функционал Битрикс24, избавляясь от необходимости писать всё с нуля. Важно уметь искать новые сценарии взаимодействия между существующими инструментами, входящими в состав Битрикс24. Именно такие сценарии открывают перед вами огромные возможности и при этом могут оказаться достаточно простыми в технической реализации.&lt;/p&gt;\n&lt;h2 id=\"instrument-bitriks24\"&gt;&lt;a href=\"api-reference/index.html#instrument-bitriks24\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Инструмент Битрикс24&lt;/span&gt;&lt;/a&gt;Инструмент Битрикс24&lt;/h2&gt;\n&lt;p&gt;Битрикс24 - комплексный продукт, объединяющий много различных инструментов, интегрированных между собой. Такая интеграция даёт разработчикам возможность предлагать пользователям законченные бизнес-сценарии с использованием нескольких инструментов.&lt;/p&gt;\n&lt;p&gt;Справочник API содержит описание доступных методов, событий и виджетов соответствующих инструментов Битрикс24.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;a href=\"api-reference/common/index.html\"&gt;Общие методы и события&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/biconnector/index.html\"&gt;BIconnector: обзор методов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/crm/index.html\"&gt;Обзор CRM&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/ai/index.html\"&gt;AI в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/log/index.html\"&gt;Лента новостей&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/sale/index.html\"&gt;Интернет-магазин&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/user/index.html\"&gt;Пользователи&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/bizproc/index.html\"&gt;Бизнес-процессы&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/index.html\"&gt;Задачи&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/document-generator/index.html\"&gt;Генератор документов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/calendar/index.html\"&gt;Календарь: обзор методов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/pay-system/index.html\"&gt;Платежные системы&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/departments/index.html\"&gt;Структура компании: обзор методов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/user-consent/index.html\"&gt;Пользовательские соглашения: обзор методов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;Рабочие группы и проекты&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/imopenlines/index.html\"&gt;Открытые линии&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/booking/index.html\"&gt;Онлайн-запись&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chat-bots/index.html\"&gt;Чат-боты&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/index.html\"&gt;Чаты&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/landing/index.html\"&gt;Сайты и магазины&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/messageservice/index.html\"&gt;Провайдеры сообщений, SMS-провайдеры&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/lists/index.html\"&gt;Универсальные списки&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/timeman/index.html\"&gt;Учет рабочего времени&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/entity/index.html\"&gt;Хранилище данных&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/index.html\"&gt;Торговый каталог&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/telephony/index.html\"&gt;Телефония&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/index.html\"&gt;Диск&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/mailservice/index.html\"&gt;Почтовые сервисы&lt;/a&gt;&lt;/li&gt;\n&lt;/ol&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20
