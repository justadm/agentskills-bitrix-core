            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;С помощью ключа &lt;strong&gt;attrs&lt;/strong&gt; в &lt;a href=\"api-reference/landing/block/manifest.html\"&gt;манифесте&lt;/a&gt; блока указывается список атрибутов для хранения данных, привязанных к определенным нодам. Применяется это повсеместно – от дефолтных значений полей, счетчиков до настройки карты, видео, и много чего еще. Как правило, в пару к набору атрибутов идет определенный скрипт, который умеет со всем этим работать. Либо атрибуты могут участвовать в стилизации блоков, путем указания в CSS, что карточка с определенным атрибутом имеет другой цвет (например).&lt;/p&gt;\n&lt;p&gt;Каждый атрибут описывается:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;названием,&lt;/li&gt;\n&lt;li&gt;кодом,&lt;/li&gt;\n&lt;li&gt;типом,&lt;/li&gt;\n&lt;li&gt;ключом &lt;strong&gt;items&lt;/strong&gt; (в случае списочного типа).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"mesta-razmesheniya\"&gt;&lt;a href=\"api-reference/landing/block/attributes.html#mesta-razmesheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Места размещения&lt;/span&gt;&lt;/a&gt;Места размещения&lt;/h2&gt;\n&lt;p&gt;Ключ &lt;strong&gt;attrs&lt;/strong&gt; в манифесте может размещаться в следующих местах:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Непосредственно в корне, как указано в примере манифеста.&lt;/li&gt;\n&lt;/ol&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt;:\n{\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-node-text'&lt;/span&gt;:\n    {\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Настройка текст'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'dropdown'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'data-copy'&lt;/span&gt;\n    }\n},\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"51\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-51\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-51\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-51.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;ol start=\"2\" style=\"--hier-list-start:1\"&gt;\n&lt;li&gt;В ключе style, в этом случае атрибут выводится в форме настроек дизайна.&lt;/li&gt;\n&lt;/ol&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'style'&lt;/span&gt;:\n{\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-node-card-button'&lt;/span&gt;:\n    {\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Button'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt;: [&lt;span class=\"hljs-string\"&gt;'border-color'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'button'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'animation'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;'additional'&lt;/span&gt;: {\n            &lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt;: [\n                [\n                    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Text field'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'data-test-card-attr'&lt;/span&gt;\n                ]\n            ]\n        }\n    },\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"59\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-59\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-59\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-59.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;ol start=\"3\" style=\"--hier-list-start:2\"&gt;\n&lt;li&gt;В описании карточки. В таком случае атрибут применяется непосредственно к каждой карточке отдельно&lt;/li&gt;\n&lt;/ol&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'cards'&lt;/span&gt;:\n{\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-node-card-button'&lt;/span&gt;:\n    {\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Card'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'additional'&lt;/span&gt;: {\n            &lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt;: [\n                [\n                    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Text field'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'data-test-card-attr'&lt;/span&gt;\n                ]\n            ]\n        }\n    },\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"67\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-67\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-67\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-67.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"gruppirovka-atributov\"&gt;&lt;a href=\"api-reference/landing/block/attributes.html#gruppirovka-atributov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Группировка атрибутов&lt;/span&gt;&lt;/a&gt;Группировка атрибутов&lt;/h2&gt;\n&lt;p&gt;Если требуется часть атрибутов группировать, то делается это следующим образом:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-comment\"&gt;// корневое размещение&lt;/span&gt;\n&lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;''&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Test group'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                    &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"checkbox\"&lt;/span&gt;,\n                    &lt;span class=\"hljs-comment\"&gt;// Переопределение селектора (если нужно)&lt;/span&gt;\n                    &lt;span class=\"hljs-string\"&gt;\"selector\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"bitrix:catalog.section\"&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"\"&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;\"items\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                        &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Отображение товаров\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;),\n                        &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Отображение товаров 2\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"2\"&lt;/span&gt;),\n                        &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Отображение товаров 3\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"3\"&lt;/span&gt;),\n                    ),\n                    &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-checkbox\"&lt;/span&gt;\n                ),\n                &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                    &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"checkbox\"&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"\"&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;\"items\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                        &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Отображение товаров 22\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;)\n                    ),\n                    &lt;span class=\"hljs-string\"&gt;\"compact\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-checkbox2\"&lt;/span&gt;\n                )\n            )\n        ),\n        &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"checkbox\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"items\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Отображение товаров 33\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;)\n            ),\n            &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-checkbox3\"&lt;/span&gt;\n        )\n    )\n)\n&lt;span class=\"hljs-comment\"&gt;// блок style (обратите внимание, в случае style поддерживается только либо без групп, либо группировка в рамках одного селектора)&lt;/span&gt;\n&lt;span class=\"hljs-string\"&gt;'additional'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Test group'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"text\"&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Test\"&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-text\"&lt;/span&gt;\n            ),\n            &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n                &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"text\"&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Test 2\"&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-text2\"&lt;/span&gt;\n            )\n        )\n    )\n)\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"74\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-74\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-74\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-74.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"otlichayushiesya-selektory\"&gt;&lt;a href=\"api-reference/landing/block/attributes.html#otlichayushiesya-selektory\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Отличающиеся селекторы&lt;/span&gt;&lt;/a&gt;Отличающиеся селекторы&lt;/h2&gt;\n&lt;p&gt;Если вы хотите, чтобы значения атрибутов сохранялись в иной селектор, то просто укажите у конкретного атрибута другой селектор. (Это может быть полезно, чтобы не добавлять лишние ноды для визуального изменения):&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Текстовое поле'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'data-text-field'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'selector'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'.demo-another-selector'&lt;/span&gt;\n)\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"81\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-81\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-81\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-81.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"tipy-atributov\"&gt;&lt;a href=\"api-reference/landing/block/attributes.html#tipy-atributov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы атрибутов&lt;/span&gt;&lt;/a&gt;Типы атрибутов&lt;/h2&gt;\n&lt;p&gt;Атрибуты - это условное хранение hidden-значений. Например, стартовые координаты карты. Естественно, атрибуты имеет смысл вводить только вкупе с неким JS-кодом, который эти атрибуты умеет использовать. Атрибуты необходимо &lt;a href=\"api-reference/landing/block/manifest.html\"&gt;зарегистрировать в манифесте&lt;/a&gt; в ключе &lt;strong&gt;attrs&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;На данный момент поддерживаются следующие типы атрибутов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;text&lt;/strong&gt; - обычная текстовая строка.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;html&lt;/strong&gt; - многострочное текстовое поле&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;images&lt;/strong&gt; - картинка со стандартными контролами - выбор с компьютера или поиск в библиотеках.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;icon&lt;/strong&gt; - иконка.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;dropdown&lt;/strong&gt; - выпадающий список.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;checkbox&lt;/strong&gt; - группа чекбококсов. Если вы хотите вывести одиночный чекбокс, просто укажите одно значение в items.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;multiselect&lt;/strong&gt; - множественный список.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;link&lt;/strong&gt; - ссылка со стандартными контролами.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;url&lt;/strong&gt; - упрощенный вариант ссылки: выбор страницы/блока или произвольного URL.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;slider&lt;/strong&gt; / &lt;strong&gt;range-slider&lt;/strong&gt; - варианты слайдеров массива значений.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;palette&lt;/strong&gt; - палитра.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;sortable-list&lt;/strong&gt; - сортируемый список значений. Сортировка происходит посредством перетаскивания элементов мышкой.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;position&lt;/strong&gt; - набор стрелок для указания положения элемента в блоке.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;date&lt;/strong&gt; - выбор даты и времени.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Конкретные примеры с данными типами смотрите ниже. Там же вы сможете найти дополнительные опции вариативности.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Дополнительно&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Помимо специфических свойств того или иного типа (смотрите пример ниже) каждый тип может обладать дополнительными свойствами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;hidden&lt;/strong&gt; - атрибут регистрируется, но не выводится на редактирование в карточке блока, удобно для регистрации блоков, когда санитайзер не пропускает не зарегистрированные атрибуты.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"primer\"&gt;&lt;a href=\"api-reference/landing/block/attributes.html#primer\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример&lt;/span&gt;&lt;/a&gt;Пример&lt;/h3&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-meta\"&gt;&amp;lt;?php&lt;/span&gt;\n&lt;span class=\"hljs-variable\"&gt;$attrs&lt;/span&gt; = &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;\".landing-node\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"text\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Test attr field\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"placeholder\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Type your text\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"default_value\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-test-text\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"textOnly\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt; &lt;span class=\"hljs-comment\"&gt;//если в true, то при редактировании не будет подключаться редактор&lt;/span&gt;\n        ),\n    ),\n    &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"image\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Test attr image field\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;\"src\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"http://bitrix24.io/bitrix/images/landing/app-store-badge.svg\"&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;\"alt\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"test alt\"&lt;/span&gt;\n        ),\n        &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-test-image\"&lt;/span&gt;\n    ),\n    &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"icon\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Test attr icon field\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;\"classList\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"fa\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"fa-address-card\"&lt;/span&gt;)\n        ),\n        &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-test-icon\"&lt;/span&gt;\n    ),\n    &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;\"type\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"dropdown\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"Test attr dropdown field\"&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"items\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"#1\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;),\n            &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"#2\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;),\n            &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"#3\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;3&lt;/span&gt;),\n            &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;\"name\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"#4\"&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;4&lt;/span&gt;)\n        ),\n        &lt;span class=\"hljs-string\"&gt;\"value\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;3&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;\"attribute\"&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;\"data-test-dropdown\"&lt;/span&gt;\n    ),\n    &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Checkbox field'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'checkbox'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'data-test-checkbox'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'items'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n            &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Разрешить указание количества товара'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'value'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'1'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'checked'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;),\n            &lt;spa
