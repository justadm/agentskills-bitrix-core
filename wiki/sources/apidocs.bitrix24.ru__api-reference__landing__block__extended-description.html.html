    <body class="g-root g-root_theme_light">

        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Для понимания принципов формирования и работы с карточками рекомендуется сначала ознакомиться с &lt;a href=\"api-reference/landing/block/manifest.html\"&gt;манифестом&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Расширенные карточки были призваны решать такие задачи:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Разный набор контактов (e-mail и телефон, только телефон, телефон и соцсеть).&lt;/li&gt;\n&lt;li&gt;Один и тот же набор полей, но разное графическое представление (социальные кнопки).&lt;/li&gt;\n&lt;li&gt;И так далее.&lt;br /&gt;\nВсе карточки свернуты в компактные панели, с быстрым доступом к основным функциям: Сортировать, Редактировать, Удалить.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\"api-reference/landing/block/_images/extenden_card.png\" alt=\"Компактные панели\" /&gt;&lt;/p&gt;\n&lt;p&gt;По клику на панель или на кнопку «Редактировать» - панель разворачивается в форму редактирования карточки.&lt;/p&gt;\n&lt;p&gt;Возможно добавление как пустой карточки, так и карточки из пресета.&lt;/p&gt;\n&lt;p&gt;Поддерживаются составные и динамические заголовок карточек. Название карточки формируется из тех данных что указал пользователь. Заголовок можно составлять из текста, изображений, иконок и ссылок. Заголовки будут динамически обновляться по мере редактирования значений карточки.&lt;/p&gt;\n&lt;h2 id=\"manifest-rasshirennoj-kartochki\"&gt;&lt;a href=\"api-reference/landing/block/extended-description.html#manifest-rasshirennoj-kartochki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Манифест расширенной карточки&lt;/span&gt;&lt;/a&gt;Манифест расширенной карточки&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'cards'&lt;/span&gt; =&amp;gt; [\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-card'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title class_\"&gt;Loc&lt;/span&gt;::&lt;span class=\"hljs-title function_\"&gt;getMessage&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'LANDING_BLOCK_4_FEATURES_3_COLS_...'&lt;/span&gt;),\n        &lt;span class=\"hljs-string\"&gt;'label'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-element-icon'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-element-title'&lt;/span&gt;\n        ],\n        &lt;span class=\"hljs-string\"&gt;'presets'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'telegram'&lt;/span&gt; =&amp;gt; [...],\n            &lt;span class=\"hljs-string\"&gt;'reddit'&lt;/span&gt; =&amp;gt; [...],\n            &lt;span class=\"hljs-string\"&gt;'skype'&lt;/span&gt; =&amp;gt; [...]\n        ]\n    ]\n]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"48\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-48\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-48\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-48.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;&lt;strong&gt;Ключ name&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Определяет заголовок группы карточек. По умолчанию используется для формирования заголовков карточек вида «Карточка 1», «Карточка 2»&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ключ label&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Определяет правила формирования заголовка карточки. В качестве значения можно передавать селектор ноды, либо массив селекторов нод из которых необходимо брать значения для формирования заголовка.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ключ presets&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Определяет набор пресетов карточек текущего набора. Если значение свойства не пустое, то добавить новую карточку можно будет только из пресета. В качестве значения принимает массив пресетов, в качестве ключей массива необходимо указывать идентификаторы пресета.&lt;/p&gt;\n&lt;h2 id=\"preset\"&gt;&lt;a href=\"api-reference/landing/block/extended-description.html#preset\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пресет&lt;/span&gt;&lt;/a&gt;Пресет&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'telegram'&lt;/span&gt; =&amp;gt; [\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;' Telegram'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'html'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'&amp;lt;html-код-пресета&amp;gt;'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'values'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'.landing-block-node-element-title'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Telegram'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'.landing-block-node-element-text'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Any text ...'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'.landing-block-node-element-icon'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'icon'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'classList'&lt;/span&gt; =&amp;gt; [\n                &lt;span class=\"hljs-string\"&gt;'landing-block-node-element-icon'&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;'fa'&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;'fa-telegram'&lt;/span&gt;\n            ]\n        ]\n    ],\n    &lt;span class=\"hljs-string\"&gt;'disallow'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'.landing-block-node-element-icon'&lt;/span&gt;\n    ]\n]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"70\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-70\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-70\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-70.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;&lt;strong&gt;Ключ name&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Определяет заголовок пресета. Поддерживает html. Отображается в выпадающем списке пресетов.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ключ html&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Верстка карточки. Может может отличаться от верстки остальных карточек. При добавлении верстки в пресет, нужно учитывать, что редактироваться будут только те ноды, которые определены в nodes и не переопределены в disallow.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ключ values&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Определяет значения нод и полей карточки c которыми они будут инициализированы. Ключ - селектор ноды из nodes, значение - значение ноды в соответствии с типом ноды.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ключ disallow&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Определяет какие ноды пользователь не сможет редактировать. В значении ожидается массив селекторов.&lt;/p&gt;\n&lt;h2 id=\"verstka-preseta\"&gt;&lt;a href=\"api-reference/landing/block/extended-description.html#verstka-preseta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Верстка пресета&lt;/span&gt;&lt;/a&gt;Верстка пресета&lt;/h2&gt;\n&lt;p&gt;Верстка одного пресета это повторяемый блок кода.&lt;/p&gt;\n&lt;p&gt;Пример:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-list-item col g-min-width-65 list-inline-item g-mr-0\"&lt;/span&gt;\n\t&lt;span class=\"hljs-attr\"&gt;data-card-preset&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"telegram\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\t&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-list-item-link d-block g-py-15 g-px-30 g-bg-telegram--hover g-bg-telegram g-color-white text-center\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;href&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"#\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\t\t&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;i&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-list-item-icon fa fa-telegram\"&lt;/span&gt;&amp;gt;&lt;/span&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;i&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\t&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"104\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-104\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-104\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-104.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В идеологическом отличии от обычной карточки такие повторяемые контенты могут изменяться. Например, в одном &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e47ddh1n\"&gt;&amp;lt;li&amp;gt;&lt;/code&gt; в примере выше может не быть ссылки, или вовсе, присутствовать изображение.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Обратите внимание, что содержимое карточек может отличаться, но внешний блок лучше оставлять одинаковым.&lt;br /&gt;\nТакже обратите внимание, что обязательно надо указывать data-card-preset=\"&amp;lt;код пресета&amp;gt;\" как в пресете, так и в верстке (смотрите пример выше).&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Манифест расширенной карточки","href":"api-reference/landing/block/extended-description.html#manifest-rasshirennoj-kartochki","level":2},{"title":"Пресет","href":"api-reference/landing/block/extended-description.html#preset","level":2},{"title":"Верстка пресета","href":"api-reference/landing/block/extended-description.html#verstka-preseta","level":2}],"title":"Расширенное описание карточек"},"router":{"pathname":"api-reference/landing/block/extended-description","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
