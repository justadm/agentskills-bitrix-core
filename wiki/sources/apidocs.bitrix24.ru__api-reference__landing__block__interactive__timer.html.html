        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Пример счётчика:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/landing/block/interactive/_images/timer.png\" alt=\"timer\" /&gt;&lt;/p&gt;\n&lt;p&gt;В &lt;a href=\"api-reference/landing/block/manifest.html\"&gt;манифесте блока&lt;/a&gt; добавьте расширение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-soea5w3u\"&gt;landing_countdown&lt;/code&gt;.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;'assets'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'ext'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'landing_countdown'&lt;/span&gt;),\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"19\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-19\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-19\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-19.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В разделе &lt;strong&gt;block&lt;/strong&gt; манифеста добавьте ключ:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;'version'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'18.5.0'&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"23\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-23\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-23\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-23.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Параметр version необязателен, но он ограничит добавления данного блока в версии ранее указанной, когда ещё не существовало нужных asset'ов.&lt;/p&gt;\n&lt;p&gt;Добавьте атрибуты для ноды-контейнера счётчика к той ноде, которая соответствует описанию и должна выполнять роль счетчика. За подробностями смотри пример.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-node-date'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title class_\"&gt;Loc&lt;/span&gt;::&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'LANDING_BLOCK_51_2_COUNTDOWN_04--DATE'&lt;/span&gt;),\n        &lt;span class=\"hljs-string\"&gt;'time'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'date'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'format'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ms'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'data-end-date'&lt;/span&gt;,\n    ),\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"30\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-30\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-30\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-30.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"razmetka\"&gt;&lt;a href=\"api-reference/landing/block/interactive/timer.html#razmetka\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Разметка&lt;/span&gt;&lt;/a&gt;Разметка&lt;/h2&gt;\n&lt;p&gt;Таймер должен содержать 4 цифровых элемента, помеченных соответствующими классами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;js-cd-days&lt;/strong&gt; - дни&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;js-cd-hours&lt;/strong&gt; - часы&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;js-cd-minutes&lt;/strong&gt; - минуты&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;js-cd-seconds&lt;/strong&gt; - секунды&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Возможность добавлять год отсутствует, мы считаем нецелесообразным создавать столь долгие таймеры на сайте.&lt;/p&gt;\n&lt;p&gt;Цифры оборачивайте в общий контейнер, помеченный классом &lt;strong&gt;js-countdown&lt;/strong&gt;. Этому же контейнеру передавайте настройки посредством дата-атрибутов.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;data-end-date=\"1586690955000\"&lt;/strong&gt; - дата окончания таймера в формате Unix-time в миллисекундах. Т.е. полученную unix-дату нужно умножить на 1000.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;data-days-format=\"%D\"&lt;/strong&gt; - формат представления дней&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;data-hours-format=\"%H\"&lt;/strong&gt; - формат представления часов&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;data-minutes-format=\"%M\"&lt;/strong&gt; - формат представления минут&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;data-seconds-format=\"%S\"&lt;/strong&gt; - формат представления секунд&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Доступно два вариант формата:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;\"%S\"&lt;/strong&gt; - выводит число с лидирующими нулями \"03\", но \"18\",&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;\"%-S\"&lt;/strong&gt; - выводит только значимые символы \"3\" или \"18\".&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Вместо &lt;strong&gt;\"%H\"&lt;/strong&gt; можно использовать &lt;strong&gt;\"%I\"&lt;/strong&gt; или &lt;strong&gt;\"%-I\"&lt;/strong&gt;. Это значение полного количества часов до окончания (то есть, 1 день 6 часов превращается в 30 часов). В этом случае нужно удалить data-days-format и ноду .js-cd-days.&lt;/p&gt;\n&lt;p&gt;Необязательный параметр:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;data-days-expired-classes=\"u-countdown--days-expiried\"\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"113\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-113\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-113\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-113.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Когда количество дней станет равным нулю, таймер может добавить себе помечающий класс. Это поможет вам скрыть нулевое количество дней, либо как-то выделить их. Мы используем для этого класс &lt;strong&gt;.u-countdown--days-hide&lt;/strong&gt;.&lt;/p&gt;\n&lt;h2 id=\"primer\"&gt;&lt;a href=\"api-reference/landing/block/interactive/timer.html#primer\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример&lt;/span&gt;&lt;/a&gt;Пример&lt;/h2&gt;\n&lt;p&gt;Примеры блоков данного типа вы можете посмотреть в нашем репозитории, воспользовавшись методами &lt;a href=\"api-reference/landing/block/interactive\"&gt;landing.block.getmanifestfile&lt;/a&gt; и &lt;a href=\"api-reference/landing/block/interactive\"&gt;landing.block.getrepository&lt;/a&gt;. Их коды:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;51.2.countdown_04&lt;/li&gt;\n&lt;li&gt;51.3.countdown_08&lt;/li&gt;\n&lt;li&gt;51.3.countdown_08_wo_bg&lt;/li&gt;\n&lt;li&gt;51.4.countdown_music&lt;/li&gt;\n&lt;li&gt;51.5.countdown_event&lt;/li&gt;\n&lt;li&gt;51.7.countdown_13&lt;/li&gt;\n&lt;li&gt;51.1.countdown_01&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Пример простого таймера&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;section&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing_block g-pt-30 g-pb-30 g-bg-orange g-color-white\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n    &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-date mx-auto js-countdown text-center g-font-weight-300 g-line-height-1-2\"&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;data-end-date&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1555249081000\"&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;data-days-format&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"%D\"&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;data-hours-format&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"%H\"&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;data-minutes-format&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"%M\"&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;data-seconds-format&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"%S\"&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;data-days-expired-classes&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"u-countdown--days-expiried\"&lt;/span&gt;\n    &amp;gt;&lt;/span&gt;\n\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-number u-countdown--days-hide d-inline-block g-mx-20\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-number-number g-font-size-36 mb-0\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n                &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;span&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"js-cd-days\"&lt;/span&gt;&amp;gt;&lt;/span&gt;12&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;span&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-number-delimiter u-countdown--days-hide d-inline-block g-font-size-36\"&lt;/span&gt;&amp;gt;&lt;/span&gt;:&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\
