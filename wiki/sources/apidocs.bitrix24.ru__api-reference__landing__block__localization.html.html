            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Локализация блоков возможна с версии 18.5.6. Перевод возможен на любое количество языков. Для локализации:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Создайте блок под свой родной язык.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;В манифесте добавьте два ключа:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt; &lt;span class=\"hljs-string\"&gt;'lang'&lt;/span&gt; =&amp;gt; [\n     &lt;span class=\"hljs-string\"&gt;'en'&lt;/span&gt; =&amp;gt; [\n         &lt;span class=\"hljs-string\"&gt;'Заголовок с разделителем на светлом фоне'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Title with a separator on a light background (translated)'&lt;/span&gt;\n     ],\n     &lt;span class=\"hljs-string\"&gt;'de'&lt;/span&gt; =&amp;gt; [\n         &lt;span class=\"hljs-string\"&gt;'Заголовок с разделителем на светлом фоне'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Überschrift mit einem Trennzeichen auf einem hellen Hintergrund'&lt;/span&gt;\n     ]\n ],\n &lt;span class=\"hljs-string\"&gt;'lang_original'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ru'&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"23\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-23\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-23\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-23.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Где:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;lang_original&lt;/strong&gt; – язык, на котором манифест блока сделан. Внимание: именно фразы манифеста.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;lang&lt;/strong&gt; – все иные языки, минимально хотя бы один, иначе какой смысл локализации. (Никто не запрещает создавать блоки на французов и русских только, например.)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Рассмотрим подробнее массив &lt;strong&gt;lang&lt;/strong&gt;. В его ключах перечислены все возможные поля name в вашем манифесте. Это и название самого блока, и название нод, стилей, атрибутов и их значений.&lt;/p&gt;\n&lt;p&gt;Система производит обход всего манифеста, и если встречает ключ &lt;strong&gt;name&lt;/strong&gt;, ищет ему подходящую замену в массиве языков (либо текущий язык, либо en, если язык портала отличается от родного языка блока) и заменяет.&lt;/p&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Локализация блока"},"router":{"pathname":"api-reference/landing/block/localization","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
