ue\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поля манифеста блока&lt;/span&gt;&lt;/a&gt;Поля манифеста блока&lt;/h2&gt;\n&lt;h3 id=\"klyuch-block\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-block\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ block&lt;/span&gt;&lt;/a&gt;Ключ block&lt;/h3&gt;\n&lt;p&gt;Ключ &lt;strong&gt;block&lt;/strong&gt; содержит название и категорию блока (или массив категорий). В системе есть некоторое количество категорий, вот они:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'cover'&lt;/span&gt; =&amp;gt; Обложка,\n    &lt;span class=\"hljs-string\"&gt;'about'&lt;/span&gt; =&amp;gt; О проекте,\n    &lt;span class=\"hljs-string\"&gt;'title'&lt;/span&gt; =&amp;gt; Заголовок,\n    &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt; =&amp;gt; Текстовый блок,\n    &lt;span class=\"hljs-string\"&gt;'image'&lt;/span&gt; =&amp;gt; Изображение,\n    &lt;span class=\"hljs-string\"&gt;'gallery'&lt;/span&gt; =&amp;gt; Галерея,\n    &lt;span class=\"hljs-string\"&gt;'phrase'&lt;/span&gt; =&amp;gt; Цитата,\n    &lt;span class=\"hljs-string\"&gt;'benefits'&lt;/span&gt; =&amp;gt; Преимущества,\n    &lt;span class=\"hljs-string\"&gt;'columns'&lt;/span&gt; =&amp;gt; Колонки,\n    &lt;span class=\"hljs-string\"&gt;'separator'&lt;/span&gt; =&amp;gt; Разделитель,\n    &lt;span class=\"hljs-string\"&gt;'menu'&lt;/span&gt; =&amp;gt; Меню,\n    &lt;span class=\"hljs-string\"&gt;'footer'&lt;/span&gt; =&amp;gt; Подвал сайта,\n    &lt;span class=\"hljs-string\"&gt;'pages'&lt;/span&gt; =&amp;gt; Список страниц,\n    &lt;span class=\"hljs-string\"&gt;'tiles'&lt;/span&gt; =&amp;gt; Плитка и ссылка,\n    &lt;span class=\"hljs-string\"&gt;'forms'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-variable constant_\"&gt;CRM&lt;/span&gt;-форма,\n    &lt;span class=\"hljs-string\"&gt;'team'&lt;/span&gt; =&amp;gt; Команда,\n    &lt;span class=\"hljs-string\"&gt;'feedback'&lt;/span&gt; =&amp;gt; Отзывы,\n    &lt;span class=\"hljs-string\"&gt;'schedule'&lt;/span&gt; =&amp;gt; Расписание,\n    &lt;span class=\"hljs-string\"&gt;'steps'&lt;/span&gt; =&amp;gt; Этапы,\n    &lt;span class=\"hljs-string\"&gt;'contacts'&lt;/span&gt; =&amp;gt; Контакты,\n    &lt;span class=\"hljs-string\"&gt;'social'&lt;/span&gt; =&amp;gt; Социальные сети,\n    &lt;span class=\"hljs-string\"&gt;'tariffs'&lt;/span&gt; =&amp;gt; Тарифы,\n    &lt;span class=\"hljs-string\"&gt;'partners'&lt;/span&gt; =&amp;gt; Партнеры,\n    &lt;span class=\"hljs-string\"&gt;'other'&lt;/span&gt; =&amp;gt; Другое,\n    &lt;span class=\"hljs-string\"&gt;'popular'&lt;/span&gt; =&amp;gt; Популярные,\n    &lt;span class=\"hljs-string\"&gt;'sidebar'&lt;/span&gt; =&amp;gt; Сайдбар,\n    &lt;span class=\"hljs-string\"&gt;'video'&lt;/span&gt; =&amp;gt; Видео,\n    &lt;span class=\"hljs-string\"&gt;'text_image'&lt;/span&gt; =&amp;gt; Текст с картинками,\n    &lt;span class=\"hljs-string\"&gt;'countdowns'&lt;/span&gt; =&amp;gt; Таймеры для акций,\n    &lt;span class=\"hljs-string\"&gt;'separator'&lt;/span&gt; =&amp;gt; Переходы и разделители,\n    &lt;span class=\"hljs-string\"&gt;'news'&lt;/span&gt; =&amp;gt; Новостная лента,\n);\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"53\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-53\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-53\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-53.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Если нужной категории нет в списке, просто напишите ее текстом в манифесте, категория будет добавлена.&lt;/p&gt;\n&lt;p&gt;Помимо этого в данном ключе могут содержаться следующие настройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;dynamic&lt;/strong&gt; =&amp;gt; false говорит блоку, что он НЕ МОЖЕТ быть использован в качестве динамики. (Крайне редкая ситуация.)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;subtype&lt;/strong&gt; – тип спец.блока, допускает одиночное значение, или множественное в виде массива. (Для коробки.)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;subtype_params&lt;/strong&gt; – параметры спец.блока. (Для коробки.)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;type&lt;/strong&gt; - может содержать тип сайта, на страницах которого блок может работать (по умолчанию блок показывается везде). На данный момент поддерживаются:\n&lt;ul&gt;\n&lt;li&gt;page: обычные сайты&lt;/li&gt;\n&lt;li&gt;store: магазины&lt;/li&gt;\n&lt;li&gt;knowledge: базы знаний&lt;/li&gt;\n&lt;li&gt;group: базы знаний групп соцсети&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"klyuch-menu\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-menu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ menu&lt;/span&gt;&lt;/a&gt;Ключ menu&lt;/h3&gt;\n&lt;p&gt;Меню на сайте вполне может быть обычным html-блоком, и под такие блоки отведен целый раздел в каталоге блоков. Ссылки пунктов меню просто редактируются как обычные карточки. Но как построить многоуровневое меню? Вы могли его видеть в &lt;i class=\"yfm yfm-term_title\" term-key=\":knowleadge\" role=\"button\" aria-describedby=\":knowleadge_element\" tabindex=\"0\" id=\"s6tls6u2\"&gt;Базе Знаний&lt;/i&gt;.&lt;/p&gt;\n&lt;p&gt;Для этого предназначена отдельная запись в манифесте с ключом menu. Вот как выглядит такая запись:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;'menu'&lt;/span&gt; =&amp;gt; [\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-node-menu'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'item'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'.landing-block-node-menu-item'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title class_\"&gt;Loc&lt;/span&gt;::&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'LANDING_BLOCK_MENU_22-NAVBAR'&lt;/span&gt;),\n        &lt;span class=\"hljs-string\"&gt;'root'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'ulClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'landing-block-node-menu navbar-nav'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'liClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'landing-block-node-menu-item nav-item'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'aClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'landing-block-node-menu-link nav-link'&lt;/span&gt;,\n        ],\n        &lt;span class=\"hljs-string\"&gt;'children'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'ulClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'landing-block-node-menu navbar-nav'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'liClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'landing-block-node-menu-item nav-item'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'aClassName'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'landing-block-node-menu-link nav-link'&lt;/span&gt;,\n        ],\n        &lt;span class=\"hljs-string\"&gt;'nodes'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-menu-link'&lt;/span&gt; =&amp;gt; [\n                &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title class_\"&gt;Loc&lt;/span&gt;::&lt;span class=\"hljs-title function_ invoke__\"&gt;getMessage&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'LANDING_BLOCK_MENU_22-LINK'&lt;/span&gt;),\n                &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'link'&lt;/span&gt;,\n            ],\n        ],\n    ],\n]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"113\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-113\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-113\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-113.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Запись описывает данный html:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;ul&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-menu navbar-nav\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n    &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-menu-item nav-item\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;href&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"#\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;target&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"_self\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-link nav-link\"&lt;/span&gt;&amp;gt;&lt;/span&gt;Bitrix24 Knowledge Base&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt;&amp;gt;&lt;/span&gt;\n    &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt;&amp;gt;&lt;/span&gt;\n    &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-menu-item\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;href&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"#\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;target&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"_self\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-link nav-link\"&lt;/span&gt;&amp;gt;&lt;/span&gt;Tasks and Projects&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt;&amp;gt;&lt;/span&gt;\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;ul&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-menu\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-menu-item nav-item\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;href&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"#\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;target&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"_self\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-link nav-link\"&lt;/span&gt;&amp;gt;&lt;/span&gt;Article example&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;a&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt;&amp;gt;&lt;/span&gt;\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;ul&lt;/span&gt;&amp;gt;&lt;/span&gt;\n    &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;li&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;ul&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"117\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-117\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-117\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-117.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Рассмотрим ключи блока menu:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Корень массива&lt;/strong&gt; (.landing-block-node-menu в данном случае) указывает селектор тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f6dqchb3\"&gt;&amp;lt;ul&amp;gt;&lt;/code&gt;, который должен определяться как меню. Как вы уже поняли, в рамках одного манифеста может быть несколько многоуровневых меню.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;item&lt;/strong&gt; описывает каждый &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wtihiesw\"&gt;&amp;lt;li&amp;gt;&lt;/code&gt; внутри списка &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6kagq6k7\"&gt;&amp;lt;ul&amp;gt;&lt;/code&gt;. То есть те теги &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-egp2ucem\"&gt;&amp;lt;li&amp;gt;&lt;/code&gt;, которые будут определяться как пункты меню.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;name&lt;/strong&gt; описывает название меню.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;root&lt;/strong&gt; описывает корневой &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-daz9ct22\"&gt;&amp;lt;ul&amp;gt;&lt;/code&gt;. А &lt;strong&gt;children&lt;/strong&gt; все корневые &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j1hec899\"&gt;&amp;lt;ul&amp;gt;&lt;/code&gt;. &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rv7nndjh\"&gt;ulClassName&lt;/code&gt; описывает классы тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-huahpe2h\"&gt;&amp;lt;ul&amp;gt;&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bl257lko\"&gt;liClassName&lt;/code&gt; описывает классы тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ylv5vyvm\"&gt;&amp;lt;li&amp;gt;&lt;/code&gt;, а &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kyhd34ki\"&gt;aClassName&lt;/code&gt; описывает классы тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a95e8bn7\"&gt;&amp;lt;a&amp;gt;&lt;/code&gt;. В данном случае родительские и дочерние элементы по структуре совпадают. Каких-то дополнительных тегов структура меню не предполагает на данный момент.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;nodes&lt;/strong&gt; описывает структуру внутренности &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d2d4g21i\"&gt;&amp;lt;li&amp;gt;&lt;/code&gt;. На данный момент это просто ссылка. Внимательный читатель может догадаться, что с помощью данного пункта можно описать сколь угодно сложную структуру каждого пункта. Верно, но пока это не поддерживается в полной мере.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"klyuch-assets\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-assets\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ assets&lt;/span&gt;&lt;/a&gt;Ключ assets&lt;/h3&gt;\n&lt;p&gt;Ключ &lt;strong&gt;assets&lt;/strong&gt; содержит в себе JS и CSS, которые необходимо подключить при добавлении блока на страницу. Если несколько блоков используют один и тот же файл JS/CSS, не страшно, каждый файл подключится только один раз.&lt;/p&gt;\n&lt;p&gt;Ключ &lt;strong&gt;ext&lt;/strong&gt; это библиотеки JS ядра Битрикс. Пока разрешено подключать только библиотеки, упомянутые в специальных блоках и в интерактивных блоках.&lt;/p&gt;\n&lt;p&gt;Если вы используете какие-либо сторонние библиотеки в своем коде, которые уже подключены к основному ядру (например, jQuery), рекомендуется вывод команд в вашем скрипте оборачивать в системный метод. Тогда ваш код успешно инициализируется после всех системных подключений:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-variable constant_\"&gt;BX&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;ready&lt;/span&gt;(&lt;span class=\"hljs-keyword\"&gt;function&lt;/span&gt;(&lt;span class=\"hljs-params\"&gt;&lt;/span&gt;)\n{\n    &lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;log&lt;/span&gt;($(&lt;span class=\"hljs-variable language_\"&gt;window&lt;/span&gt;));\n});\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"160\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-160\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-160\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-160.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h3 id=\"klyuch-nodes\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-nodes\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ nodes&lt;/span&gt;&lt;/a&gt;Ключ nodes&lt;/h3&gt;\n&lt;p&gt;Ключ &lt;strong&gt;nodes&lt;/strong&gt; содержит блоки, содержимое которых разрешено к изменению контента. Здесь и далее применяется идеология &lt;strong&gt;css-селекторов&lt;/strong&gt; для указания конечных нод. Вы должны это понимать, чтобы хорошо разобраться в дальнейшем API блоков.&lt;/p&gt;\n&lt;p&gt;В качестве селектора рекомендуется выбирать говорящее имя класса. Чтобы отличать обычные классы от структурных классов-селекторов, рекомендуется давать имени говорящий префикс, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n7de843m\"&gt;\"landing-block-node-\"&lt;/code&gt;. Один и тот же селектор допускается использовать в разных блоках. Селектор ноды &lt;strong&gt;не совпадает&lt;/strong&gt; с &lt;a href=\"api-reference/landing/block/manifest.html#cards\"&gt;селекторами карточек&lt;/a&gt; данного блока.&lt;/p&gt;\n&lt;p&gt;В ключе nodes перечислены ключами селекторы, контент которых можно править, а также указано название ноды и ее тип. Подробнее прочитать про &lt;a href=\"api-reference/landing/block/manifest.html#\"&gt;типы нод&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;В зависимости от типа ноды и ее указания в данном блоке, она станет доступна к редактированию и появится в форме редактирования контента блока.&lt;/p&gt;\n&lt;p&gt;Помимо типа, названия и специфических ключей того или иного типа есть также общие параметры ноды любого типа:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;allowInlineEdit&lt;/strong&gt; – если передать значение ключа равное &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w27acmpd\"&gt;false&lt;/code&gt;, то данные ноды будут запрещены к редактированию инлайн, но в то же время будут доступны к редактированию через форму редактирования блока.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;useInDesigner&lt;/strong&gt; - если передать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-noff7dyp\"&gt;false&lt;/code&gt;, элемент будет проигнорирован в дизайнере блока.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;group&lt;/strong&gt; – группировка нод, если указать одинаковое значение данного ключа для нескольких нод (в рамках одного блока), то при клике на любую из нод откроется интерфейс редактирования всей группы нод.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"klyuch-style\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-style\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ style&lt;/span&gt;&lt;/a&gt;Ключ style&lt;/h3&gt;\n&lt;p&gt;Ключ &lt;strong&gt;style&lt;/strong&gt; очень похож на ключ nodes за исключением того, что в данном ключе размечается допустимый дизайн: каким нодам разрешено менять внешний вид, и какого они типа.&lt;/p&gt;\n&lt;p&gt;Типы style могут быть следующими (в том числе их компоновка в виде массива):&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;box&lt;/strong&gt; – блочные элементы&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;button&lt;/strong&gt; – ссылки в виде кнопок&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;typo&lt;/strong&gt; – вся типографика&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;typo-simple&lt;/strong&gt; – упрощенная типографика&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;typo-link&lt;/strong&gt; – типографика ссылок&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;paddings&lt;/strong&gt; – все отступы&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;navbar&lt;/strong&gt; – навигационные блоки&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;navbar-full&lt;/strong&gt; – навигационные блоки полной ширины&lt;/li&gt;\n&lt;li&gt;и некоторые другие...&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Эти типы определяют, какие стилистические изменения доступны для редактирования в интерфейсе пользователя.&lt;/p&gt;\n&lt;details class=\"yfm-cut\"&gt;&lt;summary class=\"yfm-cut-title\"&gt;Полный список допустимых типов и какие css-стили он объединяет&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n    &lt;span class=\"hljs-string\"&gt;'block-default'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n        &lt;span class=\"hljs-number\"&gt;0&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'display'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;1&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'padding-top'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;2&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'padding-bottom'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;3&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'padding-left'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;4&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'padding-right'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;5&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'margin-top'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;6&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'background-color'&lt;/span&gt;,\n        &lt;span class=\"hljs-number\"&gt;7&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'background-gradient'&lt;/span&gt;,\n    ),\n    &lt;span class=\"hljs-string\"&gt;'paddings'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n        &lt;span class=\"hljs-number\"&gt;0&lt;/s H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-260\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-260\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-260.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;&lt;/details&gt;&lt;h3 id=\"klyuch-cards\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-cards\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ cards&lt;/span&gt;&lt;/a&gt;Ключ cards&lt;/h3&gt;\n&lt;p&gt;Содержит так называемые карточки блока. Это повторяемый контент. Например, перечень услуг, фотографии сотрудников, и так далее. Разметив таким образом блок, в интерфейсе появится функционал клонирования, удаления, изменения карточек.&lt;/p&gt;\n&lt;p&gt;В простейшем виде он выглядит так, как указано в манифесте. Если вы хотите, вы можете изучить также расширенное управление карточками.&lt;/p&gt;\n&lt;p&gt;В качестве селектора рекомендуется выбирать говорящее имя класса. Чтобы отличать обычные классы, от структурных классов-селекторов, рекомендуется давать имени говорящий префикс. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fszkjwji\"&gt;landing-block-card-&lt;/code&gt;. Один и тот же селектор вы можете использовать в разных блоках. Селектор карточки &lt;strong&gt;не совпадает&lt;/strong&gt; с &lt;a href=\"api-reference/landing/block/manifest.html#ключ-nodes\"&gt;селекторами нод&lt;/a&gt; данного блока.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Карточки одного селектора не должны быть с карточками другого селектора в одном общем родителе. Для случая общего родителя пользуйтесь расширенными карточками.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"klyuch-attrs\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#klyuch-attrs\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключ attrs&lt;/span&gt;&lt;/a&gt;Ключ attrs&lt;/h3&gt;\n&lt;p&gt;Описание атрибутов смотрите на &lt;a href=\"api-reference/landing/block/attributes.html\"&gt;отдельной странице&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"ideologiya-izmeneniya-stilej-bloka\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#ideologiya-izmeneniya-stilej-bloka\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Идеология изменения стилей блока&lt;/span&gt;&lt;/a&gt;Идеология изменения стилей блока&lt;/h2&gt;\n&lt;p&gt;При изменении внешнего вида блоков, не происходит изменение атрибута &lt;strong&gt;style&lt;/strong&gt; нод. Происходит изменение только классов. Например, если вы хотите поменять font-size, с 12 до 16, система изменит не 'font-size', а условный класс g-fontsize12 на g-fontsize16.&lt;/p&gt;\n&lt;h2 id=\"dlya-raboty-animacii\"&gt;&lt;a href=\"api-reference/landing/block/manifest.html#dlya-raboty-animacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Для работы анимации&lt;/span&gt;&lt;/a&gt;Для работы анимации&lt;/h2&gt;\n&lt;p&gt;В штатном механизме для работы анимации нужно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;чтобы у ноды был класс js-animation;&lt;/li&gt;\n&lt;li&gt;чтобы в манифесте для данной ноды была настройка в разделе style - 'type' =&amp;gt; 'animation';&lt;/li&gt;\n&lt;li&gt;чтобы анимация работала сразу по-умолчанию, ещё нужно добавить какой-то из классов анимации (в нашем примере блока - fadeIn), но не обязательно, настройка заработает и так.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;dfn class=\"yfm yfm-term_dfn\" id=\":knowleadge_element\" role=\"dialog\"&gt;&lt;p&gt;&lt;img src=\"api-reference/landing/block/_images/menu_landing.png\" alt=\"База_знаний\" /&gt;&lt;/p&gt;\n&lt;/dfn&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/cut-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/cut-extension.js"]},"headings":[{"title":"Примеры","href":"api-reference/landing/block/manifest.html#primery","level":2},{"title":"Поля манифеста блока","href":"api-reference/landing/block/manifest.html#polya-manifesta-bloka","level":2,"items":[{"title":"Ключ block","href":"api-reference/landing/block/manifest.html#klyuch-block","level":3},{"title":"Ключ menu","href":"api-reference/landing/block/manifest.html#klyuch-menu","level":3},{"title":"Ключ assets","href":"api-reference/landing/block/manifest.html#klyuch-assets","level":3},{"title":"Ключ nodes","href":"api-reference/landing/block/manifest.html#klyuch-nodes","level":3},{"title":"Ключ style","href":"api-reference/landing/block/manifest.html#klyuch-style","level":3},{"title":"Ключ cards","href":"api-reference/landing/block/manifest.html#klyuch-cards","level":3},{"title":"Ключ attrs","href":"api-reference/landing/block/manifest.html#klyuch-attrs","level":3}]},{"title":"Идеология изменения стилей блока","href":"api-reference/landing/block/manifest.html#ideologiya-izmeneniya-stilej-bloka","level":2},{"title":"Для работы анимации","href":"api-reference/landing/block/manifest.html#dlya-raboty-animacii","level":2}],"title":"Файл манифеста"},"router":{"pathname":"api-reference/landing/block/manifest","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
