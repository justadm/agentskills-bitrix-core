            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uzkj1ecr\"&gt;landing&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i3oiyldk\"&gt;landing.block.updatenodes&lt;/code&gt; изменяет контент блока. Возвращает &lt;em&gt;true&lt;/em&gt; или ошибку. Также метод применяется для &lt;a href=\"api-reference/landing/block/methods/landing-block-update-nodes.html#edit_params\"&gt;обновления параметров динамических блоков&lt;/a&gt;, таких как список товаров, детальный товар, и некоторых других.&lt;/p&gt;\n&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/landing/block/methods/landing-block-update-nodes.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;С версии&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;lid&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-foi7slub\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор страницы&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;block&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s41vdkmc\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор блока&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;data&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b2fnl0r7\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив селекторов и новых значений.&lt;br /&gt;\nНапример: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rjzshfts\"&gt;data: {'.landing-block-node-text@1': 'new text!'}&lt;/code&gt;. Принцип тот же - селектор и его новое значение. Если вы уверены, что селектор в блоке один, то в данном случае вы можете отбросить счетчик &lt;strong&gt;@1&lt;/strong&gt;.&lt;br /&gt;\nТакже data зависит от типов изменяемых нод. Подробнее смотрите пример ниже, за описанием типов обращайтесь к &lt;a href=\"api-reference/landing/block/node-types.html\"&gt;отдельной странице&lt;/a&gt;.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/landing/block/methods/landing-block-update-nodes.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-984tdws4\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"2gq2njai\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title class_\"&gt;BX24&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'landing.block.updatenodes'&lt;/span&gt;,\n    {\n        &lt;span class=\"hljs-attr\"&gt;lid&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;311&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;block&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;6058&lt;/span&gt;,\n        &lt;span class=\"hljs-attr\"&gt;data&lt;/span&gt;: {\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-text'&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Текст, с html'&lt;/span&gt;,\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-img'&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;src&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'/some/path/picture.png'&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;alt&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Моя картинка'&lt;/span&gt;},\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-link'&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;text&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Моя ссылка'&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;href&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'https://bitrix24.com'&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;target&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'_blank'&lt;/span&gt;},\n            &lt;span class=\"hljs-string\"&gt;'.landing-block-node-icon'&lt;/span&gt;: [&lt;span class=\"hljs-string\"&gt;'fa-telegram'&lt;/s e\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-106\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-106.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\"redaktirovanie-parametrov-dinamicheskih-blokov\"&gt;&lt;a href=\"api-reference/landing/block/methods/landing-block-update-nodes.html#redaktirovanie-parametrov-dinamicheskih-blokov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Редактирование параметров динамических блоков&lt;/span&gt;&lt;/a&gt;Редактирование параметров динамических блоков&lt;/h2&gt;\n&lt;p&gt;Есть ряд динамических блоков, параметры которых можно менять через REST. Например, количество товаров на странице. Сделать это можно следующим образом.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Посредством метода &lt;a href=\"api-reference/landing/block/methods/landing-block-get-manifest.html\"&gt;landing.block.getmanifest&lt;/a&gt; узнаем какие параметры у блока есть. Метод вернет массив манифеста, где нас интересует ключ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-71ybyl9i\"&gt;attrs&lt;/code&gt; и параметры интересующего вас компонента динамического блока. В данном случае нам интересен &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ses1vedd\"&gt;bitrix:catalog.section&lt;/code&gt;.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-attr\"&gt;attrs&lt;/span&gt;:\n&lt;span class=\"hljs-attr\"&gt;bitrix&lt;/span&gt;:catalog.&lt;span class=\"hljs-property\"&gt;section&lt;/span&gt;: &lt;span class=\"hljs-title class_\"&gt;Array&lt;/span&gt;(&lt;span class=\"hljs-number\"&gt;24&lt;/span&gt;)\n&lt;span class=\"hljs-number\"&gt;0&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"ID раздела\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;style&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;original_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"component\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;component_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"STRING\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;attribute&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"SECTION_ID\"&lt;/span&gt;, …}\n&lt;span class=\"hljs-number\"&gt;1&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Недоступные товары\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;style&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;original_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"component\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;component_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"LIST\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;attribute&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"HIDE_NOT_AVAILABLE\"&lt;/span&gt;, …}\n&lt;span class=\"hljs-number\"&gt;2&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Недоступные торговые предложения\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;style&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;original_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"component\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;component_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"LIST\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;attribute&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"HIDE_NOT_AVAILABLE_OFFERS\"&lt;/span&gt;, …}\n&lt;span class=\"hljs-number\"&gt;3&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"По какому полю сортируем элементы\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;style&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;original_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"component\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;component_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"LIST\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;attribute&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"ELEMENT_SORT_FIELD\"&lt;/span&gt;, …}\n&lt;span class=\"hljs-number\"&gt;4&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Порядок сортировки элементов\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;style&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;original_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"component\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;component_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"LIST\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;attribute&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"ELEMENT_SORT_ORDER\"&lt;/span&gt;, …}\n&lt;span class=\"hljs-number\"&gt;5&lt;/span&gt;: {&lt;span class=\"hljs-attr\"&gt;name&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Валюта, в которую будут сконвертированы цены\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;style&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;false&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;original_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"component\"&lt;/span&gt;, &lt;span class=\"hljs-attr\"&gt;component_type&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"LIST\"&lt;/span&gt;, &lt;span class
