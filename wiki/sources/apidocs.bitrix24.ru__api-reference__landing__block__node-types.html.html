            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Как вы можете узнать из &lt;a href=\"api-reference/landing/block/manifest.html\"&gt;файла манифеста&lt;/a&gt;, существует несколько типов нод – контейнеров, в которых расположен тот или иной контент. Давайте рассмотрим какие они есть на данный момент. В примерах показано как регистрировать в манифесте в ключе &lt;strong&gt;nodes&lt;/strong&gt;, и как это выглядит в верстке.&lt;/p&gt;\n&lt;h2 id=\"text\"&gt;&lt;a href=\"api-reference/landing/block/node-types.html#text\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;text&lt;/span&gt;&lt;/a&gt;text&lt;/h2&gt;\n&lt;p&gt;Обычный текстовый контент с минимум инлайнового html.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'.landing-block-node-card-title'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Описание'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"19\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-19\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-19\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-19.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&amp;lt;h2 &lt;span class=\"hljs-keyword\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-card-title\"&lt;/span&gt;&amp;gt;&lt;span class=\"hljs-title class_\"&gt;Company24&lt;/span&gt; video&amp;lt;/h2&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"20\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-20\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-20\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-20.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"img\"&gt;&lt;a href=\"api-reference/landing/block/node-types.html#img\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;img&lt;/span&gt;&lt;/a&gt;img&lt;/h2&gt;\n&lt;p&gt;Изображение. Допускается как отдельным тегом (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tnjbggcw\"&gt;&amp;lt;img&amp;gt;&lt;/code&gt;), так и фоновое (как правило для тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sazz6nb3\"&gt;&amp;lt;div&amp;gt;&lt;/code&gt;). Для данного типа необходимо также указывать рекомендуемый размер. Для чего это сделано? Картинки могут быть разные по своему предназначению. Аватарка может быть очень маленькой, а фон напротив - большим. Вместе с тем, если в аватарку контент-редакторы будут загружать огромные картинки, они очень быстро исчерпают свободное место портала, а страница будет виснуть в браузере. Поэтому авторам блока необходимо самим заботиться о декларировании данных нод. Если размер не указан, система будет приводить такие картинки к единому небольшому размеру.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-string\"&gt;'.landing-block-node-card-bgimg'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Фоновая картинка'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'img'&lt;/span&gt;,\n    &lt;span class=\"hljs-comment\"&gt;// изображение будет приведено к данному размеру&lt;/span&gt;\n    &lt;span class=\"hljs-string\"&gt;'dimensions'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'width'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1920&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'height'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1080&lt;/span&gt;),\n    &lt;span class=\"hljs-comment\"&gt;// система уменьшит изображение, только если оно превысит размер&lt;/span&gt;\n    &lt;span class=\"hljs-string\"&gt;'dimensions'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'maxWidth'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1920&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'maxHeight'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1080&lt;/span&gt;),\n    &lt;span class=\"hljs-comment\"&gt;// система будет увеличивать изображение, пока ширина&lt;/span&gt;\n    &lt;span class=\"hljs-comment\"&gt;// или высота не будет совпадать с указанными&lt;/span&gt;\n    &lt;span class=\"hljs-string\"&gt;'dimensions'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-keyword\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'minWidth'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1920&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'minHeight'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-number\"&gt;1080&lt;/span&gt;),\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"27\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-27\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-27\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-27.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-card-bgimg\"&lt;/span&gt;&amp;gt;&lt;/span&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"28\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-28\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-28\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-28.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;У данного типа обязательно должен присутствовать атрибут с изображением. У тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b26qphtu\"&gt;img&lt;/code&gt; это атрибут &lt;strong&gt;src&lt;/strong&gt; и, очевидно, он не должен быть пустым. У атрибута &lt;strong&gt;style&lt;/strong&gt; (тег &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qdo80e9u\"&gt;div&lt;/code&gt;) это &lt;strong&gt;background-image&lt;/strong&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"link\"&gt;&lt;a href=\"api-reference/landing/block/node-types.html#link\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;link&lt;/span&gt;&lt;/a&gt;link&lt;/h2&gt;\n&lt;p&gt;Ссылка, несет в себе текст ссылки, значение ссылки, тип ссылки (ссылка, телефон, ...), а также тип открытия (в текущем окне, новом, ...).&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'.landing-block-node-card-button'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Кнопка'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'link'&lt;/span&gt;,\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"45\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-45\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-45\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-45.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&amp;lt;a href=&lt;span class=\"hljs-string\"&gt;\"/\"&lt;/span&gt;\n    &lt;span class=\"hljs-keyword\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-card-button text-uppercase btn u-btn-outline-white btn-md rounded-0\"&lt;/span&gt;&amp;gt;\n    &lt;span class=\"hljs-title class_\"&gt;Read&lt;/span&gt; more\n&amp;lt;/a&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"46\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-46\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-46\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-46.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Если ссылка не является текстовой (например, несет в себе картинку, или что-либо еще), то следует добавить параметр skipContent, чтобы при сохранении он не изменялся.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'.landing-block-node-card-button'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Кнопка'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'link'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'skipContent'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"50\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-50\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-50\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-50.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"icon\"&gt;&lt;a href=\"api-reference/landing/block/node-types.html#icon\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;icon&lt;/span&gt;&lt;/a&gt;icon&lt;/h2&gt;\n&lt;p&gt;Визуально похоже на изображение, так как конечный пользователь оперирует вариантами иконок, за тем лишь исключением, что не может загружать свои в данные ноды. Технически это класс элемента, который отрисовывает ту или иную иконку через стандартные иконочные шрифты.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'.landing-block-node-list-item-icon'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Иконка'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'icon'&lt;/span&gt;,\n),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"57\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-57\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-57\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-57.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&amp;lt;i &lt;span class=\"hljs-keyword\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-node-list-item-icon fa fa-instagram\"&lt;/span&gt;&amp;gt;&amp;lt;&lt;span class=\"hljs-regexp\"&gt;/i&amp;gt; /&lt;/span&gt;/класс fa-instagram отвечает за вывод иконки
