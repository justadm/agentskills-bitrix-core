        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;В блоки достаточно легко встроить формы Битрикс24 (CRM).&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/landing/block/special/_images/form.png\" alt=\"Форма Битрикс24\" /&gt;&lt;/p&gt;\n&lt;p&gt;Для этого сделайте следующее:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;В секции &lt;strong&gt;block&lt;/strong&gt; &lt;a href=\"api-reference/landing/block/manifest.html\"&gt;манифеста&lt;/a&gt; блока добавьте ключ &lt;strong&gt;subtype&lt;/strong&gt; со значением &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q75cu0do\"&gt;form&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;Разместите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hg7klldx\"&gt;div&lt;/code&gt; с классом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7oscpl82\"&gt;bitrix24forms&lt;/code&gt; внутри вашего блока. Там и будет выводиться форма.&lt;/li&gt;\n&lt;li&gt;Добавьте ключ ext (внутри assets) со значением landing_form, который подключит все необходимое для работы форм.&lt;/li&gt;\n&lt;/ol&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'assets'&lt;/span&gt; =&amp;gt;\n    &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n        &lt;span class=\"hljs-string\"&gt;'ext'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n            &lt;span class=\"hljs-string\"&gt;'landing_form'&lt;/span&gt;\n        ),\n    ),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"36\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-36\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-36\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-36.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"razmetka\"&gt;&lt;a href=\"api-reference/landing/block/special/crm-forms.html#razmetka\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Разметка&lt;/span&gt;&lt;/a&gt;Разметка&lt;/h2&gt;\n&lt;p&gt;Нода, в которой появится форма, должна быть пустой. Её необходимо пометить классом &lt;strong&gt;.bitrix24forms&lt;/strong&gt;. Также можно добавить два необязательных параметра:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;data-b24form-use-style=\"Y\"&lt;/strong&gt; - использовать стилизацию блока (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pl1nykfj\"&gt;Y&lt;/code&gt;), или выводить оригинальный вид формы (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ng554xvu\"&gt;N&lt;/code&gt;),&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;data-b24form-show-header=\"N\"&lt;/strong&gt; - скрывать или показывать заголовок формы.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Эти параметры могут быть изменены в настройках блока.&lt;/p&gt;\n&lt;h3 id=\"principy-razmetki\"&gt;&lt;a href=\"api-reference/landing/block/special/crm-forms.html#principy-razmetki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Принципы разметки&lt;/span&gt;&lt;/a&gt;Принципы разметки&lt;/h3&gt;\n&lt;p&gt;Формы встраиваются в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8jgcngyq\"&gt;&amp;lt;iframe&amp;gt;&lt;/code&gt;, то есть формально они отображаются не в Сайтах, а на стороннем ресурсе. При такой схеме нет возможности повлиять на вид форм снаружи, со стороны блока. Однако при инициализации форм есть возможность передать им массив CSS-стилей, которые применятся к форме (внутри &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mgnwg956\"&gt;&amp;lt;iframe&amp;gt;&lt;/code&gt;). Именно таким образом работают блоки, изменяя внешний вид форм и идеально вписывая их в свой дизайн.&lt;/p&gt;\n&lt;p&gt;Постройте группу стилей типа «основной цвет, основной фон, дополнительный цвет, главный цвет рамок» и тому подобные. Для этого выберите в блоке ноду, имеющую заданный цвет и пометьте её дата-атрибутом, данные атрибуты начинаются с префикса &lt;strong&gt;data-form-style-&lt;/strong&gt;. Поскольку в блоке может не быть элементов с нужным, например, цветом, можно добавлять скрытые блоки с нужными параметрами. В общих чертах это выглядит так:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;hidden&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"g-bg-primary g-color-primary g-brd-primary\"&lt;/span&gt;\n&lt;span class=\"hljs-attr\"&gt;data-form-style-main-bg&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n&lt;span class=\"hljs-attr\"&gt;data-form-style-main-border-color&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n&lt;span class=\"hljs-attr\"&gt;data-form-style-main-font-color-hover&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n&amp;gt;&lt;/span&gt;\n&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"67\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-67\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-67\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-67.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В примере добавляется блок, имеющий primary-фоновый цвет, primary-цвет шрифта и primary-цвет рамок. А дата-атрибутами устанавливаются значения для главного цвета/фона/цвета рамок уже внутри формы.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Если нода, отмеченная &lt;strong&gt;data-form-style-...&lt;/strong&gt; доступна для дизайна пользователям (например, заголовок блока, который можно перекрашивать), то изменения цвета будут интерактивно проброшены в форму.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Всего таких атрибутов довольно много и описывать их назначение довольно сложно. Поэтому рекомендуется в качестве примера взять один из штатных блоков и менять в нём настройки, следя за изменениями.&lt;/p&gt;\n&lt;h3 id=\"primer-bloka\"&gt;&lt;a href=\"api-reference/landing/block/special/crm-forms.html#primer-bloka\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример блока&lt;/span&gt;&lt;/a&gt;Пример блока&lt;/h3&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs html\"&gt;&lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;section&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"g-pos-rel landing-block text-center g-pt-80 g-pb-80 g-bg-primary\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n    &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"container\"&lt;/span&gt;&amp;gt;&lt;/span&gt;\n        &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"landing-block-form-styles\"&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;hidden&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"g-bg-transparent h1 g-color-white g-brd-none g-pa-0\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-wrapper-padding&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-bg&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-bg-content&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-bg-block&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-header-font-size&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-main-font-weight&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-border-block&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n            &amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"g-bg-white g-color-primary g-brd-primary\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-main-bg&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-main-border-color&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-main-font-color-hover&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n            &amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"g-bg-primary-dark-v2 u-theme-restaurant-shadow-v1 g-brd-around g-color-gray-dark-v2 rounded-0\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-bg&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-box-shadow&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-select-bg&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-border&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-border-radius&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-button-font-color&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n            &amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;class&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"g-brd-around g-brd-gray-light-v2 g-brd-bottom g-bg-black-opacity-0_7\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-border-color&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;data-form-style-input-border-hover&lt;/span&gt;=&lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;\n            &amp;gt;&lt;/span&gt;\n            &lt;span class=\"hljs-tag\"&gt;&amp;lt;/&lt;span class=\"hljs-name\"&gt;div&lt;/span&gt;&amp;gt;&lt;/span&gt;\n\n            &lt;
