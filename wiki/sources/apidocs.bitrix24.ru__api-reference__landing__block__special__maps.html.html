            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Чтобы работать с картами (пока поддерживаются карты Google) и иметь весь функционал по их редактированию, необходимо:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Разместить два ключа в секции &lt;strong&gt;block&lt;/strong&gt;: subtype и subtype_params (подробнее смотрите пример манифеста).&lt;/li&gt;\n&lt;li&gt;Указать расширение &lt;strong&gt;landing_google_maps_new&lt;/strong&gt; (смотрите assets в примере манифеста).&lt;/li&gt;\n&lt;li&gt;Указать необходимой ноде (где будет карта) тип &lt;strong&gt;map&lt;/strong&gt;.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"primer-manifesta\"&gt;&lt;a href=\"api-reference/landing/block/special/maps.html#primer-manifesta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример манифеста&lt;/span&gt;&lt;/a&gt;Пример манифеста&lt;/h2&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;return&lt;/span&gt; [\n    &lt;span class=\"hljs-string\"&gt;'block'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Карта Google'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'section'&lt;/span&gt; =&amp;gt; [&lt;span class=\"hljs-string\"&gt;'contacts'&lt;/span&gt;],\n        &lt;span class=\"hljs-string\"&gt;'subtype'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'map'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'subtype_params'&lt;/span&gt; =&amp;gt;[\n            &lt;span class=\"hljs-string\"&gt;'required'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt; dur=\"1s\" begin=\"visibileAnimation-37.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Примеры блоков данного типа вы можете посмотреть в нашем репозитории, воспользовавшись методами &lt;a href=\"api-reference/landing/block/methods/landing-block-get-manifest-file.html\"&gt;landing.block.getmanifestfile&lt;/a&gt; и &lt;a href=\"api-reference/landing/block/methods/landing-block-get-repository.html\"&gt;landing.block.getrepository&lt;/a&gt;. Их коды:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;16.3.two_cols_map_text_fix&lt;/li&gt;\n&lt;li&gt;16.4.three_cols_map&lt;/li&gt;\n&lt;li&gt;16.5.two_cols_map&lt;/li&gt;\n&lt;li&gt;16.6.two_cols_map_reverse&lt;/li&gt;\n&lt;li&gt;16.1.google_map&lt;/li&gt;\n&lt;li&gt;16.2.two_cols_text_map_fix&lt;/li&gt;\n&lt;li&gt;и многие другие&lt;/li&gt;\n&lt;/ul&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Пример манифеста","href":"api-reference/landing/block/special/maps.html#primer-manifesta","level":2}],"title":"Карты в блоках"},"router":{"pathname":"api-reference/landing/block/special/maps","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
