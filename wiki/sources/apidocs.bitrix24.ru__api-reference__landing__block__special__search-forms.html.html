            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Такие блоки содержат форму со строкой поиска и кнопкой отправки данных на страницу &lt;a href=\"api-reference/landing/block/special/search.html\"&gt;результатов поиска&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Минимальные условия корректного функционирования такого блока:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Наличие тега &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sjjsi8q1\"&gt;&amp;lt;form&amp;gt;&lt;/code&gt;, строки ввода запроса &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gn0px931\"&gt;&amp;lt;input&amp;gt;&lt;/code&gt;, кнопки отправки данных.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Наличие атрибута для селектора &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c4qdkga3\"&gt;&amp;lt;form&amp;gt;&lt;/code&gt;.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'attrs'&lt;/span&gt; =&amp;gt; [\n    &lt;span class=\"hljs-string\"&gt;'.landing-block-node-form'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Search result page'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'attribute'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'action'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'url'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'allowedTypes'&lt;/span&gt; =&amp;gt; [\n            &lt;span class=\"hljs-string\"&gt;'landing'&lt;/span&gt;,\n        ],\n        &lt;span class=\"hljs-string\"&gt;'disableCustomURL'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'disallowType'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'disableBlocks'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-literal\"&gt;true&lt;/span&gt;\n    ]\n]\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"26\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-26\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-26\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-26.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;По желанию к описанию блока можно добавить &lt;strong&gt;subtype&lt;/strong&gt; и &lt;strong&gt;subtype_params&lt;/strong&gt;. В таком случае в атрибут &lt;strong&gt;Search result page&lt;/strong&gt; (см. п.2) будет подставлена страница при добавлении блока (что удобно для пользователя):&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-string\"&gt;'block'&lt;/span&gt; =&amp;gt; [\n    &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title class_\"&gt;Loc&lt;/span&gt;::&lt;span class=\"hljs-title function_\"&gt;getMessage&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'LANDING_BLOCK_59_2-NAME'&lt;/span&gt;),\n    &lt;span class=\"hljs-string\"&gt;'section'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'sidebar'&lt;/span&gt;, &lt;span class=\"hljs-string\"&gt;'other'&lt;/span&gt;),\n    &lt;span class=\"hljs-string\"&gt;'subtype'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'search'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'subtype_params'&lt;/span&gt; =&amp;gt; [\n        &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'form'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'resultPage'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'result'&lt;/span&gt;\n    ]\n],\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"32\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-32\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-32\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-32.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Где &lt;strong&gt;result&lt;/strong&gt; код шаблона страницы результатов поиска. Если такая страница будет найдена на сайте, она добавится автоматически.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Формы поиска"},"router":{"pathname":"api-reference/landing/block/special/search-forms","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
