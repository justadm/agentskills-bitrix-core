    <body class="g-root g-root_theme_light">

        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Пользовательские шаблоны дают возможность добавить свой шаблон в мастер создания сайта или страницы. Для разработчика не составит труда создать свой сайт и распространять его среди клиентов. Вот как это можно сделать.&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;В начале конечно же нужно создать сайт и страницы (или сайт из одной страницы), настроить ссылки как внутри страниц, так и между страницами. Вы можете создать с нуля или на основании одного из готовых шаблонов в штатной поставке продукта.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Ряд шаблонов собран еще на старой версии API и их экспорт может сработать неадекватно. Мы уже работаем над исправлением ошибок, но потребуется время.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;ol start=\"2\" style=\"--hier-list-start:1\"&gt;\n&lt;li&gt;\n&lt;p&gt;У себя на портале вызвать метод &lt;a href=\"api-reference/landing/site/landing-site-full-export.html\"&gt;landing.site.fullExport&lt;/a&gt;, результат работы которого сохранить в некоем хранилище. Например, json-файл.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;В своем приложении при его установке вызвать &lt;a href=\"api-reference/landing/demos/landing-demos-register.html\"&gt;landing.demos.register&lt;/a&gt;, которому передать данный массив. Формат массива не описывается, его изменение остается на совести разработчика.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если вам не хватает блоков, вы можете заказать верстку у специалистов, или воспользоваться предложенными дополнительными блоками &lt;a href=\"https://htmlstream.com/preview/unify-v2.6/unify-main/shortcodes/index.html\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;вендора&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;strong&gt;Важные моменты:&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Если сайт содержит одну страницу, то при установке (п.3) шаблон добавится как в мастер создания сайта, так и в мастер создания страницы. В ином случае будет добавлен только шаблон в мастер создания сайта.&lt;/li&gt;\n&lt;li&gt;Если вы экспортировали магазин, то и шаблон появится только в магазинах. Если сайт, то только в сайтах. Исключение составляют одностраничные сайты, которые также появляются среди шаблонов мастера создания страницы в рамках магазина.&lt;/li&gt;\n&lt;li&gt;Если на созданной вами странице размещен партнерский блок вы должны позаботиться заранее, что при вызове &lt;strong&gt;landing.demos.register&lt;/strong&gt; необходимые партнерские блоки уже будут зарегистрированы в системе.&lt;/li&gt;\n&lt;li&gt;При удалении приложения, шаблоны и блоки приложения также удаляются, за исключением страниц, которые были созданы на основании шаблонов.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"url-predvaritelnogo-prosmotra\"&gt;&lt;a href=\"api-reference/landing/demos/introduction.html#url-predvaritelnogo-prosmotra\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;URL предварительного просмотра&lt;/span&gt;&lt;/a&gt;URL предварительного просмотра&lt;/h2&gt;\n&lt;p&gt;Данная ссылка показывается в предварительном просмотре шаблона, когда пользователь его выбирает. Получить ссылку для регистрации шаблона можно следующим образом:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Создать сайт/страницу в облачном Битрикс24 по данному шаблону. Страница может лишь минимально отличаться от регистрируемого вами шаблона, чтобы у пользователя, создающего сайты и страницы, не возникало вопросов.&lt;/li&gt;\n&lt;li&gt;Если это сайт многостраничный, достаточно главной страницы.&lt;/li&gt;\n&lt;li&gt;Опубликовать сайт и указать полученную ссылку в поле «URL предпросмотра».&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Важно&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Следите за активностью вашего портала, чтобы он не был автоматически удален, что повлечет за собой удаление и ссылок предпросмотра. А это в свою очередь деактивацию ваших решений.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"izobrazheniya\"&gt;&lt;a href=\"api-reference/landing/demos/introduction.html#izobrazheniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Изображения&lt;/span&gt;&lt;/a&gt;Изображения&lt;/h2&gt;\n&lt;p&gt;Изображения сохраняются в шаблоне как абсолютные ссылки на ваш адрес (тот, с которого вы экспортировали шаблон). И будут ссылаться на ваш адрес пока пользователь не поменяет их на свои изображения.&lt;/p&gt;\n&lt;h2 id=\"cvetovaya-palitra\"&gt;&lt;a href=\"api-reference/landing/demos/introduction.html#cvetovaya-palitra\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Цветовая палитра&lt;/span&gt;&lt;/a&gt;Цветовая палитра&lt;/h2&gt;\n&lt;p&gt;Если сайт многостраничный, крайне рекомендуется создавать все страницы сайта в &lt;a href=\"api-reference/landing/page/color-themes.html\"&gt;одной из тем&lt;/a&gt;.&lt;/p&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"URL предварительного просмотра","href":"api-reference/landing/demos/introduction.html#url-predvaritelnogo-prosmotra","level":2},{"title":"Изображения","href":"api-reference/landing/demos/introduction.html#izobrazheniya","level":2},{"title":"Цветовая палитра","href":"api-reference/landing/demos/introduction.html#cvetovaya-palitra","level":2}],"title":"Введение по шаблонам"},"router":{"pathname":"api-reference/landing/demos/introduction","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
        </script>
