            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rzcx0vun\"&gt;landing&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-in8o0ram\"&gt;landing.demos.register&lt;/code&gt; регистрирует шаблон в мастере создания сайта и страницы. Возвращает массив идентификаторов для созданных шаблонов. Выполнение метода прерывается, когда происходит ошибка в массиве элементов и возвращается описание ошибки.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Для распространения созданного сайта, достаточно получить экспорт в файл на портале источнике, и распространить его приложение, вызвав данный метод при установке.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/landing/demos/landing-demos-register.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;data&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-llyqjmhc\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Результат метода &lt;a href=\"api-reference/landing/site/landing-site-full-export.html\"&gt;landing.site.fullExport&lt;/a&gt; как есть.&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;params&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-10rfcu1x\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Может содержать следующие ключи (&lt;strong&gt;только для коробочных версий&lt;/strong&gt;):&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;site_template_id&lt;/strong&gt; - привязка блока к определенному шаблону сайта (главного модуля).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"lokalizaciya\"&gt;&lt;a href=\"api-reference/landing/demos/landing-demos-register.html#lokalizaciya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Локализация&lt;/span&gt;&lt;/a&gt;Локализация&lt;/h2&gt;\n&lt;p&gt;Для получения разъяснений по локализациям шаблона, пожалуйста, см. &lt;a href=\"api-reference/landing/demos/localization.html\"&gt;здесь&lt;/a&gt;. Когда требуется локализация, раскомментируйте ключи &lt;strong&gt;lang&lt;/strong&gt; и &lt;strong&gt;lang_original&lt;/strong&gt;. Принцип, использованный здесь, аналогичен &lt;a href=\"api-reference/landing/demos\"&gt;локализации блоков&lt;/a&gt;. Имейте ввиду, что локализация применима только для основных фраз: названий страниц, описаний. Не перегружайте данный массив ненужной информацией.&lt;/p&gt;\n&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/landing/demos/landing-demos-register.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;p&gt;Заметьте, что в примере использован результат метода &lt;a href=\"api-reference/landing/site/landing-site-full-export.html\"&gt;landing.site.fullExport&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-us0hzn5x\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"xopdeoaa\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt;\n{\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n\t\t&lt;span class=\"hljs-string\"&gt;'landing.site.fullExport'&lt;/span&gt;,\n\t\t{\n\t\t\t&lt;span class=\"hljs-attr\"&gt;id&lt;/span&gt;: &lt;span class=\"hljs-number\"&gt;326&lt;/span&gt;,\n\t\t\t&lt;span class=\"hljs-attr\"&gt;params&lt;/span&gt;: {\n\t\t\t\t&lt;span class=\"hljs-attr\"&gt;edit_mode&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'Y'&lt;/span&gt;,\n\t\t\t\t&lt;span class=\"hljs-attr\"&gt;code&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;'myfirstsite'&lt;/span&gt;,\n\t\t\t\t&lt;span cl
