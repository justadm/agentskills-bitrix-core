        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;В интерфейсе Битрикс24 встречаются места встройки Баз знаний самим пользователем.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/landing/embedding/knowledge-base/_images/application_embedding.png\" alt=\"Места встройки Баз знаний\" /&gt;&lt;/p&gt;\n&lt;p&gt;Давайте разберем как с этим работать с позиции REST. Обратим внимание, что это не места встройки в чистом виде, которые рассмотрены &lt;a href=\"api-reference/widgets/index.html\"&gt;здесь&lt;/a&gt;. Это исключительно работа с базами знаний с позиции интерфейса.&lt;/p&gt;\n&lt;p&gt;Для начала вам нужно определиться с меню, в которое вы хотите встроиться, получить его код. Сделать это можно, открыв в интерфейсе выбор привязки к меню («Выбрать Базу знаний») и посмотрев адрес открывшегося фрейма. Там будет параметр, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jjekolmb\"&gt;menuId=crm_switcher:deal&lt;/code&gt;. Это и есть так называемый код меню. И вот с ним уже можно работать.&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/embedding/knowledge-base/landing-site-binding-to-group.html\"&gt;landing.site.bindingToGroup&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Привязывает к группе Социальной сети&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/embedding/knowledge-base/landing-site-binding-to-menu.html\"&gt;landing.site.bindingToMenu&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Встраивает в меню&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/embedding/knowledge-base/landing-site-get-group-bindings.html\"&gt;landing.site.getGroupBindings&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает привязки к группам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/embedding/knowledge-base/landing-site-get-menu-bindings.html\"&gt;landing.site.getMenuBindings&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список привязок в меню&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/embedding/knowledge-base/landing-site-unbinding-from-group.html\"&gt;landing.site.unbindingFromGroup&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет привязку к группе Социальной сети&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/embedding/knowledge-base/landing-site-unbinding-from-menu.html\"&gt;landing.site.unbindingFromMenu&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет из меню&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[],"title":"Места встройки Баз знаний"},"router":{"pathname":"api-reference/landing/embedding/knowledge-base/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_sea
