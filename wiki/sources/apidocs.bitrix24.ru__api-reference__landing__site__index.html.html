            {"data":{"leading":false,"html":"&lt;p&gt;Объект Сайт позволяет создавать и настраивать разные веб-страницы: визитную карточку компании, интернет-магазин и многое другое.&lt;/p&gt;\n&lt;p&gt;Список всех сайтов в Битрикс24 можно получить методом &lt;a href=\"api-reference/landing/site/landing-site-get-list.html\"&gt;landing.site.getList&lt;/a&gt;. Чтобы добавить новый сайт, используйте метод &lt;a href=\"api-reference/landing/site/landing-site-add.html\"&gt;landing.site.add&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/landing/site/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"struktura-sajta\"&gt;&lt;a href=\"api-reference/landing/site/index.html#struktura-sajta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Структура сайта&lt;/span&gt;&lt;/a&gt;Структура сайта&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Страницы&lt;/strong&gt;. Хранят контент сайта. Управляются группой методов &lt;a href=\"api-reference/landing/page/methods/index.html\"&gt;landing.landing.*&lt;/a&gt;,&lt;br /&gt;\n&lt;strong&gt;Папки&lt;/strong&gt;. Необязательны. Используются для группировки страниц сайта и упрощают навигацию по сайту:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;создать новую папку — метод &lt;a href=\"api-reference/landing/site/landing-site-add-folder.html\"&gt;landing.site.addFolder&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;изменить параметры папки — метод &lt;a href=\"api-reference/landing/site/landing-site-update-folder.html\"&gt;landing.site.updateFolder&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;получить список всех папок — метод &lt;a href=\"api-reference/landing/site/landing-site-get-folders.html\"&gt;landing.site.getFolders&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/7183935/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать многостраничный сайт&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/6527585/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Настройки сайтов и страниц&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-sajtov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/landing/site/index.html#svyaz-sajtov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь сайтов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь сайтов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. Сайт имеет привязку к пользователям по числовым идентификаторам в параметрах &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vjo9dpp3\"&gt;CREATED_BY_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6ywd8pfu\"&gt;MODIFIED_BY_ID&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"dejstviya-s-sajtami\"&gt;&lt;a href=\"api-reference/landing/site/index.html#dejstviya-s-sajtami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Действия с сайтами&lt;/span&gt;&lt;/a&gt;Действия с сайтами&lt;/h2&gt;\n&lt;p&gt;Сайты можно обновлять методом &lt;a href=\"api-reference/landing/site/landing-site-update.html\"&gt;landing.site.update&lt;/a&gt;. Метод изменяет название, описание, главную страницу, цветовую палитру и другие параметры.&lt;/p&gt;\n&lt;p&gt;Параметры сайта можно экспортировать  в массив методом &lt;a href=\"api-reference/landing/site/landing-site-full-export.html\"&gt;landing.site.fullExport&lt;/a&gt;. Далее массив следует использовать в методе &lt;a href=\"api-reference/landing/demos/landing-demos-register.html\"&gt;landing.demos.register&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-opublikovat-kontent-sajta\"&gt;&lt;a href=\"api-reference/landing/site/index.html#kak-opublikovat-kontent-sajta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как опубликовать контент сайта&lt;/span&gt;&lt;/a&gt;Как опубликовать контент сайта&lt;/h2&gt;\n&lt;p&gt;Чтобы сделать сайт доступным, вызовите метод  &lt;a href=\"api-reference/landing/site/landing-site-publication.html\"&gt;landing.site.publication&lt;/a&gt;. После публикации сайт получает уникальный URL, получить его можно методом &lt;a href=\"api-reference/landing/site/landing-site-get-public-url.html\"&gt;landing.site.getPublicUrl&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Когда необходимо опубликовать отдельную папку, используйте метод &lt;a href=\"api-reference/landing/site/landing-site-publication-folder.html\"&gt;landing.site.publicationFolder&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-snyat-sajt-s-publikacii\"&gt;&lt;a href=\"api-reference/landing/site/index.html#kak-snyat-sajt-s-publikacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как снять сайт с публикации&lt;/span&gt;&lt;/a&gt;Как снять сайт с публикации&lt;/h2&gt;\n&lt;p&gt;Вы можете снять с публикации:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;весь сайт с помощью метода &lt;a href=\"api-reference/landing/site/landing-site-unpublic.html\"&gt;landing.site.unpublic&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;отдельную папку методом &lt;a href=\"api-reference/landing/site/landing-site-unpublic-folder.html\"&gt;landing.site.unPublicFolder&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;отдельную страницу методом &lt;a href=\"api-reference/landing/page/methods/landing-landing-unpublic.html\"&gt;landing.landing.unpublic&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"kak-udalit-papki-i-sajt\"&gt;&lt;a href=\"api-reference/landing/site/index.html#kak-udalit-papki-i-sajt\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как удалить папки и сайт&lt;/span&gt;&lt;/a&gt;Как удалить папки и сайт&lt;/h2&gt;\n&lt;p&gt;Отдельную папку можно переместить в корзину методом &lt;a href=\"api-reference/landing/site/landing-site-mark-folder-delete.html\"&gt;landing.site.markFolderDelete&lt;/a&gt;. Если необходимо переместить весь сайт, используйте метод &lt;a href=\"api-reference/landing/site/landing-site-mark-delete.html\"&gt;landing.site.markDelete&lt;/a&gt;. Удаленные в корзину папки и сайт можно восстановить с помощью методов &lt;a href=\"api-reference/landing/site/landing-site-mark-folder-undelete.html\"&gt;landing.site.markFolderUnDelete&lt;/a&gt; и &lt;a href=\"api-reference/landing/site/landing-site-mark-undelete.html\"&gt;landing.site.markUnDelete&lt;/a&gt; в течение 30 дней.&lt;/p&gt;\n&lt;p&gt;Чтобы удалить сайт без возможности восстановления, нужно использовать метод &lt;a href=\"api-reference/landing/site/landing-site-delete.html\"&gt;landing.site.delete&lt;/a&gt;. Он уничтожит сайт со всеми папками и страницами навсегда.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/8233899/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Отключение и удаление сайтов&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"prava-na-sajty\"&gt;&lt;a href=\"api-reference/landing/site/index.html#prava-na-sajty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Права на сайты&lt;/span&gt;&lt;/a&gt;Права на сайты&lt;/h2&gt;\n&lt;p&gt;Права доступа позволяют контролировать, кто может просматривать и изменять контент сайта. Права выдает только администратор портала. Поддерживается две модели прав:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;ролевая — права настраиваются с помощью метода &lt;a href=\"api-reference/landing/rights/role-model/landing-role-set-rights.html\"&gt;landing.role.setRights&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;расширенная — права настраиваются с помощью метода &lt;a href=\"api-reference/landing/rights/extended-model/landing-site-set-rights.html\"&gt;landing.site.setRights&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Определить модель можно методом &lt;a href=\"api-reference/landing/rights/landing-role-is-enabled.html\"&gt;landing.role.isEnabled&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/9375089/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Права на сайты и магазины&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/landing/site/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5oqkl81i\"&gt;landing&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;С версии&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-add.html\"&gt;landing.site.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет сайт&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-add-folder.html\"&gt;landing.site.addFolder&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет папку в сайт&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;21.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-delete.html\"&gt;landing.site.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет сайт&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-full-export.html\"&gt;landing.site.fullExport&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Экспортирует сайт и всего его страницы в специальный массив&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-get-folders.html\"&gt;landing.site.getFolders&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает папки сайта&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;21.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-get-list.html\"&gt;landing.site.getList&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список сайтов&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-get-preview.html\"&gt;landing.site.getPreview&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает URL изображения-превью сайта&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;21.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-get-public-url.html\"&gt;landing.site.getPublicUrl&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает полный URL сайтов&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;18.7.500&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-get-additional-fields.html\"&gt;landing.site.getadditionalfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает дополнительные поля сайта&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-mark-delete.html\"&gt;landing.site.markDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Помечает сайт как удаленный&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-mark-folder-delete.html\"&gt;landing.site.markFolderDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Помечает папку как удаленную&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;21.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-mark-folder-undelete.html\"&gt;landing.site.markFolderUnDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Восстанавливает папку из корзины&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;21.800.0&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-mark-undelete.html\"&gt;landing.site.markUnDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Восстанавливает сайт из корзины&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/landing/site/landing-site-publication.html\"&gt;landing.site.publication&lt;/a&gt;&lt;/p&gt;\
