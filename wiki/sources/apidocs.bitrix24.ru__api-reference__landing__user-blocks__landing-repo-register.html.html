        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Мы еще обновляем эту страницу&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тут может не хватать некоторых данных — дополним в ближайшее время&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8l2ekx7m\"&gt;landing&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fop07tzz\"&gt;landing.repo.register&lt;/code&gt; добавляет блок в репозиторий. Возвращает ошибку или &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bv44xj17\"&gt;ID&lt;/code&gt; добавленного блока. Этот &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-02ksm3yb\"&gt;ID&lt;/code&gt; используется для добавления блока на создаваемые программно лендинги.&lt;/p&gt;\n&lt;p&gt;При добавлении происходит проверка. Если блок с данным кодом уже присутствует в системе, произойдет его удаление.&lt;/p&gt;\n&lt;p&gt;Метод может вернуть ошибку об опасном содержимом блока. В этом случае требуется сначала проверить регистрируемое содержимое методом &lt;a href=\"api-reference/landing/user-blocks/landing-repo-check-content.html\"&gt;landing.repo.checkContent&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;При разработке нового блока или изменении существующего может потребоваться быстрее увидеть изменение, чем это позволяет пере-добавление блока или флаг RESET. Рекомендуется для этих целей использовать метод &lt;a href=\"api-reference/landing/block/methods/landing-block-update-content.html\"&gt;landing.block.updatecontent&lt;/a&gt;. Метод передаёт в блок произвольный контент и отображает изменения практически \"налету\". После того как разработка закончена, разработчик может окончательно его зарегистрировать.&lt;/p&gt;\n&lt;p&gt;Метод подходит только для изменения контента. При изменении манифеста блок требуется перерегистрировать (без пере-добавления на страницу).&lt;/p&gt;\n&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/landing/user-blocks/landing-repo-register.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;С версии&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;code&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3mhr07bl\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Уникальный код вашего блока, по нему будет осуществляться удаление блока, если требуется.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;fields&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f039r8p5\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив полей, описывающих ваш блок, состоит из ключей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;NAME - название блока&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;DESCRIPTION - описание блока&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;SECTIONS - категории, в которых должен появиться блок, через запятую.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Если нужной категории нет в списке, просто напишите ее текстом в манифесте, категория будет добавлена. Ключом новой категории становится значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u4prw0co\"&gt;md5(strtolower($sectionName))&lt;/code&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;PREVIEW - URL картинки, обложки блока&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;CONTENT - html-содержимое блока&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;ACTIVE - активность блока (Y / N)&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;SITE_TEMPLATE_ID – привязка блока к определенному шаблона сайта главного модуля. &lt;strong&gt;Только для коробочных версий!&lt;/strong&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Дополнительные параметры:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;RESET - если передать со значением Y, то система автоматически обновит все добавленные на страницы блоки на новую верстку. &lt;a href=\"https://dev.bitrix24.ru/company/personal/user/3/blog/2091/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Подробнее...&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;manifest&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f3qecx08\"&gt;unknown&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив манифеста, которым описывается блок.&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Атрибут &lt;strong&gt;style&lt;/strong&gt; может вырезаться встроенным санитайзером. Чтобы это обойти используйте вместо него атрибут &lt;strong&gt;bxstyle&lt;/strong&gt;. При добавлении система конвертирует его в штатный style.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"primery\"&gt;&lt;a href=\"api-reference/landing/user-blocks/landing-repo-register.html#primery\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Примеры&lt;/span&gt;&lt;/a&gt;Примеры&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-ucsk8xdg\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-id=\"bx24js\" data-diplodoc-key=\"bx24.js\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;BX24.js&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"yfl90wye\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"JS\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt;\n{\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; response = &lt;span class=\"hljs-keyword\"&gt;await&lt;/span&gt; $b24.&lt;span class=\"hljs-title function_\"&gt;callMethod&lt;/span&gt;(\n\t\t&lt;span class=\"hljs-string\"&gt;'landing.repo.register'&lt;/span&gt;,\n\t\t&amp;lt;?= \\&lt;span class=\"hljs-title class_\"&gt;CUtil&lt;/span&gt;::&lt;span class=\"hljs-title class_\"&gt;PhpToJSObject&lt;/span&gt;($data) ?&amp;gt;\n\t);\n\t\n\t&lt;span class=\"hljs-keyword\"&gt;const&lt;/span&gt; result = response.&lt;span class=\"hljs-title function_\"&gt;getData&lt;/span&gt;().&lt;span class=\"hljs-property\"&gt;result&lt;/span&gt;;\n\t&lt;span class=\"hljs-keyword\"&gt;if&lt;/span&gt; (result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;())\n\t{\n\t\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(result.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;());\n\t}\n\t&lt;span class=\"hljs-keyword\"&gt;else&lt;/span&gt;\n\t{\n\t\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;info&lt;/span&gt;(result);\n\t}\n}\n&lt;span class=\"hljs-keyword\"&gt;catch&lt;/span&gt;(error)\n{\n\t&lt;span class=\"hljs-variable language_\"&gt;console&lt;/span&gt;.&lt;span class=\"hljs-title function_\"&gt;error&lt;/span&gt;(&lt;span class=\"hljs-string\"&gt;'Error:'&lt;/span&gt;, error);\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"182\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-182\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-182\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-182.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"jr7e4jh7\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"PHP\"&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs php\"&gt;&lt;span class=\"hljs-keyword\"&gt;try&lt;/span&gt; {\n    &lt;span class=\"hljs-variable\"&gt;$response&lt;/span&gt; = &lt;span class=\"hljs-variable\"&gt;$b24Service&lt;/span&gt;\n        -&amp;gt;core\n        -&amp;gt;&lt;span class=\"hljs-title function_ invoke__\"&gt;call&lt;/span&gt;(\n            &lt;span class=\"hljs-string\"&gt;'landing.repo.register'&lt;/span&gt;,\n            [\n                &lt;span class=\"hljs-string\"&gt;'code'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'myblockx'&lt;/span&gt;,\n                &lt;span class=\"hljs-string\"&gt;'fields'&lt;/span&gt; =&amp;gt; [\n                    &lt;span class=\"hljs-string\"&gt;'NAME'&lt;/span&gt;        =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Test block'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'DESCRIPTION'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Just try!'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'SECTIONS'&lt;/span&gt;    =&amp;gt; &lt;span class=\"hljs-string\"&gt;'cover,about'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'PREVIEW'&lt;/span&gt;     =&amp;gt; &lt;span class=\"hljs-string\"&gt;'https://www.bitrix24.ru/images/b24_screen.png'&lt;/span&gt;,\n                    &lt;span class=\"hljs-string\"&gt;'CONTENT'&lt;/span&gt;     =&amp;gt; &lt;span class=\"hljs-string\"&gt;'\n    &amp;lt;section class=\"landing-block\"&amp;gt;\n        &amp;lt;div class=\"text-center g-color-gray-dark-v3 g-pa-10\"&amp;gt;\n            &amp;lt;div class=\"g-width-600 mx-auto\"&amp;gt;\n                &amp;lt;div class=\"landing-block-node-text g-font-size-12 \"&amp;gt;\n                    &amp;lt;p&amp;gt;© 2017 All right reserved. Developed by\n                    &amp;lt;a href=\"#\" class=\"landing-block-node-link g-color-primary\"&amp;gt;Bitrix24&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;\n                &amp;lt;/div&amp;gt;\n            &amp;lt;/div&amp;gt;\n        &amp;lt;/div&amp;gt;\n    &amp;lt;/section&amp;gt;'&lt;/span&gt;\n                ],\n                &lt;span class=\"hljs-string\"&gt;'manifest'&lt;/span&gt; =&amp;gt; [\n                    &lt;span class=\"hljs-string\"&gt;'assets'&lt;/span&gt; =&amp;gt; [\n                        &lt;span class=\"hljs-string\"&gt;'css'&lt;/span&gt; =&amp;gt; [\n                            &lt;span class=\"hljs-string\"&gt;'https://site.com/aaa.css'&lt;/span&gt;\n                        ],\n                        &lt;span class=\"hljs-string\"&gt;'js'&lt;/span&gt;  =&amp;gt; [\n                            &lt;span class=\"hljs-string\"&gt;'https://site.com/aaa.js'&lt;/span&gt;\n                        ]\n                    ],\n                    &lt;span class=\"hljs-string\"&gt;'nodes'&lt;/span&gt;  =&amp;gt; [\n                        &lt;span class=\"hljs-string\"&gt;'.landing-block-node-text'&lt;/span&gt; =&amp;gt; [\n                            &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Text'&lt;/span&gt;,\n                            &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'text'&lt;/span&gt;,\n                        ],\n                        &lt;span class=\"hljs-string\"&gt;'.landing-block-node-link'&lt;/span&gt; =&amp;gt; [\n                            &lt;span class=\"hljs-string\"&gt;'name'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'Link'&lt;/span&gt;,\n                            &lt;span class=\"hljs-string\"&gt;'type'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'link'&lt;/span&gt;,\n                        ],\n                    ],\n                    &lt;span class=\"hljs-string\"&gt;'style'&lt;/span&gt;  =&amp;gt; [\n                        &lt;span class=\"hljs-
