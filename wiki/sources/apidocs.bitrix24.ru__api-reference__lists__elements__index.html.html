            {"data":{"leading":false,"html":"&lt;p&gt;Каждый элемент списка состоит из полей. Вы можете добавлять новые поля и настраивать их методами &lt;a href=\"api-reference/lists/fields/index.html\"&gt;lists.field.*&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/lists/elements/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/5405819\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как добавить элементы списка&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/lists/elements/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Универсальные списки.&lt;/strong&gt;  Элементы создаются внутри списков. Чтобы добавить элемент в список, укажите параметры &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ujinof24\"&gt;IBLOCK_TYPE_ID&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bhmt248c\"&gt;IBLOCK_ID&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l2rjj4pp\"&gt;IBLOCK_CODE&lt;/code&gt;. Значения можно получить методом &lt;a href=\"api-reference/lists/lists/lists-get.html\"&gt;lists.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Разделы  списка.&lt;/strong&gt; Элемент можно поместить в раздел с помощью параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8tu9sjj0\"&gt;IBLOCK_SECTION_ID&lt;/code&gt;. Идентификатор раздела можно получить методом &lt;a href=\"api-reference/lists/sections/lists-section-get.html\"&gt;lists.section.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Элементы других списков.&lt;/strong&gt; Поле типа Привязка к элементам связывает элементы разных списков. В таком поле можно выбрать другой список и указать его элементы как значения. Внутри поля сохраняются &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3g8t5hh1\"&gt;ID&lt;/code&gt; выбранных элементов, а отображаются их названия.&lt;/p&gt;\n&lt;p&gt;Допустим, у вас уже есть список «Размеры» с элементами: XS, S, M, L. Тогда в списке «Товары» вы создаете поле типа Привязка к элементам и указываете список «Размеры». Теперь, когда вы добавляете товар, вы не вводите размеры вручную, а выбираете нужные элементы из списка — например, S и M.&lt;/p&gt;\n&lt;p&gt;Чтобы получить идентификатор списка, воспользуйтесь методом &lt;a href=\"api-reference/lists/lists/lists-get.html\"&gt;lists.get&lt;/a&gt;. Идентификатор элемента можно узнать с помощью метода &lt;a href=\"api-reference/lists/elements/lists-element-add.html\"&gt;lists.element.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Объекты CRM.&lt;/strong&gt; Поле типа Привязка к элементам CRM соединяет элементы списка с объектами CRM: &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидами&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделками&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессами&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контактами&lt;/a&gt; и &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компаниями&lt;/a&gt;. В элементах списка это поле отображается как ссылка на объект CRM, а в самой карточке CRM появляется вкладка с названием списка.&lt;/p&gt;\n&lt;p&gt;Формат значения поля зависит от настроек.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Если в настройках поля разрешена привязка только к одному объекту, то заполняйте значение поля &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;идентификатором объекта&lt;/a&gt; без символьного префикса. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o8xvwsoh\"&gt;3&lt;/code&gt; — контакт. Иначе поле будет отображаться, но не выгружаться в Excel.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если разрешена привязка к нескольким объектам, то заполняйте значение поля &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;идентификатором с префиксом&lt;/a&gt;. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v0xdxc28\"&gt;C_3&lt;/code&gt; — контакт.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Пользователи.&lt;/strong&gt; Для работы с пользователями в элементах списка используются поля типа Привязка к сотруднику, Кем создан и Кем изменен. Значения в полях Кем создан и Кем изменен заполняются системой автоматически. Для полей типа Привязка к сотруднику данные необходимо передавать вручную.&lt;/p&gt;\n&lt;p&gt;Идентификатор пользователя можно получить методом &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Диск.&lt;/strong&gt; Поле типа Файл (Диск) связывает элементы списка с Диском. Чтобы добавить файл в поле элемента:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;загрузите файл на Диск методами &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt; или &lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;получите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r42ba0qu\"&gt;ID&lt;/code&gt; загруженного файла,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;прикрепите файл методами &lt;a href=\"api-reference/lists/elements/lists-element-add.html\"&gt;lists.element.add&lt;/a&gt; или &lt;a href=\"api-reference/lists/elements/lists-element-update.html\"&gt;lists.element.update&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/lists/elements/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-brbamrc2\"&gt;lists&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-add.html\"&gt;lists.element.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает элемент списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-update.html\"&gt;lists.element.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет элемент списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-get.html\"&gt;lists.element.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элемент или список элементов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-delete.html\"&gt;lists.element.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет элемент списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-get-file-url.html\"&gt;lists.element.get.file.url&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает путь к файлу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь с другими объектами","href":"api-reference/lists/elements/index.html#svyaz-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/lists/elements/index.html#all-methods","level":2}],"title":"Элементы универсального списка: обзор методов"},"router":{"pathname":"api-reference/lists/elements/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
