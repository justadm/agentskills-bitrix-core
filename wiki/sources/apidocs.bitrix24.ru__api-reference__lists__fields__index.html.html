        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Поля определяют формат и тип информации, которую можно хранить в элементах списка: одно поле — для названия, другое — для даты, третье — для текстового описания. Для каждого поля задается тип: Строка, Дата создания и HTML/Текст. Полный перечень типов полей описан в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ennkvule\"&gt;FIELDS&lt;/code&gt; метода &lt;a href=\"api-reference/lists/fields/lists-field-add.html\"&gt;lists.field.add&lt;/a&gt;. Через типы полей универсальные списки интегрированы с модулями CRM и Диск.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тип задается при создании поля, и изменить его нельзя.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/lists/fields/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/8179623/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;создание полей списка&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"privyazka-k-elementam-crm\"&gt;&lt;a href=\"api-reference/lists/fields/index.html#privyazka-k-elementam-crm\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Привязка к элементам CRM&lt;/span&gt;&lt;/a&gt;Привязка к элементам CRM&lt;/h2&gt;\n&lt;p&gt;Поле типа «Привязка к элементам CRM» связывает элементы списка с объектами CRM: &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидами&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделками&lt;/a&gt;, &lt;a href=\"api-reference/crm/universal/index.html\"&gt;смарт-процессами&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контактами&lt;/a&gt; и &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компаниями&lt;/a&gt;. В элементах списка это поле отображается в виде ссылки на объект CRM, а в карточке объекта CRM автоматически создается вкладка с названием списка.&lt;/p&gt;\n&lt;p&gt;Когда заполняете список, учитывайте привязку к объектам CRM: лидам, сделкам, смарт-процессах, контактам и компаниям.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Если в настройках поля разрешена привязка только к одному объекту, то заполняйте значение поля &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;идентификатором объекта&lt;/a&gt; без символьного префикса. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hayjujn0\"&gt;3&lt;/code&gt; — контакт. Иначе поле будет отображаться, но не выгружаться в Excel.&lt;/li&gt;\n&lt;li&gt;Если разрешена привязка к нескольким объектам, то заполняйте значение поля &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;идентификатором с префиксом&lt;/a&gt;. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q8ri4co3\"&gt;C_3&lt;/code&gt; — контакт.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"dokumenty-i-fajly\"&gt;&lt;a href=\"api-reference/lists/fields/index.html#dokumenty-i-fajly\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Документы и файлы&lt;/span&gt;&lt;/a&gt;Документы и файлы&lt;/h2&gt;\n&lt;p&gt;Универсальные списки поддерживают два типа полей для работы с файлами.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файл (Диск).&lt;/strong&gt; Тип поля связан с Битрикс24 Диск и хранит идентификатор объекта Диска. Работать с файлом следует по его идентификатору через методы &lt;a href=\"api-reference/disk/index.html\"&gt;disk.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файл.&lt;/strong&gt; Тип поля позволяет загружать и хранить файлы непосредственно в элементе списка. Не имеет идентификатора объекта Диска. Применение методов Диска невозможно.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/lists/fields/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jnxza2hw\"&gt;lists&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-add.html\"&gt;lists.field.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает поле списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-delete.html\"&gt;lists.field.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет поле списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-get.html\"&gt;lists.field.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает данные поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-type-get.html\"&gt;lists.field.type.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные типа полей для указанного списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-update.html\"&gt;lists.field.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поле списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Привязка к элементам CRM","href":"api-reference/lists/fields/index.html#privyazka-k-elementam-crm","level":2},{"title":"Документы и файлы","href":"api-reference/lists/fields/index.html#dokumenty-i-fajly","level":2},{"title":"Обзор методов","href":"api-reference/lists/fields/index.html#all-methods","level":2}],"title":"Поля универсального списка: обзор методов"},"router":{"pathname":"api-reference/lists/fields/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
