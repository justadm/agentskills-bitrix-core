            {"data":{"leading":false,"html":"&lt;p&gt;Универсальные списки — это инструмент для создания и управления структурированной информацией. Они позволяют создавать настраиваемые таблицы c различными типами полей: текст, число, дата, файл и другие.&lt;/p&gt;\n&lt;p&gt;Универсальные списки интегрируются с модулями Битрикс24, что дает возможность автоматизировать обработку данных и управлять доступом. Представьте, что есть список заявок на отпуск сотрудников. Для списка настроен бизнес-процесс и заданы права так, что только руководитель и сотрудники HR-отдела могут изменять заявки. В результате, когда сотрудник подает заявку на отпуск, HR-менеджер автоматически получает уведомление, чтобы рассмотреть и одобрить или отклонить заявку.&lt;/p&gt;\n&lt;p&gt;Каждый список представляет собой &lt;i class=\"yfm yfm-term_title\" term-key=\":iblock\" role=\"button\" aria-describedby=\":iblock_element\" tabindex=\"0\" id=\"hsz5ceqb\"&gt;информационный блок&lt;/i&gt;. Используйте группу методов &lt;a href=\"api-reference/lists/lists/index.html\"&gt;lists.*&lt;/a&gt; для работы со списками.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/lists/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/5316091/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;списки в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"struktura-universalnogo-spiska\"&gt;&lt;a href=\"api-reference/lists/index.html#struktura-universalnogo-spiska\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Структура универсального списка&lt;/span&gt;&lt;/a&gt;Структура универсального списка&lt;/h2&gt;\n&lt;h3 id=\"razdely\"&gt;&lt;a href=\"api-reference/lists/index.html#razdely\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Разделы&lt;/span&gt;&lt;/a&gt;Разделы&lt;/h3&gt;\n&lt;p&gt;Разделы группируют элементы, как папки. Это помогает выстроить иерархию. Например, раздел «Юридические документы» -&amp;gt; подраздел «Договоры аренды». Для работы с разделами используйте методы &lt;a href=\"api-reference/lists/sections/index.html\"&gt;lists.section.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h3 id=\"elementy\"&gt;&lt;a href=\"api-reference/lists/index.html#elementy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Элементы&lt;/span&gt;&lt;/a&gt;Элементы&lt;/h3&gt;\n&lt;p&gt;Элементы — это строки списка, которые хранят основную информацию. Например, данные одного договора, заявки или сертификата. Элемент можно поместить в раздел. Методы для работы с элементами — &lt;a href=\"api-reference/lists/elements/index.html\"&gt;lists.element.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/5405819/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как добавить элементы списка&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"polya\"&gt;&lt;a href=\"api-reference/lists/index.html#polya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поля&lt;/span&gt;&lt;/a&gt;Поля&lt;/h3&gt;\n&lt;p&gt;Поля определяют, какие данные хранятся в каждом элементе. Вы задаете тип поля: текст, список, дата, файл и другие. Создавать, изменять и удалять поля можно через методы &lt;a href=\"api-reference/lists/fields/index.html\"&gt;lists.field.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Набор полей уникален для каждого списка. Все доступные типы смотрите в описании параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sjfmnyha\"&gt;FIELDS&lt;/code&gt; метода &lt;a href=\"api-reference/lists/fields/lists-field-add.html\"&gt;lists.field.add&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Информация в универсальных списках может быть связана с CRM и Диском через поля следующих типов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Привязка к элементам CRM,&lt;/li&gt;\n&lt;li&gt;Файл (Диск).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Об особенностях этих типов читайте в статье &lt;a href=\"api-reference/lists/fields/index.html\"&gt;Поля универсального списка: обзор методов&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/8179623/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Создание полей списка&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"posledovatelnost-raboty-so-spiskom\"&gt;&lt;a href=\"api-reference/lists/index.html#posledovatelnost-raboty-so-spiskom\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Последовательность работы со списком&lt;/span&gt;&lt;/a&gt;Последовательность работы со списком&lt;/h2&gt;\n&lt;p&gt;Рекомендуемый порядок работы со списком:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Создайте список с помощью метода &lt;a href=\"api-reference/lists/lists/lists-add.html\"&gt;lists.add&lt;/a&gt;. Укажите код &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pt4m4wed\"&gt;IBLOCK_CODE&lt;/code&gt;, тип &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rkrybbgf\"&gt;IBLOCK_TYPE_ID&lt;/code&gt; и название &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kzqsvg4g\"&gt;NAME&lt;/code&gt; списка.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Добавьте пользовательские поля через метод &lt;a href=\"api-reference/lists/fields/lists-field-add.html\"&gt;lists.field.add&lt;/a&gt;, чтобы задать структуру данных будущих элементов.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если нужно, создайте разделы методом &lt;a href=\"api-reference/lists/sections/lists-section-add.html\"&gt;lists.section.add&lt;/a&gt; для организации иерархии.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Наполните список элементами с помощью метода &lt;a href=\"api-reference/lists/elements/lists-element-add.html\"&gt;lists.element.add&lt;/a&gt;. Заполняйте созданные поля и привязывайте элементы к разделам.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/lists/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rboke3ae\"&gt;lists&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"spiski\"&gt;&lt;a href=\"api-reference/lists/index.html#spiski\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Списки&lt;/span&gt;&lt;/a&gt;Списки&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-add.html\"&gt;lists.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает универсальный список&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-update.html\"&gt;lists.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет универсальный список&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-get.html\"&gt;lists.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает данные универсального списка или массив списков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-delete.html\"&gt;lists.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет универсальный список&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-get-iblock-type-id.html\"&gt;lists.get.iblock.type.id&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает идентификатор типа инфоблока&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"elementy1\"&gt;&lt;a href=\"api-reference/lists/index.html#elementy1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Элементы&lt;/span&gt;&lt;/a&gt;Элементы&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-add.html\"&gt;lists.element.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает элемент списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-update.html\"&gt;lists.element.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет элемент списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-get.html\"&gt;lists.element.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает элемент или список элементов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-delete.html\"&gt;lists.element.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет элемент списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/elements/lists-element-get-file-url.html\"&gt;lists.element.get.file.url&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает путь к файлу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"polya1\"&gt;&lt;a href=\"api-reference/lists/index.html#polya1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Поля&lt;/span&gt;&lt;/a&gt;Поля&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-add.html\"&gt;lists.field.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает поле списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-update.html\"&gt;lists.field.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поле списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-get.html\"&gt;lists.field.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает данные поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-delete.html\"&gt;lists.field.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет поле списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/fields/lists-field-type-get.html\"&gt;lists.field.type.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные типы полей для указанного списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"razdely1\"&gt;&lt;a href=\"api-reference/lists/index.html#razdely1\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Разделы&lt;/span&gt;&lt;/a&gt;Разделы&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/sections/lists-section-add.html\"&gt;lists.section.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает раздел списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/sections/lists-section-update.html\"&gt;lists.section.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет раздел списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/sections/lists-section-get.html\"&gt;lists.section.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает раздел или список разделов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/sections/lists-section-delete.html\"&gt;lists.section.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет раздел списка&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;dfn class=\"yfm yfm-term_dfn\" id=\":iblock_element\" role=\"dialog\"&gt;&lt;p&gt;Информационный блок — это специальный объект для хранения новостей, услуг, статей, каталогов товаров и других данных, имеющих четкую структуру.&lt;/p&gt;\n&lt;/dfn&gt;&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Структура универсального списка","href":"api-reference/lists/index.html#struktura-universalnogo-spiska","level":2,"items":[{"title":"Разделы","href":"api-reference/lists/index.html#razdely","level":3},{"title":"Элементы","href":"api-reference/lists/index.html#elementy","level":3},{"title":"Поля","href":"api-reference/lists/index.html#polya","level":3}]},{"title":"Последовательность работы со списком","href":"api-reference/lists/index.html#posledovatelnost-raboty-so-spiskom","level":2},{"title":"Обзор методов","href":"api-reference/lists/index.html#all-methods","level":2,"items":[{"title":"Списки","href":"api-reference/lists/index.html#spiski","level":3},{"title":"Элементы","href":"api-reference/lists/index.html#elementy1","level":3},{"title":"Поля","href":"api-reference/lists/index.html#polya1","level":3},{"title":"Разделы","href":"api-reference/lists/index.html#razdely1","level":3}]}],"title":"Универсальные списки: обзор методов"},"router":{"pathname":"api-reference/lists/index","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
