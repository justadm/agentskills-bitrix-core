            {"data":{"leading":false,"html":"&lt;p&gt;С помощью универсальных списков можно вести учет любых объектов: документов, сертификатов, рекламных материалов и другого.&lt;/p&gt;\n&lt;p&gt;Создавать списки может только администратор Битрикс24. Он же настраивает права: указывает, кто из сотрудников может редактировать список, а кто не имеет к нему доступа.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/lists/lists/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/1409963/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Пример работы со списком&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tipy-infoblokov-dlya-spiskov\"&gt;&lt;a href=\"api-reference/lists/lists/index.html#tipy-infoblokov-dlya-spiskov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы инфоблоков для списков&lt;/span&gt;&lt;/a&gt;Типы инфоблоков для списков&lt;/h2&gt;\n&lt;p&gt;В Битрикс24 списки используют три типа инфоблоков:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9ag1hem8\"&gt;lists&lt;/code&gt; — стандартные универсальные списки,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pvjiol8f\"&gt;lists_socnet&lt;/code&gt; — списки рабочих групп и проектов,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-52oqt9bh\"&gt;bitrix_processes&lt;/code&gt; — служебный тип для данных бизнес-процессов.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы узнать тип существующего списка, используйте метод &lt;a href=\"api-reference/lists/lists/lists-get-iblock-type-id.html\"&gt;lists.get.iblock.type.id&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"rabochie-gruppy-i-proekty\"&gt;&lt;a href=\"api-reference/lists/lists/index.html#rabochie-gruppy-i-proekty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Рабочие группы и проекты&lt;/span&gt;&lt;/a&gt;Рабочие группы и проекты&lt;/h2&gt;\n&lt;p&gt;Универсальные списки интегрированы &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;в рабочие группы и проекты&lt;/a&gt;. Создавать свои списки можно внутри любой группы или проекта с различными уровнями доступа для участников.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/25816794/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать список в группе и проекте&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"biznes-processy\"&gt;&lt;a href=\"api-reference/lists/lists/index.html#biznes-processy\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Бизнес-процессы&lt;/span&gt;&lt;/a&gt;Бизнес-процессы&lt;/h2&gt;\n&lt;p&gt;Бизнес-процессы в универсальных списках создают индивидуальный сценарий обработки элементов. Например, элемент списка содержит дату окончания сертификата. При добавлении такого элемента запускается бизнес-процесс. За N дней до даты окончания он автоматически создаст задачу ответственному сотруднику.&lt;/p&gt;\n&lt;p&gt;Управление бизнес-процессами выполняется с помощью групп методов &lt;a href=\"api-reference/bizproc/index.html\"&gt;bizproc.workflow.*&lt;/a&gt; и &lt;a href=\"api-reference/bizproc/bizproc-task/bizproc-task-list.html\"&gt;bizproc.task.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/5322575/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Включение бизнес-процессов в списке&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"prava-dostupa\"&gt;&lt;a href=\"api-reference/lists/lists/index.html#prava-dostupa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Права доступа&lt;/span&gt;&lt;/a&gt;Права доступа&lt;/h2&gt;\n&lt;p&gt;Права на весь список настраиваются для пользователей, групп и отделов. Задайте их при создании или обновлении списка через параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-95q250vl\"&gt;RIGHTS&lt;/code&gt;. В этом параметре укажите массив, где ключ — это код сущности, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-txf58h3u\"&gt;U{ID}&lt;/code&gt; для пользователя, а значение — буквенный код права, например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nqwe2ufm\"&gt;W&lt;/code&gt; для записи.&lt;/p&gt;\n&lt;p&gt;Права могут конфликтовать, например, у пользователя есть роль с одними правами, а отдел, в котором он состоит, — с другими. В этом случае применяются максимальные права.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/lists/lists/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-de935dyb\"&gt;lists&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-add.html\"&gt;lists.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает универсальный список&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-update.html\"&gt;lists.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет универсальный список&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-get.html\"&gt;lists.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает данные универсального списка или массив списков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-delete.html\"&gt;lists.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет универсальный список&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/lists/lists/lists-get-iblock-type-id.html\"&gt;lists.get.iblock.type.id&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает идентификатор типа инфоблока&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Типы инфоблоков для списков","href":"api-reference/lists/lists/index.html#tipy-infoblokov-dlya-spiskov","level":2},{"title":"Рабочие группы и проекты","href":"api-reference/lists/lists/index.html#rabochie-gruppy-i-proekty","level":2},{"title":"Бизнес-процессы","href":"api-reference/lists/lists/index.html#biznes-processy","level":2},{"title":"Права доступа","href":"api-reference/lists/lists/index.html#prava-dostupa","level":2},{"title":"Обзор методов","href":"api-reference/lists/lists/index.html#all-methods","level":2}],"title":"Работа с универсальными списками: обзор методов"},"router":{"pathname":"api-reference/lists/lists/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
