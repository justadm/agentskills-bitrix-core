        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Комментарии в Ленте новостей позволяют пользователям обсуждать сообщения, делиться мнениями и уточнять детали. К каждому комментарию можно прикреплять файлы.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/log/blogcomment/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-kommentariev-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/log/blogcomment/index.html#svyaz-kommentariev-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь комментариев с другими объектами&lt;/span&gt;&lt;/a&gt;Связь комментариев с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Сообщение Ленты новостей&lt;/strong&gt;. Комментарии привязаны к сообщению по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dfno2c2u\"&gt;POST_ID&lt;/code&gt;. Идентификатор сообщения можно получить с помощью метода &lt;a href=\"api-reference/log/log-blogpost-get.html\"&gt;log.blogpost.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь&lt;/strong&gt;. Комментарий имеет привязку к пользователю по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rupjhtge\"&gt;USER_ID&lt;/code&gt;. Получить идентификатор пользователя позволяют методы &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файлы&lt;/strong&gt;. К комментариям можно прикреплять файлы. Чтобы прикрепить файл, передайте массив из имени файла и строки с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-15gjbdo9\"&gt;Base64&lt;/code&gt; в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fhnduuzt\"&gt;FILES&lt;/code&gt;. Информацию о прикрепленном файле можно получить с помощью метода &lt;a href=\"api-reference/disk/attached-object/disk-attached-object-get.html\"&gt;disk.attachedObject.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Как загрузить файлы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/log/blogcomment/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6kw4q9ea\"&gt;log&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/blogcomment/log-blogcomment-add.html\"&gt;log.blogcomment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет комментарий к сообщению Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/blogcomment/log-blogcomment-user-get.html\"&gt;log.blogcomment.user.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список комментариев к сообщению Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/blogcomment/log-blogcomment-delete.html\"&gt;log.blogcomment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет комментарий к сообщению&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь комментариев с другими объектами","href":"api-reference/log/blogcomment/index.html#svyaz-kommentariev-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/log/blogcomment/index.html#all-methods","level":2}],"title":"Комментарии к сообщениям Ленты: обзор методов"},"router":{"pathname":"api-reference/log/blogcomment/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
