            {"data":{"leading":false,"html":"&lt;p&gt;Лента новостей корпоративного портала напоминает ленты в социальных сетях. Она позволяет сотрудникам быть в курсе событий компании. В ней отображаются новости, сообщения, задачи, опросы, поздравления и многое другое.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/log/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/section/108537/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Лента новостей&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-lenty-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/log/index.html#svyaz-lenty-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь Ленты с другими объектами&lt;/span&gt;&lt;/a&gt;Связь Ленты с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователи&lt;/strong&gt;. Чтобы написать сообщение Ленты новостей конкретным пользователям, нужно знать их ID. Список пользователей можно получить методом &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Рабочие группы и проекты&lt;/strong&gt;. Сообщение Ленты новостей можно направить участникам рабочих групп и проектов с помощью ID рабочих групп и проектов. Список групп доступен через метод &lt;a href=\"api-reference/sonet-group/sonet-group-get.html\"&gt;sonet_group.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Подразделения компании&lt;/strong&gt;. Чтобы адресовать сообщение Ленты подразделениям компании, нужно знать ID подразделений. Получить список подразделений можно через метод &lt;a href=\"api-reference/departments/department-get.html\"&gt;department.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файлы&lt;/strong&gt;. К сообщениям в Ленте новостей можно прикреплять файлы из локального хранилища, Диска Битрикс24 или облака. Чтобы прикрепить файл к сообщению, передайте массив из имени файла и строки с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w7zg5s17\"&gt;Base64&lt;/code&gt; в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tkb7uy2f\"&gt;Files&lt;/code&gt;. Чтобы получить информацию о прикрепленном файле, используйте метод &lt;a href=\"api-reference/disk/attached-object/disk-attached-object-get.html\"&gt;disk.attachedObject.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/files/how-to-upload-files.html\"&gt;Как загрузить файлы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;strong&gt;События календаря&lt;/strong&gt;. Автоматически отображаются в Ленте новостей. Вы можете создавать и редактировать события календаря с помощью методов группы &lt;a href=\"api-reference/calendar/events/index.html\"&gt;calendar.events.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Задачи&lt;/strong&gt;. Автоматически отображаются  в Ленте новостей. Чтобы создавать и редактировать задачи, используйте методы группы &lt;a href=\"api-reference/tasks/index.html\"&gt;tasks.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Новые сотрудники&lt;/strong&gt;. Пользователей можно создавать с помощью метода &lt;a href=\"api-reference/user/user-add.html\"&gt;user.add&lt;/a&gt;. Лента новостей автоматически публикует сообщения о принятых на работу сотрудниках, если это разрешено настройками.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18371844/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Настройки Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"zapusk-biznes-processov-iz-lenty\"&gt;&lt;a href=\"api-reference/log/index.html#zapusk-biznes-processov-iz-lenty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Запуск бизнес-процессов из Ленты&lt;/span&gt;&lt;/a&gt;Запуск бизнес-процессов из Ленты&lt;/h2&gt;\n&lt;p&gt;Бизнес-процессы можно запускать непосредственно из Ленты новостей без перехода в другие разделы.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/1312890/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Бизнес-процессы в Ленте новостей&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Используйте метод &lt;a href=\"api-reference/bizproc/template/bizproc-workflow-template-list.html\"&gt;bizproc.workflow.template.list&lt;/a&gt;, чтобы получить список доступных бизнес-процессов и их идентификаторов. Чтобы отфильтровать только бизнес-процессы Ленты новостей, укажите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-77p5m1qc\"&gt;MODULE_ID: \"lists\"&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9umiaoex\"&gt;ENTITY: \"BizprocDocument\"&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;С помощью метода &lt;a href=\"api-reference/bizproc/bizproc-workflow-start.html\"&gt;bizproc.workflow.start&lt;/a&gt; запустите бизнес-процесс, указав его ID. Чтобы связать бизнес-процесс с Лентой новостей, привяжите его к элементу списка. Для работы с элементами списка используйте группу методов &lt;a href=\"api-reference/lists/elements/index.html\"&gt;lists.element.*&lt;/a&gt;. Чтобы создать или получить элемент списка, связанного с бизнес-процессом Ленты, укажите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sx8cjjcf\"&gt;IBLOCK_TYPE_ID: bitrix_processes&lt;/code&gt;. Если бизнес-процесс запущен для элемента списка, Лента новостей автоматически создаст сообщение.&lt;/p&gt;\n&lt;h2 id=\"upravlenie-soobsheniyami-v-lente\"&gt;&lt;a href=\"api-reference/log/index.html#upravlenie-soobsheniyami-v-lente\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Управление сообщениями в Ленте&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;Управление сообщениями в Ленте&lt;/strong&gt;&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Как добавить, изменить или удалить сообщение&lt;/strong&gt;. С помощью методов  вы можете добавлять, изменять и удалять сообщения Ленты новостей. Используйте метод &lt;a href=\"api-reference/log/log-blogpost-add.html\"&gt;log.blogpost.add&lt;/a&gt;, чтобы добавить сообщение в Ленту новостей от имени текущего пользователя. Изменить сообщение вы можете с помощью метода &lt;a href=\"api-reference/log/log-blogpost-update.html\"&gt;log.blogpost.update&lt;/a&gt;. Для удаления сообщения применяйте метод &lt;a href=\"api-reference/log/log-blogpost-delete.html\"&gt;log.blogpost.delete&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Как управлять комментариями&lt;/strong&gt;. Используйте метод &lt;a href=\"api-reference/log/blogcomment/log-blogcomment-add.html\"&gt;log.blogcomment.add&lt;/a&gt;, чтобы добавлять комментарии к сообщениям и метод &lt;a href=\"api-reference/log/blogcomment/log-blogcomment-delete.html\"&gt;log.blogcomment.delete&lt;/a&gt;, чтобы удалять комментарии. Метод &lt;a href=\"api-reference/log/blogcomment/log-blogcomment-user-get.html\"&gt;log.blogcomment.user.get&lt;/a&gt; возвращает комментарии к сообщениям и может фильтровать их по диапазону ID (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-do464fcr\"&gt;FIRST_ID&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ne1znxaf\"&gt;LAST_ID&lt;/code&gt;). Если не передать параметры фильтрации, метод вернет все доступные текущему пользователю комментарии с учетом его прав доступа.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Как узнать, кто из пользователей прочитал важное сообщение&lt;/strong&gt;. Опубликованное в Ленте новостей сообщение можно пометить как важное. Чтобы просмотреть список пользователей, которые прочитали важное сообщение, используйте метод &lt;a href=\"api-reference/log/log-blogpost-getusers-important.html\"&gt;log.blogpost.getusers.important&lt;/a&gt;. Комбинацию «важное сообщение и отслеживание списка прочитавших» можно использовать для автоматизированных сценариев массового информирования сотрудников.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Как получить список сообщений&lt;/strong&gt;. Получить доступные пользователю сообщения Ленты новостей позволяет метод &lt;a href=\"api-reference/log/log-blogpost-get.html\"&gt;log.blogpost.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Какие события доступны&lt;/strong&gt;. События &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5aueqnh1\"&gt;OnLiveFeedPostAdd&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qpwdoml8\"&gt;OnLiveFeedPostUpdate&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m3oeo4nj\"&gt;OnLiveFeedPostDelete&lt;/code&gt; позволяют отслеживать появление, изменение и удаление сообщений.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/log/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2s4adv7b\"&gt;log&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-co2uget6\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"kibnyktn\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/log-blogpost-add.html\"&gt;log.blogpost.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет сообщение в Ленту новостей от имени текущего пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/log-blogpost-update.html\"&gt;log.blogpost.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет сообщение Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/log-blogpost-get.html\"&gt;log.blogpost.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные пользователю сообщения Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/log-blogpost-getusers-important.html\"&gt;log.blogpost.getusers.important&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Просматривает пользователей, прочитавших важное сообщение&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/log-blogpost-share.html\"&gt;log.blogpost.share&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет получателей в сообщение Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/log-blogpost-delete.html\"&gt;log.blogpost.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет сообщение Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/blogcomment/log-blogcomment-add.html\"&gt;log.blogcomment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет комментарий к сообщению Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/blogcomment/log-blogcomment-user-get.html\"&gt;log.blogcomment.user.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список комментариев к сообщению Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/blogcomment/log-blogcomment-delete.html\"&gt;log.blogcomment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет комментарий к сообщению&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"l9p5ikz2\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/events/on-live-feed-post-add.html\"&gt;OnLiveFeedPostAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;На добавление сообщения в Ленту новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/events/on-live-feed-post-delete.html\"&gt;OnLiveFeedPostDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;На удаление сообщения из Ленты новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/log/events/on-live-feed-post-update.html\"&gt;OnLiveFeedPostUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;На редактирование сообщения в Ленте новостей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css","_assets/tabs-extension.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01","_assets/tabs-extension.js"]},"headings":[{"title":"Связь Ленты с другими объектами","href":"api-reference/log/index.html#svyaz-lenty-s-drugimi-obuektami","level":2},{"title":"Запуск бизнес-процессов из Ленты","href":"api-reference/log/index.html#zapusk-biznes-processov-iz-lenty","level":2},{"title":"Управление сообщениями в Ленте","href":"api-reference/log/index.html#upravlenie-soobsheniyami-v-lente","level":2},{"title":"Обзор методов и событий","href":"api-reference/log/index.html#all-methods","level":2}],"title":"Лента новостей: обзор методов"},"router":{"pathname":"api-reference/log/index","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
