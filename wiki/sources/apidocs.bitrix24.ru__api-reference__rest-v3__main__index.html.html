        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Журнал событий фиксирует действия пользователя в Битрикс24: входы, запросы на смену пароля и ряд системных операций. Доступные события зависят от тарифа Битрикс24.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/rest-v3/main/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/19070944/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Что такое Журнал событий в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Методы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i5sx5qfu\"&gt;main.eventlog.*&lt;/code&gt; позволяют:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;выгрузить события по фильтру,&lt;/li&gt;\n&lt;li&gt;получить конкретную запись,&lt;/li&gt;\n&lt;li&gt;настроить регулярное получение новых данных.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"kogda-ispolzovat-kazhdyj-metod\"&gt;&lt;a href=\"api-reference/rest-v3/main/index.html#kogda-ispolzovat-kazhdyj-metod\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Когда использовать каждый метод&lt;/span&gt;&lt;/a&gt;Когда использовать каждый метод&lt;/h2&gt;\n&lt;p&gt;Используйте &lt;a href=\"api-reference/rest-v3/main/main-eventlog-get.html\"&gt;main.eventlog.get&lt;/a&gt;, когда нужно получить детали конкретного события по ID.&lt;/p&gt;\n&lt;p&gt;Методы &lt;a href=\"api-reference/rest-v3/main/main-eventlog-list.html\"&gt;main.eventlog.list&lt;/a&gt; и &lt;a href=\"api-reference/rest-v3/main/main-eventlog-tail.html\"&gt;main.eventlog.tail&lt;/a&gt; похожи, но решают разные задачи.&lt;/p&gt;\n&lt;p&gt;Используйте &lt;a href=\"api-reference/rest-v3/main/main-eventlog-list.html\"&gt;main.eventlog.list&lt;/a&gt;, когда нужно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;сформировать отчет за период,&lt;/li&gt;\n&lt;li&gt;найти события по сложным критериям,&lt;/li&gt;\n&lt;li&gt;реализовать поиск и навигацию по истории.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Используйте &lt;a href=\"api-reference/rest-v3/main/main-eventlog-tail.html\"&gt;main.eventlog.tail&lt;/a&gt;, когда нужно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;настроить мониторинг в реальном времени,&lt;/li&gt;\n&lt;li&gt;синхронизировать внешнюю систему с журналом,&lt;/li&gt;\n&lt;li&gt;отслеживать новые события после определенной границы.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/rest-v3/main/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3gwlhlxr\"&gt;main&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/main/main-eventlog-list.html\"&gt;main.eventlog.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список записей журнала по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/main/main-eventlog-get.html\"&gt;main.eventlog.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает запись журнала по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/main/main-eventlog-tail.html\"&gt;main.eventlog.tail&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает новые записи журнала после точки отсчета&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"prodolzhit-izuchenie\"&gt;&lt;a href=\"api-reference/rest-v3/main/index.html#prodolzhit-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжить изучение&lt;/span&gt;&lt;/a&gt;Продолжить изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/rest-v3/main/main-eventlog-list.html\"&gt;Получить список записей журнала main.eventlog.list&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/rest-v3/main/main-eventlog-get.html\"&gt;Получить запись журнала main.eventlog.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/rest-v3/main/main-eventlog-tail.html\"&gt;Получить новые записи журнала main.eventlog.tail&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/rest-v3/index.html\"&gt;Обзор REST API 3.0&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Когда использовать каждый метод","href":"api-reference/rest-v3/main/index.html#kogda-ispolzovat-kazhdyj-metod","level":2},{"title":"Обзор методов","href":"api-reference/rest-v3/main/index.html#all-methods","level":2},{"title":"Продолжить изучение","href":"api-reference/rest-v3/main/index.html#prodolzhit-izuchenie","level":2}],"title":"Журнал событий: обзор методов"},"router":{"pathname":"api-reference/rest-v3/main/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
