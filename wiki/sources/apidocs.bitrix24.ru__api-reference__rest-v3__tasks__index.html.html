            {"data":{"leading":false,"html":"&lt;p&gt;Задачи в Битрикс24 — это инструмент для организации работы: от простых поручений до сложных проектов. С их помощью команда может отслеживать исполнение, контролировать сроки и распределять обязанности.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/rest-v3/tasks/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17962166/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;задачи Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;В &lt;a href=\"api-reference/rest-v3/index.html\"&gt;REST 3.0&lt;/a&gt; методы задач получили обновленную архитектуру, унифицированный формат ответов и поддержку связей между объектами. Сейчас REST 3.0 охватывает только базовые операции: создание, удаление, изменение и получение задач. Все, что связано с чек-листами, временем, результатами и историей, доступно в REST v2.&lt;/p&gt;\n&lt;h2 id=\"kartochka-zadachi\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#kartochka-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка задачи&lt;/span&gt;&lt;/a&gt;Карточка задачи&lt;/h2&gt;\n&lt;p&gt;Карточка задачи включает данные о задаче и чат для обсуждения. Саму задачу можно разделить на логические блоки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;описание задачи,&lt;/li&gt;\n&lt;li&gt;системные поля: исполнитель, постановщик, крайний срок, статус,&lt;/li&gt;\n&lt;li&gt;связи: подзадачи, зависимости от других задач, привязка к CRM-объектам, файлы,&lt;/li&gt;\n&lt;li&gt;дополнительные данные: чек-листы, результаты, учет времени.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\"api-reference/rest-v3/tasks/_images/task.png\" alt=\"Карточка задачи\" /&gt;&lt;/p&gt;\n&lt;p&gt;С версии модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tsta7fbn\"&gt;tasks 25.700.0&lt;/code&gt; комментарии переведены в чат задачи. Подробнее об изменениях в работе в статье &lt;a href=\"api-reference/tasks/tasks-new.html\"&gt;Новая карточка задач: обзор изменений&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17958164/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать задачу&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17657420/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Чек-листы в задачах&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17980006/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Учет времени в задачах&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyazi-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#svyazi-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связи с другими объектами&lt;/span&gt;&lt;/a&gt;Связи с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Родительская задача.&lt;/strong&gt; У задачи могут быть подзадачи. В этом случае она считается родительской. Добавить привязку к родительской задаче можно в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rdawm2hh\"&gt;parentId&lt;/code&gt;. Чтобы получить подробности о родительской задаче, используйте параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ol88ihsu\"&gt;\"select\": [\"parent.title\", \"parent.description\"]&lt;/code&gt; в методе &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователи.&lt;/strong&gt; Задача имеет привязку к пользователям по числовым идентификаторам в полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m4ft5zd4\"&gt;creatorId&lt;/code&gt; — постановщик задачи. Укажите его при &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-add.html\"&gt;создании&lt;/a&gt; задачи. Чтобы получить информацию о постановщике, запросите поля объекта через&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q1uo6ykp\"&gt;\"select\": [\"creator.name\", \"creator.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qzjj1wt0\"&gt;responsibleId&lt;/code&gt; — исполнитель задачи. Обязательное поле при &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-add.html\"&gt;создании&lt;/a&gt;. Получить данные об исполнителе можно через: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kj4qxcda\"&gt;\"select\": [\"responsible.name\", \"responsible.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v8bfu5u9\"&gt;accomplices&lt;/code&gt; — соисполнители. Передаются массивом идентификаторов при &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-add.html\"&gt;создании&lt;/a&gt; или &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-update.html\"&gt;изменении&lt;/a&gt; задачи. Получить информацию о них: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vxamakvh\"&gt;\"select\": [\"accomplices.name\", \"accomplices.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ly9oon4p\"&gt;auditors&lt;/code&gt; — наблюдатели. Передаются массивом идентификаторов при &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-add.html\"&gt;создании&lt;/a&gt; или &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-update.html\"&gt;изменении&lt;/a&gt; задачи. Запросите данные через: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p3o8hh4p\"&gt;\"select\": [\"auditors.name\", \"auditors.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wj4pfksp\"&gt;changedById&lt;/code&gt; — идентификатор пользователя, который последним изменил задачу. Получить данные: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qb1vx48q\"&gt;\"select\": [\"changedBy.name\", \"changedBy.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-os7wrmvx\"&gt;statusChangedById&lt;/code&gt; — пользователь, изменивший статус задачи. Получить данные: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ktwa2i2t\"&gt;\"select\": [\"statusChangedBy.name\", \"statusChangedBy.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bb0kfr02\"&gt;closedById&lt;/code&gt; — пользователь, закрывший задачу. Получить данные: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iqo5fphy\"&gt;\"select\": [\"closedBy.name\", \"closedBy.email\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Группа или Проект.&lt;/strong&gt; Задача может находиться в группе или проекте. Привяжите задачу к группе с помощью параметра &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gcuto9hw\"&gt;groupId&lt;/code&gt;. Чтобы получить информацию о группе, к которой задача привязана, запросите: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bm5s5xvg\"&gt;\"select\": [\"group.name\", \"group.image\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Письмо.&lt;/strong&gt; Задачу можно создать из почты, тогда у нее будет связь с письмом. Идентификатор письма хранится в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xflxb3ri\"&gt;emailId&lt;/code&gt;. Чтобы получить информацию о письме, используйте: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y1j0ne4s\"&gt;\"select\": [\"email.title\", \"email.from\", \"email.body\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чат задачи.&lt;/strong&gt; Обсуждение задачи ведется в чате. Идентификатор чата задачи возвращается в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3xsqvgew\"&gt;chatId&lt;/code&gt;. Чтобы получить данные о чате, запросите: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rysda64t\"&gt;\"select\": [\"chat.id\", \"chat.entityId\", \"chat.entityType\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Поток.&lt;/strong&gt; Задача может быть создана в рамках Потока — механизма автоматического распределения задач. Привяжите задачу к потоку через параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gv7hpidl\"&gt;flowId&lt;/code&gt;. Чтобы получить данные о потоке, используйте: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b6u2muu8\"&gt;\"select\": [\"flow.name\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Учет времени.&lt;/strong&gt; Если в задаче ведется учет времени, данные о затраченных минутах и секундах доступны через &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-be0c7ckf\"&gt;\"select\": [\"elapsedTime.minutes\", \"elapsedTime.seconds\", \"elapsedTime.text\"]&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Перечисленные поля возвращаются как объекты в методе &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;, если указать их в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p99q8oo8\"&gt;select&lt;/code&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;&lt;strong&gt;CRM-объекты.&lt;/strong&gt; К задаче можно привязать объекты CRM: лиды, контакты, компании, сделки, счета и смарт-процессы. Идентификаторы таких объектов передаются в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ymg3dta8\"&gt;crmItemIds&lt;/code&gt; в формате с префиксом, например &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3jb0cx23\"&gt;C_3&lt;/code&gt; для контакта. Данные об связанных объектах CRM недоступны напрямую — их следует запрашивать отдельно через &lt;a href=\"api-reference/crm/index.html\"&gt;методы CRM&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файлы Диска.&lt;/strong&gt; В задачу можно загрузить файлы с Диска.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Если файл еще не загружен на Битрикс.Диск, используйте метод &lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt; или &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt; для загрузки файла.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Если вы хотите прикрепить уже существующий на диске файл, используйте методы &lt;a href=\"api-reference/disk/storage/disk-storage-get-children.html\"&gt;disk.storage.getchildren&lt;/a&gt; или &lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren&lt;/a&gt;, чтобы узнать идентификатор файла.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Полученный в ответ идентификатор файла передайте в метод &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-file-attach.html\"&gt;tasks.task.file.attach&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Описание всех полей задачи и полей связанных объектов доступно в статье &lt;a href=\"api-reference/rest-v3/tasks/fields.html\"&gt;Поля задачи в REST 3.0&lt;/a&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-rabotat-s-chatom-zadachi\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#kak-rabotat-s-chatom-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работать с чатом задачи&lt;/span&gt;&lt;/a&gt;Как работать с чатом задачи&lt;/h2&gt;\n&lt;p&gt;Начиная с версии модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0xhlqfmg\"&gt;tasks 25.700.0&lt;/code&gt;, комментарии в задачах заменены на чат. Метод задач &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-chat-message-send.html\"&gt;tasks.task.chat.message.send&lt;/a&gt; создает и отправляет сообщение в чат задачи.&lt;/p&gt;\n&lt;p&gt;Чтобы выполнить другие действия с сообщениями чата, используйте методы мессенджера:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-update.html\"&gt;im.message.update&lt;/a&gt; — изменяет сообщение,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-message-delete.html\"&gt;im.message.delete&lt;/a&gt; — удаляет сообщение. Идентификатор сообщения можно получить в ответе на метод создания сообщения &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-chat-message-send.html\"&gt;tasks.task.chat.message.send&lt;/a&gt; или из истории чата.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/chats/messages/im-dialog-messages-get.html\"&gt;im.dialog.messages.get&lt;/a&gt; — возвращает историю чата по идентификатору. Чтобы получить идентификатор чата задачи, запросите: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7k9eekvu\"&gt;\"select\": [\"chat.id\"]&lt;/code&gt; в методе &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"vstrojki-v-kartochku-zadachi\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#vstrojki-v-kartochku-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Встройки в карточку задачи&lt;/span&gt;&lt;/a&gt;Встройки в карточку задачи&lt;/h2&gt;\n&lt;p&gt;Карточку задачи можно расширять с помощью виджетов — внешних приложений, встроенных в интерфейс. Это позволяет пользователям работать с интеграциями, не покидая карточку задачи.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"gde-mozhno-razmeshat-vstrojki\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#gde-mozhno-razmeshat-vstrojki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Где можно размещать встройки&lt;/span&gt;&lt;/a&gt;Где можно размещать встройки&lt;/h3&gt;\n&lt;p&gt;Начиная с версии модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1wxmt8n2\"&gt;tasks 25.700.0&lt;/code&gt;, все места для встройки в карточку объединены в один блок «Приложения» в нижней части карточки задачи:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9mvjc3l0\"&gt;TASK_VIEW_TAB&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jbfeodgw\"&gt;TASK_VIEW_SIDEBAR&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8q3liozl\"&gt;TASK_VIEW_TOP_PANEL&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Места для встройки на общей странице задач остались прежними:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1rdpsj5h\"&gt;TASK_LIST_CONTEXT_MENU&lt;/code&gt; — &lt;a href=\"api-reference/widgets/task/index.html\"&gt;пункт в контекстном меню списка задач&lt;/a&gt;,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m52ifqdo\"&gt;TASK_USER_LIST_TOOLBAR&lt;/code&gt; — &lt;a href=\"api-reference/widgets/task/list-toolbar.html\"&gt;пункт в выпадающем меню режима «Мой план»&lt;/a&gt;,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7t7jkycb\"&gt;TASK_GROUP_LIST_TOOLBAR&lt;/code&gt; — &lt;a href=\"api-reference/widgets/task/list-toolbar.html\"&gt;пункт в выпадающем меню режима канбан группы&lt;/a&gt;,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fo6nft86\"&gt;TASK_ROBOT_DESIGNER_TOOLBAR&lt;/code&gt; — &lt;a href=\"api-reference/widgets/task/robot-designer-toolbar.html\"&gt;пункт рядом с настройками роботов&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"dopolnitelnye-operacii-nad-zadachej\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#dopolnitelnye-operacii-nad-zadachej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Дополнительные операции над задачей&lt;/span&gt;&lt;/a&gt;Дополнительные операции над задачей&lt;/h2&gt;\n&lt;p&gt;Следующие возможности работают только через REST v2:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Работа с чек-листами &lt;a href=\"api-reference/tasks/checklist-item/index.html\"&gt;task.checklistitem.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Получение результатов задачи &lt;a href=\"api-reference/tasks/result/tasks-task-result-list.html\"&gt;tasks.task.result.list&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Учет затраченного времени &lt;a href=\"../../tasks//elapsed-item/index.md\"&gt;task.elapseditem.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Управление пользовательскими полями &lt;a href=\"api-reference/tasks/user-field/index.html\"&gt;task.item.userfield.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Получение истории изменений &lt;a href=\"api-reference/tasks/tasks-task-history-list.html\"&gt;tasks.task.history.list&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Работа со стадиями канбана групп и «Мой план» &lt;a href=\"api-reference/tasks/stages/index.html\"&gt;task.stages.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Управление Потоками &lt;a href=\"api-reference/tasks/flow/index.html\"&gt;tasks.flow.Flow.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Управление объектами Скрама &lt;a href=\"api-reference/sonet-group/scrum/index.html\"&gt;tasks.api.scrum.*&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rp7d5wry\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-add.html\"&gt;tasks.task.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает новую задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-file-attach.html\"&gt;tasks.task.file.attach&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прикрепляет файлы Диска к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает данные задачи с поддержкой связей через &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y0rg52bp\"&gt;select&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-chat-message-send.html\"&gt;tasks.task.chat.message.send&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет сообщение в чат задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-update.html\"&gt;tasks.task.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-delete.html\"&gt;tasks.task.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/rest-v3/tasks/tasks-task-get.html\"&gt;tasks.task.access.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Проверяет права доступа к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\"prodolzhit-izuchenie\"&gt;&lt;a href=\"api-reference/rest-v3/tasks/index.html#prodolzhit-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжить изучение&lt;/span&gt;&lt;/a&gt;Продолжить изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/rest-v3/tasks/fields.html\"&gt;Поля задачи в REST 3.0&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/rest-v3/index.html\"&gt;Обзор REST API 3.0&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Карточка задачи","href":"api-reference/rest-v3/tasks/index.html#kartochka-zadachi","level":2},{"title":"Связи с другими объектами","href":"api-reference/rest-v3/tasks/index.html#svyazi-s-drugimi-obuektami","level":2},{"title":"Как работать с чатом задачи","href":"api-reference/rest-v3/tasks/index.html#kak-rabotat-s-chatom-zadachi","level":2},{"title":"Встройки в карточку задачи","href":"api-reference/rest-v3/tasks/index.html#vstrojki-v-kartochku-zadachi","level":2,"items":[{"title":"Где можно размещать встройки","href":"api-reference/rest-v3/tasks/index.html#gde-mozhno-razmeshat-vstrojki","level":3}]},{"title":"Дополнительные операции над задачей","href":"api-reference/rest-v3/tasks/index.html#dopolnitelnye-operacii-nad-zadachej","level":2},{"title":"Обзор методов","href":"api-reference/rest-v3/tasks/index.html#all-methods","level":2},{"title":"Продолжить изучение","href":"api-reference/rest-v3/tasks/index.html#prodolzhit-izuchenie","level":2}],"title":"Задачи в REST 3.0: обзор методов"},"router":{"pathname":"api-reference/rest-v3/tasks/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
