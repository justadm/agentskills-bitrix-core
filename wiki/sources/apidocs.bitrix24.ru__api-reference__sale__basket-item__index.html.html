        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Корзина — это временное хранилище, куда покупатели добавляют товары и услуги, которые планируют приобрести. В корзине можно изменять количество товаров, удалять ненужные позиции и просматривать общую стоимость покупки. Когда покупатель завершает покупку, корзина привязывается к заказу.&lt;/p&gt;\n&lt;p&gt;В этом разделе собраны методы для работы с позициями корзины в созданных заказах.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/basket-item/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-korziny-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/basket-item/index.html#svyaz-korziny-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь корзины с другими объектами&lt;/span&gt;&lt;/a&gt;Связь корзины с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Заказ.&lt;/strong&gt; Укажите заказ, к которому привязана корзина. Список заказов можно получить методом &lt;a href=\"api-reference/sale/order/sale-order-list.html\"&gt;sale.order.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Товары.&lt;/strong&gt; Добавьте в корзину товары, указав их идентификаторы. Получить идентификаторы можно с помощью методов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/catalog-product-list.html\"&gt;catalog.product.list&lt;/a&gt; — для простых товаров&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/service/catalog-product-service-list.html\"&gt;catalog.product.service.list&lt;/a&gt; — для услуг&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/sku/catalog-product-sku-list.html\"&gt;catalog.product.sku.list&lt;/a&gt; — для головных товаров у товаров с вариациями&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/catalog/product/offer/catalog-product-offer-list.html\"&gt;catalog.product.offer.list&lt;/a&gt; — для вариаций товаров&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Валюта.&lt;/strong&gt; Выберите валюту, в которой указана цена. Список валют можно получить методом &lt;a href=\"api-reference/crm/currency/crm-currency-list.html\"&gt;crm.currency.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Единица измерения.&lt;/strong&gt; Если вы добавляете в корзину товар, которого еще нет на сайте, укажите код и название единицы измерения. Эти данные можно получить в списке единиц измерения методом &lt;a href=\"api-reference/catalog/measure/catalog-measure-list.html\"&gt;catalog.measure.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Привязка элемента корзины к оплате.&lt;/strong&gt; С помощью методов &lt;a href=\"api-reference/sale/payment-item-basket/index.html\"&gt;sale.paymentitembasket.*&lt;/a&gt; укажите, какие позиции корзины оплачены.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Табличная часть отгрузки.&lt;/strong&gt; С помощью методов &lt;a href=\"api-reference/sale/shipment-item/index.html\"&gt;sale.shipmentitem.*&lt;/a&gt; укажите, какие позиции корзины отправить на отгрузку.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/basket-item/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0afk4wsj\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-add.html\"&gt;sale.basketitem.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет позицию в корзину существующего заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-update.html\"&gt;sale.basketitem.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет позицию корзины существующего заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-get.html\"&gt;sale.basketitem.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о позиции корзины заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-list.html\"&gt;sale.basketItem.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает набор позиций корзины по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-delete.html\"&gt;sale.basketitem.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет позицию корзины из заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-get-fields.html\"&gt;sale.basketitem.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля позиции корзины&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-add-catalog-product.html\"&gt;sale.basketitem.addCatalogProduct&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет элемент с товаром или услугой из модуля catalog в корзину существующего заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-update-catalog-product.html\"&gt;sale.basketitem.updateCatalogProduct&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет товар каталога в существующем заказе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/basket-item/sale-basket-item-get-catalog-product-fields.html\"&gt;sale.basketItem.getCatalogProductFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля товара каталога в корзине&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь корзины с другими объектами","href":"api-reference/sale/basket-item/index.html#svyaz-korziny-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/basket-item/index.html#all-methods","level":2}],"title":"Корзина в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/basket-item/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
