        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Службы доставки автоматизируют расчет стоимости доставки, создание заказов и отслеживание их статусов. Чтобы подключить новую службу доставки, сначала создайте &lt;a href=\"api-reference/sale/delivery/handler/index.html\"&gt;обработчик&lt;/a&gt; службы доставки.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/delivery/delivery/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17225250/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Службы доставки&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/sale/delivery-in-crm.html\"&gt;Настроить доставку для использования в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-sluzhb-dostavki-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/delivery/delivery/index.html#svyaz-sluzhb-dostavki-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь служб доставки с другими объектами&lt;/span&gt;&lt;/a&gt;Связь служб доставки с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Обработчики служб доставки.&lt;/strong&gt; Укажите символьный код обработчика службы доставки. Получить символьные коды обработчиков можно методом &lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-list.html\"&gt;sale.delivery.handler.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Дополнительные услуги.&lt;/strong&gt; Добавьте дополнительные услуги для службы доставки, например, услугу «Доставка до двери». Используйте методы &lt;a href=\"api-reference/sale/delivery/extra-service/index.html\"&gt;sale.delivery.extra.service.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Транспортные заявки.&lt;/strong&gt; Чтобы отслеживать изменения статуса доставки, настройте оповещения от внешней транспортной службы с помощью метода &lt;a href=\"api-reference/sale/delivery/delivery-request/sale-delivery-request-send-message.html\"&gt;sale.delivery.request.sendmessage&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Заказ.&lt;/strong&gt; Создайте или измените заказ методами &lt;a href=\"api-reference/sale/order/index.html\"&gt;sale.order.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Отгрузки.&lt;/strong&gt; Контролируйте отправку товаров клиентам с помощью методов &lt;a href=\"api-reference/sale/shipment/index.html\"&gt;sale.shipment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Свойства отгрузки.&lt;/strong&gt; Если в одном заказе несколько отгрузок, создайте свойства отгрузки с помощью методов &lt;a href=\"api-reference/sale/shipment-property/index.html\"&gt;sale.shipmentproperty.*&lt;/a&gt;. Например, в заказе три книги, которые нужно отправить по разным адресам. Чтобы указать адрес для каждой отправки, создайте свойства отгрузки.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Привязка свойства.&lt;/strong&gt; Задайте условия, при которых покупатель увидит конкретное свойство отгрузки. Чтобы покупатель увидел свойство «Этаж» только при выборе доставки курьером, привяжите свойство к службе доставки с помощью метода &lt;a href=\"api-reference/sale/property-relation/sale-property-relation-add.html\"&gt;sale.propertyRelation.add&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/delivery/delivery/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t9dyeqbr\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-add.html\"&gt;sale.delivery.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет службу доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-update.html\"&gt;sale.delivery.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет службу доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-config-update.html\"&gt;sale.delivery.config.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет настройки службы доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-config-get.html\"&gt;sale.delivery.config.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает настройки службы доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-get-list.html\"&gt;sale.delivery.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список служб доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-delete.html\"&gt;sale.delivery.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет службу доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь служб доставки с другими объектами","href":"api-reference/sale/delivery/delivery/index.html#svyaz-sluzhb-dostavki-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/delivery/delivery/index.html#all-methods","level":2}],"title":"Службы доставки в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/delivery/delivery/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
