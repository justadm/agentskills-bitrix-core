        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Обработчики служб доставки — это шаблоны для подключения служб доставки к Битрикс24, таких как СДЭК или Почта России. Обработчики автоматически рассчитывают стоимость доставки, создают заказы и отслеживают статусы.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/delivery/handler/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/sale/delivery-in-crm.html\"&gt;Настроить доставку для использования в CRM&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h1&gt;URL-адреса в обработчике службы доставки&lt;/h1&gt;\n&lt;p&gt;При создании обработчика службы доставки укажите URL-адреса:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qk8tto3e\"&gt;CALCULATE_URL&lt;/code&gt; — URL для расчета стоимости доставки, обязательный параметр. На этот адрес будут отправляться данные о посылке: товары, адрес назначения и другие параметры. В ответ вы получите информацию о стоимости доставки. Формат запроса и ответа смотрите в статье &lt;a href=\"api-reference/sale/delivery/webhooks/calculate.html\"&gt;Расчет стоимости доставки&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4w6s2wk2\"&gt;CREATE_DELIVERY_REQUEST_URL&lt;/code&gt; — на этот адрес передаются данные о посылке, и служба доставки оформляет заказ. Формат запроса и ответа смотрите в статье &lt;a href=\"api-reference/sale/delivery/webhooks/create-delivery-request.html\"&gt;Создание заказа на доставку&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5cvj2qho\"&gt;CANCEL_DELIVERY_REQUEST_URL&lt;/code&gt; — используйте этот URL, если заказ нужно отменить. На этот адрес передаются данные о посылке, и служба доставки отменяет ранее созданный заказ. Формат запроса и ответа смотрите в статье &lt;a href=\"api-reference/sale/delivery/webhooks/cancel-delivery-request.html\"&gt;Отмена заказа на доставку&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"svyaz-obrabotchikov-sluzhb-dostavki-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/delivery/handler/index.html#svyaz-obrabotchikov-sluzhb-dostavki-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь обработчиков служб доставки с другими объектами&lt;/span&gt;&lt;/a&gt;Связь обработчиков служб доставки с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Службы доставки.&lt;/strong&gt; Создайте службу доставки с помощью методов &lt;a href=\"api-reference/sale/delivery/delivery/index.html\"&gt;sale.delivery.*&lt;/a&gt;, указав символьный код обработчика службы доставки. Получить символьные коды обработчиков можно методом &lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-list.html\"&gt;sale.delivery.handler.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Транспортные заявки.&lt;/strong&gt; Если вы хотите отслеживать изменения статуса доставки, установите для опции&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mm0g6yn4\"&gt;HAS_CALLBACK_TRACKING_SUPPORT&lt;/code&gt; значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-501b3cyv\"&gt;Y&lt;/code&gt;. Настройте оповещения с помощью метода &lt;a href=\"api-reference/sale/delivery/delivery-request/sale-delivery-request-send-message.html\"&gt;sale.delivery.request.sendmessage&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/delivery/handler/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ru6j67bd\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-add.html\"&gt;sale.delivery.handler.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет обработчик службы  доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-update.html\"&gt;sale.delivery.handler.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет обработчик службы доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-list.html\"&gt;sale.delivery.handler.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список обработчиков служб доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-delete.html\"&gt;sale.delivery.handler.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет обработчик службы доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь обработчиков служб доставки с другими объектами","href":"api-reference/sale/delivery/handler/index.html#svyaz-obrabotchikov-sluzhb-dostavki-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/delivery/handler/index.html#all-methods","level":2}],"title":"Обработчики служб доставки в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/delivery/handler/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
