            {"data":{"leading":false,"html":"&lt;p&gt;Запрос отправляется на адрес указанный в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zm1okp1b\"&gt;CANCEL_DELIVERY_REQUEST_URL&lt;/code&gt; при создании обработчика доставки в методе &lt;a href=\"api-reference/sale/delivery/handler/sale-delivery-handler-add.html\"&gt;sale.delivery.handler.add&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"parametry-zaprosa\"&gt;&lt;a href=\"api-reference/sale/delivery/webhooks/cancel-delivery-request.html#parametry-zaprosa\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры запроса&lt;/span&gt;&lt;/a&gt;Параметры запроса&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Название&lt;/strong&gt;&lt;br /&gt;\n&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-odvq6b6r\"&gt;тип&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;DELIVERY_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/sale/data-types.html#sale_delivery_service\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-srpe8qaq\"&gt;sale_delivery_service.ID&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Идентификатор службы доставки.&lt;/p&gt;\n&lt;p&gt;Получить идентификаторы служб доставки можно с помощью метода &lt;a href=\"api-reference/sale/delivery/delivery/sale-delivery-get-list.html\"&gt;sale.delivery.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;REQUEST_ID&lt;/strong&gt;&lt;br /&gt;\n&lt;a href=\"api-reference/data-types.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t9l16y3y\"&gt;string&lt;/code&gt;&lt;/a&gt;&lt;
