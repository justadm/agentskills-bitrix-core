        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Заказ — это запись о покупке. В заказе есть данные о клиенте, список товаров или услуг, их количество, стоимость, а также статус выполнения заказа.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/order/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/8236909\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать заказ внутри CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tovary-i-uslugi-v-zakaze\"&gt;&lt;a href=\"api-reference/sale/order/index.html#tovary-i-uslugi-v-zakaze\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Товары и услуги в заказе&lt;/span&gt;&lt;/a&gt;Товары и услуги в заказе&lt;/h2&gt;\n&lt;p&gt;Когда покупатель оформляет заказ, товары и услуги сначала добавляются в корзину, а затем корзина привязывается к заказу. Сразу добавить товар в заказ, минуя стадию корзины, нельзя.&lt;/p&gt;\n&lt;h2 id=\"svyaz-zakaza-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/order/index.html#svyaz-zakaza-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь заказа с другими объектами&lt;/span&gt;&lt;/a&gt;Связь заказа с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Типы плательщиков.&lt;/strong&gt; Определите, к какому виду клиентов относится покупатель: физическое или юридическое лицо. Для этого используйте методы &lt;a href=\"api-reference/sale/person-type/index.html\"&gt;sale.persontype.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Валюта.&lt;/strong&gt; Выберите валюту, в которой будет оплачен заказ. Список валют можно получить методом &lt;a href=\"api-reference/crm/currency/crm-currency-list.html\"&gt;crm.currency.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Свойства заказа.&lt;/strong&gt; Создайте поля, которые должен будет заполнить покупатель при оформлении заказа, например «Станция метро» или «Дата и время доставки». Для создания свойств заказа используйте методы &lt;a href=\"api-reference/sale/property/index.html\"&gt;sale.property.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Статус.&lt;/strong&gt; Отслеживайте прогресс выполнения заказа с помощью статусов. Создать и изменить статус можно с помощью группы методов &lt;a href=\"api-reference/sale/status/index.html\"&gt;sale.status.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Корзина.&lt;/strong&gt; Добавьте или измените товары в корзине существующего заказа методами &lt;a href=\"api-reference/sale/basket-item/index.html\"&gt;sale.basketitem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Оплаты.&lt;/strong&gt; Создавайте и изменяйте оплаты заказов с помощью методов &lt;a href=\"api-reference/sale/payment/index.html\"&gt;sale.payment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Отгрузки.&lt;/strong&gt; Контролируйте отправку товаров клиентам с помощью методов &lt;a href=\"api-reference/sale/shipment/index.html\"&gt;sale.shipment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/order/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gs9fq9rv\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/order/sale-order-add.html\"&gt;sale.order.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет заказ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/order/sale-order-update.html\"&gt;sale.order.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет заказ&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/order/sale-order-get.html\"&gt;sale.order.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля заказа и поля связанных объектов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/order/sale-order-list.html\"&gt;sale.order.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список заказов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/order/sale-order-delete.html\"&gt;sale.order.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет заказ и связанные объекты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/order/sale-order-get-fields.html\"&gt;sale.order.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Товары и услуги в заказе","href":"api-reference/sale/order/index.html#tovary-i-uslugi-v-zakaze","level":2},{"title":"Связь заказа с другими объектами","href":"api-reference/sale/order/index.html#svyaz-zakaza-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/order/index.html#all-methods","level":2}],"title":"Заказ в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/order/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
