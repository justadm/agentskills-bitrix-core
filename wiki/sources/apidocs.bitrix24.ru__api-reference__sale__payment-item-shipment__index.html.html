            {"data":{"leading":false,"html":"&lt;p&gt;Заказ может включать несколько товаров, которые необходимо отгрузить частями, то есть в виде нескольких независимых отгрузок. Чтобы распределить оплаты между отгрузками, используйте привязку оплат к отгрузкам.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/payment-item-shipment/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-privyazki-oplat-k-otgruzkam-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/index.html#svyaz-privyazki-oplat-k-otgruzkam-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь привязки оплат к отгрузкам с другими объектами&lt;/span&gt;&lt;/a&gt;Связь привязки оплат к отгрузкам с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Отгрузки.&lt;/strong&gt; Укажите идентификатор оплаченной отгрузки. Получить список идентификаторов отгрузки можно методом &lt;a href=\"api-reference/sale/shipment/sale-shipment-list.html\"&gt;sale.shipment.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Оплаты.&lt;/strong&gt; Укажите идентификатор оплаты, которую нужно привязать к отгрузке. Получить список идентификаторов оплат можно методом &lt;a href=\"api-reference/sale/payment/sale-payment-list.html\"&gt;sale.payment.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f4o60ugp\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/sale-payment-item-shipment-add.html\"&gt;sale.paymentItemShipment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет привязку оплаты к отгрузке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/sale-payment-item-shipment-update.html\"&gt;sale.paymentItemShipment.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет привязку оплаты к отгрузке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/sale-payment-item-shipment-get.html\"&gt;sale.paymentItemShipment.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей привязки оплаты к отгрузке по ее идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/sale-payment-item-shipment-list.html\"&gt;sale.paymentItemShipment.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список привязок оплат к отгрузкам по фильтру&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/sale-payment-item-shipment-delete.html\"&gt;sale.paymentItemShipment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет привязку оплаты к отгрузке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment-item-shipment/sale-payment-item-shipment-get-fields.html\"&gt;sale.paymentItemShipment.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля привязки оплаты к отгрузке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь привязки оплат к отгрузкам с другими объектами","href":"api-reference/sale/payment-item-shipment/index.html#svyaz-privyazki-oplat-k-otgruzkam-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/payment-item-shipment/index.html#all-methods","level":2}],"title":"Привязка оплат к отгрузкам в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/payment-item-shipment/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
