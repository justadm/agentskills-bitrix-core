            {"data":{"leading":false,"html":"&lt;p&gt;Оплаты содержат информацию о платежах по заказам: платежную систему, статус и дату оплаты, идентификатор плательщика.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/payment/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/18291172\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как отследить статус оплаты, доставки и СМС&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-oplat-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/payment/index.html#svyaz-oplat-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь оплат с другими объектами&lt;/span&gt;&lt;/a&gt;Связь оплат с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Заказ.&lt;/strong&gt; Укажите заказ, для которого создаете оплату. Получить список заказов можно с помощью метода &lt;a href=\"api-reference/sale/order/sale-order-list.html\"&gt;sale.order.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Платежные системы.&lt;/strong&gt; Укажите платежную систему. Получить список платежных систем можно с помощью метода &lt;a href=\"api-reference/pay-system/sale-pay-system-list.html\"&gt;sale.paysystem.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Привязка элемента корзины к оплате.&lt;/strong&gt; Выберите элементы корзины, для которых хотите создать оплату. Используйте методы &lt;a href=\"api-reference/sale/payment-item-basket/index.html\"&gt;sale.paymentitembasket.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Привязка оплат к отгрузкам.&lt;/strong&gt; Укажите, какие отгрузки оплачены. Используйте методы &lt;a href=\"api-reference/sale/payment-item-shipment/index.html\"&gt;sale.paymentItemShipment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/payment/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7p2qjscf\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment/sale-payment-add.html\"&gt;sale.payment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет оплату&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment/sale-payment-update.html\"&gt;sale.payment.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет оплату&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment/sale-payment-get.html\"&gt;sale.payment.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает информацию об оплате&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment/sale-payment-list.html\"&gt;sale.payment.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список оплат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment/sale-payment-delete.html\"&gt;sale.payment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет оплату&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/payment/sale-payment-get-fields.html\"&gt;sale.payment.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля оплаты&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь оплат с другими объектами","href":"api-reference/sale/payment/index.html#svyaz-oplat-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/payment/index.html#all-methods","level":2}],"title":"Оплаты в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/payment/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
