            {"data":{"leading":false,"html":"&lt;p&gt;&lt;a href=\"api-reference/sale/property/index.html\"&gt;Свойства заказа&lt;/a&gt; могут быть разных типов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wazyavm3\"&gt;STRING&lt;/code&gt; — строка,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-staxgb95\"&gt;Y/N&lt;/code&gt; — да/нет,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a822vklz\"&gt;NUMBER&lt;/code&gt; — число,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x2ouybdh\"&gt;ENUM&lt;/code&gt; — перечисление,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lojcs1pg\"&gt;FILE&lt;/code&gt; — файл,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lk1cjcl8\"&gt;DATE&lt;/code&gt; — дата,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lpaa5al3\"&gt;LOCATION&lt;/code&gt; — местоположение,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-91ymx5dp\"&gt;ADDRESS&lt;/code&gt; — адрес.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для свойства заказа типа «список» &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y84bnnrf\"&gt;ENUM&lt;/code&gt; необходимо указать доступные варианты. Например, создайте свойство заказа «Время доставки» и добавьте варианты «08:00-12:00», «12:00-16:00» и «16:00-20:00».&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/property-variant/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-variantov-svojstva-zakaza-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/property-variant/index.html#svyaz-variantov-svojstva-zakaza-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь вариантов свойства заказа с другими объектами&lt;/span&gt;&lt;/a&gt;Связь вариантов свойства заказа с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Свойства заказа.&lt;/strong&gt; Укажите идентификатор свойства заказа. Получить список идентификаторов можно с помощью метода &lt;a href=\"api-reference/sale/property/sale-property-list.html\"&gt;sale.property.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/property-variant/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-21h9jzma\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property-variant/sale-property-variant-add.html\"&gt;sale.propertyvariant.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет вариант свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property-variant/sale-property-variant-update.html\"&gt;sale.propertyvariant.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля варианта свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property-variant/sale-property-variant-get.html\"&gt;sale.propertyvariant.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает вариант свойства по id&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property-variant/sale-property-variant-list.html\"&gt;sale.propertyvariant.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список вариантов свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property-variant/sale-property-variant-delete.html\"&gt;sale.propertyvariant.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет вариант свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property-variant/sale-property-variant-get-fields.html\"&gt;sale.propertyvariant.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля варианта свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь вариантов свойства заказа с другими объектами","href":"api-reference/sale/property-variant/index.html#svyaz-variantov-svojstva-zakaza-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/property-variant/index.html#all-methods","level":2}],"title":"Варианты свойства заказа типа ENUM в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/property-variant/index","depth
