        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Свойства заказа — это поля, которые покупатель заполняет при оформлении заказа: имя, номер телефона, адрес доставки. У каждого типа плательщика будут свои свойства заказа.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/property/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/8236909\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать заказ внутри CRM&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"osobye-svojstva-zakaza\"&gt;&lt;a href=\"api-reference/sale/property/index.html#osobye-svojstva-zakaza\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особые свойства заказа&lt;/span&gt;&lt;/a&gt;Особые свойства заказа&lt;/h2&gt;\n&lt;h3 id=\"location\"&gt;&lt;a href=\"api-reference/sale/property/index.html#location\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;LOCATION&lt;/span&gt;&lt;/a&gt;LOCATION&lt;/h3&gt;\n&lt;p&gt;Обязательно создайте для каждого типа плательщика свойства типа LOCATION. Разрешите использовать значения свойств в качестве местоположения покупателя для параметров:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ul78wp02\"&gt;isLocation&lt;/code&gt; — чтобы рассчитывать стоимость доставки,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x5sq3o31\"&gt;isLocation4tax&lt;/code&gt; — чтобы определять налоговые ставки.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"string\"&gt;&lt;a href=\"api-reference/sale/property/index.html#string\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;STRING&lt;/span&gt;&lt;/a&gt;STRING&lt;/h3&gt;\n&lt;p&gt;Чтобы передавать данные покупателя в платежные системы и кассы, создайте свойства типа STRING и отметьте одну из опций:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nsc18zgq\"&gt;isEmail&lt;/code&gt; — использовать в качестве e-mail,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hgrpjfdh\"&gt;isPhone&lt;/code&gt; — использовать в качестве номера телефона.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"svyaz-svojstv-zakaza-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/property/index.html#svyaz-svojstv-zakaza-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь свойств заказа с другими объектами&lt;/span&gt;&lt;/a&gt;Связь свойств заказа с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Типы плательщиков.&lt;/strong&gt; Определите, к какому виду клиентов относится покупатель: физическое или юридическое лицо. Для этого используйте методы &lt;a href=\"api-reference/sale/person-type/index.html\"&gt;sale.persontype.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Группы свойств.&lt;/strong&gt; Привяжите свойство заказа к подходящей группе: личные данные или данные для доставки. Вы можете создать или изменить группы свойств с помощью методов &lt;a href=\"api-reference/sale/property-group/index.html\"&gt;sale.propertygroup.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Варианты свойств.&lt;/strong&gt; Если вы создаете свойство заказа типа ENUM, укажите доступные варианты с помощью методов &lt;a href=\"api-reference/sale/property-variant/index.html\"&gt;sale.propertyvariant.*&lt;/a&gt;. Например, для свойства «Время доставки» укажите варианты «08:00-12:00», «12:00-16:00» и «16:00-20:00».&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Привязка свойства.&lt;/strong&gt; Задайте условия, при которых покупатель увидит конкретное свойство. Для этого привяжите свойство заказа к платежной системе, службе доставки, лендингу или торговой платформе методами &lt;a href=\"api-reference/sale/property-relation/index.html\"&gt;sale.propertyRelation.*&lt;/a&gt;. Пример: если покупатель выбрал «Доставку курьером», то должен указать свойство заказа «Станция метро».&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Значения свойства.&lt;/strong&gt; Просмотрите или измените значения свойства конкретного заказа с помощью методов &lt;a href=\"api-reference/sale/property-value/index.html\"&gt;sale.propertyvalue.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/property/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mniw5zok\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property/sale-property-add.html\"&gt;sale.property.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет свойство заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property/sale-property-update.html\"&gt;sale.property.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля свойства заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property/sale-property-get.html\"&gt;sale.property.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значение свойства заказа по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property/sale-property-list.html\"&gt;sale.property.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список свойств заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property/sale-property-delete.html\"&gt;sale.property.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет свойство заказа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/property/sale-property-get-fields-by-type.html\"&gt;sale.property.getFieldsByType&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля и настройки свойства заказа для определенного типа свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Особые свойства заказа","href":"api-reference/sale/property/index.html#osobye-svojstva-zakaza","level":2,"items":[{"title":"LOCATION","href":"api-reference/sale/property/index.html#location","level":3},{"title":"STRING","href":"api-reference/sale/property/index.html#string","level":3}]},{"title":"Связь свойств заказа с другими объектами","href":"api-reference/sale/property/index.html#svyaz-svojstv-zakaza-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/property/index.html#all-methods","level":2}],"title":"Свойства заказа в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/property/i
