            {"data":{"leading":false,"html":"&lt;p&gt;Свойства отгрузки — это дополнительные параметры, которые можно задать для отгрузки товаров: адрес и способ доставки, дата отгрузки. Например, в заказе три книги, которые нужно отправить по разным адресам. Чтобы указать адрес для каждой отправки, создайте свойства отгрузки.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/shipment-property/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-svojstv-otgruzki-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/shipment-property/index.html#svyaz-svojstv-otgruzki-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь свойств отгрузки с другими объектами&lt;/span&gt;&lt;/a&gt;Связь свойств отгрузки с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Типы плательщиков.&lt;/strong&gt; Определите, к какому виду клиентов относится покупатель: физическое или юридическое лицо. Для этого используйте методы &lt;a href=\"api-reference/sale/person-type/index.html\"&gt;sale.persontype.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Группы свойств.&lt;/strong&gt; Привяжите свойство отгрузки к подходящей группе: личные данные, данные для доставки, данные компании, контактная информация. Вы можете создать или изменить группы свойств с помощью методов &lt;a href=\"api-reference/sale/property-group/index.html\"&gt;sale.propertygroup.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Значения свойств отгрузки.&lt;/strong&gt; Измените значения свойства конкретной отгрузки с помощью методов &lt;a href=\"api-reference/sale/shipment-property-value/index.html\"&gt;sale.shipmentpropertyvalue.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/shipment-property/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ah5ti0t9\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment-property/sale-shipment-property-add.html\"&gt;sale.shipmentproperty.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет свойство отгрузки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment-property/sale-shipment-property-update.html\"&gt;sale.shipmentproperty.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет поля свойства отгрузки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment-property/sale-shipment-property-get.html\"&gt;sale.shipmentproperty.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения полей свойства отгрузки по идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment-property/sale-shipment-property-list.html\"&gt;sale.shipmentproperty.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список свойств отгрузки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment-property/sale-shipment-property-delete.html\"&gt;sale.shipmentproperty.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет свойство отгрузки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment-property/sale-shipment-property-get-fields-by-type.html\"&gt;sale.shipmentproperty.getFieldsByType&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля и настройки свойства отгрузки для определенного типа свойства&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь свойств отгрузки с другими объектами","href":"api-reference/sale/shipment-property/index.html#svyaz-svojstv-otgruzki-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/shipment-property/index.html#all-methods","level":2}],"title":"Свойства отгрузки в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/shipment-property/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
