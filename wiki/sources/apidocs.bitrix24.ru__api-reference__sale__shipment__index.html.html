            {"data":{"leading":false,"html":"&lt;p&gt;Отгрузки позволяют видеть, какие товары отправлены, в каком количестве и когда. Это помогает управлять статусами доставки. Заказ может быть отгружен частями, то есть в виде нескольких независимых отгрузок. У каждой отгрузки своя служба доставки, статус и состав.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/shipment/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-otgruzok-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/shipment/index.html#svyaz-otgruzok-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь отгрузок с другими объектами&lt;/span&gt;&lt;/a&gt;Связь отгрузок с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Заказ.&lt;/strong&gt; Создайте или измените заказ с помощью методов &lt;a href=\"api-reference/sale/order/index.html\"&gt;sale.order.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Службы доставки.&lt;/strong&gt; Создайте или измените службу доставки с помощью методов &lt;a href=\"api-reference/sale/delivery/delivery/index.html\"&gt;sale.delivery.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Статусы.&lt;/strong&gt; Укажите идентификатор статуса доставки. Используйте один из &lt;a href=\"api-reference/sale/status/index.html\"&gt;статусов по умолчанию&lt;/a&gt; или создайте новый статус методом &lt;a href=\"api-reference/sale/status/sale-status-add.html\"&gt;sale.status.add&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Табличная часть отгрузки.&lt;/strong&gt; Добавьте или измените товары в отгрузке методами &lt;a href=\"api-reference/sale/shipment-item/index.html\"&gt;sale.shipmentitem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Свойства отгрузки.&lt;/strong&gt; Если в заказе несколько отгрузок, создайте свойства отгрузки с помощью методов &lt;a href=\"api-reference/sale/shipment-property/index.html\"&gt;sale.shipmentproperty.*&lt;/a&gt;. Например, в заказе три книги, которые нужно отправить по разным адресам. Чтобы указать адрес для каждой отправки, создайте свойства отгрузки.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Привязка оплат к отгрузкам.&lt;/strong&gt; Укажите, какие отгрузки оплачены. Используйте методы &lt;a href=\"api-reference/sale/payment-item-shipment/index.html\"&gt;sale.paymentItemShipment.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/shipment/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9lj20ry8\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять методы: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment/sale-shipment-add.html\"&gt;sale.shipment.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет отгрузку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment/sale-shipment-update.html\"&gt;sale.shipment.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет отгрузку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment/sale-shipment-get.html\"&gt;sale.shipment.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает значения всех полей отгрузки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment/sale-shipment-list.html\"&gt;sale.shipment.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список отгрузок&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment/sale-shipment-delete.html\"&gt;sale.shipment.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет отгрузку&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/shipment/sale-shipment-get-fields.html\"&gt;sale.shipment.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля отгрузки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь отгрузок с другими объектами","href":"api-reference/sale/shipment/index.html#svyaz-otgruzok-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/shipment/index.html#all-methods","level":2}],"title":"Отгрузки в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/shipment/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
