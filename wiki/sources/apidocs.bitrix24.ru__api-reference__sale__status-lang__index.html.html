            {"data":{"leading":false,"html":"&lt;p&gt;&lt;a href=\"api-reference/sale/status/index.html\"&gt;Статусы заказа и доставки&lt;/a&gt; можно адаптировать под разные языки.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sale/status-lang/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"yazyki-lokalizacii\"&gt;&lt;a href=\"api-reference/sale/status-lang/index.html#yazyki-lokalizacii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Языки локализации&lt;/span&gt;&lt;/a&gt;Языки локализации&lt;/h2&gt;\n&lt;p&gt;Локализация статусов доступна для языков:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vzbb9s6y\"&gt;ar&lt;/code&gt; — арабский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qafjykyi\"&gt;br&lt;/code&gt; — португальский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-03ctrxap\"&gt;de&lt;/code&gt; — немецкий,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yfpy72uj\"&gt;en&lt;/code&gt; — английский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5l6t8zi0\"&gt;fr&lt;/code&gt; — французский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l9jp9x88\"&gt;hi&lt;/code&gt; — хинди,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8iapu05j\"&gt;id&lt;/code&gt; — индонезийский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jrlslrbt\"&gt;in&lt;/code&gt; — английский для Индии,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rtrplv8y\"&gt;it&lt;/code&gt; — итальянский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-cay4oygb\"&gt;ja&lt;/code&gt; — японский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fc991ryj\"&gt;la&lt;/code&gt; — испанский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dwzidicx\"&gt;ms&lt;/code&gt; — малайский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wpmx5yy8\"&gt;pl&lt;/code&gt; — польский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yzu1mirj\"&gt;ru&lt;/code&gt; — русский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kue4kn4y\"&gt;sc&lt;/code&gt; — китайский упрощенный,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-jksadwxo\"&gt;tc&lt;/code&gt; — китайский традиционный,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-97q05tqa\"&gt;th&lt;/code&gt; — тайский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9qh8m7po\"&gt;tr&lt;/code&gt; — турецкий,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k90wybkf\"&gt;ua&lt;/code&gt; — украинский,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0509hibd\"&gt;vn&lt;/code&gt; — вьетнамский.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Список актуальных языков можно получить методом &lt;a href=\"api-reference/sale/status-lang/sale-status-lang-get-list-langs.html\"&gt;sale.statuslang.getlistlangs&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"svyaz-lokalizacii-statusov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/status-lang/index.html#svyaz-lokalizacii-statusov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь локализации статусов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь локализации статусов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Статус.&lt;/strong&gt; Укажите идентификатор нужного статуса. Список идентификаторов можно получить методом &lt;a href=\"api-reference/sale/status/sale-status-list.html\"&gt;sale.status.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/status-lang/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-e929zz6z\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: администратор&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/status-lang/sale-status-lang-get-list-langs.html\"&gt;sale.statusLang.getListLangs&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список языков для локализации статуса заказа или доставки&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/status-lang/sale-status-lang-add.html\"&gt;sale.statusLang.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет локализацию статуса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/status-lang/sale-status-lang-list.html\"&gt;sale.statusLang.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список локализаций статуса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/status-lang/sale-status-lang-delete-by-filter.html\"&gt;sale.statusLang.deleteByFilter&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет локализацию статуса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/status-lang/sale-status-lang-get-fields.html\"&gt;sale.statusLang.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает поля локализации статуса&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Языки локализации","href":"api-reference/sale/status-lang/index.html#yazyki-lokalizacii","level":2},{"title":"Связь локализации статусов с другими объектами","href":"api-reference/sale/status-lang/index.html#svyaz-lokalizacii-statusov-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/status-lang/index.html#all-methods","level":2}],"title":"Локализация статусов заказа и доставки в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/status-lang/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerI
