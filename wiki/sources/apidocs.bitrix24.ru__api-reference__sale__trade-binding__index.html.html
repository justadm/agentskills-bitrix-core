            {"data":{"leading":false,"html":"&lt;p&gt;Заказы можно создать вручную методом &lt;a href=\"api-reference/sale/order/sale-order-add.html\"&gt;sale.order.add&lt;/a&gt; или получить из внутренних источников:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;счет,&lt;/li&gt;\n&lt;li&gt;документ реализации,&lt;/li&gt;\n&lt;li&gt;сделка,&lt;/li&gt;\n&lt;li&gt;дело,&lt;/li&gt;\n&lt;li&gt;лендинг.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы просмотреть заказы из конкретного источника, используйте метод &lt;a href=\"api-reference/sale/trade-binding/sale-trade-binding-list.html\"&gt;sale.tradeBinding.list&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"svyaz-privyazki-istochnikov-zakaza-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sale/trade-binding/index.html#svyaz-privyazki-istochnikov-zakaza-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь привязки источников заказа с другими объектами&lt;/span&gt;&lt;/a&gt;Связь привязки источников заказа с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Источники заказов.&lt;/strong&gt; Получите информацию обо всех источниках заказов вашего Битрикс24, используя метод &lt;a href=\"api-reference/sale/trade-platform/sale-trade-platform-list.html\"&gt;sale.tradePlatform.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Заказ.&lt;/strong&gt; Просмотрите всю информацию о заказе с помощью метода &lt;a href=\"api-reference/sale/order/sale-order-get.html\"&gt;sale.order.get&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sale/trade-binding/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9rya8v22\"&gt;sale&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь с правом «Просмотр каталога товаров»&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/trade-binding/sale-trade-binding-list.html\"&gt;sale.tradeBinding.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список заказов из источников&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sale/trade-binding/sale-trade-binding-get-fields.html\"&gt;sale.tradeBinding.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает доступные поля заказов из источников&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь привязки источников заказа с другими объектами","href":"api-reference/sale/trade-binding/index.html#svyaz-privyazki-istochnikov-zakaza-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sale/trade-binding/index.html#all-methods","level":2}],"title":"Привязка источников заказов к заказам в Интернет-магазине: обзор методов"},"router":{"pathname":"api-reference/sale/trade-binding/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
