        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Некоторые методы требуют разрешения администратора портала на вызов. При вызове приложением такого метода администратор портала получит уведомление с предложением разрешить или запретить вызов, а приложение получит ошибку.&lt;/p&gt;\n&lt;p&gt;Разрешение или запрет даются конкретному авторизационному токену, с которым происходит вызов метода. То есть разрешение действует на время жизни токена, и при получении следующего токена нужно получать новое разрешение.&lt;/p&gt;\n&lt;p class=\"b24-info\"&gt;&lt;a href=\"/first-steps/how-to-use-examples.html\"&gt;Как использовать примеры в документации&lt;/a&gt;&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-variable constant_\"&gt;GET&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;https&lt;/span&gt;:&lt;span class=\"hljs-comment\"&gt;//portal.bitrix24.ru/rest/voximplant.user.get?auth=fkp963yuv1ggkfbs5z3f5hy8lilm0iw6&amp;amp;USER_ID=1&lt;/span&gt;\n&lt;span class=\"hljs-variable constant_\"&gt;HTTP&lt;/span&gt;/&lt;span class=\"hljs-number\"&gt;1.1&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;401&lt;/span&gt; &lt;span class=\"hljs-title class_\"&gt;Unauthorized&lt;/span&gt;\n{\n    &lt;span class=\"hljs-string\"&gt;\"error\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"METHOD_CONFIRM_WAITING\"&lt;/span&gt;, \n    &lt;span class=\"hljs-string\"&gt;\"error_description\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Waiting for confirmation\"&lt;/span&gt;\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"9\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-9\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-9\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-9.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;&lt;img src=\"api-reference/scopes/_images/rest_confirm.png\" alt=\"Подтверждение\" title=\"Подтверждение\" /&gt;&lt;/p&gt;\n&lt;p&gt;Вызов метода до получения подтверждения или ответа даст тот же ответ, но без запроса повторного подтверждения.&lt;/p&gt;\n&lt;p&gt;При подтверждении администратором разрешения или отказа произойдет вызов обработчика события &lt;a href=\"api-reference/common/events/on-app-method-confirm.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-not4lufa\"&gt;OnAppMethodConfirm&lt;/code&gt;&lt;/a&gt; с передачей ему результата подтверждения, а также токена, которому было выдано это разрешение:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n    &lt;span class=\"hljs-string\"&gt;'event'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ONAPPMETHODCONFIRM'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'data'&lt;/span&gt; =&amp;gt; \n    &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n        &lt;span class=\"hljs-string\"&gt;'TOKEN'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'fkp963yuv1ggkfbs5z3f5hy8lilm0iw6'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'METHOD'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'voximplant.user.get'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'CONFIRMED'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'1'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'LANGUAGE_ID'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'ru'&lt;/span&gt;,\n        ),\n    &lt;span class=\"hljs-string\"&gt;'ts'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'1478790852'&lt;/span&gt;,\n    &lt;span class=\"hljs-string\"&gt;'auth'&lt;/span&gt; =&amp;gt; \n    &lt;span class=\"hljs-title function_\"&gt;array&lt;/span&gt; (\n        &lt;span class=\"hljs-string\"&gt;'domain'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'portal.bitrix24.ru'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'client_endpoint'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'https://portal.bitrix24.ru/rest/'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'server_andpoint'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'https://oauth.bitrix24.tech/rest/'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'member_id'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'74ef8a46a75104de55d5d4a61b98ab6d'&lt;/span&gt;,\n        &lt;span class=\"hljs-string\"&gt;'application_token'&lt;/span&gt; =&amp;gt; &lt;span class=\"hljs-string\"&gt;'c289487163b58658eae5e8b42eaf11b8'&lt;/span&gt;,\n\t),\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"19\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-19\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-19\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-19.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Если администратор разрешил действие, приложение может использовать тот же самый авторизационный токен для работы с запрошенным методом:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-variable constant_\"&gt;GET&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;https&lt;/span&gt;:&lt;span class=\"hljs-comment\"&gt;//portal.bitrix24.ru/rest/voximplant.user.get?auth=fkp963yuv1ggkfbs5z3f5hy8lilm0iw6&amp;amp;USER_ID=1&lt;/span&gt;\n&lt;span class=\"hljs-variable constant_\"&gt;HTTP&lt;/span&gt;/&lt;span class=\"hljs-number\"&gt;1.1&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;200&lt;/span&gt; &lt;span class=\"hljs-variable constant_\"&gt;OK&lt;/span&gt;\n{\n    &lt;span class=\"hljs-string\"&gt;\"result\"&lt;/span&gt;: [\n        {\n            &lt;span class=\"hljs-string\"&gt;\"DEFAULT_LINE\"&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;, \n            &lt;span class=\"hljs-string\"&gt;\"ID\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"1\"&lt;/span&gt;, \n            &lt;span class=\"hljs-string\"&gt;\"INNER_NUMBER\"&lt;/span&gt;: &lt;span class=\"hljs-literal\"&gt;null&lt;/span&gt;, \n            &lt;span class=\"hljs-string\"&gt;\"PHONE_ENABLED\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Y\"&lt;/span&gt;, \n            &lt;span class=\"hljs-string\"&gt;\"SIP_LOGIN\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"****\"&lt;/span&gt;, \n            &lt;span class=\"hljs-string\"&gt;\"SIP_PASSWORD\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"*****\"&lt;/span&gt;, \n            &lt;span class=\"hljs-string\"&gt;\"SIP_SERVER\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"*****\"&lt;/span&gt;\n        }\n    ]\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"23\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-23\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-23\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-23.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;В случае запрета вернется соответствующая ошибка:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs js\"&gt;&lt;span class=\"hljs-variable constant_\"&gt;GET&lt;/span&gt; &lt;span class=\"hljs-attr\"&gt;https&lt;/span&gt;:&lt;span class=\"hljs-comment\"&gt;//portal.bitrix24.ru/rest/voximplant.user.get?auth=fkp963yuv1ggkfbs5z3f5hy8lilm0iw6&amp;amp;USER_ID=1&lt;/span&gt;\n&lt;span class=\"hljs-variable constant_\"&gt;HTTP&lt;/span&gt;/&lt;span class=\"hljs-number\"&gt;1.1&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;403&lt;/span&gt; &lt;span class=\"hljs-title class_\"&gt;Forbidden&lt;/span&gt;\n{\n    &lt;span class=\"hljs-string\"&gt;\"error\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"METHOD_CONFIRM_DENIED\"&lt;/span&gt;, \n    &lt;span class=\"hljs-string\"&gt;\"error_description\"&lt;/span&gt;: &lt;span class=\"hljs-string\"&gt;\"Method call denied\"&lt;/span&gt;\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"27\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-27\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-27\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-27.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"spisok-metodov,-trebuyushih-podtverzhdeniya\"&gt;&lt;a href=\"api-reference/scopes/confirmation.html#spisok-metodov,-trebuyushih-podtverzhdeniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Список методов, требующих подтверждения&lt;/span&gt;&lt;/a&gt;Список методов, требующих подтверждения&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/telephony/voximplant/users/voximplant-user-get.html\"&gt;Получить настройки пользователей voximplant.user.get&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Список методов, требующих подтверждения","href":"api-reference/scopes/confirmation.html#spisok-metodov,-trebuyushih-podtverzhdeniya","level":2}],"title":"Вызов методов с подтверждением"},"router":{"pathname":"api-reference/scopes/confirmation","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
