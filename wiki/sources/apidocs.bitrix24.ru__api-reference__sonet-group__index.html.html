        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Рабочие группы и проекты в Битрикс24 помогают организовать командную работу. В группах можно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;распределять задачи между участниками, устанавливать сроки выполнения и отслеживать прогресс,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;обмениваться документами, хранить и совместно редактировать файлы,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;обсуждать задачи в чатах, оставлять комментарии и проводить онлайн-встречи.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/24491358/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Рабочие группы и проекты в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"chem-otlichaetsya-gruppa-ot-proekta\"&gt;&lt;a href=\"api-reference/sonet-group/index.html#chem-otlichaetsya-gruppa-ot-proekta\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Чем отличается группа от проекта&lt;/span&gt;&lt;/a&gt;Чем отличается группа от проекта&lt;/h2&gt;\n&lt;p&gt;Проект — это группа с расширенными возможностями. Его главное отличие от группы — возможность устанавливать сроки. Алгоритм создания группы и проекта идентичен: в обоих случаях используйте метод &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;sonet_group.create&lt;/a&gt;. Для проекта задайте дополнительные параметры:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8cp714t4\"&gt;PROJECT&lt;/code&gt; — указывает, что создаваемый объект является проектом,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kthyfmqh\"&gt;PROJECT_DATE_START&lt;/code&gt; — дата начала проекта,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v4ildoiy\"&gt;PROJECT_DATE_FINISH&lt;/code&gt; — дата завершения проекта.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"svyaz-rabochih-grupp-i-proektov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/index.html#svyaz-rabochih-grupp-i-proektov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь рабочих групп и проектов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь рабочих групп и проектов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователи&lt;/strong&gt;. Совместно работают над задачами внутри рабочих групп и проектов. Используйте методы группы sonet_group.user.*, чтобы управлять участниками рабочих групп: добавлять, удалять, назначать роли и права.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Задачи&lt;/strong&gt;. Нужны, чтобы распределять обязанности между участниками рабочих групп, отслеживать выполнение и контролировать сроки. Создавайте и изменяйте задачи с помощью группы методов &lt;a href=\"api-reference/tasks/index.html\"&gt;tasks.task.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Диск&lt;/strong&gt;. Привязанное к конкретной группе или проекту хранилище с необходимыми для работы материалами. Чтобы управлять хранилищами, используйте группу методов &lt;a href=\"api-reference/disk/storage/index.html\"&gt;disk.storage.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Универсальные списки&lt;/strong&gt;. Структурированные перечни элементов внутри рабочих групп. Нужны, чтобы создавать реестры или хранилища данных, сортировать и фильтровать информацию, автоматизировать учет. Создавайте, обновляйте и удаляйте универсальные списки при помощи методов группы &lt;a href=\"api-reference/lists/lists/index.html\"&gt;lists.lists.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Лента новостей&lt;/strong&gt;. Используйте метод &lt;a href=\"api-reference/log/log-blogpost-add.html\"&gt;log.blogpost.add&lt;/a&gt;, чтобы публиковать сообщения, которые будут видны только добавленным в группу пользователям.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vidzhety-rabochih-grupp-i-proektov\"&gt;&lt;a href=\"api-reference/sonet-group/index.html#vidzhety-rabochih-grupp-i-proektov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты рабочих групп и проектов&lt;/span&gt;&lt;/a&gt;Виджеты рабочих групп и проектов&lt;/h2&gt;\n&lt;p&gt;Добавляйте свои пункты в выпадающие меню, чтобы расширить функциональность рабочих групп и проектов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/workgroups/index.html\"&gt;Пункт основного выпадающего меню проекта SONET_GROUP_DETAIL_TAB&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/workgroups/toolbar.html\"&gt;Пункт выпадающего меню над списком задач TASK_GROUP_LIST_TOOLBAR&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/workgroups/robot-designer-toolbar.html\"&gt;Пункт основного выпадающего меню около настроек роботов TASK_ROBOT_DESIGNER_TOOLBAR&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Код конкретного места встройки виджета указывайте в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s1w8axks\"&gt;PLACEMENT&lt;/code&gt; метода &lt;a href=\"api-reference/widgets/placement-bind.html\"&gt;placement.bind&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"specializirovannye-rabochie-gruppy-skram-i-potok\"&gt;&lt;a href=\"api-reference/sonet-group/index.html#specializirovannye-rabochie-gruppy-skram-i-potok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Специализированные рабочие группы: Скрам и Поток&lt;/span&gt;&lt;/a&gt;Специализированные рабочие группы: Скрам и Поток&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Скрам в Битрикс24&lt;/strong&gt;. Инструмент для организации командной работы по методике Scrum. Позволяет разбивать проекты на спринты — короткие итерации, в течение которых команда выполняет определенный объем задач.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Поток в Битрикс24&lt;/strong&gt;. Инструмент для организации командной работы. Позволяет собирать задачи в одном месте и быстро распределять их между исполнителями.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/21307026/?sphrase_id=145628976\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Потоки: начало работы&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/?sphrase_id=145628940\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Скрам и Поток реализованы на базе рабочих групп.&lt;/p&gt;\n&lt;p&gt;Для создания Скрама используйте метод &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt;. Чтобы группа стала Скрамом, заполните поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0vjsjer7\"&gt;SCRUM_MASTER_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы привязать Поток к группе, используйте идентификатор &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tdrte1oy\"&gt;groupId&lt;/code&gt;. Для получения идентификатора используйте метод &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или метод &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3rfw4ywh\"&gt;sonet&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-hw6bdy69\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"qmtrtzzj\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;sonet_group.create&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-update.html\"&gt;sonet_group.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет параметры группы&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-get.html\"&gt;socialnetwork.api.workgroup.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает данные по рабочей группе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;socialnetwork.api.workgroup.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список рабочих групп&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-get.html\"&gt;sonet_group.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список групп&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-feature-access.html\"&gt;sonet_group.feature.access&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Проверяет права текущего пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-user-groups.html\"&gt;sonet_group.user.groups&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список групп текущего пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-setowner.html\"&gt;sonet_group.setowner&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет владельца группы&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-delete.html\"&gt;sonet_group.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"upravlenie-polzovatelyami-v-gruppah\"&gt;&lt;a href=\"api-reference/sonet-group/index.html#upravlenie-polzovatelyami-v-gruppah\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Управление пользователями в группах&lt;/span&gt;&lt;/a&gt;Управление пользователями в группах&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-invite.html\"&gt;sonet_group.user.invite&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Приглашает пользователей в группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-request.html\"&gt;sonet_group.user.request&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет запрос на вступление в группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-add.html\"&gt;sonet_group.user.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет пользователей в группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-update.html\"&gt;sonet_group.user.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет роль пользователя в группе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-get.html\"&gt;sonet_group.user.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td
