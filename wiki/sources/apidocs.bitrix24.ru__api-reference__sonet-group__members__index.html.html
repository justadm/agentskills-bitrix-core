        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Участники групп и проектов — это пользователи, которые входят в состав рабочих групп и проектов. Они могут иметь разные роли и права.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/members/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/24491358/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Частые вопросы по группам и проектам Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-uchastnikov-rabochih-grupp-i-proektov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/members/index.html#svyaz-uchastnikov-rabochih-grupp-i-proektov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь участников рабочих групп и проектов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь участников рабочих групп и проектов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Пользователи&lt;/strong&gt;. Входят в состав рабочих групп и проектов. Чтобы получить ID пользователя, используйте метод &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Группы и проекты&lt;/strong&gt;. Чтобы получить ID группы или проекта, используйте метод &lt;a href=\"api-reference/sonet-group/sonet-group-get.html\"&gt;sonet_group.get&lt;/a&gt;. Список участников группы можно получить через &lt;a href=\"api-reference/sonet-group/members/sonet-group-user-get.html\"&gt;sonet_group.user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Роли участников группы&lt;/strong&gt;. Участники рабочих групп и проектов могут иметь разные роли: администратор, модератор, участник. От ролей зависят права доступа к функционалу. Чтобы изменить роль участника, используйте метод &lt;a href=\"api-reference/sonet-group/members/sonet-group-user-update.html\"&gt;sonet_group.user.update&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Задачи&lt;/strong&gt;. Участников групп и проектов можно назначать исполнителями задач. При создании задачи добавьте участников с помощью метода &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;tasks.task.add&lt;/a&gt;. Укажите параметры &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dgj5yz4v\"&gt;CREATED_BY&lt;/code&gt; — постановщик задачи, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q3wxwbvs\"&gt;RESPONSIBLE_ID&lt;/code&gt; — основной исполнитель, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1ry9nw5n\"&gt;ACCOMPLICES&lt;/code&gt; — соисполнители, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vzzeydn1\"&gt;AUDITORS&lt;/code&gt; — наблюдатели. При изменении задачи вы можете добавить участников через метод &lt;a href=\"api-reference/tasks/tasks-task-update.html\"&gt;tasks.task.update&lt;/a&gt;. Для этого передайте обновленные параметры &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-51wngibi\"&gt;RESPONSIBLE_ID&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6nctgknr\"&gt;ACCOMPLICES&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dojy9l62\"&gt;AUDITORS&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/members/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tnj1yko3\"&gt;sonet&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-add.html\"&gt;sonet_group.user.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет участника в рабочую группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-invite.html\"&gt;sonet_group.user.invite&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Приглашает участника в группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-request.html\"&gt;sonet_group.user.request&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отправляет запрос на вступление в группу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-delete.html\"&gt;sonet_group.user.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет участника из группы&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-get.html\"&gt;sonet_group.user.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список участников группы&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/members/sonet-group-user-update.html\"&gt;sonet_group.user.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет роль участника в группе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь участников рабочих групп и проектов с другими объектами","href":"api-reference/sonet-group/members/index.html#svyaz-uchastnikov-rabochih-grupp-i-proektov-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sonet-group/members/index.html#all-methods","level":2}],"title":"Участники групп и проектов: обзор методов"},"router":{"pathname":"api-reference/sonet-group/members/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
