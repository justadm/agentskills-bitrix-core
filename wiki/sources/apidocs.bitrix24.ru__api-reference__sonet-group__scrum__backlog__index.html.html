        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Бэклог — это список всех задач команды. Задачи, пожелания, идеи, обратная связь записываются и приоритизируются. Участники команды просматривают бэклог и решают, какие задачи брать в &lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html\"&gt;спринт&lt;/a&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/scrum/backlog/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-bekloga-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/index.html#svyaz-bekloga-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь бэклога с другими объектами&lt;/span&gt;&lt;/a&gt;Связь бэклога с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Бэклог привязывается к группе (скраму) по идентификатору группы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o9hv9k80\"&gt;groupId&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;. Группа является скрамом, если заполнено поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fx8ykpo3\"&gt;SCRUM_MASTER_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Бэклог имеет привязку к пользователям по числовому идентификатору в параметрах &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p8ds3ft8\"&gt;createdBy&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ruah2zrv\"&gt;modifiedBy&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"osobennosti-metodov-add-i-delete\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/index.html#osobennosti-metodov-add-i-delete\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности методов add и delete&lt;/span&gt;&lt;/a&gt;Особенности методов add и delete&lt;/h2&gt;\n&lt;p&gt;В Скраме может быть только один бэклог, Битрикс24 создает его автоматически.&lt;/p&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-add.html\"&gt;добавления бэклога в Скрам&lt;/a&gt; пригодится только при импорте данных из другой системы, когда нужно создать бэклог после создания Скрама.&lt;/p&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-delete.html\"&gt;удаления бэклога&lt;/a&gt; используйте, если ошибочно добавили бэклог в группу или проект, которые не являются скрамом. Если удалить бэклог в Скраме, Битрикс24 автоматически создаст его заново при открытии страницы планирования.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8386ygt2\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-add.html\"&gt;tasks.api.scrum.backlog.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет бэклог в Скрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-update.html\"&gt;tasks.api.scrum.backlog.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет бэклог&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-get.html\"&gt;tasks.api.scrum.backlog.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей бэклога по идентификатору Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-delete.html\"&gt;tasks.api.scrum.backlog.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет бэклог&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-get-fields.html\"&gt;tasks.api.scrum.backlog.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля бэклога&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь бэклога с другими объектами","href":"api-reference/sonet-group/scrum/backlog/index.html#svyaz-bekloga-s-drugimi-obuektami","level":2},{"title":"Особенности методов add и delete","href":"api-reference/sonet-group/scrum/backlog/index.html#osobennosti-metodov-add-i-delete","level":2},{"title":"Обзор методов","href":"api-reference/sonet-group/scrum/backlog/index.html#all-methods","level":2}],"title":"Бэклог в Скраме: обзор методов"},"router":{"pathname":"api-reference/sonet-group/scrum/backlog/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
