        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Эпик — это тема, контекст или большая цель, к которой относится задача. Прикрепляйте задачи к эпикам и ваш бэклог станет нагляднее.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/scrum/epic/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/14659922/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;как работать в скраме&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-epikov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/index.html#svyaz-epikov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь эпиков с другими объектами&lt;/span&gt;&lt;/a&gt;Связь эпиков с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Эпики привязываются к группе (скраму) по идентификатору группы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vj66cuti\"&gt;groupId&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;. Группа является скрамом, если заполнено поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k32rtyez\"&gt;SCRUM_MASTER_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Эпик имеет привязку к пользователям по числовому идентификатору в параметрах &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6f2dygnz\"&gt;createdBy&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ywnz6brc\"&gt;modifiedBy&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-prikrepit-fajly-k-epiku\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/index.html#kak-prikrepit-fajly-k-epiku\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как прикрепить файлы к эпику&lt;/span&gt;&lt;/a&gt;Как прикрепить файлы к эпику&lt;/h2&gt;\n&lt;p&gt;К эпику можно прикреплять файлы Диска. Для этого в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rprx38b8\"&gt;files&lt;/code&gt; передайте массив с идентификаторами файлов. Перед каждым идентификатором укажите префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9u5j65hr\"&gt;n&lt;/code&gt;, например: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dmrhjdb7\"&gt;\"files\": [\"n428\", \"n345\"]&lt;/code&gt;. Получить идентификаторы файлов можно двумя способами.&lt;/p&gt;\n&lt;p&gt;Использовать один из методов загрузки файла:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Использовать один из методов получения списка файлов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-children.html\"&gt;disk.storage.getchildren&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren &lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9e75u3kn\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-add.html\"&gt;tasks.api.scrum.epic.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет эпик в Скрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-update.html\"&gt;tasks.api.scrum.epic.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет эпик в Скраме&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-get.html\"&gt;tasks.api.scrum.epic.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей эпика по его &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1og5zqn6\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-list.html\"&gt;tasks.api.scrum.epic.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список эпиков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-delete.html\"&gt;tasks.api.scrum.epic.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет эпик&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-get-fields.html\"&gt;tasks.api.scrum.epic.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля эпика&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь эпиков с другими объектами","href":"api-reference/sonet-group/scrum/epic/index.html#svyaz-epikov-s-drugimi-obuektami","level":2},{"title":"Как прикрепить файлы к эпику","href":"api-reference/sonet-group/scrum/epic/index.html#kak-prikrepit-fajly-k-epiku","level":2},{"title":"Обзор методов","href":"api-reference/sonet-group/scrum/epic/index.html#all-methods","level":2}],"title":"Эпики в Скраме: обзор методов"},"router":{"pathname":"api-reference/sonet-group/scrum/epic/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":tru
