            {"data":{"leading":false,"html":"&lt;p&gt;Скрам — это гибкий способ организации работы с задачами. Команда может разбить на части крупный проект и выполнять его постепенно, по одному фрагменту.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/scrum/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"skram-v-bitriks24\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#skram-v-bitriks24\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Скрам в Битрикс24&lt;/span&gt;&lt;/a&gt;Скрам в Битрикс24&lt;/h2&gt;\n&lt;p&gt;Технически Скрам является группой. Идентификатор Скрама &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5jwhgg49\"&gt;groupId&lt;/code&gt; в параметрах методов и полях элементов Скрама — это идентификатор &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a3v5uzp5\"&gt;id&lt;/code&gt; группы.&lt;/p&gt;\n&lt;p&gt;Чтобы создать Скрам, используйте метод &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt;. Группа является Скрамом, если заполнено поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-djyc2157\"&gt;SCRUM_MASTER_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"elementy-skrama\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#elementy-skrama\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Элементы Скрама&lt;/span&gt;&lt;/a&gt;Элементы Скрама&lt;/h2&gt;\n&lt;p&gt;Задачи в Скраме — это стандартные задачи Битрикс24 с расширенными возможностями для работы по методологии Скрам. Для создания или изменения задач используется группа методов &lt;a href=\"api-reference/sonet-group/scrum/task/index.html\"&gt;tasks.api.scrum.task.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Команда Скрама собирает все задачи проекта в одном месте — в бэклоге. Задачи, пожелания, идеи, обратная связь записываются и приоритизируются.  Работать с бэклогом можно с помощью группы методов &lt;a href=\"api-reference/sonet-group/scrum/backlog/index.html\"&gt;tasks.api.scrum.backlog.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Чтобы сделать бэклог нагляднее, задачи прикрепляются к эпикам. Эпик — это тема, контекст или большая цель, к которой относится задача. Для создания, изменения, получения или удаления эпиков используется группа методов &lt;a href=\"api-reference/sonet-group/scrum/epic/index.html\"&gt;tasks.api.scrum.epic.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Участники команды просматривают бэклог и решают, какие задачи брать в спринт. Спринт — это короткий итерационный цикл, за который команда выполняет определенную работу. Управлять спринтами можно с помощью группы методов &lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html\"&gt;tasks.api.scrum.sprint.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Команда передвигает задачи по стадиям канбана, работая  над задачами спринта. Канбан — это инструмент, который помогает визуально представить работу с задачами в виде колонок и карточек. Колонки — это стадии работы, карточки — задачи. Работа со стадиями и управление задачами в канбане выполняется методами &lt;a href=\"api-reference/sonet-group/scrum/kanban/index.html\"&gt;tasks.api.scrum.kanban.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fbyggww4\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"beklog\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#beklog\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Бэклог&lt;/span&gt;&lt;/a&gt;Бэклог&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-add.html\"&gt;tasks.api.scrum.backlog.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет бэклог в Скрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-update.html\"&gt;tasks.api.scrum.backlog.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет бэклог&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-get.html\"&gt;tasks.api.scrum.backlog.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей бэклога по идентификатору Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-delete.html\"&gt;tasks.api.scrum.backlog.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет бэклог&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-get-fields.html\"&gt;tasks.api.scrum.backlog.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля бэклога&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"kanban\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#kanban\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Канбан&lt;/span&gt;&lt;/a&gt;Канбан&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-add-stage.html\"&gt;tasks.api.scrum.kanban.addStage&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает стадию канбана Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-update-stage.html\"&gt;tasks.api.scrum.kanban.updateStage&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет стадию канбана Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-get-stages.html\"&gt;tasks.api.scrum.kanban.getStages&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает стадии канбана по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h1qwf7sl\"&gt;id&lt;/code&gt; спринта&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-delete-stage.html\"&gt;tasks.api.scrum.kanban.deleteStage&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет стадию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-add-task.html\"&gt;tasks.api.scrum.kanban.addTask&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет задачу в канбан Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-delete-task.html\"&gt;tasks.api.scrum.kanban.deleteTask&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет задачу из канбана Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-get-fields.html\"&gt;tasks.api.scrum.kanban.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля стадии канбана&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"epiki\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#epiki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Эпики&lt;/span&gt;&lt;/a&gt;Эпики&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-add.html\"&gt;tasks.api.scrum.epic.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет эпик в Скрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-update.html\"&gt;tasks.api.scrum.epic.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет эпик в Скраме&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-get.html\"&gt;tasks.api.scrum.epic.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей эпика по его &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6a3v5goy\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-list.html\"&gt;tasks.api.scrum.epic.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список эпиков&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-delete.html\"&gt;tasks.api.scrum.epic.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет эпик&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-get-fields.html\"&gt;tasks.api.scrum.epic.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля эпика&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"sprinty\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/index.html#sprinty\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Спринты&lt;/span&gt;&lt;/a&gt;Спринты&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-add.html\"&gt;tasks.api.scrum.sprint.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет спринт в Скрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-update.html\"&gt;tasks.api.scrum.sprint.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет спринт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-start.html\"&gt;tasks.api.scrum.sprint.start&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запускает спринт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-complete.html\"&gt;tasks.api.scrum.sprint.complete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Завершает активный спринт выбранного Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-get.html\"&gt;tasks.api.scrum.sprint.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей спринта по его &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0ki78jmb\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-list.html\"&gt;tasks.api.scrum.sprint.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список спринтов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-delete.html\"&gt;tasks.api.scrum.sprint.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет спринт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-get-fields.html\"&gt;tasks.api.scrum.sprint.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td
