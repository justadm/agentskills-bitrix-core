        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Канбан — это инструмент, который помогает визуально представить работу с задачами в виде колонок и карточек. Колонки — это стадии работы, карточки — задачи. В канбане скрама команда видит все задачи спринта и передвигает их по стадиям в процессе работы.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/scrum/kanban/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/14659922/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как работать в Скрам&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-stadij-kanbana-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/index.html#svyaz-stadij-kanbana-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь стадий канбана с другими объектами&lt;/span&gt;&lt;/a&gt;Связь стадий канбана с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Спринт.&lt;/strong&gt; Стадия канбана привязывается к спринту по идентификатору спринта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kxp4dsoo\"&gt;sprintId&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-add.html\"&gt;добавления нового спринта&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-list.html\"&gt;получения списка спринтов&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"osobennosti\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/index.html#osobennosti\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности&lt;/span&gt;&lt;/a&gt;Особенности&lt;/h2&gt;\n&lt;p&gt;Канбан Скрама обязательно должен содержать в себе стадии с типом новая &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x7t2zwke\"&gt;NEW&lt;/code&gt; и финальная &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ssm86z7c\"&gt;FINISH&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Используйте метод создания стадии канбана только для активных спринтов, то есть с полем &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5j4ih185\"&gt;\"status\": \"active\"&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"zadachi-v-kanbane\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/index.html#zadachi-v-kanbane\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Задачи в канбане&lt;/span&gt;&lt;/a&gt;Задачи в канбане&lt;/h2&gt;\n&lt;p&gt;Задачи в стадии канбана можно добавлять методом &lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-add-task.html\"&gt;tasks.api.scrum.kanban.addTask&lt;/a&gt;. Для этого используются идентификаторы трех объектов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;идентификатор спринта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rvnopln4\"&gt;sprintId&lt;/code&gt;. Можно получить методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-list.html\"&gt;получения списка спринтов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;идентификатор задачи &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sb5mczrr\"&gt;taskId&lt;/code&gt;. Можно получить методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания задачи&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;получения списка задач&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;идентификатор стадии канбана &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qc8hsyfb\"&gt;stageId&lt;/code&gt;. Можно получить методом &lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-get-stages.html\"&gt;получения стадий канбана&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Чтобы удалить задачу из канбана используйте метод &lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-delete-task.html\"&gt;tasks.api.scrum.kanban.deleteTask&lt;/a&gt;, указав идентификатор спринта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nuu3ygj2\"&gt;sprintId&lt;/code&gt; и идентификатор задачи &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q9uiwjug\"&gt;taskId&lt;/code&gt;. Задача останется в спринте на странице планирования. Метод не перенесет задачу в &lt;a href=\"api-reference/sonet-group/scrum/backlog/index.html\"&gt;бэклог&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l7mlpyd1\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-add-stage.html\"&gt;tasks.api.scrum.kanban.addStage&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает стадию канбана Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-update-stage.html\"&gt;tasks.api.scrum.kanban.updateStage&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет стадию канбана Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-get-stages.html\"&gt;tasks.api.scrum.kanban.getStages&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает стадии канбана по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b8uyvggy\"&gt;id&lt;/code&gt; спринта&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-delete-stage.html\"&gt;tasks.api.scrum.kanban.deleteStage&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет стадию&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-add-task.html\"&gt;tasks.api.scrum.kanban.addTask&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет задачу в канбан Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-delete-task.html\"&gt;tasks.api.scrum.kanban.deleteTask&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет задачу из канбана Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/kanban/tasks-api-scrum-kanban-get-fields.html\"&gt;tasks.api.scrum.kanban.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля стадии канбана&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь стадий канбана с другими объектами","href":"api-reference/sonet-group/scrum/kanban/index.html#svyaz-stadij-kanbana-s-drugimi-obuektami","level":2},{"title":"Особенности","href":"api-reference/sonet-group/scrum/kanban/index.html#osobennosti","level":2},{"title":"Задачи в канбане","href":"api-reference/sonet-group/scrum/kanban/index.html#zadachi-v-kanbane","level":2},{"title":"Обзор методов","href":"api-reference/sonet-group/scrum/kanban/index.html#all-methods","level":2}],"title":"Канбан в Скраме: обзор методов"},"router":{"pathname":"api-reference/sonet-group/scrum/kanban/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
