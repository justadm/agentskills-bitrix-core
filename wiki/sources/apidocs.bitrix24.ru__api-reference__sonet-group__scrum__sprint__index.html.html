            {"data":{"leading":false,"html":"&lt;p&gt;Спринт — это короткий итерационный цикл, за который команда выполняет определенную работу. Такой формат работы позволяет получать небольшой, но прогнозируемый результат в понятные сроки.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-sprintov-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html#svyaz-sprintov-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь спринтов с другими объектами&lt;/span&gt;&lt;/a&gt;Связь спринтов с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Спринты привязываются к группе (скраму) по идентификатору группы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eirerruv\"&gt;groupId&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;. Группа является скрамом, если заполнено поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mggej61u\"&gt;SCRUM_MASTER_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-zapustit-sprint\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html#kak-zapustit-sprint\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как запустить спринт&lt;/span&gt;&lt;/a&gt;Как запустить спринт&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-start.html\"&gt;tasks.api.scrum.sprint.start&lt;/a&gt; запускает спринт по идентификатору спринта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3p3yy4wm\"&gt;id&lt;/code&gt;. Получить идентификатор спринта можно методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-add.html\"&gt;создания нового спринта&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-list.html\"&gt;получения списка спринтов&lt;/a&gt;. Запустить можно только планируемый спринт, то есть со статусом &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ix9xn5fc\"&gt;planned&lt;/code&gt;. У запущенного спринта статус изменится на &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-us4emmz8\"&gt;active&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-zavershit-aktivnyj-sprint\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html#kak-zavershit-aktivnyj-sprint\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как завершить активный спринт&lt;/span&gt;&lt;/a&gt;Как завершить активный спринт&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-complete.html\"&gt;tasks.api.scrum.sprint.complete&lt;/a&gt; завершает активный спринт по идентификатору группы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n2ay2ms7\"&gt;id&lt;/code&gt;, а не спринта. Получить идентификатор можно методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;. У завершенного спринта статус сменится с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9p80ppnh\"&gt;active&lt;/code&gt; на &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s4f544b0\"&gt;completed&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1qhhul00\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-add.html\"&gt;tasks.api.scrum.sprint.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет спринт в Скрам&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-update.html\"&gt;tasks.api.scrum.sprint.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет спринт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-start.html\"&gt;tasks.api.scrum.sprint.start&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запускает спринт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-complete.html\"&gt;tasks.api.scrum.sprint.complete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Завершает активный спринт выбранного Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-get.html\"&gt;tasks.api.scrum.sprint.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей спринта по его &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-78fxw2uo\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-list.html\"&gt;tasks.api.scrum.sprint.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список спринтов&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-delete.html\"&gt;tasks.api.scrum.sprint.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет спринт&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-get-fields.html\"&gt;tasks.api.scrum.sprint.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля спринта&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":
