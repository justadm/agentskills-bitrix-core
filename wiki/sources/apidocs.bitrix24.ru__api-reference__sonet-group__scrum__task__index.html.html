        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Задачи в Скраме — это стандартные задачи Битрикс24 с расширенными возможностями для работы по методологии Скрам. В скраме команда может:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;оценивать сложность задач с помощью сторипоинтов&lt;/li&gt;\n&lt;li&gt;прикреплять задачи к эпикам&lt;/li&gt;\n&lt;li&gt;размещать задачи в бэклоге и спринтах&lt;/li&gt;\n&lt;li&gt;передвигать задачи по стадиям спринта в процессе работы&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/sonet-group/scrum/task/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/14659922/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как работать в Скраме&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-dobavit-zadachu-v-skram\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/task/index.html#kak-dobavit-zadachu-v-skram\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как добавить задачу в Скрам&lt;/span&gt;&lt;/a&gt;Как добавить задачу в Скрам&lt;/h2&gt;\n&lt;p&gt;Задачу нужно создать методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;tasks.task.add&lt;/a&gt; или обновить методом &lt;a href=\"api-reference/tasks/tasks-task-update.html\"&gt;tasks.task.update&lt;/a&gt;. Привязка задачи к скраму указывается в параметре идентификатора группы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3w7rogua\"&gt;GROUP_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Получить идентификатор группы можно методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;. Группа является скрамом, если у нее заполнено поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a8rpn5p1\"&gt;SCRUM_MASTER_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;После того как задача привязана к скраму, вы можете использовать методы работы с задачами скрама. Например, добавить сторипоинты и эпик методом &lt;a href=\"api-reference/sonet-group/scrum/task/tasks-api-scrum-task-update.html\"&gt;tasks.api.scrum.task.update&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17958164/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать задачу&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-zadach-skrama-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/task/index.html#svyaz-zadach-skrama-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь задач скрама с другими объектами&lt;/span&gt;&lt;/a&gt;Связь задач скрама с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Бэклог/спринт.&lt;/strong&gt; Задача привязывается к бэклогу или спринту скрама через идентификатор &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5j3awpvj\"&gt;entityId&lt;/code&gt;. Идентификатор бэклога можно получить методом &lt;a href=\"api-reference/sonet-group/scrum/backlog/tasks-api-scrum-backlog-get.html\"&gt;получения полей бэклога по идентификатору Скрама&lt;/a&gt;. Идентификатор спринта можно получить методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-add.html\"&gt;добавления нового спринта&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/scrum/sprint/tasks-api-scrum-sprint-list.html\"&gt;получения списка спринтов&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Эпик.&lt;/strong&gt; Задача прикрепляется к эпику по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n5befw0k\"&gt;epicId&lt;/code&gt;. Идентификатор эпика можно получить методом &lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-add.html\"&gt;добавления эпика в скрам&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/scrum/epic/tasks-api-scrum-epic-list.html\"&gt;получения списка эпиков&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/sonet-group/scrum/task/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vi3tfl52\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/task/tasks-api-scrum-task-update.html\"&gt;tasks.api.scrum.task.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает или обновляет задачу Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/task/tasks-api-scrum-task-get.html\"&gt;tasks.api.scrum.task.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает значения полей задачи Скрама по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o6800k9w\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/sonet-group/scrum/task/tasks-api-scrum-task-get-fields.html\"&gt;tasks.api.scrum.task.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля задачи Скрама&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как добавить задачу в Скрам","href":"api-reference/sonet-group/scrum/task/index.html#kak-dobavit-zadachu-v-skram","level":2},{"title":"Связь задач скрама с другими объектами","href":"api-reference/sonet-group/scrum/task/index.html#svyaz-zadach-skrama-s-drugimi-obuektami","level":2},{"title":"Обзор методов","href":"api-reference/sonet-group/scrum/task/index.html#all-methods","level":2}],"title":"Задачи в Скраме: обзор методов"},"router":{"pathname":"api-reference/sonet-group/scrum/task/index","depth":5,"base":"../../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
