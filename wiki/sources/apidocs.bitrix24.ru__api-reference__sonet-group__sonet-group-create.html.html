\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-24\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-24\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-24.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"otvet\"&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-create.html#otvet\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ответ:&lt;/span&gt;&lt;/a&gt;Ответ:&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;200 OK&lt;/p&gt;\n&lt;/blockquote&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;&lt;span class=\"hljs-attr\"&gt;\"result\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt;&lt;span class=\"hljs-number\"&gt;11&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"33\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-33\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-33\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-33.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"parametry\"&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-create.html#parametry\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Параметры&lt;/span&gt;&lt;/a&gt;Параметры&lt;/h2&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Параметр&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;arFields&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Массив параметров новой группы. Допустимые ключи массива:&lt;br /&gt;\n&lt;strong&gt;NAME&lt;/strong&gt; - название группы (обязательное поле),&lt;br /&gt;\n&lt;strong&gt;DESCRIPTION&lt;/strong&gt; - описание группы,&lt;br /&gt;\n&lt;strong&gt;VISIBLE&lt;/strong&gt; - флаг Y/N - видна ли группа в списке групп,&lt;br /&gt;\n&lt;strong&gt;OPENED&lt;/strong&gt; - флаг Y/N - открыта ли группа для свободного вступления,&lt;br /&gt;\n&lt;strong&gt;KEYWORDS&lt;/strong&gt; - ключевые слова,&lt;br /&gt;\n&lt;strong&gt;INITIATE_PERMS&lt;/strong&gt; - кто имеет право на приглашение пользователей в группу (обязательное поле):&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;A&lt;/strong&gt; - только владелец группы,&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;E&lt;/strong&gt; - владелец группы и модераторы группы,&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;K&lt;/strong&gt; - все члены группы.&lt;br /&gt;\n&lt;strong&gt;CLOSED&lt;/strong&gt; - флаг Y/N - является ли группа архивной,&lt;br /&gt;\n&lt;strong&gt;SPAM_PERMS&lt;/strong&gt; - кто имеет право на отправку сообщений в группу (обязательное поле). Значения аналогичны параметру INITIATE_PERMS.&lt;br /&gt;\n&lt;strong&gt;PROJECT&lt;/strong&gt; - флаг Y/N - является ли группа проектом или нет. по умолчанию - не является. (С версии 18.0.0)&lt;br /&gt;&lt;strong&gt;PROJECT_DATE_FINISH&lt;/strong&gt; - задаётся окончание проекта. (С версии 18.0.0)&lt;br /&gt;\n&lt;strong&gt;PROJECT_DATE_START&lt;/strong&gt; - задаётся начало проекта. (С версии 18.0.0)&lt;br /&gt;\n&lt;strong&gt;SCRUM_MASTER_ID&lt;/strong&gt; - если заполнен идентификатором пользователя, то этот проект станет скрамом. (С версии 22.300)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;bAutoSubscribe&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Автоподписывание на созданную тему. Необязательный параметр. По умолчанию имеет значение True. (С версии 10.0.0)&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p class=\"b24-info\"&gt;Обязательные параметры отмечены *&lt;/p&gt;\n&lt;p&gt;В случае успешного создания группы, возвращает ее ID, иначе - текст ошибки.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;&lt;strong&gt;Примечание&lt;/strong&gt;: Создавать экстранет-группы с помощью REST API пока нельзя.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"primer\"&gt;&lt;a href=\"api-reference/sonet-group/sonet-group-create.html#primer\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Пример&lt;/span&gt;&lt;/a&gt;Пример&lt;/h2&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-uwo1dcpd\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"js\" data-diplodoc-key=\"js\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;JS&lt;/div&gt;\n&lt;div data-diplodoc-id=\"php\" data-diplodoc-key=\"php\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;PHP&lt;/div&gt;\n&lt;div data-diplodoc-
