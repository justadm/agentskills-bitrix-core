            {"data":{"leading":false,"html":"&lt;p&gt;Чек-лист — это список шагов для задачи. Каждый пункт чек-листа можно выполнить отдельно.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/checklist-item/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17657420/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;чек-листы в задачах&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"struktura-chek-listov\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#struktura-chek-listov\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Структура чек-листов&lt;/span&gt;&lt;/a&gt;Структура чек-листов&lt;/h2&gt;\n&lt;p&gt;Чек-лист в Битрикс24 — это иерархический список с древовидной структурой до трех уровней. Он привязан к задаче &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2xeqqkju\"&gt;TASK_ID&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Элементы чек-листа поддерживают вложенность. Поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ke32mp7w\"&gt;PARENT_ID&lt;/code&gt; указывает на родительский элемент. У корневого элемента &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0lvqvwwy\"&gt;PARENT_ID&lt;/code&gt; равен &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5lvwuc89\"&gt;0&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g07jxcwh\"&gt;SORT_INDEX&lt;/code&gt; задает позицию элемента. Чем меньше число — тем выше элемент.&lt;/p&gt;\n&lt;p&gt;Каждый пункт может иметь статус &lt;em&gt;Выполнен&lt;/em&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-04taaxqx\"&gt;IS_COMPLETE = 'Y'&lt;/code&gt; или &lt;em&gt;Не выполнен&lt;/em&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1o1p2gzx\"&gt;IS_COMPLETE = 'N'&lt;/code&gt;. При смене статуса система автоматически заполняет поля &lt;em&gt;Кто сменил&lt;/em&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-00mxxuhw\"&gt;TOGGLED_BY&lt;/code&gt;  и &lt;em&gt;Когда сменил&lt;/em&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9yhwhhsu\"&gt;TOGGLED_DATE&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Пункт можно отметить как важный &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f3qzg6yk\"&gt;IS_IMPORTANT = 'Y'&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"svyaz-chek-lista-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#svyaz-chek-lista-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь чек-листа с другими объектами&lt;/span&gt;&lt;/a&gt;Связь чек-листа с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Задача.&lt;/strong&gt; Чек-лист привязан к задаче по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mzcooc5l\"&gt;TASKID&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания новой задачи&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;получения списка задач&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Пункт чек-листа может иметь связь с пользователями в полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4jph2sjo\"&gt;TOGGLED_BY&lt;/code&gt; — идентификатор пользователя, который выполнил пункт,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gdke6gd8\"&gt;MEMBERS&lt;/code&gt; —  массив с информацией о наблюдателях &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5ivp76l4\"&gt;\"TYPE\": \"U\"&lt;/code&gt; и соисполнителях &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b7sb1qxj\"&gt;\"TYPE\": \"A\"&lt;/code&gt; в пункте чек-листа.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Файлы.&lt;/strong&gt; Пункт чек-листа может содержать файлы. Поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-63msaolt\"&gt;ATTACHMENTS&lt;/code&gt; хранит объекты с описанием каждого файла, включая идентификатор &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-utbloe10\"&gt;FILE_ID&lt;/code&gt;. Получить информацию о файле по идентификатору можно методом &lt;a href=\"api-reference/disk/file/disk-file-get.html\"&gt;disk.file.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17962166/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Задачи Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"perenesti-punkt-chek-lista\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#perenesti-punkt-chek-lista\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Перенести пункт чек-листа&lt;/span&gt;&lt;/a&gt;Перенести пункт чек-листа&lt;/h2&gt;\n&lt;p&gt;Изменить положение пункта можно методом &lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-move-after-item.html\"&gt;task.checklistitem.moveafteritem&lt;/a&gt;. Метод перемещает элемент &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q4e395i1\"&gt;itemId&lt;/code&gt; в позицию после элемента &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-yg3utev8\"&gt;afterItemId&lt;/code&gt;. Оба элемента должны быть в одной задаче &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dviilalc\"&gt;taskId&lt;/code&gt;. Элементы могут быть в разных подсписках, но после перемещения &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-08dryzne\"&gt;itemId&lt;/code&gt; получит тот же &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ig2d2429\"&gt;PARENT_ID&lt;/code&gt;, что и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9v9u9lr1\"&gt;afterItemId&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пример.&lt;/strong&gt; Поместим пункт с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xd373hsu\"&gt;ID=453&lt;/code&gt; после пункта с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wroomqzl\"&gt;ID=447&lt;/code&gt;.&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs plaintext\"&gt;ДО:                                            ПОСЛЕ:\nЧек-лист 1 (431)                               Чек-лист 1 (431)\n├── первый пункт (433)                         ├── первый пункт (433)\n│   ├── подпункт 1 (435)                       │   ├── подпункт 1 (435)\n│   ├── подпункт 2 (445)                       │   └── подпункт 2 (445)\n│   └── подпункт 3 (453) ← PARENT_ID=433       ├── второй пункт (447)\n├── второй пункт (447)                         ├── подпункт 3 (453) ← PARENT_ID=431\n└── третий пункт (449)                         └── третий пункт (449)\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"76\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-76\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-76\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-76.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h2 id=\"vypolnit-punkt-chek-lista\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#vypolnit-punkt-chek-lista\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Выполнить пункт чек-листа&lt;/span&gt;&lt;/a&gt;Выполнить пункт чек-листа&lt;/h2&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-complete.html\"&gt;task.checklistitem.complete&lt;/a&gt; отмечает элемент чек-листа как выполненный. Система устанавливает значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b535xuza\"&gt;'Y'&lt;/code&gt; в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-d4t7bg15\"&gt;IS_COMPLETE&lt;/code&gt; и автоматически заполняет поля:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ertj9ua2\"&gt;TOGGLED_BY&lt;/code&gt; — идентификатор пользователя, который сменил статус пункта,&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-w82ua7u2\"&gt;TOGGLED_DATE&lt;/code&gt; — текущие дата и время, когда пользователь сменил пункт.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-renew.html\"&gt;task.checklistitem.renew&lt;/a&gt; возвращает пункт чек-листа в работу. Система устанавливает значение &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6gntex77\"&gt;'N'&lt;/code&gt; в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ydprg94i\"&gt;IS_COMPLETE&lt;/code&gt; и обновляет поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-vflwwqi6\"&gt;TOGGLED_BY&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r4cz5o5h\"&gt;TOGGLED_DATE&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"kto-mozhet-dobavlyat-ili-menyat-zapis\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#kto-mozhet-dobavlyat-ili-menyat-zapis\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Кто может добавлять или менять запись&lt;/span&gt;&lt;/a&gt;Кто может добавлять или менять запись&lt;/h2&gt;\n&lt;p&gt;Чтобы добавить, изменить или удалить пункт чек-листа, нужны права доступа. Проверить права можно методом &lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-is-action-allowed.html\"&gt;task.checklistitem.isactionallowed&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"spravochnaya-informaciya-o-metodah\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#spravochnaya-informaciya-o-metodah\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Справочная информация о методах&lt;/span&gt;&lt;/a&gt;Справочная информация о методах&lt;/h2&gt;\n&lt;p&gt;Узнать актуальную информацию о методах работы с чек-листами в задачах вы можете с помощью метода &lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-get-manifest.html\"&gt;task.checklistitem.getmanifest&lt;/a&gt;. Рекомендуем использовать его только в качестве справочника, так как структуру ответа метода разработчик может изменить в любой момент.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wnfnyki4\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-add.html\"&gt;task.checklistitem.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет новый элемент чек-листа к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-update.html\"&gt;task.checklistitem.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет элемент чек-листа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-get.html\"&gt;task.checklistitem.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает элемент чек-листа по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1pg11mct\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-get-list.html\"&gt;task.checklistitem.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список элементов чек-листа в задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-delete.html\"&gt;task.checklistitem.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет элемент чек-листа&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-move-after-item.html\"&gt;task.checklistitem.moveafteritem&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Помещает элемент чек-листа в списке после указанного&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-complete.html\"&gt;task.checklistitem.complete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отмечает элемент чек-листа как выполненный&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-renew.html\"&gt;task.checklistitem.renew&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отмечает выполненный элемент чек-листа как невыполненный&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-is-action-allowed.html\"&gt;task.checklistitem.isactionallowed&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Проверяет, разрешено ли действие для элемента чек-листа&lt
