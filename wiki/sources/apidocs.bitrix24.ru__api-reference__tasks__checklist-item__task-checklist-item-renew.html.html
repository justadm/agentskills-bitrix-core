role=\"button\" tabindex=\"0\" id=\"inline-code-id-hsaw336v\"&gt;ITEMID&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h3 id=\"statusy-i-kody-sistemnyh-oshibok\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-renew.html#statusy-i-kody-sistemnyh-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Статусы и коды системных ошибок&lt;/span&gt;&lt;/a&gt;Статусы и коды системных ошибок&lt;/h3&gt;\n&lt;p&gt;HTTP-статус: &lt;strong&gt;20х&lt;/strong&gt;, &lt;strong&gt;40x&lt;/strong&gt;, &lt;strong&gt;50x&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Описанные ниже ошибки могут возникнуть при вызове любого метода&lt;/p&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Статус&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Код&lt;/strong&gt;&lt;br /&gt;\n&lt;strong&gt;Текст ошибки&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hn7oe8ym\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i35xq8wc\"&gt;INTERNAL_SERVER_ERROR&lt;/code&gt;&lt;br /&gt;\nInternal server error&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tc95sjbq\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kkf6uifv\"&gt;ERROR_UNEXPECTED_ANSWER&lt;/code&gt;&lt;br /&gt;\nServer returned an unexpected response&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возникла внутренняя ошибка сервера, обратитесь к администратору сервера или в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i64qwzb0\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0jiabtl2\"&gt;QUERY_LIMIT_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nToo many requests&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышен &lt;a href=\"/limits.html\"&gt;лимит на интенсивность запросов&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-298lgp2a\"&gt;405&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-112q0dn0\"&gt;ERROR_BATCH_METHOD_NOT_ALLOWED&lt;/code&gt;&lt;br /&gt;\nMethod is not allowed for batch usage&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Текущий метод не разрешен для вызове с помощью &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xre0r001\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dt0clyj0\"&gt;ERROR_BATCH_LENGTH_EXCEEDED&lt;/code&gt;&lt;br /&gt;\nMax batch length exceeded&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Превышена максимальная длина параметров, переданных в метод &lt;a href=\"/settings/how-to-call-rest-api/batch.html\"&gt;batch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rdu4osn9\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-05v9pd8t\"&gt;NO_AUTH_FOUND&lt;/code&gt;&lt;br /&gt;\nWrong authorization data&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Неверный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;код вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f8rxaqtx\"&gt;400&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-76cpbcq4\"&gt;INVALID_REQUEST&lt;/code&gt;&lt;br /&gt;\nHttps required&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Для вызовов методов требуется использовать протокол HTTPS&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3lh2pmf1\"&gt;503&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-b1l5fycg\"&gt;OVERLOAD_LIMIT&lt;/code&gt;&lt;br /&gt;\nREST API is blocked due to overload&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API заблокирован из-за перегрузки. Это ручная индивидуальная блокировка, для снятия необходимо обращаться в &lt;a href=\"/bitrix-support.html\"&gt;техническую поддержку Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-scyxi6ts\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iihc7veq\"&gt;ACCESS_DENIED&lt;/code&gt;&lt;br /&gt;\nREST API is available only on commercial plans&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;REST API доступен только на коммерческих планах&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dowsc2ta\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bhi5dcmk\"&gt;INVALID_CREDENTIALS&lt;/code&gt;&lt;br /&gt;\nInvalid request credentials&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;У пользователя, с чьим &lt;a href=\"/settings/oauth/index.html\"&gt;access-токеном&lt;/a&gt; или &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхуком&lt;/a&gt; был вызван метод, не хватает прав&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qq7s0d63\"&gt;404&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qkakwnkt\"&gt;ERROR_MANIFEST_IS_NOT_AVAILABLE&lt;/code&gt;&lt;br /&gt;\nManifest is not available&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Манифест недоступен&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fqee0a17\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-aryet6uk\"&gt;insufficient_scope&lt;/code&gt;&lt;br /&gt;\nThe request requires higher privileges than provided by the webhook token&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Запрос требует более высоких привилегий, чем предоставляет токен &lt;a href=\"/local-integrations/local-webhooks.html\"&gt;вебхука&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ddoez9zi\"&gt;401&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2an37a2h\"&gt;expired_token&lt;/code&gt;&lt;br /&gt;\nThe access token provided has expired&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Предоставленный &lt;a href=\"/settings/oauth/index.html\"&gt;access-токен&lt;/a&gt; доступа истек&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q3q8tklf\"&gt;403&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-67ivu4ft\"&gt;user_access_error&lt;/code&gt;&lt;br /&gt;\nThe user does not have access to the application&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Пользователь не имеет доступа к приложению. Это означает, что приложение установлено, но администратор портала разрешил доступ к этому приложению только конкретным пользователям&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nwls0n92\"&gt;500&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-30biuijd\"&gt;PORTAL_DELETED&lt;/code&gt;&lt;br /&gt;\nPortal was deleted&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Публичная часть сайта закрыта. Чтобы открыть публичную часть сайта на коробочной установке отключите опцию «Временное закрытие публичной части сайта». Путь к настройке: &lt;em&gt;Рабочий стол &amp;gt; Настройки &amp;gt; Настройки продукта &amp;gt; Настройки модулей &amp;gt; Главный модуль &amp;gt; Временное закрытие публичной части сайта&lt;/em&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;&lt;h2 id=\"prodolzhite-izuchenie\"&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-renew.html#prodolzhite-izuchenie\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Продолжите изучение&lt;/span&gt;&lt;/a&gt;Продолжите изучение&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/index.html\"&gt;Чек-листы: обзор методов&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-add.html\"&gt;Добавить пункт чек-листа task.checklistitem.add&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-update.html\"&gt;Изменить пункт чек-листа task.checklistitem.update&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-get.html\"&gt;Получить пункт чек-листа task.checklistitem.get&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-get-list.html\"&gt;Получить список пунктов чек-листа task.checklistitem.getlist&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-delete.html\"&gt;Удалить пункт чек-листа task.checklistitem.delete&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/checklist-item/task-checklist-item-move-after-item.html\"&gt;Перенести пункт чек-листа task.checklistitem.moveafteritem&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;
