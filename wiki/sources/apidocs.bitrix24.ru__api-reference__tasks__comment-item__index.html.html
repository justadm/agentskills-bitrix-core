            {"data":{"leading":false,"html":"&lt;p&gt;В комментариях задачи участники задают вопросы, обсуждают задачу и следят за выполнением. Здесь можно оставлять важные заметки и фиксировать результаты.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;Комментарии не работают с версии модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qhlo5uec\"&gt;tasks 25.700.0&lt;/code&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Вместо комментариев в новой карточке задач работает чат. Как работать с чатом задач, описано в статье &lt;a href=\"api-reference/tasks/tasks-new.html\"&gt;Новая карточка задач: комментарии и события&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/comment-item/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17962240/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;как работать с задачами&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-kommentariev-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/tasks/comment-item/index.html#svyaz-kommentariev-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь комментариев с другими объектами&lt;/span&gt;&lt;/a&gt;Связь комментариев с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Задача.&lt;/strong&gt; Комментарии привязаны к задаче по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-f09m4v29\"&gt;TASKID&lt;/code&gt;. Получить его можно методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания новой задачи&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;получения списка задач&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Комментарий имеет привязку к пользователю по числовому идентификатору в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ah9gksyp\"&gt;AUTHOR_ID&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17962166/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Задачи Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"fajly-diska\"&gt;&lt;a href=\"api-reference/tasks/comment-item/index.html#fajly-diska\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Файлы Диска&lt;/span&gt;&lt;/a&gt;Файлы Диска&lt;/h2&gt;\n&lt;p&gt;К комментарию задачи можно прикрепить файлы Диска. В параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-kvo2vk2h\"&gt;UF_FORUM_MESSAGE_DOC&lt;/code&gt; передайте массив с идентификаторами файлов Диска. Перед каждым идентификатором укажите префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bkbn27vm\"&gt;n&lt;/code&gt;, например: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-13je5999\"&gt;\"UF_FORUM_MESSAGE_DOC\": [\"n428\", \"n345\"]&lt;/code&gt;. Получить идентификаторы файлов можно двумя способами.&lt;/p&gt;\n&lt;p&gt;Использовать один из методов загрузки файла:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Использовать один из методов получения списка файлов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-children.html\"&gt;disk.storage.getchildren&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren &lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/tasks/how-to-create-comment-with-file.html\"&gt;Как создать комментарий в задаче и прикрепить к нему файл&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"rezultaty-vypolneniya-zadachi\"&gt;&lt;a href=\"api-reference/tasks/comment-item/index.html#rezultaty-vypolneniya-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Результаты выполнения задачи&lt;/span&gt;&lt;/a&gt;Результаты выполнения задачи&lt;/h2&gt;\n&lt;p&gt;Комментарий можно закрепить как результат выполнения задачи. Управляйте результатами задачи группой методов &lt;a href=\"api-reference/tasks/result/index.html\"&gt;tasks.task.result.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/tasks/comment-item/task-comment-item-delete.html\"&gt;task.commentitem.delete&lt;/a&gt; удалит комментарий с результатом.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/comment-item/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ed5dkltv\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: зависит от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-vs0yjzz5\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"4uqq1err\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/task-comment-item-add.html\"&gt;task.commentitem.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавить комментарий к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/task-comment-item-update.html\"&gt;task.commentitem.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновить комментарий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/task-comment-item-get.html\"&gt;task.commentitem.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить комментарий задачи по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4vcudk04\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/task-comment-item-get-list.html\"&gt;task.commentitem.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить список комментариев к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/task-comment-item-delete.html\"&gt;task.commentitem.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить комментарий&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"ufgj323n\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/events-comment/on-task-comment-add.html\"&gt;OnTaskCommentAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении комментария к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/events-comment/on-task-comment-update.html\"&gt;OnTaskCommentUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновления комментария в задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/comment-item/events-comment/on-task-comment-delete.html\"&gt;OnTaskCommentDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении комментария из задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_c
