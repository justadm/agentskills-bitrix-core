        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;С помощью инструмента Учет времени в задачах вы можете:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;отслеживать время, затраченное сотрудником на конкретные задачи&lt;/li&gt;\n&lt;li&gt;повысить прозрачность выполнения задач&lt;/li&gt;\n&lt;li&gt;анализировать эффективность сотрудников&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/elapsed-item/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17980006/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;учет времени в задачах&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-zatrachennogo-vremeni-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/tasks/elapsed-item/index.html#svyaz-zatrachennogo-vremeni-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь затраченного времени с другими объектами&lt;/span&gt;&lt;/a&gt;Связь затраченного времени с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Задача.&lt;/strong&gt; В одной задаче может быть несколько записей о затраченном времени. Записи привязываются по идентификатору задачи &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-er4mlm40\"&gt;TASKID&lt;/code&gt;.  Получить его можно методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания новой задачи&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;получения списка задач&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Запись о затраченном времени имеет привязку к пользователю по его идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ze3k4ilt\"&gt;USER_ID&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17962166/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;задачи Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kto-mozhet-dobavlyat-ili-menyat-zapis\"&gt;&lt;a href=\"api-reference/tasks/elapsed-item/index.html#kto-mozhet-dobavlyat-ili-menyat-zapis\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Кто может добавлять или менять запись&lt;/span&gt;&lt;/a&gt;Кто может добавлять или менять запись&lt;/h2&gt;\n&lt;p&gt;Чтобы добавить, изменить или удалить запись о затраченном времени, нужны права доступа к задаче. Проверить права можно специальным методом &lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-is-action-allowed.html\"&gt;task.elapseditem.isactionallowed&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"spravochnaya-informaciya-o-metodah\"&gt;&lt;a href=\"api-reference/tasks/elapsed-item/index.html#spravochnaya-informaciya-o-metodah\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Справочная информация о методах&lt;/span&gt;&lt;/a&gt;Справочная информация о методах&lt;/h2&gt;\n&lt;p&gt;Узнать актуальную информацию о методах работы с затраченным временем вы можете с помощью метода &lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-get-manifest.html\"&gt;task.elapseditem.getmanifest&lt;/a&gt;. Рекомендуем использовать его только в качестве справочника, так как структуру ответа метода разработчик может изменить в любой момент.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/elapsed-item/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8p8y0qqn\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: любой пользователь&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-add.html\"&gt;task.elapseditem.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет затраченное время к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-update.html\"&gt;task.elapseditem.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменяет параметры записи о затраченном времени&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-get.html\"&gt;task.elapseditem.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает запись о затраченном времени по ее идентификатору&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-get-list.html\"&gt;task.elapseditem.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список записей о затраченном времени по задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-delete.html\"&gt;task.elapseditem.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет запись о затраченном времени&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-is-action-allowed.html\"&gt;task.elapseditem.isactionallowed&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Проверяет разрешено ли действие&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/elapsed-item/task-elapsed-item-get-manifest.html\"&gt;task.elapseditem.getmanifest&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возвращает список методов и их описание&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь затраченного времени с другими объектами","href":"api-reference/tasks/elapsed-item/index.html#svyaz-zatrachennogo-vremeni-s-drugimi-obuektami","level":2},{"title":"Кто может добавлять или менять запись","href":"api-reference/tasks/elapsed-item/index.html#kto-mozhet-dobavlyat-ili-menyat-zapis","level":2},{"title":"Справочная информация о методах","href":"api-reference/tasks/elapsed-item/index.html#spravochnaya-informaciya-o-metodah","level":2},{"title":"Обзор методов","href":"api-reference/tasks/elapsed-item/index.html#all-methods","level":2}],"title":"Учет времени в задачах: обзор методов"},"router":{"pathname":"api-reference/tasks/elapsed-item/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
