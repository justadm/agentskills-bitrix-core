        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Потоки — это инструмент, который автоматизирует распределение и выполнение задач. Сотрудникам не нужно искать, кто будет делать задачу. Они ставят задачи в поток отдела, и он автоматически назначает исполнителя.&lt;/p&gt;\n&lt;p&gt;В потоке можно отслеживать эффективность выполнения задач. Эффективность рассчитывается по формуле: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-i23qt1ju\"&gt;&amp;lt;количество просроченных задач&amp;gt; / &amp;lt;количество всех задач в потоке&amp;gt; * 100%&lt;/code&gt;. Чтобы повысить эффективность, меняйте тип распределения задач или команду потока.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/flow/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/21307026/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Потоки: начало работы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tipy-raspredeleniya\"&gt;&lt;a href=\"api-reference/tasks/flow/index.html#tipy-raspredeleniya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы распределения&lt;/span&gt;&lt;/a&gt;Типы распределения&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Ручное распределение&lt;/strong&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1q111dl9\"&gt;manually&lt;/code&gt;. Все задачи назначаются на модератора потока. Модератор распределяет задачи по сотрудникам.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Распределение по очереди&lt;/strong&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-g1vbor7h\"&gt;queue&lt;/code&gt;. Задачи назначаются по очереди каждому участнику команды. Участник будет пропущен, если он отсутствует на рабочем месте, например, в отпуске или на больничном.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Самостоятельное распределение&lt;/strong&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7ksflqax\"&gt;himself&lt;/code&gt;. Задачи назначаются на постановщика. Каждый участник команды потока получит уведомление. Участник потока станет исполнителем, если нажмет кнопку Взять в работу. Если задача взята в работу, система изменит статус задачи на Выполняется.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если в команде потока с распределением по очереди или с самостоятельным распределением на рабочем месте не останется сотрудников, поток автоматически перейдет в режим ручного распределения. Администратор потока станет модератором и получит уведомление.&lt;/p&gt;\n&lt;h2 id=\"svyaz-potoka-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/tasks/flow/index.html#svyaz-potoka-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь потока с другими объектами&lt;/span&gt;&lt;/a&gt;Связь потока с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Поток привязывается к группе по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-93patgjt\"&gt;groupId&lt;/code&gt;. Идентификатор можно получить методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;. Если при создании потока не указать идентификатор группы, будет создана новая группа.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Поток имеет привязку к пользователю по идентификатору администратора потока &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-l0nt7ie7\"&gt;ownerId&lt;/code&gt;. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;. Если при создании потока не указать идентификатор, администратором потока будет его создатель&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Шаблон задачи.&lt;/strong&gt; Задачи потока создаются по шаблону. Идентификатор шаблона указывается в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-8qjvdgkf\"&gt;templateId&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17962166/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Задачи Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17869536/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Шаблоны задач&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-dobavit-zadachu-v-potok\"&gt;&lt;a href=\"api-reference/tasks/flow/index.html#kak-dobavit-zadachu-v-potok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как добавить задачу в поток&lt;/span&gt;&lt;/a&gt;Как добавить задачу в поток&lt;/h2&gt;\n&lt;p&gt;Добавить задачу в поток можно методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания новой задачи&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-update.html\"&gt;обновления существующей задачи&lt;/a&gt;. В параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3unrmd3s\"&gt;FLOW_ID&lt;/code&gt; укажите идентификатор потока.&lt;/p&gt;\n&lt;p&gt;Битрикс24 автоматически заполнит все необходимые для потока поля в соответствии с настройками потока.&lt;/p&gt;\n&lt;p&gt;Название и исполнитель — обязательные поля при создании задачи вне потока. В случае с задачами в потоке, достаточно заполнить &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1q70y031\"&gt;FLOW_ID&lt;/code&gt; и название. Исполнителя назначит поток.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/21307012/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать и найти задачу в Потоке&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"vklyuchit-ili-vyklyuchit-potok\"&gt;&lt;a href=\"api-reference/tasks/flow/index.html#vklyuchit-ili-vyklyuchit-potok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Включить или выключить поток&lt;/span&gt;&lt;/a&gt;Включить или выключить поток&lt;/h2&gt;\n&lt;p&gt;Если нужно временно остановить работу с потоком, его можно выключить. Выключает и включает поток метод &lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-activate.html\"&gt;tasks.flow.Flow.activate&lt;/a&gt; по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-s7dxztwd\"&gt;flowId&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;Получить идентификатор потока можно методом &lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-create.html\"&gt;создания нового потока&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-get.html\"&gt;получения информации о задаче&lt;/a&gt; для задачи из потока.&lt;/p&gt;\n&lt;h2 id=\"proverit-unikalnost-nazvaniya-potoka\"&gt;&lt;a href=\"api-reference/tasks/flow/index.html#proverit-unikalnost-nazvaniya-potoka\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Проверить уникальность названия потока&lt;/span&gt;&lt;/a&gt;Проверить уникальность названия потока&lt;/h2&gt;\n&lt;p&gt;Название потока должно быть уникальным. Проверить уникальность названия можно методом &lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-is-exists.html\"&gt;tasks.flow.Flow.isExists&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/flow/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ykf4n50i\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-create.html\"&gt;tasks.flow.Flow.create&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создать поток&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-update.html\"&gt;tasks.flow.Flow.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Изменить поток&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-get.html\"&gt;tasks.flow.Flow.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получить поток&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-delete.html\"&gt;tasks.flow.Flow.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удалить поток&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-is-exists.html\"&gt;tasks.flow.Flow.isExists&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Проверить, существует ли поток с таким названием&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-activate.html\"&gt;tasks.flow.Flow.activate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Включить или выключить поток&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/flow/tasks-flow-flow-pin.html\"&gt;tasks.flow.Flow.pin&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Закрепить или открепить поток в списке&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Типы распределения","href":"api-reference/tasks/flow/index.html#tipy-raspredeleniya","level":2},{"title":"Связь потока с другими объектами","href":"api-reference/tasks/flow/index.html#svyaz-potoka-s-drugimi-obuektami","level":2},{"title":"Как добавить задачу в поток","href":"api-reference/tasks/flow/index.html#kak-dobavit-zadachu-v-potok","level":2},{"title":"Включить или выключить поток","href":"api-reference/tasks/flow/index.html#vklyuchit-ili-vyklyuchit-potok","level":2},{"title":"Проверить уникальность названия потока","href":"api-reference/tasks/flow/index.html#proverit-unikalnost-nazvaniya-potoka","level":2},{"title":"Обзор методов","href":"api-reference/tasks/flow/index.html#all-methods","le
