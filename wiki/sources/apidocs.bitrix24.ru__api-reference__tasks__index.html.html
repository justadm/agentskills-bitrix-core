            {"data":{"leading":false,"html":"&lt;p&gt;Задачи в Битрикс24 — единое пространство, которое помогает организовать работу команды: поручать небольшие задания и управлять крупными проектами. В задачах можно отслеживать процесс работы сотрудников, контролировать сроки и распределять обязанности.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/17962166/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;задачи Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"osobennosti-metodov-zadach\"&gt;&lt;a href=\"api-reference/tasks/index.html#osobennosti-metodov-zadach\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности методов задач&lt;/span&gt;&lt;/a&gt;Особенности методов задач&lt;/h2&gt;\n&lt;p&gt;В методах задач нужно соблюдать порядок следования параметров в запросе, указанный в таблицах параметров. Иначе запрос выполнится с ошибками.&lt;/p&gt;\n&lt;h2 id=\"kartochka-zadachi\"&gt;&lt;a href=\"api-reference/tasks/index.html#kartochka-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Карточка задачи&lt;/span&gt;&lt;/a&gt;Карточка задачи&lt;/h2&gt;\n&lt;p&gt;Карточку задачи можно разделить на блоки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;описание&lt;/li&gt;\n&lt;li&gt;системные и пользовательские поля&lt;/li&gt;\n&lt;li&gt;комментарии, история и учет времени&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Описание задачи содержит информацию о том, что нужно сделать. К тексту можно добавить чек-листы, файлы и связи с другими задачами.&lt;/p&gt;\n&lt;p&gt;Чек-листы помогут составить список шагов для выполнения задачи. Управлять чек-листами можно с помощью группы методов &lt;a href=\"api-reference/tasks/checklist-item/index.html\"&gt;task.checklistitem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Связь с задачами создавайте методом &lt;a href=\"api-reference/tasks/task-dependence-add.html\"&gt;task.dependence.add&lt;/a&gt;. Удаляйте — методом &lt;a href=\"api-reference/tasks/task-dependence-delete.html\"&gt;task.dependence.delete&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;При создании задачи заполните системные поля: укажите исполнителя, наблюдателей, крайний срок выполнения, теги и так далее.&lt;/p&gt;\n&lt;p&gt;Если системных полей недостаточно, вы можете создать собственные пользовательские поля. Они позволяют хранить информацию в различных форматах данных: строка, число, дата со временем и да/нет. Создавать, изменять, получать или удалять пользовательские поля задач можно группой методов &lt;a href=\"api-reference/tasks/user-field/index.html\"&gt;task.item.userfield.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;В комментариях обсуждайте задачу и пишите о результатах работы.  Для работы с комментариями используйте группу методов &lt;a href=\"api-reference/tasks/comment-item/index.html\"&gt;task.commentitem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Итог работы над задачей можно записать в комментарий и зафиксировать как результат. Управляйте результатами задачи группой методов &lt;a href=\"api-reference/tasks/result/index.html\"&gt;tasks.task.result.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Учет времени в задачах отслеживает время, затраченное сотрудником на задачу. Работать с записями о затраченном времени можно с помощью группы методов &lt;a href=\"api-reference/tasks/elapsed-item/index.html\"&gt;task.elapseditem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Все действия с задачей фиксируются и сохраняются в истории задачи. Чтобы получить историю используйте метод &lt;a href=\"api-reference/tasks/tasks-task-history-list.html\"&gt;tasks.task.history.list&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17958164/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать задачу&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17657420/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Чек-листы в задачах&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17980006/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Учет времени в задачах&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17821400/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Дополнительные возможности задач&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-zadach-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/tasks/index.html#svyaz-zadach-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь задач с другими объектами&lt;/span&gt;&lt;/a&gt;Связь задач с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Родительская задача.&lt;/strong&gt; У задачи могут быть подзадачи. В этом случае она считается родительской. Добавить привязку к родительской задаче можно в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m38fap4f\"&gt;PARENT_ID&lt;/code&gt;. Получить идентификатор задачи можно методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания задачи&lt;/a&gt; или &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;получения списка задач&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Группа или Проект.&lt;/strong&gt; Задача привязывается по идентификатору группы &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-t6tlktot\"&gt;GROUP_ID&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Задача имеет привязку к пользователям по числовым идентификаторам в полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-if634w7f\"&gt;CREATED_BY&lt;/code&gt; — постановщик&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-c5zd16pc\"&gt;RESPONSIBLE_ID&lt;/code&gt; — исполнитель&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m5iqm6l1\"&gt;ACCOMPLICES&lt;/code&gt; — соисполнители&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a1rjb82w\"&gt;AUDITORS&lt;/code&gt; — наблюдатели&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nwttzhur\"&gt;CHANGED_BY&lt;/code&gt;  — последний пользователь, который изменил задачу&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2jjn7pyr\"&gt;STATUS_CHANGED_BY&lt;/code&gt; — последний пользователь, который изменил статус задачи&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n6zx5uqy\"&gt;CLOSED_BY&lt;/code&gt; — пользователь, который завершил задачу&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; К задаче можно привязать объекты CRM: контакты, компании, лиды, сделки, счета и смарт-процессы. Чтобы привязать объект, укажите в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tnudrxp6\"&gt;UF_CRM_TASK&lt;/code&gt; его &lt;a href=\"api-reference/crm/data-types.html#object_type\"&gt;идентификатор с префиксом&lt;/a&gt;. Например, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-eaiehodj\"&gt;C_3&lt;/code&gt; для контакта с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-y3q99esb\"&gt;id = 3&lt;/code&gt;. Получить идентификатор можно методом &lt;a href=\"api-reference/crm/universal/crm-item-add.html\"&gt;создания нового элемента CRM&lt;/a&gt; или методом &lt;a href=\"api-reference/crm/universal/crm-item-list.html\"&gt;получения списка элементов&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Почта.&lt;/strong&gt; Задача может быть связана с письмом по идентификатору через параметр &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-28moktxp\"&gt;UF_MAIL_MESSAGE&lt;/code&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17750248/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать подзадачу&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"fajly-diska\"&gt;&lt;a href=\"api-reference/tasks/index.html#fajly-diska\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Файлы Диска&lt;/span&gt;&lt;/a&gt;Файлы Диска&lt;/h2&gt;\n&lt;p&gt;К описанию задачи можно прикрепить файлы Диска. В параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-x53m7fro\"&gt;UF_TASK_WEBDAV_FILES&lt;/code&gt; передайте массив с идентификаторами файлов Диска. Перед каждым идентификатором укажите префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-a86bphkv\"&gt;n&lt;/code&gt;, например: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0ltxn4o1\"&gt;\"UF_TASK_WEBDAV_FILES\": [\"n428\", \"n345\"]&lt;/code&gt;. Получить идентификаторы файлов можно двумя способами.&lt;/p&gt;\n&lt;p&gt;Использовать один из методов загрузки файла:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Использовать один из методов получения списка файлов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/storage/disk-storage-get-children.html\"&gt;disk.storage.getchildren&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/disk/folder/disk-folder-get-children.html\"&gt;disk.folder.getchildren &lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Прикрепляйте файлы к задаче методом &lt;a href=\"api-reference/tasks/tasks-task-files-attach.html\"&gt;tasks.task.files.attach&lt;/a&gt;, если задача уже создана.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Частые кейсы и сценарии&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"tutorials/tasks/how-to-create-task-with-file.html\"&gt;Как создать задачу с прикрепленным файлом&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"tutorials/tasks/how-to-upload-file-to-task.html\"&gt;Как загрузить файл в задачу&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"potoki\"&gt;&lt;a href=\"api-reference/tasks/index.html#potoki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Потоки&lt;/span&gt;&lt;/a&gt;Потоки&lt;/h2&gt;\n&lt;p&gt;Потоки — это инструмент, который автоматизирует распределение и выполнение задач. Сотрудникам не нужно искать, кто будет делать задачу. Они ставят задачи в поток отдела, и он автоматически назначает исполнителя.&lt;/p&gt;\n&lt;p&gt;Управлять Потоками можно группой методов &lt;a href=\"api-reference/tasks/flow/index.html\"&gt;tasks.flow.Flow.*&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/21307026/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24 Потоки: начало работы&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"zadachi-v-skrame\"&gt;&lt;a href=\"api-reference/tasks/index.html#zadachi-v-skrame\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Задачи в Скраме&lt;/span&gt;&lt;/a&gt;Задачи в Скраме&lt;/h2&gt;\n&lt;p&gt;Задачи в Скраме — это стандартные задачи Битрикс24 с расширенными возможностями для работы по методологии Скрам. В скраме команда может:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;оценивать сложность задач с помощью сторипоинтов&lt;/li&gt;\n&lt;li&gt;прикреплять задачи к эпикам&lt;/li&gt;\n&lt;li&gt;размещать задачи в бэклоге и спринтах&lt;/li&gt;\n&lt;li&gt;передвигать задачи по стадиям спринта в процессе работы&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Подробнее о Скраме и его методах — в статье &lt;a href=\"api-reference/sonet-group/scrum/index.html\"&gt;Скрам: обзор методов&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/13660630/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Битрикс24.Скрам&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"rezhimy-raboty-s-zadachami\"&gt;&lt;a href=\"api-reference/tasks/index.html#rezhimy-raboty-s-zadachami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Режимы работы с задачами&lt;/span&gt;&lt;/a&gt;Режимы работы с задачами&lt;/h2&gt;\n&lt;p&gt;Канбан — это инструмент, который помогает визуально представить работу с задачами в виде колонок и карточек. Колонки — это стадии работы, карточки — задачи. Канбан используется для работы с задачами в группах и проектах.&lt;/p&gt;\n&lt;p&gt;«Мой план» — это режим управления своими задачами в виде канбана. У каждого сотрудника будут свои стадии «Моего плана».&lt;/p&gt;\n&lt;p&gt;Управлять стадиями канбана и «Моего плана» можно группой методов &lt;a href=\"api-reference/tasks/stages/index.html\"&gt;task.stages.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"zadachi-v-plane-na-den\"&gt;&lt;a href=\"api-reference/tasks/index.html#zadachi-v-plane-na-den\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Задачи в «Плане на день»&lt;/span&gt;&lt;/a&gt;Задачи в «Плане на день»&lt;/h2&gt;\n&lt;p&gt;«План на день» — это список дел, задач и встреч, которые вы запланировали на рабочий день. Метод &lt;a href=\"api-reference/tasks/planner/index.html\"&gt;task.planner.getlist&lt;/a&gt; получает список задач из «Плана на день».&lt;/p&gt;\n&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/tasks/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;Виджеты&lt;/h2&gt;\n&lt;p&gt;В карточку задачи можно встроить приложение. Благодаря встраиванию можно будет использовать приложение и не покидать карточку.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/task/view-tab.html\"&gt;Вкладка в карточке задачи&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q950j21k\"&gt;TASK_VIEW_TAB&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/task/view-sidebar.html\"&gt;Правая панель карточки задачи&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-hejyt1lu\"&gt;TASK_VIEW_SIDEBAR&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/task/view-top-panel.html\"&gt;Ссылка в верхней части карточки задачи&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-mjdsp4gx\"&gt;TASK_VIEW_TOP_PANEL&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Приложение можно встроить в списке задач:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/task/index.html\"&gt;Пункт контекстного меню списка&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zaoj0m83\"&gt;TASK_LIST_CONTEXT_MENU&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;В режимах работы с задачами канбан или «Мой план» есть ещё два специальных места для встройки:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/task/list-toolbar.html\"&gt;Пункт основного выпадающего меню&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qjll094j\"&gt;TASK_USER_LIST_TOOLBAR&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3cje9bmw\"&gt;TASK_GROUP_LIST_TOOLBAR&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/task/robot-designer-toolbar.html\"&gt;Пункт основного выпадающего меню около настроек роботов&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1mwbm96t\"&gt;TASK_ROBOT_DESIGNER_TOOLBAR&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов и событий&lt;/span&gt;&lt;/a&gt;Обзор методов и событий&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iayt5k12\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"osnovnye\"&gt;&lt;a href=\"api-reference/tasks/index.html#osnovnye\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Основные&lt;/span&gt;&lt;/a&gt;Основные&lt;/h3&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-u9d5pivh\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"методы\" data-diplodoc-key=\"%d0%9c%d0%b5%d1%82%d0%be%d0%b4%d1%8b\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Методы&lt;/div&gt;\n&lt;div data-diplodoc-id=\"события\" data-diplodoc-key=\"%d0%a1%d0%be%d0%b1%d1%8b%d1%82%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;События&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"eimxfg58\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Методы\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;tasks.task.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-update.html\"&gt;tasks.task.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о задаче по &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-glrfyrql\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;tasks.task.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список задач&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-files-attach.html\"&gt;tasks.task.files.attach&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Прикрепляет файлы к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-delegate.html\"&gt;tasks.task.delegate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Делегирует задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-counters-get.html\"&gt;tasks.task.counters.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает счетчики пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-start.html\"&gt;tasks.task.start&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переводит задачу в статус «выполняется»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-pause.html\"&gt;tasks.task.pause&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Останавливает выполнение задачи и переводит в статус «ждет выполнения»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-defer.html\"&gt;tasks.task.defer&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переводит задачу в статус «отложена»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-complete.html\"&gt;tasks.task.complete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Переводит задачу в статус «завершена»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-renew.html\"&gt;tasks.task.renew&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Возобновляет задачу после ее завершения&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-approve.html\"&gt;tasks.task.approve&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Принимает задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-disapprove.html\"&gt;tasks.task.disapprove&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Отклоняет задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-delete.html\"&gt;tasks.task.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет задачу&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-start-watch.html\"&gt;tasks.task.startwatch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Позволяет наблюдать за задачей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-stop-watch.html\"&gt;tasks.task.stopwatch&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Останавливает наблюдение за задачей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-favorite-add.html\"&gt;tasks.task.favorite.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет задачи в избранное&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-favorite-remove.html\"&gt;tasks.task.favorite.remove&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет задачи из избранного&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-get-fields.html\"&gt;tasks.task.getFields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает доступные поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-get-access.html\"&gt;tasks.task.getaccess&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Проверяет доступ к задаче&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-history-list.html\"&gt;tasks.task.history.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает историю задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-mute.html\"&gt;tasks.task.mute&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Включает режим «Без звука»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/tasks-task-unmute.html\"&gt;tasks.task.unmute&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Выключает режим «Без звука»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/task-dependence-add.html\"&gt;task.dependence.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает зависимость одной задачи от другой&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/task-dependence-delete.html\"&gt;task.dependence.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет зависимость одной задачи от другой&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;div id=\"m5upha0y\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"События\"&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Событие&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Вызывается&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/events-tasks/on-task-add.html\"&gt;OnTaskAdd&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При добавлении задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/events-tasks/on-task-update.html\"&gt;OnTaskUpdate&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При обновлении задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/events-tasks/on-task-delete.html\"&gt;OnTaskDelete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;При удалении задачи&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h3 id=\"rezultat-zadachi\"&gt;&lt;a href=\"api-reference/tasks/index.html#rezultat-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Результат задачи&lt;/span&gt;&lt;/a&gt;Результат задачи&lt;/h3&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/result/tasks-task-result-add-from-comment.html\"&gt;tasks.task.result.addFromCommentt&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет комментарий в результат&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/result/tasks-task-result-list.html\"&gt;tasks.task.result.list&lt;/a&g
