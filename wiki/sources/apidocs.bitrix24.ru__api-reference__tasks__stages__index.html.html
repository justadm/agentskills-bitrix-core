            {"data":{"leading":false,"html":"&lt;p&gt;Канбан — это инструмент, который помогает визуально представить работу с задачами в виде колонок и карточек. Колонки — это стадии работы, карточки — задачи. Канбан используется для работы с задачами в группах и проектах.&lt;/p&gt;\n&lt;p&gt;«Мой план» — это режим управления своими задачами в виде канбана. У каждого сотрудника будут свои стадии «Моего плана».&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/stages/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/18075818/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Канбан: как следить за задачами в проектах&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17729742/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как работать с задачами в режиме «Мой план»&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"svyaz-stadij-kanbana-i-moego-plana-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/tasks/stages/index.html#svyaz-stadij-kanbana-i-moego-plana-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь стадий канбана и «Моего плана» с другими объектами&lt;/span&gt;&lt;/a&gt;Связь стадий канбана и «Моего плана» с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Группа.&lt;/strong&gt; Стадия канбана привязывается к группе по идентификатору объекта &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pi9nvq7i\"&gt;ENTITY_ID&lt;/code&gt;. Идентификатор можно получить методом &lt;a href=\"api-reference/sonet-group/sonet-group-create.html\"&gt;создания новой группы&lt;/a&gt; или методом &lt;a href=\"api-reference/sonet-group/socialnetwork-api-workgroup-list.html\"&gt;получения списка групп&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; Стадия «Моего плана» привязана к пользователю. Любой пользователь, в том числе администратор портала, может менять стадии только в своем плане.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Стадия.&lt;/strong&gt; Стадии канбана или «Моего плана» могут быть связаны друг с другом. Укажите идентификатор стадии в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-bij5g5bd\"&gt;AFTER_ID&lt;/code&gt;, после которой нужно добавить новую стадию. Идентификатор можно получить методом &lt;a href=\"api-reference/tasks/stages/task-stages-add.html\"&gt;добавления новой стадии&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/stages/task-stages-get.html\"&gt;получения списка стадий&lt;/a&gt;. Если идентификатор не заполнить или указать ноль, стадия добавится в начало канбана.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/22699004/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как создать группу и проект&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-peremeshat-zadachi-po-stadiyam\"&gt;&lt;a href=\"api-reference/tasks/stages/index.html#kak-peremeshat-zadachi-po-stadiyam\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как перемещать задачи по стадиям&lt;/span&gt;&lt;/a&gt;Как перемещать задачи по стадиям&lt;/h2&gt;\n&lt;p&gt;Переместить задачу с одной стадии на другую можно методом &lt;a href=\"api-reference/tasks/stages/task-stages-move-task.html\"&gt;task.stages.movetask&lt;/a&gt;. Метод позволяет указать &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iio8z5c2\"&gt;ID&lt;/code&gt; задачи, перед или после которой нужно поставить перемещаемую задачу. Получить идентификатор задачи можно методом &lt;a href=\"api-reference/tasks/tasks-task-add.html\"&gt;создания задачи&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;получения списка задач&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Можно переместить задачу:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;в канбане группы при наличии доступа к группе&lt;/li&gt;\n&lt;li&gt;в «Моем плане»&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Проверить возможность перемещения задачи позволяет метод &lt;a href=\"api-reference/tasks/stages/task-stages-can-move-task.html\"&gt;task.stages.canmovetask&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"kak-poluchit-spisok-zadach-stadii\"&gt;&lt;a href=\"api-reference/tasks/stages/index.html#kak-poluchit-spisok-zadach-stadii\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как получить список задач стадии&lt;/span&gt;&lt;/a&gt;Как получить список задач стадии&lt;/h2&gt;\n&lt;p&gt;Список задач стадии можно получить методом &lt;a href=\"api-reference/tasks/tasks-task-list.html\"&gt;task.task.list&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Выборка из стадий канбана группы.&lt;/strong&gt; В массиве фильтра передайте ключ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-iu6cdlrz\"&gt;STAGE_ID&lt;/code&gt; с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5vi06xzi\"&gt;ID&lt;/code&gt; нужной вам стадии. Если вы выбираете задачи первой стадии, передайте в &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xfgu6znf\"&gt;STAGE_ID&lt;/code&gt; массив значений, состоящий из &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-heg890yx\"&gt;0&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xuwweg4b\"&gt;ID&lt;/code&gt; вашей стадии &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ifxhhprx\"&gt;[0, ID]&lt;/code&gt;. Дополнительно  отфильтруйте выборку по группе.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Выборка из «Моего плана».&lt;/strong&gt; В массиве фильтра передайте ключ &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nobh8aid\"&gt;STAGE_ID&lt;/code&gt; с &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pvzc0ol6\"&gt;ID&lt;/code&gt; стадии. Передавать массив значений не требуется.&lt;/p&gt;\n&lt;p&gt;Получить идентификатор стадии канбана или «Моего плана» можно методом &lt;a href=\"api-reference/tasks/stages/task-stages-add.html\"&gt;добавления стадии&lt;/a&gt; или методом &lt;a href=\"api-reference/tasks/stages/task-stages-get.html\"&gt;получения списка стадий&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/stages/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-uaozgcfw\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;любой пользователь для стадий «Моего плана»&lt;/li&gt;\n&lt;li&gt;любой пользователь с доступом к группе для стадий канбана&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/stages/task-stages-add.html\"&gt;task.stages.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет стадии канбана или «Моего плана»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/stages/task-stages-update.html\"&gt;task.stages.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет стадии канбана или «Моего плана»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/stages/task-stages-get.html\"&gt;task.stages.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает стадии канбана или «Моего плана»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/stages/task-stages-can-move-task.html\"&gt;task.stages.canmovetask&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Определяет, может ли текущий пользователь перемещать задачи в указанном объекте&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/stages/task-stages-move-task.html\"&gt;task.stages.movetask&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Перемещает задачи из одной стадии в другую&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/stages/task-stages-delete.html\"&gt;task.stages.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет стадии канбана или «Моего плана»&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Связь стадий канбана и «Моего плана» с другими объектами","href":"api-reference/tasks/stages/index.html#svyaz-stadij-kanbana-i-moego-plana-s-drugimi-obuektami
