        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Новая карточка задач перевела комментарии в чат. Старые методы задач продолжают работать, кроме операций с комментариями. Изменения доступны с версии модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4iw16y7w\"&gt;tasks 25.700.0&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"chto-ostalos-bez-izmenenij\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#chto-ostalos-bez-izmenenij\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что осталось без изменений&lt;/span&gt;&lt;/a&gt;Что осталось без изменений&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/tasks/index.html\"&gt;task.*&lt;/a&gt; методы для создания и обновления задач, файлов, чек-листов работают как раньше.&lt;/li&gt;\n&lt;li&gt;Добавление комментария через &lt;a href=\"api-reference/tasks/comment-item/task-comment-item-add.html\"&gt;task.commentitem.add&lt;/a&gt; работает.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"comments\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#comments\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Что изменилось в комментариях&lt;/span&gt;&lt;/a&gt;Что изменилось в комментариях&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Обновление и удаление комментариев методами task.commentitem.update и task.commentitem.delete больше не работает. Используйте методы Чата:\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/im-message-update.html\"&gt;im.message.update&lt;/a&gt; для изменения текста,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/chats/messages/im-message-delete.html\"&gt;im.message.delete&lt;/a&gt; для удаления сообщения.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;Получение списка комментариев через task.commentitem.getlist не работает. Получайте сообщения чата задачи через &lt;a href=\"api-reference/chats/messages/im-dialog-messages-get.html\"&gt;im.dialog.messages.get&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Используйте метод &lt;a href=\"api-reference/chats/files/im-disk-file-commit.html\"&gt;im.disk.file.commit&lt;/a&gt; для отправки файлов в чат задачи.&lt;/li&gt;\n&lt;li&gt;Чат, связанный с задачей, возвращается в ответе &lt;a href=\"api-reference/tasks/tasks-task-get.html\"&gt;tasks.task.get&lt;/a&gt;. Используйте его идентификатор для запросов в методах чатов.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"kak-poluchit-id-chata-zadachi-cherez-taskstaskget\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#kak-poluchit-id-chata-zadachi-cherez-taskstaskget\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как получить ID чата задачи через tasks.task.get&lt;/span&gt;&lt;/a&gt;Как получить ID чата задачи через tasks.task.get&lt;/h3&gt;\n&lt;h4 id=\"staraya-versiya-api\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#staraya-versiya-api\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Старая версия api&lt;/span&gt;&lt;/a&gt;Старая версия api&lt;/h4&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs http\"&gt;POST https://{адрес_установки}/rest/{id_пользователя}/{пароль_rest-приложения}/tasks.task.get\n{\n    \"taskId\": 51,\n    \"select\": [\"CHAT_ID\"]\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"61\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-61\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-61\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-61.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Пример ответа:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"result\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"task\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"3835\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"chatId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;2537&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"favorite\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"N\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"group\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;[&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;]&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"action\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                ...\n            &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;    \n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"65\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-65\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-65\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-65.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;h4 id=\"novaya-versiya-api\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#novaya-versiya-api\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Новая версия api&lt;/span&gt;&lt;/a&gt;Новая версия api&lt;/h4&gt;\n&lt;p&gt;Запросите у задачи поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4l4zmyom\"&gt;chat.id&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-goedwvw5\"&gt;chat.entityId&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-il76r32d\"&gt;chat.entityType&lt;/code&gt;:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs http\"&gt;POST https://{адрес_установки}/rest/api/{id_пользователя}/{пароль_rest-приложения}/tasks.task.get\n{\n    \"id\": 51,\n    \"select\": [\"id\", \"chat.id\", \"chat.entityId\", \"chat.entityType\"]\n}\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"72\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-72\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-72\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-72.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;p&gt;Пример ответа:&lt;/p&gt;\n\n    &lt;div class=\"yfm-clipboard\"&gt;\n        &lt;pre&gt;&lt;code class=\"hljs json\"&gt;&lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n    &lt;span class=\"hljs-attr\"&gt;\"result\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n        &lt;span class=\"hljs-attr\"&gt;\"item\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;51&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n            &lt;span class=\"hljs-attr\"&gt;\"chat\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-punctuation\"&gt;{&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"id\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;58&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"entityId\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-number\"&gt;51&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;,&lt;/span&gt;\n                &lt;span class=\"hljs-attr\"&gt;\"entityType\"&lt;/span&gt;&lt;span class=\"hljs-punctuation\"&gt;:&lt;/span&gt; &lt;span class=\"hljs-string\"&gt;\"TASKS_TASK\"&lt;/span&gt;\n            &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n        &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n    &lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;span class=\"hljs-punctuation\"&gt;}&lt;/span&gt;\n&lt;/code&gt;&lt;/pre&gt;\n\n        &lt;button class=\"yfm-clipboard-button\"&gt;\n            &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" class=\"yfm-clipboard-icon\" data-animation=\"76\"&gt;\n                &lt;path fill=\"currentColor\" d=\"M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z\"&gt;&lt;/path&gt;\n                &lt;path stroke=\"currentColor\" fill=\"transparent\" stroke-width=\"1.5\" d=\"M9.5 13l3 3l5 -5\" visibility=\"hidden\"&gt;\n                    &lt;animate id=\"visibileAnimation-76\" attributeName=\"visibility\" from=\"hidden\" to=\"visible\" dur=\"0.2s\" fill=\"freeze\" begin&gt;&lt;/animate&gt;\n                    &lt;animate id=\"hideAnimation-76\" attributeName=\"visibility\" from=\"visible\" to=\"hidden\" dur=\"1s\" begin=\"visibileAnimation-76.end+1\" fill=\"freeze\"&gt;&lt;/animate&gt;\n                &lt;/path&gt;\n            &lt;/svg&gt;\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;С версии модуля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3waq2558\"&gt;tasks 25.700.0&lt;/code&gt; доступен вызов некоторых методов в новом формате.&lt;/p&gt;\n&lt;p&gt;Вызов нового api отличается добавлением параметра /api/ в запрос.&lt;/p&gt;\n&lt;p&gt;Старая версия:&lt;/p&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qoe5gkx8\"&gt;https://{адрес_установки}/rest/{id_пользователя}/{пароль_rest-приложения}/tasks.task.get&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;Новая версия:&lt;/p&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wuqji3pw\"&gt;https://{адрес_установки}/rest/api/{id_пользователя}/{пароль_rest-приложения}/tasks.task.get&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;Для новой версии вызова метода доступна документация в формате OpenApi. Для получения OpenApi вызовите метод &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2jg3bppq\"&gt;documentation&lt;/code&gt;:&lt;/p&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-9wihoa2j\"&gt;https://{адрес_установки}/rest/api/{id_пользователя}/{пароль_rest-приложения}/documentation&lt;/code&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"kak-otpravlyat-soobsheniya-v-zadachu\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#kak-otpravlyat-soobsheniya-v-zadachu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как отправлять сообщения в задачу&lt;/span&gt;&lt;/a&gt;Как отправлять сообщения в задачу&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Старый метод &lt;a href=\"api-reference/tasks/comment-item/task-comment-item-add.html\"&gt;task.commentitem.add&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Новый метод &lt;a href=\"api-reference/rest-v3/tasks/tasks-task-chat-message-send.html\"&gt;tasks.task.chat.message.send&lt;/a&gt;. Чтобы отправить файл в чат задачи, используйте метод &lt;a href=\"api-reference/chats/files/im-disk-file-commit.html\"&gt;im.disk.file.commit&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"sobytiya\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#sobytiya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;События&lt;/span&gt;&lt;/a&gt;События&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Событие &lt;a href=\"api-reference/tasks/comment-item/events-comment/on-task-comment-add.html\"&gt;OnTaskCommentAdd&lt;/a&gt; работает. При работе с новой карточкой задачи в обработчик будут приходить параметры:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-j19hmtxv\"&gt;MESSAGE_ID&lt;/code&gt; с идентификатором сообщения в чате задачи,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-epeokzlo\"&gt;TASK_ID&lt;/code&gt; с идентификатором задачи,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fb6akj36\"&gt;'ID' =&amp;gt; 0&lt;/code&gt; идентификатор комментария будет равен нулю.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;События &lt;a href=\"api-reference/tasks/comment-item/events-comment/on-task-comment-update.html\"&gt;OnTaskCommentUpdate&lt;/a&gt; и &lt;a href=\"api-reference/tasks/comment-item/events-comment/on-task-comment-delete.html\"&gt;OnTaskCommentDelete&lt;/a&gt; не работают в новой карточке.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"rezultat-zadachi\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#rezultat-zadachi\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Результат задачи&lt;/span&gt;&lt;/a&gt;Результат задачи&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Метод &lt;a href=\"api-reference/tasks/result/tasks-task-result-list.html\"&gt;tasks.task.result.list&lt;/a&gt; работает. При работе с новой карточкой задачи все результаты задачи будут возвращаться с параметром &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-q7454jzj\"&gt;commentId: 0&lt;/code&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Методы &lt;a href=\"api-reference/tasks/result/tasks-task-result-add-from-comment.html\"&gt;tasks.task.result.addFromComment&lt;/a&gt; и &lt;a href=\"api-reference/tasks/result/tasks-task-result-delete-from-comment.html\"&gt;tasks.task.result.deleteFromComment&lt;/a&gt; не работают в новой карточке.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"vstrojki\"&gt;&lt;a href=\"api-reference/tasks/tasks-new.html#vstrojki\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Встройки&lt;/span&gt;&lt;/a&gt;Встройки&lt;/h2&gt;\n&lt;p&gt;Расположение мест встроек &lt;a href=\"api-reference/widgets/task/view-sidebar.html\"&gt;TASK_VIEW_SIDEBAR&lt;/a&gt;, &lt;a href=\"api-reference/widgets/task/view-top-panel.html\"&gt;TASK_VIEW_TOP_PANEL&lt;/a&gt;, &lt;a href=\"api-reference/widgets/task/view-tab.html\"&gt;TASK_VIEW_TAB&lt;/a&gt; не актуально в новой карточке задач. В новой карточке все встройки выводятся в едином блоке «Приложения».&lt;/p&gt;\n&lt;p&gt;Все ранее зарегистрированные встройки продолжают работать. Можно регистрировать новые встройки, они также будут показаны в блоке «Приложения».&lt;/p&gt;\n&lt;p&gt;&lt;img src=\"api-reference/tasks/_images/widget.png\" alt=\"Встроенные приложения\" /&gt;&lt;/p&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Что осталось без изменений","href":"api-reference/tasks/tasks-new.html#chto-ostalos-bez-izmenenij","level":2},{"title":"Что изменилось в комментариях","href":"api-reference/tasks/tasks-new.html#comments","level":2,"items":[{"title":"Как получить ID чата задачи через tasks.task.get","href":"api-reference/tasks/tasks-new.html#kak-poluchit-id-chata-zadachi-cherez-taskstaskget","level":3,"items":[{"title":"Старая версия api","href":"api-reference/tasks/tasks-new.html#staraya-versiya-api","level":4},{"title":"Новая версия api","href":"api-reference/tasks/tasks-new.html#novaya-versiya-api","level":4}]}]},{"title":"Как отправлять сообщения в задачу","href":"api-reference/tasks/tasks-new.html#kak-otpravlyat-soobsheniya-v-zadachu","level":2},{"title":"События","href":"api-reference/tasks/tasks-new.html#sobytiya","level":2},{"title":"Результат задачи","href":"api-reference/tasks/tasks-new.html#rezultat-zadachi","level":2},{"title":"Встройки","href":"api-reference/tasks/tasks-new.html#vstrojki","level":2}],"title":"Новая карточка задач: обзор изменений"},"router":{"pathname":"api-reference/tasks/tasks-new","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
