        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В задаче есть набор системных полей: исполнитель, наблюдатели, крайний срок выполнения, теги и так далее. Если системных полей недостаточно, вы можете создать собственные — пользовательские поля. Пользовательские поля позволяют хранить информацию в различных форматах данных: строка, число, дата со временем и да/нет.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/tasks/user-field/index.html#all-methods\"&gt;все методы и события&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/2573061/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;пользовательские поля в задачах&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"osobennosti\"&gt;&lt;a href=\"api-reference/tasks/user-field/index.html#osobennosti\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Особенности&lt;/span&gt;&lt;/a&gt;Особенности&lt;/h2&gt;\n&lt;p&gt;При создании пользовательского поля методом &lt;a href=\"api-reference/tasks/user-field/task-item-user-field-add.html\"&gt;task.item.userfield.add&lt;/a&gt;, в названии поля &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-k7osg3xw\"&gt;FIELD_NAME&lt;/code&gt; обязательно использовать префикс &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-h3s2x4gw\"&gt;UF_&lt;/code&gt;. Если не указать префикс, система автоматически добавит его в начало названия.&lt;br /&gt;\nПолучить список всех пользовательских полей задач можно методом &lt;a href=\"api-reference/tasks/user-field/task-item-user-field-get-list.html\"&gt;task.item.userfield.getlist&lt;/a&gt;. В списке будет три системных поля задач для связи с другими объектами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rbcq1b3u\"&gt;UF_CRM_TASK&lt;/code&gt; —  с объектами CRM&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r93p78y5\"&gt;UF_MAIL_MESSAGE&lt;/code&gt; —  с письмом Почты&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-6koxeycc\"&gt;UF_TASK_WEBDAV_FILES&lt;/code&gt; — c файлами Диска&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Они созданы на основе пользовательских полей, поэтому есть в списке. Подробнее о связях задачи с другими объектами — в статье &lt;a href=\"api-reference/tasks/index.html\"&gt;Задачи: обзор методов&lt;/a&gt;.&lt;/p&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/tasks/user-field/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-itervfy3\"&gt;task&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-add.html\"&gt;task.item.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Создает пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-update.html\"&gt;task.item.userfield.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-get.html\"&gt;task.item.userfield.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает поле по идентификатору &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-z5o6bxg5\"&gt;id&lt;/code&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-get-list.html\"&gt;task.item.userfield.getlist&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список полей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-delete.html\"&gt;task.item.userfield.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-get-types.html\"&gt;task.item.userfield.gettypes&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает все доступные типы данных&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/tasks/user-field/task-item-user-field-get-fields.html\"&gt;task.item.userfield.getfields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает все доступные поля пользовательского поля&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Особенности","href":"api-reference/tasks/user-field/index.html#osobennosti","level":2},{"title":"Обзор методов","href":"api-reference/tasks/user-field/index.html#all-methods","level":2}],"title":"Пользовательские поля в задачах: обзор методов"},"router":{"pathname":"api-reference/tasks/user-field/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
