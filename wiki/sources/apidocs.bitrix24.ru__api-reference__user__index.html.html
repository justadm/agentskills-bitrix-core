            {"data":{"leading":false,"html":"&lt;p&gt;Профиль пользователя — это ключевой объект Битрикс24. Без профиля пользователя сотрудник не сможет использовать корпоративный портал и CRM. По идентификатору пользователя можно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;настраивать доступы,&lt;/li&gt;\n&lt;li&gt;распределять работу между сотрудниками,&lt;/li&gt;\n&lt;li&gt;получать информацию о действиях сотрудников.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/user/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Пользовательская документация: &lt;a href=\"https://helpdesk.bitrix24.ru/open/21141922/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как пригласить сотрудников в Битрикс24&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"kak-rabotat-s-polzovatelyami\"&gt;&lt;a href=\"api-reference/user/index.html#kak-rabotat-s-polzovatelyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Как работать с пользователями&lt;/span&gt;&lt;/a&gt;Как работать с пользователями&lt;/h2&gt;\n&lt;p&gt;Используйте метод:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/user/user-add.html\"&gt;user.add&lt;/a&gt;, чтобы пригласить новых пользователей. Длина имени пользователя не должна превышать 25 символов.&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/user/user-update.html\"&gt;user.update&lt;/a&gt;, чтобы редактировать профили существующих пользователей, уволить или принять обратно сотрудника.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользователськая документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/26213326/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как уволить сотрудника из Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/user/index.html#svyaz-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь с другими объектами&lt;/span&gt;&lt;/a&gt;Связь с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-3u6psztn\"&gt;ID&lt;/code&gt; пользователя используется в системных полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;редактируемые: ответственный, наблюдатели,&lt;/li&gt;\n&lt;li&gt;только для чтения: кто создал, кто изменил, кто передвинул на стадию.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Используйте методы &lt;a href=\"api-reference/crm/universal/index.html\"&gt;crm.item.*&lt;/a&gt; для чтения или изменения полей.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Календарь.&lt;/strong&gt; Для работы с календарем сотрудника, укажите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-frcrwbkf\"&gt;ID&lt;/code&gt; пользователя в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ccc75ehx\"&gt;ownerID&lt;/code&gt; в методах &lt;a href=\"api-reference/calendar/index.html\"&gt;calendar.section.*&lt;/a&gt;. Чтобы создать или изменить встречу с несколькими участниками, укажите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-fe82l0d5\"&gt;ID&lt;/code&gt; пользователей в полях &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ykj04geo\"&gt;host&lt;/code&gt; и &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tdo6a99x\"&gt;attendees&lt;/code&gt; в методах &lt;a href=\"api-reference/calendar/calendar-event/index.html\"&gt;calendar.event.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Лента новостей.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dqk45wq5\"&gt;ID&lt;/code&gt; пользователей в методах:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/log/index.html\"&gt;log.blogpost.*&lt;/a&gt;, чтобы адресовать пост конкретным сотрудникам,&lt;/li&gt;\n&lt;li&gt;&lt;a href=\"api-reference/log/log-blogpost-getusers-important.html\"&gt;log.blogpost.getusers.important&lt;/a&gt;, чтобы проверить, кто из сотрудников прочитал важный пост.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Интернет-магазин.&lt;/strong&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pfa7p7xt\"&gt;ID&lt;/code&gt; пользователя используется в системных полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;редактируемые: ответственный за заказ, отгрузку, оплату,&lt;/li&gt;\n&lt;li&gt;только для чтения: кто изменил статус, кто промаркировал, кто отменил, кто оформил возврат.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Используйте методы &lt;a href=\"api-reference/sale/order/index.html\"&gt;sale.order.*&lt;/a&gt;, &lt;a href=\"api-reference/sale/payment/index.html\"&gt;sale.payment.*&lt;/a&gt;, &lt;a href=\"api-reference/sale/shipment/index.html\"&gt;sale.shipment.*&lt;/a&gt; для чтения или изменения полей.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Чаты.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-n1o5vbmu\"&gt;ID&lt;/code&gt; пользователей в методах &lt;a href=\"api-reference/chats/index.html\"&gt;im.chat.*&lt;/a&gt;, &lt;a href=\"api-reference/chats/chat-users/index.html\"&gt;im.chat.user.*&lt;/a&gt;, &lt;a href=\"api-reference/chats/users/index.html\"&gt;im.user.*&lt;/a&gt;, чтобы назначить владельца чата, отредактировать список участников или получить информацию об участниках чата.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Открытые линии.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ku3f8yg7\"&gt;ID&lt;/code&gt; пользователей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;чтобы настроить очередь ответственных сотрудников в методах &lt;a href=\"api-reference/imopenlines/openlines/index.html\"&gt;imopenlines.config.*&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;назначать диалоги на сотрудников в  методах &lt;a href=\"api-reference/imopenlines/openlines/chat-bots/index.html\"&gt;imopenlines.bot.session.*&lt;/a&gt;, &lt;a href=\"api-reference/imopenlines/openlines/chats/index.html\"&gt;imopenlines.crm.chat.user.*&lt;/a&gt;, &lt;a href=\"api-reference/imopenlines/openlines/operators/index.html\"&gt;imopenlines.operator.*&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Телефония.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-zqdbhblz\"&gt;ID&lt;/code&gt; пользователя:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;чтобы направить на него телефонный звонок в методах &lt;a href=\"api-reference/telephony/index.html\"&gt;telephony.externalcall.*&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;получить статистику по звонкам сотрудника методом &lt;a href=\"api-reference/telephony/voximplant-statistic-get.html\"&gt;voximplant.statistic.get&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;настроить SIP-aппарат в методах &lt;a href=\"api-reference/telephony/voximplant/users/index.html\"&gt;voximplant.user.*&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Учет рабочего времени.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-m4vft01j\"&gt;ID&lt;/code&gt; пользователей:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;чтобы управлять рабочим днем пользователя в методах &lt;a href=\"api-reference/timeman/base/index.html\"&gt;timeman.*&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;настраивать инструмент для контроля рабочего времени в методах &lt;a href=\"api-reference/timeman/timecontrol/index.html\"&gt;timeman.timecontrol.*&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;получать информацию о рабочем графике методом &lt;a href=\"api-reference/timeman/schedule/index.html\"&gt;timeman.schedule.get&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Задачи.&lt;/strong&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-irqd47gy\"&gt;ID&lt;/code&gt; пользователя используется в системных полях:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;редактируемые: постановщик, исполнитель, соисполнители, наблюдатели,&lt;/li&gt;\n&lt;li&gt;только для чтения: кто изменил задачу, кто изменил статус, кто завершил задачу,&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Используйте методы &lt;a href=\"api-reference/tasks/index.html\"&gt;tasks.task.*&lt;/a&gt; для чтения или изменения полей. Чтобы узнать или отредактировать затраченное время по задаче для пользователя — &lt;a href=\"api-reference/tasks/elapsed-item/index.html\"&gt;task.elapseditem.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Рабочие группы и проекты.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-79cbn8l6\"&gt;ID&lt;/code&gt; пользователей в методах &lt;a href=\"api-reference/sonet-group/members/index.html\"&gt;sonet_group.user.*&lt;/a&gt;, чтобы изменять состав участников группы и их роли. Укажите &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-v3zee8u7\"&gt;ID&lt;/code&gt; пользователя в поле &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-u8lt39ze\"&gt;SCRUM_MASTER_ID&lt;/code&gt;, чтобы сделать из группы &lt;a href=\"api-reference/sonet-group/scrum/index.html\"&gt;Скрам&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Структура компании.&lt;/strong&gt; Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-55buc4tt\"&gt;ID&lt;/code&gt; пользователей, чтобы управлять привязкой сотрудников к отделам компании в методах &lt;a href=\"api-reference/departments/index.html\"&gt;department.*&lt;/a&gt;.&lt;/p&gt;\n&lt;h3 id=\"tip-privyazka-k-polzovatelyu\"&gt;&lt;a href=\"api-reference/user/index.html#tip-privyazka-k-polzovatelyu\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Тип «привязка к пользователю»&lt;/span&gt;&lt;/a&gt;Тип «привязка к пользователю»&lt;/h3&gt;\n&lt;p&gt;В Битрикс24 можно создавать пользовательские поля с типом «привязка к пользователю». Поля принимают &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-tisyrb5a\"&gt;ID&lt;/code&gt; пользователя, если они простые, и массив из &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qvsfwjyy\"&gt;ID&lt;/code&gt;, если множественные.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Пользовательские поля доступны в разделах &lt;a href=\"api-reference/crm/index.html\"&gt;CRM&lt;/a&gt; и &lt;a href=\"api-reference/sale/index.html\"&gt;интернет-магазин&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Пользовательские свойства доступны в разделах &lt;a href=\"api-reference/lists/index.html\"&gt;универсальных списков&lt;/a&gt;, &lt;a href=\"api-reference/entity/index.html\"&gt;хранилищ данных&lt;/a&gt; и в &lt;a href=\"api-reference/catalog/index.html\"&gt;торговом каталоге&lt;/a&gt;.&lt;/li&gt;\n&lt;li&gt;Параметры и переменные доступны в &lt;a href=\"api-reference/bizproc/index.html\"&gt;бизнес-процессах&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"prava-dostupa-polzovatelya\"&gt;&lt;a href=\"api-reference/user/index.html#prava-dostupa-polzovatelya\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Права доступа пользователя&lt;/span&gt;&lt;/a&gt;Права доступа пользователя&lt;/h3&gt;\n&lt;p&gt;Используйте &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-0b92qdjh\"&gt;ID&lt;/code&gt; пользователя, чтобы настроить права доступа в методах:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;файлов диска &lt;a href=\"api-reference/disk/folder/disk-folder-upload-file.html\"&gt;disk.folder.uploadfile&lt;/a&gt; и &lt;a href=\"api-reference/disk/storage/disk-storage-upload-file.html\"&gt;disk.storage.uploadfile&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;генератора документов &lt;a href=\"api-reference/document-generator/role/document-generator-role-fill-accesses.html\"&gt;documentgenerator.role.fillaccesses&lt;/a&gt;,&lt;/li&gt;\n&lt;li&gt;сайтов &lt;a href=\"api-reference/landing/rights/role-model/landing-role-set-rights.html\"&gt;landing.site.setRights&lt;/a&gt;.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\"rabota-s-ekstranet-polzovatelyami\"&gt;&lt;a href=\"api-reference/user/index.html#rabota-s-ekstranet-polzovatelyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Работа с экстранет-пользователями&lt;/span&gt;&lt;/a&gt;Работа с экстранет-пользователями&lt;/h2&gt;\n&lt;p&gt;Экстранет-пользователи — это пользователи, которые имеют ограниченный доступ к функционалу Битрикс24. CRM недоступна для экстранет-пользователей, но доступны чаты, группы, календарь.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользователськая документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/17983050/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Экстранет-пользователи в Битрикс24&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;p&gt;Чтобы пригласить экстранет-пользователя, используйте метод &lt;a href=\"api-reference/user/user-add.html\"&gt;user.add&lt;/a&gt; с параметрами:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-2t3ppzrq\"&gt;EXTRANET: Y&lt;/code&gt; — отметка внешнего пользователя,&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-wghttd41\"&gt;SONET_GROUP_ID: [...]&lt;/code&gt; — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-66ruejip\"&gt;ID&lt;/code&gt; групп, в которых будет состоять пользователь.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;При добавлении экстранет-пользователя в группу методом &lt;a href=\"api-reference/sonet-group/members/sonet-group-user-add.html\"&gt;sonet_group.user.add&lt;/a&gt;, группа автоматически меняет тип на внешнюю.&lt;/p&gt;\n&lt;h2 id=\"vidzhety\"&gt;&lt;a href=\"api-reference/user/index.html#vidzhety\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Виджеты&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;Виджеты&lt;/strong&gt;&lt;/h2&gt;\n&lt;p&gt;В профиль пользователя можно встроить приложение. Благодаря встраиванию можно будет использовать приложение и не покидать карточку пользователя.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/user-profile/profile-menu.html\"&gt;Пункт контекстного меню в профиле&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r0lyp7ja\"&gt;USER_PROFILE_MENU&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;a href=\"api-reference/widgets/user-profile/profile-toolbar.html\"&gt;Пункт контекстного меню верхней кнопки профиля&lt;/a&gt; &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-rfi2p2sl\"&gt;USER_PROFILE_TOOLBAR&lt;/code&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/widgets/index.html\"&gt;Механизм встройки виджетов&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"urovni-dostupa-k-dannym-polzovatelej\"&gt;&lt;a href=\"api-reference/user/index.html#urovni-dostupa-k-dannym-polzovatelej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Уровни доступа к данным пользователей&lt;/span&gt;&lt;/a&gt;Уровни доступа к данным пользователей&lt;/h2&gt;\n&lt;p&gt;Чтобы обеспечить безопасность данных сотрудников, для приложений и вебхуков доступны разные версии скоупа User.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gj4x7yct\"&gt;user_brief&lt;/code&gt; дает доступ к информации о пользователях без контактных данных. Этого достаточно для сценариев, в которых требуется отобразить ФИО пользователя в интерфейсе стороннего приложения.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-za69pja9\"&gt;user_basic&lt;/code&gt; открывает базовую информацию и контактные данные пользователей. Это требуется сценариям, связанным с совершением звонков или отправкой e-mail сообщений.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-1xquunzm\"&gt;user&lt;/code&gt; дает полный доступ к информации пользователей, возможность приглашать новых пользователей и изменять данные существующих.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt; &lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"api-reference/user/user-scope.html\"&gt;Версии User Scope&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/user/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-gb86o599\"&gt;user&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/user-add.html\"&gt;user.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Приглашает пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/user-update.html\"&gt;user.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет данные пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/user-current.html\"&gt;user.current&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает информацию о текущем пользователе&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает фильтрованный список пользователей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список пользователей с ускоренным поиском по персональным данным&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/user-fields.html\"&gt;user.fields&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список полей профиля пользователя&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Как работать с пользователями","href":"api-reference/user/index.html#kak-rabotat-s-polzovatelyami","level":2},{"title":"Связь с другими объектами","href":"api-reference/user/index.html#svyaz-s-drugimi-obuektami","level":2,"items":[{"title":"Тип «привязка к пользователю»","href":"api-reference/user/index.html#tip-privyazka-k-polzovatelyu","level":3},{"title":"Права доступа пользователя","href":"api-reference/user/index.html#prava-dostupa-polzovatelya","level":3}]},{"title":"Работа с экстранет-пользователями","href":"api-reference/user/index.html#rabota-s-ekstranet-polzovatelyami","level":2},{"title":"Виджеты","href":"api-reference/user/index.html#vidzhety","level":2},{"title":"Уровни доступа к данным пользователей","href":"api-reference/user/index.html#urovni-dostupa-k-dannym-polzovatelej","level":2},{"title":"Обзор методов","href":"api-reference/user/index.html#all-methods","level":2}],"title":"Пользователи: обзор методов"},"router":{"pathname":"api-reference/user/index","depth":3,"base":"../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
