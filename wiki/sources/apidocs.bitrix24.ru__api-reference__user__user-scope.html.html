            {"data":{"leading":false,"html":"&lt;p&gt;Чтобы обеспечить безопасность данных сотрудников, для приложений и вебхуков с &lt;a href=\"settings/cloud-and-on-premise/on-premise/versions.html\"&gt;версии модуля&lt;/a&gt; &lt;strong&gt;Rest 21.600.0&lt;/strong&gt; доступны разные версии скоупа &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-7gyazt9e\"&gt;User&lt;/code&gt;.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-xkqoze40\"&gt;user_brief&lt;/code&gt; дает доступ к информации о пользователях без контактных данных. Этого достаточно для сценариев, в которых требуется отобразить ФИО пользователя в интерфейсе стороннего приложения.&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-42jb5gvo\"&gt;user_basic&lt;/code&gt; открывает базовую информацию и контактные данные пользователей. Это требуется сценариям, связанным с совершением звонков или отправкой e-mail сообщений.&lt;/li&gt;\n&lt;li&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-nd0peonp\"&gt;user&lt;/code&gt; дает полный доступ к информации пользователей, возможность приглашать новых пользователей и изменять данные существующих.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Для получения доступа к пользовательским полям добавьте приложению скоуп &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-o1zd1m4n\"&gt;user.userfield&lt;/code&gt;.&lt;/p&gt;\n&lt;h2 id=\"ogranichennye-versii-skoupa-user\"&gt;&lt;a href=\"api-reference/user/user-scope.html#ogranichennye-versii-skoupa-user\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ограниченные версии скоупа user&lt;/span&gt;&lt;/a&gt;Ограниченные версии скоупа user&lt;/h2&gt;\n&lt;p&gt;В этих скоупах нельзя добавлять и обновлять пользователей: не доступны методы &lt;a href=\"api-reference/user/user-add.html\"&gt;user.add&lt;/a&gt; и &lt;a href=\"api-reference/user/user-update.html\"&gt;user.update&lt;/a&gt;. Во всех остальных методах получения информации о пользователе доступны только перечисленные поля.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;user_basic&lt;/th&gt;\n&lt;th&gt;user_brief&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ID&lt;/td&gt;\n&lt;td&gt;ID&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;XML_ID&lt;/td&gt;\n&lt;td&gt;XML_ID&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ACTIVE&lt;/td&gt;\n&lt;td&gt;ACTIVE&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;NAME&lt;/td&gt;\n&lt;td&gt;NAME&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;LAST_NAME&lt;/td&gt;\n&lt;td&gt;LAST_NAME&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SECOND_NAME&lt;/td&gt;\n&lt;td&gt;SECOND_NAME&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;TITLE&lt;/td&gt;\n&lt;td&gt;TITLE&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;EMAIL&lt;/td&gt;\n&lt;td&gt;IS_ONLINE&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;PERSONAL_PHONE&lt;/td&gt;\n&lt;td&gt;TIME_ZONE&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;WORK_PHONE&lt;/td&gt;\n&lt;td&gt;PERSONAL_PHOTO&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;WORK_POSITION&lt;/td&gt;\n&lt;td&gt;TIMESTAMP_X&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;WORK_COMPANY&lt;/td&gt;\n&lt;td&gt;DATE_REGISTER&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;IS_ONLINE&lt;/td&gt;\n&lt;td&gt;PERSONAL_PROFESSION&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;TIME_ZONE&lt;/td&gt;\n&lt;td&gt;PERSONAL_GENDER&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;TIMESTAMP_X&lt;/td&gt;\n&lt;td&gt;PERSONAL_BIRTHDAY&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;DATE_REGISTER&lt;/td&gt;\n&lt;td&gt;PERSONAL_CITY&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;LAST_ACTIVITY_DATE&lt;/td&gt;\n&lt;td&gt;PERSONAL_STATE&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt
