        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В Битрикс24 можно настраивать пользовательские поля для сотрудников. Это позволяет дополнять стандартную информацию о пользователях.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Быстрый переход: &lt;a href=\"api-reference/user/userfields/index.html#all-methods\"&gt;все методы&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\"tipy-polzovatelskih-polej\"&gt;&lt;a href=\"api-reference/user/userfields/index.html#tipy-polzovatelskih-polej\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Типы пользовательских полей&lt;/span&gt;&lt;/a&gt;Типы пользовательских полей&lt;/h2&gt;\n&lt;p&gt;Для каждого пользовательского поля задается тип: Строка, Список, Число, Привязка к элементу CRM и другие. Полный перечень типов полей описан в параметре &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-szz55u29\"&gt;fields&lt;/code&gt; метода &lt;a href=\"api-reference/user/userfields/user-userfield-add.html\"&gt;user.userfield.add&lt;/a&gt;.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;Тип задается при создании пользовательского поля, и изменить его нельзя.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"svyaz-polzovatelskih-polej-s-drugimi-obuektami\"&gt;&lt;a href=\"api-reference/user/userfields/index.html#svyaz-polzovatelskih-polej-s-drugimi-obuektami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Связь пользовательских полей с другими объектами&lt;/span&gt;&lt;/a&gt;Связь пользовательских полей с другими объектами&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Валюты.&lt;/strong&gt; В поле типа Деньги указывают число и валюту. Работать с валютами можно через методы &lt;a href=\"api-reference/crm/currency/index.html\"&gt;crm.currency.*&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пользователь.&lt;/strong&gt; В пользовательском поле можно задать привязку к сотруднику. Получить идентификатор пользователя можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt; и &lt;a href=\"api-reference/user/user-search.html\"&gt;user.search&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Информационные блоки.&lt;/strong&gt; Пользовательские поля можно связать с &lt;a href=\"api-reference/catalog/product/index.html\"&gt;товарами&lt;/a&gt;, &lt;a href=\"api-reference/bizproc/index.html\"&gt;бизнес-процессами&lt;/a&gt;, &lt;a href=\"api-reference/lists/index.html\"&gt;списками&lt;/a&gt; через типы Привязка к элементу инфоблока и Привязка к разделу инфоблока.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Файлы.&lt;/strong&gt; Поле типа Файл позволяет загружать и хранить файлы. Файлы не получают идентификаторы в модуле Диск, поэтому методы Диска не применимы. Работать с файлами можно только через интерфейс Битрикс24.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CRM.&lt;/strong&gt; Пользовательские поля могут быть связаны с CRM-объектами с помощью двух типов.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Привязка к элементам CRM — для связи с &lt;a href=\"api-reference/crm/leads/index.html\"&gt;лидами&lt;/a&gt;, &lt;a href=\"api-reference/crm/deals/index.html\"&gt;сделками&lt;/a&gt;, &lt;a href=\"api-reference/crm/contacts/index.html\"&gt;контактами&lt;/a&gt; и &lt;a href=\"api-reference/crm/companies/index.html\"&gt;компаниями&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Привязка к справочникам CRM — для выбора из списка &lt;a href=\"api-reference/crm/status/index.html\"&gt;справочников CRM&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Пользовательская документация&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\"https://helpdesk.bitrix24.ru/open/25548816/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;Как добавить пользовательские поля в профиль сотрудника&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h2 id=\"oshibki-pri-rabote-s-polzovatelskimi-polyami\"&gt;&lt;a href=\"api-reference/user/userfields/index.html#oshibki-pri-rabote-s-polzovatelskimi-polyami\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ошибки при работе с пользовательскими полями&lt;/span&gt;&lt;/a&gt;Ошибки при работе с пользовательскими полями&lt;/h2&gt;\n&lt;p&gt;При создании или удалении пользовательских полей запрос может прерваться с ошибкой &lt;a href=\"error-codes.html\"&gt;INTERNAL_SERVER_ERROR&lt;/a&gt;. Это внутренняя ошибка сервера. Причину ошибки можно найти в логах сервера на момент выполнения запроса.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;Облачный Битрикс24 — напишите обращение в &lt;a href=\"bitrix-support.html\"&gt;техническую поддержку&lt;/a&gt;, чтобы получить детали ошибки.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Коробочный Битрикс24 — запросите лог ошибок сервера у администратора сервера или хостинга. После напишите в &lt;a href=\"bitrix-support.html\"&gt;техническую поддержку&lt;/a&gt; и приложите лог для анализа.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\"chastye-prichiny-servernyh-oshibok\"&gt;&lt;a href=\"api-reference/user/userfields/index.html#chastye-prichiny-servernyh-oshibok\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Частые причины серверных ошибок&lt;/span&gt;&lt;/a&gt;Частые причины серверных ошибок&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;Для пользователей можно создать 1016 пользовательских полей — это ограничение архитектуры базы данных. Если лимит исчерпан, при попытке создать новое поле метод &lt;a href=\"api-reference/user/userfields/user-userfield-add.html\"&gt;user.userfield.add&lt;/a&gt; вернет ошибку &lt;a href=\"error-codes.html\"&gt;INTERNAL_SERVER_ERROR&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Проверить количество пользовательских полей можно методом &lt;a href=\"api-reference/user/userfields/user-userfield-list.html\"&gt;user.userfield.list&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;На серверах есть ограничение для времени выполнения одного запроса — &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-pgqqe34q\"&gt;max_execution_time&lt;/code&gt;. Стандартное значение — 60 секунд. Если запрос выполняется дольше, он прерывается с ошибкой &lt;a href=\"error-codes.html\"&gt;INTERNAL_SERVER_ERROR&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Время &lt;a href=\"api-reference/user/userfields/user-userfield-add.html\"&gt;создания&lt;/a&gt; или &lt;a href=\"api-reference/user/userfields/user-userfield-delete.html\"&gt;удаления&lt;/a&gt; пользовательского поля зависит от количества пользователей. Когда поле создается, оно добавляется во все профили сотрудников. Когда поле удаляется, оно удаляется из всех профилей. Чем меньше пользователей в вашем Битрикс24, тем быстрее будут созданы и удалены поля.&lt;/p&gt;\n&lt;p&gt;Проверить количество пользователей в Битрикс24 можно с помощью метода &lt;a href=\"api-reference/user/user-get.html\"&gt;user.get&lt;/a&gt;.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\"all-methods\"&gt;&lt;a href=\"api-reference/user/userfields/index.html#all-methods\" class=\"yfm-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Обзор методов&lt;/span&gt;&lt;/a&gt;Обзор методов&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Scope: &lt;a href=\"api-reference/scopes/permissions.html\"&gt;&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-ivznk4u1\"&gt;user.userfield&lt;/code&gt;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Кто может выполнять метод: в зависимости от метода&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Метод&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;strong&gt;Описание&lt;/strong&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/userfields/user-userfield-add.html\"&gt;user.userfield.add&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Добавляет пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/userfields/user-userfield-update.html\"&gt;user.userfield.update&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Обновляет пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/userfields/user-userfield-delete.html\"&gt;user.userfield.delete&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Удаляет пользовательское поле&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;&lt;a href=\"api-reference/user/userfields/user-userfield-list.html\"&gt;user.userfield.list&lt;/a&gt;&lt;/p&gt;\n&lt;/td&gt;\n&lt;td&gt;\n&lt;p&gt;Получает список пользовательских полей&lt;/p&gt;\n&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;div class=\"yfm inline_code_tooltip\" id=\"tooltip_inline_clipboard_dialog\" role=\"dialog\"&gt;Скопировано&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.9.1"}],"style":["_assets/style/b24_custom.css?20241023-01","_assets/style/highlight_custom.css"],"script":["_assets/b24loc.js?20240925-02","_assets/b24addons.js?20241208-01"]},"headings":[{"title":"Типы пользовательских полей","href":"api-reference/user/userfields/index.html#tipy-polzovatelskih-polej","level":2},{"title":"Связь пользовательских полей с другими объектами","href":"api-reference/user/userfields/index.html#svyaz-polzovatelskih-polej-s-drugimi-obuektami","level":2},{"title":"Ошибки при работе с пользовательскими полями","href":"api-reference/user/userfields/index.html#oshibki-pri-rabote-s-polzovatelskimi-polyami","level":2,"items":[{"title":"Частые причины серверных ошибок","href":"api-reference/user/userfields/index.html#chastye-prichiny-servernyh-oshibok","level":3}]},{"title":"Обзор методов","href":"api-reference/user/userfields/index.html#all-methods","level":2}],"title":"Пользовательские поля: обзор методов"},"router":{"pathname":"api-reference/user/userfields/index","depth":4,"base":"../../../"},"lang":"ru","langs":["ru"],"viewerInterface":{"toc":true,"search":true,"feedback":true},"search":{"enabled":true,"provider":"local","api":"_search/api.js","link":"_search/ru/index.html"}}
